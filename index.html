  --bad:#B23A2E; --bad-soft:#F8E5E2;
  --gold:#A9822F; --gold-soft:#F3E8D2;
  --shadow:rgba(27,35,64,0.14);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei","Heiti TC",sans-serif;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  padding:2.5rem 1rem;
}
@media (max-width:680px){
  body{padding:0;}
}

.app{
  max-width:640px;
  margin:0 auto;
  background:var(--paper-raised);
  box-shadow:0 12px 48px var(--shadow);
  border-radius:20px;
  overflow:hidden;
  min-height:calc(100vh - 5rem);
  display:flex;
  flex-direction:column;
}
@media (max-width:680px){
  .app{border-radius:0; box-shadow:none; min-height:100vh;}
}

.mono{font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;}

.screen{display:none;flex-direction:column;flex:1;}
.screen.active{display:flex;}
@media (prefers-reduced-motion:no-preference){
  .screen.active{animation:fadeIn .35s ease;}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

button{font:inherit;color:inherit;-webkit-appearance:none;appearance:none;}
button:disabled{opacity:1;}
.icon-plane{display:inline-block;vertical-align:-2px;}

/* ---------- HOME ---------- */
#screen-home{padding:2.2rem 1.6rem 1.8rem;}
.hero{text-align:center;padding-bottom:1.6rem;}
.seal{
  width:112px;height:112px;margin:0 auto 1.2rem;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.seal svg{width:112px;height:112px;}
.hero h1{
  font-size:2rem;
  line-height:1.3;
  margin:0 0 .5rem;
  font-weight:700;
  text-wrap:balance;
}
.hero h1 .sub{
  display:block;
  font-size:1rem;
  font-weight:500;
  color:var(--ink-soft);
  margin-bottom:.25rem;
}
.hero h1 .accent-word{color:var(--accent);}
.hero p{color:var(--ink-soft);font-size:0.95rem;margin:0;}
.hero .captain-note{margin-top:.7rem;font-size:.82rem;color:var(--accent);line-height:1.5;}

.passport-card{
  background:var(--paper-sunken);
  border:1px solid var(--line);
  border-radius:14px;
  padding:1rem 0;
  display:flex;
  align-items:center;
  margin:1.4rem 0 1.8rem;
  position:relative;
  overflow:hidden;
}
.passport-card::before,.passport-card::after{
  content:"";position:absolute;left:50%;width:18px;height:18px;border-radius:50%;
  background:var(--paper-raised);transform:translateX(-50%);
}
.passport-card::before{top:-9px;}
.passport-card::after{bottom:-9px;}
.passport-card>div:first-child,.passport-card .stamps-count{flex:1;padding:0 1.2rem;}
.passport-card .ticket-divider{align-self:stretch;border-left:1.5px dashed var(--line);}
.passport-card .field-label{font-size:0.68rem;letter-spacing:.1em;color:var(--ink-soft);text-transform:uppercase;}
.passport-card .field-value{font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;font-size:1.1rem;font-weight:700;}
.passport-card .stamps-count{text-align:right;}
.pass-rule{text-align:center;font-size:.8rem;color:var(--ink-soft);margin:-1rem 0 1.8rem;}

.section-label{
  font-size:0.72rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-soft);margin:0 0 .7rem .2rem;
  font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;
}

.gates{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.7rem;}
@media (max-width:420px){.gates{grid-template-columns:1fr;}}
.gate{
  text-align:left;
  border:1.5px solid var(--line);
  background:var(--paper-raised);
  border-radius:14px;
  padding:.9rem 1rem .9rem 1.5rem;
  cursor:pointer;
  display:flex;flex-direction:column;gap:.4rem;
  transition:border-color .15s ease, transform .15s ease;
  position:relative;
  overflow:hidden;
}
.gate::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:5px;
  background:var(--board-grad);
}
.gate:hover{border-color:var(--accent);}
.gate:active{transform:scale(.98);}
.gate .gate-code{
  display:inline-block;align-self:flex-start;
  font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;font-size:.66rem;letter-spacing:.1em;
  color:var(--board-ink);
  background:linear-gradient(135deg,var(--board-bg),var(--board-bg2));
  padding:.22rem .55rem;border-radius:5px;
}
.gate .gate-title{font-weight:700;font-size:1rem;}
.gate.disabled{opacity:.45;cursor:not-allowed;}
.gate.disabled:hover{border-color:var(--line);}
.gate.special{grid-column:1 / -1;background:var(--accent-soft);border-color:var(--accent);}
.gate .gate-sub{font-size:.78rem;color:var(--ink-soft);font-weight:500;line-height:1.4;}
.aircraft-gates{grid-template-columns:1fr;gap:.9rem;}
.aircraft-gates .gate{padding:1.15rem 1.25rem;}
.aircraft-gates .gate-title{font-size:1.25rem;}
.year-gates .gate .gate-title{font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;font-size:1.3rem;}
.mode-choice{grid-template-columns:1fr;gap:.9rem;margin-bottom:.7rem;}
.mode-choice .gate{padding:1.15rem 1.25rem;}
.mode-choice .gate-title{font-size:1.15rem;}

/* ---------- TOPIC LIST ---------- */
#screen-topics{padding:0;}
.bar{
  display:flex;align-items:center;gap:.8rem;
  padding:1.1rem 1.4rem;
  background:linear-gradient(135deg,var(--board-bg),var(--board-bg2));
  position:relative;
}
.bar::after{
  content:"";position:absolute;left:0;right:0;bottom:0;height:2px;
  background:var(--board-grad);
}
.back-btn{
  background:none;border:none;cursor:pointer;
  font-size:1.3rem;color:var(--board-ink);
  padding:.2rem .3rem;line-height:1;
  border-radius:8px;
}
.back-btn:hover{background:rgba(255,255,255,.1);}
.bar-title{
  font-weight:700;font-size:.95rem;flex:1;color:var(--board-ink);
  font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;
  letter-spacing:.06em;text-transform:uppercase;
}
.bar-progress{
  font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;
  font-size:.78rem;color:var(--board-ink);
  background:rgba(255,255,255,.1);
  border:1px solid var(--board-line);
  padding:.25rem .55rem;border-radius:20px;white-space:nowrap;
}

.itinerary{padding:.4rem 1rem 1.6rem;}
.leg-row{
  width:100%;
  display:flex;align-items:center;gap:.9rem;
  background:none;border:none;
  text-align:left;cursor:pointer;
  padding:.85rem .6rem;
  border-bottom:1px dashed var(--line);
}
.leg-row:last-child{border-bottom:none;}
.leg-row:hover{background:var(--paper-sunken);}
.leg-num{
  font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;
  font-weight:700;font-size:1rem;color:var(--ink-soft);
  width:1.8rem;flex-shrink:0;
}
.leg-info{flex:1;min-width:0;}
.leg-title{font-weight:600;font-size:.98rem;}
.leg-tag{font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;font-size:.68rem;letter-spacing:.08em;color:var(--ink-soft);}
.leg-stamp{flex-shrink:0;font-size:.78rem;text-align:right;min-width:3.6rem;}
.leg-stamp.none{color:var(--ink-soft);}
.leg-stamp.some{color:var(--accent);font-weight:700;}
.leg-stamp.full{color:var(--gold);font-weight:700;}
.leg-row.special{background:var(--accent-soft);border-bottom:1px solid var(--accent);}
.leg-row.special .leg-num{color:var(--accent);font-size:1.2rem;}
.leg-row.special .leg-title,.leg-row.special .leg-tag,.leg-row.special .leg-stamp{color:var(--accent);}
.leg-row.special .leg-stamp{font-weight:700;}

/* ---------- DSE REVIEW ---------- */
.review-list{padding:.4rem 1rem 2rem;}
.review-row{border-bottom:1px dashed var(--line);}
.review-row:last-child{border-bottom:none;}
.review-row-head{
  width:100%;display:flex;align-items:center;gap:.8rem;
  background:none;border:none;text-align:left;cursor:pointer;
  padding:.85rem .3rem;
}
.review-row-head:hover{background:var(--paper-sunken);}
.review-num{
  font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;
  font-weight:700;font-size:.85rem;color:var(--ink-soft);width:2.6rem;flex-shrink:0;
}
.review-icon{flex-shrink:0;font-size:1rem;font-weight:700;width:1.2rem;text-align:center;}
.review-row.correct .review-icon{color:var(--good);}
.review-row.wrong .review-icon{color:var(--bad);}
.review-preview{flex:1;min-width:0;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.review-chevron{flex-shrink:0;color:var(--ink-soft);font-size:.8rem;transition:transform .15s ease;}
.review-row.open .review-chevron{transform:rotate(180deg);}
.review-detail{padding:.2rem .3rem 1.2rem 3.4rem;}
.review-detail .review-question{font-weight:700;font-size:.98rem;line-height:1.55;margin-bottom:.8rem;}
.review-opts{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.8rem;}
.review-opt{
  border:1.5px solid var(--line);border-radius:10px;padding:.6rem .8rem;
  font-size:.88rem;background:var(--paper-raised);
}
.review-opt.opt-correct{border-color:var(--good);background:var(--good-soft);}
.review-opt.opt-chosen-wrong{border-color:var(--bad);background:var(--bad-soft);}
.review-opt .opt-tag{
  font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;font-size:.68rem;
  letter-spacing:.06em;font-weight:700;margin-right:.4rem;
}
.review-opt.opt-correct .opt-tag{color:var(--good);}
.review-opt.opt-chosen-wrong .opt-tag{color:var(--bad);}
.review-note{color:var(--ink-soft);font-size:.85rem;line-height:1.6;}

/* ---------- QUIZ ---------- */
#screen-quiz{padding:0;}
.flight-track{
  padding:1.1rem 1.4rem 1rem;position:relative;
  background:linear-gradient(135deg,var(--board-bg),var(--board-bg2));
}
.flight-track::after{
  content:"";position:absolute;left:0;right:0;bottom:0;height:2px;
  background:var(--board-grad);
}
.flight-track .back-btn{color:var(--board-ink);}
.flight-track .back-btn:hover{background:rgba(255,255,255,.1);}
.flight-track-row{display:flex;align-items:center;gap:.7rem;}
.flight-route{
  position:relative;flex:1;height:2px;
  background-image:repeating-linear-gradient(90deg,var(--board-line) 0 6px,transparent 6px 12px);
}
.flight-route-fill{
  position:absolute;left:0;top:0;height:100%;background:var(--board-grad);border-radius:2px;
  transition:width .3s ease;
}
.flight-plane{
  position:absolute;top:50%;color:#fff;
  transform:translate(-50%,-50%);
  transition:left .3s ease;
  filter:drop-shadow(0 0 4px rgba(99,102,241,.8));
}
.flight-track .q-count{font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;font-size:.75rem;color:var(--board-ink-soft);white-space:nowrap;}

.quiz-body{padding:1.5rem 1.4rem 1.8rem;flex:1;display:flex;flex-direction:column;}
.topic-tag{
  display:inline-block;
  font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;
  font-size:.7rem;letter-spacing:.08em;
  color:var(--accent);background:var(--accent-soft);
  padding:.25rem .6rem;border-radius:20px;margin-bottom:1rem;align-self:flex-start;
}
.question-text{
  font-size:1.18rem;font-weight:700;line-height:1.6;
  margin:0 0 1.3rem;text-wrap:balance;
}
.question-text .q-table-wrap{
  margin:.7rem 0;border:1px solid var(--line);border-radius:8px;overflow-x:auto;
}
.question-text .q-table{
  width:100%;border-collapse:collapse;font-size:.85rem;font-weight:500;white-space:nowrap;
}
.question-text .q-table th,.question-text .q-table td{
  border-bottom:1px solid var(--line);padding:.45rem .7rem;text-align:left;line-height:1.4;
}
.question-text .q-table th{background:var(--paper-sunken);color:var(--ink-soft);font-weight:700;}
.question-text .q-table tr:last-child td{border-bottom:none;}
.question-text .q-table td:first-child{color:var(--accent);font-weight:700;font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;}
.options{display:flex;flex-direction:column;gap:.65rem;}
.option{
  display:flex;align-items:flex-start;gap:.7rem;
  text-align:left;
  border:1.5px solid var(--line);
  background:var(--paper-raised);
  border-radius:12px;
  padding:.8rem .95rem;
  cursor:pointer;
  font-size:.98rem;
  transition:border-color .15s ease, background .15s ease;
}
.option:hover:not(:disabled){border-color:var(--accent);}
.option:disabled{cursor:default;background:var(--paper-raised);color:var(--ink);border-color:var(--line);}
.option .opt-letter{
  font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;
  font-weight:700;color:var(--ink-soft);flex-shrink:0;
}
.option.is-correct{border-color:var(--good);background:var(--good-soft);}
.option.is-correct .opt-letter{color:var(--good);}
.option.is-wrong{border-color:var(--bad);background:var(--bad-soft);}
.option.is-wrong .opt-letter{color:var(--bad);}

.feedback{margin-top:1.3rem;}
.feedback-stamp{
  display:inline-flex;align-items:center;gap:.4rem;
  font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;
  font-weight:700;font-size:.85rem;letter-spacing:.04em;
  padding:.35rem .7rem;border-radius:8px;
  border:2px solid currentColor;
  transform:rotate(-2deg);
  margin-bottom:.7rem;
}
.feedback-stamp.good{color:var(--good);}
.feedback-stamp.bad{color:var(--bad);}
.feedback-note{font-size:.92rem;color:var(--ink-soft);margin:0 0 1.2rem;line-height:1.65;}
.next-btn{
  display:block;width:100%;
  background:var(--accent);color:var(--accent-ink);
  border:none;border-radius:12px;
  padding:.85rem;font-weight:700;font-size:.98rem;
  cursor:pointer;
}
.next-btn:hover{opacity:.92;}

/* ---------- RESULT ---------- */
#screen-result{padding:2.4rem 1.6rem;align-items:center;justify-content:center;text-align:center;}
.result-stamp{
  width:132px;height:132px;border-radius:50%;
  border:4px double currentColor;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 1.4rem;
  transform:rotate(-6deg);
}
.result-stamp.gold{color:var(--gold);}
.result-stamp.good{color:var(--good);}
.result-stamp.accent{color:var(--accent);}
.result-stamp.bad{color:var(--bad);}
.result-stamp .score{font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;font-size:1.8rem;font-weight:700;}
.result-stamp .score-label{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-family:'TicketMono',"SF Mono",Menlo,Consolas,monospace;}
.result-title{font-size:1.35rem;font-weight:700;margin:0 0 .5rem;}
.result-sub{color:var(--ink-soft);font-size:.95rem;margin:0 0 1.8rem;max-width:32ch;margin-left:auto;margin-right:auto;}
.result-actions{display:flex;flex-direction:column;gap:.7rem;width:100%;max-width:280px;}
.btn-primary{
  background:var(--accent);color:var(--accent-ink);border:none;border-radius:12px;
  padding:.85rem;font-weight:700;font-size:.98rem;cursor:pointer;
}
.btn-secondary{
  background:none;color:var(--ink);border:1.5px solid var(--line);border-radius:12px;
  padding:.85rem;font-weight:600;font-size:.98rem;cursor:pointer;
}
.btn-primary:hover{opacity:.92;}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}

@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important;}
}

商提供資訊及支援服務。"},{"q":"以下哪項不屬於旅遊推廣者?","opts":["旅遊局","旅行代理商","旅行團經營商","酒店"],"a":3,"note":"酒店屬旅遊服務供應商;其餘三者屬旅遊推廣者。"},{"q":"以下哪項不屬於旅遊服務供應商?","opts":["酒店","餐廳","旅行代理商","航空公司"],"a":2,"note":"旅行代理商屬旅遊推廣者,負責銷售旅遊產品。"},{"q":"教材列出影響旅遊業的外在因素,不包括以下哪項?","opts":["經濟因素","政治因素","軍事科技因素","文化因素"],"a":2,"note":"教材列出經濟、政治、社會、文化、環境、科技六類因素。"},{"q":"「經濟暢旺→收入高→樂意花費旅遊」反映哪類外在因素?","opts":["經濟因素","政治因素","文化因素","環境因素"],"a":0,"note":"經濟因素直接影響旅遊業,與經濟發展同步。"},{"q":"經濟不景時,旅客一般會如何選擇?","opts":["增加旅遊次數","選擇費用較低的旅程","改乘頭等機艙","延長旅遊日數"],"a":1,"note":"經濟不景→節儉→選擇費用較低的旅程。"},{"q":"匯率變動屬於哪類外在因素?","opts":["政治因素","社會因素","經濟因素","科技因素"],"a":2,"note":"匯率是影響旅遊業發展的經濟元素之一。"},{"q":"人民幣升值影響旅客外遊意欲,屬於哪類因素?","opts":["經濟因素","文化因素","環境因素","社會因素"],"a":0,"note":"教材以人民幣升值為匯率(經濟因素)的例子。"},{"q":"日元貶值吸引更多旅客訪日,反映哪類因素?","opts":["政治因素","經濟因素","科技因素","文化因素"],"a":1,"note":"日元貶值屬匯率變化,是經濟因素。"},{"q":"「旅遊業與經濟發展同步」說明旅遊業與哪項的關係?","opts":["經濟因素","環境因素","文化因素","科技因素"],"a":0,"note":"經濟因素直接影響旅遊業,兩者同步發展。"},{"q":"國際政治氣候屬於哪類外在因素?","opts":["社會因素","政治因素","經濟因素","環境因素"],"a":1,"note":"國際政治氣候是政治因素的一環。"},{"q":"南韓部署美國導彈導致中國旅客大減,反映哪項政治因素?","opts":["旅客原居地與旅遊目的地的關係","東道國簽證安排","國內政治穩定性","外匯管制"],"a":0,"note":"兩地關係對市場影響重大,南韓事件是教材例子。"},{"q":"東道國對外地旅客的簽證寬緊屬於哪類因素?","opts":["經濟因素","社會因素","政治因素","科技因素"],"a":2,"note":"東道國的外交情況及簽證寬緊屬政治因素。"},{"q":"澳門銳意發展旅遊業、積極建設,令旅客大幅攀升,反映哪項?","opts":["旅遊目的地的政策","匯率變化","人口結構轉變","環境保護"],"a":0,"note":"教材以澳門為「旅遊目的地的政策」的例子。"},{"q":"西歐、日本、澳洲吸引遊客安心前往,主要因為?","opts":["物價便宜","政治穩定","距離接近","語言相通"],"a":1,"note":"政治穩定的地方吸引遊客安心前往。"},{"q":"埃及示威及暴力事件打擊當地旅遊業,反映?","opts":["政治動盪影響旅遊業","經濟增長過快","科技落後","文化獨特"],"a":0,"note":"政治動盪會打擊旅遊業,埃及是教材例子。"},{"q":"治安良好、社會和諧有利旅客來訪,屬於哪類因素?","opts":["政治因素","經濟因素","社會因素","科技因素"],"a":2,"note":"社會穩定性屬社會因素。"},{"q":"當地人對旅客的態度屬於哪類外在因素?","opts":["社會因素","政治因素","環境因素","經濟因素"],"a":0,"note":"對旅客態度是社會因素的一環。"},{"q":"「收入增加、工時減少、閑暇時間增多」導致?","opts":["旅遊需求大減","旅遊需求大增","旅遊價格下降","旅遊產品消失"],"a":1,"note":"收入與假期增加令旅遊需求大增,屬社會因素。"},{"q":"嬰兒潮一代進入退休期,為旅遊業帶來甚麼?","opts":["「銀髮族」成為大商機","旅客人數下降","旅遊產品減少","匯率波動"],"a":0,"note":"人口結構轉變令「銀髮族」成為旅遊業大商機。"},{"q":"「銀髮族」旅遊興起與哪類因素最相關?","opts":["科技因素","環境因素","社會因素(人口結構)","政治因素"],"a":2,"note":"人口結構屬社會因素。"},{"q":"文化色彩獨特而濃烈,對旅遊業有何影響?","opts":["阻礙旅遊發展","推動旅遊發展","令旅客卻步","與旅遊無關"],"a":1,"note":"獨特濃烈的文化色彩可推動旅遊發展。"},{"q":"國民因宗教文化關係不喜歡受外地旅客影響,結果是?","opts":["旅客大增","旅客大減","旅客消費上升","旅遊設施增加"],"a":1,"note":"對外來文化接受程度低會令旅客大減,屬文化因素。"},{"q":"「對外來文化的接受程度」屬於哪類因素?","opts":["文化因素","政治因素","經濟因素","科技因素"],"a":0,"note":"這是文化因素的其中一環。"},{"q":"北京霧霾影響旅遊業,反映哪類外在因素?","opts":["環境因素","社會因素","政治因素","經濟因素"],"a":0,"note":"缺乏環境保護阻礙旅遊業發展,霧霾是教材例子。"},{"q":"香港的空氣污染在教材中用作說明哪類因素?","opts":["科技因素","環境因素","文化因素","政治因素"],"a":1,"note":"空氣污染與環境保護相關,屬環境因素。"},{"q":"生態旅遊與綠色酒店的概念屬於哪類因素?","opts":["經濟因素","科技因素","環境因素","政治因素"],"a":2,"note":"生態旅遊、綠色酒店屬環境因素下的旅遊概念。"},{"q":"「現時全球各地均重視環境保護及可持續發展」屬於?","opts":["環境因素","社會因素","經濟因素","文化因素"],"a":0,"note":"可持續發展是環境因素的重要內容。"},{"q":"互聯網普及對旅遊業的影響是?","opts":["增加地域限制","減低地域的限制","令旅客減少","令機票加價"],"a":1,"note":"資訊科技發展及互聯網普及減低地域限制。"},{"q":"網購機票、住宿和景點門票反映哪類因素?","opts":["政治因素","文化因素","科技因素","環境因素"],"a":2,"note":"網上交易與電子貨幣屬科技因素。"},{"q":"信用卡和電子貨幣方便買賣,對旅遊活動有何作用?","opts":["有助旅遊活動","阻礙旅遊活動","與旅遊無關","增加旅遊成本"],"a":0,"note":"電子貨幣方便交易,有助旅遊活動,屬科技因素。"},{"q":"新式客機、高速鐵路的出現反映?","opts":["科技提升服務效能","環境污染加劇","政治局勢緩和","文化交流頻繁"],"a":0,"note":"科技令集體運輸系統更有效率,屬科技因素。"},{"q":"「集體運輸系統更有效率」屬於哪類因素的影響?","opts":["科技因素","社會因素","文化因素","政治因素"],"a":0,"note":"科技提升服務效能,包括運輸系統。"},{"q":"某國貨幣大幅貶值令外地旅客覺得消費便宜而增加到訪,屬?","opts":["經濟因素","政治因素","文化因素","環境因素"],"a":0,"note":"匯率變化影響旅客消費力,屬經濟因素。"},{"q":"兩國關係惡化並互相收緊簽證,屬於哪類因素?","opts":["社會因素","政治因素","經濟因素","科技因素"],"a":1,"note":"兩地關係及簽證安排屬政治因素。"},{"q":"某地罪案率急升令旅客卻步,屬於哪類因素?","opts":["社會因素","經濟因素","科技因素","文化因素"],"a":0,"note":"治安屬社會穩定性,是社會因素。"},{"q":"某城市成功改善空氣質素吸引更多旅客,反映?","opts":["環境因素","政治因素","經濟因素","文化因素"],"a":0,"note":"環境保護有利旅遊業發展。"},{"q":"旅客用手機應用程式一站式預訂機票酒店,反映?","opts":["文化因素","科技因素","政治因素","社會因素"],"a":1,"note":"網上交易及資訊科技屬科技因素。"},{"q":"以下哪項是經濟因素的例子?","opts":["匯率變動","簽證收緊","罪案率上升","霧霾污染"],"a":0,"note":"匯率屬經濟因素;簽證屬政治、治安屬社會、霧霾屬環境。"},{"q":"以下哪項是政治因素的例子?","opts":["人口老化","東道國的外交情況","電子貨幣普及","生態旅遊興起"],"a":1,"note":"外交情況屬政治因素。"},{"q":"以下哪項不是社會因素的內容?","opts":["社會穩定性","收入與假期","人口結構","匯率變動"],"a":3,"note":"匯率屬經濟因素;其餘三項屬社會因素。"},{"q":"某地大力宣傳其獨特節慶文化以吸引旅客,主要運用哪類因素的優勢?","opts":["文化因素","科技因素","經濟因素","政治因素"],"a":0,"note":"獨特文化色彩可推動旅遊發展。"},{"q":"政治氣候緩和對旅遊的影響是?","opts":["限制旅客流動","可自由來往世界各地","旅遊成本上升","旅遊產品減少"],"a":1,"note":"政治氣候緩和令人們可自由來往世界各地。"},{"q":"整合模式指出持份者與外在因素之間的關係是?","opts":["互不相干","相互影響且密切程度不同","單向影響","完全一致"],"a":1,"note":"模式說明兩者存在相互影響和不同密切程度的關係。"}]},{"n":2,"title":"旅行、旅遊與旅客","tag":"TRAVEL VS TOURISM","qs":[{"q":"「旅行」泛指甚麼?","opts":["從一地前往另一地的旅程","逗留超過一年的活動","只限跨國的旅程","只限消閒的活動"],"a":0,"note":"旅行泛指從一地前往另一地的旅程。"},{"q":"「旅行」所涉及的兩地可以是?","opts":["只限本土","只限跨國","本土或跨國","只限鄰近城市"],"a":2,"note":"旅行的兩地可以是本土或跨國的。"},{"q":"教材指「旅行」的原因可以包括?","opts":["只限度假","消閒、工作、移居、升學或過境等","只限公幹","只限探親"],"a":1,"note":"旅行可基於消閒、工作、移居、升學或過境等不同原因。"},{"q":"「旅遊」的定義中,逗留時間是?","opts":["不多於一個月","不多於半年","不多於一年","沒有限制"],"a":2,"note":"旅遊指短暫離開原居地,逗留不多於一年。"},{"q":"「旅遊」結束後,旅客必須?","opts":["移居當地","返回原居地","繼續前往下一國家","申請當地居留"],"a":1,"note":"旅遊的「往返」特性:最後返回原居地。"},{"q":"「旅遊」與「旅行」的關係是?","opts":["兩者完全相同","所有旅遊均是旅行,但部分旅行不是旅遊","所有旅行均是旅遊","兩者互不相干"],"a":1,"note":"旅遊是旅行的一種,但部分旅行(如移居)不是旅遊。"},{"q":"以下哪項活動屬於「旅遊」?","opts":["移居加拿大定居","到泰國度假一星期後回港","被放逐到外地","到外地打工謀生十年"],"a":1,"note":"度假、短暫、自願、往返,符合旅遊全部特性。"},{"q":"一位香港人移居加拿大定居,這屬於?","opts":["旅遊","旅行但不是旅遊","國內旅遊","不屬旅行"],"a":1,"note":"移居沒有「往返」特性,是旅行但不是旅遊。"},{"q":"以下哪項不是「旅遊」的五個特性之一?","opts":["有時間性","離開原居地","自願","必須跨國"],"a":3,"note":"旅遊目的地可以是本國或國外,「必須跨國」不是特性。"},{"q":"旅遊的「有時間性」是指?","opts":["必須超過一年","少於一年,但也不是數小時在原地附近的活動","必須少於一星期","必須在日間進行"],"a":1,"note":"有時間性:少於一年,亦非數小時在原地附近的活動。"},{"q":"旅遊的「自願」特性有別於哪類人士?","opts":["商務旅客","被放逐或被迫流亡在外的難民","度假旅客","留學生"],"a":1,"note":"自願特性把旅遊與被放逐或流亡的難民區分。"},{"q":"旅遊的「往返」特性是指?","opts":["旅程中必須往返多次","「旅遊」結束後會返回原居地","必須乘搭來回機票","必須原路折返"],"a":1,"note":"往返指旅遊結束後返回原居地。"},{"q":"旅遊的「性質」包括度假、升學和公幹,但不包括?","opts":["探訪親友","到外地謀生","觀光","參加會議"],"a":1,"note":"到外地謀生不屬旅遊性質。"},{"q":"旅遊的目的地可以是?","opts":["只限國外","只限本國","本國或國外,但不是原居地","任何地方包括原居地"],"a":2,"note":"目的地可以是本國或國外,但不是原居地。"},{"q":"「旅遊」按目的地基本可分為?","opts":["長途及短途旅遊","國內/本土旅遊及國際旅遊","豪華及經濟旅遊","團體及個人旅遊"],"a":1,"note":"旅遊基本按目的地分為國內/本土旅遊及國際旅遊。"},{"q":"一位北京居民到上海公幹,屬於?","opts":["國際旅遊","國內/本土旅遊","出境旅遊","不屬旅遊"],"a":1,"note":"教材例子:北京居民到上海公幹屬國內/本土旅遊。"},{"q":"香港居民到泰國旅遊,屬於?","opts":["國內旅遊","本土旅遊","國際旅遊","過境活動"],"a":2,"note":"香港居民到泰國屬國際旅遊。"},{"q":"香港居民前往泰國旅遊,對香港而言他是?","opts":["入境旅客","出境旅客","過境旅客","本土旅客"],"a":1,"note":"對原居地香港而言,他是出境旅客。"},{"q":"香港居民前往泰國旅遊,對泰國而言他是?","opts":["出境旅客","入境旅客","本土旅客","轉機旅客"],"a":1,"note":"對目的地泰國而言,他是入境旅客。"},{"q":"跨境工人不被視為「旅客」,原因是?","opts":["收入太低","頻繁跨境到與通常居住地不同的地區工作","沒有護照","逗留時間太長"],"a":1,"note":"跨境工人頻繁跨境工作,不屬旅客。"},{"q":"在深圳居住但頻繁往返香港工作的人士,屬於?","opts":["國際旅客","跨境工人(不視為旅客)","入境旅客","漫遊式旅客"],"a":1,"note":"教材例子:深圳居住、香港工作屬跨境工人。"},{"q":"「季節工人」是指?","opts":["按短期合約受僱在居住地以外國家或地區工作的人","只在冬季旅遊的旅客","在旅遊旺季出遊的旅客","長期移居外地的人"],"a":0,"note":"季節工人按短期合約在居住地以外工作,不視為旅客。"},{"q":"教材所列季節工人常見的工作部門,不包括?","opts":["農業","建造業","酒店及餐廳","銀行及金融業"],"a":3,"note":"教材列出農業、建造業、酒店、餐廳及其他服務部門。"},{"q":"季節工人及短期工人是否被視為旅客?","opts":["是,因為短暫停留","不是,因為受僱到外地工作","是,只要少於一年","視乎國籍而定"],"a":1,"note":"受僱在外地工作屬謀生性質,不視為旅客。"},{"q":"流浪者的「慣常生活的環境空間」是?","opts":["其出生地","其到訪的所有地方","其父母的居住地","不存在"],"a":1,"note":"流浪者到訪的所有地方均視為其慣常生活環境空間。"},{"q":"流浪者不被視為旅客,原因是?","opts":["沒有金錢消費","所有到訪地方都是其慣常生活的環境空間","不使用交通工具","沒有旅遊動機"],"a":1,"note":"流浪者的慣常空間覆蓋所有到訪地,故不是旅客。"},{"q":"教材指界定流浪者的哪一項有一定困難?","opts":["年齡","居住國","職業","語言"],"a":1,"note":"某些情況下,要界定流浪者的居住國有一定困難。"},{"q":"難民或流離失所者一般沒有?","opts":["行李","通常居住地","同伴","交通工具"],"a":1,"note":"難民一般沒有通常居住地。"},{"q":"難民逗留的地方被認為是?","opts":["旅遊目的地","他們慣常生活的環境空間","臨時旅館","國際領土"],"a":1,"note":"難民逗留地被視為其慣常生活環境空間,故非旅客。"},{"q":"難民是否被視為「旅客」?","opts":["是","不是","視乎逗留時間","視乎簽證"],"a":1,"note":"難民不會被視為旅客。"},{"q":"航空公司機組人員被視為身處於?","opts":["旅遊目的地","慣常生活的環境空間內","過境區","工作假期狀態"],"a":1,"note":"機組人員被視為在其慣常生活環境空間內,非旅客。"},{"q":"公共交通工具的工作人員(無論固定與否)是否旅客?","opts":["是","不是","只有機師是","只有固定員工是"],"a":1,"note":"公共交通工作人員均視為在慣常空間內,非旅客。"},{"q":"外交官不被視為駐紮國旅客,是根據哪項原則?","opts":["國際收支平衡原則","世界貿易原則","自由市場原則","對等豁免原則"],"a":0,"note":"根據國際收支平衡原則,外交官非駐紮國旅客。"},{"q":"根據國際收支平衡原則,外國外交官被視為?","opts":["已進入駐紮國經濟領土","沒有進入駐紮國的經濟領土","國際旅客","過境旅客"],"a":1,"note":"外交官被視為沒有進入駐紮國的經濟領土。"},{"q":"外交官的隨行家屬是否視為駐紮國旅客?","opts":["是","不是","只有配偶是","只有子女是"],"a":1,"note":"外交官、軍事人員及隨行家屬均不視為旅客。"},{"q":"派駐海外的軍隊或武裝部隊是否視為旅客?","opts":["是","不是","放假時是","演習時是"],"a":1,"note":"派駐海外軍隊不視為旅客,以符合國際收支平衡原則。"},{"q":"香港學生到英國升學九個月後回港,屬於?","opts":["旅遊","移居","謀生","不屬旅行"],"a":0,"note":"升學、少於一年、自願、往返,符合旅遊特性。"},{"q":"香港人到外地工作假期並逗留兩年,是否屬「旅遊」?","opts":["是,因為自願","不是,因為超過一年","是,因為會回港","不是,因為沒有簽證"],"a":1,"note":"逗留超過一年,不符合旅遊的時間性。"},{"q":"難民逃往鄰國尋求庇護,不符合旅遊哪個特性?","opts":["有時間性","自願","性質","離開原居地"],"a":1,"note":"難民被迫離開,不符合「自願」特性。"},{"q":"一名旅客乘機經香港轉飛澳洲,他在香港的短暫停留屬於?","opts":["旅遊","旅行(過境)","移居","謀生"],"a":1,"note":"過境是旅行的原因之一,不算在港旅遊。"},{"q":"以下哪類人士會被視為「旅客」?","opts":["跨境工人","機組人員","到泰國度假五天的香港人","駐外外交官"],"a":2,"note":"度假旅客符合旅遊定義;其餘三類均不視為旅客。"},{"q":"以下哪個描述正確?","opts":["所有旅行都是旅遊","所有旅遊都是旅行","旅遊必定跨國","旅行必定少於一年"],"a":1,"note":"旅遊是旅行的一種,反之不然。"},{"q":"教材所舉「旅遊」的原因例子包括?","opts":["度假、升學、公幹","移居、流亡、避難","謀生、打工、經商定居","逃亡、放逐、漂泊"],"a":0,"note":"旅遊原因例子:度假、升學、公幹等。"},{"q":"「旅遊」是指短暫離開哪裏前往別處?","opts":["原居地或工作地","任何城市","旅遊景點","機場"],"a":0,"note":"旅遊指短暫離開原居地或工作地前往別處。"},{"q":"下列何者不會被視為旅客?","opts":["在港工作的深圳跨境工人","來港度假五天的台灣旅客","到日本觀光十天的港人","到英國修讀三個月課程的學生"],"a":0,"note":"跨境工人頻繁跨境工作,不視為旅客。"},{"q":"上海居民到北京旅遊三天,屬於?","opts":["國際旅遊","國內/本土旅遊","出境旅遊","過境旅遊"],"a":1,"note":"同一國家境內屬國內/本土旅遊。"},{"q":"香港旅客參加泰國七天團,泰國的統計上會錄得?","opts":["一名出境旅客","一名入境旅客","一名過境旅客","一名本土旅客"],"a":1,"note":"對目的地而言,到訪者是入境旅客。"},{"q":"教材指旅遊「不會是數小時在原地附近的活動」,這說明哪個特性?","opts":["有時間性","自願","往返","性質"],"a":0,"note":"有時間性:少於一年但非數小時的原地活動。"},{"q":"被迫流亡在外的人士不符合旅遊的哪個特性?","opts":["有時間性","自願","離開原居地","性質"],"a":1,"note":"流亡是被迫的,不符合自願特性。"},{"q":"到外地謀生不符合旅遊的哪個特性?","opts":["性質","自願","離開原居地","有時間性"],"a":0,"note":"旅遊性質包括度假升學公幹,不包括到外地謀生。"},{"q":"一去不返的移居不符合旅遊的哪個特性?","opts":["自願","往返","離開原居地","有時間性"],"a":1,"note":"移居沒有返回原居地,不符往返特性。"},{"q":"英國居民到法國度假,對法國而言是?","opts":["出境旅客","入境旅客","本土旅客","跨境工人"],"a":1,"note":"到訪國錄得入境旅客。"},{"q":"一位巴黎居民遊覽自己居住城市內的巴黎鐵塔,是否旅遊?","opts":["是,因為有觀光","不是,因為沒有離開原居地","是,因為自願" "note":"香港作為中轉站,是中轉圓形往返模式的教材例子。"},{"q":"圓形往返模式的核心特徵是?","opts":["多個目的地,沒有一個核心停留目的地","只有一個目的地","以一地作中轉站往返","以一地作短程遊基地"],"a":0,"note":"圓形往返模式涉及多個目的地,無核心停留點。"},{"q":"圓形往返模式中,旅客往返原居地時會採取?","opts":["不同路線","完全相同的路線","只能乘飛機","只能乘火車"],"a":0,"note":"旅客採取不同路線往返原居地。"},{"q":"圓形往返模式的旅程如何開始及結束?","opts":["由首先到達的目的地開始,從最後到訪的目的地直接返回原居地","必須由最後目的地開始","必須原地折返","必須每站停留相同天數"],"a":0,"note":"旅程由首先到達的目的地開始,從最後到訪地返回原居地。"},{"q":"香港旅客沿海前往上海,再以不同內陸路線返回香港,是哪種模式?","opts":["圓形往返模式","雙向往返模式","中轉圓形往返模式","幅射往返模式"],"a":0,"note":"多個目的地、不同路線往返,是圓形往返模式的例子。"},{"q":"幅射往返模式的核心特徵是?","opts":["利用主要目的地的地理優勢作周邊短程旅遊","單一目的地原路折返","多個目的地無核心停留點","以中轉站作圓形遊覽"],"a":0,"note":"幅射往返模式利用主要目的地地理優勢作周邊短程遊。"},{"q":"幅射往返模式中,主要目的地扮演甚麼角色?","opts":["周邊短線遊的集散中心","單純的中轉機場","旅客的最終目的地","旅遊保險的辦理地點"],"a":0,"note":"主要目的地作為基地及周邊短線遊的集散中心。"},{"q":"幅射往返模式中,旅客到訪周邊目的地的方式是?","opts":["以到訪目的地區域內其他地方作過夜旅遊","只作即日來回不過夜","只能經水路前往","必須每次返回原居地"],"a":0,"note":"以到訪目的地區域內其他地方作過夜旅遊。"},{"q":"教材中,長途旅客先抵達香港、到澳門過夜、返香港過夜、再到深圳主題公園過夜、最後返香港回原居地,是哪種模式?","opts":["幅射往返模式","雙向往返模式","圓形往返模式","中轉圓形往返模式"],"a":0,"note":"以香港為基地作周邊短程遊,是幅射往返模式的例子。"},{"q":"四種行程模式中,哪一種只涉及單一旅遊目的地?","opts":["雙向往返模式","圓形往返模式","中轉圓形往返模式","幅射往返模式"],"a":0,"note":"雙向往返模式是單一目的地,其餘三種涉及多個地點。"},{"q":"四種行程模式中,哪一種明確指出「沒有一個核心停留目的地」?","opts":["圓形往返模式","雙向往返模式","中轉圓形往返模式","幅射往返模式"],"a":0,"note":"圓形往返模式的定義即為沒有核心停留目的地。"},{"q":"四種行程模式中,哪兩種都涉及「以一個目的地作為基地或中轉站」?","opts":["中轉圓形往返模式與幅射往返模式","雙向往返模式與圓形往返模式","圓形往返模式與幅射往返模式","雙向往返模式與中轉圓形往返模式"],"a":0,"note":"中轉圓形及幅射模式均以一個目的地作中轉站或基地。"},{"q":"中轉圓形往返模式與幅射往返模式的分別在於?","opts":["前者在區域內圓形遊覽後返回中轉站,後者以基地作放射式短程遊並過夜","兩者完全相同","前者只去一個地方,後者去多個地方","後者不會返回原居地"],"a":0,"note":"兩者均以一地為核心,但遊覽方式與路線結構不同。"},{"q":"一位旅客乘飛機直接往返東京旅遊七天,不去其他地方,屬於哪種模式?","opts":["雙向往返模式","圓形往返模式","中轉圓形往返模式","幅射往返模式"],"a":0,"note":"單一目的地、同一路線往返,是雙向往返模式。"},{"q":"一位旅客先到北京,再到西安,最後從上海直接飛回香港(三程機票、三條不同路線),屬於哪種模式?","opts":["圓形往返模式","雙向往返模式","中轉圓形往返模式","幅射往返模式"],"a":0,"note":"多個目的地、不同路線往返、無核心停留點,屬圓形往返模式。"},{"q":"一位旅客以曼谷為基地,分別到訪清邁及布吉並過夜,最後從曼谷返回原居地,屬於哪種模式?","opts":["幅射往返模式","雙向往返模式","圓形往返模式","中轉圓形往返模式"],"a":0,"note":"以曼谷作基地進行周邊過 同促成","旅遊行為只受目的地吸引力影響","旅遊行為只受個人心理影響","旅遊行為與心理及目的地皆無關"],"a":0,"note":"理論核心是內在推動因素與外在拉動因素共同作用。"},{"q":"若旅遊局想提升某地的拉動力,可以怎樣做?","opts":["加強宣傳當地特色景觀及文化","只加強航班座位供應","只降低機場稅","只加強海關效率"],"a":0,"note":"宣傳特色資源及形象可提升目的地的拉動因素。"},{"q":"若旅行社想強化顧客的推動因素,可以怎樣做?","opts":["透過廣告喚起顧客內在旅遊渴望(如好奇心、放鬆需要)","只降低套票價錢","只增加航班班次","只優化機場設施"],"a":0,"note":"喚起內在需要及渴望屬強化推動因素的做法。"},{"q":"「旅遊資源」在推拉理論中屬於甚麼因素的內容?","opts":["拉動因素","推動因素","經濟因素","社會因素(泛稱)"],"a":0,"note":"旅遊資源是吸引旅客的目的地特色,屬拉動因素。"},{"q":"「旅遊環境」在推拉理論中屬於甚麼因素的內容?","opts":["拉動因素","推動因素","文化因素","科技因素"],"a":0,"note":"旅遊環境是目的地本身的條件,屬拉動因素。"},{"q":"個人「渴望增廣見聞」屬於哪種因素?","opts":["推動因素","拉動因素","分銷因素","供應因素"],"a":0,"note":"渴望增廣見聞是個人內在需要,屬推動因素。"},{"q":"某地「擁有獨特世界遺產」屬於哪種因素?","opts":["拉動因素","推動因素","社會因素(泛稱)","經濟因素"],"a":0,"note":"獨特世界遺產是目的地資源,屬拉動因素。"},{"q":"以下何者能同時體現推動及拉動因素互相配合的例子?","opts":["旅客因想放鬆(推動)而選擇了以寧靜見稱的峇里島(拉動)","旅客純粹隨機選了一個地方","旅客完全冇任何旅遊念頭","旅客只跟隨他人決定,自己冇任何動機"],"a":0,"note":"內在放鬆需要配合目的地特色形象,是兩者配合的例子。"},{"q":"教材指丹恩理論說明旅遊動機與行為受哪兩個層面影響?","opts":["個人內在層面及目的地外在層面","國家政策層面及企業層面","歷史層面及地理層面","經濟層面及文化層面"],"a":0,"note":"受個人內在推動因素及目的地外在拉動因素影響。"},{"q":"一間旅行社設計廣告,一半內容講述「放假的好處」,另一半展示目的地美景,分別對應甚麼?","opts":["前者強化推動因素,後者強化拉動因素","前者強化拉動因素,後者強化推動因素","兩者都是拉動因素","兩者都是推動因素"],"a":0,"note":"放假好處喚起內在需要(推動),美景展示目的地吸引力(拉動)。"},{"q":"「渴望脫離日常生活」是丹恩理論中的?","opts":["推動因素","拉動因素","經濟因素","供應因素"],"a":0,"note":"這是個人內在需要,屬推動因素。"},{"q":"「目的地治安良好、旅遊配套完善」是丹恩理論中的?","opts":["拉動因素","推動因素","文化因素","科技因素"],"a":0,"note":"這是目的地本身特質,屬拉動因素。"},{"q":"丹恩理論最適合用來分析甚麼?","opts":["旅客為何產生動機及為何選擇特定目的地","旅遊產品的定價策略","航空公司的航線分佈","酒店的星級評分制度"],"a":0,"note":"理論分析旅遊動機成因及目的地選擇過程。"},{"q":"以下何者不屬於拉動因素?","opts":["個人渴望探索未知事物的心理","目的地的獨特美食","目的地的購物優惠","目的地的自然景觀"],"a":0,"note":"個人心理需要屬推動因素,其餘三項均為目的地特質。"},{"q":"以下何者不屬於推動因素?","opts":["目的地的獨特文化景觀","個人想逃避壓力的心理","個人想增廣見聞的渴望","個人想與親友團聚的意欲"],"a":0,"note":"目的地文化景觀屬拉動因素;其餘三項屬個人內在需要。"},{"q":"某旅客本身毫無出遊意欲,即使看到再吸引的宣傳都不為所動,這反映甚麼?","opts":["缺乏推動因素,拉動因素難以單獨促成旅遊行為","缺乏拉動因素","兩種因素都存在","與推拉理論無關"],"a":0,"note":"沒有推動因素(意欲),再強的拉動因素也未必成事。"},{"q":"丹恩推拉理論主要幫助業界回答甚麼問題?","opts":["旅客為何想去旅行、以及為何選擇某個目的地","如何降低營運成本","如何提升員工士氣","如何處理旅客投訴"],"a":0,"note":"理論解釋旅遊動機的產生及目的地選擇的原因。"},{"q":"「透過旅遊雜誌認識到冰島極光的壯麗景象」屬於哪種因素?","opts":["拉動因素","推動因素","經濟因素","社會因素(泛稱)"],"a":0,"note":"透過媒體認識目的地特色,屬拉動因素的來源。"},{"q":"若旅客不斷重複到訪同一目的地,推拉理論可如何解釋這現象?","opts":["該目的地持續有效滿足其推動因素及拉動因素","純粹因為機票便宜","與推拉因素完全無關","旅客沒有其他目的地可選"],"a":0,"note":"重複到訪反映該地持續能配合旅客的內在動機及吸引力。"},{"q":"旅遊局製作宣傳片展示當地節慶及美食,主要目的是強化甚麼?","opts":["拉動因素","推動因素","供應鏈管理","分銷佣金"],"a":0,"note":"透過影片展示目的地特色,是強化拉動因素的做法。"},{"q":"一本心理勵志書鼓勵讀者「勇敢踏出舒適圈去看世界」,主要激發讀者的甚麼?","opts":["推動因素","拉動因素","供應因素","分銷因素"],"a":0,"note":"激發讀者內在探索慾望,屬推動因素的範疇。"},{"q":"若旅客因經濟能力有限而未能實現旅遊動機,這反映了甚麼?","opts":["推動因素存在,但受其他條件限制未能轉化為實際旅遊行為","完全沒有推動因素","完全沒有拉動因素","與推拉理論無關"],"a":0,"note":"有動機(推動)但受限於其他條件,未必能實現具體行程。"},{"q":"以下何者最能演繹「拉動因素引發具體目的地選擇」?","opts":["旅客因看過紀錄片介紹極光而選擇到訪冰島","旅客單純因為想放鬆而外遊","旅客因為好奇心強而外遊","旅客因為想探親而外遊"],"a":0,"note":"因目的地特色(極光)的具體資訊而作出選擇,屬拉動因素。"},{"q":"以下何者最能演繹「推動因素產生籠統動機但未有具體目的地」?","opts":["旅客覺得好想放假,但仲未諗到去邊度","旅客已經買咗機票去日本","旅客已經預訂咗酒店","旅客已經到達左目的地"],"a":0,"note":"有意欲放假(推動)但未有具體目的地決定,正是推動因素的典型情況。"},{"q":"航空公司在社交媒體大量投放目的地美景廣告,主要希望觸動旅客哪方面?","opts":["拉動因素(對目的地產生興趣)","推動因素(內在心理需要)","供應鏈成本","員工士氣"],"a":0,"note":"美景廣告展示目的地吸引力,主要影響拉動因素。"},{"q":"以下何者說明推動與拉動因素「配合失敗」的情況?","opts":["旅客好想去旅行,但完全搵唔到心儀嘅目的地","旅客成功揀到心儀目的地並出發","旅客完全冇任何旅遊念頭","旅客對所有目的地都冇興趣亦冇出遊意欲"],"a":0,"note":"有意欲(推動)卻找不到合適目的地(拉動配合失敗),說明兩者未能配合。"}]},{"n":9,"title":"旅遊產品的特性","tag":"PRODUCT CHARACTERISTICS","qs":[{"q":"教材列出旅遊產品共有多少項特性?","opts":["六項","七項","八項","九項"],"a":2,"note":"教材列出無形性至帶有風險共八項特性。"},{"q":"旅客購買旅遊產品後,只餘下甚麼?","opts":["對旅程的體驗","實物產品","可轉售的憑證","可退款的收據"],"a":0,"note":"無形性:旅客不會取得實物,只餘下體驗。"},{"q":"以下哪項是「無形性」的定義?","opts":["旅客不會取得及擁有實物","產品不能提前生產","不同旅客對服務有不同觀感","旅遊需求受天氣影響"],"a":0,"note":"無形性即旅客不會取得及擁有實物。"},{"q":"大部分實物產品的生產與消費關係是?","opts":["供應商先生產,消費者其後購買使用","生產與消費同時進行","消費先於生產","兩者完全無關"],"a":0,"note":"大部分產品是先生產,後由消費者購買使用。"},{"q":"旅遊產品的生產與消費關係是?","opts":["同時進行","生產遠早於消費","消費遠早於生產","兩者完全分割"],"a":0,"note":"旅遊產品生產與消費不可分割,同時進行。"},{"q":"「旅遊景點提供設施和導賞服務,旅客同時使用」說明哪項特性?","opts":["生產與消費不可分割性","無形性","差異性","不可保存性"],"a":0,"note":"服務提供與使用同步發生,是生產消費不可分割性的例子。"},{"q":"旅遊產品是一種以甚麼為主的服務?","opts":["人","機器","電腦系統","自動化設備"],"a":0,"note":"旅遊產品是以人為主的服務,與機器倒模製造不同。"},{"q":"即使是同一種旅遊產品,為何仍會有差異?","opts":["以人為主的服務性質令體驗有差異","價格必然不同","地點必然不同","季節必然不同"],"a":0,"note":"以人為服務主體,故存在差異性。"},{"q":"不同旅客對同一服務的觀感如何?","opts":["會有自己的觀感,未必相同","必然完全相同","與服務內容無關","只受價格影響"],"a":0,"note":"即使服務相同,不同旅客也會有自己的觀感。"},{"q":"「不同服務員的態度、經驗、質素不一樣」導致甚麼?","opts":["每次服務的體驗與感受有所不同","產品價格必然上升","旅客投訴數字增加","服務必然標準化"],"a":0,"note":"人的因素造成同一產品每次體驗均有差異,即差異性。"},{"q":"以下哪項是「差異性」的例子?","opts":["同一酒店不同時間入住,服務體驗略有不同","酒店房間不能留待旺季出租","機票不能退款","旅客沒有機票擁有權"],"a":0,"note":"服務因人而異,即使同一酒店體驗也可能不同,是差異性。"},{"q":"「不可保存性」是指旅遊產品不能?","opts":["提前或延後生產、暫時收存待日後銷售","被差評","被轉售","被複製"],"a":0,"note":"不可保存性:不能提前/延後生產,不能收存待售。"},{"q":"「酒店不能把淡季空置客房留起待旺季才租出」說明甚麼特性?","opts":["不可保存性","無形性","差異性","帶有風險"],"a":0,"note":"這是教材對不可保存性的具體例子。"},{"q":"航班座位若未售出,是否可以留待下一班機再賣?","opts":["不可以,反映不可保存性","可以","視乎航空公司政策而定,與特性無關","可以留待明年再賣"],"a":0,"note":"座位過期即損失,體現旅遊產品的不可保存性。"},{"q":"「互補性及替代性」提到的六個領域是甚麼?","opts":["食住行遊購娛","衣食住行","吃喝玩樂購物","觀光購物住宿"],"a":0,"note":"教材明確指食、住、行、遊、購、娛六個領域。"},{"q":"根據互補性,若六個領域其中一環出問題,會如何?","opts":["均會影響其他環節","完全不影響其他環節","只影響該環節本身","會令旅遊產品消失"],"a":0,"note":"任何一環出問題,均會影響其他環節,體現互補性。"},{"q":"「一地酒店服務不理想,旅客可找別的酒店代替」說明甚麼特性?","opts":["替代性","無形性","不可保存性","不可轉移性"],"a":0,"note":"這是教材對替代性的具體例子。"},{"q":"「一地服務設施不佳、居民態度惡劣,旅客可轉到其他目的地」說明甚麼?","opts":["旅遊目的地也有替代性","旅遊目的地沒有替代性","不可保存性","無形性"],"a":0,"note":"教材指旅遊目的地都有替代性,居民惡劣可致旅客轉往他處。"},{"q":"「不可擁有及不可轉移」是指旅客沒有旅遊產品的?","opts":["擁有權與支配權","使用權","體驗權","選擇權"],"a":0,"note":"旅客沒有旅遊產品的擁有權與支配權。"},{"q":"買了智能電話後,消費者可以怎樣處理?","opts":["擁有該電話,並可轉交別人使用","只能使用不能擁有","必須每年更換","只能借用"],"a":0,"note":"有形產品可被擁有及轉讓,對比無形旅遊產品。"},{"q":"旅遊中使用航空交通服務,旅客是否擁有該服務?","opts":["不擁有,只可使用而不能擁有","擁有並可轉售","擁有並可轉讓","視乎機票種類而定"],"a":0,"note":"航空交通屬無形產品,只可使用不能擁有。"},{"q":"航空機位是否可以「中途轉讓予他人使用」?","opts":["不可以","可以自由轉讓","可以透過黑市轉讓","視乎轉讓費多少"],"a":0,"note":"教材明確指出不可以中途轉讓予他人使用。"},{"q":"旅遊目的地的旅遊需求與價格常受甚麼因素影響?","opts":["天氣、經濟環境、淡旺季","旅客國籍","導遊人數","酒店星級"],"a":0,"note":"需求與價格受天氣、經濟環境及淡旺季影響。"},{"q":"當旅遊需求暢旺時,價格一般會如何變化?","opts":["調高","調低","保持不變","與需求無關"],"a":0,"note":"教材指出需求暢旺時價格大部分會調高。"},{"q":"「需求與價格不固定」的特性反映旅遊產品的價格具有?","opts":["浮動性,受多項外在因素影響","絕對穩定性","政府統一定價","與市場無關"],"a":0,"note":"需求與價格常受天氣經濟淡旺季等因素影響而浮動。"},{"q":"「帶有風險」是指旅遊產品必定?","opts":["先購買後使用,沒有試用或檢查機會","先試用後付款","可以退貨換貨","有質量保證書"],"a":0,"note":"帶有風險:先購買後使用,沒有試用檢查機會。"},{"q":"為何說旅遊產品「帶有風險」?","opts":["使用時存在很多變數","價格必然過高","必然導致投訴","必然涉及簽證問題"],"a":0,"note":"使用時存在很多變數,構成風險。"},{"q":"旅客訂購酒店房間前,是否可以先入住試睡?","opts":["不可以,體現帶有風險特性","可以","視乎酒店等級","必須先試住才能付款"],"a":0,"note":"先訂購後使用、無法試用,體現帶有風險。"},{"q":"以下哪項不屬於教材所列的旅遊產品特性?","opts":["可退款性","無形性","差異性","不可保存性"],"a":0,"note":"「可退款性」不在教材八項特性之列。"},{"q":"旅遊產品的哪一項特性最能反映「以人為主的服務」與工廠倒模生產的分別?","opts":["標準化生產","生產與消費不可分割性","互補性及替代性","帶有風險"],"a":0,"note":"「標準化生產」不是教材列出的特性,反而差異性強調非標準化。"},{"q":"旅客購買機票後未能親身檢查飛機狀況,體現哪項特性?","opts":["帶有風險","無形性","差異性","不可保存性"],"a":0,"note":"先購買後使用、無法檢查,屬帶有風險。"},{"q":"旅客購買旅遊套票獲得的只是體驗而非實物,體現哪項特性?","opts":["無形性","差異性","不可保存性","替代性"],"a":0,"note":"只獲得體驗而非實物,即無形性。"},{"q":"導遊為兩組不同旅客提供相同行程,但兩組人的體驗略有不同,主要反映甚麼特性?","opts":["差異性","無形性","不可保存性","不可轉移性"],"a":0,"note":"同一產品因人為因素而體驗不同,即差異性。"},{"q":"航空公司無法把賣剩的機位延至下月出售,反映哪項特性?","opts":["不可保存性","差異性","替代性","帶有風險"],"a":0,"note":"座位過期即損失,無法延後銷售,即不可保存性。"},{"q":"旅遊目的地的餐飲、住宿、交通、購物等環節環環相扣,反映哪項特性?","opts":["互補性及替代性","無形性","不可保存性","帶有風險"],"a":0,"note":"六個領域互相影響,即互補性。"},{"q":"旅客因為酒店服務不佳而轉住另一間酒店,反映哪項特性?","opts":["替代性","無形性","差異性","不可轉移性"],"a":0,"note":"旅遊產品有替代品可選,即替代性。"},{"q":"旅客使用完機票後不能把機位轉售給朋友,反映哪項特性?","opts":["不可擁有及不可轉移","無形性","差異性","帶有風險"],"a":0,"note":"不能轉讓予他人使用,即不可擁有及不可轉移。"},{"q":"旺季酒店房價高於淡季,反映哪項特性?","opts":["需求與價格不固定","不可保存性","差異性","帶有風險"],"a":0,"note":"價格受淡旺季影響變動,即需求與價格不固定。"},{"q":"旅客訂購行程時只能相信網上介紹,實際體驗有落差,反映哪項特性?","opts":["帶有風險","無形性","替代性","不可保存性"],"a":0,"note":"先購買後使用,存在落差風險,即帶有風險。"},{"q":"旅遊產品「以人為主」而非「機器倒模製造」,主要解釋哪項特性的原因?","opts":["差異性","無形性","不可保存性","替代性"],"a":0,"note":"以人為服務主體是差異性產生的根本原因。"},{"q":"「先行生產、其後購買使用」是大部分甚麼類型產品的模式?","opts":["一般實物產品(非旅遊產品)","旅遊產品","所有服務業產品","數碼產品"],"a":0,"note":"教材以此對比,說明旅遊產品的生產消費是同時進行的。"},{"q":"旅客的機票、住宿、交通,若其中住宿出現問題,可能影響?","opts":["行程中其他相關環節","與其他環節毫無關係","只影響住宿本身","只影響交通安排"],"a":0,"note":"六領域互補,一環出問題會影響其他環節。"},{"q":"以下何者最能總結「無形性」?","opts":["買咗都摸唔到,淨係得體驗","可以隨時退貨","唔同人感受完全一樣","價錢會隨時間下降"],"a":0,"note":"無形性指旅客只獲得體驗,沒有實物。"},{"q":"以下何者最能總結「不可保存性」?","opts":["賣唔晒就蝕晒,唔可以留返第日賣","質素會因人而異","有得試用先至畀錢","可以轉讓俾第二個人"],"a":0,"note":"不可保存性指產品不能收存待日後銷售。"},{"q":"以下何者最能總結「差異性」?","opts":["同一產品,唔同人、唔同次都可能有唔同體驗","絕對唔可以退款","一定會蝕本","一定要提早一年訂"],"a":0,"note":"差異性指同一產品因人而異,體驗有分別。"},{"q":"以下何者最能總結「帶有風險」?","opts":["俾錢先、用嘅時候先知好唔好","一定包保險","一定可以退貨","一定有得試用"],"a":0,"note":"帶有風險指先付款後使用,沒有試用機會。"},{"q":"以下何者最能總結「不可擁有及不可轉移」?","opts":["淨係用得,唔可以擁有或者轉俾第二個人用","可以擁有但唔可以用","可以轉讓俾任何人","用完仲可以退錢"],"a":0,"note":"這是不可擁有及不可轉移的核心意思。"},{"q":"以下何者最能總結「需求與價格不固定」?","opts":["價錢會因天氣、經濟、淡旺季而變動","價錢永遠一樣","價錢只受政府控制","價錢與需求無關"],"a":0,"note":"需求與價格受多項外在因素影響而浮動。"},{"q":"以下何者最能總結「互補性及替代性」?","opts":["食住行遊購娛環環相扣,亦有替代品可選","各環節完全獨立,互不影響","冇任何替代品可選","只限交通有替代性"],"a":0,"note":"六領域互補,亦存在替代性,是此特性的核心。"},{"q":"以下何者最能總結「生產與消費不可分割性」?","opts":["服務提供同使用係同一時間發生","生產一定早過消費好耐","消費一定早過生產","兩者完全無關"],"a":0,"note":"旅遊產品的生產和消費是同時進行的。"},{"q":"一間旅行社推出「先體驗、後付款」的方案,理論上與哪項特性直接矛盾?","opts":["帶有風險(旅遊產品一般先購買後使用)","無形性","替代性","不可保存性"],"a":0,"note":"教材指旅遊產品必定先購買後使用,此方案與此特性相反。"},{"q":"「機票過期作廢、不能延後使用」最直接反映哪項特性?","opts":["不可保存性","差異性","替代性","無形性"],"a":0,"note":"過期即損失、不能延後使用,即不可保存性。"},{"q":"旅客A與旅客B在同一間餐廳用膳,分別由不同侍應服務,體驗略有不同,反映?","opts":["差異性","不可保存性","替代性","不可轉移性"],"a":0,"note":"不同服務員造成不同體驗,即差異性。"},{"q":"某地缺乏替代的旅遊景點供應商,對旅客有何影響?","opts":["旅客選擇較少,議價能力較弱","完全沒有影響","旅客會自動獲得折扣","供應商必須減價"],"a":0,"note":"替代性不足會削弱旅客的選擇及議價能力。"},{"q":"承接上題,若市場上有多個類似的旅遊產品供應商,體現了甚麼?","opts":["替代性強,旅客選擇較多","替代性弱","無形性強","不可保存性強"],"a":0,"note":"多個供應商可互相替代,即替代性強。"},{"q":"教材指旅客「先購買後使用」是指主要哪類旅遊產品?","opts":["大部分旅遊產品(如機票、住宿、行程)","只限保險產品","只限簽證","只限貨幣兌換"],"a":0,"note":"大部分旅遊產品均要求先購買後使用。"},{"q":"旅客在網上訂購行程時,商戶描述與實際體驗有落差,最主要反映旅遊產品哪項特性帶來的風險?","opts":["帶有風險","不可保存性","替代性","不可轉移性"],"a":0,"note":"先訂購後使用、無法提前驗證,體現帶有風險的特性。"},{"q":"航空公司無法把客滿航班的多出需求延後至下一班機處理,主要反映哪項特性?","opts":["不可保存性","無形性","差異性","替代性"],"a":0,"note":"座位供應無法延後或提前調整以配合需求,屬不可保存性。"},{"q":"同一位導遊帶領兩個不同旅行團,兩團的滿意度可能有分別,最能說明哪項特性?","opts":["差異性","無形性","不可保存性","不可轉移性"],"a":0,"note":"服務因應對象及情境不同而有差異,即差異性。"},{"q":"旅客購買的機票不能轉贈朋友使用,同時航班座位亦不能保留至下月,分別反映了哪兩項特性?","opts":["不可擁有及不可轉移;不可保存性","無形性;差異性","替代性;帶有風險","差異性;不可保存性"],"a":0,"note":"不能轉贈屬不可擁有及不可轉移;不能延後使用屬不可保存性。"}]},{"n":10,"title":"旅遊產品的生命週期","tag":"PRODUCT LIFE CYCLE","qs":[{"q":"旅遊產品的生命週期一共分為多少個階段?","opts":["四個","五個","六個","三個"],"a":1,"note":"分為開發、引入、成長、成熟、衰退五個階段。"},{"q":"旅遊產品生命週期的第一個階段是?","opts":["開發階段","引入階段","成長階段","成熟階段"],"a":0,"note":"第一階段是開發階段。"},{"q":"開發階段,企業主要做甚麼?","opts":["投入資金設計和製造產品","大量宣傳產品","與競爭對手打價格戰","減價促銷"],"a":0,"note":"開發階段企業投入資金設計和製造產品。"},{"q":"開發階段的財務狀況是?","opts":["只有開支,沒有收入,沒有盈利","收支平衡","已有盈利","收入大於開支"],"a":0,"note":"開發階段基本上只有開支,沒有收入及盈利。"},{"q":"開發階段供應商必須做好甚麼工作?","opts":["市場調查和研究","大型宣傳活動","招募新股東","擴建廠房"],"a":0,"note":"供應商須做好市場調查研究,確保產品切合消費者需要。"},{"q":"開發階段做好市場調查的目的是?","opts":["確保產品切合消費者的需要","增加短期利潤","減低員工成本","提高股價"],"a":0,"note":"目的是確保產品切合消費者的需要。"},{"q":"生命週期的第二個階段是?","opts":["引入階段","開發階段","成長階段","衰退階段"],"a":0,"note":"第二階段是引入階段。"},{"q":"引入階段最重要的工作是?","opts":["提高產品質素及服務的知名度","立即大幅減價","裁減員工","停止市場調查"],"a":0,"note":"引入階段最重要是提高產品質素及知名度。"},{"q":"生命週期的第三個階段是?","opts":["成長階段","引入階段","成熟階段","衰退階段"],"a":0,"note":"第三階段是成長階段。"},{"q":"成長階段面對的主要挑戰是?","opts":["越來越多的競爭對手","完全沒有顧客","產品已經過時","供應商倒閉"],"a":0,"note":"成長階段面對越來越多競爭對手。"},{"q":"成長階段的重點策略是?","opts":["確立獨特性,建立獨特形象及品牌","大幅裁員","停止所有宣傳","降低服務質素"],"a":0,"note":"需確立獨特性,建立品牌以在競爭中突出。"},{"q":"為何成長階段要建立獨特形象及品牌?","opts":["使能在競爭環境中保持突出","純粹為了申請專利","為了應付政府規管","為了減低成本"],"a":0,"note":"目的是在日益激烈的競爭中保持突出。"},{"q":"生命週期的第四個階段是?","opts":["成熟階段","成長階段","衰退階段","開發階段"],"a":0,"note":"第四階段是成熟階段。"},{"q":"成熟階段的產品特點是?","opts":["已擁有大群顧客","仍在開發中","尚未有任何顧客","正在虧損"],"a":0,"note":"成熟階段產品已擁有大群顧客。"},{"q":"成熟階段的營運重點是?","opts":["維持顧客對產品的忠誠度","大幅減價搶佔市場","開發全新產品","結束業務"],"a":0,"note":"重點在維持顧客忠誠度。"},{"q":"成熟階段鼓勵顧客做甚麼?","opts":["再次光臨或帶引新客人光臨","轉用競爭對手產品","停止消費","申請退款"],"a":0,"note":"鼓勵顧客再次光臨或帶引新客人。"},{"q":"香港哪間航空公司被舉為成熟階段產品的例子?","opts":["國泰航空","香港快運","國泰港龍","香港航空"],"a":0,"note":"教材以國泰航空為成熟階段產品的例子。"},{"q":"生命週期的第五個階段是?","opts":["衰退階段","成熟階段","成長階段","重生階段"],"a":0,"note":"第五階段是衰退階段。"},{"q":"衰退階段的旅遊機構面對甚麼威脅?","opts":["「死亡」威脅","股價上升","顧客大增","競爭對手消失"],"a":0,"note":"衰退階段機構面對「死亡」威脅。"},{"q":"衰退階段機構必須做甚麼?","opts":["變更其營銷策略","維持現狀不變","增加開發資金投入新產品線","解散全部員工"],"a":0,"note":"必須變更營銷策略應對衰退。"},{"q":"衰退階段可行的策略不包括以下哪項?","opts":["維持原有定價不變","開拓新的市場","部署大革新","減價促銷"],"a":0,"note":"教材建議開拓新市場、大革新、新特色及減價促銷,非維持原價。"},{"q":"衰退階段策略之一是「發展旅遊產品新特色」,目的是?","opts":["重新吸引顧客","純粹增加成本","減少產品種類","結束產品線"],"a":0,"note":"新特色有助重新吸引顧客,延續產品生命。"},{"q":"香港哪個景點被舉為衰退階段、尋求政府注資擴建的例子?","opts":["香港海洋公園","香港迪士尼樂園","太平山頂","星光大道"],"a":0,"note":"教材以香港海洋公園為衰退階段的例子。"},{"q":"香港海洋公園在衰退階段採取甚麼行動?","opts":["尋求政府注資擴建","立即結業","轉手私人企業","停止一切宣傳"],"a":0,"note":"教材指海洋公園現正尋求政府注資擴建。"},{"q":"以下哪個階段的財務特徵是「只有開支沒有收入」?","opts":["開發階段","引入階段","成長階段","成熟階段"],"a":0,"note":"開發階段只有開支,沒有收入及盈利。"},{"q":"以下哪個階段「顧客量已達到大群規模」?","opts":["成熟階段","開發階段","引入階段","衰退階段(初期已流失)"],"a":0,"note":"成熟階段已擁有大群顧客。"},{"q":"以下哪個階段最強調「提高知名度」?","opts":["引入階段","成熟階段","衰退階段","開發階段"],"a":0,"note":"引入階段最重要是提高產品質素及知名度。"},{"q":"以下哪個階段最強調「建立品牌獨特性」?","opts":["成長階段","開發階段","引入階段","衰退階段"],"a":0,"note":"成長階段須確立獨特性、建立品牌以突出於競爭者。"},{"q":"以下哪個階段最強調「維持顧客忠誠度」?","opts":["成熟階段","開發階段","引入階段","成長階段"],"a":0,"note":"成熟階段重點在維持顧客忠誠度。"},{"q":"以下哪個階段最強調「變更營銷策略應對危機」?","opts":["衰退階段","成長階段","引入階段","開發階段"],"a":0,"note":"衰退階段須變更策略應對「死亡」威脅。"},{"q":"一個新推出的主題公園仍在設計及建造中,尚未開幕,屬於哪個階段?","opts":["開發階段","引入階段","成長階段","成熟階段"],"a":0,"note":"設計建造、未有收入,屬開發階段。"},{"q":"一個剛開幕的景點正努力打響知名度,屬於哪個階段?","opts":["引入階段","開發階段","成長階段","衰退階段"],"a":0,"note":"提高知名度是引入階段的重點工作。"},{"q":"一個旅遊產品面對多間同類產品競爭,正努力建立品牌形象,屬於哪個階段?","opts":["成長階段","開發階段","引入階段","衰退階段"],"a":0,"note":"面對競爭對手並建立品牌,是成長階段特徵。"},{"q":"一個已有大批忠實顧客的老牌航空公司,屬於哪個階段?","opts":["成熟階段","開發階段","引入階段","衰退階段"],"a":0,"note":"擁有大群忠實顧客,是成熟階段的特徵。"},{"q":"一個景點顧客持續流失、正尋求政府資助擴建以求翻身,屬於哪個階段?","opts":["衰退階段","開發階段","成長階段","成熟階段"],"a":0,"note":"面對死亡威脅、尋求資助擴建,是衰退階段的特徵。"},{"q":"「開拓新的市場」是哪個階段的可行策略?","opts":["衰退階段","開發階段","引入階段","成熟階段"] },{"q":"以下何者最能總結「成熟階段」?","opts":["已經有大班熟客,要諗辦法留住佢哋","仲喺度研發緊","啱啱推出市場","面臨執笠危機"],"a":0,"note":"成熟階段重點在維持顧客忠誠度。"},{"q":"以下何者最能總結「衰退階段」?","opts":["面臨死亡威脅,要變陣先有得留低","啱啱起步,冇乜對手","顧客不斷增加","完全唔使變任何策略"],"a":0,"note":"衰退階段面臨死亡威脅,須變更策略。"},{"q":"若某旅遊產品業者選擇「開拓新市場」以求突破,反映該產品最可能處於?","opts":["衰退階段","開發階段","引入階段","成長階段"],"a":0,"note":"開拓新市場是應對衰退的策略之一。"},{"q":"若海洋公園透過「發展新特色設施」重新吸引旅客,是採用哪種階段策略?","opts":["衰退階段的「發展旅遊產品新特色」策略","開發階段的市場調查","引入階段的知名度提升","成長階段的品牌建立"],"a":0,"note":"發展新特色正是教材列出的衰退階段策略之一。"},{"q":"若一個景點已建成但尚未開放,團隊正全力籌備開幕宣傳,屬於哪個階段?","opts":["引入階段","開發階段","成長階段","成熟階段"],"a":0,"note":"已建成待推出市場並打響知名度,屬引入階段的特徵。"},{"q":"一間主題公園在成長階段最應避免的做法是?","opts":["忽略建立品牌獨特性,只顧模仿競爭對手","積極建立品牌形象","確立產品獨特性","持續監察市場競爭"],"a":0,"note":"成長階段的重點正是確立獨特性及品牌,而非單純模仿對手。"},{"q":"若某旅遊產品在衰退階段仍拒絕變更任何策略,最可能面對甚麼後果?","opts":["加速步向「死亡」,失去市場競爭力","自動恢復至成長階段","顧客會自動增加","財政狀況會自動改善"],"a":0,"note":"教材指出衰退階段必須變更策略,否則將面臨「死亡」威脅。"}]},{"n":11,"title":"巴特勒旅遊目的地的生命週期","tag":"BUTLER'S TALC","qs":[{"q":"旅遊目的地生命週期理論(TALC)由哪位學者提出?","opts":["巴特勒(Butler)","丹恩(Dann)","多克西(Doxey)","赫曼(Hudman)"],"a":0,"note":"TALC理論由旅遊學者巴特勒提出。"},{"q":"TALC是哪個英文詞組的縮寫?","opts":["Tourist Area Life Cycle","Travel Agency Licence Code","Tourism Attraction Level Control","Total Area Land Capacity"],"a":0,"note":"TALC即Tourist Area Life Cycle。"},{"q":"TALC理論的規律與甚麼理論類似?","opts":["旅遊產品的生命週期","馬斯勞需求層次論","推拉理論","多克西情緒指標"],"a":0,"note":"教材指TALC類似旅遊產品生命週期發展規律。"},{"q":"TALC理論將旅遊目的地生命週期分為多少個階段?","opts":["六個","五個","四個","七個"],"a":0,"note":"共分為發掘、投入、發展、鞏固、停滯、重生或衰落六個階段。"},{"q":"TALC第一階段的名稱是?","opts":["發掘","投入","發展","鞏固"],"a":0,"note":"第一階段是發掘階段。"},{"q":"發掘階段的旅遊目的地有甚麼特點?","opts":["旅客自行發現的目的地","已經過大量宣傳的目的地","已飽和的目的地","政府大力推廣的目的地"],"a":0,"note":"發掘階段是旅客自行發現的目的地。"},{"q":"發掘階段主要吸引哪類旅客?","opts":["漫遊型旅客","旅行團群體旅客","個別的群體旅客","保守型旅客"],"a":0,"note":"發掘階段吸引少量漫遊型旅客到訪。"},{"q":"發掘階段的旅遊或住宿設施狀況是?","opts":["少量","非常完善","已飽和","由國際企業主導"],"a":0,"note":"發掘階段只有少量的旅遊或住宿設施。"},{"q":"發掘階段對當地社會的滋擾程度是?","opts":["旅客沒有對當地社會造成滋擾","造成嚴重滋擾","引發社會衝突","導致罪案率上升"],"a":0,"note":"發掘階段旅客沒有對當地社會做成滋擾。"},{"q":"發掘階段的旅遊物資主要來自?","opts":["當地製造","大量進口","跨國企業供應","政府統一採購"],"a":0,"note":"發掘階段旅遊物資都在當地製造。"},{"q":"發掘階段東道社群的狀況是?","opts":["大致未受影響","已經大受影響","全面商業化","出現嚴重對立"],"a":0,"note":"發掘階段東道社群大致未受影響。"},{"q":"TALC第二階段的名稱是?","opts":["投入","發掘","發展","鞏固"],"a":0,"note":"第二階段是投入階段。"},{"q":"投入階段主要吸引哪類旅客?","opts":["探險式旅客","漫遊型旅客","旅行團群體旅客","保守型旅客"],"a":0,"note":"投入階段旅客增加,主要是探險式旅客。"},{"q":"投入階段,本地人的反應是?","opts":["提供更多旅遊設施","完全抗拒旅遊發展","要求政府關閉景點","大量移居他處"],"a":0,"note":"投入階段本地人提供更多旅遊設施。"},{"q":"投入階段開始出現甚麼現象?","opts":["明顯的旅遊季節","旅客完全消失","設施全面老化","經濟完全崩潰"],"a":0,"note":"投入階段出現明顯的旅遊季節。"},{"q":"投入階段的影響狀況是?","opts":["正面和負面影響浮現","只有正面影響","只有負面影響","完全沒有影響"],"a":0,"note":"投入階段正面和負面影響開始浮現。"},{"q":"TALC第三階段的名稱是?","opts":["發展","投入","鞏固","停滯"],"a":0,"note":"第三階段是發展階段。"},{"q":"發展階段開始進行甚麼工作?","opts":["對外宣傳","撤資","關閉景點","減少旅客配額"],"a":0,"note":"發展階段開始作對外宣傳。"},{"q":"發展階段旅遊目的地的狀態是?","opts":["旅遊目的地形成","仍未有任何遊客","已進入衰落期","完全被廢棄"],"a":0,"note":"發展階段旅遊目的地已經形成。"},{"q":"發展階段旅客人數變化是?","opts":["急速上升","急速下跌","保持不變","完全停滯"],"a":0,"note":"發展階段旅客人數急速上升。"},{"q":"發展階段當地經濟實力如何應付發展需求?","opts":["當地經濟實力不足以支持發展","經濟實力綽綽有餘","完全不需要外來資金","經濟已達飽和"],"a":0,"note":"發展階段當地經濟實力不足支持發展,需引入外資。"},{"q":"發展階段誰開始到東道國發展業務?","opts":["外來投資者","只有本地小商戶","政府部門","國際組織"],"a":0,"note":"發展階段外來投資者到東道國發展業務。"},{"q":"發展階段引入外來投資會帶來甚麼相應措施?","opts":["相應的公共政策","完全取消政府監管","立即禁止外資","關閉邊境"],"a":0,"note":"引入外來投資發展旅遊設施,及相應的公共政策。"},{"q":"發展階段同時會帶來甚麼問題?","opts":["各種破壞環境的問題","旅客完全消失","經濟全面崩潰","罪案率下降"],"a":0,"note":"發展同時帶來各種破壞環境的問題。"},{"q":"發展階段,朋友式的交往變成甚麼?","opts":["款待禮儀,變得更形式化","更真摯的友誼","完全消失的交流","國際外交關係"],"a":0,"note":"旅客大增,交往變成款待禮儀,更形式化。"},{"q":"發展階段個別當地人對旅客的態度是?","opts":["產生敵視","完全歡迎","毫不在意","主動融合"],"a":0,"note":"發展階段個別當地人對旅客產生敵視。"},{"q":"發展階段本地企業對旅遊業的主導能力如何?","opts":["難以主導旅遊業","完全主導旅遊業","逐步壟斷市場","與外資平分秋色"],"a":0,"note":"當地企業難以主導旅遊業,依賴外來投資。"},{"q":"TALC第四階段的名稱是?","opts":["鞏固","發展","停滯","重生"],"a":0,"note":"第四階段是鞏固階段。"},{"q":"鞏固階段旅客增長速度是?","opts":["旅客增加,但速度放緩","急速上升","急速下跌","完全停止"],"a":0,"note":"鞏固階段旅客增加但速度放緩。"},{"q":"鞏固階段旅遊服務和設施狀況是?","opts":["大增","大減","完全停滯","被政府收回"],"a":0,"note":"鞏固階段旅遊服務和設施大增。"},{"q":"鞏固階段主要由誰提供旅遊服務和設施?","opts":["跨國或本國大企業","純本地小商戶","政府直接經營","國際組織"],"a":0,"note":"鞏固階段由跨國或本國大企業提供服務設施。"},{"q":"鞏固階段本地小企業的處境是?","opts":["角色收益流失,本地人不滿","收益大幅增加","主導整個市場","與大企業平等競爭"],"a":0,"note":"本地企業角色收益流失,引致本地人不滿。"},{"q":"鞏固階段出現甚麼衝突?","opts":["社會和文化衝突","純經濟衝突","國際政治衝突","宗教戰爭"],"a":0,"note":"鞏固階段出現社會和文化衝突。"},{"q":"鞏固階段旅客與當地人對立的情況是?","opts":["但不多見","非常普遍","已成常態","完全消失"],"a":0,"note":"鞏固階段旅客與當地人對立但不多見。"},{"q":"TALC第五階段的名稱是?","opts":["停滯","鞏固","發展","重生"],"a":0,"note":"第五階段是停滯階段。"},{"q":"停滯階段旅客人數狀況是?","opts":["達最高點,增長大為放緩","持續急升","急速下跌","尚未開始增長"],"a":0,"note":"停滯階段旅客人數達最高點,增長大為放緩。"},{"q":"停滯階段目的地非常倚賴甚麼?","opts":["回頭客","新興市場","政府補貼","國際援助"],"a":0,"note":"停滯階段目的地非常倚賴回頭客。"},{"q":"停滯階段設施狀況是?","opts":["老化陳舊","全面翻新","持續擴建","被拆卸重建"],"a":0,"note":"停滯階段設施因老化陳舊。"},{"q":"停滯階段需要甚麼以維持旅客數量?","opts":["持續推廣","完全停止宣傳","大幅加價","減少航班"],"a":0,"note":"需持續推廣以維持旅客數量。"},{"q":"停滯階段旅客滿意度變化是?","opts":["下降","持續上升","保持不變","無從得知"],"a":0,"note":"停滯階段旅客滿意度下降。"},{"q":"停滯階段本地人與旅客的關係是?","opts":["本地人不滿,兩者對立情況常見","關係空前融洽","完全沒有互動","本地人非常歡迎旅客"],"a":0,"note":"本地人不滿,旅客與居民對立情況常見。"},{"q":"停滯階段被形容為到達甚麼點?","opts":["臨界點","起步點","高峰後的空白期","重生點"],"a":0,"note":"停滯階段到達臨界點。"},{"q":"TALC第六階段的名稱是?","opts":["停滯之後的重生或衰落","停滯","鞏固之後的爆發","發掘之後的擴張"],"a":0,"note":"第六階段是停滯之後的重生或衰落。"},{"q":"第六階段,到訪旅客數量如何變化?","opts":["減少","持續增加","保持不變","突然暴增"],"a":0,"note":"第六階段到訪旅客減少。"},{"q":"第六階段市場狀況是?","opts":["市場開始減退","市場全面擴張","市場完全飽和但穩定","與停滯階段完全相同"],"a":0,"note":"第六階段市場開始減退。"},{"q":"第六階段目的地面臨甚麼抉擇?","opts":["重生或衰落","擴張或停滯","發掘或投入","鞏固或發展"],"a":0,"note":"第六階段是重生與衰落的十字路口。"},{"q":"目的地選擇「重生」的做法包括?","opts":["新投資和更換設備","完全停止一切投資","放棄旅遊業務","禁止外來旅客"],"a":0,"note":"重生策略包括新投資和更換設備。"},{"q":"重生策略還包括解決甚麼問題?","opts":["承載力問題","貨幣問題","簽證問題","語言問題"],"a":0,"note":"重生策略包括解決承載力問題。"},{"q":"重生策略的效果是?","opts":["引來新的投資者","趕走所有投資者","令旅客完全消失","令設施進一步老化"],"a":0,"note":"重生策略可引來新的投資者。"},{"q":"目的地若選擇「衰落」,會出現甚麼情況?","opts":["失去競爭力,變革失敗","競爭力大幅提升","旅客人數再創新高","收益持續上升"],"a":0,"note":"衰落是指失去競爭力,變革失敗。"},{"q":"衰落情況下,旅客人數與收益如何變化?","opts":["整體均下跌","整體均上升","旅客下跌但收益上升","收益下跌但旅客上升"],"a":0,"note":"衰落時整體旅客人數與收益均下跌。"},{"q":"衰落情況下業界會採取甚麼常見(但未必有效)的做法?","opts":["減價維持競爭力","大幅加價","停止一切促銷","禁止旅客進入"],"a":0,"note":"衰落時常見做法是減價維持競爭力。"},{"q":"衰落時減價維持競爭力,會導致甚麼後果?","opts":["利潤和投資進一步下降","利潤大幅回升","吸引大量新投資","令旅客滿意度大升"],"a":0,"note":"減價維持競爭力反而令利潤和投資進一步下降。"},{"q":"衰落情況下,旅遊業職位會如何?","opts":["流失","大量增加","完全不受影響","轉為終身聘用"],"a":0,"note":"衰落時旅遊業職位流失。"},{"q":"衰落情況下,東道國的形象會如何?","opts":["受損","大幅提升","完全不受影響","獲得國際獎項"],"a":0,"note":"衰落時東道國形象受損。"},{"q":"一個地方剛被少量背包客發現,設施簡陋,未受商業化影響,屬於TALC哪個階段?","opts":["發掘階段","投入階段","發展階段","鞏固階段"],"a":0,"note":"少量旅客自行發現、設施簡陋,是發掘階段特徵。"},{"q":"一個地方本地人開始興建更多旅館迎合探險旅客,並出現明顯旺季,屬於哪個階段?","opts":["投入階段","發掘階段","發展階段","停滯階段"],"a":0,"note":"本地人增設施、明顯旅遊季節,是投入階段特徵。"},{"q":"一個地方大打國際廣告,外資湧入興建大量酒店,環境開始受破壞,屬於哪個階段?","opts":["發展階段","發掘階段","投入階段","鞏固階段"],"a":0,"note":"對外宣傳、外資湧入、環境破壞,是發展階段特徵。"},{"q":"一個地方由跨國大企業主導旅遊設施,本地小商戶不滿收益流失,屬於哪個階段?","opts":["鞏固階段","發展階段","停滯階段","發掘階段"],"a":0,"note":"跨國大企業主導、本地企業收益流失,是鞏固階段特徵。"},{"q":"一個地方遊客量見頂、設施老化、居民與旅客常有磨擦,屬於哪個階段?","opts":["停滯階段","鞏固階段","發展階段","重生階段"],"a":0,"note":"遊客見頂、設施老化、常見對立,是停滯階段特徵。"},{"q":"一個地方遊客量開始下跌,業界正考慮應否大舉投資翻新設施,屬於哪個階段?","opts":["停滯之後(重生或衰落的抉擇點)","發掘階段","投入階段","發展階段"],"a":0,"note":"遊客下跌、面臨重生或衰落抉擇,是第六階段特徵。"},{"q":"某老牌旅遊景點透過大型翻新及引入新投資者成功止跌回升,屬於哪個選擇?","opts":["重生","衰落","發掘","投入"],"a":0,"note":"新投資、更換設備、引入新投資者,是重生策略。"},{"q":"某景點因財政困難只能不斷減價而利潤持續萎縮、職位流失,屬於哪個選擇?","opts":["衰落","重生","發展","鞏固"],"a":0,"note":"減價、利潤下降、職位流失,是衰落的特徵。"}]},{"n":12,"title":"承載力","tag":"CARRYING CAPACITY","qs":[{"q":"承載力的定義是甚麼?","opts":["在環境不受破壞、旅客滿意度不跌至不可忍受下,目的地可容納的最高旅客數目","旅遊目的地的總面積","政府對旅遊業的預算","旅行社的最大承保金額"],"a":0,"note":"教材明確定義承載力涉及環境、滿意度與最高旅客數目。"},{"q":"承載力定義中提到不可受破壞的環境包括?","opts":["空間、經濟、社會文化環境","只限自然環境","只限經濟環境","只限政治環境"],"a":0,"note":"定義中列出空間、經濟、社會文化三種環境。"},{"q":"承載力定義中,除了環境不受破壞外,還要顧及甚麼?","opts":["旅客滿意度和旅遊質素不跌至不可忍受","政府稅收不減少","航空公司利潤不下降","匯率保持穩定"],"a":0,"note":"定義同時要求旅客滿意度和旅遊質素維持在可接受水平。"},{"q":"教材列出承載力共分為多少類?","opts":["五類","四類","三類","六類"],"a":0,"note":"教材列出空間、環境、心理、經濟、社會文化五類承載力。"},{"q":"空間承載力是指甚麼?","opts":["一個空間最多能容納的旅客人數","旅客的消費金額上限","旅遊業的總產值","旅客的心理滿足程度"],"a":0,"note":"空間承載力指一個空間最多能容納的旅客人數。"},{"q":"空間承載力可以怎樣計算?","opts":["客觀計算,如飛機、戲院和停車場","只能主觀估計","無法計算","只適用於郵輪"],"a":0,"note":"空間承載力可作客觀計算,例如飛機戲院停車場。"},{"q":"港鐵的承載力是屬於哪種計算方式?","opts":["估算","客觀精確計算","主觀判斷","隨機估計"],"a":0,"note":"教材指港鐵的承載力屬於估算。"},{"q":"以下哪項是空間承載力客觀計算的例子?","opts":["飛機、戲院和停車場","居民的容忍程度","旅遊帶來的通脹","旅客的心理感受"],"a":0,"note":"教材舉例飛機、戲院和停車場屬客觀計算。"},{"q":"環境承載力是指甚麼?","opts":["環境能承受旅客帶來的破壞而不致無法自行調節復原的程度","旅客能承受的天氣變化","政府的環保法規數量","旅遊業的碳排放總量"],"a":0,"note":"環境承載力指環境能否自行調節及復原的程度。"},{"q":"「大量單車和汽車經過草原,令草原變成荒地」是哪種承載力被超越的例子?","opts":["環境承載力","經濟承載力","心理承載力","社會文化承載力"],"a":0,"note":"這是環境承載力被超越、無法自行復原的例子。"},{"q":"環境承載力被超越的嚴重後果是?","opts":["環境本身無法自行調節及復原","經濟收入下降","旅客滿意度提高","居民態度變好"],"a":0,"note":"嚴重時環境本身無法自行調節及復原。"},{"q":"心理承載力的核心概念是?","opts":["人數過多令旅客失去旅遊樂趣","景點的最大佔地面積","旅遊業的通脹壓力","居民對旅客的敵視程度"],"a":0,"note":"心理承載力指人數過多令旅客失去旅遊樂趣。"},{"q":"心理承載力的判斷方式是?","opts":["主觀判斷,人們的容忍程度不一","客觀精確計算","只能由政府決定","只受天氣影響"],"a":0,"note":"心理承載力是主觀判斷,容忍程度因人而異。"},{"q":"為何心理承載力難以有統一標準?","opts":["人們的容忍程度不一","因為受法律規管","因為與經濟無關","因為政府沒有相關數據"],"a":0,"note":"因為屬主觀判斷,個人容忍程度存在差異。"},{"q":"經濟承載力是指甚麼?","opts":["在不影響本地社群經濟活動下,旅遊活動能提供的最大經濟功能","旅遊業的總稅收","政府旅遊部門的預算上限","旅客的消費信用額度"],"a":0,"note":"經濟承載力指不影響本地經濟活動下的最大經濟功能。"},{"q":"「旅遊紀念品店鋪增加,令日常購物消費店舖減少」是哪種承載力的例子?","opts":["經濟承載力","環境承載力","心理承載力","社會文化承載力"],"a":0,"note":"這是經濟承載力的例子,反映旅遊業排擠日常經濟活動。"},{"q":"經濟承載力還可以代表甚麼臨界點?","opts":["旅遊帶來的經濟增長被通貨膨脹抵消的臨界點","旅客總消費歸零的臨界點","匯率波動的臨界點","罪案率上升的臨界點"],"a":0,"note":"經濟承載力也代表經濟增長被通脹抵消的臨界點。"},{"q":"社會文化承載力主要關注甚麼?","opts":["社群對旅遊發展的負面情緒","景點的最大佔地面積","航班座位的供求","貨幣兌換的匯率"],"a":0,"note":"社會文化承載力關注社群對旅遊發展的負面情緒。"},{"q":"社會文化承載力與哪個理論有關?","opts":["多克西(Doxey)旅客情緒指標理論","丹恩推拉理論","馬斯勞需求層次論","巴特勒TALC理論"],"a":0,"note":"教材指出與多克西旅客情緒指標理論相關。"},{"q":"社會文化承載力被超越,對應多克西理論的哪個階段?","opts":["充滿敵意階段","興奮愉快階段","理所當然階段","得不償失階段"],"a":0,"note":"教材指社會文化承載力被超越對應「充滿敵意階段」。"},{"q":"社會文化承載力的其他觀察指標包括?","opts":["旅客旅遊樂趣和罪案率","匯率及利率","股價及樓價","溫度及濕度"],"a":0,"note":"教材列出旅客旅遊樂趣和罪案率為其他指標。"},{"q":"以下哪項不屬於教材所列的五種承載力?","opts":["政治承載力","空間承載力","環境承載力","心理承載力"],"a":0,"note":"教材列出空間、環境、心理、經濟、社會文化五種,無政治承載力。"},{"q":"飛機座位數目屬於哪種承載力的客觀計算例子?","opts":["空間承載力","環境承載力","心理承載力","經濟承載力"],"a":0,"note":"飛機座位是空間承載力客觀計算的例子。"},{"q":"某沙灘因遊客過多導致垃圾堆積、生態遭嚴重破壞難以恢復,屬於哪種承載力問題?","opts":["環境承載力","空間承載力","心理承載力","經濟承載力"],"a":0,"note":"生態破壞至無法自行恢復,屬環境承載力問題。"},{"q":"某景點旅客反映「人太多,完全冇心情欣賞風景」,反映哪種承載力被超越?","opts":["心理承載力","空間承載力","環境承載力","經濟承載力"],"a":0,"note":"失去旅遊樂趣屬心理承載力被超越的表現。"},{"q":"某古鎮因遊客增多,傳統雜貨店紛紛結業,轉為紀念品店,反映哪種承載力問題?","opts":["經濟承載力","環境承載力","心理承載力","空間承載力"],"a":0,"note":"日常經濟活動被旅遊業排擠,屬經濟承載力問題。"},{"q":"某社區因旅客過多,居民開始表現出敵意及罪案率上升,反映哪種承載力被超越?","opts":["社會文化承載力","空間承載力","環境承載力","經濟承載力"],"a":0,"note":"居民負面情緒及罪案率上升,屬社會文化承載力問題。"},{"q":"停車場的最高泊車容量是哪種承載力的例子?","opts":["空間承載力","環境承載力","心理承載力","社會文化承載力"],"a":0,"note":"停車場容量是空間承載力客觀計算的例子。"},{"q":"戲院的座位數目是哪種承載力的例子?","opts":["空間承載力","經濟承載力","心理承載力","環境承載力"],"a":0,"note":"戲院座位屬空間承載力的客觀計算例子。"},{"q":"「旅遊業帶來的經濟增長被通脹完全抵消」反映哪種承載力已達臨界點?","opts":["經濟承載力","環境承載力","心理承載力","空間承載力"],"a":0,"note":"此描述正是經濟承載力臨界點的定義。"},{"q":"「本地居民對旅客態度轉趨敵視」最貼近哪種承載力的問題?","opts":["社會文化承載力","空間承載力","經濟承載力","環境承載力"],"a":0,"note":"居民負面情緒屬社會文化承載力範疇。"},{"q":"以下何者是「主觀判斷」而非「客觀計算」的承載力?","opts":["心理承載力(主觀判斷)","空間承載力(客觀計算)","環境承載力(客觀計算為主)","經濟承載力(客觀計算為主)"],"a":0,"note":"心理承載力主觀判斷,人們容忍程度不一;空間承載力可客觀計算。"},{"q":"港鐵的最高載客量屬於哪種承載力,而且是用甚麼方式得出?","opts":["空間承載力,以估算方式得出","環境承載力,客觀計算得出","心理承載力,主觀判斷得出","經濟承載力,估算得出"],"a":0,"note":"教材明確指港鐵屬空間承載力,以估算方式計算。"},{"q":"承載力理論主要用來幫助業界做甚麼?","opts":["評估及管理旅遊目的地可持續接待的旅客上限","計算旅客的平均消費","制定簽證政策","設計航空公司航線"],"a":0,"note":"承載力理論協助評估目的地可持續接待的旅客上限。"},{"q":"若某旅遊目的地的環境、經濟、社會文化都未受破壞,且旅客滿意度良好,反映甚麼?","opts":["旅客人數仍在承載力範圍內","已經超出承載力","即將進入衰落階段","已進入TALC發掘階段"],"a":0,"note":"符合定義中所有條件,即仍在承載力範圍內。"},{"q":"以下哪項最能體現「環境承載力」與「空間承載力」的分別?","opts":["前者關注環境能否自我復原,後者關注空間可容納的實際人數","兩者完全相同","前者是主觀判斷,後者是絕對主觀","後者不可計算"],"a":0,"note":"環境承載力關注生態承受及復原能力;空間承載力關注實際容納人數。"},{"q":"以下哪項最能體現「心理承載力」與「社會文化承載力」的分別?","opts":["前者關注旅客本身的感受,後者關注當地居民的情緒","兩者完全相同","前者關注居民感受","後者關注旅客感受"],"a":0,"note":"心理承載力關注旅客感受;社會文化承載力關注居民情緒。"},{"q":"某沙灘每逢假日爆滿,旅客投訴體驗太擠迫、影響心 宿","簽證手續繁複","岸上遊覽時間長"],"a":0,"note":"娛樂飲食設施完備及不用轉酒店是郵輪的吸引力。"},{"q":"郵輪假期為何能吸引旅客體會「旅遊新體驗」?","opts":["郵輪本身作為旅遊目的地屬新穎的旅遊方式","因為船票特別便宜","因為必須自行煮食","因為沒有任何設施"],"a":0,"note":"郵輪是新興旅遊方式,能帶來新的嘗試與體驗。"},{"q":"旅客不選擇郵輪假期的原因包括?","opts":["隱藏費用高,容易超支","行程一定最平","不用擔心暈船","住宿選擇非常單一"],"a":0,"note":"隱藏費用高容易超支是常見的缺點。"},{"q":"「岸上遊覽時間短促,走馬看花」是甚麼問題?","opts":["難以深度認識當地風貌","令旅客暈船","令行李遺失","令證件過期"],"a":0,"note":"教材指岸上時間短促難以深度遊,難真正認識當地風貌。"},{"q":"郵輪旅客可能面對甚麼身體不適問題?","opts":["暈船浪","高山症","時差","水土不服(僅限岸上)"],"a":0,"note":"遇上惡劣天氣如颶風時會顛簸,令旅客飽受暈船之苦。"},{"q":"選擇客艙時旅客需要平衡甚麼?","opts":["價錢與個人需要","护照有效期","登船卡顏色","船員國籍"],"a":0,"note":"教材指旅客訂房時需要平衡價錢與個人需要。"},{"q":"郵輪公司選擇母港的考慮因素包括?","opts":["客源眾多、服務功能完備、相關產業集聚度高","只考慮碼頭大小","只考慮天氣","只考慮語言"],"a":0,"note":"教材列出母港選址的三項主要考慮。"},{"q":"為何母港比停靠港對當地旅遊業更有利?","opts":["母港帶來持續客源、穩定碼頭收入及較高人均消費","母港完全沒有經濟效益","停靠港消費更多","停靠港旅客會入住當地酒店"],"a":0,"note":"母港涉及維修物資供應等開支,帶來更高的經濟效益。"},{"q":"作為停靠港,旅客的消費特點是?","opts":["只上岸觀光,不會入住酒店,餐飲購物較少","與母港消費完全相同","消費遠高於母港","必定入住當地五星級酒店"],"a":0,"note":"停靠港旅客只上岸觀光,消費相對母港少。"},{"q":"為何有旅遊目的地不歡迎郵輪到訪?","opts":["作為停靠港帶來的經濟效益相對有限","郵輪旅客消費特別多","郵輪帶來大量稅收","郵輪旅客會長期居留"],"a":0,"note":"停靠港經濟效益有限,是部分目的地不歡迎郵輪的原因。"},{"q":"郵輪旅客若想在船上享用非套票包含的高級餐廳,需要怎樣做?","opts":["額外自費","不可能,所有餐廳都包含在套票內","必須以登船卡以外的方式付款","必須提前一年預約"],"a":0,"note":"部分餐廳屬自費項目,旅客須額外付款享用。"},{"q":"郵輪旅客若在岸上觀光期間未能準時回船,最可能面對的後果是?","opts":["被船隻留在當地,須自行安排前往下一站","船公司會派專機接載","全團行程會延遲等候","獲得額外賠償"],"a":0,"note":"教材強調旅客必須準時回船,遲到可能被留在當地。"},{"q":"為何郵輪公司選擇母港時特別看重「相關產業集聚度」?","opts":["集聚度高的地方更能配合郵輪的維修、物資供應及支援服務需要","集聚度與郵輪營運完全無關","集聚度只影響船票價格","集聚度只影響旅客國籍"],"a":0,"note":"母港需要完善的相關產業配套以支援郵輪運作。"}]},{"n":14,"title":"旅遊產品的分銷途徑","tag":"DISTRIBUTION CHANNELS","qs":[{"q":"旅遊產品的分銷途徑主要分為多少種模式?","opts":["三種","兩種","四種","五種"],"a":0,"note":"教材列出單向、雙向、多向三種分銷模式。"},{"q":"「單向」分銷模式是指?","opts":["供應商直接向消費者銷售,無需中介機構","供應商經一層中介銷售","涉及供應商、批發商及零售商三方","只限網上銷售"],"a":0,"note":"單向指供應商直接向消費者銷售,不經任何中介。"},{"q":"單向分銷模式的好處是?","opts":["不必支付佣金,可提供優惠價格及獎勵忠誠顧客","可獲得最廣泛的市場分銷","分擔銷售風險","減少員工人手"],"a":0,"note":"不必向中介支付佣金,可提供優惠及忠誠獎勵。"},{"q":"「雙向」分銷模式是指?","opts":["供應商通過一層中介機構銷售產品","供應商直接銷售,無中介","供應商透過批發商及零售商雙層銷售","只限透過政府銷售"],"a":0,"note":"雙向指供應商經一層中介機構銷售產品。"},{"q":"雙向分銷模式的好處是?","opts":["可能在全球市場獲得更廣泛的分銷","完全不用支付任何費用","不需要任何市場推廣","只限本地銷售"],"a":0,"note":"透過有市場份額的中介,可獲更廣泛的分銷。"},{"q":"雙向分銷模式的缺點是?","opts":["必須支付佣金,有時高達零售價的25%","無法接觸任何顧客","供應商完全喪失定價權","只能透過現金交易"],"a":0,"note":"缺點是須支付佣金,有時可高達零售價的25%。"},{"q":"「多向」分銷模式涉及哪些角色?","opts":["供應商、旅遊批發商及旅遊零售商","只有供應商及消費者","只有批發商及零售商","只有政府及供應商"],"a":0,"note":"多向模式涉及供應商、批發商及零售商三方。"},{"q":"在多向模式中,旅遊批發商的角色是?","opts":["把供應商產品與機票住宿等以捆綁形式向零售商出售","直接向消費者銷售","負責發牌管理旅行社","負責制定旅遊政策"],"a":0,"note":"批發商將產品捆綁後售予零售商,再轉售消費者。"},{"q":"在多向模式中,產品經批發商後,最終由誰售予消費者?","opts":["旅遊零售商","供應商本身","政府部門","航空公司總部"],"a":0,"note":"零售商再將產品轉售予消費者。"},{"q":"中介機構主要分為哪兩大類?","opts":["旅行代理商及旅行團經營商","批發商及零售商","入口商及出口商","政府機構及私人機構"],"a":0,"note":"中介機構分為旅行代理商及旅行團經營商兩大類。"},{"q":"旅行代理商可再分為哪兩種?","opts":["入口旅行代理商及外遊旅行代理商","批發代理商及零售代理商","本地代理商及國際代理商","網上代理商及實體代理商"],"a":0,"note":"旅行代理商分為入口及外遊兩種。"},{"q":"旅行團經營商可再分為哪兩種?","opts":["入口旅行團經營商及外遊旅行團經營商","批發經營商及零售經營商","高端經營商及大眾經營商","本地經營商及跨國經營商"],"a":0,"note":"旅行團經營商分為入口及外遊兩種。"},{"q":"旅行代理商的功能之一是提供甚麼?","opts":["一站式的旅遊產品","單一種類產品","只限機票代訂","只限簽證代辦"],"a":0,"note":"旅行代理商提供一站式旅遊產品服務。"},{"q":"旅行代理商如何為顧客扮演中間人角色?","opts":["把顧客與旅遊服務供應商聯繫起來","只負責收取佣金","只負責投訴處理","只負責發出簽證"],"a":0,"note":"旅行代理商連繫顧客與供應商,擔任中間人角色。"},{"q":"旅行代理商如何簡化顧客的購買過程?","opts":["將多次性購買變成一次性購買","令顧客須分開向每個供應商購買","增加購買次數","要求顧客先付全額按金"],"a":0,"note":"將顧客與不同供應商的多次購買變成一次性購買。"},{"q":"旅行代理商的介入打破了甚麼局限?","opts":["地區上的局限性","時間上的局限性","貨幣上的局限性","語言上的局限性"],"a":0,"note":"旅行代理商的介入打破了地區上的局限性。"},{"q":"教材指旅行代理商是旅遊產品的主要甚麼途徑?","opts":["分銷途徑","製造途徑","融資途徑","宣傳途徑"],"a":0,"note":"旅行代理商是旅遊產品主要的分銷途徑。"},{"q":"運輸、住宿及餐飲等核心行業是否只能透過旅行代理商銷售?","opts":["不是,它們也會直接向旅客銷售","是,必須經代理商","完全不能直接銷售","只能經政府銷售"],"a":0,"note":"核心行業也會直接向旅客出售產品/服務。"},{"q":"旅行代理商的主要功能被形容為?","opts":["協助供應商分銷他們的產品","負責制定旅遊政策","負責發牌監管","負責徵收稅項"],"a":0,"note":"旅行代理商主要功能是協助供應商分銷產品。"},{"q":"旅行代理商如何促進顧客的旅遊活動?","opts":["集合多種服務,協助預訂及提供確認","禁止顧客自行預訂","只提供資訊不作預訂","只服務團體顧客"],"a":0,"note":"代理商集合服務予顧客,協助預訂及確認以方便顧客。"},{"q":"旅行代理商 ":"第三重效應中,從業員收到款項後會用於甚麼?","opts":["消費(如食物、租金、日用品)","只會用於旅遊","只會捐贈慈善機構","只會購買外幣"],"a":0,"note":"從業員會用於消費,包括食物、租金、日用品等。"},{"q":"第三重效應中,從業員的款項還會用於甚麼?","opts":["儲蓄及交稅","只限娛樂","只限進修","全數轉贈他人"],"a":0,"note":"從業員款項也會用於儲蓄及交稅。"},{"q":"三重效應的核心觀點總結是甚麼?","opts":["資金會逐層流動並產生連鎖效應,但部分會流失","所有資金都會留在東道國","資金流動與經濟增長無關","三重效應只適用於已發展國家"],"a":0,"note":"資金逐層流動產生連鎖效應,但部分會流失,是核心觀點。"},{"q":"「連鎖效應」在三重效應理論中是指?","opts":["資金在東道國內持續帶動不同環節的經濟活動","資金完全消失","資金只流動一次便停止","資金只在政府部門流動"],"a":0,"note":"留在當地的資金會產生連鎖效應帶來更多收入。"},{"q":"第一重效應主要涉及資金流失的原因是?","opts":["機票及出發地旅行社的成本及利潤佔去大部分","東道國徵收高昂稅項","旅客攜帶現金不足","匯率波動導致損失"],"a":0,"note":"出發地相關的機票及旅行社成本利潤佔去大部分資金。"},{"q":"若旅客選用當地(東道國)的旅行社及航空公司,對第一重效應有何影響?","opts":["可能減少資金在出發地的流失,增加留在東道國的比例","完全沒有影響","令東道國資金全部流失","令旅客總消費大增"],"a":0,"note":"減少出發地中介的佔比,有助增加東道國留存的資金。"},{"q":"第二重效應中,「食、住、行、遊、購、娛」代表甚麼?","opts":["旅客在東道國消費的六大範疇","政府徵稅的六大項目","旅行社銷售的六種產品","簽證審批的六個步驟"],"a":0,"note":"這六個範疇是旅客在東道國消費開支的分類。"},{"q":"企業支付員工薪酬,是屬於三重效應中哪一重的內容?","opts":["第二重效應","第一重效應","第三重效應","第四重效應"],"a":0,"note":"企業將收入用於員工薪酬屬第二重效應的內容。"},{"q":"員工用薪金交租及買日用品,是屬於三重效應中哪一重的內容?","opts":["第三重效應","第一重效應","第二重效應","第四重效應"],"a":0,"note":"從業員將收入用於消費,是第三重效應的內容。"},{"q":"企業東主將盈利再投資擴充業務,是屬於三重效應中哪一重的內容?","opts":["第三重效應","第一重效應","第二重效應","第四重效應"],"a":0,"note":"企業東主的再投資行為屬第三重效應。"},{"q":"旅客直接付款給出發地旅行社購買機票,屬於哪一重效應?","opts":["第一重效應","第二重效應","第三重效應","不屬於三重效應"],"a":0,"note":"機票費用在旅客出發前已支付,屬第一重效應的資金流失部分。"},{"q":"若旅客總消費為$30,000,當中$21,000用於出發地機票成本,只有$9,000用於東道國,以下何者正確?","opts":["這$9,000將成為第二重效應的起點","這$21,000將成為第二重效應的起點","全部$30,000都會留在東道國","第二重效應與此金額無關"],"a":0,"note":"留在東道國的部分($9,000)是第二重效應的起點,與教材例子結構相同。"},{"q":"為何三重效應理論對旅遊業規劃有實際意義?","opts":["有助評估旅遊業對本地經濟的實際貢獻及資金流失情況","純粹為學術理論,無實際用途","只用於計算旅客總人數","只用於制定簽證政策"],"a":0,"note":"理論有助評估旅遊業的實際經濟貢獻及資金流失程度。"},{"q":"若一個旅遊目的地能提高「留在當地」的資金比例,對當地經濟有何潛在好處?","opts":["帶來更大的連鎖效應及經濟效益","對經濟完全沒有影響","一定會導致通脹失控","一定會減少就業機會"],"a":0,"note":"留在當地的資金愈多,連鎖效應及經濟效益愈大。"},{"q":"以下何者屬於第一重效應描述的內容?","opts":["旅客的整體旅程花費及其在出發地的流失部分","企業員工的薪酬分配","從業員的個人消費","企業東主的再投資決定"],"a":0,"note":"第一重效應聚焦資金進入東道國前後的流失情況。"},{"q":"以下何者屬於第二重效應描述的內容?","opts":["留在東道國的資金如何分配至薪酬物資利息及利潤","旅客出發前的機票開支","從業員的個人儲蓄行為","企業東主的再投資決定"],"a":0,"note":"第二重效應聚焦東道國內資金的分配過程。"},{"q":"以下何者屬於第三重效應描述的內容?","opts":["企業東主再投資及從業員的消費儲蓄交稅行為","旅客出發前的機票開支","留在東道國的資金總額","第一重效應的計算方式"],"a":0,"note":"第三重效應聚焦企業及從業員收到款項後的運用。"},{"q":"三重效應理論說明旅遊業對本地經濟的貢獻是否單一直接?","opts":["不是,而是透過多重、逐層的資金流動產生","是,完全單一直接","與本地經濟毫無關聯","只在特定季節產生"],"a":0,"note":"貢獻是透過三重、逐層流動的資金效應產生的。"},{"q":"若東道國本地的旅遊配套(如酒店、餐廳)不足,旅客的消費會如何受影響?","opts":["更多消費可能流向境外或減少留在當地的比例","不受任何影響","消費全數自動流入當地","令機票價格上升"],"a":0,"note":"配套不足可能令旅客消費更多流向境外供應商。"},{"q":"企業向境外供應商採購物資,對第二重效應有何影響?","opts":["可能令部分資金再度流出東道國","令資金完全留在當地","令連鎖效應加倍","與資金流動無關"],"a":0,"note":"境外採購會令部分資金再次流出東道國,削弱連鎖效應。"},{"q":"以下何者最能總結「第一重效應」?","opts":["旅客洗嘅錢,有幾多真係入到東道國度","企業點樣用留低嘅錢","員工點樣使自己人工","邊個負責徵稅"],"a":0,"note":"第一重效應計算旅客消費中實際進入東道國的部分。"},{"q":"以下何者最能總結「第二重效應」?","opts":["東道國入面嘅錢點樣分俾人工、物資、利息同利潤","旅客出發前洗咗幾多錢","企業老闆點樣再投資","員工點樣儲蓄"],"a":0,"note":"第二重效應描述留在東道國資金的分配去向。"},{"q":"以下何者最能總結「第三重效應」?","opts":["企業老闆同員工袋到錢之後,點樣再用","旅客最初洗幾多錢","出發地旅行社賺幾多","邊部分錢留咗喺東道國"],"a":0,"note":"第三重效應描述企業及員工收到款項後的後續運用。"},{"q":"教材舉的$20,000例子中,若全數$20,000都留在東道國(假設情況),第二重效應的基礎金額會是多少?","opts":["$20,000","$14,000","$6,000","$0"],"a":0,"note":"若假設全數留在當地,第二重效應的起始金額便是$20,000。"},{"q":"三重效應理論最適合用來分析甚麼政策議題?","opts":["如何提升旅遊業對本地經濟的實質貢獻","如何設計簽證申請表格","如何訓練導遊的語言能力","如何設計機場的裝潢"],"a":0,"note":"理論有助分析並提升旅遊業對本地經濟的實質貢獻。"},{"q":"若政府鼓勵旅客使用本地供應鏈(如本地食材、本地企業),主要目的是?","opts":["增加資金留存及連鎖效應","減少旅客人數","提高機票價格","減少稅收"],"a":0,"note":"使用本地供應鏈有助增加資金留存及帶動連鎖效應。"},{"q":"以下何者說明三重效應並非「一次性」而是「持續性」的過程?","opts":["資金會逐層從旅客到企業再到從業員,持續帶動經濟活動","資金只流動一次便完全停止","資金只在政府部門內流動","效應只維持一天"],"a":0,"note":"資金逐層流動、持續帶動經濟活動,體現持續性連鎖效應。"},{"q":"教材以「$20,000旅程」為例,主要目的是說明甚麼?","opts":["旅客總消費與實際流入東道國金額的差距","旅客必須攜帶足夠現金","機票價格必然高昂","旅行社必然賺取暴利"],"a":0,"note":"例子具體說明總消費與實際流入東道國金額的差距。"},{"q":"以下哪項最能反映「連鎖效應」帶來的正面經濟意義?","opts":["員工消費帶動其他商戶生意,形成經濟循環","員工消費令商戶蝕本","連鎖效應只令政府得益","連鎖效應與商戶無關"],"a":0,"note":"員工消費帶動其他商戶,形成良性經濟循環,是連鎖效應的核心。"},{"q":"若旅客改為報名參加東道國本地旅行社(而非出發地旅行社)營辦的行程,對第一重效應有何潛在影響?","opts":["可能減少資金在出發地的流失,增加留在東道 ts":["習以為常","極度歡迎","極度抗拒","完全消失興趣"],"a":0,"note":"理所當然階段居民對旅客習以為常。"},{"q":"理所當然階段,居民如何看待旅遊業?","opts":["視為一盤賺錢的生意","視為文化交流的機會","視為國家安全威脅","視為純粹的負擔"],"a":0,"note":"居民只把旅遊業視為一盤賺錢的生意。"},{"q":"理所當然階段的款待方式是怎樣的?","opts":["商業性的殷勤款待,禮貌周周又形式化","完全真誠的友誼款待","粗暴無禮的態度","完全拒絕接待"],"a":0,"note":"款待變得商業化,禮貌周周但形式化。"},{"q":"多克西理論的第三個階段是?","opts":["煩厭不快階段","理所當然階段","敵對感覺階段","興奮愉快階段"],"a":0,"note":"第三階段是煩厭不快階段。"},{"q":"煩厭不快階段,東道國面對甚麼問題?","opts":["已不能應付過多旅客","旅客人數太少","旅遊業尚未起步","經濟出現大幅增長"],"a":0,"note":"東道國已不能應付過多旅客。"},{"q":"煩厭不快階段,旅客過多如何影響本地人?","opts":["影響本地人日常生活","令本地人生活更方便","與本地人生活無關","令本地人收入大增"],"a":0,"note":"過多旅客影響本地人的日常生活。"},{"q":"煩厭不快階段,國民對旅客的感受是?","opts":["厭惡不快","非常歡迎","毫無感覺","極度崇拜"],"a":0,"note":"國民對旅客感到厭惡不快。"},{"q":"多克西理論的第四個階段是?","opts":["敵對感覺階段","煩厭不快階段","理所當然階段","得不償失階段"],"a":0,"note":"第四階段是敵對感覺階段。"},{"q":"敵對感覺階段,居民的不滿程度如何?","opts":["已到頂點","剛剛開始","完全消失","仍處於萌芽階段"],"a":0,"note":"敵對感覺階段居民不滿已到頂點。"},{"q":"敵對感覺階段可能出現甚麼行為?","opts":["粗暴言語甚至行為","主動歡迎旅客","邀請旅客共膳","提供免費導賞服務"],"a":0,"note":"可能出現粗暴言語甚至行為。"},{"q":"敵對感覺階段,居民會將本地社會問題歸咎於誰?","opts":["外來的旅客","本地政府","自己本身","鄰近地區"],"a":0,"note":"居民把本地的社會問題歸咎外來旅客。"},{"q":"敵對感覺階段,旅客的感受是?","opts":["感受到當地人的敵意","感到非常滿足","感到被過分優待","完全沒有察覺任何變化"],"a":0,"note":"旅客感受到當地人的敵意。"},{"q":"敵對感覺階段,旅客的到訪意慾如何?","opts":["有所減退","大幅提升","保持不變","急速上升"],"a":0,"note":"旅客到訪意慾有所減退。"},{"q":"多克西理論的第五個階段是?","opts":["得不償失階段","敵對感覺階段","煩厭不快階段","興奮愉快階段"],"a":0,"note":"第五階段是得不償失階段。"},{"q":"得不償失階段,原有環境出現甚麼變化?","opts":["完全改變","完全沒有變化","略為改善","回復到興奮愉快階段"],"a":0,"note":"得不償失階段原有環境完全改變。"},{"q":"得不償失階段,吸引旅客的因素會如何?","opts":["改變","完全不變","持續增強","與旅客情緒無關"],"a":0,"note":"吸引旅客的原有因素已經改變。"},{"q":"以下哪個階段的旅遊業「並未發展」?","opts":["興奮愉快階段","理所當然階段","煩厭不快階段","敵對感覺階段"],"a":0,"note":"興奮愉快階段旅遊業尚未發展。"},{"q":"以下哪個階段的款待「商業化及形式化」?","opts":["理所當然階段","興奮愉快階段","敵對感覺階段","得不償失階段"],"a":0,"note":"理所當然階段的款待變得商業化及形式化。"},{"q":"以下哪個階段「本地人日常生活受影響」?","opts":["煩厭不快階段","興奮愉快階段","理所當然階段","得不償失階段"],"a":0,"note":"煩厭不快階段本地人日常生活受影響。"},{"q":"以下哪個階段「出現粗暴言語甚至行為」?","opts":["敵對感覺階段","興奮愉快階段","理所當然階段","得不償失階段"],"a":0,"note":"敵對感覺階段可能出現粗暴言語行為。"},{"q":"以下哪個階段「原有吸引旅客的環境因素完全改變」?","opts":["得不償失階段","興奮愉快階段","理所當然階段","煩厭不快階段"],"a":0,"note":"得不償失階段原有環境及吸引因素完全改變。"},{"q":"一個剛開放的小島,居民熱情款待每位到訪旅客,屬於哪個階段?","opts":["興奮愉快階段","理所當然階段","煩厭不快階段","敵對感覺階段"],"a":0,"note":"熱情款待初來旅客,是興奮愉快階段的特徵。"},{"q":"一個成熟旅遊城市,商戶對旅客有禮但公事公辦,屬於哪個階段?","opts":["理所當然階段","興奮愉快階段","煩厭不快階段","得不償失階段"],"a":0,"note":"商業化、形式化款待,是理所當然階段的特徵。"},{"q":"一個旅遊城市因旅客太多,居民抱怨交通擠塞影響生活,屬於哪個階段?","opts":["煩厭不快階段","興奮愉快階段","理所當然階段","得不償失階段"],"a":0,"note":"本地生活受影響、居民抱怨,是煩厭不快階段特徵。"},{"q":"一個旅遊城市居民公開辱罵旅客、抗議旅遊業帶來的問題,屬於哪個階段?","opts":["敵對感覺階段","興奮愉快階段","理所當然階段","煩厭不快階段"],"a":0,"note":"公開辱罵抗議,是敵對感覺階段的特徵。"},{"q":"一個旅遊城市因過度發展令原有特色盡失、旅客已無興趣到訪,屬於哪個階段?","opts":["得不償失階段","興奮愉快階段","理所當然階段","煩厭不快階段"],"a":0,"note":"環境改變、吸引力消失,是得不償失階段特徵。"},{"q":"多克西理論的五個階段按次序排列是?","opts":["興奮愉快→理所當然→煩厭不快→敵對感覺→得不償失","理所當然→興奮愉快→敵對感覺→煩厭不快→得不償失","敵對感覺→煩厭不快→理所當然→興奮愉快→得不償失","得不償失→敵對感覺→煩厭不快→理所當然→興奮愉快"],"a":0,"note":"正確次序是興奮愉快、理所當然、煩厭不快、敵對感覺、得不償失。"},{"q":"多克西理論與哪項承載力概念直接相關?","opts":["社會文化承載力","空間承載力","環境承載力","經濟承載力"],"a":0,"note":"教材指社會文化承載力與多克西理論的「充滿敵意階段」相關。"},{"q":"教材指承載力被突破時對應多克西理論的哪個階段?","opts":["充滿敵意階段(即敵對感覺階段)","興奮愉快階段","理所當然階段","得不償失階段"],"a":0,"note":"承載力被突破對應多克西理論的「充滿敵意階段」。"},{"q":"多克西理論主要用來解釋甚麼現象?","opts":["東道國居民對旅客態度隨旅遊業發展階段的轉變","匯率如何影響旅遊業","旅客的購物習慣","航空公司的定價策略"],"a":0,"note":"理論解釋居民態度隨旅遊業發展而轉變的現象。"},{"q":"若某地政府想避免進入「敵對感覺階段」,應該怎樣做?","opts":["妥善管理旅客承載力及本地居民利益","盡量增加旅客人數不設限","完全禁止外來旅客","減少居民參與旅遊業決策"],"a":0,"note":"妥善管理承載力有助避免居民與旅客的對立。"},{"q":"以下何者最能總結「興奮愉快階段」?","opts":["旅遊業啱啱起步,居民當旅客係老友咁樣歡迎","居民已經當旅遊業係搵錢生意","居民開始唔滿旅客太多","居民已經公開仇視旅客"],"a":0,"note":"興奮愉快階段旅遊業未發展,居民視旅客為朋友。"},{"q":"以下何者最能總結「理所當然階段」?","opts":["款待變得好商業化、有禮貌但冇乜真感情","居民仍然當旅客係老友","居民已經公開仇視旅客","旅遊業已經完全消失"],"a":0,"note":"理所當然階段款待商業化、形式化。"},{"q":"以下何者最能總結「煩厭不快階段」?","opts":["旅客太多,已經開始影響返居民日常生活","居民仍然非常歡迎旅客","居民公開仇視旅客","環境已經完全改變"],"a":0,"note":"煩厭不快階段旅客過多影響居民日常生活。"},{"q":"以下何者最能總結「敵對感覺階段」?","opts":["居民不滿已到頂點,甚至有粗暴言行","居民仍然非常歡迎旅客","居民只係當生意咁睇","環境已經完全改變、失去吸引力"],"a":0,"note":"敵對感覺階段居民不滿到頂點,出現粗暴言行。"},{"q":"以下何者最能總結「得不償失階段」?","opts":["原本吸引旅客嘅嘢已經冇晒,環境完全變咗","居民非常歡迎旅客","款待仍然好有禮貌形式化","居民只係開始有少少唔滿"],"a":0,"note":"得不償失階段原有環境及吸引力完全改變。"},{"q":"若居民由「熱情款待」轉為「公事公辦式款待」,反映由哪個階段進展至哪個階段?","opts":["由興奮愉快階段進展至理所當然階段","由理所當然階段退回興奮愉快階段","由敵對感覺階段進展至得不償失階段","與階段轉變無關"],"a":0,"note":"這正是興奮愉快階段進展至理所當然階段的轉變特徵。"},{"q":"若居民由「日常生活受影響感到厭煩」進一步發展至「公開表達敵意」,反映由哪階段進展至哪階段?","opts":["由煩厭不快階段進展至敵對感覺階段","由敵對感覺階段退回煩厭不快階段","由興奮愉快階段進展至理所當然階段","與階段轉變無關"],"a":0,"note":"這是由煩厭不快階段進展至敵對感覺階段的轉變。"},{"q":"多克西理論對旅遊業規劃有何啟示?","opts":["業界及政府須留意居民情緒變化,適時管理旅客量","居民情緒與旅遊業規劃無關","應該無限制增加旅客量以追求最大利潤","應完全禁止旅客與居民接觸"],"a":0,"note":"理論提醒業界須關注居民情緒並適時管理旅客量,維持可持續發展。"},{"q":"承接上題,若未能妥善管理,最終可能導致哪個階段的出現?","opts":["得不償失階段","興奮愉快階段","理所當然階段(維持現狀)","煩厭不快階段"],"a":0,"note":"管理失當,情緒持續惡化最終可能演變成得不償失階段。"},{"q":"教材指多克西理論的核心變化驅動力是甚麼?","opts":["旅客數目相對居民容忍限度的變化","匯率的波動","政府稅收的多寡","導遊人數的增減"],"a":0,"note":"核心驅動力是旅客數目是否超越居民的容忍限度。"},{"q":"若一個地方在「敵對感覺階段」後仍未能妥善處理居民與旅客的關係,長遠可能導致甚麼結果?","opts":["演變成得不償失階段,原有吸引力盡失","自動回復至興奮愉快階段","旅客人數自動大幅增加","居民與旅客關係自動改善"],"a":0,"note":"若未能妥善處理,問題持續惡化最終可能演變成得不償失階段。"},{"q":"多克西理論中,「款待商業化」與「款待形式化」最常同時出現在哪個階段?","opts":["理所當然階段","興奮愉快階段","敵對感覺階段","得不償失階段"],"a":0,"note":"理所當然階段的款待商業化且形式化,禮貌但缺乏真摯感情。"},{"q":"若某旅遊城市推行「限制每日旅客人數」政策,最直接是回應哪個潛在階段的風險?","opts":["煩厭不快階段或敵對感覺階段","興奮愉快階段","理所當然階段","以上所有階段風險相同"],"a":0,"note":"限制人流旨在避免居民生活受過度影響,防止進入煩厭或敵對階段。"},{"q":"多克西理論的五個階段,本質上是描述甚麼隨時間的變化過程?","opts":["東道國居民對旅遊業發展的情緒反應","旅客的消費金額","匯率的波動幅度","航空公司的載客率"],"a":0,"note":"理論核心是居民情緒隨旅遊業發展階段而變化的過程。"},{"q":"「興奮愉快階段」與「得不償失階段」在旅遊業發展規模上最大的分別是?","opts":["前者旅遊業尚未發展,後者旅遊業已過度發展並失去原有吸引力","兩者旅遊業規模完全相同","前者旅遊業已飽和","後者旅遊業尚未起步"],"a":0,"note":"兩者分別代表旅遊業發展的起點與可能的終局。"},{"q":"若某社區居民由「熱情款待」逐漸轉為「日常生活受滋擾而生厭」,最貼近由哪個階段過渡至哪個階段?","opts":["由興奮愉快階段經理所當然階段過渡至煩厭不快階段","由得不償失階段回到興奮愉快階段","由敵對感覺階段回到理所當然階段","與階段轉變完全無關"],"a":0,"note":"這是多克西理論描述的典型階段遞進過程。"}]},{"n":18,"title":"旅遊業統計數據範疇","tag":"TOURISM STATISTICS","qs":[{"q":"業界為何需要旅遊業統計數字?","opts":["了解旅遊業概況及掌握發展趨勢","純粹用作年報裝飾","與旅遊規劃完全無關","只供學術研究使用"],"a":0,"note":"統計數字有助了解概況及掌握發展趨勢,檢視資源運用。"},{"q":"業界應從哪裡取得旅遊業統計數字?","opts":["政府統計部門或權威機構","自行憑感覺估計","純粹口耳相傳","隨意在網上搜尋"],"a":0,"note":"業界須從政府統計部門或權威機構取得數字。"},{"q":"教材將旅遊業統計數據分為多少個範疇?","opts":["四個","三個","五個","六個"],"a":0,"note":"教材列出地理環境、人口特性、消費心態、社會經濟影響四個範疇。"},{"q":"「地理環境」範疇的範圍包括?","opts":["旅客來自國家地區、季節性","旅客的收入水平","旅客的性格","旅客的消費能力"],"a":0,"note":"地理環境範疇涵蓋旅客來源地及季節性。"},{"q":"「地理環境」範疇的統計數據例子包括?","opts":["主要旅客來源地、每月到訪旅客人次","過夜旅客總消費","旅客性別比例","旅客教育程度"],"a":0,"note":"教材舉例主要旅客來源地及每月到訪人次。"},{"q":"「人口特性」範疇的範圍包括?","opts":["收入、性別、年齡、教育程度、受僱情況","旅客的旅遊動機","旅客的旅遊路線","旅客攜帶的行李量"],"a":0,"note":"人口特性涵蓋收入性別年齡教育程度受僱情況。"},{"q":"「人口特性」範疇的統計數據例子包括?","opts":["來港旅客性別比例數字、各大市場旅客平均年齡","主要旅客來源地","每月到訪旅客人次","旅客消費心態"],"a":0,"note":"教材舉例性別比例數字及平均年齡。"},{"q":"「消費心態」範疇的範圍包括?","opts":["性格、價值觀、態度、個人興趣、生活方式","旅客的護照類型","旅客的簽證種類","旅客的航班班次"],"a":0,"note":"消費心態涵蓋性格價值觀態度興趣及生活方式。"},{"q":"「消費心態」範疇的統計數據例子包括?","opts":["與入境旅遊有關的總消費、過夜旅客總消費、人均消費","主要旅客來源地","旅客的性別比例","旅客的教育程度"],"a":0,"note":"教材舉例總消費、過夜旅客總消費及人均消費。"},{"q":"「社會經濟影響」範疇的範圍包括?","opts":["消費能力、社會地位","旅客的年齡分佈","旅客的來源地","旅客的個人興趣"],"a":0,"note":"社會經濟影響涵蓋消費能力及社會地位。"},{"q":"「社會經濟影響」範疇的統計數據例子與哪個範疇重疊?","opts":["消費心態範疇(總消費及人均消費)","地理環境範疇","人口特性範疇","只限社會經濟影響範疇"],"a":0,"note":"教材顯示總消費、人均消費等數據同時涉及消費心態及社會經濟影響。"},{"q":"以下哪項統計數據屬於「地理環境」範疇?","opts":["每月到訪旅客人次","來港旅客性別比例","過夜旅客總消費","旅客的個人興趣"],"a":0,"note":"每月到訪人次涉及季節性,屬地理環境範疇。"},{"q":"以下哪項統計數據屬於「人口特性」範疇?","opts":["各大市場旅客平均年齡","主要旅客來源地","與入境旅遊有關的總消費","旅客的生活方式"],"a":0,"note":"平均年齡屬人口特性範疇的統計例子。"},{"q":"以下哪項統計數據屬於「消費心態」範疇?","opts":["過夜旅客總消費","主要旅客來源地","旅客的性別比例","旅客的教育程度"],"a":0,"note":"過夜旅客總消費屬消費心態(及社會經濟影響)範疇。"},{"q":"旅客的「教育程度」屬於哪個統計範疇?","opts":["人口特性","地理環境","消費心態","社會經濟影響"],"a":0,"note":"教育程度是人口特性範疇的內容之一。"},{"q":"旅客的「受僱情況」屬於哪個統計範疇?","opts":["人口特性","地理環境","消費心態","社會經濟影響"],"a":0,"note":"受僱情況是人口特性範疇的內容之一。"},{"q":"旅客的「性格」屬於哪個統計範疇?","opts":["消費心態","地理環境","人口特性","社會經濟影響"],"a":0,"note":"性格是消費心態範疇的內容之一。"},{"q":"旅客的「價值觀」屬於哪個統計範疇?","opts":["消費心態","地理環境","人口特性","社會經濟影響"],"a":0,"note":"價值觀是消費心態範疇的內容之一。"},{"q":"旅客的「生活方式」屬於哪個統計範疇?","opts":["消費心態","地理環境","人口特性","社會經濟影響"],"a":0,"note":"生活方式是消費心態範疇的內容之一。"},{"q":"旅客的「個人興趣」屬於哪個統計範疇?","opts":["消費心態","地理環境","人口特性","社會經濟影響"],"a":0,"note":"個人興趣是消費心態範疇的內容之一。"},{"q":"旅客的「社會地位」屬於哪個統計範疇?","opts":["社會經濟影響","地理環境","人口特性","消費心態"],"a":0,"note":"社會地位是社會經濟影響範疇的內容之一。"},{"q":"旅客的「消費能力」屬於哪個統計範疇?","opts":["社會經濟影響","地理環境","人口特性","消費心態"],"a":0,"note":"消費能力是社會經濟影響範疇的內容之一。"},{"q":"「季節性」統計數據有助業界了解甚麼?","opts":["旅客到訪的時間分佈規律","旅客的收入水平","旅客的個人興趣","旅客的護照類型"],"a":0,"note":"季節性數據反映旅客到訪的時間分佈規律,屬地理環境範疇。"},{"q":"若業界想知道「訪港旅客主要來自哪些國家」,應參考哪個範疇的數據?","opts":["地理環境","人口特性","消費心態","社會經濟影響"],"a":0,"note":"旅客來源地資料屬地理環境範疇。"},{"q":"若業界想知道「訪港旅客的平均年齡」,應參考哪個範疇的數據?","opts":["人口特性","地理環境","消費心態","社會經濟影響"],"a":0,"note":"年齡資料屬人口特性範疇。"},{"q":"若業界想知道「旅客人均消費金額」,應參考哪個或哪些範疇的數據?","opts":["消費心態及社會經濟影響範疇","只限地理環境範疇","只限人口特性範疇","與任何範疇都無關"],"a":0,"note":"人均消費同時涉及消費心態及社會經濟影響範疇。"},{"q":"若業界想知道「旅客的旅遊興趣及喜好」,應參考哪個範疇的數據?","opts":["消費心態","地理環境","人口特性","社會經濟影響"],"a":0,"note":"興趣喜好屬消費心態範疇的內容。"},{"q":"為何統計數字須來自政府統計部門或權威機構?","opts":["確保數據可靠準確,有助制定合理策略","純粹為符合法律要求","因為私人機構不能提供數據","因為統計工作只能由政府進行"],"a":0,"note":"權威來源確保數據可靠,有助業界制定合理發展策略。"},{"q":"以下何者不是教材列出的四個統計範疇之一?","opts":["政治環境","地理環境","人口特性","消費心態"],"a":0,"note":"教材四個範疇為地理環境、人口特性、消費心態、社會經濟影響,無政治環境。"},{"q":"旅遊業統計數據四大範疇不包括以下哪一項?","opts":["自然災害","人口特性","消費心態","社會經濟影響"],"a":0,"note":"自然災害不在教材四個範疇之列。"},{"q":"教材指出業界取得統計數字的目的除了解概況外,還包括?","opts":["檢視資源運用與發展策略","純粹用作宣傳","增加政府稅收","減少航班班次"],"a":0,"note":"統計數字亦有助檢視資源運用及發展策略。"},{"q":"以下描述:「性別、年齡、教育程度」屬於哪個範疇?","opts":["人口特性","地理環境","消費心態","社會經濟影響"],"a":0,"note":"這些均是人口特性範疇的內容。"},{"q":"以下描述:「性格、態度、生活方式」屬於哪個範疇?","opts":["消費心態","地理環境","人口特性","社會經濟影響"],"a":0,"note":"這些均是消費心態範疇的內容。"},{"q":"以下描述:「旅客來源地、季節性」屬於哪個範疇?","opts":["地理環境","人口特性","消費心態","社會經濟影響"],"a":0,"note":"這些均是地理環境範疇的內容。"},{"q":"以下描述:「消費能力、社會地位」屬於哪個範疇?","opts":["社會經濟影響","地理環境","人口特性","消費心態"],"a":0,"note":"這些均是社會經濟影響範疇的內容。"},{"q":"旅發局提供「酒店平均入住率」數據,主要用於甚麼用途?","opts":["分析旅遊業概況及發展趨勢","純粹統計酒店裝修進度","計算導遊人工","制定簽證政策"],"a":0,"note":"這類數據用於分析旅遊業概況及發展趨勢。"},{"q":"若某地想針對「銀髮族」市場設計旅遊產品,最需要參考哪個範疇的統計?","opts":["人口特性(年齡)","地理環境","消費心態(部分相關)","社會經濟影響(部分相關)"],"a":0,"note":"銀髮族市場定位首要考慮人口特性中的年齡數據。"},{"q":"若某地想了解旅客是否傾向購買奢侈品,最需要參考哪個範疇的統
