界,最後兩天開放大眾","全程只限業界","全程只限大眾","首兩天大眾,最後三天業界"],"a":0,"note":"教材舉例法蘭克福書展首三天業界、最後兩天大眾。"},{"q":"「EXPO」一詞源自哪個英文字?","opts":["exposition","expansion","experience","exclusive"],"a":0,"note":"EXPO源自「exposition」,即博覽之意。"},{"q":"香港的Asia World Expo中文名稱是?","opts":["亞洲國際博覽館","亞洲會議展覽中心","亞洲貿易中心","亞洲文化廣場"],"a":0,"note":"Asia World Expo中文名為亞洲國際博覽館。"},{"q":"用「EXPO」或「博覽」命名的活動通常是?","opts":["商業博覽會,眾多展銷商展示產品服務","純學術研討會","小型私人聚會","慈善義賣活動"],"a":0,"note":"EXPO/博覽會是眾多展銷商展示產品服務的商業活動。"},{"q":"展覽對參展商的優點包括?","opts":["潛在顧客集中、省時、建立形象","一定能立即回本","一定沒有任何競爭對手","完全不需要籌備工作"],"a":0,"note":"教材列出這些為展覽對參展商的優點。"},{"q":"展覽對參展商的缺點包括?","opts":["工作量大、花費大、保密性低","一定虧本","完全沒有客戶接觸機會","無法建立品牌形象"],"a":0,"note":"教材列出工作量大花費大及保密性低為缺點。"},{"q":"為何展覽的「保密性低」會被視為缺點?","opts":["產品資訊向公眾及競爭對手展示,商業機密較難保密","保密性低會令參展費用上升","保密性低會令展覽規模縮小","與參展商的利益無關"],"a":0,"note":"公開展示產品資訊,令競爭對手容易獲取商業機密。"},{"q":"展覽規模與觀眾入場意欲的關係是?","opts":["規模越大,潛在買家越多,觀眾入場意欲越高","規模越大,觀眾越少","規模與入場意欲無關","規模越小,吸引力越大"],"a":0,"note":"教材指規模越大越能吸引企業參展及觀眾入場。"},{"q":"展覽模式為吸引更多觀眾,常見做法是?","opts":["加插節目吸引觀眾","減少參展商數量","縮短展覽時間","限制入場人數"],"a":0,"note":"教材指展覽會加插節目以吸引觀眾。"}]},{"n":21,"title":"衡量目標的五個原則(SMART)","tag":"SMART OBJECTIVES","qs":[{"q":"SMART原則主要用來衡量甚麼?","opts":["MICE活動的目標","旅客的滿意程度","酒店的房價水平","匯率的走勢"],"a":0,"note":"教材指SMART五個原則用以衡量MICE活動的目標。"},{"q":"SMART是由多少個原則組成的簡稱?","opts":["五個","四個","六個","三個"],"a":0,"note":"SMART由五個英文字母代表的原則組成。"},{"q":"SMART的「S」代表甚麼?","opts":["Specific(明確性)","Simple(簡單性)","Strategic(策略性)","Sustainable(持續性)"],"a":0,"note":"S代表Specific,即明確性。"},{"q":"「明確性」(Specific)的意思是?","opts":["讓所有持分者都有清楚的目標","目標必須量化","目標必須經投票通過","目標必須設定完成時限"],"a":0,"note":"明確性指讓所有持分者都有清楚的目標。"},{"q":"SMART的「M」代表甚麼?","opts":["Measurable(衡量性)","Motivated(積極性)","Managed(管理性)","Meaningful(意義性)"],"a":0,"note":"M代表Measurable,即衡量性。"},{"q":"「衡量性」(Measurable)的意思是?","opts":["量化目標有助比較結果和成效","目標必須人人同意","目標必須切合實際資源","目標必須設定時限"],"a":0,"note":"衡量性指量化目標以便比較結果和成效。"},{"q":"SMART的「A」在教材中代表甚麼?","opts":["Agreeable(一致性)","Achievable(可達成)","Accountable(問責性)","Adaptable(適應性)"],"a":0,"note":"教材明確指A代表Agreeable(一致性),與常見版本Achievable不同。"},{"q":"「一致性」(Agreeable)的意思是?","opts":["目標必須經所有持分者同意","目標必須量化","目標必須清晰明確","目標必須設定時限"],"a":0,"note":"一致性指目標必須經所有持分者同意。"},{"q":"SMART的「R」代表甚麼?","opts":["Realistic(實際)","Reliable(可靠性)","Responsible(責任性)","Rewarding(獎勵性)"],"a":0,"note":"R代表Realistic,即實際。"},{"q":"「實際」(Realistic)的意思是?","opts":["根據資源及客觀情況擬定可實現的目標","目標必須經投票表決","目標必須人人皆知","目標必須每年檢討"],"a":0,"note":"實際指目標須切合資源及客觀情況,可實現。"},{"q":"「實際」(Realistic)原則強調目標不應如何?","opts":["流於空想或過於保守","過於量化","過於清晰","過於公開"],"a":0,"note":"實際原則強調目標不應流於空想或過於保守。"},{"q":"SMART的「T」代表甚麼?","opts":["Time specific(有時限性)","Total(總體性)","Team(團隊性)","Trusted(可信性)"],"a":0,"note":"T代表Time specific,即有時限性。"},{"q":"「有時限性」(Time specific)的意思是?","opts":["目標必須設定完成時限","目標必須量化","目標必須人人同意","目標必須切合資源"],"a":0,"note":"有時限性指目標必須設定完成時限。"},{"q":"以下哪一項不是SMART五個原則之一?","opts":["Sustainable(持續性)","Specific(明確性)","Measurable(衡量性)","Realistic(實際)"],"a":0,"note":"教材的五個原則是Specific、Measurable、Agreeable、Realistic、Time specific,無Sustainable。"},{"q":"SMART五個原則依次序排列是?","opts":["Specific, Measurable, Agreeable, Realistic, Time specific","Measurable, Specific, Realistic, Agreeable, Time specific","Time specific, Realistic, Agreeable, Measurable, Specific","Agreeable, Specific, Measurable, Time specific, Realistic"],"a":0,"note":"正確次序為S-M-A-R-T。"},{"q":"「讓所有持分者都有清楚的目標」對應SMART哪一個字母?","opts":["S","M","A","T"],"a":0,"note":"這是Specific(明確性)的定義。"},{"q":"「量化目標有助比較結果和成效」對應SMART哪一個字母?","opts":["M","S","A","R"],"a":0,"note":"這是Measurable(衡量性)的定義。"},{"q":"「目標必須經所有持分者同意」對應SMART哪一個字母?","opts":["A","S","M","R"],"a":0,"note":"這是Agreeable(一致性)的定義。"},{"q":"「根據資源及客觀情況擬定可實現的目標」對應SMART哪一個字母?","opts":["R","S","M","A"],"a":0,"note":"這是Realistic(實際)的定義。"},{"q":"「目標必須設定完成時限」對應SMART哪一個字母?","opts":["T","S","M","A"],"a":0,"note":"這是Time specific(有時限性)的定義。"},{"q":"坊間常見的SMART原則中,「A」通常指甚麼?","opts":["Achievable(可達成)","Agreeable(一致性)","Accountable(問責性)","Assessed(被評估)"],"a":0,"note":"坊間常見版本的A多指Achievable,但本教材版本為Agreeable。"},{"q":"本教材SMART原則與坊間常見版本最大的分別在於哪個字母?","opts":["A","S","M","T"],"a":0,"note":"教材版本A為Agreeable(一致性),不同於常見的Achievable(可達成)。"},{"q":"為何溫習SMART原則時須特別留意「A」的定義?","opts":["因為本教材版本(Agreeable)與坊間常見版本(Achievable)不同,容易混淆","因為A是最不重要的原則","因為A從不會被考核","因為A的定義每年都不同"],"a":0,"note":"教材採用Agreeable,與常見Achievable不同,是常見混淆考點。"},{"q":"一個MICE活動的目標若只有主辦方知悉、其他持分者一頭霧水,違反了哪項原則?","opts":["明確性(Specific)","衡量性(Measurable)","一致性(Agreeable)","有時限性(Time specific)"],"a":0,"note":"目標不清晰、持分者不了解,違反明確性原則。"},{"q":"一個MICE活動的目標只設定「令活動成功」而沒有具體數字,違反了哪項原則?","opts":["衡量性(Measurable)","明確性(Specific)","一致性(Agreeable)","實際(Realistic)"],"a":0,"note":"沒有可量化的具體指標,違反衡量性原則。"},{"q":"一個MICE活動的目標由管理層單方面訂立、未經其他持分者同意,違反了哪項原則?","opts":["一致性(Agreeable)","明確性(Specific)","衡量性(Measurable)","有時限性(Time specific)"],"a":0,"note":"未經所有持分者同意,違反一致性原則。"},{"q":"一個MICE活動的目標定為「一個月內吸引十萬名參加者」,但場地及資源只能容納一萬人,違反了哪項原則?","opts":["實際(Realistic)","明確性(Specific)","衡量性(Measurable)","一致性(Agreeable)"],"a":0,"note":"目標脫離實際資源限制,違反實際原則。"},{"q":"一個MICE活動的目標沒有訂明任何完成期限,違反了哪項原則?","opts":["有時限性(Time specific)","明確性(Specific)","衡量性(Measurable)","實際(Realistic)"],"a":0,"note":"沒有設定時限,違反有時限性原則。"},{"q":"一個展覽設定目標為「三個月內達成參展商滿意度90%」,符合哪些SMART原則?","opts":["衡量性及有時限性","只符合明確性","只符合一致性","完全不符合任何原則"],"a":0,"note":"有具體百分比(衡量性)及三個月期限(有時限性)。"},{"q":"一個公司會議目標經全體部門主管開會商討並一致同意,符合哪項SMART原則?","opts":["一致性(Agreeable)","衡量性(Measurable)","實際(Realistic)","有時限性(Time specific)"],"a":0,"note":"經全體持分者商討同意,符合一致性原則。"},{"q":"以下何者是符合SMART原則的目標例子?","opts":["「在六個月內將展覽參觀人數提升20%,並經管理層及員工代表同意」","「令展覽變得更好」","「盡量提升參觀人數」","「未來提升參觀人數,無需設定時間」"],"a":0,"note":"此例子具體、可量化、有時限並經同意,符合SMART。"},{"q":"以下何者不符合SMART原則中的「明確性」?","opts":["「令活動辦得成功啲」(模糊不清)","「三個月內提升參展商數目15%」","「在限期前完成場地佈置」","「經各部門同意的推廣預算」"],"a":0,"note":"「辦得成功啲」目標模糊,不符合明確性。"},{"q":"以下何者不符合SMART原則中的「衡量性」?","opts":["「盡量提升活動的知名度」(無法量化)","「提升參觀人數20%」","「在指定日期前完成」","「各持分者一致同意的目標」"],"a":0,"note":"「盡量提升知名度」沒有可量化指標,不符衡量性。"},{"q":"為何MICE活動策劃時需要應用SMART原則?","opts":["有助制定清晰、可行、可評估的活動目標","純粹為符合行政規定","與活動籌辦完全無關","只適用於大型國際活動"],"a":0,"note":"SMART原則有助制定清晰可行可評估的目標。"},{"q":"「衡量性」原則有何實際作用?","opts":["有助日後比較實際結果與原定目標的成效","純粹用作宣傳口號","與活動籌辦無關","只用於財務審計"],"a":0,"note":"量化目標讓主辦方可比較結果與目標的成效。"},{"q":"「有時限性」原則的實際意義是?","opts":["確保各項籌備工作有明確的完成期限,避免無限拖延","純粹裝飾用途","與活動質素無關","只適用於小型活動"],"a":0,"note":"設定時限確保工作按時完成,避免拖延。"},{"q":"若某會議的目標「必須讓贊助商、參加者及主辦方三方都認同」,體現SMART哪項原則?","opts":["一致性(Agreeable)","明確性(Specific)","實際(Realistic)","有時限性(Time specific)"],"a":0,"note":"多方共同認同正是一致性原則的核心。"},{"q":"若展覽目標設定「參展商滿意度達85%以上」,這是應用哪項原則?","opts":["衡量性(Measurable)","一致性(Agreeable)","實際(Realistic)","明確性(Specific,部分相關)"],"a":0,"note":"具體百分比指標是應用衡量性原則的例子。"},{"q":"若某公司的獎勵旅遊目標「必須在財政年度結束前完成」,主要對應哪項原則?","opts":["有時限性(Time specific)","衡量性(Measurable)","一致性(Agreeable)","實際(Realistic)"],"a":0,"note":"設定明確完成期限,對應有時限性原則。"},{"q":"以下何者最能總結SMART原則的整體作用?","opts":["為MICE活動訂立清晰、可量化、獲認同、切實可行並有期限的目標","純粹用作行政文書格式","只適用於評核員工表現","與活動籌備完全無關"],"a":0,"note":"SMART原則整合五方面確保目標訂立得宜。"},{"q":"以下描述:「經各持分者同意的目標,較單方面訂立的目標有何優勢?」","opts":["更容易獲得各方支持及配合執行","完全沒有任何優勢","會令目標更難達成","與執行成效無關"],"a":0,"note":"經一致同意的目標更容易獲得支持,有利執行。"},{"q":"若一個目標「清晰、可量化,但完全脫離現實資源」,仍會被視為理想的SMART目標嗎?","opts":["不會,因為不符合實際(Realistic)原則","會,因為已符合明確性及衡量性","會,因為SMART只需符合兩項原則","與SMART原則無關"],"a":0,"note":"SMART要求五項原則同時符合,脫離現實即不符合Realistic。"},{"q":"教材強調SMART原則的哪一項與坊間主流定義有明顯差異,考生應特別留意?","opts":["A(Agreeable而非Achievable)","S(Specific)","M(Measurable)","T(Time specific)"],"a":0,"note":"A的定義是本教材與坊間常見版本最大分歧之處。"},{"q":"若某MICE活動的目標訂為「在半年內令參展商數目增加25%」,符合SMART中的哪兩項原則最為明顯?","opts":["衡量性及有時限性","明確性及一致性","實際及一致性","衡量性及一致性"],"a":0,"note":"具體百分比屬衡量性,半年期限屬有時限性。"},{"q":"若某展覽的目標經工會、管理層及參展商三方會議共同議定,最直接體現SMART哪項原則?","opts":["一致性(Agreeable)","明確性(Specific)","衡量性(Measurable)","有時限性(Time specific)"],"a":0,"note":"多方共同議定並同意,正是一致性原則的核心。"},{"q":"若某會議的目標被批評「講就天下無敵,做就無從入手」,最可能違反了SMART哪項原則?","opts":["明確性(Specific)或衡量性(Measurable)","一致性(Agreeable)","有時限性(Time specific)","實際(Realistic)"],"a":0,"note":"目標空泛難以執行,通常源於不夠明確或無法量化。"},{"q":"若某企業將獎勵旅遊目標定為「短期內盡量令員工開心」,主要違反了SMART哪兩項原則?","opts":["明確性及有時限性","一致性及衡量性","實際及一致性","衡量性及有時限性"],"a":0,"note":"「短期內」及「盡量」均缺乏具體時限及可量化指標。"},{"q":"以下何者是完全符合SMART五項原則的目標例子?","opts":["「在四個月內將酒店入住率提升至85%,並經業主及管理公司雙方同意,資源已備妥」","「盡量提升入住率」","「短期內令業主同管理公司都滿意」","「提升入住率,不設任何時限」"],"a":0,"note":"此例子具體、可量化、經同意、切合資源並有時限,符合SMART。"},{"q":"為何SMART原則特別適合用於MICE活動而非個人消閒旅遊?","opts":["MICE活動涉及多方持分者及具體商業目標,需要清晰可量化的共同目標","消閒旅遊完全不需要任何目標","MICE活動沒有任何持分者","SMART原則只適用於政府活動"],"a":0,"note":"MICE活動涉及企業、參加者等多方,需要清晰共識的目標框架。"},{"q":"若一個會議的預算目標「必須完全脫離現有資源限制去追求」,這違反了SMART哪項原則?","opts":["實際(Realistic)","明確性(Specific)","衡量性(Measurable)","一致性(Agreeable)"],"a":0,"note":"脫離現有資源的目標,不符合Realistic原則的要求。"},{"q":"以下何者最貼近「Time specific」原則在MICE籌備上的實際應用?","opts":["為每個籌備階段(如場地確認、參展商招募)設定明確完成日期","只設定活動當日的時間表","完全不設任何時間表","目標達成與否無需設定期限"],"a":0,"note":"為各籌備階段設定明確完成期限,正是有時限性原則的實際應用。"},{"q":"若獎勵旅遊的目標「經員工代表、人力資源部及管理層一致同意」,這是SMART哪項原則的體現?","opts":["一致性(Agreeable)","衡量性(Measurable)","明確性(Specific)","實際(Realistic)"],"a":0,"note":"多方一致同意正是Agreeable原則的核心體現。"},{"q":"承辦商在計劃展覽時先評估場地、人手及預算是否足夠,再擬定參觀人數目標,主要體現哪項原則?","opts":["實際(Realistic)","明確性(Specific)","一致性(Agreeable)","有時限性(Time specific)"],"a":0,"note":"根據實際資源擬定可行目標,正是Realistic原則的體現。"},{"q":"若目標「模糊地寫住『搞好啲個活動』」,最欠缺SMART中的哪項元素?","opts":["明確性(Specific)","一致性(Agreeable)","有時限性(Time specific)","實際(Realistic)"],"a":0,"note":"沒有具體內容描述,明顯欠缺明確性。"},{"q":"以下何者最能體現SMART原則中「量化」的精神?","opts":["「參觀人次達五萬」","「參觀人次好多」","「參觀人次令人滿意」","「參觀人次符合預期」(無數字)"],"a":0,"note":"具體數字五萬正是量化(Measurable)精神的體現。"},{"q":"若展覽目標「必須喺開幕前三個月完成場地招標」,這體現SMART哪項原則?","opts":["有時限性(Time specific)","一致性(Agreeable)","實際(Realistic)","衡量性(Measurable,部分相關)"],"a":0,"note":"設定具體完成時限,正是Time specific的體現。"},{"q":"以下何者最能總結SMART原則對MICE活動策劃的整體價值?","opts":["提供一套清晰框架,確保目標明確、可量化、獲認同、可行並有期限","純粹是行政文書的格式要求","只適用於財務部門的預算編製","與活動的實際成效無關"],"a":0,"note":"SMART提供整全框架確保目標訂立得宜,是其核心價值。"},{"q":"若一個目標「所有持分者都同意,亦有具體數字及時限,但明顯超出可動用資源」,仍然是理想的SMART目標嗎?","opts":["不是,因為不符合Realistic原則","是,因為已符合其餘四項原則","是,因為資源限制不重要","與SMART原則的判斷無關"],"a":0,"note":"即使符合其餘四項,若不切實際仍不符合完整的SMART要求。"},{"q":"「明確性」與「衡量性」兩項原則的主要分別是?","opts":["前者強調目標內容清晰,後者強調目標可用數字驗證","兩者完全相同,沒有分別","前者強調時限,後者強調資源","前者與量化有關,後者與清晰度有關"],"a":0,"note":"明確性關乎目標描述是否清楚,衡量性關乎是否可量化驗證。"},{"q":"「一致性」與「實際」兩項原則的主要分別是?","opts":["前者強調各方是否同意,後者強調目標是否切合現有資源","兩者完全相同","前者強調時限,後者強調同意","前者與資源有關,後者與同意有關"],"a":0,"note":"一致性關乎各方共識,實際則關乎資源與客觀條件的配合。"}]}]},{"n":2,"title":"款待導論","eng":"INTRODUCTION TO HOSPITALITY","topics":[{"n":1,"title":"酒店類型","tag":"HOTEL TYPES","qs":[{"q":"教材列出酒店可按多少種準則分類?","opts":["七種","五種","三種","九種"],"a":0,"note":"教材列出地理位置、功能設施、服務水平、規模、房價、評級及產權七種分類準則。"},{"q":"以下哪一項不是教材列出的酒店分類準則?","opts":["員工人數(非教材準則)","地理位置","服務水平","產權"],"a":0,"note":"員工人數不在教材列出的七項分類準則之列。"},{"q":"市中心酒店的特點是?","opts":["交通便捷,房價較高","位處郊區,交通不便","鄰近機場,服務商務旅客為主","位於公路旁,提供最基本服務"],"a":0,"note":"市中心酒店交通便捷,房價較高。"},{"q":"市中心酒店的規模及類型有何特點?","opts":["分別很大,如頂級酒店和住宅式酒店","必然是小型酒店","必然是經濟型酒店","規模及類型完全一致"],"a":0,"note":"市中心酒店規模及類型分別很大。"},{"q":"近郊酒店的特點是?","opts":["較低密度的環境和較大的空間","市中心黃金地段","鄰近機場","位於公路旁"],"a":0,"note":"近郊酒店位處郊區,有較低密度環境和較大空間。"},{"q":"近郊酒店的交通狀況通常如何?","opts":["交通較不便","交通非常便捷","與市中心相同","只能靠飛機到達"],"a":0,"note":"近郊酒店交通較不便,但設施完善。"},{"q":"機場酒店主要服務哪類旅客?","opts":["商務旅客、機師及空中服務員或滯留旅客","只服務渡假旅客","只服務團體旅客","只服務背包客"],"a":0,"note":"機場酒店服務多使用機場的旅客,如商務旅客機師及滯留旅客。"},{"q":"機場酒店的設施開放時間有何特點?","opts":["會較長","只在日間開放","只在夜間開放","與市中心酒店相同"],"a":0,"note":"機場酒店設施的開放時間會較長,以配合航班時間。"},{"q":"公路酒店或汽車旅館主要服務哪類旅客?","opts":["駕車長途旅行的旅客","商務會議旅客","賭場旅客","渡假豪華旅客"],"a":0,"note":"公路酒店服務駕車長途旅行的旅客。"},{"q":"公路酒店或汽車旅館提供的服務水平是?","opts":["最基本的住宿設施及服務","最豪華的設施及服務","只提供會議設施","只提供溫泉設施"],"a":0,"note":"公路酒店提供最基本的住宿設施及服務。"},{"q":"會議酒店主要服務哪類客群?","opts":["舉辦大型會議的團體或商務旅客","背包旅客","家庭渡假旅客","賭場旅客"],"a":0,"note":"會議酒店服務舉辦大型會議的團體或商務旅客。"},{"q":"會議酒店的設施特點包括?","opts":["大量客房、會議廳及宴會廳、高科技會議設備","只有溫泉設施","只有賭場設施","只有基本客房"],"a":0,"note":"會議酒店具備大量客房會議廳宴會廳及高科技設備。"},{"q":"商務酒店主要位於甚麼地區?","opts":["市區工商業地帶","郊區","機場附近","公路旁"],"a":0,"note":"商務酒店位於市區工商業地帶,服務商務旅客為主。"},{"q":"商務酒店與會議酒店相比,缺少甚麼?","opts":["會議酒店的大型活動空間","客房","商務中心","餐飲服務"],"a":0,"note":"商務酒店缺少會議酒店的大型活動空間。"},{"q":"賭場酒店主要服務哪些客群?","opts":["賭客、商務及度假旅客","只服務背包客","只服務會議團體","只服務長者"],"a":0,"note":"賭場酒店服務賭客、商務及度假旅客。"},{"q":"賭場酒店的設施特點是?","opts":["豪華設施、娛樂購物場所、食肆酒吧","只有基本客房","只有會議設施","只有溫泉設施"],"a":0,"note":"賭場酒店具備豪華設施娛樂購物場所及食肆酒吧。"},{"q":"度假酒店的地理特點是 三代同堂的家庭想入住同一房間但有獨立起居空間,最適合預訂哪種房型?","opts":["套房(住客組合分類)","單人房","雙人房(一張床)","標準級客房"],"a":0,"note":"套房設有多間臥室及獨立起居室,適合多人同住。"},{"q":"一位輪椅使用者入住酒店,最需要哪種客房?","opts":["無障礙客房","總統套房","荷李活式雙人房","標準級客房(不一定適合)"],"a":0,"note":"無障礙客房專為殘疾人士而設,設有安全扶手等設施。"},{"q":"一對夫婦希望在房內加設嬰兒床照顧幼兒,應在何時提出要求?","opts":["預訂房間時","入住後才提出(非教材建議做法)","退房時","不能要求"],"a":0,"note":"教材指幼兒床通常於預訂房間時要求。"},{"q":"以下哪一種床型最適合旅客在客房內舉行小型商務會議?","opts":["梳化床","單人床","特大床","幼兒床"],"a":0,"note":"梳化床可摺疊成梳化,適合房客舉行活動如商務會議。"},{"q":"以下哪一種房型的客人可享用專用行政樓層及酒廊服務?","opts":["行政套房","標準級客房","單人房","雙人房(兩張床)"],"a":0,"note":"行政套房設有專用行政樓層,可享用酒廊服務。"},{"q":"以下哪一種房型的電梯須以密碼鎖開啟?","opts":["總統套房","標準級客房","特級客房","單人房"],"a":0,"note":"總統套房電梯須以密碼鎖開啟,保安最嚴密。"},{"q":"客房五大等級(標準/特級/豪華/行政套房/總統套房)由低至高排列,景觀質素的變化趨勢是?","opts":["由較差逐漸提升至最佳","維持不變","先提升後下降","無固定規律"],"a":0,"note":"由標準級到總統套房,景觀質素逐級提升。"},{"q":"客房五大等級由低至高排列,服務水平的變化趨勢是?","opts":["由基本服務逐漸提升至專人專屬服務","維持不變","逐級下降","無固定規律"],"a":0,"note":"由標準級到總統套房,服務水平逐級提升至最高規格。"},{"q":"為何行政套房及總統套房「較貴的房價」被視為換取「更佳服務」的合理安排?","opts":["因為酒店提供相應更高規格的設施及專屬服務以匹配較高房價","因為法律規定必須如此定價","因為所有酒店房價劃一","與服務水平無關"],"a":0,"note":"較高房價對應更高規格的設施與服務,是市場定價的合理反映。"}]},{"n":4,"title":"影響酒店房價的因素","tag":"ROOM PRICING FACTORS","qs":[{"q":"旺季與淡季的酒店房價一般有何分別?","opts":["旺季房價較高,淡季較低","旺季房價較低","淡旺季房價相同","淡季房價必然為零"],"a":0,"note":"旺季房價較高,淡季較低。"},{"q":"遇到國際性會議、展覽或體育盛事時,酒店房價會如何變化?","opts":["房價也較高","房價會下調","房價維持不變","與房價無關"],"a":0,"note":"遇到重大事件房價也較高。"},{"q":"房間的級別是否影響房價?","opts":["是,不同等級房間收費不同","否,所有級別收費相同","只影響豪華級房間","與房價無關"],"a":0,"note":"不同等級房間收費不同。"},{"q":"「歐式計價」的英文簡稱是?","opts":["EP","CP","MAP","AP"],"a":0,"note":"歐式計價(European Plan)簡稱EP。"},{"q":"「歐式計價」的房價包括甚麼?","opts":["只包括房間","房間及早餐","房間及兩餐","房間及三餐"],"a":0,"note":"歐式計價只包括房間。"},{"q":"「歐式計價」的特色是?","opts":["客人有更大彈性選擇,不會只享用酒店餐飲","方便只用早餐的客人","方便用完早餐再回來吃晚餐的客人","適合難以在外用餐的偏遠酒店"],"a":0,"note":"歐式計價讓客人有更大彈性,可能節省飲食開支。"},{"q":"「歐陸式計價」的英文簡稱是?","opts":["CP","EP","MAP","AP"],"a":0,"note":"歐陸式計價(Continental Plan)簡稱CP。"},{"q":"「歐陸式計價」的房價包括甚麼?","opts":["房間及早餐","只包括房間","房間及兩餐","房間及三餐或四餐"],"a":0,"note":"歐陸式計價包括房間及早餐。"},{"q":"「歐陸式計價」適合哪類客人?","opts":["只在酒店用早餐但不用晚餐的客人","全日留在酒店的客人","從不用餐的客人","只用晚餐的客人"],"a":0,"note":"歐陸式計價方便只在酒店用早餐的客人。"},{"q":"「修正美式計價」的英文簡稱是?","opts":["MAP","EP","CP","AP"],"a":0,"note":"修正美式計價(Modified American Plan)簡稱MAP。"},{"q":"「修正美式計價」的房價通常包括哪兩餐?","opts":["早餐及晚餐","早餐及午餐","午餐及晚餐","只包括早餐"],"a":0,"note":"修正美式計價通常包括早餐及晚餐兩餐。"},{"q":"「修正美式計價」適合哪類客人?","opts":["用完早餐整日活動,在外用午餐,再回酒店吃晚餐的客人","全日留在房間的客人","只用早餐的客人","不用任何餐飲的客人"],"a":0,"note":"MAP方便早出晚歸、在外用午餐的客人。"},{"q":"「美式計價」的英文簡稱是?","opts":["AP","EP","CP","MAP"],"a":0,"note":"美式計價(American Plan)簡稱AP。"},{"q":"「美式計價」的房價包括甚麼?","opts":["房間及三餐,或四餐(包括下午茶)","只包括房間","房間及早餐","房間及兩餐"],"a":0,"note":"美式計價包括三餐或連下午茶共四餐。"},{"q":"「美式計價」常用於甚麼類型的酒店?","opts":["客人難以在外用餐、位置較偏遠的酒店","市中心豪華酒店","公路旅館","機場酒店"],"a":0,"note":"美式計價常用於客人難以外出用餐或位置偏遠的酒店。"},{"q":"「美式計價」在衛生環境較差地區有何優勢?","opts":["客人在酒店用餐更安全","可節省更多飲食開支","提供更大彈性","與衛生無關"],"a":0,"note":"衛生飲食環境較差的地區,美式計價可令客人在酒店用餐更安全。"},{"q":"客房收入的計算公式是?","opts":["客房收入=定價×折扣","客房收入=定價÷折扣","客房收入=定價+折扣","客房收入=定價-折扣"],"a":0,"note":"客房收入=定價×折扣。"},{"q":"酒店「減價」策略是指?","opts":["定價不變而提高折扣","定價提高而折扣不變","定價與折扣同時提高","取消所有折扣"],"a":0,"note":"減價策略是定價不變而提高折扣。"},{"q":"酒店「加價」策略是指?","opts":["把在一些不包括在定價的收費調高","降低所有房間定價","增加折扣幅度","取消所有收費項目"],"a":0,"note":"加價是把不包括在定價的收費項目調高。"},{"q":"租住時間長短如何影響房價?","opts":["租住時間較長,有較佳的折扣","租住時間越短折扣越大","與租住時間無關","租住時間只影響房型"],"a":0,"note":"租住時間較長通常有較佳折扣。"},{"q":"不同顧客類別對房價有何影響?","opts":["不同的顧客群,有不同的折扣","所有顧客類別折扣相同","只有商務客有折扣","顧客類別不影響房價"],"a":0,"note":"不同顧客群會有不同折扣安排。"},{"q":"以下哪一項通常是酒店房價已包括的免費服務?","opts":["清潔房間服務","按摩及各類療程","召喚醫生","保姆服務"],"a":0,"note":"教材列出清潔房間服務屬酒店房價已包括的免費項目。"},{"q":"以下哪一項通常需要額外收費?","opts":["按摩及各類療程","來電喚醒服務","游泳池","開床服務"],"a":0,"note":"按摩及各類療程通常需要額外收費。"},{"q":"「來電喚醒服務」通常是免費還是收費?","opts":["免費","收費","視乎房型而定","只限行政套房免費"],"a":0,"note":"來電喚醒服務屬免費服務。"},{"q":"「健身室」使用通常是免費還是收費?","opts":["免費","收費","視乎時段而定","只限總統套房免費"],"a":0,"note":"健身室屬免費設施。"},{"q":"「保險箱」使用通常是免費還是視乎情況?","opts":["視乎酒店及個別等級而定","必然免費","必然收費","只限VIP客人使用"],"a":0,"note":"保險箱是否收費視乎酒店及個別等級而定。"},{"q":"「行李服務」通常是免費還是收費?","opts":["免費","收費","視乎行李件數","只限套房客人享用"],"a":0,"note":"行李服務屬免費服務。"},{"q":"「正價」(Rack Rate)是指?","opts":["酒店房間的標準定價,不包含任何折扣優惠","給航空公司員工的優惠價","團體訂房的折扣價","公司客戶的掛賬價"],"a":0,"note":"正價是標準定價,不含任何折扣。"},{"q":"「正價」的目標客群是?","opts":["公開,即一般公眾","只限航空公司員工","只限旅行代理商","只限公司客戶"],"a":0,"note":"正價是公開價格,適用於一般公眾。"},{"q":"「航空公司價」(Airline Rate)是給誰的優惠?","opts":["航空公司員工","旅行代理商","公司客戶","旅遊從業員"],"a":0,"note":"航空公司價是酒店給航空公司員工的特別優惠價。"},{"q":"「團體價」(Group Rate)的折扣特點是?","opts":["因人數眾多,折扣較大","折扣最小","與正價相同","只限單人入住"],"a":0,"note":"團體價因訂房人數眾多,折扣較大。"},{"q":"「團體價」的目標客群是?","opts":["旅行代理商或團體","個別商務旅客","航空公司員工","旅遊從業員"],"a":0,"note":"團體價目標客群為旅行代理商或團體。"},{"q":"「會展價」(Convention Rate)是給誰提供的優惠?","opts":["會議及展覽的與會人士","航空公司員工","旅遊從業員","長期住客"],"a":0,"note":"會展價是會議展覽地附近酒店給與會人士的優惠。"},{"q":"「會展價」的情況與哪種房價類似?","opts":["團體價","正價","公司價","周末價"],"a":0,"note":"教材指會展價情況與團體價類似。"},{"q":"「公司價」(Corporate Rate)的安排方式是?","opts":["公司或社團與酒店開設公司戶口,提供掛賬及優惠","須即場現金支付","只限單次入住","不提供任何折扣"],"a":0,"note":"公司價涉及公司與酒店開設戶口,提供掛賬及優惠。"},{"q":"「公司價」的目標客群是?","opts":["公司或社團","個別旅客","航空公司員工","旅遊從業員"],"a":0,"note":"公司價目標客群為公司或社團。"},{"q":"「旅遊同業價」(Travel Industry Rate)是給誰的優惠?","opts":["旅遊從業員","航空公司員工","公司客戶","一般公眾"],"a":0,"note":"旅遊同業價是酒店為旅遊從業員提供的住宿優惠。"},{"q":"「商務價」(Commercial Rate)是給誰的價格?","opts":["不經常入住的個別商務旅客","團體旅客","長期住客","航空公司員工"],"a":0,"note":"商務價是給不經常入住的個別商務旅客的價格。"},{"q":"「套票價」(Package Rate)包括甚麼?","opts":["酒店住宿、用品、設施及個別服務","只包括房間","只包括早餐","只包括交通"],"a":0,"note":"套票價包括住宿用品設施及個別服務。"},{"q":"「套票價」多用於甚麼情況?","opts":["淡季,以增加設施使用量及入住率","旺季,以提高收益","只限節假日推出","只限行政套房"],"a":0,"note":"套票價多用於淡季以增加設施使用量及入住率。"},{"q":"「周末價」(Weekend Rate)主要為誰而設?","opts":["度假顧客","商務旅客","航空公司員工","旅遊從業員"],"a":0,"note":"周末價為度假顧客提供住房優惠。"},{"q":"為何個別商務客較多的酒店會推出「周末價」?","opts":["因為假日房間出租率較低,推優惠提升入住率","因為周末房價必然最貴","因為法律規定必須設有周末價","與入住率無關"],"a":0,"note":"商務客多的酒店假日出租率低,故推周末價提升入住率。"},{"q":"以下哪種房價種類的折扣通常「因人數眾多」而較大?","opts":["團體價","商務價","航空公司價","旅遊同業價"],"a":0,"note":"團體價因訂房人數眾多而折扣較大。"},{"q":"以下哪種房價種類與「開設公司戶口及掛賬」有關?","opts":["公司價","正價","套票價","周末價"],"a":0,"note":"公司價涉及開設公司戶口及掛賬安排。"},{"q":"一位商務旅客不經常出差入住,應該適用哪種房價?","opts":["商務價","團體價","套票價","周末價"],"a":0,"note":"商務價正是為不經常入住的個別商務旅客而設。"},{"q":"一間酒店位置偏遠、附近缺乏餐廳,最適合採用哪種計價方式?","opts":["美式計價(AP)","歐式計價(EP)","歐陸式計價(CP)","修正美式計價(MAP)"],"a":0,"note":"美式計價適合位置偏遠、難以在外用餐的酒店。"},{"q":"一位商務旅客只需要在酒店用早餐,其餘時間在外用膳,最適合哪種計價方式?","opts":["歐陸式計價(CP)","美式計價(AP)","修正美式計價(MAP)","歐式計價(EP)"],"a":0,"note":"歐陸式計價方便只在酒店用早餐的客人。"},{"q":"一位旅客希望有最大彈性自由選擇餐廳,不想被酒店餐飲束縛,最適合哪種計價方式?","opts":["歐式計價(EP)","美式計價(AP)","修正美式計價(MAP)","歐陸式計價(CP)"],"a":0,"note":"歐式計價只包括房間,客人有更大彈性選擇餐飲。"},{"q":"一位旅客早出晚歸,在外用午餐,但希望早晚兩餐在酒店解決,最適合哪種計價方式?","opts":["修正美式計價(MAP)","歐式計價(EP)","歐陸式計價(CP)","美式計價(AP)"],"a":0,"note":"修正美式計價方便早出晚歸、只在外用午餐的客人。"},{"q":"一間旅行社為30人團體訂房,應期望獲得哪種房價?","opts":["團體價","正價","商務價","航空公司價"],"a":0,"note":"團體訂房因人數眾多,應獲團體價的較大折扣。"},{"q":"一間跨國公司經常安排海外僱員來港住宿,應與酒店建立哪種合作關係以獲優惠?","opts":["開設公司戶口,享公司價","只能使用正價","只能使用周末價","只能使用套票價"],"a":0,"note":"公司可與酒店開設公司戶口,享有公司價優惠及掛賬安排。"},{"q":"以下何者是酒店透過「加價」策略增加收入的做法?","opts":["把原本不包括在定價的收費項目調高","降低所有客房定價","提高所有折扣","取消所有收費項目"],"a":0,"note":"加價是把不包括在定價的收費項目調高。"},{"q":"以下何者是酒店透過「減價」策略吸引顧客的做法?","opts":["定價維持不變,但提高折扣幅度","提高定價及折扣","降低服務質素","取消所有優惠"],"a":0,"note":"減價策略是定價不變而提高折扣幅度。"},{"q":"為何酒店在淡季較常推出套票價及周末價?","opts":["以吸引旅客入住,提升入住率及設施使用量","因為淡季房間必須加價","因為法律規定淡季必須有優惠","與入住率無關"],"a":0,"note":"淡季推出優惠有助提升入住率及設施使用量。"},{"q":"以下哪一項因素不屬於教材列出影響房價的因素?","opts":["酒店員工的國籍(非教材因素)","旅遊季節節慶及活動","房間的級別","顧客類別"],"a":0,"note":"員工國籍不在教材列出的房價影響因素之列。"},{"q":"以下哪一項因素屬於教材列出影響房價的因素?","opts":["租住時間長短","酒店的裝修風格(非主要因素)","酒店老闆的國籍(非教材因素)","酒店建築年份(非教材因素)"],"a":0,"note":"租住時間長短是教材明確列出的影響房價因素之一。"},{"q":"以下描述:「房價包括房間及早餐,方便只用早餐的客人」對應哪種計價方式?","opts":["歐陸式計價(CP)","歐式計價(EP)","修正美式計價(MAP)","美式計價(AP)"],"a":0,"note":"此描述完全對應歐陸式計價(CP)。"},{"q":"以下描述:「房價只包括房間本身,客人自行選擇餐飲」對應哪種計價方式?","opts":["歐式計價(EP)","歐陸式計價(CP)","修正美式計價(MAP)","美式計價(AP)"],"a":0,"note":"此描述完全對應歐式計價(EP)。"},{"q":"以下描述:「房價包括三餐或四餐,適合偏遠地區酒店」對應哪種計價方式?","opts":["美式計價(AP)","歐式計價(EP)","歐陸式計價(CP)","修正美式計價(MAP)"],"a":0,"note":"此描述完全對應美式計價(AP)。"},{"q":"一家人旅客希望三餐都在酒店解決,以省卻外出用膳安排交通的麻煩,最適合哪種計價方式?","opts":["美式計價(AP)","歐式計價(EP)","歐陸式計價(CP)","修正美式計價(MAP)"],"a":0,"note":"美式計價包含三餐,最適合希望三餐都在酒店解決的家庭旅客。"}]},{"n":5,"title":"計算酒店銷售收入的方法","tag":"REVENUE CALCULATION","qs":[{"q":"教材指出評量酒店營業狀況與盈利時,業界會利用多少個指標?","opts":["三個指標","兩個指標","四個指標","五個指標"],"a":0,"note":"三個指標為入住率、每日平均房價及每間可銷售房收入。"},{"q":"以下哪一項不是教材列出的三個主要銷售收入指標?","opts":["顧客滿意度(非本主題三大指標)","入住率","每日平均房價","每間可銷售房收入"],"a":0,"note":"顧客滿意度不屬於本主題三個核心財務指標。"},{"q":"入住率的計算公式是?","opts":["已出售客房數目÷酒店客房總數×100%","客房總收入÷已出售客房數目","客房總收入÷酒店客房總數","入住顧客人數÷入住房數目"],"a":0,"note":"入住率=已出售客房數目÷酒店客房總數×100%。"},{"q":"入住率100%代表甚麼?","opts":["全部酒店客房已經出售","酒店客房全部空置","酒店客房一半出售","與客房銷售無關"],"a":0,"note":"入住率100%代表全部客房已出售。"},{"q":"為何酒店很難達到100%入住率?","opts":["常有部分客房需要維修、或預留作貴賓或應急使用","因為法律規定不能達到100%","因為顧客不願入住滿房酒店","與客房維修無關"],"a":0,"note":"部分客房常需維修或預留特殊用途,難以達到100%。"},{"q":"「超額預訂」是指甚麼情況?","opts":["出現超過100%的預計入住率","入住率低於50%","客房全部空置","客房全部維修中"],"a":0,"note":"超額預訂即預計入住率超過100%。"},{"q":"酒店為何會容許超額預訂?","opts":["預計部分客人會退訂或不出現,以爭取高入住率","因為酒店房間不足","因為法律要求","與入住率無關"],"a":0,"note":"酒店預計退訂或不出現的情況,容許超額預訂以爭取高入住率。"},{"q":"「每日平均房價」的英文簡稱是?","opts":["ADR","RevPAR","SRR","ARR(此為評級指標簡稱,非本主題)"],"a":0,"note":"每日平均房價(Average Daily Rate)簡稱ADR。"},{"q":"每日平均房價(ADR)的計算公式是?","opts":["客房總收入÷已出售客房數目","已出售客房數目÷酒店客房總數","客房總收入÷酒店客房總數","入住顧客人數÷入住房數目"],"a":0,"note":"ADR=客房總收入÷已出售客房數目。"},{"q":"ADR越高代表甚麼?","opts":["訂房部銷售能力越高","入住率必然越低","酒店規模越小","與銷售能力無關"],"a":0,"note":"ADR越高代表訂房部銷售能力越高。"},{"q":"ADR通常用來與甚麼作比較?","opts":["以往同一段時間(如最旺兩個月)的ADR","與其他行業的平均薪金比較","與匯率走勢比較","與人口增長率比較"],"a":0,"note":"ADR通常與以往同期(如最旺兩個月)數據比較。"},{"q":"ADR可以用來評估甚麼?","opts":["酒店競爭力及財務表現","員工工作滿意度","酒店的環保表現","顧客的忠誠度"],"a":0,"note":"ADR可評估酒店競爭力,反映財務表現。"},{"q":"「每間可銷售房收入」的英文簡稱是?","opts":["RevPAR","ADR","SRR","BM"],"a":0,"note":"每間可銷售房收入(Revenue Per Available Room)簡稱RevPAR。"},{"q":"每間可銷售房收入(RevPAR)的計算公式是?","opts":["客房總收入÷酒店客房總數","客房總收入÷已出售客房數目","已出售客房數目÷酒店客房總數","入住顧客人數÷入住房數目"],"a":0,"note":"RevPAR=客房總收入÷酒店客房總數。"},{"q":"RevPAR反映甚麼?","opts":["每間客房能提供多少收入","酒店員工人數","酒店的星級評分","酒店的地理位置"],"a":0,"note":"RevPAR反映每間客房能提供的收入。"},{"q":"RevPAR越高代表甚麼(在成本固定時)?","opts":["酒店收入及利潤也越多","酒店入住率必然為0%","酒店規模必然縮小","與利潤無關"],"a":0,"note":"RevPAR越高,在成本固定時,利潤也會越多。"},{"q":"RevPAR通常用來比較甚麼?","opts":["同類酒店的盈利能力","不同行業的盈利能力","員工薪酬水平","匯率走勢"],"a":0,"note":"RevPAR用來比較同類酒店的盈利能力。"},{"q":"三項指標之間有何數學關係?","opts":["RevPAR = ADR × 入住率","ADR = RevPAR × 入住率","入住率 = ADR × RevPAR","三者沒有數學關係"],"a":0,"note":"教材明確指出RevPAR=ADR×入住率。"},{"q":"「每入住房顧客人數」的計算公式是?","opts":["酒店入住顧客人數÷入住房數目","客房總收入÷入住房數目","已出售客房數目÷入住顧客人數","入住房數目÷客房總數"],"a":0,"note":"每入住房顧客人數=入住顧客人數÷入住房數目。"},{"q":"每房間住客人數越多,代表甚麼?","opts":["所消耗的客房用品及設施使用量越高","入住率必然為100%","ADR必然下降","RevPAR必然為零"],"a":0,"note":"每房間住客越多,消耗的用品及設施使用量越高。"},{"q":"客房銷售在哪類酒店中較次要?","opts":["賭場酒店及會議酒店","賓館和經濟型酒店","公路酒店","近郊酒店"],"a":0,"note":"教材指賭場酒店及會議酒店的客房銷售較次要。"},{"q":"客房銷售在哪類酒店中十分重要?","opts":["賓館和經濟型酒店","賭場酒店","會議酒店","五星級豪華酒店(非教材對比對象)"],"a":0,"note":"教材指賓館和經濟型酒店的客房銷售十分重要。"},{"q":"為何賭場酒店的客房銷售相對次要?","opts":["因為賭場酒店的主要收入來源可能是博彩及娛樂消費","因為賭場酒店沒有客房","因為賭場酒店房價必然是零","因為賭場酒店入住率必然是100%"],"a":0,"note":"賭場酒店收入來源多元(如博彩消費),客房銷售相對次要。"},{"q":"某酒店有200間客房,某日售出150間,入住率是多少?","opts":["75%","50%","100%","25%"],"a":0,"note":"150÷200×100%=75%。"},{"q":"某酒店有100間客房,某日售出120間(超額預訂),入住率是多少?","opts":["120%","100%","80%","150%"],"a":0,"note":"120÷100×100%=120%,屬超額預訂情況。"},{"q":"某酒店客房總收入為$60,000,已售出60間客房,ADR是多少?","opts":["$1,000","$600","$2,000","$500"],"a":0,"note":"60,000÷60=$1,000。"},{"q":"某酒店客房總收入為$80,000,共有100間客房(全部可銷售),RevPAR是多少?","opts":["$800","$80","$8,000","$400"],"a":0,"note":"80,000÷100=$800。"},{"q":"某酒店ADR為$1,000,入住率為80%,RevPAR應是多少?","opts":["$800","$1,000","$1,250","$80"],"a":0,"note":"RevPAR=ADR×入住率=1,000×0.8=$800。"},{"q":"某酒店ADR為$1,200,入住率為75%,RevPAR應是多少?","opts":["$900","$1,200","$1,600","$75"],"a":0,"note":"RevPAR=1,200×0.75=$900。"},{"q":"某酒店RevPAR為$700,入住率為70%,ADR應是多少?","opts":["$1,000","$700","$490","$70"],"a":0,"note":"ADR=RevPAR÷入住率=700÷0.7=$1,000。"},{"q":"某酒店有50間客房入住,共有120位顧客入住,每入住房顧客人數是多少?","opts":["2.4人","50人","120人","0.4人"],"a":0,"note":"120÷50=2.4人。"},{"q":"若某酒店ADR持續上升但入住率大幅下跌,RevPAR會如何變化?","opts":["視乎兩者變化幅度,RevPAR可能上升、下跌或不變","RevPAR必然上升","RevPAR必然下跌","RevPAR必然維持不變"],"a":0,"note":"RevPAR=ADR×入住率,兩個變數同時變化時,結果視乎具體數值。"},{"q":"若某酒店入住率長期維持100%,但ADR偏低,反映甚麼?","opts":["酒店可能定價過低,未能充分利用高需求提升收入","酒店經營非常成功,無需檢討","酒店應立即結業","與定價策略無關"],"a":0,"note":"高入住率但低ADR,反映定價可能過低,未能有效提升收入。"},{"q":"為何ADR與RevPAR都能「反映酒店財務表現」但用途略有不同?","opts":["ADR著重銷售能力,RevPAR著重整體資產(全部客房)的收入效益","兩者完全相同,沒有分別","ADR只用於淡季,RevPAR只用於旺季","兩者與財務表現皆無關"],"a":0,"note":"ADR反映銷售能力;RevPAR反映全部客房資產的整體收入效益。"},{"q":"為何RevPAR比單純的入住率更能反映酒店的整體收入表現?","opts":["因為RevPAR同時考慮了入住率及房價水平","因為RevPAR不受入住率影響","因為RevPAR只計算已售客房","RevPAR與收入無關"],"a":0,"note":"RevPAR同時反映入住率及房價,較單一入住率更全面。"},{"q":"「超額預訂」策略對酒店有何潛在風險?","opts":["若客人如期出現超出可用客房,可能需安排客人轉往其他酒店","入住率必然下跌至0%","ADR必然大幅上升","與客戶服務無關"],"a":0,"note":"若退訂客人少於預期,超額預訂可能導致爆滿及客人需轉介他店。"},{"q":"以下何者是酒店提高RevPAR的可行方法?","opts":["同時提升入住率及/或每日平均房價","只需降低房價","只需降低入住率","與定價及入住率皆無關"],"a":0,"note":"提升入住率或ADR(或兩者)均有助提高RevPAR。"},{"q":"以下何者最能總結「入住率」指標的作用?","opts":["反映客房實際出售的比例","反映每間房收入","反映顧客人數","反映酒店星級"],"a":0,"note":"入住率反映客房實際出售的比例。"},{"q":"以下何者最能總結「ADR」指標的作用?","opts":["反映已售客房的平均收費水平及銷售能力","反映所有客房(包括未售出)的平均收入","反映入住顧客人數","反映酒店規模"],"a":0,"note":"ADR反映已售客房的平均收費及銷售能力。"},{"q":"以下何者最能總結「RevPAR」指標的作用?","opts":["反映全部客房(不論是否售出)平均能提供的收入","只反映已售客房收入","只反映入住率","與收入無關"],"a":0,"note":"RevPAR以酒店客房總數為分母,反映全部客房的平均收入效益。"},{"q":"若酒店A的RevPAR高於酒店B,可以初步推斷甚麼?","opts":["酒店A在入住率及/或房價方面的整體表現可能優於酒店B","酒店A的規模一定較大","酒店A的星級一定較高","與經營表現無關"],"a":0,"note":"RevPAR較高反映入住率及房價的組合表現較佳。"},{"q":"為何管理層在制定房價策略時需要同時考慮入住率與ADR?","opts":["單一追求高入住率或高房價,未必能達致最佳的RevPAR","只需追求最高入住率即可","只需追求最高房價即可","兩者對收入完全沒有影響"],"a":0,"note":"RevPAR是兩者的乘積,需平衡考慮以達致最佳整體收入。"},{"q":"以下哪一項是評估「訂房部銷售能力」最直接相關的指標?","opts":["ADR","入住率","RevPAR","每入住房顧客人數"],"a":0,"note":"教材指ADR越高,訂房部銷售能力越高。"},{"q":"以下哪一項是評估「整體客房資產收入效益」最直接相關的指標?","opts":["RevPAR","ADR","入住率","每入住房顧客人數"],"a":0,"note":"RevPAR以總客房數為基礎,反映整體資產的收入效益。"},{"q":"以下哪一項是評估「客房實際出售比例」最直接相關的指標?","opts":["入住率","ADR","RevPAR","每入住房顧客人數"],"a":0,"note":"入住率直接反映客房實際出售的比例。"},{"q":"某酒店客房總數為80間,某日售出64間,客房總收入為$96,000,求該日ADR。","opts":["$1,500","$1,200","$800","$2,000"],"a":0,"note":"ADR=96,000÷64=$1,500。"},{"q":"承上題,求該日的入住率。","opts":["80%","64%","96%","100%"],"a":0,"note":"入住率=64÷80×100%=80%。"},{"q":"承上題,求該日的RevPAR。","opts":["$1,200","$1,500","$800","$2,000"],"a":0,"note":"RevPAR=96,000÷80=$1,200,亦可用ADR×入住率=1,500×0.8驗證=1,200。"},{"q":"為何酒店管理層需要定期監察ADR及RevPAR的走勢?","opts":["有助及時調整定價策略及評估財務表現","純粹為滿足政府申報要求","與日常營運決策無關","只在酒店開業首年需要監察"],"a":0,"note":"定期監察有助管理層適時調整策略,評估財務健康狀況。"},{"q":"以下何者最能體現「每入住房顧客人數」對客房用品管理的意義?","opts":["住客人數越多,毛巾洗漱用品等消耗量相應增加","此指標與用品消耗完全無關","此指標只影響房價","此指標只影響入住率"],"a":0,"note":"每房住客人數直接影響客房用品及設施的消耗程度。"},{"q":"以下何者最能總結三項核心收入指標(入住率、ADR、RevPAR)的關係?","opts":["三者互相關聯,RevPAR是入住率與ADR的乘積結果","三者完全獨立,互不影響","入住率是ADR與RevPAR的乘積","ADR是入住率與RevPAR的乘積"],"a":0,"note":"RevPAR=ADR×入住率,三者環環相扣。"},{"q":"酒店管理層若只著重「入住率」而忽略「ADR」,可能有何風險?","opts":["可能以過低房價衝入住率,削弱整體收入及利潤","入住率與收入完全無關","ADR與酒店盈利無關","不會有任何風險"],"a":0,"note":"一味追求入住率而犧牲房價,可能導致RevPAR偏低,損害整體收益。"},{"q":"承接上題,較理想的策略是甚麼?","opts":["平衡入住率與房價,以達致最佳的RevPAR","只追求最高房價,不理會入住率","只追求最高入住率,不理會房價","完全依賴超額預訂"],"a":0,"note":"平衡兩者以達致最佳整體收入(RevPAR)是較理想的策略。"},{"q":"為何教材將「入住率」「ADR」及「RevPAR」並列為酒店銷售收入的核心衡量指標?","opts":["三者從不同角度全面反映酒店的銷售表現及財務狀況","三者是完全相同的指標,只是名稱不同","三者只適用於五星級酒店","三者與酒店財務表現無關"],"a":0,"note":"三項指標分別從出售比例銷售能力及整體收入效益反映表現,缺一不可。"},{"q":"以下何者是酒店評估自身表現時,選擇「同期比較」(如與去年同月比較)ADR的原因?","opts":["扣除季節性因素影響,更準確評估實際表現變化","同期比較與季節性因素無關","同期比較純粹為方便報表格式","同期比較沒有任何實際意義"],"a":0,"note":"同期比較有助扣除季節性波動,更準確反映實際經營表現的變化。"},{"q":"某酒店客房總數為300間,某日售出210間,入住率是多少?","opts":["70%","60%","80%","90%"],"a":0,"note":"入住率=210÷300×100%=70%。"},{"q":"某酒店客房總收入為$45,000,已售出30間客房,ADR是多少?","opts":["$1,500","$1,000","$2,000","$900"],"a":0,"note":"ADR=45,000÷30=$1,500。"},{"q":"某酒店客房總收入為$54,000,共有90間客房(全部可銷售),RevPAR是多少?","opts":["$600","$540","$900","$450"],"a":0,"note":"RevPAR=54,000÷90=$600。"},{"q":"某酒店ADR為$900,入住率為60%,RevPAR應是多少?","opts":["$540","$900","$600","$1,500"],"a":0,"note":"RevPAR=ADR×入住率=900×0.6=$540。"},{"q":"某酒店RevPAR為$450,ADR為$900,入住率應是多少?","opts":["50%","60%","90%","45%"],"a":0,"note":"入住率=RevPAR÷ADR=450÷900=50%。"}]},{"n":6,"title":"酒店三類管理模式","tag":"HOTEL MANAGEMENT MODELS","qs":[{"q":"教材列出酒店有多少類管理模式?","opts":["三類","兩類","四類","五類"],"a":0,"note":"三類管理模式為獨立擁有及經營、管理合約及特許經營。"},{"q":"以下哪一項不是教材列出的酒店管理模式?","opts":["政府直接經營(非本教材三大模式)","獨立擁有及經營","管理合約","特許經營"],"a":0,"note":"政府直接經營不在本主題三類管理模式之列。"},{"q":"獨立酒店的擁有人享有甚麼好處?","opts":["較大自主性","保證盈利","無需承擔風險","集資能力最強"],"a":0,"note":"獨立酒店擁有人享有較大自主性。"},{"q":"獨立酒店擁有人須承擔甚麼?","opts":["完全自負盈虧","只承擔部分虧損","不承擔任何虧損","盈虧由管理公司承擔"],"a":0,"note":"獨立酒店擁有人完全自負盈虧。"},{"q":"若獨立酒店東主缺乏現代酒店管理專業知識,會有何影響?","opts":["影響經營效率及競爭力","完全沒有影響","反而提升競爭力","只影響員工士氣"],"a":0,"note":"缺乏專業知識會影響經營效率及競爭力,是獨立經營的壞處。"},{"q":"獨立酒店在營運上有何優勢?","opts":["有較大彈性","必然成本最低","必然規模最大","必然入住率最高"],"a":0,"note":"獨立酒店營運上有較大彈性。"},{"q":"獨立酒店在集資方面有何劣勢?","opts":["集資能力較低,難以擴張","集資能力最強","無需任何資金","集資能力與經營模式無關"],"a":0,"note":"獨立酒店集資能力較低,難以擴張。"},{"q":"獨立酒店較難達到甚麼效益?","opts":["規模經濟效益","客房清潔效率","員工滿意度","顧客滿意度"],"a":0,"note":"獨立酒店難以達到規模經濟效益。"},{"q":"管理合約模式下,酒店產權擁有人負責提供甚麼?","opts":["土地、酒店物業及營運資金","日常業務運作","專業管理技能","品牌名稱"],"a":0,"note":"產權擁有人提供土地物業及營運資金。"},{"q":"管理合約模式下,酒店產權擁有人是否介入日常業務運作?","opts":["不會介入","會全面介入","只在虧損時介入","與管理公司共同運作"],"a":0,"note":"產權擁有人不會介入公司日常業務運作。"},{"q":"管理合約模式下,誰承擔盈利虧損?","opts":["酒店產權擁有人","酒店管理公司","兩者平均分擔(教材未特別提及此分擔方式)","政府"],"a":0,"note":"產權擁有人承擔盈利虧損。"},{"q":"管理合約模式下,酒店管理公司負責甚麼?","opts":["日常業務運作","提供土地及資金","承擔盈利虧損","擁有酒店產權"],"a":0,"note":"管理公司負責日常業務運作,運用專業知識技能。"},{"q":"管理合約模式下,酒店管理公司如何獲得收入?","opts":["收取酬金或花紅","擁有酒店產權","分享土地價值","無償提供服務"],"a":0,"note":"管理公司收取酬金或花紅作為報酬。"},{"q":"管理合約模式對酒店擁有人的好處是?","opts":["只需投入資金,不必參與營運,風險較低","必然賺取最大利潤","無需承擔任何虧損風險","可完全控制日常運作"],"a":0,"note":"擁有人好處包括只需投入資金及風險較低。"},{"q":"管理合約模式對酒店擁有人還有甚麼好處?","opts":["提升擁有者地位及知名度","保證100%入住率","免除所有稅務","無需支付任何費用"],"a":0,"note":"教材指出可提升擁有者地位及知名度。"},{"q":"管理合約模式對酒店擁有人的壞處是?","opts":["利潤會被攤薄,依賴性高","必然虧本","失去產權","無法獲得任何收益"],"a":0,"note":"擁有人利潤會被攤薄,對管理公司依賴性高。"},{"q":"管理合約模式對酒店管理公司的好處是?","opts":["無需資本便能擴展業務,收益較穩定","擁有酒店產權","承擔全部虧損","無需支付任何成本"],"a":0,"note":"管理公司好處包括無需資本擴展業務及收益穩定。"},{"q":"管理合約模式對酒店管理公司的壞處是?","opts":["分享部分或定額利潤,股權控制被動","必然虧損","無法收取任何酬金","須承擔全部經營風險"],"a":0,"note":"管理公司壞處包括利潤有限及股權控制被動。"},{"q":"管理合約模式對酒店業務整體有何好處?","opts":["提升管理質素,得到酒店集團支援,建立新品牌","必然降低服務質素","必然增加營運成本","難以獲得任何支援"],"a":0,"note":"整體業務可提升管理質素並得到集團支援。"},{"q":"管理合約模式對酒店業務整體有何壞處?","opts":["投資者與管理者關注目標不一,可能引起經營糾紛","完全沒有任何壞處","必然導致酒店結業","與管理質素無關"],"a":0,"note":"投資者重視盈利,管理者重視酬金聲譽,目標不一致或生糾紛。"},{"q":"「特許經營」是指甚麼?","opts":["大型連鎖集團把特許經營權售予投資者,讓其使用集團品牌經營","集團直接派員管理酒店","集團完全放棄對酒店的控制權","投資者完全自創品牌經營"],"a":0,"note":"特許經營是集團售出經營權,讓投資者用其品牌經營。"},{"q":"加盟特許經營時,投資者首先須支付甚麼?","opts":["一筆申請費用予集團","每月的員工薪金","集團的全部股份","土地及物業的購買費"],"a":0,"note":"投資者先支付一筆申請費用予集團。"},{"q":"加盟特許經營後,投資者每年須向集團支付甚麼?","opts":["特許權費、市場推廣費及訂房系統行政費等","集團全年盈利的一半","集團股東的股息","集團員工的花紅"],"a":0,"note":"每年須支付特許權費市場推廣費及訂房系統行政費等。"},{"q":"加盟特許經營的酒店可以使用甚麼?","opts":["集團品牌名稱和經營模式","任何品牌名稱","自訂的採購網絡","與集團無關的營運系統"],"a":0,"note":"加盟商可使用集團品牌名稱和經營模式。"},{"q":"加盟特許經營的酒店須遵從甚麼?","opts":["指定的採購網絡、質量控制準則及營運系統","自行制定的所有規則","競爭對手的營運模式","無需遵從任何規則"],"a":0,"note":"須遵從集團指定的採購網絡質量控制及營運系統。"},{"q":"特許經營模式下,集團對加盟酒店有何程度的控制權?","opts":["有一定的控制權","完全沒有控制權","擁有絕對控制權及產權","控制權由政府決定"],"a":0,"note":"集團對加盟酒店有一定控制權。"},{"q":"特許經營模式下,管理權與產權基本上屬於誰?","opts":["仍屬於加盟的投資者","完全屬於集團總部","屬於政府","屬於顧客"],"a":0,"note":"管理權與產權基本上仍屬於加盟的投資者。"},{"q":"教材舉例全球最大的酒店集團包括?","opts":["美國萬豪集團及洲際酒店集團","香港迪士尼樂園","香港海洋公園","國泰航空"],"a":0,"note":"教材舉例萬豪集團及洲際酒店集團為全球最大酒店集團。"},{"q":"特許經營模式對加盟特許經營者的好處是?","opts":["縮短開業成長期,掌控制權","無需支付任何費用","必然利潤最大化","無需遵從任何準則"],"a":0,"note":"加盟者好處包括縮短開業成長期及掌控制權。"},{"q":"特許經營模式對加盟特許經營者的壞處是?","opts":["較為被動,有龐大固定支出","無法獲得集團支援","無法使用集團品牌","風險最高"],"a":0,"note":"加盟者壞處包括較被動及有龐大固定支出。"},{"q":"特許經營模式對擁有特許經營權的集團有何好處?","opts":["收入穩定,風險較低,擴展迅速","須承擔加盟酒店的全部虧損","無法收取任何費用","必然虧損"],"a":0,"note":"集團好處包括收入穩定風險較低及擴展迅速。"},{"q":"特許經營模式對擁有特許經營權的集團有何壞處?","opts":["收益有限,品質管理較差","必然承擔全部虧損","無法擴展業務","失去品牌價值"],"a":0,"note":"集團壞處包括收益有限及品質管理較難完全掌控。"},{"q":"特許經營模式對酒店業務整體有何好處?","opts":["利用已有商譽,成本效益較高,較能保證入住率","必然增加經營成本","必然難以獲得支援","必然降低入住率"],"a":0,"note":"整體業務好處包括利用商譽成本效益及入住率保證。"},{"q":"特許經營模式對酒店業務整體有何壞處?","opts":["難以創新,難以建立新品牌","必然提升創新能力","必然容易建立獨立品牌","與品牌發展無關"],"a":0,"note":"特許經營下較難創新及建立獨立新品牌。"},{"q":"以下哪一種管理模式的酒店擁有人「較大自主性但完全自負盈虧」?","opts":["獨立擁有及經營","管理合約","特許經營","合資經營(非本教材三大模式)"],"a":0,"note":"獨立擁有及經營的特點正是較大自主性及自負盈虧。"},{"q":"以下哪一種管理模式「產權擁有人提供資金但不參與日常運作」?","opts":["管理合約","獨立擁有及經營","特許經營","合資經營(非本教材三大模式)"],"a":0,"note":"管理合約模式下產權擁有人提供資金但不參與日常運作。"},{"q":"以下哪一種管理模式「投資者使用集團品牌但保留產權」?","opts":["特許經營","獨立擁有及經營","管理合約","合資經營(非本教材三大模式)"],"a":0,"note":"特許經營模式下投資者使用集團品牌,但管理權產權仍屬投資者。"},{"q":"三種管理模式中,哪一種模式的酒店集團對日常運作介入程度最低?","opts":["獨立擁有及經營","管理合約","特許經營","三者介入程度相同"],"a":0,"note":"獨立擁有及經營沒有外來集團介入,自主程度最高。"},{"q":"三種管理模式中,哪一種模式下管理公司「負責日常運作但不擁有產權」?","opts":["管理合約","獨立擁有及經營","特許經營","合資經營(非本教材三大模式)"],"a":0,"note":"管理合約模式下管理公司負責日常運作,產權仍屬擁有人。"},{"q":"若一位投資者想開設酒店,但缺乏管理經驗,同時希望降低營運風險,最適合採用哪種模式?","opts":["管理合約","獨立擁有及經營","以上兩者皆不適合","必須採用特許經營"],"a":0,"note":"管理合約模式下投資者只需出資,由管理公司負責日常運作,風險較低。"},{"q":"若一位投資者希望使用知名品牌迅速開業,但仍保留產權及部分控制權,最適合採用哪種模式?","opts":["特許經營","獨立擁有及經營","管理合約","合資經營(非本教材三大模式)"],"a":0,"note":"特許經營讓投資者使用知名品牌並保留產權管理權。"},{"q":"若一位投資者希望完全自主經營,不受任何集團規則束縛,最適合採用哪種模式?","opts":["獨立擁有及經營","管理合約","特許經營","合資經營(非本教材三大模式)"],"a":0,"note":"獨立擁有及經營讓投資者完全自主,不受集團規則約束。"},{"q":"為何管理合約模式下「投資者與管理者的目標可能不一致」?","opts":["投資者重視盈利,管理者則重視酬金和聲譽","兩者目標必然完全相同","管理者不在乎任何報酬","投資者不在乎盈利"],"a":0,"note":"教材指出投資者重視盈利,管理者重視酬金和聲譽,存在潛在分歧。"},{"q":"為何特許經營模式下加盟者「較為被動」?","opts":["須遵從集團指定的採購網絡、質量控制及營運系統,自主性受限","加盟者可完全自訂所有規則","加盟者無需遵守任何準則","被動與加盟合約無關"],"a":0,"note":"須遵從集團規則,自主性因而受到一定限制,故較被動。"},{"q":"為何特許經營模式能「縮短開業成長期」?","opts":["加盟者可直接利用集團已建立的品牌商譽及營運系統","加盟者須從零開始建立品牌","加盟者無法使用任何現成系統","與品牌商譽無關"],"a":0,"note":"利用集團現成的品牌商譽及系統,可加快業務發展。"},{"q":"以下何者最能總結「獨立擁有及經營」模式的核心特徵?","opts":["自主性高但集資能力及規模經濟效益較弱","完全依賴集團品牌經營","風險由管理公司承擔","必須支付特許權費"],"a":0,"note":"獨立經營自主性高,但集資及規模經濟方面存在劣勢。"},{"q":"以下何者最能總結「管理合約」模式的核心特徵?","opts":["產權與經營權分離,擁有人出資,管理公司負責營運並收取酬金","擁有人與管理公司必為同一方","擁有人須參與日常所有決策","管理公司須承擔全部盈虧"],"a":0,"note":"管理合約的核心是產權與經營權分離的安排。"},{"q":"以下何者最能總結「特許經營」模式的核心特徵?","opts":["投資者使用集團品牌經營,但保留產權及管理權,並向集團繳付相關費用","投資者完全沒有自主權","投資者無需繳付任何費用","集團完全擁有加盟酒店的產權"],"a":0,"note":"特許經營核心是品牌授權使用,投資者保留產權管理權並繳付相關費用。"},{"q":"三種管理模式中,哪一種模式最依賴投資者本身的酒店管理專業知識?","opts":["獨立擁有及經營","管理合約","特許經營","三者依賴程度相同"],"a":0,"note":"獨立經營下若東主缺乏專業知識,將直接影響經營效率及競爭力。"},{"q":"三種管理模式中,哪一種模式最能讓集團「無需資本便能擴展業務」?","opts":["管理合約","獨立擁有及經營","特許經營(此模式集團收取加盟費而非無需資本)","合資經營(非本教材三大模式)"],"a":0,"note":"管理合約模式下管理公司無需出資,即可透過管理酒店擴展業務。"},{"q":"三種管理模式中,哪一種模式最能讓集團「迅速擴展並提升知名度但收益有限」?","opts":["特許經營","獨立擁有及經營","管理合約","合資經營(非本教材三大模式)"],"a":0,"note":"特許經營讓集團透過加盟迅速擴展,但相對收益有限。"},{"q":"香港部分五星級酒店雖使用國際品牌名稱,但由本地公司擁有物業及部分管理權,較貼近哪種模式?","opts":["管理合約或特許經營(視乎具體安排)","必然是獨立擁有及經營","與三種模式皆無關","必然是政府直接經營"],"a":0,"note":"品牌使用但物業產權屬本地公司,符合管理合約或特許經營的特徵。"},{"q":"以下何者是評估應選擇哪種酒店管理模式的合理考慮因素?","opts":["投資者的資金、管理經驗及對控制權的重視程度","只考慮酒店的地理位置","只考慮酒店的星級","只考慮員工人數"],"a":0,"note":"資金管理經驗及對控制權的取向,是選擇管理模式的合理考慮。"},{"q":"以下何者最能體現「規模經濟效益」在酒店業的意義?","opts":["集團式經營可透過集中採購及品牌效應降低單位成本","規模經濟效益只適用於獨立酒店","規模越小成本效益越高","與採購及品牌效應無關"],"a":0,"note":"集團式(管理合約或特許經營)較易透過集中採購等達到規模經濟效益。"},{"q":"若一間酒店集團擁有強大品牌但資金有限,希望在短時間內於多個城市開設分店,最適合採用哪種模式擴展?","opts":["特許經營","獨立擁有及經營","以上兩者皆不適合","必須自行出資興建酒店"],"a":0,"note":"特許經營讓集團憑品牌吸引加盟者出資,毋須自行承擔龐大資金需要。"},{"q":"若一間酒店集團擁有雄厚資金及豐富管理人才,並希望透過管理其他人擁有的物業來擴展業務版圖,同時賺取穩定酬金,最適合採用哪種模式?","opts":["管理合約","特許經營","獨立擁有及經營","合資經營(非本教材三大模式)"],"a":0,"note":"管理合約讓管理公司運用專業人才管理他人物業,賺取酬金。"},{"q":"為何有意見認為「管理合約」模式下,產權擁有人的角色類似「純投資者」?","opts":["因為擁有人只提供資金及物業,不參與日常運作,類似純粹出資的投資角色","因為擁有人須每日參與酒店的實際營運","因為擁有人完全不承擔任何盈虧風險","因為擁有人在此模式下沒有任何產權"],"a":0,"note":"擁有人提供資金物業但不參與日常運作,角色類似純投資者。"},{"q":"若一位酒店投資者最重視「長遠建立自己獨有品牌」而非借助他人品牌,以下哪種模式相對較不適合?","opts":["特許經營","獨立擁有及經營","管理合約(視乎具體安排,較特許經營適合)","三者皆同樣不適合"],"a":0,"note":"特許經營下較難創新及建立獨立新品牌,故不太適合重視自建品牌的投資者。"},{"q":"教材以萬豪集團及洲際酒店集團為例,說明這類全球集團為何毋須擁有全部物業產權仍能大量擴展分店?","opts":["因為集團主要透過管理合約及特許經營等模式擴展業務,而非直接擁有全部物業","因為這些集團只透過獨立擁有及經營模式擴展","因為這些集團的物業必然由政府提供","與擴展模式的選擇無關"],"a":0,"note":"透過管理合約及特許經營,集團可在不擁有物業產權下迅速擴展全球業務。"},{"q":"以下何者最能總結「產權」與「管理權」在三種模式中的分佈關係?","opts":["獨立經營下兩者合一;管理合約下產權屬擁有人管理權屬管理公司;特許經營下兩者基本仍屬投資者","三種模式下產權與管理權必然完全一致","三種模式下管理權必然屬於酒店集團總部","產權與管理權的分佈與管理模式選擇無關"],"a":0,"note":"三種模式下產權與管理權的分佈組合各有不同,是理解三者分別的關鍵。"}]},{"n":7,"title":"酒店的組織架構","tag":"HOTEL ORGANIZATION","qs":[{"q":"酒店部門的劃分方式是?","opts":["按功能劃分部門","按員 "人力資源部","保安部","資訊科技部"],"a":0,"note":"採購部負責統一處理各部門的採購申請及供應商事宜。"},{"q":"以下何者最能總結「前線部門」與「後勤部門」的分別?","opts":["前線部門直接服務顧客並帶來收益,後勤部門則提供內部支援","兩者職責完全相同","後勤部門直接帶來收益,前線部門只提供支援","兩者互不相關,毋須合作"],"a":0,"note":"前線部門面向顧客帶來收益;後勤部門則提供支援配合前線運作。"},{"q":"以下何者最能總結酒店組織架構設計的原則?","opts":["按功能劃分部門,並要求各部門互相配合以提供完整服務","按員工年資劃分部門","各部門必須完全獨立,互不往來","只需前線部門存在,無需後勤部門"],"a":0,"note":"組織架構按功能劃分,並強調各部門的協調合作。"},{"q":"以下何者是「前線部門」與「後勤部門」都需要具備的共同條件?","opts":["有效的部門內部溝通及與其他部門協調的能力","必須直接為顧客帶來收益","必須完全不與其他部門接觸","必須由同一位經理統一管理"],"a":0,"note":"不論前線或後勤部門,均須具備有效溝通協調能力,酒店運作方能暢順。"},{"q":"若酒店要新增一個負責網上訂房系統及數碼行銷的職能,較大機會由哪兩個部門共同參與?","opts":["資訊科技部及營業及市場推廣部","保安部及採購部","人力資源部及工程部","財務部及管家部"],"a":0,"note":"網上訂房涉及資訊科技系統及市場推廣策略,自然由這兩個部門共同參與。"},{"q":"以下何者最能總結酒店各部門「按功能劃分」的好處?","opts":["讓每個部門專注發展所需的專業技能,同時透過協調確保整體服務流暢","令各部門完全無需互相溝通","令酒店可以完全省卻後勤部門","與員工專業發展無關"],"a":0,"note":"按功能劃分有助各部門專注發展專業技能,並透過協調確保服務流暢。"}]},{"n":8,"title":"顧客流程與酒店運作","tag":"GUEST CYCLE","qs":[{"q":"顧客享用酒店服務的整個過程共分為多少個階段?","opts":["四個階段","三個階段","五個階段","兩個階段"],"a":0,"note":"共分為抵埗前、抵埗、入住及離開四個階段。"},{"q":"顧客享用酒店服務的四個階段依次是?","opts":["抵埗前、抵埗、入住、離開","入住、抵埗、離開、抵埗前","抵埗、抵埗前、離開、入住","離開、入住、抵埗、抵埗前"],"a":0,"note":"依次為抵埗前抵埗入住及離開。"},{"q":"「抵埗前」階段,顧客主要與哪個部門聯繫?","opts":["訂房部","管家部","保安部","工程部"],"a":0,"note":"抵埗前顧客向訂房部訂房。"},{"q":"「抵埗前」階段,酒店訂房部的工作包括?","opts":["回答查詢、索取顧客資料、查核客房供應","客房清潔","消防檢查","財務審計"],"a":0,"note":"訂房部負責回答查詢索取資料及查核客房供應。"},{"q":"「抵埗前」階段,訂房部確定訂房後會做甚麼?","opts":["連同繳款方法知會顧客","立即為客人辦理入住","立即分配行政套房","取消所有訂房記錄"],"a":0,"note":"訂房部會連同繳款方法知會顧客。"},{"q":"「抵埗前」階段,顧客會考慮甚麼因素?","opts":["參考多項資料,訂位的難易程度","只考慮房價","只考慮酒店星級","與訂位難易無關"],"a":0,"note":"顧客會參考多項資料,訂位難易程度也有影響。"},{"q":"「抵埗」階段,顧客首先前往哪個部門辦理登記手續?","opts":["款接部","管家部","保安部","財務部"],"a":0,"note":"顧客前往款接部辦理登記手續。"},{"q":"「抵埗」階段,哪個部門的員工會立刻上前致意歡迎?","opts":["禮賓部","財務部","人力資源部","工程部"],"a":0,"note":"禮賓部員工會立刻上前致意歡迎。"},{"q":"「抵埗」階段,誰協助客人前往款接部辦理登記?","opts":["行李生","保安員","調酒師","電話接線生"],"a":0,"note":"行李生協助客人前往款接部辦理登記手續。"},{"q":"「抵埗」階段,款接部會向顧客索取甚麼?","opts":["個人資料","信用卡密碼","家庭成員資料","銀行戶口結餘"],"a":0,"note":"款接部向顧客索取個人資料。"},{"q":"「抵埗」階段,款接部會核對甚麼?","opts":["酒店訂房部記錄","顧客的社交媒體帳號","顧客的旅遊保險單","顧客的駕駛執照"],"a":0,"note":"款接部核對酒店訂房部的記錄。"},{"q":"「抵埗」階段,顧客須在甚麼文件上簽名確認?","opts":["客房登記表格","保密協議","員工守則","消防疏散指引"],"a":0,"note":"顧客在客房登記表格上簽名確認完成登記。"},{"q":"「抵埗」階段,款接員完成登記後會交給顧客甚麼?","opts":["客房鑰匙及個人證件","員工制服","財務報表","市場推廣單張"],"a":0,"note":"款接員把客房鑰匙及個人證件交給顧客。"},{"q":"若客人事前並無辦理訂房,款接員抵埗時會如何處理?","opts":["查核有否客房可提供,同時向顧客推銷介紹設施和房價","立即拒絕該客人入住","直接安排最貴的房間","要求客人自行離開尋找其他酒店"],"a":0,"note":"款接員會查核可提供的客房並推銷相關設施房價。"},{"q":"「入住」階段是指甚麼歷程?","opts":["顧客由入住至退房的歷程","顧客抵達酒店大門的一刻","顧客訂房的過程","顧客結賬離開後的階段"],"a":0,"note":"入住階段包括由入住至退房的整個歷程。"},{"q":"「入住」階段,顧客會體驗到甚麼?","opts":["酒店各部門的服務質素","只有前堂部的服務","只有管家部的服務","只有保安部的服務"],"a":0,"note":"入住階段顧客會體驗酒店各部門的服務質素。"},{"q":"「入住」階段,顧客有服務要求、投訴或查詢時,通常先找哪個部門?","opts":["前堂部","工程部","採購部","人力資源部"],"a":0,"note":"顧客通常先找前堂部處理服務要求投訴及查詢。"},{"q":"若前堂部能提供較顧客原先預期更佳的服務,可帶來甚麼效果?","opts":["增加顧客日後再光顧的機會","必然導致成本大增","與顧客忠誠度無關","必然引起投訴"],"a":0,"note":"更佳服務有助增加顧客日後再光顧的機會。"},{"q":"「入住」階段,哪個部門負責客房的清潔?","opts":["管家部","前堂部","保安部","採購部"],"a":0,"note":"管家部負責客房的清潔工作。"},{"q":"「入住」階段,保安部的職責包括?","opts":["確保客人財產和人身安全","負責客房清潔","負責市場推廣","負責財務審計"],"a":0,"note":"保安部確保客人財產和人身安全。"},{"q":"保安部在「入住」階段須注意甚麼?","opts":["管家部鑰匙管理,巡查消防通道","財務預算編列","市場推廣策略","顧客歷史檔案更新"],"a":0,"note":"保安部須注意鑰匙管理及巡查消防通道等。"},{"q":"保安部須避免客人受到甚麼滋擾?","opts":["可疑人物滋擾","天氣變化影響","匯率波動影響","交通擠塞影響"],"a":0,"note":"保安部須避免客人受可疑人物滋擾。"},{"q":"「入住」階段,客人使用各種設施的收費方式通常是?","opts":["以掛賬形式","必須即時現金支付","必須預先繳付全數","不設任何收費"],"a":0,"note":"客人以掛賬形式使用各種設施。"},{"q":"「掛賬形式」是指甚麼?","opts":["客人先確認使用服務,退房結賬時才一併支付","必須即時支付每項服務費用","只限現金支付","只限信用卡支付"],"a":0,"note":"掛賬即先確認服務,退房時一併支付。"},{"q":"「入住」階段,前堂部會為個別客人(如殘障人士)作出甚麼安排?","opts":["安排使用無障礙通道,並提供特別客房及設施","一律安排相同房型","拒絕特別要求","轉介至其他酒店"],"a":0,"note":"前堂部因應個別需要(如殘障人士)提供特別安排。"},{"q":"「離開」階段,顧客首先要做甚麼?","opts":["到款待處結算所有未繳付費用","立即離開酒店","通知保安部","聯絡訂房部"],"a":0,"note":"顧客到款待處結算所有未繳付費用。"},{"q":"「離開」階段,顧客須交還甚麼?","opts":["鑰匙","制服","員工證","保險單"],"a":0,"note":"顧客須交還客房鑰匙。"},{"q":"「離開」階段,酒店會知會哪個部門檢查房間?","opts":["管家部","財務部","人力資源部","資訊科技部"],"a":0,"note":"酒店知會管家部檢查房間及迷你酒吧。"},{"q":"「離開」階段,管家部的工作是?","opts":["為退房進行清潔檢查","負責結賬","負責市場推廣","負責招聘新員工"],"a":0,"note":"管家部為退房進行清潔檢查。"},{"q":"「離開」階段,除了檢查房間外,還須檢查甚麼?","opts":["迷你酒吧","員工制服","財務報表","市場推廣資料"],"a":0,"note":"退房檢查同時包括迷你酒吧的使用情況。"},{"q":"四個階段中,哪個階段主要涉及「訂房部」的工作?","opts":["抵埗前","抵埗","入住","離開"],"a":0,"note":"抵埗前階段主要涉及訂房部處理訂房。"},{"q":"四個階段中,哪個階段主要涉及「款接部」的登記工作?","opts":["抵埗","抵埗前","入住","離開"],"a":0,"note":"抵埗階段主要涉及款接部辦理登記手續。"},{"q":"四個階段中,哪個階段顧客會全面體驗各部門服務質素?","opts":["入住","抵埗前","抵埗","離開"],"a":0,"note":"入住階段涵蓋由入住至退房整個歷程,全面體驗各部門服務。"},{"q":"四個階段中,哪個階段主要涉及結算及交還鑰匙?","opts":["離開","抵埗前","抵埗","入住"],"a":0,"note":"離開階段涉及結算費用及交還鑰匙。"},{"q":"以下何者是「抵埗」階段中禮賓部的職責?","opts":["上前致意歡迎客人","為客人辦理入住登記表格","結算客人賬單","檢查退房後的房間"],"a":0,"note":"禮賓部負責上前致意歡迎新到客人。"},{"q":"以下何者是「入住」階段中前堂部的職責?","opts":["處理客人的服務要求及查詢","負責訂房前的資料查核","負責退房後的房間清潔","負責交還鑰匙"],"a":0,"note":"入住期間前堂部處理客人的服務要求及查詢。"},{"q":"以下何者是「離開」階段中顧客須完成的事項?","opts":["結算費用及交還鑰匙","訂房及確認訂位","入住登記及簽署表格","選擇房間及設施"],"a":0,"note":"離開階段顧客須結算費用及交還鑰匙。"},{"q":"若客人在入住期間對前堂部反映房間有問題,前堂部應如何回應?","opts":["聆聽並協調相關部門(如管家部或工程部)盡快解決","置之不理","直接要求客人退房","轉交保安部處理"],"a":0,"note":"前堂部應聆聽並協調相關部門解決問題,以提升服務質素。"},{"q":"若客人在抵埗時未有預先訂房,酒店應如何處理較為恰當?","opts":["查核可用客房,並適當介紹房型房價供客人選擇","一律拒絕接待","強制安排最貴房間","要求客人立即離開"],"a":0,"note":"應查核可用客房並適當推銷介紹,而非一律拒絕。"},{"q":"為何「抵埗前」階段顧客「參考多項資料」對訂房決定有影響?","opts":["資料有助顧客比較不同酒店的房價設施及口碑,影響最終選擇","資料與訂房決定無關","顧客只會參考價格,不理會其他資料","顧客必然選擇最貴的酒店"],"a":0,"note":"充分的資料有助顧客比較評估,直接影響訂房決定。"},{"q":"為何「掛賬形式」的設計方便顧客使用酒店設施?","opts":["顧客毋須每次即時付款,可統一於退房時結算","顧客必須每次即時付款","掛賬形式令顧客無法使用任何設施","掛賬形式只適用於行政套房客人"],"a":0,"note":"掛賬形式讓顧客先享用服務,退房時一併結算,更為方便。"},{"q":"為何保安部須「巡查消防通道」屬於顧客入住階段的重要工作?","opts":["確保緊急情況下顧客能安全疏散","純粹例行公事,與顧客安全無關","只在酒店開業首年需要巡查","與入住階段完全無關"],"a":0,"note":"巡查消防通道確保緊急情況下顧客能安全疏散,屬入住期間的重要保安工作。"},{"q":"若酒店希望在「入住」階段提升顧客忠誠度,最直接可以怎樣做?","opts":["提供超出顧客預期的服務體驗","盡量減少員工與客人接觸","提高各項設施收費","延遲處理顧客投訴"],"a":0,"note":"超出預期的服務體驗有助提升顧客忠誠度及回頭率。"},{"q":"顧客流程四階段的設計,主要反映甚麼理念?","opts":["酒店服務是一個連貫的顧客體驗旅程,各階段緊密相連","四個階段完全獨立,互不影響","顧客體驗只在入住階段發生","訂房及離開階段對顧客體驗無影響"],"a":0,"note":"四階段設計反映酒店服務是連貫的顧客體驗旅程。"},{"q":"若「抵埗前」階 ,{"q":"處理超額預訂時,誰會向受影響客人道歉?","opts":["大堂副經理或款接部經理等高級職員","前堂部初級文員","保安員","電話接線生"],"a":0,"note":"由大堂副經理或款接部經理等高級職員向客人致歉。"},{"q":"減少超額預訂壞影響的做法包括?","opts":["把客人轉介到附近酒店,並提供折扣優惠或免費升級","要求客人自行解決住宿問題","拒絕提供任何補償","立即終止該客人的所有訂房"],"a":0,"note":"轉介附近酒店並提供折扣優惠免費升級等補償。"},{"q":"若轉介的替代酒店較為遙遠,酒店可以怎樣補償客人?","opts":["為客人提供較高級的房間","要求客人自行承擔交通費","拒絕任何補償","終止服務"],"a":0,"note":"若替代酒店較遠,可提供較高級房間作補償。"},{"q":"處理超額預訂後,高級職員還會做甚麼跟進?","opts":["親自致電客人,詢問替代酒店情況並再次道歉","不作任何跟進","要求客人簽署免責聲明","終止該客人的會員資格"],"a":0,"note":"高級職員會致電客人跟進情況並再次道歉。"},{"q":"為何禮賓部、款接部及訂房部須緊密配合?","opts":["三者共同構成顧客由訂房到入住的完整體驗鏈","三者工作完全獨立,互不影響","只有款接部與顧客有關","禮賓部與其餘兩者無關"],"a":0,"note":"三部門共同構成顧客體驗的重要環節,須緊密配合。"},{"q":"以下何者最能總結前堂部的核心角色?","opts":["作為酒店與顧客接觸最頻繁的部門,統籌住宿相關的銷售與服務","純粹負責財務結算","純粹負責客房清潔","與顧客體驗無直接關係"],"a":0,"note":"前堂部是酒店與顧客接觸最頻繁的部門,統籌住宿銷售與服務。"}]},{"n":10,"title":"管家部","tag":"HOUSEKEEPING","qs":[{"q":"管家部辦公室的定位是?","opts":["部門的管理中心","純粹的員工休息室","客人接待處","財務審計中心"],"a":0,"note":"管家部辦公室是部門的管理中心。"},{"q":"管家部辦公室保管甚麼物品?","opts":["客房鎖匙、無線電傳呼機、房務部工作記錄手冊","客人的護照","財務報表","供應商合約"],"a":0,"note":"管家部辦公室保管鎖匙傳呼機及工作記錄手冊。"},{"q":"管家部辦公室設有甚麼中心?","opts":["失物認領中心","財務結算中心","市場推廣中心","員工培訓中心"],"a":0,"note":"管家部辦公室設有失物認領中心。"},{"q":"客房樓層團隊負責哪些地方的清潔?","opts":["客房、走廊通道及電梯口","只限客房","只限走廊","只限電梯"],"a":0,"note":"客房樓層負責客房走廊通道及電梯口的清潔和維護。"},{"q":"客房樓層團隊會清潔哪些狀態的客房?","opts":["已入住的客房及已退房的客房","只清潔已退房的客房","只清潔已入住的客房","只清潔空置未售客房"],"a":0,"note":"清潔已入住及已退房的客房。"},{"q":"客房樓層團隊為新入住客人提供甚麼服務?","opts":["開床服務","按摩服務","洗衣服務","保姆服務"],"a":0,"note":"為新入住客人提供開床服務。"},{"q":"管家部負責清潔哪些公共地方?","opts":["酒店內眾多客用設施及公共地方","只限客房","只限員工區域","只限停車場"],"a":0,"note":"管家部負責清潔酒店內客用設施及公共地方。"},{"q":"制服及布草房負責甚麼工作?","opts":["保管、收發及修補員工制服及布草用品","客房清潔","財務審計","市場推廣"],"a":0,"note":"制服及布草房負責保管收發及修補制服布草用品。"},{"q":"制服及布草房定期進行甚麼工作?","opts":["盤點,確保數量質素合乎所需","員工考核","財務審計","供應商評估"],"a":0,"note":"定期盤點確保數量質素合乎所需。"},{"q":"洗衣房負責甚麼工作?","opts":["員工制服及布草用品的洗熨工作","客房清潔工作","財務結算工作","市場推廣工作"],"a":0,"note":"洗衣房負責制服及布草用品的洗熨工作。"},{"q":"洗衣房是否也為客人提供服務?","opts":["是,提供洗熨服務","否,只服務員工制服","只在總統套房提供服務","不提供任何客人服務"],"a":0,"note":"洗衣房也為客人提供洗熨服務。"},{"q":"管家部「其他」職能包括甚麼?","opts":["花卉植物、園藝、防蟲","財務審計","市場推廣","員工招聘"],"a":0,"note":"其他職能包括花卉植物園藝及防蟲等工作。"},{"q":"管家部亦負責清潔哪些辦公室?","opts":["員工工作地方及行政辦公室","只限客房","只限公共地方","只限管理層辦公室"],"a":0,"note":"管家部負責清潔員工工作地方及行政辦公室。"},{"q":"客房狀況代碼「VC」或「VR」代表甚麼?","opts":["已清潔待售房間(vacant clean)","未清潔待售房間","已清潔入住房","請勿打擾"],"a":0,"note":"VC/VR代表已清潔待售房間(vacant clean)。"},{"q":"「VC/VR」狀態的房間特點是?","opts":["現無客人入住,房務員已進行清潔","現有客人入住","正在維修中","客人要求請勿打擾"],"a":0,"note":"VC/VR指現無客人入住且已清潔。"},{"q":"客房狀況代碼「VD」代表甚麼?","opts":["未清潔待售房間(vacant dirty)","已清潔待售房間","已清潔入住房","加床"],"a":0,"note":"VD代表未清潔待售房間(vacant dirty)。"},{"q":"「VD」狀態的房間特點是?","opts":["現無客人入住,房務員尚未進行清潔","現有客人入住且已清潔","正在維修中","客人已退房"],"a":0,"note":"VD指現無客人入住但尚未清潔。"},{"q":"客房狀況代碼「OC」代表甚麼?","opts":["已清潔入住房(occupied clean)","未清潔待售房間","結帳退房","加床"],"a":0,"note":"OC代表已清潔入住房(occupied clean)。"},{"q":"「OC」狀態的房間特點是?","opts":["現有客人入住,房務員已進行清潔","現無客人入住","正在維修中","客人要求立刻打掃"],"a":0,"note":"OC指現有客人入住且房間已清潔。"},{"q":"客房狀況代碼「DND」代表甚麼?","opts":["請勿打擾(do not disturb)","不需服務","加床","無行李"],"a":0,"note":"DND代表請勿打擾(do not disturb)。"},{"q":"「DND」狀態代表甚麼情況?","opts":["客人要求請勿打擾","客人已退房","客房正在維修","客人要求立即打掃"],"a":0,"note":"DND即客人要求請勿打擾。"},{"q":"客房狀況代碼「NNS」代表甚麼?","opts":["不需服務(no need service)","請勿打擾","少量行李","結帳退房"],"a":0,"note":"NNS代表不需服務(no need service)。"},{"q":"「NNS」狀態代表甚麼情況?","opts":["客人不需要客房服務","客人要求立即打掃","客人已退房","客房正在維修"],"a":0,"note":"NNS即客人不需要客房服務。"},{"q":"客房狀況代碼「OOO」代表甚麼?","opts":["待修(out of order)","已清潔待售房間","不需服務","續住房"],"a":0,"note":"OOO代表待修(out of order)。"},{"q":"「OOO」狀態代表甚麼情況?","opts":["客房正進行維修、翻新或全面清潔","客人已入住","客人要求請勿打擾","客人已退房"],"a":0,"note":"OOO即客房正進行維修翻新或全面清潔,不能出售。"},{"q":"客房狀況代碼「XB」代表甚麼?","opts":["加床(extra bed)","無行李","少量行李","結帳退房"],"a":0,"note":"XB代表加床(extra bed)。"},{"q":"「XB」狀態代表甚麼情況?","opts":["客房已加床","客房已退房","客房無人入住","客房正在維修"],"a":0,"note":"XB即客房已加床。"},{"q":"客房狀況代碼「NB」代表甚麼?","opts":["無行李(no baggage)","少量行李","加床","結帳退房"],"a":0,"note":"NB代表無行李(no baggage)。"},{"q":"「NB」狀態代表甚麼情況?","opts":["客房入住客人並無行李","客人已退房","客房正在維修","客人要求請勿打擾"],"a":0,"note":"NB即客房入住客人並無行李,可能需留意風險。"},{"q":"客房狀況代碼「LB」代表甚麼?","opts":["少量行李(light baggage)","無行李","加床","結帳退房"],"a":0,"note":"LB代表少量行李(light baggage)。"},{"q":"「LB」狀態代表甚麼情況?","opts":["客房入住客人無大件行李","客人已退房","客房正在維修","客人要求立即打掃"],"a":0,"note":"LB即客房入住客人無大件行李。"},{"q":"客房狀況代碼「ED」代表甚麼?","opts":["準備退房/即將退房(expected departure)","結帳退房","續住房","外宿"],"a":0,"note":"ED代表準備退房或即將退房(expected departure)。"},{"q":"「ED」狀態代表甚麼情況?","opts":["客房入住客人將於次日結帳退房時間前離開","客人已經退房","客人今天不會退房","客房正在維修"],"a":0,"note":"ED即客人將於次日退房時間前離開。"},{"q":"客房狀況代碼「CO」代表甚麼?","opts":["結帳退房(check out)","準備退房","續住房","外宿"],"a":0,"note":"CO代表結帳退房(check out)。"},{"q":"「CO」狀態代表甚麼情況?","opts":["客人已結帳並退房","客人即將退房但未結帳","客人續住一晚以上","客人今晚不在房內留宿"],"a":0,"note":"CO即客人已完成結帳並退房。"},{"q":"客房狀況代碼「Stay-on」代表甚麼?","opts":["續住房(stay-on)","外宿","結帳退房","加床"],"a":0,"note":"Stay-on代表續住房。"},{"q":"「Stay-on」狀態代表甚麼情況?","opts":["客人今天不會退房,並會繼續入住一晚或以上","客人已經退房","客人今晚不在房內留宿","客房正在維修"],"a":0,"note":"Stay-on即客人今天不退房,會繼續入住。"},{"q":"客房狀況代碼「SO」代表甚麼?","opts":["外宿(sleep-out)","續住房","結帳退房","不需服務"],"a":0,"note":"SO代表外宿(sleep-out)。"},{"q":"「SO」狀態代表甚麼情況?","opts":["客人應已入住,但床上並無使用痕跡","客人已正式退房","客人要求加床","客人要求請勿打擾"],"a":0,"note":"SO即客人應已入住但床上無使用痕跡,可能在外過夜。"},{"q":"客房狀況代碼「MUR」代表甚麼?","opts":["請即打掃(make up room)","無行李","少量行李","加床"],"a":0,"note":"MUR代表請即打掃(make up room)。"},{"q":"「MUR」狀態代表甚麼情況?","opts":["客人要求立刻打掃","客人要求請勿打擾","客人已退房","客房正在維修"],"a":0,"note":"MUR即客人要求立刻打掃房間。"},{"q":"若房務員發現客房無人入住且未清潔,應標示為?","opts":["VD","VC","OC","OOO"],"a":0,"note":"無人入住且未清潔屬VD(未清潔待售房間)。"},{"q":"若房務員發現客房有人入住且已完成清潔,應標示為?","opts":["OC","VC","VD","CO"],"a":0,"note":"有客人入住且已清潔屬OC(已清潔入住房)。"},{"q":"若客人在門外掛上「請勿打擾」標示,房務員應如何標示該房?","opts":["DND","MUR","NNS(較接近但DND更直接對應「請勿打擾」標示)","OOO"],"a":0,"note":"客人要求請勿打擾應標示為DND。"},{"q":"若客房正在進行大型翻新工程,暫時無法出售,應標示為?","opts":["OOO","VC","VD","XB"],"a":0,"note":"進行維修翻新的房間應標示為OOO(待修)。"},{"q":"若客人要求在房內加設一張床鋪,應標示為?","opts":["XB","NB","LB","ED"],"a":0,"note":"客房已加床應標示為XB。"},{"q":"若客人已辦妥退房手續離開,該房應標示為?","opts":["CO","ED","Stay-on","SO"],"a":0,"note":"已完成結帳並退房應標示為CO。"},{"q":"若客人表示今天不會退房,將繼續入住多一晚,該房應標示為?","opts":["Stay-on","CO","ED","SO"],"a":0,"note":"客人繼續入住應標示為Stay-on(續住房)。"},{"q":"若房務員發現客人床鋪毫無使用痕跡,但客人並未辦理退房,應標示為?","opts":["SO","CO","NB","MUR"],"a":0,"note":"床鋪無使用痕跡但客人應已入住,標示為SO(外宿)。"},{"q":"若客人明確表示不需要當天的客房清潔服務,應標示為?","opts":["NNS","DND","MUR","OOO"],"a":0,"note":"客人不需要客房服務應標示為NNS。"},{"q":"若客人急切要求立即打掃房間,房務員應優先標示為?","opts":["MUR","NNS","DND","VD"],"a":0,"note":"客人要求立刻打掃應標示為MUR,通常表示優先處理。"},{"q":"客房狀況代碼系統的主要作用是?","opts":["讓管家部及前堂部快速掌握每間客房的實時狀態","純粹用作財務記錄","只供保安部使用","與客房銷售及清潔安排無關"],"a":0,"note":"代碼系統讓相關部門快速掌握客房實時狀態,協調運作。"},{"q":"為何「VC」狀態的房間對訂房部特別重要?","opts":["這類房間可立即安排新客人入住","這類房間必須先維修","這類房間不能出售","與訂房安排無關"],"a":0,"note":"VC(已清潔待售)的房間可立即安排新客人入住。"},{"q":"管家部與前堂部在客房狀況溝通上有何重要性?","opts":["確保入住登記及退房安排能配合實際客房清潔進度","兩部門完全不需要溝通","只有前堂部需要了解客房狀況","只有管家部需要了解訂房狀況"],"a":0,"note":"兩部門須緊密溝通,確保入住退房安排配合實際清潔進度。"},{"q":"以下何者最能總結管家部的整體職能?","opts":["負責維持酒店整潔及提供相關支援服務,確保客房及公共地方合乎標準","只負責客房清潔,不涉及其他工作","只負責前堂接待","只負責財務審計"],"a":0,"note":"管家部職能涵蓋客房公共地方制服布草及洗衣等多方面工作。"},{"q":"為何管家部設有「失物認領中心」對客人服務很重要?","opts":["方便客人尋回在酒店範圍內遺失的物品,提升服務體驗","與客人服務無關","純粹佔用空間的部門","只供員工使用"],"a":0,"note":"失物認領中心方便客人尋回遺失物品,是重要的顧客服務。"},{"q":"若酒店客房入住率高但清潔人手不足,可能導致甚麼狀況增加?","opts":["OC轉換所需時間延長,影響VC房間供應速度","VD房間會自動減少","OOO房間會自動增加","與清潔人手無關"],"a":0,"note":"人手不足可能延長清潔時間,影響VC(可售)房間的供應速度。"},{"q":"以下何者是管家部與工程部須協調配合的情況?","opts":["客房設施損壞需要維修,暫時標示為OOO","客人要求請勿打擾","客人今天續住一晚","客人已退房"],"a":0,"note":"設施損壞需維修時,管家部與工程部須協調,並標示OOO。"},{"q":"以下何者最能總結客房狀況代碼系統對酒店運作的價值?","opts":["提高跨部門溝通效率,確保客房銷售清潔及服務環環相扣","純粹是管家部內部使用的代號,對外毫無意義","只在酒店開業首年使用","與跨部門協調無關"],"a":0,"note":"代碼系統提升跨部門溝通效率,確保各環節緊密配合。"},{"q":"若房務員已完成清潔客房,但該房尚未有新客人入住,應標示為?","opts":["VC","OC","VD","OOO"],"a":0,"note":"無人入住且已清潔的房間應標示為VC(已清潔待售房間)。"}]},{"n":11,"title":"本港餐飲服務的市場分類","tag":"F&B MARKET SEGMENTS","qs":[{"q":"教材將本港餐飲服務市場分為多少類?","opts":["八類","五類","六類","十類"],"a":0,"note":"教材列出酒店閒暇商業工業交通學生零售醫護及其他公營部門共八類市場。"},{"q":"以下哪一項不是教材列出的餐飲服務市場分類?","opts":["軍事市場(非教材分類)","酒店市場","學生市場","醫護市場"],"a":0,"note":"軍事市場不在教材列出的八類市場之列。"},{"q":"酒店市場的餐飲服務對象是?","opts":["房客和外來人客","只限房客","只限外來人客","只限員工"],"a":0,"note":"酒店市場為房客和外來人客提供服務。"},{"q":"大規模酒店通常設有甚麼餐飲設施?","opts":["高級餐廳和咖啡室","只有快餐店","只有自助餐廳","不設任何餐飲設施"],"a":0,"note":"大規模酒店設高級餐廳和咖啡室。"},{"q":"酒店內的餐廳是否全部由酒店全資經營?","opts":["不一定,部分可能是獨立經營者","必然全部由酒店經營","必然全部外判","必然由政府經營"],"a":0,"note":"酒店內餐廳不一定全部由酒店全資經營,部分為獨立經營者。"},{"q":"酒店餐廳的規模設計與營運模式與甚麼關係密切?","opts":["酒店的級別和風格","員工的國籍","餐廳的裝修年份","顧客的年齡"],"a":0,"note":"酒店餐廳規模設計與酒店級別和風格關係密切。"},{"q":"國際酒店集團在各地的餐飲產品有何特點?","opts":["配合市場需要,提供具當地特色的餐飲產品","全球提供完全相同的菜式","只提供西式餐飲","不設任何本地化調整"],"a":0,"note":"國際集團會配合當地市場提供具特色的餐飲產品。"},{"q":"酒店餐廳藉甚麼吸引外來客光顧?","opts":["高檔形象、高素質服務和環境氣氛","最低廉的價格","最快捷的服務","最簡單的菜單"],"a":0,"note":"酒店餐廳藉高檔形象服務及氣氛吸引外來客。"},{"q":"閒暇市場的餐飲服務設在哪裡?","opts":["旅遊景點和休閒活動場所","商業區","醫院","學校"],"a":0,"note":"閒暇市場設在旅遊景點和休閒活動場所。"},{"q":"商業及工業市場的餐飲服務主要位於?","opts":["商業或工業區","旅遊景點","醫院","住宅區"],"a":0,"note":"商業及工業市場位於商業或工業區。"},{"q":"商業及工業市場主要提供哪些餐飲?","opts":["早餐、午餐和下午茶","只提供晚餐","只提供宵夜","全日供應大餐"],"a":0,"note":"商業及工業市場主要提供早餐午餐和下午茶。"},{"q":"交通市場的餐飲服務主要在哪裡?","opts":["各交通樞紐","住宅區","學校","醫院"],"a":0,"note":"交通市場主要在各交通樞紐提供服務。"},{"q":"交通市場提供甚麼類型的膳食?","opts":["交通工具上的膳食","只限機場貴賓室膳食","只限渡輪膳食","不提供任何膳食"],"a":0,"note":"交通市場提供交通工具上的膳食。"},{"q":"學生市場的餐飲服務設於哪裡?","opts":["大專院校及中學的食堂或餐廳","只限小學","只限幼稚園","只限公共圖書館"],"a":0,"note":"學生市場設於大專院校及中學的食堂或餐廳。"},{"q":"大專院校內是否也有服務職員的餐廳?","opts":["是,也有服務和菜式較好的餐廳供校職員","否,只服務學生","只限教授使用","不設任何教職員餐廳"],"a":0,"note":"大專院校內也有較好服務菜式的餐廳供校職員享用。"},{"q":"零售市場的餐飲服務在哪裡出售?","opts":["便利店、超級市場等","只限大型商場","只限百貨公司","只限街市"],"a":0,"note":"零售市場在便利店超級市場等出售餐飲。"},{"q":"零售市場提供的餐飲形式是?","opts":["場內用餐或外賣餐飲","只限堂食","只限外賣","只限預訂"],"a":0,"note":"零售市場提供場內用餐或外賣餐飲。"},{"q":"醫護市場服務對象是?","opts":["醫院及療養院內病人和康復中人士","只限醫護人員","只限訪客","只限行政人員"],"a":0,"note":"醫護市場服務醫院及療養院內的病人和康復人士。"},{"q":"醫護市場的餐飲服務著重甚麼?","opts":["食品控制和健康","味道多元化","價格低廉","裝潢豪華"],"a":0,"note":"醫護市場著重食品控制和健康。"},{"q":"「其他公營部門市場」的餐飲一般由誰經營?","opts":["政府擁有或批准的合約餐飲承辦商","私人企業自由經營","國際連鎖集團","街頭小販"],"a":0,"note":"其他公營部門市場由政府擁有或批准的承辦商經營。"},{"q":"「其他公營部門市場」的服務目標是?","opts":["服務獲政府資助,將成本及售價降至最低","追求最大盈利","只服務高消費客群","不設任何價格限制"],"a":0,"note":"這類市場獲政府資助,目標是將成本售價降至最低。"},{"q":"教材將餐飲服務的營運模式分為哪兩種?","opts":["獨資及連鎖式經營","盈利及非盈利經營","本地及國際經營","堂食及外賣經營"],"a":0,"note":"營運模式分為獨資及連鎖式經營兩種。"},{"q":"獨立式經營的擁有權特點是?","opts":["多為獨資,也有合資","必然是上市公司","必然是政府擁有","必然是跨國集團"],"a":0,"note":"獨立式經營擁有權多為獨資也有合資。"},{"q":"獨立式經營的規模特點是?","opts":["多為小本經營,結業率較高","必然規模龐大","必然資金雄厚","必然是跨國集團"],"a":0,"note":"獨立式經營多為小本經營,缺乏籌資能力,結業率較高。"},{"q":"獨立式經營的經營權由誰負責?","opts":["東主全權負責","總公司專業團隊負責","政府部門負責","股東大會負責"],"a":0,"note":"獨立式經營的經營權由東主全權負責。"},{"q":"獨立式經營的分店數目通常是?","opts":["多為單一間,少數有兩至三間分店","必然超過十間","必然是連鎖集團規模","不設固定分店數目上限"],"a":0,"note":"獨立式經營多為單一間,少數有兩至三間分店。"},{"q":"獨立式經營是否設有獨立行政辦公室?","opts":["不設獨立的行政辦公室","必然設有龐大行政辦公室","必然與連鎖集團共用辦公室","與規模無關"],"a":0,"note":"獨立式經營不設獨立的行政辦公室。"},{"q":"獨立式經營的市場細分傾向是?","opts":["多為社區小企業或高檔餐飲","必然是大眾化連鎖快餐","必然是政府資助食堂","必然是機場餐廳"],"a":0,"note":"獨立式經營多為社區小企業或高檔餐飲。"},{"q":"連鎖式經營的擁有權特點是?","opts":["多為股份制,少數為上市公司","必然是獨資經營","必然是政府經營","必然是非牟利機構"],"a":0,"note":"連鎖式經營擁有權多為股份制,少數為上市公司。"},{"q":"連鎖式經營的規模特點是?","opts":["規模龐大,部分更為跨國集團","必然是小本經營","必然只有單一分店","結業率必然較高"],"a":0,"note":"連鎖式經營規模龐大,部分為跨國集團,資金實力雄厚。"},{"q":"連鎖式經營的經營權安排是?","opts":["設有總公司以專業人員進行中央管理","由個別分店東主自行決定","由政府部門管理","無需任何管理架構"],"a":0,"note":"連鎖式經營設總公司以專業人員中央管理。"},{"q":"連鎖式經營著重甚麼?","opts":["品牌管理、標準化","個別分店的獨特風格","完全自由發揮無需標準","與品牌管理無關"],"a":0,"note":"連鎖式經營著重品牌管理及標準化。"},{"q":"連鎖式經營通常設有甚麼?","opts":["中央廚房和採購部","獨立行政辦公室但無中央管理","只設單一分店","不設任何中央架構"],"a":0,"note":"連鎖式經營設有中央廚房和採購部。"},{"q":"連鎖式經營的市場細分傾向是?","opts":["以大眾化市場為主,顧客人數眾多","必然是高檔小眾市場","必然只服務企業客戶","必然只服務政府部門"],"a":0,"note":"連鎖式經營以大眾化市場為主,顧客人數眾多。"},{"q":"「單一概念連鎖餐廳」是指?","opts":["餐廳企業只經營一個品牌","經營多個品牌互相競爭","每間分店品牌都不同","沒有固定品牌"],"a":0,"note":"單一概念連鎖餐廳只經營一個品牌。"},{"q":"「多元概念連鎖餐廳」是指?","opts":["經營超過一個品牌","只經營一個品牌","不設任何品牌","只限單一分店經營"],"a":0,"note":"多元概念連鎖餐廳經營超過一個品牌。"},{"q":"「多元概念連鎖餐廳」旗下的個別品牌如何宣傳?","opts":["各自宣傳推廣","必須共用同一宣傳活動","不作任何宣傳","只由總公司統一宣傳,個別品牌不參與"],"a":0,"note":"多元概念下個別品牌各自進行宣傳推廣。"},{"q":"「多元概念連鎖餐廳」在哪些方面採取集團式運作?","opts":["食材、營運、資金調配等","只限市場推廣","只限人事管理","不設任何集團式運作"],"a":0,"note":"多元概念連鎖餐廳在食材營運資金調配等採集團式運作。"},{"q":"連鎖式經營的優點包括?","opts":["成本效益良好,資源調動靈活","結業率必然最高","必然缺乏品牌效應","必然難以保持質素標準"],"a":0,"note":"連鎖式經營優點包括成本效益及資源調動靈活。"},{"q":"連鎖式經營還有甚麼優點?","opts":["維持較高的市場佔有率,品牌效應","必然只能服務單一社區","必然缺乏資金","必然無法標準化"],"a":0,"note":"連鎖式經營維持較高市場佔有率,並具品牌效應。"},{"q":"連鎖式經營如何保持較高質素?","opts":["透過標準化保持高質素","完全依賴個別分店自行決定","不設任何質素監控","依賴顧客自行評分"],"a":0,"note":"連鎖式經營透過標準化流程保持較高質素。"},{"q":"連鎖式經營的缺點包括?","opts":["容易失去獨有特色","必然規模最小","必然缺乏資金","必然無法擴張"],"a":0,"note":"連鎖式經營缺點包括容易失去獨有特色。"},{"q":"連鎖式經營還有甚麼缺點?","opts":["行政財務成本高昂,市場承受力較低","必然沒有任何品牌效應","必然無法標準化","必然無法維持市場佔有率"],"a":0,"note":"連鎖式經營缺點包括行政財務成本高及市場承受力較低。"},{"q":"以下哪一項屬於獨立式經營的特徵?","opts":["小本經營、東主全權負責","規模龐大、跨國集團","著重標準化及中央管理","設有中央廚房及採購部"],"a":0,"note":"小本經營及東主全權負責是獨立式經營的典型特徵。"},{"q":"以下哪一項屬於連鎖式經營的特徵?","opts":["著重品牌管理及標準化","多為單一間分店","不設獨立行政辦公室","市場細分多為高檔小眾"],"a":0,"note":"著重品牌管理標準化是連鎖式經營的典型特徵。"},{"q":"一間位於商業區、主要提供上班族早午餐及下午茶的餐廳,屬於哪類市場?","opts":["商業及工業市場","酒店市場","閒暇市場","醫護市場"],"a":0,"note":"位於商業區並提供早午茶,符合商業及工業市場特徵。"},{"q":"一間設於機場禁區內、提供乘客餐飲的食肆,屬於哪類市場?","opts":["交通市場","學生市場","零售市場","醫護市場"],"a":0,"note":"設於機場並服務交通旅客,符合交通市場特徵。"},{"q":"一間位於醫院內、專為住院病人提供低鹽低糖餐單的食堂,屬於哪類市場?","opts":["醫護市場","閒暇市場","零售市場","其他公營部門市場"],"a":0,"note":"服務病人並著重健康飲食,符合醫護市場特徵。"},{"q":"一間位於主題公園內、服務遊客的餐廳,屬於哪類市場?","opts":["閒暇市場","商業及工業市場","學生市場","醫護市場"],"a":0,"note":"設於旅遊景點屬閒暇市場的定義。"},{"q":"一間位於大學校園內、服務教職員的高級餐廳,屬於哪類市場?","opts":["學生市場","酒店市場","交通市場","醫護市場"],"a":0,"note":"設於大專院校內,屬學生市場,即使服務對象包括教職員。"},{"q":"一間便利店同時出售即食便當及熱狗,屬於哪類市場?","opts":["零售市場","酒店市場","交通市場","其他公營部門市場"],"a":0,"note":"便利店出售餐飲屬零售市場的例子。"},{"q":"一間由政府資助、專為長者提供廉價膳食的中心,屬於哪類市場?","opts":["其他公營部門市場","酒店市場","閒暇市場","交通市場"],"a":0,"note":"政府資助且成本售價降至最低,符合其他公營部門市場特徵。"},{"q":"一間國際快餐連鎖集團在全球各地開設分店並統一菜單標準,屬於哪種營運模式?","opts":["連鎖式經營","獨立式經營","其他公營部門市場經營","閒暇市場經營"],"a":0,"note":"統一標準及全球分店符合連鎖式經營特徵。"},{"q":"一間由夫婦二人自行經營、只有一間分店的家庭小菜館,屬於哪種營運模式?","opts":["獨立式經營","連鎖式經營","多元概念連鎖經營","其他公營部門市場經營"],"a":0,"note":"單一分店及夫婦自行經營符合獨立式經營特徵。"},{"q":"一間餐飲集團同時經營多個不同風格的品牌(如中餐、西餐、快餐各設品牌),屬於哪種概念?","opts":["多元概念連鎖餐廳","單一概念連鎖餐廳","獨立式經營","閒暇市場經營"],"a":0,"note":"經營多個品牌符合多元概念連鎖餐廳的定義。"},{"q":"為何連鎖式經營「較容易失去獨有特色」?","opts":["標準化流程令各分店風格趨於一致,減少個性化","標準化令每間分店風格完全不同","連鎖經營必然更具特色","與標準化無關"],"a":0,"note":"標準化雖保證品質一致,但也可能令各分店風格趨同,失去獨有特色。"},{"q":"為何獨立式經營「集資能力較弱、結業率較高」?","opts":["缺乏連鎖集團的財力支援及規模經濟效益","獨立經營必然資金充裕","獨立經營必然沒有經營風險","與集資能力無關"],"a":0,"note":"獨立經營缺乏連鎖集團的資金及規模經濟優勢,故集資較弱結業率較高。"},{"q":"以下何者最能總結八類餐飲市場劃分的意義?","opts":["按服務場景及對象劃分市場,有助業界精準定位及規劃產品","純粹用作學術分類,無實際意義","只適用於酒店業","與餐飲業規劃無關"],"a":0,"note":"市場劃分有助業界依場景對象精準定位規劃產品服務。"},{"q":"以下何者最能總結「獨立式經營」與「連鎖式經營」的核心分別?","opts":["獨立式經營自主性高但資源有限;連鎖式經營資源雄厚但趨向標準化","兩者完全相同,沒有實質分別","獨立式經營必然規模更大","連鎖式經營必然更具特色"],"a":0,"note":"兩者在自主性資源規模及標準化程度上有本質差異。"},{"q":"為何醫護市場(如醫院、療養院)的餐飲服務與其他市場相比特別著重食品控制?","opts":["服務對象包括病人及體弱人士,對食物安全及健康要求特別高","醫護市場的顧客消費能力特別高","醫護市場的競爭特別激烈","與服務對象的健康狀況無關"],"a":0,"note":"醫護市場服務病人及康復人士,故特別著重食品控制和健康。"}]},{"n":12,"title":"規劃餐單時應考慮的因素","tag":"MENU PLANNING","qs":[{"q":"教材將規劃餐單時應考慮的因素分為哪幾大方面?","opts":["市場、顧客、營運、食物及成本方面","只有顧客及成本方面","只有市場及營運方面","只有食物及顧客方面"],"a":0,"note":"教材分為市場顧客營運食物及成本共五大方面。"},{"q":"「迎合飲食潮流」要求餐單怎樣?","opts":["不能一成不變,經常檢視並定期加入新菜式","保持十年不變以維持傳統","完全跟隨對手餐單","只需每五年更新一次"],"a":0,"note":"迎合飲食潮流要求餐單不能一成不變,經常檢視加入新菜式。"},{"q":"為何餐單需要「經常檢視、定期加入新菜式」?","opts":["迎合不斷轉變的飲食潮流","純粹為增加印刷成本","與潮流無關,只為填滿頁數","因為法例強制規定"],"a":0,"note":"經常更新菜式是為迎合不斷轉變的飲食潮流。"},{"q":"「銷售策略」在規劃餐單上的意思是?","opts":["設計菜式組合吸引顧客","只降低所有菜式價格","刪減所有配菜選項","與顧客喜好無關"],"a":0,"note":"銷售策略指設計菜式組合以吸引顧客。"},{"q":"何謂餐單設計中的「同行做法」考慮?","opts":["餐單需有自己特色,同時保持與同業相近的部分","完全抄襲同業餐單","完全不理會同業做法","只做同業沒有的菜式"],"a":0,"note":"同行做法指既要有特色,又要與同業保持相近部分。"},{"q":"為何餐單要「保持與同業相近的部分」?","opts":["讓消費者可以比較","純粹減省設計成本","避免被同業抄襲","法例規定必須如此"],"a":0,"note":"保持相近部分讓消費者可以比較不同餐廳。"},{"q":"餐單須配合餐廳形象主題,意思是?","opts":["設計的餐單必須能配合餐廳的形象和主題","餐單設計與餐廳形象無關","只需配合廚師個人喜好","只需配合季節而非形象"],"a":0,"note":"餐單必須能配合餐廳的形象和主題。"},{"q":"經濟暢旺時,餐單通常有何變化?","opts":["多了些價格較高、食材較好的菜式","菜式數量會大幅減少","價格會全面下調","餐單會完全停止更新"],"a":0,"note":"經濟暢旺時餐單多了價格較高食材較好的菜式。"},{"q":"經濟不景時,餐單通常有何變化?","opts":["多了「超值」的菜式","多了最昂貴的菜式","餐廳會停止提供任何餐單","菜式款式會大幅增加而非調整價格"],"a":0,"note":"經濟不景時餐單多了「超值」的菜式。"},{"q":"大部分食肆在節慶時會怎樣安排餐單?","opts":["推出應節飲食","完全停業","刪除所有現有菜式","價格維持全年不變"],"a":0,"note":"大部分食肆會在節慶時推出應節飲食。"},{"q":"食肆每季推出時令食品,除了配合氣氛外還有何實際好處?","opts":["時令食材供應充足、成本較低","時令食材必然較昂貴","與成本無關","時令食材供應必然不穩定"],"a":0,"note":"時令食材供應充足成本較低,是實際的經濟考量。"},{"q":"推出應節及時令飲食,對餐廳有何裨益?","opts":["可增加營業額,顧客感受到節日氣氛","只會增加成本沒有實際好處","會令顧客反感","與營業額無關"],"a":0,"note":"應節時令飲食可增加營業額並讓顧客感受節日氣氛。"},{"q":"「目標顧客群」這一考慮因素指?","opts":["滿足其目標顧客群的喜好和需要","只考慮餐廳老闆個人喜好","完全不需考慮顧客背景","只考慮同業的目標顧客"],"a":0,"note":"目標顧客群因素指要滿足該群體的喜好和需要。"},{"q":"為何餐單設計不能「漫無目標」?","opts":["因為要滿足目標顧客群的喜好和需要","因為法例禁止隨意設計","因為食材採購限制","因為與經濟環境無關"],"a":0,"note":"餐單設計須針對目標顧客群,不能漫無目標。"},{"q":"「消費能力」因素舉例可如何體現?","opts":["預計每人每餐消費約100元,菜式選擇按此設計","不論預算,菜式一律最貴","不設任何消費預算考慮","只考慮餐廳的租金成本"],"a":0,"note":"消費能力因素如預計人均消費金額,據此設計菜式。"},{"q":"「用餐次序和習慣」如何影響餐單編排?","opts":["餐單各菜式一般會按客人用餐次序或習慣排列","菜式排列與用餐次序完全無關","只按價格由低至高排列","只按顏色排列"],"a":0,"note":"餐單編排一般會按客人的用餐次序或習慣排列。"},{"q":"「飲食要求」因素指的是?","opts":["餐廳會考慮目標顧客群原有的飲食習慣","完全不理會顧客的飲食背景","只考慮廚師的拿手菜式","只考慮食材成本"],"a":0,"note":"飲食要求指考慮目標顧客群原有的飲食習慣。"},{"q":"餐廳位置與甚麼關係密切?","opts":["客流及餐飲要求","純粹與租金高低有關","與餐單設計完全無關","只與員工上下班方便有關"],"a":0,"note":"餐廳位置與客流及餐飲要求關係密切。"},{"q":"為何餐廳會在不同時段提供不同餐單?","opts":["配合不同營業時段(如早午晚市)的需要","純粹為增加印刷成本","與顧客需要無關","法例強制規定"],"a":0,"note":"餐廳會因應不同營業時段提供不同餐單。"},{"q":"規劃餐單時為何要考慮「廚房員工廚藝及人數」?","opts":["主廚與經理制定餐單時需考慮廚房員工能否應付","與廚房人手安排完全無關","只需考慮顧客人數","只需考慮食材價格"],"a":0,"note":"制定餐單需考慮廚房員工能否應付相關工作。"},{"q":"主廚會因應甚麼調整餐單上的菜式?","opts":["員工的廚藝及人數情況","顧客的衣著打扮","天氣預報","股票市場走勢"],"a":0,"note":"主廚會因應員工廚藝及人數情況調整菜式。"},{"q":"規劃餐單為何要考慮「廚房設備」?","opts":["要考慮儲存、保鮮及烹調設備等能否配合","廚房設備與餐單設計無關","只需考慮座位數目","只需考慮餐廳裝潢"],"a":0,"note":"規劃餐單需考慮儲存保鮮烹調設備能否配合。"},{"q":"為何「製作時間」是規劃餐單的重要考慮?","opts":["顧客希望菜式能快點上桌,製作時間太長也影響營業額","製作時間與營業額完全無關","顧客普遍不介意等候時間","只影響廚師心情"],"a":0,"note":"製作時間太長會影響顧客體驗及餐廳營業額。"},{"q":"「製作時間」因素對哪類食肆尤其重要?","opts":["餐桌回轉率高、客人流量大的快餐業","只對高級餐廳重要","與食肆類型無關","只對外賣店重要"],"a":0,"note":"製作時間對回轉率高流量大的快餐業尤其重要。"},{"q":"編排餐單時考慮製作時間,需在哪些方面先行協調?","opts":["製作程序、人力資源及設備安排","只需協調菜式價格","只需協調餐廳裝潢","只需協調員工薪酬"],"a":0,"note":"須在製作程序人力資源及設備安排上先行協調。"},{"q":"「樓面設施」與餐單有何關係?","opts":["樓面設計與餐桌擺設跟餐單也有密切關係","樓面設施與餐單設計完全無關","只影響員工休息安排","只影響顧客付款方式"],"a":0,"note":"樓面設計與餐桌擺設跟餐單有密切關係。"},{"q":"規劃餐單為何要考慮「食材供應和品質穩定性」?","opts":["餐廳不能因食材價格變動而頻頻調整價錢,或因缺貨而停售","食材供應與餐單設計無關","只需考慮食材外觀","只需考慮食材產地"],"a":0,"note":"須考慮食材供應穩定,避免頻繁調價或停售。"},{"q":"設定餐單時,對食材供應需考慮甚麼?","opts":["供應是否充足、價格變動情況及供應商是否可靠","只需考慮食材的顏色","只需考慮食材的包裝","與供應商信譽無關"],"a":0,"note":"須考慮供應充足度價格變動及供應商可靠性。"},{"q":"「平衡菜式種類與顧客選擇」的考慮重點是?","opts":["平衡菜式種類與客人選擇範圍,種類太多會增加採購處理難度","菜式種類越多越好,沒有上限","菜式種類與採購工作量無關","應盡量減至只有一款菜式"],"a":0,"note":"須平衡菜式種類與選擇範圍,避免種類太多增加處理難度。"},{"q":"為何餐單需考慮「食物衛生與安全」?","opts":["食物中毒等事故對餐廳商譽會構成重大打擊","食物衞生與餐單設計無關","只是政府部門的責任","只影響個別顧客,與餐廳無關"],"a":0,"note":"食物中毒等事故會嚴重打擊餐廳商譽。"},{"q":"哪些場所的餐飲供應商特別要顧及顧客健康,以增加「餐單營養價值」?","opts":["學校、老人院、監獄等","只有五星級酒店","只有街頭小食攤","只有機場貴賓室"],"a":0,"note":"學校老人院監獄等場所的供應商特別要顧及顧客健康。"},{"q":"一般餐廳在餐單設計上如何回應「餐單營養價值」這項考慮?","opts":["增加一些標榜健康飲食的菜式選擇","完全不理會營養價值","只提供高糖高脂的菜式","刪除所有蔬菜類菜式"],"a":0,"note":"一般餐廳會增加標榜健康飲食的菜式選擇。"},{"q":"規劃餐單為何要平衡「食材成本與餐單價格」?","opts":["優質食材成本佔比太高會無利可圖,一味壓低成本又會令顧客不滿","食材成本與餐單價格完全無關","應盡量選用最便宜的食材而不顧品質","應不計成本只求食材最頂級"],"a":0,"note":"須平衡食材成本與售價,兩極端皆會對經營不利。"},{"q":"若餐廳只求壓低食材成本而選用較差食材,可能有何後果?","opts":["邊際利潤看似較高,但顧客不滿不再光顧,反招損失","必然令餐廳長遠盈利大增","顧客滿意度必然提升","與顧客忠誠度無關"],"a":0,"note":"壓低食材成本雖利潤看似提高,但顧客流失反招損失。"},{"q":"一份理想的餐單,應讓目標顧客群感到滿意的是?","opts":["菜式選擇、份量、質素和價錢","只需價錢便宜","只需款式眾多","只需外觀精美"],"a":0,"note":"理想餐單應讓顧客在選擇份量質素及價錢上都滿意。"},{"q":"一份理想的餐單,對餐廳經營有何要求?","opts":["為餐廳帶來經營利潤,達到營運的最佳效益","不需考慮利潤,只求顧客滿意","必須犧牲利潤以留住顧客","與營運效益無關"],"a":0,"note":"理想餐單須為餐廳帶來利潤並達致最佳營運效益。"},{"q":"一份理想的餐單還應該做到?","opts":["突出餐廳的形象和特色","盡量與同業完全一致沒有分別","刪去所有具特色的菜式","只反映廚師個人喜好"],"a":0,"note":"理想餐單應能突出餐廳的形象和特色。"},{"q":"以下何者屬於規劃餐單時「市場方面」的考慮因素?","opts":["迎合飲食潮流","目標顧客群的消費能力","廚房設備是否足夠","食材成本與售價的平衡"],"a":0,"note":"迎合飲食潮流屬於市場方面的考慮因素。"},{"q":"以下何者屬於規劃餐單時「顧客方面」的考慮因素?","opts":["目標顧客群","同行做法","廚房員工廚藝及人數","食材供應穩定性"],"a":0,"note":"目標顧客群屬於顧客方面的考慮因素。"},{"q":"以下何者屬於規劃餐單時「營運方面」的考慮因素?","opts":["廚房員工廚藝及人數","同行做法","目標顧客群","食材成本與餐單價格"],"a":0,"note":"廚房員工廚藝及人數屬於營運方面的考慮因素。"},{"q":"以下何者屬於規劃餐單時「與食物有關」的考慮因素?","opts":["食物衞生與安全","同行做法","營業時間","消費能力"],"a":0,"note":"食物衞生與安全屬於與食物有關的考慮因素。"},{"q":"一間茶餐廳在冬至及聖誕節推出特別套餐,主要反映哪項考慮因素?","opts":["配合節慶與季節","配合經濟環境","製作時間","廚房設備"],"a":0,"note":"因應節慶推出特別套餐,反映配合節慶與季節的考慮。"},{"q":"一間餐廳因應通脹及經濟不景,推出多款「超值套餐」,主要反映哪項考慮因素?","opts":["配合經濟環境","同行做法","樓面設施","飲食要求"],"a":0,"note":"因應經濟環境推出超值套餐,反映配合經濟環境的考慮。"},{"q":"一間快餐店特別重視縮短出餐時間,主要反映哪項考慮因素?","opts":["製作時間","同行做法","餐廳形象主題","消費能力"],"a":0,"note":"重視出餐速度,反映製作時間這項考慮因素,對快餐業尤其重要。"},{"q":"一間老人院的膳食供應商特別注意菜式的營養均衡,主要反映哪項考慮因素?","opts":["餐單營養價值","迎合飲食潮流","銷售策略","餐廳位置"],"a":0,"note":"老人院注重營養均衡,反映餐單營養價值這項考慮。"},{"q":"一間餐廳因應主廚的專長調整餐單菜式組合,主要反映哪項考慮因素?","opts":["廚房員工廚藝及人數","食材供應穩定性","餐廳位置","目標顧客群"],"a":0,"note":"因應主廚專長調整菜式,反映廚房員工廚藝及人數的考慮。"},{"q":"一間餐廳因應魚類食材供應不穩定而暫停某道菜式,主要反映哪項考慮因素?","opts":["食材供應和品質穩定性","製作時間","樓面設施","營業時間"],"a":0,"note":"因食材供應不穩暫停菜式,反映食材供應和品質穩定性的考慮。"},{"q":"一間高級餐廳的餐單設計必須配合其優雅裝潢及品牌形象,主要反映哪項考慮因素?","opts":["配合餐廳形象主題","配合經濟環境","消費能力","用餐次序和習慣"],"a":0,"note":"餐單配合裝潢及品牌形象,反映配合餐廳形象主題的考慮。"},{"q":"一間餐廳按照客人「頭盤、主菜、甜品」的用餐次序編排餐單,主要反映哪項考慮因素?","opts":["用餐次序和習慣","飲食要求","消費能力","目標顧客群"],"a":0,"note":"按用餐次序編排菜式,反映用餐次序和習慣的考慮。"},{"q":"一間餐廳設定人均消費預算為100元並據此設計菜式,主要反映哪項考慮因素?","opts":["消費能力","飲食要求","樓面設施","營業時間"],"a":0,"note":"按人均消費預算設計菜式,反映消費能力這項考慮。"},{"q":"規劃餐單時須考慮的「營運方面」因素,除餐廳位置和營業時間外還包括?","opts":["廚房員工廚藝及人數、廚房設備、製作時間、樓面設施","目標顧客群及消費能力","迎合飲食潮流及同行做法","食物衞生與營養價值"],"a":0,"note":"營運方面因素還包括廚房人員設備製作時間及樓面設施。"},{"q":"規劃餐單時須考慮的「顧客方面」因素,除目標顧客群和消費能力外還包括?","opts":["用餐次序和習慣、飲食要求","廚房設備及製作時間","食材成本與餐單價格","同行做法及經濟環境"],"a":0,"note":"顧客方面因素還包括用餐次序習慣及飲食要求。"},{"q":"為何「同行做法」這一因素既要有特色又要與同業相近?","opts":["讓消費者能夠比較,同時保持餐廳的獨特賣點","純粹為了減省設計成本","法例規定餐單必須與同業相似","與消費者比較無關"],"a":0,"note":"既要有特色又要與同業相近,是為讓消費者比較同時保持賣點。"},{"q":"承辦學校午餐的機構在規劃餐單時,哪項考慮因素會特別被強調?","opts":["餐單營養價值","迎合飲食潮流","同行做法","消費能力"],"a":0,"note":"學校午餐供應商特別重視餐單的營養價值。"},{"q":"若某地區多間餐廳競爭激烈,哪項因素會促使餐廳定期檢視及更新菜式?","opts":["迎合飲食潮流及同行做法","食材成本與餐單價格","廚房設備","樓面設施"],"a":0,"note":"競爭激烈會促使餐廳因應潮流及同業做法而更新菜式。"},{"q":"一間位於商業區、只做午市生意的餐廳,規劃餐單時會特別考慮甚麼?","opts":["營業時間及製作時間(回轉率)","餐廳形象主題","節慶與季節","生化毒素風險"],"a":0,"note":"商業區午市生意特別重視營業時間及出餐效率。"},{"q":"為何餐廳的樓面設計及餐桌擺設會影響餐單設計?","opts":["兩者關係密切,例如上菜方式擺盤等須配合枱面空間","樓面設計與餐單設計完全無關","只影響員工動線,與菜式無關","只影響顧客付款方式"],"a":0,"note":"樓面設計與餐桌擺設跟餐單編排關係密切。"},{"q":"綜合而言,規劃餐單涉及的考慮因素最終目的是?","opts":["讓餐單符合顧客需要,同時為餐廳帶來理想的經營效益","純粹增加菜式款式數目","盡量減少所有成本不計顧客感受","只求餐單設計美觀"],"a":0,"note":"規劃餐單最終目的是兼顧顧客需要與餐廳經營效益。"},{"q":"以下何者最能總結「經濟環境」對餐單設計的影響?","opts":["經濟暢旺時提供較高價食材較佳的菜式,經濟不景時則增加超值選擇","經濟環境對餐單設計完全沒有影響","經濟不景時餐廳必然停業","經濟暢旺時餐廳必然減少菜式款式"],"a":0,"note":"經濟環境會影響餐單的價格及菜式取向。"},{"q":"以下何者最能總結規劃餐單時應考慮的因素的核心精神?","opts":["須從市場、顧客、營運、食物及成本等多角度全面考量,以達致顧客滿意與餐廳盈利兼備","只需考慮食材成本一項因素即可","只需複製同業的餐單即可","餐單設計與經營目標無關"],"a":0,"note":"規劃餐單需從多角度全面考量,兼顧顧客滿意與餐廳盈利。"}]},{"n":13,"title":"餐廳的設計佈局","tag":"RESTAURANT LAYOUT","qs":[{"q":"用餐區餐枱之間越寬敞,對客人有何影響?","opts":["客人用餐更享受,但可招待人數較少","客人會感覺侷促","與客人體驗無關","可招待更多客人"],"a":0,"note":"枱距越寬敞客人用餐更享受,但可招待人數較少。"},{"q":"何謂用餐區的「分區」?","opts":["把用餐區劃分為多個細區域","把所有座位合併為一個大區域","只限於劃分吸煙及非吸煙區","與座位安排無關"],"a":0,"note":"分區指把用餐區劃分為多個細區域。"},{"q":"分區後,每區域通常由誰負責?","opts":["一至多位侍應","只限經理","只限廚師","由客人自行分配"],"a":0,"note":"每區域由一至多位侍應負責。"},{"q":"侍應與客人的比例由甚麼決定?","opts":["視乎餐廳的策略而定","法例硬性規定","完全隨機分配","由客人自行選擇"],"a":0,"note":"侍應與客人比例視乎餐廳策略而定。"},{"q":"分區的作用之一是「便於管理」,具體體現在?","opts":["侍應工作量較平均,權責清楚","侍應可自由選擇是否工作","減少侍應人手需求至零","與管理效率無關"],"a":0,"note":"便於管理體現在工作量平均及權責清楚。"},{"q":"分區如何達到「增加服務級別,增加收入」?","opts":["把部分區域間隔出來,安排專人提供餐桌服務並要求最低消費","把所有區域合併為一體","降低所有區域的服務水平","取消最低消費要求"],"a":0,"note":"間隔區域提供專屬服務並設最低消費以增加收入。"},{"q":"分區後被間隔出來、要求最低消費的區域,能為客人帶來甚麼?","opts":["較高私隱度和更舒適的環境","較低私隱度","較嘈吵的環境","較不舒適的座位"],"a":0,"note":"間隔區域讓客人享有較高私隱度和舒適環境。"},{"q":"分區如何達到「便於營運」?","opts":["在平日清閒時可停用部分區域,方便管理及減低成本","不論客量多寡都開放全部區域","增加清閒時段的人手","與成本控制無關"],"a":0,"note":"清閒時停用部分區域,方便管理並減低成本。"},{"q":"用餐區設計上為何要保留「彈性」?","opts":["以接待不同人數的客人組合","純粹為了美觀","為了減少座位總數","與客人組合人數無關"],"a":0,"note":"保留彈性是為接待各類不同人數的客人。"},{"q":"「兩人用的小餐桌」設計上有何彈性安排?","opts":["可併合成更大的餐桌","只能固定使用不能移動","只限單人使用","必須拆除才能加大"],"a":0,"note":"小餐桌可併合成更大的餐桌以應付更多客人。"},{"q":"「摺入圓邊的四人餐桌」有何彈性用途?","opts":["可翻開成六人用的圓枱","只能維持四人座位不能改變","必須拆除重新訂造","只適用於兩人座位"],"a":0,"note":"摺入圓邊的四人餐桌可翻開成六人用的圓枱。"},{"q":"「一整排座位」的設計方式有何作用?","opts":["使座位編排更有彈性","令座位數目固定不變","只適合單人使用","減少可容納的客人人數"],"a":0,"note":"一整排座位設計使座位編排更具彈性。"},{"q":"餐廳為何會庫存「大圓枱面」?","opts":["需要時放在四人餐桌上,變成八人至十二人用的大餐桌","純粹作裝飾用途","只用於員工用餐","與大型飯局需要無關"],"a":0,"note":"大圓枱面可放在四人餐桌上組成大型餐桌應付大型飯局。"},{"q":"水吧的主要功能是?","opts":["提供各類飲料","負責清潔餐具","負責處理食物投訴","負責員工排班"],"a":0,"note":"水吧的主要功能是提供各類飲料。"},{"q":"為何餐廳重視水吧的設置?","opts":["酒水利潤頗高","酒水利潤極低","水吧設置成本極高但無實際作用","與餐廳盈利無關"],"a":0,"note":"酒水利潤頗高,是餐廳重視水吧的原因之一。"},{"q":"水吧通常設於哪裡?","opts":["用餐區","員工更衣室","經理室","貨倉"],"a":0,"note":"水吧通常設於用餐區。"},{"q":"水吧設於用餐區有何作用?","opts":["能增加格調和氣氛","純粹方便清潔","減少用餐區可用空間而無其他好處","與餐廳氣氛無關"],"a":0,"note":"水吧設於用餐區能增加格調和氣氛。"},{"q":"水吧一般由誰負責?","opts":["調酒師","侍應生","廚師","收銀員"],"a":0,"note":"水吧一般由調酒師負責。"},{"q":"水吧吧台前設有甚麼座位設計?","opts":["單人座位","只設站立空間","六人圓桌","沙發卡座"],"a":0,"note":"水吧吧台前設有方便單人使用的座位。"},{"q":"水吧吧台的單人座位有何作用?","opts":["方便客人與調酒員接觸","純粹節省空間","減少侍應工作量","與顧客體驗無關"],"a":0,"note":"單人座位方便客人與調酒員交流接觸。"},{"q":"款接部的員工一般設於哪個位置?","opts":["入口處","廚房內","經理室","洗手間附近"],"a":0,"note":"款接部員工設於入口處。"},{"q":"款接部負責哪些工作?","opts":["安排座位、接受訂座等","負責烹調菜式","負責清潔廚房","負責財務審計"],"a":0,"note":"款接部負責安排座位及接受訂座等工作。"},{"q":"款接部如何把客人分配到各區域?","opts":["平均分配","只分配到單一區域","隨機分配不考慮容量","由客人自行決定並無安排"],"a":0,"note":"款接部把客人平均分配到各區域。"},{"q":"款接部平均分配客人到各區域,有何作用?","opts":["增加餐廳餐桌回轉率和營業額","減少餐廳整體收入","令個別區域經常過度擠塞","與營業額無關"],"a":0,"note":"平均分配客人有助提高回轉率及營業額。"},{"q":"收銀部負責甚麼工作?","opts":["收銀工作","安排訂座","負責清潔用餐區","負責菜式研發"],"a":0,"note":"收銀部負責收銀工作。"},{"q":"經理室及行政部主要處理甚麼工作?","opts":["行政和會計等工作","純粹用作員工休息","負責烹調示範","負責處理客人訂座"],"a":0,"note":"經理室及行政部主要處理行政和會計工作。"},{"q":"經理室及行政部通常放置哪些設備?","opts":["電腦系統、保險箱和閉路電視等","廚具及爐具","餐桌及座椅","水吧設備"],"a":0,"note":"經理室及行政部放置電腦系統保險箱及閉路電視等。"},{"q":"員工儲物室和更衣室的作用是?","opts":["供員工更換制服和存放私人物品","供顧客更衣使用","存放食材","存放清潔用品"],"a":0,"note":"員工儲物室和更衣室供員工更換制服存放私人物品。"},{"q":"用餐區設有的電子銷售終端機簡稱為?","opts":["POS","ATM","CCTV","GDS"],"a":0,"note":"電子銷售終端機簡稱POS。"},{"q":"POS系統的用途是?","opts":["用於輸入客人訂單","用於監控廚房溫度","用於員工打卡","用於處理食物安全檢測"],"a":0,"note":"POS系統用於輸入客人訂單。"},{"q":"除POS系統外,用餐區附近通常還存放甚麼?","opts":["餐具等用品","財務單據","員工制服","食材原料"],"a":0,"note":"用餐區附近通常也存放餐具等用品。"},{"q":"餐廳其他附屬區域及設施包括哪幾個單位?","opts":["款接部、收銀部、經理室及行政部、員工儲物室和更衣室","只有款接部和收銀部","只有經理室和水吧","只有員工儲物室"],"a":0,"note":"其他附屬區域包括款接部收銀部經理室行政部及員工儲物更衣室等。"},{"q":"以下何者屬於「便於管理」這項分區作用的體現?","opts":["侍應工作量較平均、權責清楚","間隔出私隱度較高的區域並要求最低消費","清閒時段停用部分區域以節省成本","增加餐廳整體座位數目"],"a":0,"note":"工作量平均及權責清楚體現便於管理的作用。"},{"q":"以下何者屬於「增加服務級別,增加收入」這項分區作用的體現?","opts":["間隔出私隱度較高的區域並要求最低消費","侍應工作量較平均","清閒時段停用部分區域","減少侍應與客人比例"],"a":0,"note":"間隔私隱區域並設最低消費體現增加服務級別及收入。"},{"q":"以下何者屬於「便於營運」這項分區作用的體現?","opts":["清閒時段停用部分區域以節省成本","增加服務員數目","提升私隱度以增加收入","擴大用餐區面積"],"a":0,"note":"清閒時停用部分區域以節省成本,體現便於營運。"},{"q":"一間餐廳將部分角落用屏風間隔,提供更高私隱度並要求最低消費,這體現分區的哪項作用?","opts":["增加服務級別,增加收入","便於管理","便於營運","純粹裝飾用途"],"a":0,"note":"提供私隱度並設最低消費,體現增加服務級別和收入。"},{"q":"一間餐廳在星期一至四中午客量較少時,關閉半層樓面座位,這體現分區的哪項作用?","opts":["便於營運","增加服務級別","純粹節省裝修","與分區無關"],"a":0,"note":"清閒時關閉部分座位以節省成本,體現便於營運。"},{"q":"一間餐廳把樓面分成四個區域,每區由一位侍應全權負責點餐及跟進,這體現分區的哪項作用?","opts":["便於管理","增加服務級別","便於營運","與管理無關"],"a":0,"note":"明確劃分負責區域,體現便於管理的作用。"},{"q":"為何餐廳需要「可併合」或「可翻開」的餐桌設計?","opts":["保留佈局彈性,以接待不同人數的客人組合","純粹為了美觀","為減少座位總數","與客人人數無關"],"a":0,"note":"可調整的餐桌設計是為保留佈局彈性應付不同客量。"},{"q":"若有12人的大型飯局到訪,餐廳可如何利用庫存的大圓枱面應對?","opts":["放在四人餐桌上組成大餐桌","要求客人分開多枱就座而不作任何調整","臨時加開新分店","取消該次訂座"],"a":0,"note":"可用庫存的大圓枱面放在四人餐桌上組成大型餐桌。"},{"q":"水吧由調酒師負責,這反映水吧的甚麼特性?","opts":["具備專業性及待客交流的功能","純粹是儲物空間","與顧客體驗無關","只負責清潔工作"],"a":0,"note":"由調酒師負責反映水吧的專業性及交流功能。"},{"q":"水吧設有單人座位讓客人可與調酒師交流,這對餐廳有何幫助?","opts":["提升顧客體驗及餐廳格調氣氛","減少顧客逗留時間","降低酒水銷售額","與餐廳形象無關"],"a":0,"note":"單人座位促進交流,有助提升顧客體驗及餐廳格調。"},{"q":"何謂餐廳「用餐區」的核心設計考量?","opts":["枱距寬敞度與可招待人數之間的取捨,以及分區與彈性佈局的安排","只需考慮座位顏色","只需考慮地板物料","只需考慮天花板高度"],"a":0,"note":"用餐區設計核心在於枱距取捨及分區彈性佈局。"},{"q":"何謂款接部在提升「餐桌回轉率」上的角色?","opts":["透過平均分配客人到各區域,避免個別區域過度擠塞而降低效率","只負責收取訂金","與回轉率無關","只負責處理投訴"],"a":0,"note":"款接部平均分配客人有助提升餐桌回轉率。"},{"q":"為何經理室需要安裝閉路電視?","opts":["配合行政及保安管理需要","純粹用作裝飾","供顧客觀看娛樂節目","與保安管理無關"],"a":0,"note":"閉路電視配合行政及保安管理的需要。"},{"q":"為何員工儲物室及更衣室是餐廳佈局中必要的一環?","opts":["供員工更換制服及存放私人物品,維持員工儀容衞生","純粹用作裝飾空間","只供經理專用","與員工衞生無關"],"a":0,"note":"儲物室及更衣室有助維持員工儀容衞生。"},{"q":"以下何者最能總結餐廳設計佈局中「用餐區」與「水吧」的分別?","opts":["用餐區以座位及分區安排為核心,水吧則以飲料銷售及氣氛營造為核心","兩者功能完全相同","用餐區只負責收銀,水吧只負責清潔","兩者皆與顧客體驗無關"],"a":0,"note":"用餐區與水吧各有不同核心功能。"},{"q":"若某餐廳希望在同一空間內同時服務2人及6人的客人組合,以下哪種傢俱設計最合適?","opts":["可併合的兩人小餐桌及可翻開的四人圓枱","固定不可移動的八人長桌","只設單人座位","只設四人固定座位"],"a":0,"note":"可調整組合的餐桌設計最能靈活應付不同人數客人。"},{"q":"一間餐廳的POS系統主要安裝在哪個位置?","opts":["用餐區","員工更衣室","經理室","水吧內部"],"a":0,"note":"POS系統主要安裝在用餐區,方便侍應輸入訂單。"},{"q":"為何食肆需要保留能容納8至12人的大餐桌彈性安排?","opts":["應付大型飯局或團體聚餐的需要","純粹為了美觀","法例強制要求","與客量無關"],"a":0,"note":"保留大餐桌彈性安排是為應付大型飯局或團體聚餐。"},{"q":"用餐區「分區」設計和「彈性佈局」設計,兩者的共同目的是?","opts":["提升餐廳的運作效率及顧客體驗","純粹為了美觀而無實際作用","增加裝修成本","減少可招待的顧客人數"],"a":0,"note":"分區與彈性佈局設計的共同目的是提升效率及顧客體驗。"},{"q":"一間高級餐廳希望提升某角落座位的私密感並增加收入,可如何佈局?","opts":["用屏風或間隔分隔出獨立區域,並設最低消費","拆除所有座位","完全開放式毫無間隔","降低該區域的服務水平"],"a":0,"note":"以屏風間隔並設最低消費,可提升私密感及收入。"},{"q":"一間茶餐廳希望在早午繁忙時段提高翻枱效率,款接部應如何配合?","opts":["把客人平均而快速地分配到各區域,避免區域擠塞","讓客人自行選擇座位而不作安排","只安排客人坐滿單一區域","延長客人的等候時間"],"a":0,"note":"平均快速分配客人有助提高繁忙時段的翻枱效率。"},{"q":"承辦大型婚宴的酒樓,在餐桌設計上最重視哪項因素?","opts":["佈局彈性(如大圓枱組合)","水吧座位數目","POS系統數量","員工更衣室大小"],"a":0,"note":"大型婚宴最需要具彈性的大型餐桌組合安排。"},{"q":"若餐廳想同時兼顧管理效率及顧客私隱體驗,分區設計可帶來甚麼雙重效益?","opts":["便於管理及增加服務級別和收入","只能達到其中一項效益","兩者互相矛盾無法兼顧","與餐廳收入無關"],"a":0,"note":"分區設計可同時達到便於管理及提升服務收入的雙重效益。"},{"q":"「水吧設於用餐區」和「水吧由調酒師負責」兩者共同帶出水吧的甚麼定位?","opts":["水吧不只是後勤設施,更是提升餐廳格調與顧客體驗的一環","水吧純粹是儲存酒水的倉庫","水吧與顧客體驗完全無關","水吧只是應急設施"],"a":0,"note":"兩項安排共同顯示水吧是提升格調與體驗的重要一環。"},{"q":"以下何者說明餐廳其他附屬設施(如經理室、款接部等)的整體作用?","opts":["支援餐廳前線運作,確保營運行政及顧客服務順暢配合","純粹佔用空間而無實際作用","只服務餐廳管理層","與顧客服務完全無關"],"a":0,"note":"其他附屬設施支援前線運作,確保營運及顧客服務順暢。"},{"q":"為何餐具及日常用品多存放於POS系統附近的用餐區位置?","opts":["方便侍應迅速取用,配合點餐及上菜流程","純粹為了美觀","與服務流程無關","減少可用座位空間而無其他作用"],"a":0,"note":"存放在附近方便侍應迅速取用,配合服務流程。"},{"q":"以下何者最能總結餐廳設計佈局規劃的核心目標?","opts":["在有限空間內平衡顧客舒適度、餐廳運作效率及盈利能力","只追求座位數目最大化","只追求裝潢最華麗","與餐廳盈利完全無關"],"a":0,"note":"設計佈局的核心目標是平衡舒適度效率及盈利能力。"},{"q":"以下何者反映水吧作為餐廳「收入來源」的重要角色?","opts":["酒水利潤頗高,是餐廳整體收入的重要部分","水吧純粹是裝飾用途,對收入沒有貢獻","水吧只服務員工,不對外營業","水吧的收入必然低於用餐區"],"a":0,"note":"酒水利潤頗高,水吧是餐廳整體收入的重要來源之一。"}]},{"n":14,"title":"感官五個方面","tag":"SENSORY ELEMENTS","qs":[{"q":"餐廳利用哪五種感官元素來增強氣氛?","opts":["視覺、觸覺、聽覺、嗅覺和溫度","只有視覺和聽覺","只有味覺和嗅覺","只有觸覺和溫度"],"a":0,"note":"教材列出視覺觸覺聽覺嗅覺和溫度共五種感官元素。"},{"q":"感官元素的主要作用是?","opts":["增強餐廳氣氛","純粹用作裝飾","只影響員工士氣","與顧客體驗無關"],"a":0,"note":"感官元素的主要作用是增強餐廳氣氛。"},{"q":"視覺方面,紅、黃、橙等暖色有何作用?","opts":["增加食慾,令氣氛更溫暖","減少食慾","令人感覺寒冷","與食慾無關"],"a":0,"note":"暖色系能增加食慾並令氣氛更溫暖。"},{"q":"視覺方面,藍、紫、青等冷色有何作用?","opts":["讓人感覺閒適","令人食慾大增","令人感覺躁動不安","與情緒無關"],"a":0,"note":"冷色系讓人感覺較為閒適。"},{"q":"餐廳以鏡裝飾牆身,有何視覺效果?","opts":["使餐廳看來大一點,感覺較為熱鬧","使餐廳看來更狹窄","減低餐廳亮度","與空間感無關"],"a":0,"note":"鏡牆裝飾使餐廳看來較大,感覺較熱鬧。"},{"q":"明亮燈光在視覺方面有何作用?","opts":["令人心情愉快,氣氛歡樂","令人感覺沉悶","營造神秘氣氛","與心情無關"],"a":0,"note":"明亮燈光令人心情愉快,氣氛歡樂。"},{"q":"柔和燈光在視覺方面有何作用?","opts":["營造浪漫親密的氣氛","令人感覺更熱鬧","增加食慾至最大程度","與氣氛營造無關"],"a":0,"note":"柔和燈光營造浪漫親密的氣氛。"},{"q":"觸覺方面,客人接觸餐廳哪些物件會影響對餐廳的感覺?","opts":["餐桌、座椅、餐具、地板等","只有餐具","只有燈光","只有背景音樂"],"a":0,"note":"客人接觸餐桌座椅餐具地板等均影響對餐廳的感覺。"},{"q":"觸覺方面,環境溫度過冷或過熱有何影響?","opts":["都令人不舒服,會破壞用餐的感覺","完全不影響用餐體驗","只有過冷會造成影響","只有過熱會造成影響"],"a":0,"note":"過冷或過熱的環境都會破壞用餐感覺。"},{"q":"聽覺方面,餐廳音量及聲音種類的接受程度視乎甚麼?","opts":["場合和顧客對餐廳的期望","餐廳的裝修年份","餐廳的座位數目","餐具的材質"],"a":0,"note":"音量及聲音接受程度視乎場合及顧客的期望。"},{"q":"聽覺方面,明快的背景音樂有何作用?","opts":["增加熱鬧氣氛","營造寧靜私密的氣氛","降低顧客食慾","與氣氛營造無關"],"a":0,"note":"明快的背景音樂能增加熱鬧氣氛。"},{"q":"聽覺方面,輕柔的背景音樂適合甚麼場合?","opts":["放鬆或促膝談心的場合","熱鬧派對場合","大型宴會場合","與場合無關,任何場合皆適合"],"a":0,"note":"輕柔背景音樂適合放鬆或促膝談心的場合。"},{"q":"嗅覺方面,濃烈的咖啡味和烘麵包香氣有何作用?","opts":["吸引途人停下光顧","令途人加快腳步離開","與吸引顧客無關","只影響員工食慾"],"a":0,"note":"咖啡味及麵包香氣能吸引途人停下光顧。"},{"q":"嗅覺方面,餐廳應如何處理廚房產生的氣味?","opts":["絕少讓煮食及清潔時發出的氣味散發到樓面","盡量讓氣味散發到樓面增加食慾","與樓面氣味管理無關","只需在假日處理氣味問題"],"a":0,"note":"餐廳應避免廚房氣味散發至樓面用餐區。"},{"q":"溫度方面,室溫如何影響客人對餐廳的印象?","opts":["直接影響客人對餐廳的整體印象","與客人印象完全無關","只影響員工工作效率","只在夏天才有影響"],"a":0,"note":"室溫直接影響客人對餐廳的整體印象。"},{"q":"若客人感到悶熱難當,可能有何後果?","opts":["不會久留,甚至日後不再光顧","會停留更長時間","對餐廳印象反而更好","與是否再次光顧無關"],"a":0,"note":"悶熱難當會令客人不願久留甚至不再光顧。"},{"q":"若室溫太低,可能有何後果?","opts":["客人感覺冷清,同樣影響氣氛","客人會感覺更熱鬧開心","對用餐體驗完全沒有影響","客人會停留更久"],"a":0,"note":"室溫太低同樣會令客人感覺冷清,影響氣氛。"},{"q":"一間餐廳大量使用紅色及橙色的裝潢,主要想營造甚麼效果?","opts":["增加食慾,溫暖氣氛","減少食慾,冷靜氣氛","營造寧靜私密感","與食慾及氣氛無關"],"a":0,"note":"紅橙等暖色系旨在增加食慾並營造溫暖氣氛。"},{"q":"一間主打靜謐氛圍的高級餐廳,較適合使用哪類色系?","opts":["藍、紫、青等冷色","紅、黃、橙等暖色","純白配熒光燈","與色系選擇無關"],"a":0,"note":"追求靜謐氛圍的餐廳較適合使用藍紫青等冷色。"},{"q":"一間餐廳在細小的用餐空間內加設大面積鏡牆,主要目的是?","opts":["使空間看來較大,感覺熱鬧","使空間看來更狹小","純粹遮蓋牆身瑕疵","與空間感營造無關"],"a":0,"note":"鏡牆能使細小空間看來較大,感覺較熱鬧。"},{"q":"一間浪漫主題餐廳,燈光設計應偏向?","opts":["柔和燈光","明亮刺眼的燈光","閃爍不定的燈光","與主題無關的任何燈光"],"a":0,"note":"浪漫主題餐廳的燈光設計應偏向柔和。"},{"q":"一間主打熱鬧派對氣氛的餐廳,燈光設計應偏向?","opts":["明亮燈光","柔和昏暗燈光","完全關燈","與氣氛營造無關"],"a":0,"note":"熱鬧派對氣氛的餐廳燈光設計應偏向明亮。"},{"q":"餐廳選用木製或布藝座椅而非冰冷的金屬座椅,主要考慮哪項感官?","opts":["觸覺","嗅覺","聽覺","溫度(與座椅材質無直接關聯)"],"a":0,"note":"座椅材質的觸感屬於觸覺方面的考慮。"},{"q":"餐廳地板保持乾淨防滑,除安全外也涉及哪項感官體驗?","opts":["觸覺","嗅覺","聽覺","視覺(地板觸感非視覺範疇)"],"a":0,"note":"地板觸感及舒適度屬於觸覺方面的考慮。"},{"q":"一間餐廳於情人節安排輕柔背景音樂,主要配合哪種場合?","opts":["放鬆或促膝談心的場合","熱鬧派對場合","大型團體聚餐場合","與場合無關"],"a":0,"note":"輕柔音樂配合情人節這類促膝談心的場合。"},{"q":"一間熱鬧的酒吧餐廳播放節奏明快的音樂,主要目的是?","opts":["增加熱鬧氣氛","營造寧靜氣氛","減低顧客消費意欲","與氣氛營造無關"],"a":0,"note":"明快音樂旨在增加酒吧餐廳的熱鬧氣氛。"},{"q":"麵包店在店外飄出陣陣麵包香氣,主要利用哪項感官吸引顧客?","opts":["嗅覺","視覺","聽覺","觸覺"],"a":0,"note":"麵包香氣主要利用嗅覺吸引顧客。"},{"q":"為何餐廳要盡量避免廚房油煙味道飄到用餐區?","opts":["避免影響客人用餐體驗(嗅覺方面的負面感受)","油煙味有助增加食慾故應盡量散發","與嗅覺體驗無關","油煙味只影響廚房員工"],"a":0,"note":"避免油煙味飄至用餐區以免造成負面嗅覺體驗。"},{"q":"一間餐廳全年將室內溫度控制在舒適範圍,主要為了避免甚麼?","opts":["客人因太熱或太冷而不願久留或不再光顧","增加餐廳的電費開支而無其他好處","與顧客去留意欲無關","純粹為了節省能源"],"a":0,"note":"控制舒適室溫可避免客人因不適而不願久留。"},{"q":"綜合而言,「溫度」這項感官元素為何被視為重要?","opts":["直接影響客人對餐廳的整體印象及是否願意再次光顧","與客人的整體印象無關","只在特定季節才重要","純粹是次要的裝飾考慮"],"a":0,"note":"溫度直接影響客人的整體印象及回訪意欲。"},{"q":"以下何者屬於「視覺」感官元素的例子?","opts":["燈光強弱、色彩配搭、鏡牆裝飾","背景音樂的音量","室內溫度的高低","餐具的觸感"],"a":0,"note":"燈光色彩及鏡牆裝飾均屬視覺感官元素。"},{"q":"以下何者屬於「觸覺」感官元素的例子?","opts":["餐桌、座椅、餐具、地板的觸感","咖啡的香氣","背景音樂的種類","室內燈光的強弱"],"a":0,"note":"餐桌座椅餐具及地板的觸感屬於觸覺感官元素。"},{"q":"以下何者屬於「聽覺」感官元素的例子?","opts":["背景音樂的音量及種類","室內溫度","餐具的觸感","牆身色彩"],"a":0,"note":"背景音樂的音量及種類屬於聽覺感官元素。"},{"q":"以下何者屬於「嗅覺」感官元素的例子?","opts":["咖啡香氣、麵包香氣","背景音樂","室內溫度","餐桌觸感"],"a":0,"note":"咖啡及麵包香氣屬於嗅覺感官元素。"},{"q":"以下何者屬於「溫度」感官元素的考量?","opts":["室內冷氣或暖氣的調節","牆身顏色配搭","背景音樂選擇","餐具材質選擇"],"a":0,"note":"室內冷氣暖氣的調節屬於溫度感官元素。"},{"q":"一間餐廳希望營造「浪漫親密」氣氛,以下哪個組合最合適?","opts":["柔和燈光配合輕柔背景音樂","明亮燈光配合節奏明快音樂","強烈冷氣配合刺眼燈光","完全靜音配合全黑環境"],"a":0,"note":"柔和燈光配合輕柔音樂最能營造浪漫親密氣氛。"},{"q":"一間餐廳希望營造「熱鬧歡樂」氣氛,以下哪個組合最合適?","opts":["明亮燈光配合明快背景音樂","柔和燈光配合輕柔音樂","昏暗燈光配合寂靜無聲","冷色系裝潢配合低溫環境"],"a":0,"note":"明亮燈光配合明快音樂最能營造熱鬧歡樂氣氛。"},{"q":"若餐廳希望客人感覺空間感更大,除擴建外還可運用哪種視覺技巧?","opts":["以鏡裝飾牆身","使用最暗的燈光","減少座椅數目而不作其他調整","播放輕柔音樂"],"a":0,"note":"以鏡裝飾牆身是常用的視覺擴大空間感技巧。"},{"q":"五種感官元素中,哪一項與「食慾」的關聯在教材中被直接提及?","opts":["視覺(暖色系增加食慾)","聽覺","嗅覺與食慾完全無關","觸覺"],"a":0,"note":"教材直接提及暖色系視覺元素能增加食慾。"},{"q":"為何教材將「溫度」獨立列為一項感官元素,而非只歸入觸覺?","opts":["溫度對整體用餐印象及客人去留意欲有顯著且獨立的影響","溫度其實與觸覺完全相同,只是名稱不同","溫度並不重要,只是形式上獨立列出","溫度只在極端天氣下才需考慮"],"a":0,"note":"溫度對用餐印象及去留意欲有獨立而顯著的影響。"},{"q":"一間餐廳的桌椅選用讓客人感覺硬冷不適,這反映哪項感官元素處理不當?","opts":["觸覺","聽覺","嗅覺","視覺"],"a":0,"note":"桌椅觸感硬冷不適反映觸覺元素處理不當。"},{"q":"一間餐廳背景音樂過大聲,令客人交談困難,這反映哪項感官元素處理不當?","opts":["聽覺","視覺","觸覺","溫度"],"a":0,"note":"音樂過大聲影響交談,反映聽覺元素處理不當。"},{"q":"一間餐廳廚房油煙味瀰漫至用餐區,這反映哪項感官元素處理不當?","opts":["嗅覺","視覺","聽覺","觸覺"],"a":0,"note":"油煙味瀰漫反映嗅覺元素處理不當。"},{"q":"一間餐廳燈光過於昏暗,令客人看不清菜單,這反映哪項感官元素處理不當?","opts":["視覺","聽覺","嗅覺","溫度"],"a":0,"note":"燈光昏暗影響閱讀菜單,反映視覺元素處理不當。"},{"q":"一間餐廳空調故障導致室內悶熱,這反映哪項感官元素處理不當?","opts":["溫度","視覺","聽覺","觸覺"],"a":0,"note":"空調故障導致悶熱,反映溫度元素處理不當。"},{"q":"餐廳善用五種感官元素的最終目的是?","opts":["增強餐廳氣氛,提升顧客的整體用餐體驗","純粹增加裝修成本","與顧客滿意度無關","只為配合廚師個人喜好"],"a":0,"note":"善用感官元素的最終目的是提升顧客整體用餐體驗。"},{"q":"以下何者說明「聽覺」元素須因應「場合」調整的原因?","opts":["不同用餐目的(如熱鬧聚會或私密談心)對聲音的接受程度不同","所有場合對音量的要求完全相同","聽覺元素與場合完全無關","法例規定各場合音量必須一致"],"a":0,"note":"不同用餐目的對聲音接受程度有別,需因應場合調整。"},{"q":"一間位於鬧市、主打年輕人蒲點風格的餐廳,較適合哪種燈光及音樂組合?","opts":["明亮燈光及明快音樂","柔和燈光及輕柔音樂","完全靜音及全黑燈光","與目標客群無關,隨意搭配"],"a":0,"note":"年輕人蒲點風格較適合明亮燈光配合明快音樂。"},{"q":"一間主打長者及家庭客群、強調舒適悠閒的茶樓,較適合哪種燈光及音樂組合?","opts":["柔和燈光及輕柔背景音樂","明亮燈光及節奏強勁音樂","完全無燈光及無音樂","與客群需要無關"],"a":0,"note":"舒適悠閒定位較適合柔和燈光配合輕柔背景音樂。"},{"q":"為何咖啡店常特意讓煮咖啡的香氣飄散至店外?","opts":["利用嗅覺吸引途人停下光顧","純粹為了通風","與吸引顧客無關","減少店內咖啡香氣濃度"],"a":0,"note":"讓咖啡香氣飄散店外是利用嗅覺吸引途人光顧的策略。"},{"q":"綜合視覺、觸覺、聽覺、嗅覺、溫度五方面,教材強調餐廳應如何運用?","opts":["靈活配合餐廳定位及目標客群,全面營造合適氣氛","只需選擇其中一項感官元素刻意加強","完全忽略感官因素,只專注於食物本身","感官元素越誇張越好,不需配合定位"],"a":0,"note":"五種感官元素應靈活配合餐廳定位及客群全面營造氣氛。"},{"q":"一間餐廳同時使用暖色系裝潢及柔和燈光,可能希望達到甚麼效果?","opts":["溫暖而不失浪漫的氣氛","冰冷而疏離的氣氛","極度刺眼的視覺效果","與氣氛營造完全無關"],"a":0,"note":"暖色系配合柔和燈光可營造溫暖而浪漫的氣氛。"},{"q":"若餐廳的座椅、餐具觸感粗糙老舊,即使菜式優秀,可能對顧客體驗有何影響?","opts":["觸覺上的負面感受仍會影響整體用餐印象","完全不會影響顧客滿意度","只會影響員工工作情緒","與顧客回訪意欲無關"],"a":0,"note":"觸覺負面感受仍會拖累整體用餐印象,即使菜式優秀。"},{"q":"以下何者最能總結五種感官元素之間的關係?","opts":["五者相輔相成,共同塑造顧客對餐廳的整體感官體驗","五者互相獨立,完全沒有關聯","只有視覺元素才會影響顧客體驗","五者之間存在互相抵銷的效果"],"a":0,"note":"五種感官元素相輔相成,共同塑造整體顧客體驗。"},{"q":"一間酒店大堂餐廳希望顧客一踏入即感受到尊貴閒適的氣氛,應如何運用視覺元素?","opts":["採用柔和燈光及沉穩冷色調配搭","採用刺眼明亮燈光及鮮艷暖色","完全不設燈光","隨意搭配,無需考慮定位"],"a":0,"note":"尊貴閒適氣氛適合柔和燈光配合沉穩冷色調。"},{"q":"一間主題公園內的家庭餐廳希望營造歡樂熱鬧的用餐氣氛,應如何運用聽覺及視覺元素?","opts":["使用明快音樂及明亮燈光","使用輕柔音樂及柔和燈光","完全靜音及昏暗燈光","與氣氛營造需要無關"],"a":0,"note":"歡樂熱鬧氣氛適合明快音樂配合明亮燈光。"},{"q":"承上題,為何選擇這樣的組合較適合家庭客群?","opts":["配合家庭客群期望輕鬆愉快的用餐體驗","家庭客群普遍偏好寧靜昏暗環境","與家庭客群的期望無關","純粹是成本考慮"],"a":0,"note":"明快熱鬧的組合配合家庭客群期望的輕鬆愉快體驗。"},{"q":"若一間餐廳想強化「浪漫」定位,以下哪組感官元素組合最貼切?","opts":["柔和燈光、輕柔音樂、溫暖但不過熱的室溫","明亮燈光、明快音樂、極低室溫","刺眼燈光、嘈雜音樂、悶熱室溫","與感官元素組合無關,只需菜式浪漫"],"a":0,"note":"柔和燈光輕柔音樂及舒適室溫最能強化浪漫定位。"},{"q":"感官元素的運用是否需要因應餐廳定位或場合而調整?","opts":["需要,不同定位及場合適合不同的感官配搭","不需要,所有餐廳應使用相同配搭","只有視覺元素需要調整,其餘不需要","只有大型餐廳才需要考慮這問題"],"a":0,"note":"感官元素運用需因應餐廳定位及場合作出調整。"},{"q":"以下何者最能總結感官五個方面對餐廳經營的重要性?","opts":["感官體驗是顧客評價餐廳的重要一環,直接影響顧客滿意度及回訪意欲","感官體驗只是次要裝飾,對經營毫無實質影響","只有食物味道才會影響顧客滿意度","感官元素只適用於高級餐廳"],"a":0,"note":"感官體驗直接影響顧客滿意度及回訪意欲,對經營十分重要。"}]},{"n":15,"title":"火災的分類及滅火設備","tag":"FIRE SAFETY","qs":[{"q":"物質燃燒需要哪四個要素?","opts":["可燃物、溫度、氧氣、連鎖反應","只需可燃物及氧氣","只需溫度及氧氣","只需可燃物一項"],"a":0,"note":"燃燒四要素包括可燃物溫度氧氣及連鎖反應。"},{"q":"「可燃物」包括哪些物質狀態的燃料?","opts":["固體(如炭和煤)、液體(如汽油)和氣體(如石油氣)","只包括固體物質","只包括液體物質","只包括氣體物質"],"a":0,"note":"可燃物包括固體液體及氣體三種狀態的燃料。"},{"q":"燃燒要素中的「溫度」扮演甚麼角色?","opts":["必須有熱力才使可燃物釋出物質,與氧氣產生化學作用和燃燒","溫度與燃燒過程完全無關","只影響燃燒後的煙霧顏色","溫度只在滅火時才重要"],"a":0,"note"
