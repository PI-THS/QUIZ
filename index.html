ts":["企業員工顧客三方的表現環環相扣,缺一不可地共同決定服務成效","三個持份者其實完全獨立,互不影響","只有企業的表現才重要,員工及顧客無關重要","顧客的角色純粹是被動接受服務"],"a":0,"note":"三個持份者的表現環環相扣,共同決定整體服務成效。"},{"q":"若企業只重視「對外行銷」的宣傳,卻忽略「內部行銷」培訓員工,可能有何後果?","opts":["企業對外承諾的服務水平未必能夠實際兌現,削弱顧客信任","對外宣傳的效果必然因此而提升","員工的表現與對外宣傳完全無關","顧客的信任不會受到任何影響"],"a":0,"note":"忽略內部行銷可能令對外承諾無法兌現,削弱顧客信任。"},{"q":"顧客在主題公園排隊時對其他遊客做出粗魯行為,可能對誰造成負面影響?","opts":["員工提供優質服務的能力","純粹影響企業的財務狀況","純粹影響企業的宣傳策略","與服務金三角的任何一方都無關"],"a":0,"note":"顧客的不當行為可能令員工無法提供優質服務,屬顧客對員工的負面影響。"},{"q":"若企業的對外宣傳過度誇大服務內容,而員工實際無法兌現,會產生甚麼問題?","opts":["顧客期望與實際體驗出現落差,影響滿意度及信任","顧客滿意度必然因此提升","與顧客的期望管理無關","員工的表現會自動配合宣傳內容"],"a":0,"note":"過度承諾但無法兌現,會令顧客期望與實際體驗出現落差。"},{"q":"為何內部行銷策略中「賦予員工處理顧客問題的權力」十分重要?","opts":["讓前線員工能即時應對顧客需要,避免因層層請示而延誤服務","賦予員工權力必然導致管理混亂","前線員工不應擁有任何決策權力","與顧客服務效率無關"],"a":0,"note":"賦予員工適當權力,讓其能即時應對顧客需要,避免延誤。"},{"q":"為何「員工對企業的回饋」被視為內部行銷的重要一環?","opts":["前線員工最了解顧客實際需要,其回饋有助企業改善政策及服務設計","員工的回饋與企業決策完全無關","企業決策只應由管理層單方面制定","員工的意見必然缺乏參考價值"],"a":0,"note":"前線員工最了解顧客實際需要,其回饋有助改善企業決策。"},{"q":"若一間酒店的管理層定期與員工分享公司發展目標及服務理念,這屬於內部行銷中哪一項策略?","opts":["溝通","員工培訓","營運制度","員工待遇"],"a":0,"note":"定期分享發展目標及理念屬於內部行銷中的溝通策略。"},{"q":"若一間酒店為前線員工提供有薪年假及員工福利計劃,這屬於內部行銷中哪一項策略?","opts":["員工待遇","員工培訓","營運制度","溝通"],"a":0,"note":"提供有薪年假及福利計劃屬於員工待遇策略。"},{"q":"若一間酒店賦予前線員工權力,可自行決定為不滿意的顧客提供小額補償,這屬於內部行銷中哪一項策略?","opts":["營運制度","員工培訓","員工待遇","溝通"],"a":0,"note":"賦予員工處理問題的決策權力屬於營運制度策略。"},{"q":"以下何者最能總結「對外行銷」「互動行銷」及「內部行銷」三者之間的關係?","opts":["三者環環相扣:對外行銷製造承諾,互動行銷兌現承諾,內部行銷促成承諾的兌現","三者完全獨立,互不影響","只有對外行銷才是企業成功的關鍵","內部行銷與服務質素完全無關"],"a":0,"note":"三種行銷環環相扣,分別負責製造兌現及促成承諾。"},{"q":"為何服務金三角模式特別適用於服務業(如酒店餐飲)的管理分析?","opts":["服務業高度依賴人與人之間的互動,三個持份者的關係尤為關鍵","服務金三角只適用於製造業","服務業不需要考慮員工與顧客的關係","服務金三角與企業經營策略無關"],"a":0,"note":"服務業高度依賴人際互動,服務金三角有助分析三方關係。"},{"q":"若顧客透過意見調查向企業反映需要,而企業據此調整服務內容,這體現服務金三角中哪一組關係?","opts":["企業與顧客之間的對外行銷關係","員工與顧客之間的互動行銷關係","企業與員工之間的內部行銷關係","與服務金三角三組關係皆無關"],"a":0,"note":"顧客向企業反映需要,屬企業與顧客之間的對外行銷關係。"},{"q":"若前線員工因未獲賦權,遇到顧客特別要求時須逐級請示上級才能處理,可能反映內部行銷哪方面的不足?","opts":["營運制度未能有效賦予員工適當的決策權力","員工待遇過於優厚","企業的對外宣傳過度誇張","與內部行銷完全無關"],"a":0,"note":"未能賦予員工適當決策權力,反映營運制度方面的不足。"},{"q":"以下何者最能總結服務金三角模式對企業管理的啟示?","opts":["企業須同時兼顧對外承諾的製造、員工與顧客互動的兌現,以及內部員工的培育支援,三者缺一不可","企業只需專注宣傳推廣即可成功","員工的表現對企業成功與否毫無影響","顧客的角色純粹是被動的服務接受者"],"a":0,"note":"服務金三角提示企業須同時兼顧三方關係,缺一不可。"},{"q":"一位酒店禮賓部員工記得熟客的喜好並主動安排相關服務,這體現互動行銷中哪一方的表現?","opts":["員工對顧客","企業對顧客","企業對員工","純粹是員工的個人行為,與行銷分類無關"],"a":0,"note":"員工主動提供貼心服務,體現互動行銷中員工對顧客的表現。"},{"q":"若企業對外廣告承諾「五星級服務」,但員工實際上未獲得相應培訓,問題主要出在哪方面?","opts":["內部行銷不足,導致對外承諾無法透過互動行銷兌現","對外行銷完全沒有任何問題","顧客對企業的回饋出現問題","純粹是廣告製作技術上的問題"],"a":0,"note":"內部行銷(培訓)不足,令對外承諾無法在互動行銷階段被兌現。"},{"q":"為何「顧客對企業」的意見調查回饋,是對外行銷中不可或缺的一環?","opts":["讓企業能根據真實顧客需要調整宣傳及產品定位,而非單憑主觀猜測","意見調查與對外行銷的策略制定完全無關","企業應完全憑管理層主觀判斷,不需任何顧客回饋","顧客的意見對企業的宣傳策略沒有任何參考價值"],"a":0,"note":"意見調查讓企業根據真實需要調整宣傳定位,而非單憑主觀猜測。"},{"q":"一位主題公園員工因遊客在排隊時的粗魯行為而難以維持秩序及提供服務,這體現服務金三角中哪一方對哪一方的影響?","opts":["顧客對員工的負面影響","員工對顧客的負面影響","企業對員工的負面影響","與服務金三角的持份者關係完全無關"],"a":0,"note":"遊客的不當行為影響員工服務表現,體現顧客對員工的負面影響。"},{"q":"為何企業推行「內部行銷」策略時,應同時涵蓋培訓、制度、待遇及溝通四方面,而非只著重其中一項?","opts":["單一方面的改善未必足以全面提升員工滿意度及服務表現,四方面須相輔相成","只需改善其中一項,其餘三項便會自動得到改善","四方面之間完全沒有任何關聯,可以獨立處理","員工待遇是唯一需要重視的內部行銷策略"],"a":0,"note":"單一方面改善未必足夠,四方面須相輔相成才能全面提升員工滿意度及表現。"},{"q":"若一間酒店的前線員工普遍認為管理層從不聆聽他們的意見,這反映內部行銷「溝通」方面出現甚麼問題?","opts":["企業與員工之間缺乏有效的雙向溝通機制","企業與員工的溝通機制已十分完善","此情況與內部行銷的溝通策略完全無關","員工的意見從不具備任何參考價值"],"a":0,"note":"管理層不聆聽員工意見,反映企業與員工之間缺乏有效的雙向溝通機制。"},{"q":"以下何者最能說明服務金三角模式如何幫助企業診斷服務問題的根源?","opts":["透過檢視企業員工顧客三方各自的表現及互動關係,有助定位問題出現在哪個承諾環節","服務金三角模式純粹是學術理論,無法用於實際問題診斷","服務問題的根源必然只與員工的個人表現有關","服務金三角模式與企業的問題診斷完全無關"],"a":0,"note":"檢視三方表現及互動關係,有助定位問題出現在製造兌現或促成承諾的哪個環節。"}]},{"n":4,"title":"「關鍵時刻」的定義及其重要性","tag":"MOMENTS OF TRUTH","qs":[{"q":"「關鍵時刻」的定義是?","opts":["顧客與企業接觸的某些「接觸點」","純粹指企業成立的週年紀念日","純粹指企業推出新產品的時刻","只限於顧客投訴的時刻"],"a":0,"note":"關鍵時刻指在整個顧客服務過程中,顧客與企業接觸的某些接觸點。"},{"q":"「關鍵時刻」中的「接觸點」可以是甚麼?","opts":["員工、設施、產品或服務","只限於員工本身","只限於企業的廣告","只限於價格標籤"],"a":0,"note":"接觸點可以是員工設施產品或服務。"},{"q":"顧客對企業服務的滿意度主要來自甚麼?","opts":["顧客在這些接觸點所得的印象","純粹來自企業的知名度","純粹來自產品的售價","與接觸點的印象無關"],"a":0,"note":"顧客滿意度主要來自其在各個接觸點所得的印象。"},{"q":"「關鍵時刻」的重要性之一是?","opts":["它是顧客評價,形成滿意度印象的位置","它只是企業內部的行政程序","它與顧客的評價完全無關","它只在售後階段才會出現"],"a":0,"note":"關鍵時刻是顧客形成滿意度印象的關鍵位置。"},{"q":"「關鍵時刻」的重要性之二是?","opts":["改進服務質量,能建立良好的印象,改變顧客評價","它無法透過改進服務質量而改變","它只能维持不變,無法改善","與服務質量的改進完全無關"],"a":0,"note":"透過改進服務質量,能在關鍵時刻建立良好印象,改變顧客評價。"},{"q":"以下何者是酒店服務中「關鍵時刻」的例子?","opts":["顧客致電訂房時與職員的對話","企業的年度財務報表","企業內部的員工考核會議","供應商的送貨單據"],"a":0,"note":"顧客致電訂房與職員對話,是顧客與企業接觸的關鍵時刻。"},{"q":"以下何者是餐廳服務中「關鍵時刻」的例子?","opts":["侍應為顧客點餐及上菜的過程","廚房內部的食材採購清單","餐廳的租金合約","員工的更表安排"],"a":0,"note":"侍應點餐上菜的過程是顧客與企業接觸的關鍵時刻。"},{"q":"顧客踏入酒店大堂的第一刻,屬於哪種概念?","opts":["關鍵時刻(接觸點)","純粹屬於營運後勤程序","與顧客滿意度形成無關","只是純粹的裝修展示"],"a":0,"note":"顧客踏入大堂的一刻,是顧客與企業接觸的關鍵時刻。"},{"q":"以下哪一項不屬於顧客服務中的「接觸點」?","opts":["企業內部的財務審計會議(顧客不會接觸)","前台職員的接待態度","客房的清潔程度","網站的訂購流程"],"a":0,"note":"財務審計會議屬企業內部程序,顧客不會直接接觸,故不屬於接觸點。"},{"q":"為何「設施」也能構成關鍵時刻的接觸點?","opts":["顧客使用或觀察設施時,也會形成對企業服務的印象","設施只是純粹的裝飾,與顧客印象無關","設施只在維修時才算接觸點","與顧客滿意度無任何關聯"],"a":0,"note":"顧客使用或觀察設施時,同樣會形成對企業的印象。"},{"q":"為何「產品」本身也能構成關鍵時刻的接觸點?","opts":["顧客體驗產品品質的一刻,同樣會影響其對企業的整體印象","產品與顧客滿意度完全無關","產品只在採購階段才算接觸點","產品的品質與服務印象無關"],"a":0,"note":"顧客體驗產品品質的一刻,同樣影響其對企業的整體印象。"},{"q":"若顧客在酒店的其中一個接觸點(如行李搬運)獲得負面體驗,可能有何影響?","opts":["即使其他接觸點表現良好,這次負面體驗仍可能拖累整體滿意度","負面體驗完全不會影響顧客的整體印象","顧客只會記得正面的接觸點","負面體驗只會影響行李員個人,不影響酒店整體形象"],"a":0,"note":"單一接觸點的負面體驗,仍可能拖累顧客對企業的整體滿意度。"},{"q":"為何企業需要重視顧客服務過程中「每一個」接觸點?","opts":["顧客的整體滿意度是由多個接觸點的印象累積而成","只有第一個接觸點才會影響顧客滿意度","只有最後一個接觸點才會影響顧客滿意度","接觸點的數量與顧客滿意度完全無關"],"a":0,"note":"顧客的整體滿意度由多個接觸點的印象累積而成,故每個都重要。"},{"q":"「關鍵時刻」概念與R.A.T.E.R.模式中的哪一項最直接相關?","opts":["有形性及反應能力等,均在各接觸點中被顧客感知","純粹只與可信性相關","與R.A.T.E.R.模式完全無關","只與價格因素相關"],"a":0,"note":"R.A.T.E.R.各項指標,均是顧客在關鍵時刻(接觸點)中所感知的內容。"},{"q":"「關鍵時刻」概念與服務金三角中的「互動行銷」有何關聯?","opts":["互動行銷正是員工與顧客接觸的過程,是關鍵時刻發生的主要場景","兩者完全沒有任何關聯","關鍵時刻只發生在對外行銷階段","關鍵時刻只發生在內部行銷階段"],"a":0,"note":"互動行銷正是員工與顧客接觸產生關鍵時刻的主要場景。"},{"q":"若企業希望改善顧客在「關鍵時刻」的體驗,較直接的做法是?","opts":["培訓員工妥善處理與顧客接觸的每個環節","純粹增加廣告宣傳開支","純粹降低產品或服務的售價","與員工培訓完全無關"],"a":0,"note":"培訓員工妥善處理每個接觸環節,是改善關鍵時刻體驗的直接做法。"},{"q":"為何酒店的「電話訂房」過程也被視為關鍵時刻?","opts":["這是顧客與企業的其中一個接觸點,職員的表現會影響顧客的初步印象","電話訂房純粹是行政程序,與顧客印象無關","只有親身到訪才算關鍵時刻","電話訂房不涉及員工與顧客的接觸"],"a":0,"note":"電話訂房是顧客與企業的接觸點,職員表現影響顧客的初步印象。"},{"q":"為何顧客「退房結賬」的過程也是關鍵時刻?","opts":["這是顧客住宿體驗的最後印象,同樣影響其對整體服務的評價","退房結賬純粹是財務程序,與顧客評價無關","顧客的最後印象不會影響其整體評價","退房後顧客不會再對企業有任何評價"],"a":0,"note":"退房結賬是顧客住宿體驗的最後印象,同樣影響整體服務評價。"},{"q":"以下何者最能說明「關鍵時刻」概念對前線員工培訓的啟示?","opts":["員工須明白自己的一言一行,都可能是影響顧客整體滿意度的關鍵接觸點","員工的表現與顧客滿意度無關,培訓意義不大","只有管理層的決策才會影響顧客滿意度","員工培訓應只著重技術知識,不需理會態度"],"a":0,"note":"員工須明白自己的言行都可能是關鍵接觸點,直接影響顧客滿意度。"},{"q":"以下何者是網站或手機應用程式作為「關鍵時刻」的例子?","opts":["顧客透過網站進行訂房或查詢時的使用體驗","企業內部的伺服器維護記錄","企業的程式開發成本","與顧客滿意度完全無關的技術文件"],"a":0,"note":"顧客使用網站或應用程式訂房查詢時的體驗,也是關鍵時刻的例子。"},{"q":"若企業的網上預訂系統經常出現錯誤,可能對哪方面造成負面影響?","opts":["顧客在此接觸點形成的負面印象,可能影響其對企業的整體評價","不會對顧客滿意度造成任何影響","只會影響企業的技術部門,不影響顧客觀感","與顧客的滿意度形成完全無關"],"a":0,"note":"預訂系統錯誤會在此接觸點形成負面印象,影響顧客整體評價。"},{"q":"為何「改進服務質量」能夠「改變顧客評價」?","opts":["顧客的評價建基於接觸點的實際體驗,體驗改善便有機會扭轉負面印象","顧客的評價一旦形成便永遠不會改變","服務質量與顧客評價完全沒有關聯","顧客評價只取決於價格,與服務質量無關"],"a":0,"note":"顧客評價建基於實際體驗,改善服務質量有機會扭轉負面印象。"},{"q":"以下何者最能總結「關鍵時刻」概念的核心價值?","opts":["提醒企業顧客服務中每個接觸環節都足以影響整體滿意度,不容忽視","純粹是學術理論,對實際管理沒有幫助","只有大型企業才需要考慮這概念","與企業的競爭力完全無關"],"a":0,"note":"關鍵時刻概念提醒企業,每個接觸環節都足以影響整體滿意度。"},{"q":"若一間餐廳的訂座職員態度友善,但侍應上菜時態度冷漠,可能對顧客整體印象有何影響?","opts":["即使部分接觸點表現良好,個別環節的不足仍可能影響整體滿意度","顧客只會記得訂座職員的友善態度","顧客的整體印象必然正面,不受侍應態度影響","餐廳的整體服務質素與個別員工表現無關"],"a":0,"note":"個別接觸點的不足,仍可能影響顧客對整體服務的滿意度。"},{"q":"為何酒店的「行李搬運」服務被視為關鍵時刻之一?","opts":["這是顧客甫抵達時的其中一個接觸點,影響初步印象","行李搬運純粹是後勤工作,與顧客印象無關","只有客房服務才算關鍵時刻","行李員的表現不會被顧客留意"],"a":0,"note":"行李搬運是顧客抵達時的接觸點之一,會影響顧客的初步印象。"},{"q":"為何「關鍵時刻」的概念要求企業從顧客的角度(而非企業內部角度)看待服務流程?","opts":["顧客的滿意度取決於其親身感知的接觸點體驗,而非企業內部的運作邏輯","企業內部的運作效率與顧客滿意度完全一致,無需區分角度","顧客的角度與企業內部角度必然完全相同","只有企業內部視角才具參考價值"],"a":0,"note":"顧客滿意度取決於其親身感知的體驗,故須從顧客角度審視服務流程。"},{"q":"若企業想找出顧客服務流程中最需要改善的關鍵時刻,可以怎樣做?","opts":["透過顧客意見調查及投訴分析,找出顧客感受最負面的接觸點","純粹依賴管理層的主觀判斷","完全忽略顧客的意見","只需觀察員工的內部評核結果"],"a":0,"note":"透過顧客意見調查及投訴分析,可有效找出感受最負面的接觸點。"},{"q":"以下何者最能說明「關鍵時刻」與顧客忠誠度之間的關係?","opts":["持續在各接觸點提供優質體驗,有助建立顧客的長期忠誠度","關鍵時刻與顧客忠誠度完全無關","顧客忠誠度只取決於價格,與接觸點體驗無關","單一次負面接觸不會影響顧客忠誠度"],"a":0,"note":"持續在各接觸點提供優質體驗,有助建立顧客的長期忠誠度。"},{"q":"一位顧客致電酒店查詢設施,職員耐心解答並提供準確資訊,這體現了哪個接觸點的良好表現?","opts":["電話查詢的關鍵時刻","純粹是企業內部的行政工作","與顧客滿意度無關的例行程序","只是員工個人的私下行為"],"a":0,"note":"電話查詢是顧客與企業接觸的關鍵時刻,職員的表現直接影響印象。"},{"q":"一位顧客在網上留言區看到其他顧客對某餐廳的負評,這是否也可能構成一種「接觸點」?","opts":["是,顧客透過網上評價間接接觸企業形象,同樣可能影響其觀感","否,網上評價與企業的實際服務完全無關","網上評價只會影響其他顧客,不影響企業形象","顧客不會參考網上評價作出判斷"],"a":0,"note":"網上評價也是顧客接觸企業形象的一種間接方式,可能影響其觀感。"},{"q":"為何「關鍵時刻」概念提醒企業不應只重視「大型」服務環節(如整體裝修),而忽略「細節」環節?","opts":["顧客的滿意度往往由眾多細節接觸點累積而成,細節同樣關鍵","只有大型服務環節才會影響顧客滿意度","細節環節與顧客滿意度完全無關","顧客只會留意企業的整體形象,不會留意細節"],"a":0,"note":"顧客滿意度由眾多細節接觸點累積而成,細節同樣不容忽視。"},{"q":"若一間酒店在顧客抵達前已透過短訊確認訂房及提供貼心提示,這屬於哪個階段的關鍵時刻?","opts":["顧客抵達前的接觸點","只有顧客親身到達後才算關鍵時刻","與顧客服務流程無關","純粹是行政記錄,不算接觸點"],"a":0,"note":"訂房確認及提示是顧客抵達前的接觸點,同樣構成關鍵時刻。"},{"q":"為何員工在關鍵時刻的表現,比書面的服務承諾更能影響顧客的實際觀感?","opts":["顧客在接觸點的親身體驗,是形成觀感最直接的依據","書面承諾比實際體驗更能影響顧客觀感","員工的表現與顧客觀感完全無關","顧客只會依賴企業的書面文件作出判斷"],"a":0,"note":"顧客在接觸點的親身體驗,是形成觀感最直接的依據。"},{"q":"以下何者最能總結「關鍵時刻」對服務業管理的啟示?","opts":["企業須從顧客角度出發,系統性地檢視及改善每個接觸點的服務質素","企業只需要改善其中一個接觸點便已足夠","管理層無需理會前線員工在各接觸點的表現","關鍵時刻只是理論概念,對實務管理沒有參考價值"],"a":0,"note":"企業須系統性地檢視及改善每個接觸點,以提升整體服務質素。"},{"q":"若一位顧客在酒店入住期間,多次接觸不同部門(如前堂管家餐飲)都獲得良好體驗,這反映甚麼?","opts":["企業在多個關鍵時刻均能維持一致的優質服務水平","只有其中一個部門的表現才算數","各部門的表現互不影響顧客的整體印象","與顧客的整體滿意度無關"],"a":0,"note":"在多個接觸點均維持優質服務,反映企業整體服務水平的一致性。"},{"q":"為何酒店行業特別重視「第一個」及「最後一個」關鍵時刻(如迎接及歡送)?","opts":["首尾印象往往在顧客記憶中特別深刻,影響其對整體體驗的評價","首尾印象對顧客評價完全沒有特別影響","只有中段的服務過程才重要","顧客不會記得任何接觸點的細節"],"a":0,"note":"首尾印象在顧客記憶中特別深刻,對整體評價有重要影響。"},{"q":"一位顧客投訴後,若企業能迅速回應並妥善解決問題,這次接觸點的處理對顧客觀感可能有何作用?","opts":["有機會將原本負面的體驗轉化為正面印象,甚至提升顧客忠誠度","投訴处理的好壞完全不會影響顧客觀感","顧客一旦投訴便必然永久流失","與顧客忠誠度的建立完全無關"],"a":0,"note":"妥善處理投訴的關鍵時刻,有機會將負面體驗轉化為正面印象。"},{"q":"為何「關鍵時刻」概念要求管理層授權前線員工作出即時決定?","opts":["接觸點的互動往往即時發生,員工需要一定權力才能迅速回應顧客需要","管理層應親自處理所有接觸點,員工無需任何決策權","接觸點的處理與員工的決策權力無關","顧客不介意等待管理層逐級批核"],"a":0,"note":"接觸點的互動即時發生,員工須有一定決策權才能迅速回應。"},{"q":"以下何者是酒店「客房清潔」作為關鍵時刻的具體體現?","opts":["顧客返回房間時所見的清潔程度,會直接影響其對服務質素的觀感","客房清潔純粹是後勤工作,顧客不會留意","清潔程度與顧客滿意度完全無關","只有前堂部的表現才算關鍵時刻"],"a":0,"note":"顧客返回房間所見的清潔程度,直接影響其對服務質素的觀感。"},{"q":"若企業想確保各分店在關鍵時刻的表現保持一致水平,可以怎樣做?","opts":["建立標準化的服務流程及培訓機制,確保各分店員工表現一致","容許每間分店各自發揮,不設任何統一標準","與標準化流程的建立無關","只需依賴個別員工的個人能力"],"a":0,"note":"標準化服務流程及培訓機制,有助確保各分店在關鍵時刻表現一致。"},{"q":"為何「產品品質」被視為關鍵時刻的一種接觸點,而非純粹的技術指標?","opts":["顧客體驗產品品質的一刻,同樣是形成其對企業整體印象的關鍵環節","產品品質與顧客服務體驗完全是兩回事","顧客不會因產品品質而改變對企業的看法","產品品質純粹由生產部門負責,與服務印象無關"],"a":0,"note":"顧客體驗產品品質的一刻,同樣是形成企業整體印象的關鍵環節。"},{"q":"一間航空公司的登機閘口職員在延誤航班時態度友善並提供清晰資訊,這體現了關鍵時刻的甚麼作用?","opts":["即使遇上不理想的情況(如延誤),良好的接觸點處理仍能維持顧客的正面觀感","延誤航班必然導致顧客給予負評,無法透過職員表現扭轉","職員的態度與顧客觀感完全無關","只有準時的航班才能帶來正面觀感"],"a":0,"note":"即使遇上延誤等不利情況,良好的接觸點處理仍能維持顧客的正面觀感。"},{"q":"為何「關鍵時刻」這個概念與顧客的「主觀感受」密切相關?","opts":["顧客對接觸點的評價很大程度上取決於其個人感受及期望,而非純粹客觀指標","顧客的評價完全客觀,不受個人感受影響","關鍵時刻只涉及可量化的客觀數據","與顧客的主觀感受完全無關"],"a":0,"note":"顧客對接觸點的評價,很大程度上取決於個人感受及期望。"},{"q":"若企業希望評估自身在各個關鍵時刻的表現,以下何者是合理的做法?","opts":["繪製顧客服務流程圖,逐一檢視每個接觸點的顧客體驗","只需檢視企業的財務報表","只需依賴管理層的主觀印象","完全不需要進行任何系統性檢視"],"a":0,"note":"繪製服務流程圖並逐一檢視各接觸點,是評估關鍵時刻表現的合理做法。"},{"q":"為何「關鍵時刻」的概念有助企業將抽象的「顧客滿意度」轉化為具體可管理的環節?","opts":["透過拆解服務流程中的各個接觸點,企業可針對性地改善具體環節","顧客滿意度是無法拆解或管理的抽象概念","關鍵時刻與顧客滿意度的管理完全無關","企業只能整體提升服務,無法針對個別環節"],"a":0,"note":"拆解服務流程中的各接觸點,讓企業能針對性地改善具體環節。"},{"q":"一位新入職的酒店員工在其第一次獨立接待顧客時表現生疏,可能對顧客造成甚麼影響?","opts":["該次接觸點的體驗可能未如理想,影響顧客當下的觀感","新員工的表現與顧客觀感完全無關","顧客必然會體諒新員工而給予正面評價","與關鍵時刻的概念無關"],"a":0,"note":"員工表現生疏可能令該接觸點的顧客體驗未如理想,影響觀感。"},{"q":"為何企業應定期檢討及更新對關鍵時刻的管理方式?","opts":["顧客期望及接觸方式(如網上平台)會隨時間演變,企業須因應調整","關鍵時刻的管理方式一旦制定便無需再作任何調整","顧客期望是固定不變的","與時代及科技的演變完全無關"],"a":0,"note":"顧客期望及接觸方式會隨時間演變,企業須因應調整管理方式。"},{"q":"以下何者最能總結「關鍵時刻」與整體顧客體驗管理的關係?","opts":["關鍵時刻是構成整體顧客體驗的基本單位,管理好每個關鍵時刻是提升整體體驗的基礎","關鍵時刻與整體顧客體驗管理完全是兩個獨立課題","只需管理整體體驗,無需理會個別關鍵時刻","關鍵時刻的管理只適用於大型企業"],"a":0,"note":"關鍵時刻是構成整體顧客體驗的基本單位,是提升整體體驗的基礎。"},{"q":"若顧客在酒店的網上評價中特別提及「前台職員態度冷漠」,企業應如何理解這項回饋?","opts":["這反映前台接待這個關鍵時刻表現不佳,需要針對性改善","這項回饋與服務質素完全無關,可以忽略","顧客的評價必然帶有誇大成分,不需理會","應直接更換整個前堂部門而非針對性培訓"],"a":0,"note":"應理解為前台接待這個關鍵時刻表現不佳,需要針對性改善。"},{"q":"為何「關鍵時刻」概念強調要從「顧客視角」而非「部門視角」檢視服務流程?","opts":["顧客的體驗是連貫的,不會因企業內部部門劃分而分割,故須整體檢視","顧客只會關注個別部門的表現,不會理會整體流程","企業內部的部門劃分與顧客體驗完全一致","部門視角比顧客視角更能反映實際服務質素"],"a":0,"note":"顧客的體驗是連貫的,不因企業內部部門劃分而分割,故須整體檢視。"},{"q":"以下何者最能說明為何「關鍵時刻」的管理需要企業上下一致的參與(而非只靠前線員工)?","opts":["管理層須提供資源培訓及授權,前線員工才能在關鍵時刻提供優質服務","關鍵時刻的表現完全取決於前線員工個人能力,與管理層無關","管理層無需參與任何關鍵時刻的管理工作","只有企業高層才會直接接觸顧客"],"a":0,"note":"管理層須提供資源培訓及授權,前線員工才能有效處理關鍵時刻。"},{"q":"以下何者最能總結企業重視「關鍵時刻」管理的長遠效益?","opts":["透過持續優化各接觸點的體驗,有助建立顧客信任、忠誠度及正面口碑","關鍵時刻的管理只有短期效益,對長遠發展毫無幫助","忽略關鍵時刻不會對企業的長遠發展造成任何影響","只有短期促銷手法才能帶來長遠效益"],"a":0,"note":"持續優化各接觸點的體驗,有助建立顧客信任忠誠度及正面口碑。"},{"q":"一位酒店前台職員因熟悉常客的喜好而主動安排其慣常入住的房型,這體現關鍵時刻管理的甚麼具體做法?","opts":["善用顧客歷史資料,在接觸點提供個人化的優質體驗","純粹依循標準作業程序而不作任何個人化調整","與關鍵時刻的管理完全無關","純粹是職員的個人習慣,與企業管理無關"],"a":0,"note":"善用顧客歷史資料提供個人化體驗,是關鍵時刻管理的具體做法。"},{"q":"為何企業應把每個關鍵時刻視為「累積」而非「孤立」的體驗?","opts":["顧客的整體滿意度是多個接觸點體驗累積的結果,而非單一時刻可以決定","每個關鍵時刻的表現完全獨立,不會累積影響整體印象","顧客只會記得最近一次的接觸體驗,之前的完全不重要","累積效應與顧客的整體滿意度完全無關"],"a":0,"note":"顧客整體滿意度是多個接觸點體驗累積的結果,故應視為累積而非孤立的體驗。"},{"q":"若一間餐廳的訂座、迎賓、上菜及結賬四個環節中,只有結賬環節表現出色,其餘環節表現普通,對顧客整體印象有何影響?","opts":["顧客的整體印象仍會受到其餘表現普通環節的影響,而非單靠結賬環節扭轉","顧客的整體印象必然只由結賬環節的表現決定","其餘環節的表現完全不會影響顧客的最終評價","顧客會完全忽略其餘環節,只記得結賬環節"],"a":0,"note":"整體印象由多個環節累積而成,單一環節出色未必能完全扭轉其餘環節的普通表現。"},{"q":"為何管理層應定期檢視顧客在各接觸點的意見反饋,而非只依賴年度顧客滿意度調查?","opts":["定期檢視能更及時發現及改善個別接觸點的具體問題,而非只得到滯後的整體印象","年度調查已能提供最即時且具體的接觸點資訊","定期檢視與年度調查所得的資訊完全相同,沒有分別","接觸點的意見反饋對服務改善沒有任何實際作用"],"a":0,"note":"定期檢視能更及時發現並改善個別接觸點問題,避免只得到滯後的整體印象。"},{"q":"一位顧客對某酒店的網上訂房流程感到繁複並多次嘗試失敗,最終選擇取消訂房,這反映哪個接觸點的關鍵時刻管理不善?","opts":["網上訂房系統這個接觸點","客房清潔這個接觸點","退房結賬這個接觸點","與任何接觸點的管理完全無關"],"a":0,"note":"訂房流程繁複導致顧客放棄,反映網上訂房系統這個接觸點管理不善。"},{"q":"為何員工在關鍵時刻展現的「同理心」(如察覺顧客疲態主動關心)特別容易讓顧客留下深刻印象?","opts":["超出基本服務標準的貼心舉動,往往比例行公事的服務更能觸動顧客","同理心的表現與顧客的深刻印象完全無關","顧客只會對例行公事式的服務留下深刻印象","展現同理心必然會被顧客視為多餘的舉動"],"a":0,"note":"超出基本標準的貼心舉動,往往比例行服務更能觸動顧客留下深刻印象。"},{"q":"若一間酒店透過神秘顧客(Mystery Shopper)定期評估各接觸點的服務表現,這反映企業對關鍵時刻管理的甚麼取態?","opts":["主動且有系統地監察及改善各接觸點的服務質素","純粹被動地等候顧客主動提出投訴才作出改善","對關鍵時刻的管理完全不重視","神秘顧客的評估與關鍵時刻的管理完全無關"],"a":0,"note":"定期以神秘顧客評估,反映企業主動有系統地監察及改善各接觸點的表現。"},{"q":"以下何者最能總結「關鍵時刻」概念與R.A.T.E.R.模式及服務金三角模式三者之間的關聯?","opts":["三者從不同角度分析顧客服務:關鍵時刻指出接觸點的重要性,R.A.T.E.R.提供評估指標,服務金三角分析背後的持份者關係","三者的概念完全相同,只是名稱不同而已","三者之間完全沒有任何關聯,屬獨立的理論","只有服務金三角模式具備實務應用的價值"],"a":0,"note":"三個模式從不同角度分析顧客服務:接觸點重要性評估指標及持份者關係,互相補充。"}]},{"n":5,"title":"服務品質差距","tag":"SERVICE QUALITY GAPS","qs":[{"q":"「服務品質差距模式」指出顧客期望與認知的差距主要來自幾個服務提供者差距?","opts":["四個","兩個","三個","五個"],"a":0,"note":"顧客差距主要來自四個服務提供者差距。"},{"q":"「差距一」的名稱是?","opts":["認識差距","服務設計及標準差距","服務表現差距","溝通差距"],"a":0,"note":"差距一是服務提供者的認識差距。"},{"q":"「差距二」的名稱是?","opts":["服務設計及標準差距","認識差距","服務表現差距","溝通差距"],"a":0,"note":"差距二是服務設計及標準差距。"},{"q":"「差距三」的名稱是?","opts":["服務表現差距","認識差距","服務設計及標準差距","溝通差距"],"a":0,"note":"差距三是服務表現差距。"},{"q":"「差距四」的名稱是?","opts":["溝通差距","認識差距","服務設計及標準差距","服務表現差距"],"a":0,"note":"差距四是溝通差距。"},{"q":"「差距五」是指甚麼?","opts":["四個差距加起來,形成的顧客差距:顧客期望與認知差距","純粹指企業內部的財務差距","純粹指員工與管理層的溝通差距","與顧客期望完全無關"],"a":0,"note":"差距五是四個差距加總形成的顧客期望與認知差距。"},{"q":"「差距一(認識差距)」的定義是?","opts":["公司錯誤理解顧客的期望,提供的服務不是客人所需要","公司明白顧客期望但設計時未達目標","公司提供服務時無法達至設計要求","公司向顧客承諾的服務不能兌現"],"a":0,"note":"認識差距指公司錯誤理解顧客期望,提供的服務非顧客所需。"},{"q":"出現「認識差距」的原因之一是「市場研究目標不當」,具體指?","opts":["市場研究不足,分析不準確,缺乏對服務質素及客戶滿意度的調查","市場研究過度詳盡","過度依賴顧客的直接意見","與市場研究無關"],"a":0,"note":"市場研究目標不當指研究不足分析不準確,缺乏質素滿意度調查。"},{"q":"出現「認識差距」的原因之一是「決策者缺少直接跟顧客溝通的機會」,具體指?","opts":["決策者只按下級提供文件執行管理工作,資料或有不足甚至誤導","決策者經常直接與顧客會面","決策者過度重視顧客的個人意見","與決策過程完全無關"],"a":0,"note":"決策者依賴下級提供的文件,而下級資料可能不足或有誤導。"},{"q":"出現「認識差距」的原因之一是「缺乏下情上達溝通」,具體指?","opts":["企業架構龐大,顧客的資料信息經過多重轉達處理才到決策者","企業架構越簡單溝通越困難","顧客資料能直接快速傳達至決策者","與企業架構規模無關"],"a":0,"note":"企業架構龐大會令顧客信息經多重轉達處理,容易失真流失。"},{"q":"「缺乏下情上達溝通」還可能因為甚麼原因而加劇?","opts":["參與決策部門太多,令有效的策略與設計到落實時已面目全非","參與決策部門越少問題越嚴重","顧客資料的傳達速度越快問題越大","與決策部門數目無關"],"a":0,"note":"參與決策部門太多,可能令策略設計落實時已面目全非。"},{"q":"出現「認識差距」的原因之一是「只重視銷售,忽略顧客關係」,具體指?","opts":["服務提供者傾向拓展新市場增加新客戶,較少注意現有顧客是否滿意","服務提供者過度重視現有顧客,忽略新客戶開拓","服務提供者完全不重視銷售業績","與顧客關係管理無關"],"a":0,"note":"服務提供者傾向拓展新市場,較少注意現有顧客的滿意度及忠誠度。"},{"q":"出現「認識差距」的原因之一是「市場細分不足」,具體指?","opts":["企業策劃服務時未把不同顧客進行市場細分,容易出現期望落差","企業把顧客細分得過於仔細","市場細分與顧客期望落差無關","顧客的需要必然完全一致,不需細分"],"a":0,"note":"未進行市場細分,由於顧客需要不同,購買同一服務容易出現期望落差。"},{"q":"出現「認識差距」的原因之一是「缺乏修正差距的安排」,具體指?","opts":["企業沒有重視顧客提出的意見,沒有改善問題,缺乏恰當補救方案","企業過度重視顧客意見而忽略營運效率","企業設有完善的補救機制","與顧客意見的處理無關"],"a":0,"note":"企業沒重視顧客意見及沒有恰當補救方案,令差距沒能收窄。"},{"q":"縮窄「認識差距」的方法包括?","opts":["市場調查、顧客投訴個案分析、舉辦客戶小組座談","完全依賴管理層的主觀判斷","減少與顧客的任何接觸","增加企業內部的行政層級"],"a":0,"note":"縮窄認識差距可透過市場調查投訴分析及客戶座談等方法。"},{"q":"縮窄「認識差距」的方法還包括?","opts":["決策人員多直接與顧客交流,改善內部行政效率確保溝通流暢","決策人員應盡量避免與顧客接觸","增加企業內部的行政層級以確保準確","減少市場調查的頻率"],"a":0,"note":"決策人員應多直接與顧客交流,並改善內部行政效率。"},{"q":"「差距二(服務設計及標準差距)」的定義是?","opts":["公司明白顧客的期望,但設計產品和服務時沒有達至這個目標","公司錯誤理解顧客的期望","公司提供服務時無法達至原有設計要求","公司向顧客承諾的服務不能兌現"],"a":0,"note":"服務設計及標準差距指公司明白期望但設計時未達目標。"},{"q":"出現「服務設計及標準差距」的原因之一是「缺乏顧客為本的服務標準」,具體指?","opts":["管理層低估了顧客期望的重要性,設計時沒把這指標放在重要位置","管理層過度重視顧客期望而忽略成本","服務標準完全以顧客為本設計","與管理層的重視程度無關"],"a":0,"note":"管理層低估顧客期望的重要性,設計時未將其放在重要位置。"},{"q":"出現「服務設計及標準差距」的其他原因還包括?","opts":["服務設計欠佳、領導能力不足","顧客的需求過於單一","市場研究過度詳盡","企業規模過小"],"a":0,"note":"服務設計欠佳及領導能力不足也是造成此差距的原因。"},{"q":"縮窄「服務設計及標準差距」的方法包括?","opts":["建立服務品質至上的公司文化,設定顧客為本的服務標準","完全依賴個別員工的即興發揮","減少對服務品質的重視","忽略顧客的期望"],"a":0,"note":"建立服務品質至上文化及設定顧客為本標準有助縮窄此差距。"},{"q":"縮窄「服務設計及標準差距」的方法還包括?","opts":["設定合理又具挑戰性目標,培訓管理人員","設定過於寬鬆而毫無挑戰性的目標","減少管理人員的培訓","忽視員工對服務品質目標的認同"],"a":0,"note":"設定合理具挑戰性目標及培訓管理人員有助縮窄此差距。"},{"q":"縮窄「服務設計及標準差距」的方法也包括甚麼與員工相關的措施?","opts":["讓所有員工認同服務品質的目標與重要性,並公開嘉獎","完全不需要員工認同服務品質目標","公開批評表現不佳的員工而非嘉獎","減少與員工溝通服務品質相關的目標"],"a":0,"note":"讓員工認同服務品質目標並公開嘉獎,有助縮窄此差距。"},{"q":"「差距三(服務表現差距)」的定義是?","opts":["公司提供服務時無法達至原有的設計要求","公司錯誤理解顧客期望","公司設計服務時沒達至顧客期望目標","公司向顧客承諾的服務不能兌現"],"a":0,"note":"服務表現差距指公司提供服務時無法達至原有設計要求。"},{"q":"「服務表現差距」主要來自甚麼因素?","opts":["員工能力和態度","純粹企業的財務狀況","純粹市場競爭情況","純粹顧客的個人喜好"],"a":0,"note":"服務表現差距主要來自員工的能力和態度。"},{"q":"出現「服務表現差距」的原因之一是「人力資源政策有失誤」,具體指?","opts":["服務標準太高、技術不足、員工對服務標準或顧客期望認識不足","人力資源政策過於完善","員工的技術水平必然超出服務標準","與員工的能力及態度無關"],"a":0,"note":"人力資源政策失誤包括服務標準太高技術不足及認識不足等問題。"},{"q":"「人力資源政策有失誤」還包括甚麼問題?","opts":["內部文化(工作態度士氣等)問題,執行時管理和評核不恰當","員工士氣過高導致問題","管理和評核過於嚴謹","與內部文化完全無關"],"a":0,"note":"內部文化問題及管理評核不當,也是人力資源政策失誤的表現。"},{"q":"出現「服務表現差距」的原因之一是「服務不足應付需求」,具體指?","opts":["服務需求量太大,旺季常見","服務需求量太少導致資源浪費","與服務需求量無關","只在淡季才會出現此問題"],"a":0,"note":"服務不足應付需求指需求量太大,在旺季時常見此情況。"},{"q":"出現「服務表現差距」的原因之一是「顧客因素」,具體指?","opts":["顧客要求的服務隨情況變化","顧客的要求永遠固定不變","顧客因素與服務表現差距無關","只有員工因素才會影響服務表現"],"a":0,"note":"顧客因素指顧客要求的服務會隨情況變化,增加服務表現的難度。"},{"q":"縮窄「服務表現差距」的方法包括?","opts":["注重員工的管理,吸引優秀員工加盟,慎選服務員工","減少對員工的管理及監督","降低員工招聘的篩選標準","與員工管理無關"],"a":0,"note":"注重員工管理及慎選優秀員工有助縮窄服務表現差距。"},{"q":"縮窄「服務表現差距」的方法還包括?","opts":["提供培訓與支援,建立團隊鼓勵協作精神,下放決定權予前線員工","減少員工培訓機會","禁止員工之間的協作","加強管理層對日常運作的直接控制,不下放任何決定權"],"a":0,"note":"提供培訓支援及下放決定權予前線員工有助縮窄此差距。"},{"q":"縮窄「服務表現差距」的方法也包括?","opts":["在員工間推動優質服務文化,挽留優秀員工","減少對服務文化的推廣","鼓勵優秀員工盡快離職","與員工的挽留無關"],"a":0,"note":"推動優質服務文化及挽留優秀員工有助縮窄服務表現差距。"},{"q":"「差距四(溝通差距)」的定義是?","opts":["公司向顧客承諾的服務不能兌現","公司錯誤理解顧客期望","公司設計服務時沒達至目標","公司提供服務時無法達至設計要求"],"a":0,"note":"溝通差距指公司向顧客承諾的服務不能兌現。"},{"q":"出現「溝通差距」的原因包括?","opts":["顧客期望管理欠佳、過度承諾","顧客期望管理過於嚴謹","服務承諾永遠與實際表現一致","與顧客期望管理無關"],"a":0,"note":"顧客期望管理欠佳及過度承諾是造成溝通差距的原因。"},{"q":"出現「溝通差距」的原因還包括?","opts":["公司內部橫向溝通欠佳、管理層與前線員工溝通欠佳","公司內部溝通完全暢通無阻","管理層與前線員工溝通十分緊密","與內部溝通無關"],"a":0,"note":"內部橫向溝通及管理層與前線員工溝通欠佳,也是溝通差距的成因。"},{"q":"縮窄「溝通差距」的方法包括?","opts":["設定服務承諾時必須與執行人員商討,留意宣傳的真實性","設定服務承諾時無需諮詢執行人員","宣傳內容可以誇大而不需顧及真實性","與執行人員的參與無關"],"a":0,"note":"設定承諾時應與執行人員商討,並留意宣傳的真實性。"},{"q":"縮窄「溝通差距」的方法還包括?","opts":["就宣傳內容聽取前線員工意見,進行內部溝通","忽略前線員工對宣傳內容的意見","減少宣傳內容的內部溝通","與前線員工的參與無關"],"a":0,"note":"聽取前線員工對宣傳內容的意見及進行內部溝通,有助縮窄差距。"},{"q":"縮窄「溝通差距」的方法也包括?","opts":["確保各個地點所提供的服務要達相同標準","容許各地點服務標準參差不齊","減少對服務標準的一致性要求","與服務標準的一致性無關"],"a":0,"note":"確保各地點服務達相同標準,有助縮窄溝通差距。"},{"q":"為何「為不同的服務標準設下不同的收費」有助縮窄溝通差距?","opts":["可以調節顧客對不同服務的期望及調配內部資源","不同收費與顧客期望的調節無關","應為所有服務標準設定相同收費","與內部資源調配無關"],"a":0,"note":"不同收費有助調節顧客對不同服務水平的期望,並調配資源。"},{"q":"「差距五(顧客差距)」帶來甚麼問題?","opts":["顧客不滿服務便不再光顧,令客戶流失,並向別人訴說不滿","顧客必然會繼續光顧不論滿意與否","顧客的不滿不會對企業造成任何影響","顧客差距只會帶來正面影響"],"a":0,"note":"顧客差距帶來客戶流失及負面口碑,對企業形象有消極影響。"},{"q":"「差距五」對企業形象有何影響?","opts":["對公司形象產生非常消極的影響","對公司形象必然帶來正面影響","與公司形象完全無關","只影響個別顧客,不影響企業整體形象"],"a":0,"note":"顧客差距對公司形象會產生非常消極的影響。"},{"q":"以下何者屬於「認識差距」的例子?","opts":["酒店管理層從未直接了解過住客的實際需要,僅憑猜測設計服務","前線員工技術不足無法完成服務","酒店的宣傳過度誇大服務內容","員工對顧客的服務標準認識不足"],"a":0,"note":"管理層未了解住客實際需要僅憑猜測,屬於認識差距。"},{"q":"以下何者屬於「服務設計及標準差距」的例子?","opts":["管理層明知顧客重視快速登記,但設計的登記流程仍然繁瑣","員工的技術水平不足以完成既定的服務標準","企業的宣傳內容與實際服務不符","前線員工與管理層溝通不足"],"a":0,"note":"明知顧客需要但設計時未有達至目標,屬服務設計及標準差距。"},{"q":"以下何者屬於「服務表現差距」的例子?","opts":["員工因技術不足,未能按既定標準完成服務","管理層錯誤理解顧客的期望","企業的宣傳過度誇大服務內容","不同分店的服務標準不一致"],"a":0,"note":"員工技術不足未能按標準完成服務,屬服務表現差距。"},{"q":"以下何者屬於「溝通差距」的例子?","opts":["企業廣告承諾五星級服務,但實際服務水平遠低於宣傳","管理層錯誤理解顧客的期望","員工技術不足以完成服務","服務設計時未考慮顧客期望"],"a":0,"note":"廣告承諾與實際服務不符,屬溝通差距(過度承諾)的例子。"},{"q":"若一間酒店管理層因架構龐大,顧客的投訴要經多個部門轉達才到達決策層,並在過程中失真,這屬於縮窄哪個差距時面對的困難?","opts":["認識差距","服務設計及標準差距","服務表現差距","溝通差距"],"a":0,"note":"顧客資料多重轉達失真,反映認識差距中「缺乏下情上達溝通」的問題。"},{"q":"若一間酒店的旺季服務需求遠超員工能應付的範圍,導致服務質素下降,這主要反映哪個差距?","opts":["服務表現差距","認識差距","服務設計及標準差距","溝通差距"],"a":0,"note":"需求量太大導致服務質素下降,反映服務表現差距(服務不足應付需求)。"},{"q":"若一間餐廳的廣告宣傳承諾「即叫即上」,但實際上菜時間經常超過30分鐘,這主要反映哪個差距?","opts":["溝通差距","認識差距","服務設計及標準差距","服務表現差距(此與能力態度較相關,而非承諾兌現)"],"a":0,"note":"廣告承諾與實際服務不符,反映溝通差距中的過度承諾問題。"},{"q":"若企業從未進行任何市場調查,純粹憑管理層主觀猜測設計服務,這主要反映哪個差距的成因?","opts":["認識差距","服務表現差距","溝通差距","服務設計及標準差距"],"a":0,"note":"缺乏市場調查憑主觀猜測設計服務,反映認識差距中市場研究不足的問題。"},{"q":"為何「差距一至差距四」被稱為「服務提供者差距」?","opts":["這四個差距均源自企業(服務提供者)內部的理解、設計、表現或溝通問題","這四個差距源自顧客本身的問題","這四個差距與服務提供者完全無關","只有差距四才屬於服務提供者差距"],"a":0,"note":"差距一至四均源自企業內部在理解設計表現或溝通上的問題。"},{"q":"為何「差距五(顧客差距)」被視為前四個差距的「總和結果」?","opts":["顧客最終感受到的期望與認知落差,是前四個差距累積影響的結果","差距五與前四個差距完全獨立","差距五只由其中一個差距單獨造成","差距五與服務提供者的表現無關"],"a":0,"note":"顧客感受到的落差,是前四個服務提供者差距累積影響的結果。"},{"q":"為何企業需要同時處理四個服務提供者差距,而非只專注其中一個?","opts":["任何一個差距未有妥善處理,都可能導致顧客最終感到期望落差","只要處理好其中一個差距,其餘差距便會自動消失","四個差距之間完全沒有任何關聯","顧客只會留意其中一個差距"],"a":0,"note":"任何一個差距未妥善處理,都可能導致顧客最終感到期望落差。"},{"q":"若企業已透過市場調查準確了解顧客期望(縮窄認識差距),但服務設計仍未能配合,問題出在哪個差距?","opts":["服務設計及標準差距","認識差距","服務表現差距","溝通差距"],"a":0,"note":"了解期望但設計未能配合,問題出在服務設計及標準差距。"},{"q":"若企業的服務設計已完全符合顧客期望,但前線員工因缺乏培訓而未能達到設計標準,問題出在哪個差距?","opts":["服務表現差距","認識差距","服務設計及標準差距","溝通差距"],"a":0,"note":"設計符合期望但員工執行未達標準,問題出在服務表現差距。"},{"q":"以下何者最能總結「服務品質差距模式」的整體邏輯?","opts":["從了解顧客期望、設計服務、執行服務到對外溝通,任何環節出現落差,最終都會影響顧客的滿意度","四個差距之間毫無邏輯關聯","顧客滿意度只取決於價格,與服務流程無關","只有溝通環節會影響顧客滿意度"],"a":0,"note":"模式呈現從了解設計執行到溝通的完整鏈條,任何環節落差都影響滿意度。"},{"q":"以下何者最能總結企業應用「服務品質差距模式」的實際意義?","opts":["有助企業系統性地診斷顧客不滿的根源,並針對性地採取改善措施","純粹是學術理論,對企業管理沒有實際幫助","只適用於評估員工的個人表現","與提升顧客滿意度的目標無關"],"a":0,"note":"模式有助企業系統性診斷顧客不滿根源,並針對性改善。"},{"q":"為何「決策者多直接與顧客交流」被列為縮窄認識差距的重要方法?","opts":["直接交流有助決策者獲得第一手且未經扭曲的顧客意見","直接交流只會浪費決策者的時間,沒有實際效益","決策者不應該與顧客有任何直接接觸","下級提供的資料必然比直接交流更準確"],"a":0,"note":"直接交流有助決策者獲得第一手且未經扭曲的顧客意見。"},{"q":"若一間連鎖餐廳各分店的服務水平參差不齊,部分分店服務出色,部分卻經常令顧客失望,最可能反映哪個差距未被妥善處理?","opts":["溝通差距(確保各地點服務達相同標準)","純粹是認識差距","純粹是服務設計及標準差距","與四個差距皆無關"],"a":0,"note":"各分店服務不一致,反映未能確保各地點達到相同服務標準,屬溝通差距的問題。"},{"q":"以下何者最能說明「服務品質至上的公司文化」對縮窄差距二的重要性?","opts":["文化能促使全公司上下重視顧客為本的服務標準,而非流於形式","公司文化與服務設計標準的落實完全無關","文化建設純粹是公關工作,無實際作用","只需管理層重視即可,不需全公司參與"],"a":0,"note":"服務品質至上的文化能促使全公司重視顧客為本標準,而非流於形式。"},{"q":"以下何者最能總結四個服務提供者差距的先後邏輯關係?","opts":["先要準確認識顧客期望,再設計合適服務標準,然後確保執行到位,最後確保對外溝通真實","四個差距沒有任何先後邏輯關係","應先處理溝通差距,再處理認識差距","四個差距的處理次序完全隨機,沒有固定邏輯"],"a":0,"note":"四個差距依認識設計執行溝通的邏輯順序展開,環環相扣。"},{"q":"若企業定期進行顧客滿意度調查,並將結果直接反饋至服務設計部門作出調整,這體現縮窄哪兩個差距的綜合做法?","opts":["認識差距及服務設計及標準差距","服務表現差距及溝通差距","純粹只縮窄溝通差距","與四個差距的縮窄完全無關"],"a":0,"note":"調查了解顧客期望(認識)並據此調整設計(標準),同時縮窄兩個差距。"}]},{"n":6,"title":"招待不易取悅的客人","tag":"DIFFICULT GUESTS","qs":[{"q":"教材列出多少類不易取悅的客人?","opts":["六類","四類","五類","八類"],"a":0,"note":"教材列出六類不易取悅的客人。"},{"q":"以下哪一項不是教材列出的難纏客人類型?","opts":["害羞的客人(非教材分類)","憤怒的客人","苛刻或專橫的客人","喋喋不休的客人"],"a":0,"note":"害羞的客人不在教材列出的六類之列。"},{"q":"「憤怒的客人」的特質是?","opts":["充滿負面情緒,難作理性思考和溝通","情緒平靜,主要尋求解決方法","擔心買錯,提不起勇氣決定","個性苛刻,難以討好"],"a":0,"note":"憤怒的客人充滿負面情緒,難以理性思考和溝通。"},{"q":"「憤怒的客人」出現的原因可能與甚麼有關?","opts":["個性能力、過往不快經歷,或為爭取議價能力而先聲奪人","純粹因為天氣不佳","純粹因為交通擠塞","與個人經歷及性格完全無關"],"a":0,"note":"憤怒可能源於個性能力過往經歷或為爭取議價能力而先聲奪人。"},{"q":"應對「憤怒的客人」,第一步應該怎樣做?","opts":["保持冷靜客觀和理性,明白顧客不是針對你個人","立即與客人爭論以正視聽","忽視客人的情緒反應","立即報警處理"],"a":0,"note":"應保持冷靜客觀理性,明白顧客的憤怒並非針對員工個人。"},{"q":"應對「憤怒的客人」,應採取甚麼態度?","opts":["採取積極態度,避免消極回應","採取消極迴避態度","採取強硬對抗態度","完全不作任何回應"],"a":0,"note":"應對憤怒客人應採取積極態度,避免消極回應。"},{"q":"應對「憤怒的客人」時,如何令客人放心?","opts":["耐心安撫及積極聆聽","立即結束對話","要求客人自行冷靜後再溝通","轉交其他部門處理而不作跟進"],"a":0,"note":"耐心安撫及積極聆聽有助令憤怒的客人放心。"},{"q":"應對「憤怒的客人」,應如何尋找解決方法?","opts":["了解憤怒原因及定出解決方法","不需了解原因,直接提供補償","忽略客人陳述的原因","要求客人自行想出解決方法"],"a":0,"note":"應先了解客人憤怒的原因,再定出相應的解決方法。"},{"q":"應對「憤怒的客人」,以下哪項是恰當的做法?","opts":["表示同情,但不隨便批評公司或同事","隨意批評同事以討好客人","堅決否認公司有任何責任","對客人的情緒完全不予理會"],"a":0,"note":"應表示同情及提供協助,但不應隨便批評公司或同事。"},{"q":"應對「憤怒的客人」,在提出解決方法時應注意甚麼?","opts":["保留解決方法的彈性,符合公司指引,不隨便承諾","立即答應客人的所有要求","完全沒有彈性,只能依循一套固定做法","可以隨意承諾任何補償而不理會公司指引"],"a":0,"note":"應保留解決方法的彈性,但須符合公司指引,不隨便承諾。"},{"q":"應對「憤怒的客人」,最終應堅持甚麼態度?","opts":["堅持理性、開放的態度","堅持強硬對抗的態度","堅持完全順從客人所有要求","堅持完全忽略客人的態度"],"a":0,"note":"應始終堅持理性開放的態度應對憤怒的客人。"},{"q":"「不滿意的客人」的特質是?","opts":["情緒較平靜,主要是尋求解決方法","充滿負面情緒難以理性溝通","個性苛刻難以討好","愛談天說地並無惡意"],"a":0,"note":"不滿意的客人情緒較平靜,主要目的是尋求解決方法。"},{"q":"若「不滿意的客人」的問題得到解決,可能有何結果?","opts":["對公司更有信心,成為忠誠顧客","必然永久流失,不再光顧","必然向其他人投訴","與顧客忠誠度無關"],"a":0,"note":"問題若解決,不滿意的客人可能對公司更有信心並成為忠誠顧客。"},{"q":"應對「不滿意的客人」,第一步應該怎樣做?","opts":["耐心及積極聆聽","立即提供補償而不了解詳情","要求客人自行離開","忽視客人的陳述"],"a":0,"note":"應對不滿意的客人首先要耐心及積極聆聽。"},{"q":"應對「不滿意的客人」,應展現甚麼態度和反應?","opts":["積極正面的態度和反應,避免負面說法","消極被動的態度","直接反駁客人的說法","完全不作任何回應"],"a":0,"note":"應展現積極正面的態度和反應,避免使用負面說法。"},{"q":"應對「不滿意的客人」,為何要「覆述問題」?","opts":["確保理解正確並讓顧客知道你在幫忙","純粹拖延時間","令客人感到被質疑","與確認理解無關"],"a":0,"note":"覆述問題可確保理解正確,並讓顧客感受到員工正在幫忙。"},{"q":"應對「不滿意的客人」,最後應該怎樣做?","opts":["就顧客問題提出解決方法,如對方不滿意可再作商議","堅持一套方案,不容許任何商議","拒絕提出任何解決方法","要求客人自行解決問題"],"a":0,"note":"應提出解決方法,若客人不滿意可再作商議。"},{"q":"「猶豫不決的客人」的特質是?","opts":["擔心買錯、提不起勇氣下決定,或不肯定自己要買甚麼","充滿負面情緒難以溝通","個性苛刻難以討好","行為包括提高嗓子及插隊"],"a":0,"note":"猶豫不決的客人擔心買錯或不肯定自己想要甚麼。"},{"q":"「猶豫不決的客人」有時純粹是為了甚麼?","opts":["只是在消磨時間","急於完成交易","要求最快的服務","要求與經理直接對話"],"a":0,"note":"猶豫不決的客人有時純粹是在消磨時間。"},{"q":"「猶豫不決的客人」可能導致甚麼結果?","opts":["可能花費較多服務時間","必然縮短服務時間","必然帶來最高消費額","與服務時間長短無關"],"a":0,"note":"猶豫不決的客人可能需要花費較多服務時間。"},{"q":"應對「猶豫不決的客人」,應保持甚麼態度?","opts":["保持耐心及良好服務態度","盡快催促客人作出決定","表現不耐煩以加快進度","忽略客人的猶豫,直接推薦最貴產品"],"a":0,"note":"應對猶豫不決的客人應保持耐心及良好服務態度。"},{"q":"應對「猶豫不決的客人」,應避免甚麼?","opts":["避免服務策略錯誤,切忌態度強硬或擅自離開","避免任何形式的耐心等候","避免向客人提出任何意見","避免了解客人猶豫的原因"],"a":0,"note":"應避免態度強硬或擅自離開客人,這是常見的服務策略錯誤。"},{"q":"應對「猶豫不決的客人」,可以如何找出猶豫的原因?","opts":["透過留意顧客舉措及提出試探式問題","直接詢問客人為何如此猶豫不決","忽略客人的舉措,直接推銷","要求客人立即說明原因"],"a":0,"note":"可透過留意顧客舉措及提出試探式問題找出猶豫原因。"},{"q":"應對「猶豫不決的客人」,最後應該怎樣做?","opts":["根據顧客反應,適時提供意見以引導客人作出決定","強迫客人立即作出決定","完全不提供任何意見","要求客人自行研究後再回來"],"a":0,"note":"應根據顧客反應適時提供意見,引導其作出決定。"},{"q":"「苛刻或專橫的客人」的特質是?","opts":["個性較苛刻、難以討好,或因過往不快經歷需專橫保護自己","情緒平靜主要尋求解決方法","擔心買錯提不起勇氣決定","愛談天說地並無惡意"],"a":0,"note":"苛刻或專橫的客人個性苛刻難討好,或因過往經歷需專橫自保。"},{"q":"「苛刻或專橫的客人」的行為也可能是為了甚麼?","opts":["盡量爭取最大利益","純粹想與員工閒聊","純粹想消磨時間","純粹想結識其他顧客"],"a":0,"note":"苛刻或專橫的行為也可能是為了盡量爭取最大利益。"},{"q":"應對「苛刻或專橫的客人」,應保持甚麼態度?","opts":["保持專業態度,保持冷靜,不作強烈或硬碰的回應","以強硬態度回應以正視聽","完全屈服於客人的所有要求","忽視客人的所有訴求"],"a":0,"note":"應保持專業冷靜態度,不作強烈或硬碰的回應。"},{"q":"應對「苛刻或專橫的客人」,如何顯示尊重對方?","opts":["稱呼姓名、眼神接觸、語調婉委","避免任何眼神接觸","以生硬的語調回應","完全不稱呼客人的姓名"],"a":0,"note":"顯示尊重可透過稱呼姓名眼神接觸及婉委的語調。"},{"q":"應對「苛刻或專橫的客人」,應如何處理其要求?","opts":["堅定、公平、聚焦顧客要求服務,不屈服於專橫之下","完全屈服於客人的專橫要求","強硬拒絕客人的所有要求","忽略客人提出的具體要求"],"a":0,"note":"應堅定公平地聚焦顧客的合理要求,不屈服於專橫之下。"},{"q":"應對「苛刻或專橫的客人」,如何適時維持良好關係?","opts":["伺機稱讚或提出折衷方法","完全避免與客人有任何互動","堅持己見,不作任何讓步","忽略關係維繫的重要性"],"a":0,"note":"可伺機稱讚客人或提出折衷方法,以維持良好關係。"},{"q":"「粗魯或不顧及他人的客人」的行為包括?","opts":["提高嗓子、要求直接與經理對話、咒罵員工、插隊等","情緒平靜地尋求解決方法","擔心買錯提不起勇氣決定","愛談天說地無惡意"],"a":0,"note":"粗魯或不顧及他人的客人行為包括提高嗓子咒罵員工插隊等。"},{"q":"應對「粗魯或不顧及他人的客人」,應保持甚麼態度?","opts":["保持專業態度,冷靜、禮貌、適當笑容","以同樣粗魯的態度回應","完全避免與客人有任何眼神接觸","立即要求客人離開"],"a":0,"note":"應保持專業態度,冷靜禮貌並保持適當笑容。"},{"q":"應對「粗魯或不顧及他人的客人」,應如何專注處理?","opts":["專注要求的服務,如用紙筆記下要求,避免受負面言行影響","忽略客人的具體要求","與客人爭辯其行為是否恰當","立即結束服務並要求客人離開"],"a":0,"note":"應專注於客人要求的服務,例如用紙筆記下要求,避免受負面言行影響。"},{"q":"應對「粗魯或不顧及他人的客人」,應小心甚麼?","opts":["小心別惹起誤會,免造成更多麻煩","刻意讓客人誤會員工的不滿","故意激怒客人以測試其反應","完全不需顧慮客人的感受"],"a":0,"note":"應小心別惹起誤會,例如勿讓對方覺得員工對他不滿。"},{"q":"「喋喋不休的客人」的特質是?","opts":["愛談天說地,並無惡意,但可能會令其他顧客久候","充滿負面情緒難以溝通","個性苛刻難以討好","擔心買錯提不起勇氣決定"],"a":0,"note":"喋喋不休的客人愛談天說地並無惡意,但可能影響其他顧客。"},{"q":"「喋喋不休的客人」可能對服務品質造成甚麼影響?","opts":["間接影響服務品質,因其他顧客可能久候","必然大幅提升服務品質","與其他顧客的等候時間無關","必然縮短服務時間"],"a":0,"note":"喋喋不休的客人可能令其他顧客久候,間接影響服務品質。"},{"q":"應對「喋喋不休的客人」,應保持甚麼態度?","opts":["保持友善的態度,不露厭煩之色,同時減少無關話題的回應","表現出明顯的厭煩情緒","立即打斷客人的說話","完全忽略客人的說話內容"],"a":0,"note":"應保持友善態度,不露厭煩之色,同時減少回應無關話題。"},{"q":"應對「喋喋不休的客人」,可運用甚麼技巧掌握對話主動權?","opts":["運用封閉式或指定的開放式問題","運用完全開放式的問題讓客人自由發揮","避免提出任何問題","要求客人立即停止說話"],"a":0,"note":"運用封閉式或指定的開放式問題,有助掌握對話的主動權。"},{"q":"應對「喋喋不休的客人」,如何有禮貌地結束對話?","opts":["適當時候運用肢體動作或說話技巧","直接轉身離開而不作任何解釋","強硬打斷客人的說話","完全放任客人繼續談話而不作處理"],"a":0,"note":"可適當運用肢體動作或說話技巧,有禮貌地結束對話。"},{"q":"以下何種客人「若問題解決,可能成為忠誠顧客」?","opts":["不滿意的客人","憤怒的客人","猶豫不決的客人","喋喋不休的客人"],"a":0,"note":"教材特別提到不滿意的客人若問題解決,可能對公司更有信心成為忠誠顧客。"},{"q":"以下何種客人的特質最強調「爭取議價能力而先聲奪人」?","opts":["憤怒的客人","不滿意的客人","猶豫不決的客人","喋喋不休的客人"],"a":0,"note":"憤怒的客人其中一個成因是為爭取議價能力而先聲奪人。"},{"q":"以下何種客人最需要員工「運用試探式問題找出原因」?","opts":["猶豫不決的客人","憤怒的客人","苛刻或專橫的客人","粗魯或不顧及他人的客人"],"a":0,"note":"對猶豫不決的客人,員工應透過試探式問題找出猶豫原因。"},{"q":"以下何種客人最需要員工「稱呼姓名、眼神接觸」以顯示尊重?","opts":["苛刻或專橫的客人","不滿意的客人","猶豫不決的客人","喋喋不休的客人"],"a":0,"note":"應對苛刻或專橫的客人時,顯示尊重(稱呼姓名眼神接觸)尤其重要。"},{"q":"以下何種客人最需要員工「用紙筆記下要求」以避免受負面言行影響?","opts":["粗魯或不顧及他人的客人","不滿意的客人","猶豫不決的客人","喋喋不休的客人"],"a":0,"note":"應對粗魯或不顧及他人的客人時,可用紙筆記下要求以保持專注。"},{"q":"以下何種客人最需要員工運用「封閉式問題」掌握對話主動權?","opts":["喋喋不休的客人","憤怒的客人","苛刻或專橫的客人","猶豫不決的客人"],"a":0,"note":"應對喋喋不休的客人時,運用封閉式問題有助掌握對話主動權。"},{"q":"一位顧客因過往有不愉快經歷,對新一次服務表現出強烈不滿及情緒激動,屬於哪類難纏客人?","opts":["憤怒的客人","不滿意的客人","猶豫不決的客人","苛刻或專橫的客人"],"a":0,"note":"因過往不快經歷而情緒激動,符合憤怒的客人的特質。"},{"q":"一位顧客在餐廳花了20分鐘仍未能決定點選哪道菜,反覆猶豫,屬於哪類難纏客人?","opts":["猶豫不決的客人","憤怒的客人","苛刻或專橫的客人","粗魯或不顧及他人的客人"],"a":0,"note":"反覆猶豫無法決定,符合猶豫不決的客人的特質。"},{"q":"一位顧客在酒店大堂提高嗓子要求立即與經理對話,並插隊到櫃檯前,屬於哪類難纏客人?","opts":["粗魯或不顧及他人的客人","憤怒的客人","不滿意的客人","喋喋不休的客人"],"a":0,"note":"提高嗓子要求見經理及插隊,符合粗魯或不顧及他人的客人的行為。"},{"q":"一位顧客在櫃檯前與職員閒聊近半小時,談及生活瑣事,令後面排隊的顧客久候,屬於哪類難纏客人?","opts":["喋喋不休的客人","憤怒的客人","苛刻或專橫的客人","不滿意的客人"],"a":0,"note":"長時間閒聊令其他顧客久候,符合喋喋不休的客人的特質。"},{"q":"一位顧客情緒平靜地向員工反映房間設施故障,並希望盡快得到解決,屬於哪類難纏客人?","opts":["不滿意的客人","憤怒的客人","苛刻或專橫的客人","喋喋不休的客人"],"a":0,"note":"情緒平靜並尋求解決方法,符合不滿意的客人的特質。"},{"q":"一位顧客不斷提出額外要求,態度強硬,並多番試探員工能否讓步以取得最大優惠,屬於哪類難纏客人?","opts":["苛刻或專橫的客人","不滿意的客人","猶豫不決的客人","喋喋不休的客人"],"a":0,"note":"態度強硬並試圖爭取最大利益,符合苛刻或專橫的客人的特質。"},{"q":"為何應對「憤怒的客人」時要「明白顧客不是針對你個人」?","opts":["有助員工保持情緒穩定,理性地處理客人的不滿而非陷入對抗","員工應該把客人的憤怒視為針對自己的攻擊","明白這點沒有任何實際作用","應對憤怒客人時應立即進行反駁"],"a":0,"note":"明白顧客並非針對個人,有助員工保持情緒穩定並理性應對。"},{"q":"為何應對難纏客人時,教材普遍強調「保持專業態度」的重要性?","opts":["專業態度有助員工在壓力下仍能有效解決問題,同時維護企業形象","專業態度與解決問題的成效無關","員工應該以個人情緒回應客人的態度","專業態度只是表面工夫,沒有實際意義"],"a":0,"note":"保持專業態度有助員工有效解決問題,同時維護企業形象。"},{"q":"為何應對「苛刻或專橫的客人」時,員工「不應屈服於專橫之下」?","opts":["過度屈服可能助長不合理要求,同時無法達成公平合理的服務","應完全屈服以避免任何衝突","屈服於專橫要求是最有效的解決方法","與服務的公平性完全無關"],"a":0,"note":"過度屈服可能助長不合理要求,員工應堅定公平地聚焦合理要求。"},{"q":"為何「保留解決方法的彈性」在應對憤怒客人時十分重要?","opts":["讓員工能因應實際情況提供合適方案,同時避免作出超出公司指引的承諾","應完全沒有任何彈性,只能依循單一標準做法","員工應隨意承諾任何要求以平息客人怒氣","彈性與公司指引之間沒有任何關係"],"a":0,"note":"保留彈性讓員工能因應情況調整方案,同時不超出公司指引。"},{"q":"以下何者最能總結教材對六類難纏客人應對方式的共同原則?","opts":["員工須保持專業與同理心,因應各類客人的特質採取合適的溝通策略","所有類型的客人都應該用完全相同的方式應對","員工應對任何難纏客人一律採取強硬態度","與客人的溝通策略無需因應其特質調整"],"a":0,"note":"共同原則是保持專業同理心,並因應客人特質採取合適策略。"},{"q":"以下何者最能說明教材為何要區分「憤怒的客人」與「不滿意的客人」兩種類型?","opts":["兩者情緒強度及應對重點有別,前者需先安撫情緒,後者可直接聚焦解決方案","兩者的應對方式完全相同,不需要區分","不滿意的客人比憤怒的客人更難應對","憤怒的客人不需要任何安撫程序"],"a":0,"note":"兩者情緒強度不同,故應對重點也有分別,前者需優先安撫情緒。"},{"q":"以下何者最能總結應對「猶豫不決」與「苛刻專橫」兩類客人的關鍵分別?","opts":["前者需要耐心引導協助決策,後者需要堅定但尊重的態度處理其要求","兩者的應對方式完全相同","猶豫不決的客人比苛刻專橫的客人更難應對","苛刻專橫的客人不需要任何尊重的表現"],"a":0,"note":"猶豫不決者需耐心引導決策;苛刻專橫者則需堅定尊重地處理要求。"},{"q":"為何學習處理不同類型的難纏客人,對酒店及餐飲業從業員十分重要?","opts":["前線員工經常需要直接面對各類顧客情緒及行為,妥善應對有助維持服務質素及企業形象","難纏客人在酒店餐飲業十分罕見,不需特別學習","處理難纏客人與企業形象維護完全無關","只有管理層需要學習應對難纏客人"],"a":0,"note":"前線員工經常直接面對顧客,妥善應對有助維持服務質素及企業形象。"},{"q":"以下何者最能總結妥善應對難纏客人對企業的長遠價值?","opts":["有助將潛在的負面體驗轉化為正面印象,甚至挽留及鞏固顧客關係","妥善應對難纏客人只有短期效益,沒有長遠價值","難纏客人一旦出現,企業必然無法挽回其信任","與顧客忠誠度的建立完全無關"],"a":0,"note":"妥善應對有助將負面體驗轉化為正面印象,甚至鞏固顧客關係。"}]},{"n":7,"title":"可持續發展旅遊業的十二個目標","tag":"SUSTAINABLE TOURISM","qs":[{"q":"可持續發展旅遊業的十二個目標分為哪三大範疇?","opts":["環境之發展、社會之發展、經濟之發展","環境之發展、文化之發展、政治之發展","社會之發展、經濟之發展、科技之發展","環境之發展、經濟之發展、法律之發展"],"a":0,"note":"十二個目標分為環境社會及經濟三大範疇。"},{"q":"「環境之發展」範疇下共有多少個目標?","opts":["四個","三個","五個","兩個"],"a":0,"note":"環境之發展範疇下有自然完整性生物多樣性資源效益及環境純淨度四個目標。"},{"q":"「社會之發展」範疇下共有多少個目標?","opts":["五個","四個","三個","六個"],"a":0,"note":"社會之發展範疇下有社會公平性旅遊體驗地區管理地區福祉及文化獨特性五個目標。"},{"q":"「經濟之發展」範疇下共有多少個目標?","opts":["三個","四個","五個","兩個"],"a":0,"note":"經濟之發展範疇下有經濟可行性地區性繁榮及顧員質素三個目標。"},{"q":"環境範疇的「目標1:自然的完整性」是指?","opts":["保持與優化城市及農村景觀","把旅遊業帶來的破壞減至最低","減少使用稀有及非再生能源","盡量減少空氣水和土地污染"],"a":0,"note":"自然的完整性指保持與優化城市及農村景觀。"},{"q":"「自然的完整性」目標舉例提到哪個香港景點?","opts":["元朗屏山文物徑","大澳文化生態導賞團","海洋公園","迪士尼樂園"],"a":0,"note":"教材以元朗屏山文物徑作為自然完整性目標的例子。"},{"q":"為何「屏山文物徑」是「自然完整性」的良好例子?","opts":["景點保存優化當地景觀,對居民無造成壞影響,同時讓遊客體驗鄉村生活文化","景點完全破壞了當地的自然環境","景點與居民生活完全無關","景點只著重商業利益而非文化保育"],"a":0,"note":"屏山文物徑讓遊客體驗鄉村文化的同時,保存優化了當地景觀。"},{"q":"實現「自然的完整性」目標,旅遊業界的實質工作包括?","opts":["確保新旅遊發展計劃配合本地環境條件,維持高質素郊區市區景觀","盡量增加旅遊設施的建設規模而不理會環境影響","忽略本地環境條件全力發展","與維持景觀質素無關"],"a":0,"note":"業界應確保新發展配合環境條件,並維持高質素景觀。"},{"q":"環境範疇的「目標2:生物多樣性」是指?","opts":["把旅遊業帶來的破壞減至最低","保持與優化城市及農村景觀","減少使用稀有及非再生能源","盡量減少廢物及污染"],"a":0,"note":"生物多樣性目標指把旅遊業帶來的破壞減至最低。"},{"q":"「生物多樣性」目標舉例提到甚麼景點類型?","opts":["地質公園","文物徑","主題公園","購物中心"],"a":0,"note":"地質公園是旅遊景點,同時能保存該區的生物多樣性。"},{"q":"實現「生物多樣性」目標,旅遊業界的實質工作包括?","opts":["與國家公園等機構合作,推廣環保旅遊發展與管理觀念","與國家公園機構完全不作任何合作","忽略對自然地區的影響全力發展","減少與旅客的溝通"],"a":0,"note":"業界應與相關機構合作,推廣環保旅遊發展及管理觀念。"},{"q":"「生物多樣性」目標的實質工作也包括?","opts":["利用旅遊業鼓勵土地擁有者進行可持續的土地管理","鼓勵土地擁有者盡快開發全部土地","減少與旅客企業的溝通","忽略自然地區的保育"],"a":0,"note":"業界應利用旅遊業鼓勵土地擁有者進行可持續土地管理。"},{"q":"環境範疇的「目標3:資源效益」是指?","opts":["發展與營運旅遊設施服務時,儘量減少使用稀有及非再生能源","把旅遊業帶來的破壞減至最低","保持優化城市及農村景觀","盡量減少空氣水和土地污染"],"a":0,"note":"資源效益指發展營運時儘量減少使用稀有及非再生能源。"},{"q":"教材以哪個行業為例,說明「資源效益」目標的實踐情況?","opts":["全球酒店業","全球航空業","全球購物業","全球餐飲業"],"a":0,"note":"教材以全球酒店業的資源運用情況作為資源效益目標的例子。"},{"q":"教材指出全球酒店業在資源效益方面有何表現?","opts":["減少用水成效較佳,但能源與碳排放有待改善","能源與碳排放表現極佳,但用水成效不足","所有方面的表現都已達至完美","完全沒有任何相關的資源效益措施"],"a":0,"note":"全球酒店業在減少用水方面成效較佳,但能源碳排放仍有待改善。"},{"q":"實現「資源效益」目標,旅遊業界的實質工作包括?","opts":["規劃時同時估計資源供應情況,宣揚減少再用循環的環保意識","規劃時完全不考慮資源供應情況","盡量增加非再生能源的使用","忽略減少再用循環的環保理念"],"a":0,"note":"業界應在規劃時估計資源供應,並宣揚環保意識。"},{"q":"環境範疇的「目標4:環境純淨度」是指?","opts":["盡量減少空氣、水和土地污染,及旅遊活動釋出的廢物","保持優化城市及農村景觀","把旅遊業帶來的破壞減至最低","減少使用稀有及非再生能源"],"a":0,"note":"環境純淨度指盡量減少污染及廢物排放。"},{"q":"實現「環境純淨度」目標,旅遊業界的實質工作包括?","opts":["鼓勵使用單車等有更佳持續性的交通工具","鼓勵旅客盡量使用私家車代步","增加化學物品的使用量","增加廢物排放至海洋與河流"],"a":0,"note":"業界應鼓勵使用單車等具持續性的交通工具。"},{"q":"「環境純淨度」目標的實質工作也包括?","opts":["減少使用破壞環境的化學物品,減少廢物及小心棄置","增加使用破壞環境的化學物品","忽略廢物棄置的處理方式","放任廢物排放至海洋與河流而不作限制"],"a":0,"note":"業界應減少使用有害化學物品,並小心處理廢物棄置。"},{"q":"社會範疇的「目標1:社會公平性」是指?","opts":["致力公平地分配旅遊業帶給東道國的經濟與社會利益,並把利益擴散","純粹追求最大旅遊收益而不理分配","只讓少數投資者享有旅遊業利益","與經濟利益分配無關"],"a":0,"note":"社會公平性指公平分配旅遊業帶來的利益並擴散。"},{"q":"「社會公平性」目標舉例提到哪個香港活動?","opts":["大澳的文化生態導賞團","元朗屏山文物徑","海洋公園園遊會","迪士尼煙花表演"],"a":0,"note":"大澳文化生態導賞團由當地居民帶領,體現社會公平性。"},{"q":"為何「大澳文化生態導賞團」體現社會公平性?","opts":["行程由當地居民帶領或指導,讓本地社群直接受惠於旅遊業","行程完全由外來機構壟斷經營","當地居民完全沒有參與其中的機會","與本地社群的利益分配無關"],"a":0,"note":"由當地居民帶領導賞,讓本地社群直接參與並受惠於旅遊業發展。"},{"q":"實現「社會公平性」目標,旅遊業界的實質工作包括?","opts":["為弱勢人士創造更多就業機會,鼓勵旅遊企業及旅客提供自發性幫助","只為特定群體創造就業機會而忽略弱勢社群","減少對弱勢社群的支援","與旅遊稅款的運用完全無關"],"a":0,"note":"業界應為弱勢人士創造就業機會,並鼓勵自發性幫助。"},{"q":"社會範疇的「目標2:旅遊體驗」是指?","opts":["無歧視地為所有旅客,提供安全、滿意及有意義的經歷","只為高消費旅客提供優質經歷","只為健全人士提供旅遊體驗","與旅客的滿意度無關"],"a":0,"note":"旅遊體驗目標指無歧視地為所有旅客提供優質經歷。"},{"q":"「旅遊體驗」目標舉例提到哪些機構?","opts":["海洋公園與迪士尼樂園","元朗屏山文物徑","大澳文化生態導賞團","香港旅遊發展局"],"a":0,"note":"海洋公園與迪士尼樂園每年與社會服務團體合辦相關活動。"},{"q":"海洋公園與迪士尼樂園如何體現「旅遊體驗」目標?","opts":["每年與社會服務團體合辦低收入家庭與殘疾人士遊園活動","完全拒絕低收入家庭及殘疾人士入場","只為高消費客戶提供任何優惠","與社會服務團體完全沒有任何合作"],"a":0,"note":"兩個主題公園與社會服務團體合辦活動,讓弱勢群體也能享有旅遊體驗。"},{"q":"實現「旅遊體驗」目標,旅遊業界的實質工作包括?","opts":["監察旅客服務質素與滿意度,為所有旅客提供完善通道與設施","只監察高消費旅客的服務質素","忽略設施的無障礙需要","只為健全旅客提供服務"],"a":0,"note":"業界應監察服務質素滿意度,並提供完善的通道及設施。"},{"q":"社會範疇的「目標3:地區管理」是指?","opts":["引進與授權本地社群參與規劃與制定當地旅遊業的管理與未來發展","完全由外來投資者主導旅遊業發展,不涉及本地社群","忽略本地社群的意見","只徵詢政府部門的意見而不理會本地社群"],"a":0,"note":"地區管理指引進授權本地社群參與旅遊業的規劃及管理。"},{"q":"「地區管理」目標舉例提到哪個景點?","opts":["屏山文物徑","大澳文化生態導賞團","海洋公園","迪士尼樂園"],"a":0,"note":"屏山文物徑的成立與維護有賴當地原居民的協助,體現地區管理。"},{"q":"實現「地區管理」目標,旅遊業界的實質工作包括?","opts":["尊重本地與傳統社群在參與及管理的獨有角色","忽略本地傳統社群的參與角色","只讓外來專家決定當地旅遊業的發展方向","減少本地社群參與決定的機會"],"a":0,"note":"業界應尊重本地傳統社群在參與管理上的獨有角色。"},{"q":"社會範疇的「目標4:地區福祉」是指?","opts":["維持與強化本地社群的生活質素,同時避免剝削或社會環境惡化","純粹追求最大旅遊收益不理會社群生活質素","只重視旅客的體驗而完全忽略本地居民","鼓勵剝削本地社群以增加旅遊業收益"],"a":0,"note":"地區福祉指維持強化本地社群生活質素,同時避免剝削。"},{"q":"「地區福祉」目標舉例提到香港旅發局哪項宣傳?","opts":["「大城小景」","「屏山文物徑」宣傳","「大澳導賞團」宣傳","「海洋公園全年通行證」宣傳"],"a":0,"note":"「大城小景」介紹本港各區地道文化,體現地區福祉目標。"},{"q":"「大城小景」宣傳有何作用?","opts":["有助分流遊客,減少主要景點的擁擠情況,促進各區社群發展","只集中吸引遊客前往主要景點","增加主要景點的擁擠程度","與各區社群的發展完全無關"],"a":0,"note":"分流遊客可減少主要景點擁擠,同時促進各區社群發展。"},{"q":"實現「地區福祉」目標,旅遊業界的實質工作包括?","opts":["設法平衡人流、時間與景點位置,減少擠塞","盡量集中所有旅客於單一景點","忽略人流分佈對本地社群的影響","增加特定景點的擠塞情況"],"a":0,"note":"業界應設法平衡人流時間與景點位置,以減少擠塞。"},{"q":"社會範疇的「目標5:文化獨特性」是指?","opts":["尊重與促進東道國社群的歷史傳統、本土文化、風俗與獨特性","忽略東道國的傳統文化以迎合外來旅客口味","將所有旅遊景點的文化特色統一化","與本地文化保育完全無關"],"a":0,"note":"文化獨特性指尊重並促進東道國社群的歷史傳統及本土文化。"},{"q":"實現「文化獨特性」目標,旅遊業界的實質工作包括?","opts":["確保文化與歷史景點的良好管理與保育","忽略文化歷史景點的管理與保育","與社群在推廣文化議題上完全不作聯繫","盡量減少對文化景點的投入"],"a":0,"note":"業界應確保文化歷史景點的良好管理與保育。"},{"q":"經濟範疇的「目標1:經濟可行性」是指?","opts":["確保旅遊目的地及企業的競爭力與生存能力,讓其可以長期發展及帶來貢獻","純粹追求短期最大利潤而不理會長遠發展","忽略旅遊目的地的競爭力","與企業的生存能力完全無關"],"a":0,"note":"經濟可行性指確保目的地及企業的競爭力,以長期發展貢獻。"},{"q":"「經濟可行性」目標舉例提到香港哪份文件?","opts":["《香港旅遊業發展藍圖》","《香港旅遊業發展條例》","《可持續旅遊發展白皮書》","《香港旅遊安全指引》"],"a":0,"note":"商務及經濟發展局於2017年向立法會提交《香港旅遊業發展藍圖》。"},{"q":"《香港旅遊業發展藍圖》的作用是?","opts":["制定未來5年的短、中和長期旅遊項目及措施","純粹是一份宣傳單張,沒有實質規劃內容","只涵蓋短期一年內的措施","與旅遊業的長遠發展完全無關"],"a":0,"note":"藍圖制定未來5年的短中長期旅遊項目及措施。"},{"q":"教材指出香港哪些機構是負責旅遊事務的最重要機構?","opts":["旅遊事務署及旅遊發展局","消費者委員會及旅發局","入境事務處及旅發局","海關及旅遊事務署"],"a":0,"note":"香港的旅遊事務署及旅遊發展局是負責旅遊事務的最重要機構。"},{"q":"實現「經濟可行性」目標,旅遊業界的實質工作包括?","opts":["維持良好的商貿環境,維持及發展具吸引力的旅遊目的地","忽略商貿環境的維持","減少對旅遊目的地吸引力的投入","與提供商業支援無關"],"a":0,"note":"業界應維持良好商貿環境,並發展具吸引力的旅遊目的地。"},{"q":"經濟範疇的「目標2:地區性繁榮」是指?","opts":["讓旅遊業為東道目的地的經濟提供最大貢獻","只讓外來投資者從旅遊業中獲利","忽略旅遊業對本地經濟的貢獻","與東道目的地的經濟發展完全無關"],"a":0,"note":"地區性繁榮指讓旅遊業為東道目的地經濟提供最大貢獻。"},{"q":"「地區性繁榮」目標舉例提到海洋公園與迪士尼樂園做了甚麼?","opts":["均增建酒店,有助吸引更多旅客逗留更長時間並在園內消費","均大幅減少園內設施以節省成本","完全沒有增建任何設施","與吸引旅客逗留時間無關"],"a":0,"note":"兩個主題公園增建酒店,吸引旅客逗留更長時間並增加消費。"},{"q":"實現「地區性繁榮」目標,旅遊業界的實質工作包括?","opts":["減少損漏,把旅遊產品多元化以增加旅客逗留時間","增加損漏而不作任何控制","減少旅遊產品的多元化程度","縮短旅客的逗留時間"],"a":0,"note":"業界應減少經濟損漏,並將產品多元化以增加旅客逗留時間。"},{"q":"經濟範疇的「目標3:顧員質素」是指?","opts":["強化旅遊業創造與支持的本土職位的數目與質素,無歧視地提供予所有人","只重視職位數目而忽略職位質素","減少本土職位的創造","只為特定群體提供工作機會"],"a":0,"note":"顧員質素指強化本土職位的數目質素,並無歧視地提供予所有人。"},{"q":"「顧員質素」目標舉例提到香港哪個行業的情況?","opts":["酒店和餐飲業長期缺乏人材","零售業人手過剩","航空業人手過剩","旅行社業人手過剩"],"a":0,"note":"教材指香港酒店和餐飲業長期缺乏人材,企業提供優厚待遇吸引人才。"},{"q":"實現「顧員質素」目標,旅遊業界的實質工作包括?","opts":["增加全年全職的工種,貫徹執行相關勞工法例規定","盡量以兼職取代全職工種","忽略勞工法例的執行","減少對從業員的培訓投入"],"a":0,"note":"業界應增加全年全職工種,並貫徹執行勞工法例。"},{"q":"「顧員質素」目標的實質工作也包括?","opts":["鼓勵企業提供技能培訓與員工事業發展,關注失業待業從業員福利","減少員工的技能培訓機會","忽略從業員的事業發展需要","對失業待業從業員的福利不予理會"],"a":0,"note":"業界應鼓勵提供技能培訓及事業發展,並關注從業員福利。"},{"q":"以下何者屬於「環境之發展」範疇的目標?","opts":["資源效益","社會公平性","經濟可行性","顧員質素"],"a":0,"note":"資源效益屬環境之發展範疇下的目標。"},{"q":"以下何者屬於「社會之發展」範疇的目標?","opts":["地區福祉","資源效益","地區性繁榮","經濟可行性"],"a":0,"note":"地區福祉屬社會之發展範疇下的目標。"},{"q":"以下何者屬於「經濟之發展」範疇的目標?","opts":["地區性繁榮","生物多樣性","文化獨特性","環境純淨度"],"a":0,"note":"地區性繁榮屬經濟之發展範疇下的目標。"},{"q":"一間旅遊企業投資研發減少碳排放的技術,主要對應哪個目標?","opts":["資源效益","社會公平性","文化獨特性","顧員質素"],"a":0,"note":"減少碳排放的技術投資對應資源效益這一環境目標。"},{"q":"一個旅遊項目聘請當地居民擔任導賞員並讓其主導行程設計,主要對應哪個目標?","opts":["地區管理","資源效益","經濟可行性","環境純淨度"],"a":0,"note":"讓本地社群主導規劃及管理,對應地區管理這一社會目標。"},{"q":"一個旅遊發展計劃在規劃初期已考慮如何配合本地環境條件並維持景觀質素,主要對應哪個目標?","opts":["自然的完整性","社會公平性","顧員質素","地區性繁榮"],"a":0,"note":"配合環境條件維持景觀質素,對應自然的完整性這一目標。"},{"q":"一間主題公園增建更多酒店房間,以延長旅客在該區的逗留及消費時間,主要對應哪個目標?","opts":["地區性繁榮","文化獨特性","資源效益","地區管理"],"a":0,"note":"增加旅客逗留消費時間,對應地區性繁榮這一經濟目標。"},{"q":"一間酒店為殘疾人士及低收入家庭提供特別度假優惠及無障礙設施,主要對應哪個目標?","opts":["旅遊體驗","地區管理","經濟可行性","文化獨特性"],"a":0,"note":"無歧視地提供優質旅遊經歷,對應旅遊體驗這一目標。"},{"q":"一份政府文件制定未來五年旅遊業發展的短中長期措施,主要對應哪個目標?","opts":["經濟可行性","資源效益","地區福祉","文化獨特性"],"a":0,"note":"制定長期發展措施以確保競爭力及生存能力,對應經濟可行性。"},{"q":"為何十二個目標要按環境、社會、經濟三大範疇劃分?","opts":["有助全面涵蓋可持續發展的不同面向,避免只偏重單一方面","三大範疇之間完全沒有任何關聯","應只著重經濟範疇,其餘範疇並不重要","分類純粹是為方便記憶,沒有實質意義"],"a":0,"note":"三大範疇劃分有助全面涵蓋可持續發展的不同面向。"},{"q":"為何「地區性繁榮」與「地區福祉」兩個目標雖然都關乎「地區」,但性質有所不同?","opts":["前者著重經濟貢獻,後者著重社群生活質素及避免剝削","兩者定義完全相同,沒有實質分別","地區性繁榮屬社會範疇,地區福祉屬經濟範疇","兩者與本地社群完全無關"],"a":0,"note":"地區性繁榮屬經濟範疇著重貢獻;地區福祉屬社會範疇著重生活質素。"},{"q":"為何「自然的完整性」與「生物多樣性」兩個環境目標需要分開列出?","opts":["前者著重景觀保存優化,後者著重生態物種的保育,兩者關注點有別","兩者定義完全相同,不需要分開列出","自然的完整性與生態保育完全無關","生物多樣性只涉及動物,不涉及植物"],"a":0,"note":"自然的完整性著重景觀,生物多樣性著重生態物種保育,關注點有別。"},{"q":"以下何者最能總結「可持續發展旅遊業十二個目標」的整體精神?","opts":["在發展旅遊業的同時,兼顧環境保育、社會公平及經濟繁榮,達致長遠平衡發展","純粹追求最大的旅遊業經濟收益","完全犧牲經濟發展以換取環境保育","社會公平與旅遊業發展完全無關"],"a":0,"note":"十二個目標的整體精神是兼顧環境社會經濟三方面,達致平衡發展。"},{"q":"為何香港旅遊發展局的「大城小景」宣傳同時涉及「地區福祉」及可能與「地區性繁榮」相關?","opts":["分流遊客既保障各區社群生活質素,亦有助帶動各區的經濟消費","分流遊客與社群生活質素及經濟消費完全無關","只涉及社群生活質素,與經濟繁榮無任何關聯","分流遊客必然損害各區的經濟發展"],"a":0,"note":"分流遊客既保障社群生活質素(地區福祉),亦可能帶動各區經濟消費(地區性繁榮)。"},{"q":"為何「顧員質素」被列為經濟範疇的目標而非社會範疇?","opts":["此目標著重旅遊業創造的職位數量質素及相關經濟貢獻,與行業經濟結構直接相關","顧員質素與經濟結構完全無關","此目標應該歸類為環境範疇","此分類方式並無任何邏輯依據"],"a":0,"note":"顧員質素著重旅遊業創造的職位及相關經濟貢獻,故歸類為經濟範疇。"},{"q":"以下何者最能總結十二個目標對旅遊業界的實際指導意義?","opts":["為業界提供具體的行動方向,平衡旅遊業發展與環境社會經濟的長遠可持續性","純粹是理論框架,對業界的實際運作沒有指導作用","業界只需專注經濟目標,其餘目標可以忽略","十二個目標之間互相矛盾,無法同時達成"],"a":0,"note":"十二個目標為業界提供具體行動方向,平衡各方面的長遠可持續性。"}]},{"n":8,"title":"旅遊業的同質化與標準化","tag":"HOMOGENISATION & STANDARDISATION","qs":[{"q":"教材將旅遊業的發展趨勢分為哪兩種相關現象?","opts":["同質化與標準化","全球化與本地化","數碼化與人性化","商品化與矮化(此為另一課題)"],"a":0,"note":"教材討論旅遊業的同質化與標準化兩種趨勢。"},{"q":"「同質化」是指甚麼現象?","opts":["產品和服務所用技術和模式漸趨一致","不同地區的產品和服務越來越多元獨特","消費者的生活方式越趨分歧","與生產消費模式無關"],"a":0,"note":"同質化指產品服務所用技術和模式漸趨一致。"},{"q":"同質化下,消費者的生活方式、消費行為和價值觀有何變化?","opts":["越趨相近","越趨分歧","完全沒有變化","與同質化現象無關"],"a":0,"note":"同質化下生活方式消費行為和價值觀會越趨相近。"},{"q":"同質化下,生產和消費模式的發展趨勢是?","opts":["會越來越接近","會越來越疏離","完全保持不變","與地區發展完全無關"],"a":0,"note":"同質化下生產和消費模式會越來越接近。"},{"q":"同質化對企業經營者的影響之一是?","opts":["提高營運效率","降低營運效率","令管理更加困難","令企業難以打敗競爭對手"],"a":0,"note":"同質化有助提高企業的營運效率。"},{"q":"同質化對企業經營者的另一影響是?","opts":["容易管理","難以管理","必然增加管理成本","與管理便利性無關"],"a":0,"note":"同質化下企業較容易管理。"},{"q":"同質化下,企業如何進行製造、推廣和宣傳?","opts":["用同一套模式","每個地區均需要完全獨立設計","完全不需要任何推廣宣傳","與模式一致性無關"],"a":0,"note":"同質化下企業可用同一套模式進行製造推廣及宣傳。"},{"q":"同質化對大企業有何影響?","opts":["大企業有更大的經費預算打敗各地小規模的競爭對手","大企業會因同質化而喪失競爭優勢","小規模企業會因同質化而佔盡優勢","與企業規模的競爭力無關"],"a":0,"note":"大企業憑更大經費預算,在同質化下更易打敗小規模競爭對手。"},{"q":"同質化對消費者的影響是?","opts":["生產成本更低,價錢也會較低,質素也更好","生產成本必然上升","消費者的選擇必然減少至零","與價格質素完全無關"],"a":0,"note":"同質化下生產成本降低,價錢較低質素也更好。"},{"q":"同質化對旅遊業發展的影響之一是?","opts":["旅客感受不到不同國家地區的獨有風格","旅客能更深刻感受不同地區的獨特文化","與旅客的旅遊體驗完全無關","旅遊業的多元性因此大幅提升"],"a":0,"note":"同質化下旅客較難感受到不同國家地區的獨有風格。"},{"q":"同質化對旅遊業發展的另一影響是?","opts":["無法保持文化持續發展與獨特性","有助大幅提升文化的獨特性","與文化的持續發展完全無關","令各地文化變得更加多元"],"a":0,"note":"同質化下難以保持地方文化的持續發展與獨特性。"},{"q":"「標準化」的特色之一「重視效率」是指?","opts":["最快、最低成本達致目標","不計成本追求最高質素","完全忽略效率的重要性","與達成目標的速度無關"],"a":0,"note":"標準化重視效率指以最快最低成本達致目標。"},{"q":"「標準化」的特色之一「可計算性」是指?","opts":["量化生產工序","無法量化任何工序","純粹依賴主觀判斷","與生產工序完全無關"],"a":0,"note":"可計算性指標準化下生產工序能被量化。"},{"q":"「標準化」的特色之一「可預計性」是指?","opts":["提供的服務要均一和標準","每次提供的服務都完全不同","服務內容無法預先計劃","與服務的一致性完全無關"],"a":0,"note":"可預計性指提供的服務須均一和標準。"},{"q":"「標準化」的特色之一「可監控性」是指?","opts":["員工採用標準化和均一化的行為和動作完成任務","員工可以完全自由發揮,不受任何規範","無法監控員工的工作表現","與員工行為的一致性無關"],"a":0,"note":"可監控性指員工採用標準化均一化的行為動作完成任務。"},{"q":"旅遊業標準化概況中,「旅行團」的特點是?","opts":["經過精心編排和計算,按承諾兌現服務","完全沒有固定行程,隨意安排","不需要考慮成本控制","與盈利目標完全無關"],"a":0,"note":"旅行團經過精心編排計算,並按承諾兌現服務,達至盈利成本控制等要求。"},{"q":"旅遊業標準化概況中,「住宿」的特點是?","opts":["常見於國際酒店管理集團,劃一高服務質素的企業目標","每間分店的服務質素完全不設任何標準","與維持消費者滿意度完全無關","只適用於本地小型酒店"],"a":0,"note":"住宿標準化常見於國際酒店集團,劃一高服務質素以維持滿意度。"},{"q":"旅遊業標準化概況中,「餐飲」的特點是?","opts":["全球各地國際性快餐飲食大同小異","全球各地的餐飲完全各具特色沒有任何共通點","只限本地小食店才有標準化情況","與全球化發展完全無關"],"a":0,"note":"全球各地國際性快餐飲食大同小異,體現餐飲業的標準化。"},{"q":"旅遊業標準化概況中,「交通」的特點是?","opts":["國際運輸包括航空、鐵路和郵輪等在服務和營運形式上都近似","不同國家的交通運輸完全沒有任何相似之處","只限本地交通工具才有標準化情況","與國際運輸完全無關"],"a":0,"note":"國際運輸(航空鐵路郵輪)在服務營運形式上都相當近似。"},{"q":"旅遊業標準化概況中,「購物」的特點是?","opts":["世界各城市內的購物中心和出售貨品都相當近似","不同城市的購物中心完全各具特色沒有共通點","只限本地小店才有標準化情況","與全球化的購物模式完全無關"],"a":0,"note":"世界各城市的購物中心和出售貨品都相當近似,體現標準化。"},{"q":"標準化對消費者的影響之一是?","opts":["保留熟悉的服務和平日生活方式","完全失去熟悉的生活方式","必須完全適應陌生的當地習慣","與消費者的生活習慣完全無關"],"a":0,"note":"標準化讓消費者在旅途中仍能保留熟悉的服務和生活方式。"},{"q":"標準化對消費者的另一影響是?","opts":["保持平日的飲食習慣,為免飲食不當引致不適","必須完全放棄平日的飲食習慣","與飲食不適的風險完全無關","必須嘗試所有當地陌生食物"],"a":0,"note":"標準化讓消費者能保持平日飲食習慣,避免因飲食不當引致不適。"},{"q":"為何近年更多旅客選擇「自由行」?","opts":["為避免太多標準化行程","因為自由行必然比跟團更便宜","因為自由行完全不需要任何規劃","與標準化行程的普及程度無關"],"a":0,"note":"為避免太多標準化行程,近年更多旅客選擇自由行。"},{"q":"部分旅客在標準化趨勢下有何反應?","opts":["故意避開主流旅遊模式,銳意追尋個人體驗","完全接受並依賴標準化行程","對標準化行程毫無任何意見","必然完全放棄旅遊活動"],"a":0,"note":"部分旅客會故意避開主流模式,追尋個人化的旅遊體驗。"},{"q":"標準化對「旅遊業界」的影響之一是?","opts":["提高成本效益和管理效率","降低成本效益","令管理變得更加困難","與成本效益完全無關"],"a":0,"note":"標準化有助業界提高成本效益和管理效率。"},{"q":"標準化對旅遊業界的另一影響(挑戰)是?","opts":["在「標準化」大前提下提供更「個人化」的安排","業界完全不需要考慮個人化服務","標準化與個人化服務完全沒有任何矛盾","業界應完全放棄標準化的做法"],"a":0,"note":"業界面臨的挑戰是在標準化前提下仍要提供個人化安排。"},{"q":"標準化對「旅遊目的地」的影響是?","opts":["目的地失去特色","目的地的特色必然更加突出","與旅遊目的地的形象無關","目的地的知名度必然大幅提升"],"a":0,"note":"標準化趨勢下,旅遊目的地可能因而失去原有特色。"},{"q":"以下何者最能說明「同質化」與「標準化」兩者的關係?","opts":["同質化描述產品服務模式趨於一致的現象,標準化則是企業因應此現象採取的具體營運策略","兩者定義完全相同,沒有任何分別","同質化與標準化完全獨立,互不相關","標準化必然導致同質化的消失"],"a":0,"note":"同質化是趨於一致的現象,標準化則是企業回應此現象的具體策略。"},{"q":"為何「同質化」對大企業較為有利,對小型企業則構成挑戰?","opts":["大企業有更大經費預算及規模優勢,能在同質化競爭中打敗小規模對手","小型企業在同質化下必然佔盡優勢","同質化對大小企業的影響完全相同","大企業必然無法在同質化競爭中生存"],"a":0,"note":"大企業憑更大經費預算及規模優勢,在同質化競爭下更具優勢。"},{"q":"為何「標準化」有助企業「提高成本效益和管理效率」?","opts":["統一的生產工序及服務標準,能減少資源浪費並簡化管理流程","標準化必然增加企業的營運成本","標準化與管理效率的提升完全無關","標準化只會令企業流程更加複雜"],"a":0,"note":"統一的工序及標準能減少資源浪費並簡化管理,提高成本效益及效率。"},{"q":"為何部分旅客「故意避開主流旅遊模式」以追尋個人體驗?","opts":["標準化行程漸趨一致,令部分旅客希望尋找更獨特及真實的旅遊經歷","標準化行程必然比自由行更受歡迎","追尋個人體驗與旅遊模式的多元性無關","所有旅客都必然偏好標準化行程"],"a":0,"note":"標準化行程漸趨一致,促使部分旅客尋找更獨特真實的體驗。"},{"q":"以下何者屬於「同質化」現象的例子?","opts":["全球多個國家的購物中心出售相同品牌及款式的貨品","一間本地小店只出售獨有的手工藝品","一個景點只有當地居民能夠參觀","一種只在單一地區流傳的傳統習俗"],"a":0,"note":"全球購物中心出售相同品牌貨品,體現產品服務模式趨於一致的同質化現象。"},{"q":"以下何者屬於「標準化」的具體實踐例子?","opts":["國際快餐連鎖店在全球各分店提供完全相同的餐單及製作流程","每間分店各自設計獨有的餐單而不設任何統一標準","企業容許員工完全自由發揮,不設任何工作規範","企業完全不監控員工的服務表現"],"a":0,"note":"全球分店統一餐單及製作流程,是標準化的具體實踐。"},{"q":"一位旅客選擇跟隨精心編排的旅行團行程,享受既定的酒店及餐飲安排,這反映了旅遊業哪種趨勢?","opts":["標準化","同質化(此描述較貼近標準化的具體體現)","商品化","矮化"],"a":0,"note":"精心編排的既定行程,體現標準化中「可預計性」及「重視效率」的特色。"},{"q":"一位旅客發現無論到訪哪個國家,國際連鎖快餐店的漢堡包味道及包裝都幾乎完全相同,這反映哪種現象?","opts":["同質化","標準化(此為企業採取的策略,現象本身稱為同質化)","商品化","地區性繁榮"],"a":0,"note":"不同地區產品服務漸趨一致,反映的正是同質化現象。"},{"q":"一位旅客不滿足於傳統觀光行程,特意尋找當地小眾及非主流的旅遊體驗,這反映消費者對哪種趨勢的回應?","opts":["對標準化行程的回應,追尋個人化體驗","對同質化現象的完全支持","對地區性繁榮目標的實踐","與旅遊業趨勢完全無關的個人喜好"],"a":0,"note":"追尋個人化體驗是消費者對標準化行程漸趨一致的一種回應。"},{"q":"一間國際酒店集團要求全球所有分店採用相同的服務流程及品質標準,這體現標準化的哪項特色?","opts":["可預計性及可監控性","純粹的可計算性","與標準化的特色完全無關","純粹的重視效率"],"a":0,"note":"統一的服務流程及品質標準,體現可預計性(服務均一)及可監控性(行為規範)。"},{"q":"為何「標準化」下的旅行團仍需要「達至盈利、成本控制、監控等各項要求」?","opts":["旅行團作為商業產品,須在精心編排的同時兼顧企業的經營目標","旅行團的編排與企業的經營目標完全無關","旅行團不需要考慮任何盈利或成本因素","監控要求與旅行團的服務質素無關"],"a":0,"note":"旅行團作為商業產品,須在編排服務的同時兼顧盈利成本監控等經營目標。"},{"q":"為何「同質化」被指「無法保持文化持續發展與獨特性」?","opts":["當各地產品服務模式趨於一致,地方特色及傳統文化元素可能被淡化","同質化必然有助強化各地文化的獨特性","同質化與地方文化的保存完全無關","文化的持續發展不受同質化現象影響"],"a":0,"note":"產品服務模式趨於一致,可能令地方特色及傳統文化元素被淡化。"},{"q":"為何國際酒店集團採用「標準化」的服務模式,反而是吸引部分商務旅客的原因?","opts":["商務旅客重視服務的一致性及可預期性,標準化正好滿足這種需要","商務旅客必然偏好每次入住體驗完全不同的酒店","標準化服務必然無法滿足任何類型的旅客","與商務旅客的需要完全無關"],"a":0,"note":"商務旅客重視服務的一致性及可預期性,標準化服務正好滿足此需要。"},{"q":"為何旅遊業界在「標準化」與「個人化」之間需要取得平衡?","opts":["過度標準化可能令服務失去特色,完全個人化則可能犧牲成本效益及管理效率","標準化與個人化服務完全沒有任何取捨關係","業界應完全捨棄標準化,只提供個人化服務","業界應完全捨棄個人化,只提供標準化服務"],"a":0,"note":"過度標準化可能失去特色,完全個人化則犧牲成本效益,故須取得平衡。"},{"q":"以下何者最能總結「同質化」對旅遊業消費者的雙面影響?","opts":["消費者可享有較低價格及較佳質素,但同時較難體驗到地道獨特的文化風格","消費者只會承受負面影響,沒有任何得益","消費者只會得到正面影響,沒有任何損失","同質化對消費者完全沒有任何影響"],"a":0,"note":"消費者可享較低價格及較佳質素,但代價是較難體驗地道獨特文化。"},{"q":"以下何者最能總結「標準化」四項特色(效率、可計算性、可預計性、可監控性)之間的關係?","opts":["四者共同構成企業透過規範化流程,追求效率與品質一致性的整體策略","四者完全獨立,互不影響","只有其中一項特色才是標準化的核心","四者與企業的營運策略完全無關"],"a":0,"note":"四項特色共同構成企業追求效率與品質一致性的整體標準化策略。"},{"q":"為何「購物」被視為旅遊業高度標準化的一個範疇?","opts":["世界各地的購物中心及品牌貨品日趨相似,反映全球化下的統一趨勢","購物體驗在世界各地完全獨一無二,毫無相似之處","購物與旅遊業的標準化趨勢完全無關","只有本地居民才會受購物標準化的影響"],"a":0,"note":"全球購物中心及品牌貨品日趨相似,反映購物範疇的高度標準化。"},{"q":"若一間國際酒店集團希望在維持標準化服務質素的同時,加入具地方特色的元素,可以怎樣做?","opts":["在統一的服務框架下,適度加入本地文化或設計元素以提升獨特性","完全捨棄統一服務框架,每間分店各自為政","完全拒絕加入任何本地特色元素","與提升顧客體驗的目標完全無關"],"a":0,"note":"在統一框架下適度加入本地特色元素,是平衡標準化與獨特性的做法。"},{"q":"為何交通運輸業(如航空鐵路郵輪)在全球呈現高度標準化的服務形式?","opts":["國際運輸涉及跨國營運及安全規範,需要統一的服務營運標準以確保效率及安全","交通運輸業完全不需要考慮跨國營運的複雜性","國際運輸的服務形式在各地必然完全不同","與安全規範及跨國營運的需要無關"],"a":0,"note":"國際運輸涉及跨國營運及安全規範,需統一標準確保效率及安全。"},{"q":"以下何者最能說明消費者「保持平日飲食習慣」是標準化帶來的正面影響?","opts":["旅客在陌生地方仍能透過熟悉的連鎖餐飲品牌,減少因飲食不適應而引致的不適","保持飲食習慣必然令旅遊體驗變得單調乏味","飲食習慣與旅客的健康狀況完全無關","旅客應完全放棄熟悉的飲食習慣以求新體驗"],"a":0,"note":"熟悉的連鎖餐飲品牌讓旅客即使身處陌生地方,也能減少飲食不適應的風險。"},{"q":"為何教材將「同質化」與「標準化」放在同一課題討論?","opts":["兩者密切相關:同質化是市場現象,標準化是企業因應此現象而發展出的營運模式","兩者是完全獨立且互不相關的兩個課題","同質化只是標準化的其中一個細項而已","標準化的出現與市場的同質化現象毫無關聯"],"a":0,"note":"同質化是市場現象,標準化是企業因應此現象發展出的營運模式,兩者密切相關。"},{"q":"以下何者最能總結標準化對旅遊目的地帶來的挑戰?","opts":["過度標準化可能令不同旅遊目的地趨於相似,削弱其獨有的吸引力","標準化必然增強旅遊目的地的獨特吸引力","標準化與旅遊目的地的形象完全無關","旅遊目的地不會受到標準化趨勢的任何影響"],"a":0,"note":"過度標準化可能令不同旅遊目的地趨於相似,削弱其獨有吸引力。"},{"q":"以下何者最能總結旅遊業界回應「標準化與個人化」兩難局面的合理方向?","opts":["透過核心服務標準化以控制成本效益,同時在細節上提供彈性化及個人化元素","業界應完全放棄追求任何成本效益","業界應完全放棄提供任何個人化服務","標準化與個人化服務永遠無法在同一產品中並存"],"a":0,"note":"核心服務標準化控制成本,細節上提供個人化元素,是合理的應對方向。"},{"q":"一間國際咖啡連鎖店在世界各地分店均採用完全相同的裝潢風格及餐單設計,這反映哪種趨勢?","opts":["標準化","地區性繁榮","文化獨特性","地區福祉"],"a":0,"note":"各地分店統一裝潢及餐單設計,正是標準化的具體體現。"},{"q":"為何部分旅遊目的地近年開始推廣「深度遊」及「在地體驗」行程,以回應同質化及標準化的挑戰?","opts":["藉此突顯自身的獨特文化及風格,吸引追求真實體驗的旅客","深度遊行程與同質化標準化的挑戰完全無關","推廣深度遊純粹是為了降低營運成本","在地體驗行程必然比標準化行程更加昂貴"],"a":0,"note":"藉深度遊突顯獨特文化風格,吸引追求真實體驗的旅客,回應同質化標準化挑戰。"},{"q":"若企業完全捨棄標準化,每次服務都採取截然不同的做法,可能有何問題?","opts":["難以確保服務質素的一致性,亦難以有效控制成本及進行員工培訓","服務質素必然因此大幅提升而毫無代價","成本控制與標準化的存在與否完全無關","員工培訓不需要任何統一的服務標準"],"a":0,"note":"完全捨棄標準化難以確保服務質素一致,也難以有效控制成本及培訓。"},{"q":"為何「可監控性」被視為標準化的重要特色之一?","opts":["有助管理層確保員工的行為及服務表現符合企業所定的既定標準","可監控性與員工行為的規範完全無關","管理層不需要監控員工是否符合任何服務標準","可監控性純粹用於財務審計,與服務表現無關"],"a":0,"note":"可監控性有助管理層確保員工行為及表現符合既定標準,是標準化的重要特色。"},{"q":"一間連鎖酒店集團為不同地區的分店設計統一的員工培訓課程及服務手冊,這體現標準化的哪項特色?","opts":["可監控性及可預計性","純粹的重視效率而與其他特色無關","與標準化的任何特色完全無關","純粹的可計算性而與其他特色無關"],"a":0,"note":"統一培訓課程及服務手冊,體現標準化中可監控性(行為規範)及可預計性(服務均一)的特色。"},{"q":"以下何者最能說明「標準化」與「規模經濟效益」之間的關係?","opts":["標準化流程有助企業以較低的單位成本進行大規模營運,達致規模經濟效益","標準化與規模經濟效益的達成完全沒有任何關聯","規模越大的企業,越不需要依賴任何標準化的流程","標準化流程必然會提高企業的單位營運成本"],"a":0,"note":"標準化流程有助企業以較低單位成本大規模營運,達致規模經濟效益。"},{"q":"為何部分旅客即使明知連鎖品牌提供標準化服務,仍然選擇光顧?","opts":["標準化服務帶來可預期的品質保證,減低旅途中的不確定性","標準化服務的質素必然遠低於非連鎖品牌","旅客選擇連鎖品牌純粹是因為缺乏其他選擇","標準化服務與旅途中的不確定性管理完全無關"],"a":0,"note":"標準化服務帶來可預期的品質保證,有助減低旅途中的不確定性,吸引部分旅客。"},{"q":"若一個旅遊目的地的所有酒店餐廳及紀念品店均與其他城市幾乎完全相同,可能對其長遠聲譽有何影響?","opts":["難以在眾多同質化的旅遊目的地中脫穎而出,削弱長遠的競爭力及吸引力","必然大幅提升該目的地在旅客心目中的獨特地位","與該目的地的長遠競爭力及吸引力完全無關","同質化程度越高,該目的地的旅遊吸引力必然越強"],"a":0,"note":"與其他城市過度相似,難以在眾多同質化目的地中突圍,削弱長遠競爭力及吸引力。"},{"q":"為何教材認為旅遊業界在「標準化」與「個人化」之間需要取捨,而非只能二選一?","opts":["業界可透過核心流程標準化配合部分環節個人化,在效率與獨特體驗之間取得平衡","業界必須完全捨棄標準化才能提供任何個人化服務","業界必須完全捨棄個人化才能維持任何標準化流程","標準化與個人化在同一服務中永遠無法並存"],"a":0,"note":"業界可透過核心流程標準化配合部分環節個人化,在效率與獨特體驗間取得平衡。"},{"q":"以下何者最能總結「同質化」對全球旅遊業帶來的長遠影響?","opts":["提升行業整體效率及降低價格的同時,也帶來旅遊目的地及文化趨於相似的隱憂","同質化純粹帶來正面影響,沒有任何隱憂需要關注","同質化純粹帶來負面影響,對行業效率沒有任何提升作用","同質化與旅遊目的地的文化特色完全沒有任何關聯"],"a":0,"note":"同質化提升行業效率及降低價格,但同時帶來目的地文化趨於相似的隱憂。"}]},{"n":9,"title":"本土文化商品化與矮化","tag":"CULTURE COMMODIFICATION","qs":[{"q":"教材指出任何產品要成功,必須符合甚麼條件?","opts":["迎合顧客口味,同時成本越低越好","純粹依賴政府補貼","純粹依賴傳統聲譽而不需創新","與顧客口味完全無關"],"a":0,"note":"任何產品要成功,必須迎合顧客口味,同時成本越低越好。"},{"q":"產品迎合顧客口味及降低成本,最終目的是?","opts":["賺取最大利潤","純粹提升企業聲譽","純粹增加員工人數","與企業盈利完全無關"],"a":0,"note":"迎合口味及降低成本的最終目的是賺取最大利潤。"},{"q":"具文化價值的本地產品和服務,其價值常在於甚麼?","opts":["長年的發展與投入不少精力時間的精心製作","純粹在於低廉的售價","純粹在於容易大量複製","與時間精力的投入完全無關"],"a":0,"note":"本地文化產品的價值常在於長年發展及精心製作所投入的心力。"},{"q":"為何具文化價值的本地產品「在商業上並不可行」?","opts":["精心製作需要長年發展及大量精力時間投入,難以做到成本低廉","因為這些產品完全沒有市場需求","因為政府法例禁止銷售這些產品","因為這些產品的製作成本必然極低"],"a":0,"note":"精心製作需長年心力投入,與追求低成本的商業原則有矛盾,故商業上不可行。"},{"q":"在旅遊發展下,商人為何多把本土文化進行商品化?","opts":["因為精心製作的傳統方式在商業上不可行,商品化能更符合成本效益及迎合顧客口味","因為政府強制要求商人進行商品化","因為商品化能完整保留文化的原有價值","因為商品化與顧客口味完全無關"],"a":0,"note":"由於傳統精心製作方式商業上不可行,商人轉而將文化商品化以符合商業原則。"},{"q":"「本土文化商品化」是指甚麼?","opts":["把具文化價值的本地產品和服務,轉化為符合商業原則(低成本、迎合口味)的商品","純粹指政府資助文化保育項目","純粹指博物館的文物典藏工作","與商業考慮完全無關的文化保存行為"],"a":0,"note":"商品化指把文化產品服務轉化為符合商業原則的商品。"},{"q":"教材指出本土文化是否藉旅遊發展而得以保留?","opts":["並未藉旅遊發展而得以保留","完全藉旅遊發展而得以完整保留","只有小部分文化未能保留,大部分保存良好","與旅遊發展的關係完全正面"],"a":0,"note":"教材明確指出本土文化並未藉旅遊發展而得以保留。"},{"q":"教材指出旅遊發展對本土文化可能帶來甚麼更嚴重的後果?","opts":["令原來的文化受到衝擊,變異以至沒落","令原來的文化得到更完整的保存","與本土文化的存續完全無關","令文化的傳承變得更加穩固"],"a":0,"note":"更嚴重的後果是原來文化受到衝擊,甚至變異沒落。"},{"q":"「矮化」在本課題中大致是指?","opts":["本土文化在商品化過程中被簡化或扭曲,失去原有的深度與價值","純粹指本土文化的知名度大幅提升","純粹指本土文化獲得國際認可","與文化的深度及價值完全無關"],"a":0,"note":"矮化指文化在商品化過程中被簡化扭曲,失去原有深度價值。"},{"q":"為何「商品化」與「文化矮化」往往同時出現?","opts":["為迎合遊客口味及降低成本,文化內涵可能被簡化,削弱其原有深度","商品化必然能完整保留文化的所有內涵","矮化與商品化是兩個完全無關的獨立現象","商品化必然提升文化的原有價值"],"a":0,"note":"為迎合遊客口味及降低成本,文化內涵可能被簡化,導致矮化。"},{"q":"以下何者最能體現「本土文化商品化」的例子?","opts":["把需要長年學習的傳統技藝,簡化為遊客可即場體驗的短時間活動","博物館詳盡記錄及展示傳統技藝的歷史發展","學者深入研究並出版傳統技藝的學術著作","政府立法保護傳統技藝的傳承人"],"a":0,"note":"簡化傳統技藝為短時間體驗活動,是商品化以迎合遊客的例子。"},{"q":"以下何者最能體現「文化矮化」的例子?","opts":["原本具深厚宗教意義的傳統儀式,被簡化為純粹娛樂遊客的表演","傳統儀式維持原有的宗教意義及莊重程度","傳統儀式因旅遊發展而獲得更多資源保育","傳統儀式的傳承人數因旅遊發展而大幅增加"],"a":0,"note":"具深厚意義的儀式被簡化為純娛樂表演,是文化矮化的例子。"},{"q":"為何教材強調文化產品的價值「常在於長年發展與精心製作」?","opts":["這說明文化產品的價值難以在短時間內以低成本複製,與商業原則存在張力","這說明文化產品必然可以低成本快速複製","這說明文化產品的價值與製作時間完全無關","這說明文化產品不具備任何商業價值"],"a":0,"note":"強調長年發展精心製作,說明文化價值難以低成本快速複製,與商業原則有張力。"},{"q":"若一項傳統手工藝需要學徒十年才能掌握,但為配合遊客體驗被簡化為一小時工作坊,這反映甚麼現象?","opts":["本土文化商品化及矮化","文化獨特性目標的成功實踐","地區性繁榮目標的達成","與商品化矮化現象完全無關"],"a":0,"note":"簡化需長年學習的技藝為短時間體驗,正是商品化與矮化的體現。"},{"q":"為何「迎合顧客口味」的商業原則,可能與文化保存的原意產生衝突?","opts":["顧客口味未必與文化的原有深度及真實性一致,迎合口味可能犧牲文化的原貌","顧客口味必然與文化的原貌完全一致","迎合顧客口味與文化保存完全沒有任何衝突","文化的原貌不會受到商業考慮的任何影響"],"a":0,"note":"顧客口味未必與文化原貌一致,迎合口味可能犧牲文化的真實性。"},{"q":"以下何者最能說明「成本越低越好」的商業原則對本土文化的潛在威脅?","opts":["為降低成本,商人可能簡化製作工序或縮短表演時間,削弱文化內涵的完整呈現","降低成本必然有助更完整地呈現文化內涵","成本考慮與文化內涵的呈現完全無關","降低成本不會對文化的呈現方式造成任何影響"],"a":0,"note":"為降低成本可能簡化工序或縮短時間,削弱文化內涵的完整呈現。"},{"q":"「本土文化商品化與矮化」這個課題與可持續發展旅遊業中哪個目標最直接相關?","opts":["文化獨特性(尊重與促進東道國社群的歷史傳統本土文化)","資源效益","地區性繁榮","顧員質素"], 有製作方式,體現犧牲部分商業效益以換取文化真實性。"},{"q":"以下何者最能總結商人選擇將本土文化商品化的根本原因?","opts":["商品化能更配合成本效益及市場口味的商業考慮,以賺取最大利潤","商品化純粹是為了更完整地保存文化","商品化是政府法例的強制要求","商品化與追求利潤的商業考慮完全無關"],"a":0,"note":"商品化能更配合成本效益及市場口味,以達到商業原則要求的最大利潤。"},{"q":"若一個地方的傳統習俗因旅遊發展而被過度簡化包裝,以致原有的社會或宗教功能逐漸消失,這是否符合教材所描述的風險?","opts":["符合,這正是教材所指文化受衝擊變異以至沒落的情況","不符合,教材認為旅遊發展必然有助保存所有傳統習俗","不符合,教材沒有提及任何關於習俗簡化的風險","與教材描述的風險完全無關"],"a":0,"note":"這正是教材所指文化受衝擊變異以至沒落的具體情況。"},{"q":"為何本課題提醒旅遊從業員,不應單純以「遊客是否滿意」作為評估文化推廣成效的唯一標準?","opts":["過度迎合遊客滿意度,可能導致文化被過度簡化甚至扭曲其原有意義","遊客滿意度是評估文化推廣成效的唯一合理標準","文化推廣的成效與遊客滿意度完全無關","遊客的滿意程度必然與文化的真實呈現完全一致"],"a":0,"note":"過度迎合遊客滿意度可能導致文化被過度簡化甚至扭曲,故不應以此為唯一標準。"},{"q":"以下何者最能總結「本土文化商品化與矮化」對旅遊業可持續發展的啟示?","opts":["業界須在追求商業利益的同時,兼顧文化保育的責任,避免因短視利益犧牲長遠的文化資產","業界應完全捨棄商業考慮以保護文化","業界應完全捨棄文化保育以追求商業利益","商業利益與文化保育之間不存在任何需要平衡的關係"],"a":0,"note":"業界須在商業利益與文化保育之間取得平衡,避免因短視利益犧牲長遠文化資產。"},{"q":"為何本土文化的「精心製作」過程難以被簡化為標準化工序?","opts":["技藝的掌握及呈現依賴匠人長年累積的經驗,難以複製為統一流程","精心製作的技藝其實十分容易在短時間內被他人完全複製","標準化工序必然能完整保留技藝的所有細節","精心製作與標準化工序在本質上完全相同"],"a":0,"note":"技藝依賴長年累積的經驗,難以複製為可標準化的統一流程。"},{"q":"若一個地方將傳統祭祀儀式改編成適合遊客拍照打卡的表演,並省略其宗教意義,這反映甚麼?","opts":["文化商品化與矮化","文化獨特性目標的成功實踐","地區管理目標的達成","與文化商品化矮化現象完全無關"],"a":0,"note":"將具宗教意義的儀式改編為純拍照表演並省略原意,正是商品化矮化的體現。"},{"q":"教材以「精心製作」與「商業原則」的對立來解釋商品化的出現,這說明甚麼?","opts":["現實中商業考量往往凌駕於文化保存的原意之上","商業考量與文化保存的原意永遠完全一致","精心製作必然比商品化更具商業價值","商業原則與文化保存之間不存在任何張力"],"a":0,"note":"這說明現實中商業考量往往凌駕於文化保存的原意之上。"},{"q":"若企業以「入場費」形式向遊客收費觀看簡化版的傳統表演,這是否符合教材描述的商品化現象?","opts":["是,將文化轉化為收費商品正是商品化的體現","不是,收費與商品化現象完全無關","不是,教材認為只有免費活動才算商品化","與商品化的定義完全無關"],"a":0,"note":"將文化轉化為可收費的商品,正是商品化的具體體現。"},{"q":"為何本土文化一旦「變異」,便難以完全恢復原貌?","opts":["文化的傳承依賴世代口耳相傳及技藝訓練,一旦斷層便難以還原","文化的原貌可以隨時輕易透過文獻記錄完全還原","變異後的文化其實與原有文化完全相同","文化的傳承與世代技藝訓練完全無關"],"a":0,"note":"文化傳承依賴世代口耳相傳及技藝訓練,一旦斷層便難以完全還原。"},{"q":"以下何者最能說明教材將「商品化」與「矮化」相提並論的原因?","opts":["商品化的過程往往伴隨文化內涵的簡化,兩者常同時發生","商品化與矮化是兩個完全獨立且互不相關的現象","商品化必然能夠強化文化的原有內涵","矮化只會在完全沒有商品化的情況下發生"],"a":0,"note":"商品化過程往往伴隨文化內涵的簡化,故兩者常同時發生。"},{"q":"若一名學者撰文批評某旅遊景點的傳統文化表演「已完全失去原意,淪為純粹娛樂」,這符合教材哪個概念?","opts":["矮化","地區性繁榮","資源效益","文化獨特性目標的達成"],"a":0,"note":"表演失去原意淪為純粹娛樂,正正符合矮化的概念。"},{"q":"為何旅遊業界有時明知商品化會令文化矮化,仍然選擇這樣做?","opts":["因為商品化更符合商業原則,能以較低成本迎合大部分遊客的口味及時間限制","因為業界完全不知道商品化會帶來任何風險","因為法例強制要求業界必須將文化商品化","因為矮化對業界完全沒有任何商業誘因"],"a":0,"note":"商品化更符合商業原則,能以較低成本及較短時間迎合大部分遊客需要。"},{"q":"教材強調文化產品的價值源自「長年發展」,這對旅遊業界規劃行程有何啟示?","opts":["業界應理解速食式呈現文化未必能反映其真正價值,規劃時應考慮如何兼顧效率與深度","業界應完全忽略文化的深度,只追求最快的呈現方式","文化產品的價值與呈現方式的長短完全無關","業界應停止設計任何涉及本土文化的行程"],"a":0,"note":"業界應理解速食呈現未必反映文化真正價值,規劃時須兼顧效率與深度。"},{"q":"若某地為推廣旅遊,將原本需要數天才能完成的傳統工藝縮短為十分鐘示範,而遊客普遍認為「體驗過了」,這反映甚麼現象背後的矛盾?","opts":["遊客的滿足感未必代表文化得到真實呈現,反映商品化下體驗與文化真實性的落差","遊客的滿足感必然完全等同於文化得到真實呈現","十分鐘示範必然比數天工藝更能呈現文化的完整內涵","與文化商品化矮化的議題完全無關"],"a":0,"note":"遊客滿足感未必代表文化得到真實呈現,反映商品化下體驗與真實性的落差。"},{"q":"以下何者最能總結教材對「商品化」抱持的態度?","opts":["教材傾向以審慎甚至偏向負面的角度看待商品化對文化帶來的風險","教材認為商品化對文化只有正面影響,沒有任何風險","教材對商品化的態度完全中立,沒有任何取態","教材完全沒有討論商品化可能帶來的風險"],"a":0,"note":"教材傾向以審慎甚至偏向負面的角度看待商品化對文化帶來的風險。"},{"q":"為何有意見認為,適度的商品化在一定程度上仍有助部分傳統文化得以延續?","opts":["若完全沒有商業誘因,部分傳統技藝可能因缺乏經濟支持而更快失傳","商品化必然完全沒有任何正面作用","傳統技藝的延續與經濟支持完全無關","適度商品化必然導致文化即時完全消失"],"a":0,"note":"若完全沒有商業誘因,部分傳統技藝可能因缺乏經濟支持而更快失傳。"},{"q":"為何教材沒有完全否定商品化的存在,而是著重提醒其「矮化」風險?","opts":["商品化是旅遊發展下難以完全避免的現象,教材重點在提醒業界注意隨之而來的文化風險","教材認為商品化應該被完全禁止","教材認為商品化對文化保育沒有任何風險需要注意","商品化與旅遊業的發展完全沒有任何關聯"],"a":0,"note":"商品化是旅遊發展下難以避免的現象,教材重點在提醒業界注意相關風險。"},{"q":"若一個地方的傳統市集因應遊客需要而改為全年天天舉行(而非原有的特定節慶日子),這可能反映甚麼?","opts":["為配合遊客需要而改變文化活動原有的時間脈絡,屬商品化的一種表現","市集的傳統意義因而得到更完整的保留","與文化商品化的議題完全無關","這反映了地區福祉目標的成功實踐"],"a":0,"note":"為配合遊客需要而改變文化活動原有的時間脈絡,屬商品化的一種表現。"},{"q":"為何「原真性」(即文化的真實面貌)在本課題中是一個重要的隱含概念?","opts":["商品化矮化的核心風險正是令文化失去其原有的真實面貌","原真性與本課題討論的商品化矮化現象完全無關","文化的真實面貌不會受到商品化過程的任何影響","原真性純粹是一個與旅遊業毫無關聯的學術概念"],"a":0,"note":"商品化矮化的核心風險正是令文化失去其原有的真實面貌(原真性)。"},{"q":"若企業聘請專業人員研究,確保文化表演在簡化過程中仍保留核心元素及意義,這反映甚麼取態?","opts":["嘗試在商業考慮與文化真實性之間取得平衡的取態","完全忽略商業考慮,只著重文化保育的取態","完全忽略文化真實性,只著重商業利益的取態","與文化商品化矮化議題完全無關的取態"],"a":0,"note":"這反映企業嘗試在商業考慮與文化真實性之間取得平衡。"},{"q":"為何教材將此課題放在旅遊業趨勢議題之中討論,而非純粹視為文化研究課題?","opts":["因為文化商品化與矮化是旅遊業發展過程中實際出現的現象,與業界的營運決策直接相關","因為此課題與旅遊業的實際營運完全無關","因為文化研究課題必然比旅遊業趨勢議題更加重要","此課題純粹是學術理論,沒有任何實務意義"],"a":0,"note":"文化商品化矮化是旅遊業發展中實際出現的現象,與業界營運決策直接相關。"},{"q":"以下何者最能說明本課題對於旅遊產品設計者的實務意義?","opts":["提醒設計者在追求商業效益時,須同時評估對本土文化可能造成的長遠影響","設計者只需追求最大商業效益,不需考慮任何文化影響","本課題與旅遊產品設計者的實務工作完全無關","文化保育的責任應完全交由政府部門負責,與產品設計者無關"],"a":0,"note":"提醒設計者在追求商業效益時,須同時評估對本土文化的長遠影響。"},{"q":"綜合而言,「本土文化商品化與矮化」這課題最終希望帶出的價值觀是甚麼?","opts":["旅遊業的發展不應以犧牲本土文化的真實性及完整性作為代價","旅遊業的發展應完全以犧牲本土文化作為換取經濟利益的代價","文化的真實性與旅遊業的發展完全沒有任何關聯","商業利益永遠應該凌駕於文化保育的考慮之上"],"a":0,"note":"課題最終希望帶出的價值觀是旅遊業發展不應以犧牲文化真實性完整性為代價。"}]},{"n":10,"title":"公平貿易","tag":"FAIR TRADE","qs":[{"q":"旅遊業「公平貿易」的目標是?","opts":["為本地持份者藉旅遊業帶來最大的利益,讓本土社群有參與旅遊業發展的權利","純粹為投資者帶來最大的利潤","純粹為政府帶來最大的稅收","與本地社群的參與權利無關"],"a":0,"note":"公平貿易目標是為本地持份者帶來最大利益,讓本土社群有參與權利。"},{"q":"公平貿易的主要準則共有幾項?","opts":["五項","三項","四項","六項"],"a":0,"note":"教材列出公平貿易的五項主要準則。"},{"q":"公平貿易準則一「投資者與本地社群的公平夥伴合作關係」,具體要求包括?","opts":["充分諮詢本地社群、僱用本地人士","完全不諮詢本地社群的意見","只僱用外地人士而非本地人士","與本地社群的參與完全無關"],"a":0,"note":"此準則要求充分諮詢本地社群並僱用本地人士。"},{"q":"公平貿易準則一也要求企業做到甚麼?","opts":["訓練和培養本地人士出任管理職務","只讓外地人出任管理職務","禁止本地人士參與任何管理工作","與管理職務的培訓無關"],"a":0,"note":"此準則要求訓練培養本地人士出任管理職務。"},{"q":"公平貿易準則一還要求引用甚麼標準?","opts":["本地及旅客來源地的健康安全標準和環境保護措施","只引用本地的健康安全標準而忽略旅客來源地標準","完全不需引用任何健康安全標準","只需引用旅客來源地標準而忽略本地標準"],"a":0,"note":"此準則要求引用本地及旅客來源地的健康安全標準和環境保護措施。"},{"q":"公平貿易準則一也強調要防止甚麼?","opts":["貪污","本地人士參與管理","本地社群的諮詢工作","健康安全標準的引用"],"a":0,"note":"公平貿易準則一強調防止貪污。"},{"q":"公平貿易準則二「本地持份者的公平利益分配」包括哪兩方面?","opts":["減少流失和尊重當地的文化資產","增加流失和忽視文化資產","只涉及減少流失,不涉及文化資產","只涉及尊重文化資產,不涉及利益分配"],"a":0,"note":"準則二包括減少流失和尊重當地文化資產兩方面。"},{"q":"「減少流失」的例子包括?","opts":["以公平價格向本地供應商採購、使用本地產品和原料","以最低價格向外地供應商採購","完全不使用本地產品和原料","忽略旅遊收益的公平分配"],"a":0,"note":"減少流失例子包括以公平價格向本地供應商採購及使用本地產品原料。"},{"q":"「減少流失」的例子也包括?","opts":["公平分配旅遊收益,讓旅客知道如何能令本地居民受益","只讓投資者獨享旅遊收益","隱瞞旅遊收益的分配情況","禁止旅客了解本地居民的受益情況"],"a":0,"note":"減少流失例子也包括公平分配旅遊收益及讓旅客知道如何令本地居民受益。"},{"q":"「尊重文化資產」的例子包括?","opts":["諮詢原居民的意見,避免旅遊發展影響原居民","完全不諮詢原居民的意見","忽略旅遊發展對原居民的影響","只諮詢外來投資者的意見"],"a":0,"note":"尊重文化資產例子包括諮詢原居民意見及避免影響原居民。"},{"q":"公平貿易準則三「旅客與本地居民的公平貿易」,具體要求是?","opts":["使用公平的市場價格","容許商戶對旅客收取遠高於市價的費用","容許商戶對本地居民收取特別高價","與市場價格的公平性無關"],"a":0,"note":"準則三要求旅客與本地居民之間使用公平的市場價格。"},{"q":"公平貿易準則四「合理而可延續情況下使用自然資源」,具體要求包括?","opts":["投資及研發環境保護、執行有助優化本地環境的措施","完全不投資任何環境保護項目","忽略本地環境的優化工作","只顧開發資源而不理會環境保護"],"a":0,"note":"準則四要求投資研發環境保護,並執行優化本地環境的措施。"},{"q":"公平貿易準則四也要求企業做到甚麼?","opts":["諮詢本地社群意見","完全不諮詢本地社群意見","只諮詢投資者的意見","與本地社群的參與完全無關"],"a":0,"note":"準則四也要求在使用自然資源時諮詢本地社群意見。"},{"q":"公平貿易準則五「合理薪酬與工作環境」,具體要求是?","opts":["參考國際標準擬定有關待遇和工作環境等","純粹參考本地最低工資標準而不考慮國際標準","完全不設任何薪酬及工作環境標準","只需符合投資者的個人要求"],"a":0,"note":"準則五要求參考國際標準擬定待遇和工作環境。"},{"q":"以下何者屬於公平貿易準則一「公平夥伴合作關係」的具體例子?","opts":["旅遊企業聘用本地居民並提供管理培訓機會","旅遊企業完全聘用外地管理人員","旅遊企業拒絕諮詢本地社群意見","旅遊企業向本地供應商壓價採購"],"a":0,"note":"聘用本地居民並提供管理培訓,是公平夥伴合作關係的具體例子。"},{"q":"以下何者屬於公平貿易準則二「減少流失」的具體例子?","opts":["旅遊企業優先向本地供應商採購食材及用品","旅遊企業完全依賴進口食材及用品","旅遊企業向本地供應商壓低採購價格","旅遊企業隱瞞收益分配情況"],"a":0,"note":"優先向本地供應商採購,是減少流失的具體例子。"},{"q":"以下何者屬於公平貿易準則二「尊重文化資產」的具體例子?","opts":["旅遊發展前先諮詢原居民意見並評估對其生活的影響","旅遊發展前完全不諮詢任何原居民","忽略旅遊發展對原居民生活的影響","只諮詢外來投資者對發展的意見"],"a":0,"note":"發展前諮詢原居民意見並評估影響,是尊重文化資產的具體例子。"},{"q":"以下何者屬於公平貿易準則三「旅客與本地居民公平貿易」的具體例子?","opts":["商戶對旅客及本地居民收取相同的市場價格","商戶對旅客收取遠高於本地居民的價格","商戶對本地居民收取遠高於旅客的價格","商戶完全不理會定價的公平性"],"a":0,"note":"對旅客及本地居民收取相同市場價格,體現公平貿易準則三。"},{"q":"以下何者屬於公平貿易準則四「合理使用自然資源」的具體例子?","opts":["旅遊企業投資研發減少耗水耗能的技術","旅遊企業完全不投資任何環保技術","旅遊企業無限制地開發自然資源","旅遊企業忽略本地社群對資源使用的意見"],"a":0,"note":"投資研發減少耗水耗能的技術,是合理使用自然資源的具體例子。"},{"q":"以下何者屬於公平貿易準則五「合理薪酬與工作環境」的具體例子?","opts":["企業參考國際勞工標準,為員工提供合理的工時及待遇","企業只提供遠低於當地最低工資的薪酬","企業完全不理會員工的工作環境","企業只按個人喜好決定員工待遇而不參考任何標準"],"a":0,"note":"參考國際勞工標準提供合理工時待遇,是合理薪酬工作環境的具體例子。"},{"q":"為何公平貿易準則一要求「訓練和培養本地人士出任管理職務」?","opts":["讓本地社群能真正參與並掌握旅遊業發展的話語權,而非純粹提供基層勞動力","純粹為減少企業的培訓成本","與本地社群的參與程度無關","應該完全排除本地人士出任管理職務"],"a":0,"note":"訓練本地人士出任管理職務,讓其能真正參與並掌握發展話語權。"},{"q":"為何公平貿易準則要求「防止貪污」?","opts":["貪污會扭曲資源分配,令本地社群未能公平地從旅遊業發展中受益","防止貪污與本地社群的利益分配完全無關","貪污有助本地社群更公平地受益","防止貪污純粹是政府部門的責任,與旅遊企業無關"],"a":0,"note":"防止貪污能避免資源分配被扭曲,確保本地社群公平受益。"},{"q":"為何「以公平價格向本地供應商採購」有助「減少流失」?","opts":["公平價格採購能確保更多旅遊收益留在本地經濟體系內,而非流向外地","公平價格採購必然令收益完全流向外地","以公平價格採購與經濟流失完全無關","流失問題只能透過減少採購本地產品來解決"],"a":0,"note":"公平價格採購能確保更多旅遊收益留在本地經濟體系內,減少外流。"},{"q":"為何公平貿易特別強調「讓旅客知道如何能令本地居民受益」?","opts":["提高旅客的意識,鼓勵其選擇能讓本地居民真正受惠的消費方式","旅客的消費選擇與本地居民的利益完全無關","旅客不需要了解本地居民的受益情況","應完全隱瞞本地居民受益的相關資訊"],"a":0,"note":"提高旅客意識,鼓勵其選擇能讓本地居民真正受惠的消費方式。"},{"q":"為何「尊重文化資產」要求企業「諮詢原居民的意見」?","opts":["原居民最了解自身文化資產的價值及需要保護的部分,諮詢有助避免不當發展","原居民的意見與文化資產的保護完全無關","企業應完全依賴外來專家的意見而非原居民","諮詢原居民純粹是形式主義,沒有實際作用"],"a":0,"note":"原居民最了解自身文化資產的價值,諮詢有助避免不當發展。"},{"q":"為何公平貿易準則三要求「使用公平的市場價格」而非對旅客另設高價?","opts":["對旅客另設不合理高價可能損害其消費體驗及對目的地的觀感,也違反公平貿易原則","對旅客收取更高價格必然對本地經濟更有利而沒有任何負面影響","公平市場價格與旅客的消費體驗完全無關","應鼓勵商戶盡量向旅客收取最高的價格"],"a":0,"note":"對旅客不合理收費會損害其消費體驗及觀感,也違反公平貿易原則。"},{"q":"為何公平貿易準則四強調「合理而可延續」使用自然資源,而非完全禁止使用資源?","opts":["旅遊業無可避免需要使用自然資源,重點在於確保使用方式合理且具持續性,而非完全禁止","應完全禁止旅遊業使用任何形式的自然資源","合理使用與完全禁止使用在本質上完全相同","資源使用的合理性與可持續發展的目標完全無關"],"a":0,"note":"旅遊業無可避免需使用資源,重點在確保使用方式合理且具持續性。"},{"q":"為何公平貿易準則五要求「參考國際標準」而非純粹依賴本地慣例?","opts":["國際標準有助確保員工待遇及工作環境符合基本的合理水平,避免因本地慣例而被壓低","本地慣例必然優於任何國際標準","參考國際標準與員工的合理待遇完全無關","國際標準純粹是形式要求,沒有實際約束力"],"a":0,"note":"國際標準有助確保員工待遇工作環境符合合理水平,避免被本地慣例壓低。"},{"q":"若一間國際酒店集團在發展中國家開設分店,並主要聘用外地高層管理人員,長期不培訓本地人才擔任管理職位,這違反了公平貿易的哪項準則?","opts":["投資者與本地社群的公平夥伴合作關係","旅客與本地居民的公平貿易","合理而可延續情況下使用自然資源","合理薪酬與工作環境"],"a":0,"note":"長期不培訓本地人才擔任管理職位,違反公平夥伴合作關係的準則。"},{"q":"若一間旅遊企業將大部分利潤匯出海外,只採購外地入口的食材及用品,較少支持本地供應商,這較貼近違反公平貿易的哪項準則?","opts":["本地持份者的公平利益分配(減少流失)","投資者與本地社群的公平夥伴合作關係","旅客與本地居民的公平貿易","合理薪酬與工作環境"],"a":0,"note":"利潤匯出海外及較少支持本地供應商,違反減少流失的準則。"},{"q":"若一間旅行社在推廣行程時,對外地遊客收取的紀念品價格遠高於當地居民購買的價格,這違反了公平貿易的哪項準則?","opts":["旅客與本地居民的公平貿易","投資者與本地社群的公平夥伴合作關係","合理而可延續情況下使用自然資源","合理薪酬與工作環境"],"a":0,"note":"對旅客收取遠高於本地居民的價格,違反旅客與本地居民公平貿易的準則。"},{"q":"若一間度假村無限制地抽取地下水以供應酒店設施,未有評估對當地水資源的長遠影響,這違反了公平貿易的哪項準則?","opts":["合理而可延續情況下使用自然資源","投資者與本地社群的公平夥伴合作關係","旅客與本地居民的公平貿易","合理薪酬與工作環境"],"a":0,"note":"無限制抽取地下水未評估長遠影響,違反合理可延續使用自然資源的準則。"},{"q":"若一間旅遊企業聘用本地員工,但薪酬遠低於國際勞工標準且工時過長,這違反了公平貿易的哪項準則?","opts":["合理薪酬與工作環境","投資者與本地社群的公平夥伴合作關係","本地持份者的公平利益分配","旅客與本地居民的公平貿易"],"a":0,"note":"薪酬過低工時過長,違反合理薪酬與工作環境的準則。"},{"q":"若一個 的重新理解?","opts":["旅遊業發展應被視為投資者、本地社群及旅客三方共同參與並共同受益的過程,而非單方面的商業行為","旅遊業發展純粹是投資者單方面追求利潤的商業行為","本地社群在旅遊業發展中純粹是被動的旁觀者","旅客在旅遊業發展中純粹是消費者,與其他持份者的利益完全無關"],"a":0,"note":"公平貿易理念視旅遊業發展為投資者本地社群及旅客三方共同參與並受益的過程。"},{"q":"公平貿易準則一提到要引用「本地及旅客來源地」的健康安全標準,為何要同時考慮兩地標準?","opts":["確保服務同時符合本地實際情況及旅客慣常期望的安全水平,避免因標準參差引起爭議或風險","只需考慮本地標準,旅客來源地的標準完全不重要","只需考慮旅客來源地標準,本地標準完全不重要","兩地標準必然完全相同,不需要特別考慮"],"a":0,"note":"同時考慮兩地標準,確保服務符合本地實況及旅客期望,避免標準參差引起風險。"},{"q":"若一間旅遊企業只採用旅客來源地的健康安全標準,而完全忽略本地標準,可能有何問題?","opts":["忽略本地的實際情況及需要,未能真正體現本地與旅客兩地標準並重的原則","這是完全符合公平貿易準則的最佳做法","本地標準永遠不需要被納入考慮","與公平貿易的準則完全無關"],"a":0,"note":"忽略本地實際情況,未能體現本地與旅客兩地標準並重的公平貿易原則。"},{"q":"為何「防止貪污」被視為公平貿易夥伴合作關係中的重要一環?","opts":["貪污會扭曲資源分配及決策過程,直接損害本地社群應得的公平利益","防止貪污純粹是法律上的形式要求,與公平貿易理念無關","貪污有助本地社群更公平地分享旅遊業利益","防止貪污與資源分配的公平性完全無關"],"a":0,"note":"貪污會扭曲資源分配決策,直接損害本地社群應得的公平利益,故與公平貿易理念直接相關。"},{"q":"一個旅遊項目的開發商在動工前主動邀請原居民代表加入項目諮詢委員會,並定期匯報進度,這體現公平貿易的甚麼精神?","opts":["充分諮詢本地社群,讓其真正參與旅遊業發展的決策過程","純粹的合理薪酬與工作環境的體現","純粹的旅客與本地居民公平貿易的體現","與公平貿易的任何準則完全無關"],"a":0,"note":"邀請原居民參與諮詢委員會,體現充分諮詢本地社群讓其參與決策的精神。"},{"q":"為何「合理而可延續情況下使用自然資源」的準則特別強調「合理」二字?","opts":["旅遊業無可避免需一定程度使用資源,重點在於使用方式是否合乎比例且具持續性,而非完全禁絕","應完全禁止旅遊業使用任何形式的自然資源","合理使用與完全禁止使用在本質上完全相同","強調合理二字純粹是修辭上的考慮,沒有實質意義"],"a":0,"note":"重點在於使用方式是否合乎比例且具持續性,而非完全禁絕資源使用。"},{"q":"若一間旅遊企業聲稱重視公平貿易,卻只在宣傳層面強調相關理念而未落實具體措施(如本地採購培訓等),這反映甚麼問題?","opts":["企業可能只是將公平貿易作為市場推廣的口號,而非真正落實五項準則的具體行動","這代表企業已完全落實公平貿易的所有準則","宣傳層面的強調必然等同於具體措施的落實","與企業是否真正實踐公平貿易完全無關"],"a":0,"note":"只強調宣傳而未落實具體措施,反映企業可能只將公平貿易作為推廣口號。"},{"q":"公平貿易與可持續發展旅遊業的「顧員質素」目標(見另一課題)之間有何關聯?","opts":["兩者均關注旅遊業從業員的合理待遇及發展機會,理念高度重疊","兩者的關注重點完全不同,沒有任何重疊之處","顧員質素目標與從業員的待遇完全無關","公平貿易與從業員的待遇及發展機會完全無關"],"a":0,"note":"兩者均關注從業員的合理待遇及發展機會,理念高度重疊。"},{"q":"為何評估一間旅遊企業是否符合公平貿易原則,不能只看其單一項目或措施,而應綜合檢視五項準則?","opts":["五項準則涵蓋夥伴關係、利益分配、旅客貿易、資源使用及員工待遇等不同層面,單一措施未能全面反映實踐情況","只需檢視其中一項準則,便能完全反映企業的整體實踐水平","五項準則之間完全獨立,不需要綜合考慮","單一措施必然能完全代表企業在所有準則上的表現"],"a":0,"note":"五項準則涵蓋不同層面,單一措施未能全面反映企業的整體公平貿易實踐。"},{"q":"若一個地區的旅遊業發展帶來可觀收入,但絕大部分利潤由外來投資者取得,本地居民僅獲得少量基層職位,這種情況最直接違反公平貿易的核心目標是?","opts":["為本地持份者藉旅遊業帶來最大的利益","合理而可延續情況下使用自然資源","旅客與本地居民的公平貿易","與公平貿易的核心目標完全無關"],"a":0,"note":"利潤主要由外來投資者取得而非本地社群,直接違反為本地持份者帶來最大利益的核心目標。"},{"q":"為何公平貿易理念特別適用於評估「社區為本旅遊」項目?","opts":["社區為本旅遊項目的核心正是讓本地社群直接參與並從中受惠,與公平貿易理念高度契合","社區為本旅遊與公平貿易理念完全沒有任何關聯","社區為本旅遊項目通常完全排除本地社群的參與","公平貿易理念只適用於大型跨國旅遊企業"],"a":0,"note":"社區為本旅遊核心是讓本地社群參與受惠,與公平貿易理念高度契合。"},{"q":"一間旅行社定期審核其合作的本地供應商是否有克扣員工薪酬的情況,這體現公平貿易的哪項準則?","opts":["合理薪酬與工作環境","投資者與本地社群的公平夥伴合作關係","旅客與本地居民的公平貿易","合理而可延續情況下使用自然資源"],"a":0,"note":"審核供應商是否克扣薪酬,體現合理薪酬與工作環境這項準則。"},{"q":"若一間旅遊企業願意接受較低的短期利潤,以換取與本地社群建立長期互信的合作關係,這反映甚麼取態?","opts":["重視長遠可持續的夥伴關係多於短期利益最大化的取態,符合公平貿易的精神","純粹追求短期利潤最大化而不理會任何長遠關係","與公平貿易的理念及精神完全無關","本地社群的信任與企業的長遠經營完全無關"],"a":0,"note":"重視長遠可持續夥伴關係多於短期利益,正符合公平貿易的精神。"},{"q":"為何「讓旅客知道如何能令本地居民受益」這項措施,同時對「企業」及「旅客」都有意義?","opts":["對企業而言有助建立負責任的品牌形象;對旅客而言則有助其作出更符合價值觀的消費選擇","此措施純粹對企業有利,對旅客完全沒有任何意義","此措施純粹對旅客有利,對企業完全沒有任何意義","此措施與企業品牌形象及旅客消費選擇完全無關"],"a":0,"note":"對企業有助建立負責任形象,對旅客則有助作出符合價值觀的消費選擇,雙方均有意義。"},{"q":"以下何者最能說明公平貿易準則與「本土文化商品化與矮化」(見另一課題)之間,在實踐上可能出現的張力?","opts":["企業若只重視短期經濟利益而忽略準則中尊重文化資產的要求,仍可能導致文化商品化矮化的風險出現","公平貿易的實踐必然完全消除文化商品化矮化的所有風險","公平貿易與文化商品化矮化的風險完全沒有任何關聯","只要企業聲稱重視公平貿易,文化矮化的風險便會自動消失"],"a":0,"note":"若企業只重視短期利益而忽略尊重文化資產的要求,仍可能出現商品化矮化的風險。"},{"q":"若政府希望透過政策推動旅遊業界更廣泛實踐公平貿易,以下何者是較合理的做法?","opts":["提供誘因(如稅務優惠或認證標籤)鼓勵企業採納具體措施,同時加強監察及公眾教育","完全依賴企業自發實踐,不設任何政策誘因或監察機制","強制所有企業立即全面停業以配合公平貿易的要求","政府不應在公平貿易的推動上扮演任何角色"],"a":0,"note":"提供誘因鼓勵企業採納措施,同時加強監察教育,是較合理的政策推動方式。"},{"q":"以下何者最能總結公平貿易理念與旅遊業「可持續發展」整體目標之間的關係?","opts":["公平貿易是實現旅遊業社會經濟可持續發展目標的其中一套具體實踐準則,兩者理念相通","公平貿易與可持續發展的整體目標完全是兩個互不相關的獨立課題","公平貿易的理念與旅遊業的可持續發展目標完全對立","可持續發展目標的達成與公平貿易的實踐完全無關"],"a":0,"note":"公平貿易是實現可持續發展社會經濟目標的具體實踐準則,兩者理念相通。"}]},{"n":11,"title":"五個世代的特點","tag":"FIVE GENERATIONS","qs":[{"q":"教材將顧客分為哪五個世代?","opts":["老一輩、嬰兒潮、X世代、Y世代、Z世代","老一輩、中年人、青年人、少年人、兒童","戰前世代、戰後世代、千禧世代、數碼世代、未來世代","嬰兒潮、X世代、Y世代、Z世代、Alpha世代"],"a":0,"note":"教材將顧客分為老一輩嬰兒潮X世代Y世代及Z世代五個世代。"},{"q":"「老一輩」大約是指多少歲以上的人士?","opts":[">80歲","60-80歲","47-59歲","30-46歲"],"a":0,"note":"老一輩指80歲以上的人士。"},{"q":"「嬰兒潮」大約是指哪個年齡層?","opts":["60-80歲",">80
