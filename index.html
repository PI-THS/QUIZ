忠誠度則較低。"},{"q":"以下哪個世代最依賴社交媒體(如Instagram、TikTok)作出旅遊決定?","opts":["Z世代","老一輩","嬰兒潮","X世代"],"a":0,"note":"Z世代極度依賴社交媒體搜尋資訊及作出旅遊決定。"},{"q":"以下哪個世代的酒類消費群體被形容為「四代人中最大」?","opts":["嬰兒潮","X世代","Y世代","Z世代"],"a":0,"note":"教材明確指出嬰兒潮是四代人中酒類消費群體最大的一代。"},{"q":"以下哪個世代最重視「打卡價值」影響其景點選擇?","opts":["Z世代","老一輩","嬰兒潮","X世代"],"a":0,"note":"Z世代特別重視景點是否適合拍照分享的打卡價值。"},{"q":"以下哪個世代最需要「即時回應」及擅長「多重任務」?","opts":["Y世代","老一輩","嬰兒潮","X世代"],"a":0,"note":"Y世代需要即時回應,並更喜歡多重任務。"},{"q":"為何了解五個世代的特點,對酒店及旅遊業的市場推廣特別重要?","opts":["不同世代的消費習慣、價值觀及媒體使用方式各異,有助業界制定針對性策略","所有世代的消費習慣完全相同,不需要作出區分","市場推廣策略與顧客的年齡層完全無關","業界只需針對單一世代制定策略即可"],"a":0,"note":"不同世代的消費習慣價值觀及媒體使用各異,有助業界制定針對性策略。"},{"q":"為何酒店業界需要為「老一輩」提供通用設計(如較矮的床及步入式淋浴間)?","opts":["這些設計能配合長者的體力限制,提升其住宿的安全及舒適程度","這些設計純粹是裝飾用途,沒有實際功能","老一輩對住宿設施完全沒有任何特別要求","通用設計只適用於年輕世代"],"a":0,"note":"通用設計能配合長者體力限制,提升住宿安全及舒適程度。"},{"q":"為何「Y世代」對品牌忠誠度低,反而重視「互聯網推廣」的成效?","opts":["Y世代願意嘗試新品牌,同時高度依賴網上資訊作消費決定,故網上推廣觸及率高","品牌忠誠度低代表Y世代完全不受任何推廣方式影響","互聯網推廣對品牌忠誠度低的顧客完全沒有作用","Y世代對任何形式的推廣都完全沒有反應"],"a":0,"note":"Y世代願意嘗試新品牌並依賴網上資訊,故互聯網推廣觸及率高。"},{"q":"以下何者最能總結五個世代在「科技運用」程度上的整體趨勢?","opts":["由老一輩到Z世代,對科技及網上工具的依賴程度大致呈上升趨勢","五個世代對科技的依賴程度完全相同","老一輩對科技的依賴程度是各世代中最高的","科技運用的依賴程度與世代年齡完全無關"],"a":0,"note":"由老一輩到Z世代,對科技及網上工具的依賴程度大致呈上升趨勢。"},{"q":"以下何者最能總結五個世代特點分析對旅遊、住宿及飲食業的實務意義?","opts":["有助業界因應不同世代的獨特需要,設計更貼合目標客群的產品及服務","五個世代的分析純粹是學術研究,對業界實務沒有幫助","業界應完全忽略世代差異,只需提供單一標準化服務","世代特點分析只適用於老一輩及嬰兒潮兩個世代"],"a":0,"note":"世代特點分析有助業界設計更貼合不同目標客群需要的產品服務。"}]},{"n":12,"title":"過度旅遊","tag":"OVERTOURISM","qs":[{"q":"「過度旅遊」的定義是?","opts":["到訪旅客太多對東道國造成困擾的一個全球性現象","純粹指旅客人數少於預期的現象","純粹指旅遊業收入下跌的現象","只發生在單一國家的個別現象"],"a":0,"note":"過度旅遊指到訪旅客太多對東道國造成困擾的全球性現象。"},{"q":"教材如何形容過度旅遊問題的地域分佈?","opts":["各地的過度旅遊情況不同,但同樣地旅客人數已超逾東道國的承載力","只發生在已發展國家","只發生在發展中國家","全球各地的情況完全一致"],"a":0,"note":"各地過度旅遊情況雖不同,但均是旅客人數超逾當地承載力。"},{"q":"面對過度旅遊問題的城市有何共通點?","opts":["旅客人數均遠超當地人口","旅客人數均遠低於當地人口","當地人口必然遠超旅客人數","與當地人口數目完全無關"],"a":0,"note":"面對過度旅遊的城市,旅客人數均遠超當地人口。"},{"q":"過度旅遊對東道國居民的影響包括?","opts":["市面秩序混亂、公共交通受阻","市面秩序必然更加井然有序","公共交通必然更加暢通","與居民的日常生活完全無關"],"a":0,"note":"過度旅遊會造成市面秩序混亂及公共交通受阻等影響。"},{"q":"過度旅遊對東道國還有甚麼影響?","opts":["資源被佔用、物價樓價上漲","資源使用效率必然提升","物價樓價必然因而下跌","與資源分配完全無關"],"a":0,"note":"過度旅遊會導致資源被佔用及物價樓價上漲。"},{"q":"過度旅遊也可能對居民生活帶來甚麼滋擾?","opts":["生活受阻,小販攤檔滋擾","居民生活必然更加便利","小販攤檔的經營必然完全消失","與居民日常生活的滋擾完全無關"],"a":0,"note":"過度旅遊可能造成居民生活受阻及小販攤檔的滋擾問題。"},{"q":"面對過度旅遊,當局是否應該限制旅客人數是甚麼性質的決定?","opts":["兩難的決定","毫無爭議的簡單決定","與經濟考慮完全無關的決定","純粹的法律程序決定"],"a":0,"note":"教材指出應否限制旅客人數是一個兩難的決定。"},{"q":"若減少旅客人數,可能帶來甚麼問題?","opts":["經濟可能放緩,影響很多居民的生計","經濟必然因而蓬勃發展","與居民的生計完全無關","旅遊從業員的收入必然不受影響"],"a":0,"note":"減少旅客可能導致經濟放緩,影響居民生計。"},{"q":"減少旅客人數還可能影響甚麼群體?","opts":["旅遊從業員的收入及發展","純粹影響政府的稅收","純粹影響外國投資者","與從業員的生計完全無關"],"a":0,"note":"減少旅客可能影響旅遊從業員的收入及發展。"},{"q":"當局貿然減少旅客人數,可能面臨甚麼情況?","opts":["備受持份者質疑","必然獲得所有持份者一致支持","與持份者的意見完全無關","必然順利無阻地實施"],"a":0,"note":"當局貿然減少旅客會備受持份者質疑。"},{"q":"為何減少旅客不單只影響旅遊業?","opts":["旅遊業接觸行業非常廣闊,更對整個經濟社會帶來重要影響","旅遊業與其他行業完全獨立運作","減少旅客只會影響旅遊從業員個人","旅遊業對整體經濟的影響力微不足道"],"a":0,"note":"旅遊業接觸行業廣闊,減少旅客會對整個經濟社會帶來重要影響。"},{"q":"過度旅遊的成因之一是?","opts":["中產階級膨脹增加外遊需求","中產階級收縮減少外遊需求","與中產階級的規模完全無關","只有富豪階層才會外遊"],"a":0,"note":"中產階級膨脹增加外遊需求,是過度旅遊的成因之一。"},{"q":"過度旅遊的成因也包括?","opts":["旅費低廉","旅費持續高企不下","與旅遊成本完全無關","只有旅費上升才會導致過度旅遊"],"a":0,"note":"旅費低廉是過度旅遊的成因之一。"},{"q":"過度旅遊的成因也包括哪種發展?","opts":["郵輪旅遊發展、運輸網絡發展","郵輪旅遊業的完全式微","運輸網絡的萎縮","與交通運輸的發展完全無關"],"a":0,"note":"郵輪旅遊及運輸網絡的發展是過度旅遊的成因之一。"},{"q":"過度旅遊的成因還包括哪些媒體因素?","opts":["大眾傳播媒介和社交媒體興起","傳統媒體的式微","與媒體發展完全無關","只有紙媒才會影響旅遊決定"],"a":0,"note":"大眾傳播媒介和社交媒體興起是過度旅遊的成因之一。"},{"q":"過度旅遊的成因也與甚麼經濟趨勢有關?","opts":["經濟全球化發展","經濟全球化的完全逆轉","與全球經濟趨勢完全無關","只有地區性經濟才會影響旅遊"],"a":0,"note":"經濟全球化發展是過度旅遊的成因之一。"},{"q":"應對過度旅遊的策略之一是「鼓勵把旅客分流」,具體措施包括?","opts":["將活動移至旅客較少前往的地方,在非旅遊區發展旅遊景點和配套設施","將所有活動集中於單一熱門景點","減少非旅遊區的任何發展","增加熱門景點的開放時間而不理會人流分佈"],"a":0,"note":"分流策略包括把活動移至人少地方及在非旅遊區發展配套設施。"},{"q":"應對過度旅遊的策略「鼓勵旅客分流」還包括?","opts":["增加旅遊景點的承載力與開放時間","減少旅遊景點的承載力","縮短旅遊景點的開放時間","與景點的承載力完全無關"],"a":0,"note":"分流策略也包括增加景點的承載力與開放時間。"},{"q":"應對過度旅遊的策略之一是「鼓勵旅客在不同時間到訪」,具體措施包括?","opts":["強化淡季時的旅遊體驗,利用價格影響旺淡季訪客人數","只著重旺季的旅遊體驗","盡量令所有旅客集中在同一時段到訪","與價格對訪客人數的影響完全無關"],"a":0,"note":"此策略包括強化淡季體驗及利用價格影響旺淡季訪客人數。"},{"q":"「鼓勵旅客在不同時間到訪」策略還包括甚麼具體措施?","opts":["在旅遊熱點採用限時逗留並作實時監測人流","容許旅客在熱點無限時逗留","完全不監測任何人流情況","與旅客逗留時間的管理完全無關"],"a":0,"note":"此策略也包括在熱點採用限時逗留及實時監測人流。"},{"q":"如何利用科技協助旅客選擇到訪時間?","opts":["利用Apps等提供輪候時間或擠擁情況等資訊","完全依賴人手指示,不使用任何科技工具","減少向旅客提供任何資訊","與科技應用完全無關"],"a":0,"note":"可利用Apps提供輪候時間或擠擁情況,方便旅客選擇到訪時間。"},{"q":"應對過度旅遊的策略之一是「開發新行程及新景點」,具體措施包括?","opts":["利用遊客服務中心及旅遊局等推廣新行程及新景點","只推廣已飽和的熱門景點","減少對新景點的宣傳投入","與新行程景點的推廣完全無關"],"a":0,"note":"此策略包括利用遊客中心及旅遊局推廣新行程新景點。"},{"q":"「開發新行程及新景點」策略也包括甚麼具體做法?","opts":["透過各種宣傳推廣渠道介紹城中「隱世」景點","只宣傳最知名的熱門景點","完全不為小眾旅客提供任何特別路線","忽略非旅遊區的旅遊路線發展"],"a":0,"note":"此策略也包括介紹隱世景點及為小眾旅客提供非一般路線體驗。"},{"q":"應對過度旅遊的策略之一是「檢討及引入規管」,具體措施包括?","opts":["檢討旅遊景點的開放時間、檢討團體客遊覽熱點的安排","完全不檢討任何現行安排","增加熱點的擁擠情況而不作任何規管","忽略交通措施的檢討"],"a":0,"note":"此策略包括檢討開放時間及團體客遊覽熱點的安排。"},{"q":"「檢討及引入規管」策略還包括哪些具體措施?","opts":["開設行人使用專區、開設旅遊巴士上落客區","取消所有行人專區的安排","完全不規管旅遊巴士的上落客安排","與交通規管完全無關"],"a":0,"note":"此策略也包括開設行人專區及旅遊巴士上落客區。"},{"q":"「檢討及引入規管」策略也可以怎樣方便業界規管?","opts":["引入旅遊業界相關牌照及工作證等","完全取消任何牌照制度","減少對旅遊從業員身分的核實","與業界規管完全無關"],"a":0,"note":"此策略也包括引入相關牌照及工作證等,方便規管。"},{"q":"應對過度旅遊的策略之一是「利用旅客劃分幫助管理」,具體措施包括?","opts":["按影響輕重劃分不同的旅客群,針對重覆來訪的旅客群","將所有旅客一視同仁,不作任何劃分","只針對首次到訪的旅客群","完全忽略旅客群體的差異"],"a":0,"note":"此策略包括按影響輕重劃分旅客群及針對重覆來訪的旅客群。"},{"q":"「利用旅客劃分幫助管理」策略也包括甚麼做法?","opts":["不鼓勵個別旅客群來訪","鼓勵所有旅客群不分青紅皂白地來訪","完全忽略旅客群對當地的影響程度","增加所有旅客群的來訪誘因"],"a":0,"note":"此策略也包括不鼓勵個別對當地影響較大的旅客群來訪。"},{"q":"應對過度旅遊的策略之一是「確保本地社群能受惠於旅遊活動」,具體措施包括?","opts":["增加旅遊業界相關職位,向本地社群推廣發展旅遊業的正面作用","減少旅遊業界相關的職位數目","完全不向本地社群解釋旅遊業的作用","忽略本地社群對旅遊業的認識"],"a":0,"note":"此策略包括增加相關職位及向社群推廣旅遊業的正面作用。"},{"q":"「確保本地社群能受惠」策略也包括甚麼做法?","opts":["鼓勵本地社群發展旅遊產品,改善基本設施和服務","阻止本地社群參與旅遊產品的發展","只改善旅客專用的設施而忽略居民需要","與基本設施和服務的改善完全無關"],"a":0,"note":"此策略也包括鼓勵本地社群發展旅遊產品及改善基本設施服務。"},{"q":"應對過度旅遊的策略之一是「創造同時令旅客與本地人受惠的經驗」,具體措施包括?","opts":["發展促進外來旅客與本地居民交往的旅遊體驗和產品","完全隔離旅客與本地居民的接觸","只著重旅客體驗而忽略本地居民的參與","減少節慶活動與旅客的連結"],"a":0,"note":"此策略包括發展促進旅客與本地居民交往的旅遊體驗和產品。"},{"q":"「創造同時受惠的經驗」策略也包括哪些具體做法?","opts":["在本地節慶和活動安排旅客設施、成立本地親善大使","完全不為旅客提供任何節慶活動的參與機會","取消所有本地節慶活動","與親善大使的成立完全無關"],"a":0,"note":"此策略也包括在節慶活動安排旅客設施及成立本地親善大使。"},{"q":"應對過度旅遊的策略之一是「改善城市基本建設和設施」,具體措施包括?","opts":["改善市內文化基本設施,增加路牌指示牌方便途人和旅客","減少對城市基本建設的投資","完全不設任何路牌指示牌","忽略公共交通對旅客的便利程度"],"a":0,"note":"此策略包括改善文化基本設施及增加路牌指示牌。"},{"q":"「改善城市基本建設」策略也包括甚麼具體做法?","opts":["設立安全又吸引的旅客步遊徑,維護和保養舊建築及景點","完全不設任何旅客專用步遊徑","忽略舊建築及景點的維護保養","減少公共交通的便利程度"],"a":0,"note":"此策略也包括設立步遊徑及維護保養舊建築景點。"},{"q":"應對過度旅遊的策略之一是「與本地持份者多溝通及加強參與」,具體措施包括?","opts":["設立所有持份者參與的本區旅遊管理小組並定期開會","完全不設任何持份者參與的機制","減少與本地居民的調查及溝通","只讓政府部門單方面決策而不徵詢持份者"],"a":0,"note":"此策略包括設立持份者參與的管理小組並定期開會。"},{"q":"應對過度旅遊的策略之一是「與旅客多溝通」,具體措施包括?","opts":["加強旅客對本地生活習慣、傳統及價值等的認識","完全不向旅客提供任何本地資訊","忽略旅客對本地文化的認識","減少旅客與本地社群的互相了解"],"a":0,"note":"此策略包括加強旅客對本地生活習慣傳統及價值的認識。"},{"q":"應對過度旅遊的策略之一是「制定監控及應對措施」,具體措施包括?","opts":["監測重要指標,利用大數據及資訊科技評估旅遊業表現及影響","完全不監測任何相關指標","忽略科技工具在旅遊業管理上的應用","只依賴主觀判斷而不用任何數據"],"a":0,"note":"此策略包括監測重要指標及利用大數據資訊科技評估表現影響。"},{"q":"「制定監控及應對措施」策略也包括甚麼做法?","opts":["制定旅遊高峰期及緊急情況的應變措施","完全不為旅遊高峰期作任何準備","忽略緊急情況的應對規劃","與應變措施的制定完全無關"],"a":0,"note":"此策略也包括制定旅遊高峰期及緊急情況的應變措施。"},{"q":"阿姆斯特丹(荷蘭)應對過度旅遊的措施包括?","opts":["針對大量民宿,調高旅客稅","鼓勵增設更多民宿","降低旅客稅以吸引更多旅客","與民宿及稅收政策完全無關"],"a":0,"note":"阿姆斯特丹針對大量民宿問題,並調高旅客稅。"},{"q":"阿姆斯特丹還採取甚麼具體措施?","opts":["觀光船上落客點遷出市中心,禁止遊客到紅燈區參觀","把觀光船上落客點遷入市中心","鼓勵遊客到紅燈區參觀","與市中心的人流管理完全無關"],"a":0,"note":"阿姆斯特丹把觀光船上落客點遷出市中心,並禁止遊客到紅燈區參觀。"},{"q":"威尼斯(意大利)應對過度旅遊的措施包括?","opts":["禁止大型郵輪進入城區,設定到訪郵輪總數上限","鼓勵更多大型郵輪進入城區","取消所有郵輪數目的限制","與郵輪管理完全無關"],"a":0,"note":"威尼斯禁止大型郵輪進城區,並設定郵輪總數上限。"},{"q":"威尼斯還採取甚麼具體措施限制旅客行為?","opts":["限定旅客進入指定區域時段,禁止旅客隨便在公眾地方席地而坐","容許旅客無限時進入任何指定區域","鼓勵旅客隨處在公眾地方休息","與旅客行為的規管完全無關"],"a":0,"note":"威尼斯限定旅客進入指定區域時段,並禁止隨處席地而坐。"},{"q":"威尼斯為減少垃圾及開徵稅項採取甚麼措施?","opts":["禁止外賣店開業以減少垃圾,並開徵旅客稅","鼓勵增設更多外賣店","取消所有旅客稅項","與垃圾及稅收管理完全無關"],"a":0,"note":"威尼斯禁止外賣店開業以減少垃圾及製造的問題,並開徵旅客稅。"},{"q":"巴塞隆拿(西班牙)應對過度旅遊的措施包括?","opts":["限制酒店及民宿數量","增加酒店及民宿的數量上限","完全不限制任何住宿供應","與住宿供應的管理完全無關"],"a":0,"note":"巴塞隆拿限制酒店及民宿數量以應對過度旅遊。"},{"q":"巴塞隆拿還採取甚麼交通相關措施?","opts":["限制在城區使用電動滑板車等裝備","鼓勵大量使用電動滑板車","與城區交通工具的管理完全無關","增加電動滑板車的租借點"],"a":0,"note":"巴塞隆拿限制在城區使用電動滑板車等裝備。"},{"q":"布吉瑪雅灣(泰國)應對過度旅遊的措施是?","opts":["封島暫停所有旅遊活動","增加島上的旅遊活動","限制部分景點但維持全面開放","與封島措施完全無關"],"a":0,"note":"布吉瑪雅灣採取封島暫停所有旅遊活動的措施。"},{"q":"馬丘比丘(秘魯)應對過度旅遊的措施包括?","opts":["只接受旅行團觀光,不可以獨自登山","鼓勵旅客獨自登山不受任何限制","取消旅行團觀光的形式","完全不限制參觀人數"],"a":0,"note":"馬丘比丘只接受旅行團觀光,不可獨自登山。"},{"q":"馬丘比丘還有甚麼具體限制措施?","opts":["限制每日參觀人數及往返時段","容許旅客無限次數參觀","完全不限制參觀的時段","鼓勵旅客盡量延長逗留時間"],"a":0,"note":"馬丘比丘限制每日參觀人數及往返時段。"},{"q":"以下何者屬於「鼓勵分流」策略的具體措施?","opts":["將部分旅遊活動移至非旅遊區","限定旅客進入指定區域的時段","利用大數據評估旅遊業表現","開設旅遊巴士上落客區"],"a":0,"note":"將活動移至非旅遊區屬於鼓勵分流策略的措施。"},{"q":"以下何者屬於「鼓勵旅客在不同時間到訪」策略的具體措施?","opts":["利用價格影響旺淡季訪客人數","增加旅遊景點的承載力","增加相關職位予本地社群","改善城市文化基本設施"],"a":0,"note":"利用價格影響旺淡季訪客人數屬於此策略的措施。"},{"q":"一個景點透過限制每日入場人數及規定進場時段,以控制人流,這較貼近哪種應對策略?","opts":["檢討及引入規管","確保本地社群能受惠","與旅客多溝通","開發新行程及新景點"],"a":0,"note":"限制入場人數及時段屬檢討及引入規管的具體做法。"},{"q":"一個旅遊局積極宣傳城中冷門的博物館及街區,以分散主要景點的人流,這較貼近哪種應對策略?","opts":["開發新行程及新景點","制定監控及應對措施","與本地持份者溝通","利用旅客劃分幫助管理"],"a":0,"note":"宣傳冷門景點以分散人流,屬開發新行程及新景點的策略。"},{"q":"一個地區成立居民親善大使計劃,鼓勵旅客與本地居民交流互動,這較貼近哪種應對策略?","opts":["創造同時令旅客與本地人受惠的經驗","改善城市基本建設和設施","檢討及引入規管","制定監控及應對措施"],"a":0,"note":"設立親善大使促進旅客與居民交流,屬創造雙方受惠經驗的策略。"},{"q":"一座城市定期舉辦居民座談會,收集他們對旅遊業發展的意見並納入決策考量,這較貼近哪種應對策略?","opts":["與本地持份者多溝通及加強參與","與旅客多溝通","確保本地社群能受惠於旅遊活動","制定監控及應對措施"],"a":0,"note":"定期舉辦居民座談會收集意見,屬與本地持份者溝通參與的策略。"},{"q":"為何過度旅遊被形容為「兩難」的問題?","opts":["限制旅客人數雖能紓緩擠塞,但也可能影響經濟及居民生計等","限制旅客人數必然對所有持份者都有利而無任何代價","過度旅遊問題其實十分容易解決,沒有任何取捨","增加旅客人數必然對經濟及居民生計毫無影響"],"a":0,"note":"限制旅客能紓緩擠塞,但同時可能影響經濟及居民生計,故屬兩難問題。"},{"q":"為何社交媒體的興起被視為過度旅遊的成因之一?","opts":["社交媒體加速資訊傳播,令熱門景點更快速地吸引大量旅客湧入","社交媒體與旅客的旅遊決定完全無關","社交媒體只會減少旅客對景點的興趣","社交媒體純粹用於旅客之間的私人溝通,不影響旅遊決策"],"a":0,"note":"社交媒體加速資訊傳播,令熱門景點更快吸引大量旅客,加劇過度旅遊。"},{"q":"為何威尼斯及巴塞隆拿等城市特別針對「民宿數量」進行規管?","opts":["過多民宿可能加劇住宿供應失衡及擾亂居民正常生活,是過度旅遊的常見成因之一","民宿數量與過度旅遊問題完全無關","民宿越多對居民生活的影響越正面","規管民宿數量純粹是為增加政府稅收"],"a":0,"note":"過多民宿可能加劇住宿供應失衡及擾亂居民生活,是常見的過度旅遊成因。"},{"q":"為何馬丘比丘要求旅客必須跟隨旅行團而不可獨自登山?","opts":["有助控制人流秩序及保護遺址,同時確保旅客安全","獨自登山必然比跟團更能保護古蹟","要求跟團與遺址保護及人流控制完全無關","此措施純粹為增加旅行社的收入"],"a":0,"note":"要求跟團有助控制人流秩序保護遺址,同時確保旅客安全。"},{"q":"以下何者最能總結各地應對過度旅遊措施(如阿姆斯特丹威尼斯等)的共同特點?","opts":["均透過規管人流、收費或活動範圍等具體措施,平衡旅遊業發展與居民生活質素","各地措施完全沒有任何共通點","所有城市均選擇完全封閉,禁止旅客進入","所有措施均只著重增加旅遊業收入而不理會居民生活"],"a":0,"note":"各地均透過規管具體措施,平衡旅遊業發展與居民生活質素。"},{"q":"以下何者最能總結「過度旅遊」應對策略的整體方向?","opts":["結合分流、規管、社群參與及科技監控等多元手段,力求平衡旅遊業發展與當地承載力","純粹依賴限制旅客人數這單一手段","純粹依賴增加旅遊設施而不作任何規管","過度旅遊問題無法透過任何策略紓緩"],"a":0,"note":"應對策略結合分流規管社群參與及科技監控等多元手段,平衡發展與承載力。"},{"q":"為何「利用大數據及資訊科技評估旅遊業表現及影響」對應對過度旅遊十分重要?","opts":["有助當局及時掌握人流及影響的實際情況,作出精準的應對決策","大數據與旅遊業的管理決策完全無關","應對過度旅遊只需依賴傳統人手統計方式","科技工具的應用只會令問題更加複雜"],"a":0,"note":"大數據及科技評估有助當局及時掌握實際情況,作出精準應對決策。"},{"q":"以下何者最能總結過度旅遊現象對旅遊業界的長遠啟示?","opts":["旅遊業的發展須考慮當地的承載能力及居民生活質素,而非單純追求旅客人數增長","旅遊業應該純粹追求旅客人數的最大化而不理會其他因素","過度旅遊現象只是短期問題,長遠而言不需任何應對策略","旅遊業界應完全停止任何形式的旅遊推廣"],"a":0,"note":"過度旅遊現象啟示業界須考慮承載能力及居民生活質素,而非單純追求人數增長。"}]},{"n":13,"title":"GDS系統","tag":"GDS SYSTEMS","qs":[{"q":"GDS是甚麼的簡稱?","opts":["全球分銷系統(Global Distribution System)","全球資料儲存(Global Data Storage)","全球目的地服務(Global Destination Service)","一般分銷系統(General Distribution System)"],"a":0,"note":"GDS是全球分銷系統的簡稱。"},{"q":"GDS的定位是甚麼?","opts":["「一站式」全球旅遊產品「交易中心」","純粹單一航空公司的內部訂票系統","純粹一間旅行社的內部管理系統","只限個別酒店使用的訂房系統"],"a":0,"note":"GDS是一站式全球旅遊產品的交易中心。"},{"q":"誰可以加入GDS平台?","opts":["全球的旅遊供應商均可加入","只限個別國家的供應商","只限航空公司,不包括酒店","只限大型企業,不包括中小型供應商"],"a":0,"note":"全球的旅遊供應商均可加入GDS平台。"},{"q":"GDS的主要功能包括?","opts":["介紹和出售產品服務、共用不斷更新的數據資料","純粹提供旅遊保險服務","純粹提供簽證申請服務","只限提供機票查詢而不涉及其他產品"],"a":0,"note":"GDS主要功能包括介紹出售產品服務及共用數據資料。"},{"q":"GDS另一項主要功能是?","opts":["供中介機構查詢價格、購買各項旅遊產品","純粹提供旅客個人資料儲存服務","純粹提供航班餐飲的評分服務","只限旅客本人使用,不供中介機構查詢"],"a":0,"note":"GDS供中介機構查詢價格及購買各項旅遊產品。"},{"q":"客戶利用GDS訂位時,首先需要做甚麼?","opts":["輸入基本資料進行查詢,例如行程日期、目的地等","直接完成付款而不需輸入任何資料","先致電客服人員了解價格","先前往機場才能查詢"],"a":0,"note":"客戶首先輸入基本資料(如行程日期目的地)進行查詢。"},{"q":"客戶輸入查詢資料後,GDS會怎樣做?","opts":["找尋和列出符合要求的詳細資料","立即自動完成訂購而不需客戶確認","直接拒絕查詢並要求重新輸入","將資料轉交予其他旅客查閱"],"a":0,"note":"GDS會找尋和列出符合客戶要求的詳細資料。"},{"q":"客戶在GDS訂購時,GDS會先為顧客開設甚麼紀錄?","opts":["旅客紀錄(Passenger Name Record, PNR)","純粹的付款紀錄","純粹的投訴紀錄","純粹的會員積分紀錄"],"a":0,"note":"訂購時GDS會先為顧客開設旅客紀錄(PNR)。"},{"q":"「PNR」用於甚麼範圍?","opts":["用於整個行程,包括飛機、酒店、汽車租賃等","只限用於機票的訂購","只限用於酒店的訂購","只限用於旅遊保險的購買"],"a":0,"note":"PNR用於整個行程,包括飛機酒店及汽車租賃等。"},{"q":"透過GDS訂購的資料如何處理,以加快訂位及確認時間?","opts":["資料分別存入各供應商的數據庫","資料只存放在GDS總部而不分發","資料需要人手逐一轉交各供應商","資料完全不會被儲存"],"a":0,"note":"資料分別存入各供應商的數據庫,加快訂位和確認時間。"},{"q":"如客戶的行程有變更,可以怎樣處理?","opts":["客戶可以利用GDS迅速安排","客戶必須親身前往各供應商辦理","客戶只能透過電郵逐一聯絡供應商","變更行程必須重新查詢並開設新的PNR"],"a":0,"note":"如有變更,客戶可利用GDS迅速安排。"},{"q":"為何個別航空公司的航班更改,客戶可以立刻進行修改?","opts":["因為GDS系統保留了PNR,航班更改也會即時更新至GDS","因為客戶需要每次重新輸入所有行程資料","因為GDS與航空公司系統完全獨立不作任何連結","因為航空公司必須先致電客戶通知才能更新"],"a":0,"note":"GDS保留PNR,航班更改會即時更新至GDS,讓客戶可即時修改。"},{"q":"GDS的其他功能之一是「提供基本旅遊信息」,具體是指?","opts":["業界向全球同業介紹其產品服務的平台","純粹供旅客查閱天氣預報","純粹供旅客查閱匯率走勢","只限個別地區的旅遊信息"],"a":0,"note":"提供基本旅遊信息指業界向全球同業介紹產品服務的平台。"},{"q":"為何GDS的「提供基本旅遊信息」功能對業界有吸引力?","opts":["GDS擁有眾多供應商介紹資料,成效較獨自推廣為大而選擇增加","GDS上的供應商資料十分有限,吸引力不足","獨自推廣的成效必然優於使用GDS","GDS只供單一供應商使用,缺乏比較選擇"],"a":0,"note":"GDS擁有眾多供應商資料,成效較獨自推廣大且選擇增加,故具吸引力。"},{"q":"GDS的其他功能之一是「報價」,具體是指?","opts":["供應商發布和更新各類服務的售價、銷售條件等","純粹由GDS自行制定所有產品的售價","供應商完全無法自行更新任何售價資料","報價功能只限用於酒店產品"],"a":0,"note":"報價功能指供應商可發布和更新各類服務的售價及銷售條件。"},{"q":"GDS的其他功能也包括「其他增值服務」,具體是指?","opts":["定期改善其功能及資訊","純粹提供免費機票兌換服務","純粹提供旅遊保險理賠服務","與功能改善完全無關的服務"],"a":0,"note":"其他增值服務指GDS定期改善其功能及資訊。"},{"q":"「Abacus」這個GDS系統的業務主要集中在哪個地區?","opts":["亞洲地區","歐洲地區","北美洲地區","非洲地區"],"a":0,"note":"Abacus業務較多在亞洲地區。"},{"q":"「Abacus」最初由哪些機構創立?","opts":["國泰、新加坡航空及中國航空等區內主要航空公司","美國航空及IBM","歐洲多國政府聯合創立","純粹由私人投資者創立,與航空公司無關"],"a":0,"note":"Abacus最初由國泰新加坡航空及中國航空等區內主要航空公司創立。"},{"q":"「Amadeus」這個GDS系統的業務主要集中在哪個地區?","opts":["歐洲地區(全球旅遊業最大的地區)","亞洲地區","北美洲地區","南美洲地區"],"a":0,"note":"Amadeus業務較多在全球旅遊業最大的歐洲地區。"},{"q":"「Amadeus」每天處理的查詢及交易量如何?","opts":["每天處理超過四億項查詢及回覆,完成近300萬宗交易","每天只處理數百項查詢","每天處理的交易量少於一萬宗","與查詢及交易量的規模完全無關"],"a":0,"note":"Amadeus每天處理超過四億項查詢回覆,完成近300萬宗交易。"},{"q":"「Sabre」這個GDS系統最初由哪些機構共同開發?","opts":["美國航空及IBM","國泰及新加坡航空","歐洲多間航空公司聯合開發","純粹由IBM獨立開發,與航空公司無關"],"a":0,"note":"Sabre最早期系統由美國航空及IBM共同開發。"},{"q":"「Sabre」現時的業務主要集中在哪個地區?","opts":["北美洲地區","亞洲地區","歐洲地區","南美洲地區"],"a":0,"note":"Sabre現時的業務以北美洲為主。"},{"q":"以下何者是GDS對「旅遊供應商」帶來的優點?","opts":["擴大自己的銷售網絡,節省推廣和票務的營運支出","令供應商的銷售網絡大幅縮小","增加推廣和票務的營運支出","與供應商的市場推廣完全無關"],"a":0,"note":"GDS能擴大供應商的銷售網絡,並節省推廣和票務的營運支出。"},{"q":"GDS對旅遊供應商還有甚麼優點?","opts":["更全面卻更廉宜的推廣方法,提高服務質素","令推廣方法變得更狹隘且昂貴","降低供應商的服務質素","與供應商的服務質素完全無關"],"a":0,"note":"GDS提供更全面卻更廉宜的推廣方法,並有助提高服務質素。"},{"q":"GDS如何幫助旅遊供應商「掌握市場情況」?","opts":["透過GDS平台的數據及資訊,供應商可更了解市場動態","GDS完全不提供任何市場相關的數據資訊","供應商只能透過自行的市場調查了解市場情況","與市場情況的掌握完全無關"],"a":0,"note":"透過GDS平台的數據資訊,供應商可更了解市場動態,掌握市場情況。"},{"q":"以下何者是GDS對「旅行代理商」帶來的優點?","opts":["「一站式」的訂位服務,簡化了整個訂位以至行程的安排","令訂位及行程安排變得更加複雜","只能處理機票查詢,不能處理酒店或租車","與行程安排的簡化完全無關"],"a":0,"note":"GDS提供一站式訂位服務,簡化整個訂位及行程安排。"},{"q":"GDS對旅行代理商而言,還可以怎樣「節省索取資料的時間」?","opts":["GDS是旅遊資訊集中地,代理商毋須四處分別查詢各供應商資料","代理商仍須逐一聯絡每間供應商查詢資料","GDS完全不提供任何旅遊資訊","資訊集中地的概念與節省時間完全無關"],"a":0,"note":"GDS作為旅遊資訊集中地,讓代理商毋須四處查詢,節省時間。"},{"q":"GDS如何幫助旅行代理商「便於更改行程」?","opts":["顧客能迅速掌握各種旅遊信息及做出行程安排","更改行程必須重新開設全新的訂位紀錄","GDS完全不支援任何行程變更的功能","顧客必須親身前往供應商辦理任何行程變更"],"a":0,"note":"透過GDS,顧客能迅速掌握旅遊信息並迅速做出行程變更安排。"},{"q":"為何GDS被形容為「一站式」的交易中心?","opts":["涵蓋飛機、酒店、汽車租賃等多項旅遊產品,毋須分別經多個平台處理","GDS只能處理單一類型的旅遊產品","GDS需要旅客分別在不同平台完成不同產品的購買","「一站式」純粹是宣傳用詞,沒有實質意義"],"a":0,"note":"GDS涵蓋飛機酒店租車等多項產品,毋須分別經多個平台處理,故稱一站式。"},{"q":"為何PNR的設計對整個行程的管理十分重要?","opts":["PNR整合飛機酒店租車等多項行程資料,方便統一查詢及更新","PNR只記錄機票資料,與酒店租車無關","每項旅遊產品都需要獨立的PNR,彼此毫無關聯","PNR只在旅客投訴時才會被使用"],"a":0,"note":"PNR整合多項行程資料,方便統一查詢及更新整個行程。"},{"q":"為何GDS的資料會「分別存入各供應商的數據庫」而非只集中存放在GDS本身?","opts":["讓各供應商能直接管理自身的即時資料,加快訂位和確認的速度","集中存放資料能大幅加快訂位速度而不需分散","分散存放資料只會令訂位速度變得更慢","與訂位確認速度的加快完全無關"],"a":0,"note":"分別存入各供應商數據庫讓其直接管理即時資料,加快訂位確認速度。"},{"q":"以下何者最能說明GDS「共用不斷更新的數據資料」的重要性?","opts":["確保中介機構及旅客能查詢到最新的價格及供應情況,避免資訊滯後","數據資料一旦上載後便不會再更新","中介機構應完全依賴自行收集的獨立資料而非GDS數據","數據更新與旅客的訂購體驗完全無關"],"a":0,"note":"不斷更新的數據確保各方能查詢到最新價格及供應情況,避免資訊滯後。"},{"q":"以下何者是三大GDS系統(Abacus、Amadeus、Sabre)的共同特點?","opts":["均由航空公司或相關機構發起或參與創立,並各自在不同地區佔優勢","三者的業務範圍完全集中在同一地區","三者均與航空公司完全沒有任何歷史淵源","三者的功能 ],"a":0,"note":"自助式服務科技下,旅客直接向供應商購買而無職員協助。"},{"q":"「OTA」是甚麼的簡稱?","opts":["Online Tourist Agents(網上旅遊代理商)","Overseas Travel Association(海外旅遊協會)","Official Tourism Authority(官方旅遊管理局)","Online Ticketing Access(網上票務通道)"],"a":0,"note":"OTA是Online Tourist Agents的簡稱,即網上旅遊代理商。"},{"q":"網上平台主要由甚麼機構提供?","opts":["網上旅遊代理商(OTA)","純粹由政府旅遊部門提供","純粹由航空公司自行提供","純粹由個別酒店自行提供"],"a":0,"note":"網上平台主要由網上旅遊代理商(OTA)提供。"},{"q":"OTA和GDS有何共通點?","opts":["兩者同是交易平台","兩者的服務對象完全相同,均只服務中介機構","兩者是完全相同的系統,沒有任何分別","兩者均只限航空公司使用"],"a":0,"note":"OTA和GDS同是交易平台,但服務對象有所不同。"},{"q":"OTA的主要客群是誰?","opts":["消費者","純粹的旅行代理商","純粹的航空公司","純粹的政府機構"],"a":0,"note":"OTA以消費者為主要客群。"},{"q":"許多供應商為何在OTA購買廣告位?","opts":["以吸引旅客利用這些網站購買旅遊產品招徠生意","純粹為配合政府的宣傳政策","與招徠生意及銷售完全無關","純粹為提升企業的社會形象"],"a":0,"note":"許多供應商在OTA購買廣告位,以吸引旅客購買旅遊產品。"},{"q":"為何購買旅遊產品被形容為「頗為複雜」?","opts":["需要考慮食、住、行、遊、購、娛各方面","純粹因為需要支付較高昂的費用","純粹因為需要親身前往旅行社辦理","與行程規劃的多元考慮完全無關"],"a":0,"note":"購買旅遊產品複雜是因為需要考慮食住行遊購娛各方面。"},{"q":"網上旅遊代理商如何令購買過程變得簡單?","opts":["提供「一站式」搜尋,令購買過程簡單得多","要求旅客分別在不同網站搜尋各項產品","完全依賴人手電話查詢","增加購買過程所需的步驟"],"a":0,"note":"OTA提供一站式搜尋,令原本複雜的購買過程簡單得多。"},{"q":"OTA採用甚麼技術以節省搜尋時間?","opts":["元搜索技術","純粹的人手比較技術","純粹的電話查詢技術","純粹的實體門市查詢技術"],"a":0,"note":"OTA採用元搜索技術以節省搜尋所花的時間。"},{"q":"「元搜索技術」的作用是?","opts":["節省了在不同搜索引擎進行搜尋所花的時間","令搜尋過程變得更加繁複耗時","只能搜尋單一供應商的資料","與搜尋效率的提升完全無關"],"a":0,"note":"元搜索技術節省在不同搜索引擎分別搜尋所花的時間。"},{"q":"OTA提供的價格有何特點?","opts":["提供的價格很有競爭力","價格通常遠高於傳統旅行社","價格與傳統代理商完全相同,沒有優勢","價格完全由消費者自行議價決定"],"a":0,"note":"OTA提供的價格很有競爭力。"},{"q":"OTA為何能提供具競爭力的價格?","opts":["只收取供應商很少的佣金,儘量把價格吸引消費者","向供應商收取極高昂的佣金","完全不向供應商收取任何費用","價格由政府部門統一制定"],"a":0,"note":"OTA只收取供應商很少佣金,盡量把價格訂得吸引消費者。"},{"q":"OTA的另一特色是具備甚麼平台功能?","opts":["溝通與討論平台,兼具社交媒體的特色","純粹的付款結算平台","純粹的投訴處理平台","純粹的旅遊保險理賠平台"],"a":0,"note":"OTA具備溝通與討論平台的功能,兼具社交媒體特色。"},{"q":"OTA的溝通討論平台功能有何作用?","opts":["消費者互相交流,形成一個網上社群","純粹供企業內部員工使用","純粹供政府部門收集數據","完全禁止消費者之間的任何互動"],"a":0,"note":"消費者可在此平台互相交流,形成網上社群。"},{"q":"OTA對「旅客」帶來的影響之一是?","opts":["自由行方式旅遊大增","自由行方式旅遊大幅減少","旅客完全依賴旅行團而不再自由行","與自由行旅遊的普及程度完全無關"],"a":0,"note":"OTA的興起令自由行方式 廉航的票價結構必然比傳統航空更複雜","傳統航空公司完全不提供任何附加收費的服務項目"],"a":0,"note":"廉航採基本票價加逐項收費模式,傳統航空則多採一價全包模式。"},{"q":"為何廉航「使用次級機場」有助降低營運成本?","opts":["次級機場的使用費及泊位成本通常較主要機場低廉","次級機場的使用費用必然高於主要機場","使用次級機場與營運成本的降低完全無關","次級機場必然比主要機場更靠近市中心"],"a":0,"note":"次級機場的使用費及泊位成本通常較低,有助廉航降低營運成本。"},{"q":"為何「快速機場流轉」是廉航重要的低成本策略?","opts":["縮短飛機在地面停留的時間,提高飛機的使用效率及每日可執飛的航班數目","延長飛機在地面停留的時間有助降低成本","快速機場流轉與飛機使用效率完全無關","飛機的使用效率與航空公司的成本控制完全無關"],"a":0,"note":"縮短地面停留時間可提高飛機使用效率及每日執飛航班數,降低單位成本。"},{"q":"為何「單一飛機型號為主」有助廉航降低營運成本?","opts":["有助簡化機師培訓、零件庫存及維修保養的安排,提升營運效率","使用多種不同機型必然比單一機型更省成本","單一機型與機師培訓及維修保養完全無關","單一機型必然導致更高的維修保養成本"],"a":0,"note":"單一機型有助簡化培訓零件庫存及維修保養,提升整體營運效率並降低成本。"},{"q":"為何「全自助式的網上直銷」有助航空公司降低成本?","opts":["減少人手處理訂票及銷售的成本,同時繞過中介機構的佣金支出","網上直銷必然比傳統銷售方式成本更高","全自助式服務與成本控制完全無關","網上直銷必須額外支付更高昂的中介費用"],"a":0,"note":"網上直銷減少人手處理成本,同時繞過中介佣金支出,有助降低成本。"},{"q":"為何「全球航空權開放」有助廉航的飛躍發展?","opts":["讓航空公司更容易開拓新的跨境航線,擴大市場覆蓋範圍","航空權開放必然限制航空公司開拓新航線的能力","全球航空權開放與廉航的發展完全無關","航空權開放只對傳統航空公司有利,對廉航沒有幫助"],"a":0,"note":"航空權開放讓航空公司更容易開拓跨境航線,有助廉航擴大市場覆蓋。"},{"q":"一位旅客選擇搭乘廉航前往鄰近地區短途旅遊,並自行加購行李及機上餐飲服務,這體現廉航哪方面的特點?","opts":["票價只包括基本座位,其他服務逐項收費","票價已包括所有寄艙行李及餐飲","與廉航的收費模式完全無關","廉航必然提供比傳統航空更全面的服務"],"a":0,"note":"自行加購行李及餐飲,體現廉航基本票價加逐項收費的特點。"},{"q":"一間傳統航空公司近年也開辦子品牌廉航業務,以應對低成本航空的競爭,這反映哪種發展趨勢?","opts":["傳統航空公司開辦廉航的發展趨勢","傳統航空公司完全不受廉航競爭影響","低成本航空公司正在被傳統航空公司完全淘汰","與航空業界的競爭及轉型趨勢完全無關"],"a":0,"note":"開辦子品牌廉航,反映傳統航空公司應對競爭而開辦廉航的發展趨勢。"},{"q":"一間廉航近年增設較舒適的付費座位級別,以吸引願意支付更多的乘客,這反映哪種市場策略?","opts":["低成本航空公司在市場劃分上增加較高票價舒適座位以增加收入","低成本航空公司完全放棄基本票價低廉的定位","低成本航空公司的座位安排與傳統航空公司完全相同","與低成本航空公司的市場策略完全無關"],"a":0,"note":"增設較舒適付費座位,反映低成本航空在市場劃分上增加收入的策略。"},{"q":"以下何者最能總結廉航與傳統航空公司在激烈競爭下「互相借鏡」的現象?","opts":["全方位航空公司下調票價爭取經濟客位,廉航則增設商務座位爭取高消費客群,呈現趨同現象","兩者的經營策略在競爭下完全沒有任何交叉借鏡","全方位航空公司完全不會參考廉航的任何營運模式","廉航完全不會參考全方位航空公司的任何服務模式"],"a":0,"note":"雙方在競爭下互相借鏡對方策略,呈現一定程度的趨同現象。"},{"q":"以下何者最能總結低成本航空公司近年得以「飛躍發展」的整體原因?","opts":["社會環境科技經濟及政治等多方面因素共同配合,促成其市場佔有率持續上升","純粹單一因素(如經濟因素)促成其發展,與其他方面完全無關","低成本航空公司的發展純屬巧合,並無任何具體外在因素支持","低成本航空的發展與外在環境因素完全無關"],"a":0,"note":"社會環境科技經濟政治等多方面因素共同配合,促成廉航的飛躍發展。"},{"q":"以下何者最能總結全方位航空公司與低成本航空公司在激烈競爭下的整體應對方向?","opts":["雙方均致力在維持自身核心定位的同時,適度吸納對方優勢以爭取更廣泛的客群","雙方完全堅守原有定位,不作任何策略調整","雙方均選擇完全放棄原有定位,徹底轉型為對方的經營模式","雙方在競爭下的應對策略完全沒有任何共通之處"],"a":0,"note":"雙方均在維持核心定位的同時,適度吸納對方優勢,以爭取更廣泛客群。"}]},{"n":16,"title":"酒店資產管理系統（PMS）","tag":"PROPERTY MANAGEMENT SYSTEM","qs":[{"q":"PMS是甚麼的簡稱?","opts":["酒店資產管理系統(Property Management System)","純粹的付款管理系統(Payment Management System)","純粹的人事管理系統(Personnel Management System)","純粹的採購管理系統(Purchase Management System)"],"a":0,"note":"PMS是酒店資產管理系統的簡稱。"},{"q":"PMS的定位是甚麼?","opts":["可以涵蓋各酒店部門運作的電腦作業系統","純粹只供財務部使用的獨立系統","純粹只供前堂部使用的獨立系統","只限用於處理客人投訴的系統"],"a":0,"note":"PMS是可涵蓋各酒店部門運作的電腦作業系統。"},{"q":"前堂部使用PMS的哪個子系統?","opts":["電腦訂位系統","客房管理系統","電子銷售點系統","會計系統"],"a":0,"note":"前堂部使用電腦訂位系統這個PMS子系統。"},{"q":"前堂部的「電腦訂位系統」主要功能包括?","opts":["處理訂位查詢,確定可銷售客房情況,為客戶開立訂位紀錄","純粹處理員工的更表排班","純粹處理食材的採購訂單","純粹處理客房的清潔進度"],"a":0,"note":"電腦訂位系統處理訂位查詢確定可銷售客房情況及開立訂位紀錄。"},{"q":"「電腦訂位系統」還有甚麼功能?","opts":["更新客戶訂位紀錄,保存客戶顧客歷史記錄(包括光顧記錄客戶喜好)","純粹記錄員工的考勤資料","純粹記錄供應商的聯絡資料","與客戶歷史記錄的保存完全無關"],"a":0,"note":"電腦訂位系統更新訂位紀錄,並保存顧客歷史記錄包括光顧記錄及喜好。"},{"q":"「電腦訂位系統」也負責處理甚麼財務相關事宜?","opts":["處理訂金及結賬等","純粹處理員工的薪金發放","純粹處理供應商的貨款結算","與訂金結賬完全無關"],"a":0,"note":"電腦訂位系統也負責處理訂金及結賬等事宜。"},{"q":"「電腦訂位系統」如何配合客房供應情況運作?","opts":["根據客房供應情況分配客房、封鎖客房","完全不會因應供應情況作任何調整","只能分配客房而不能封鎖客房","與客房供應情況的配合完全無關"],"a":0,"note":"電腦訂位系統會根據供應情況分配客房或封鎖客房。"},{"q":"「電腦訂位系統」也能提供甚麼予管理層?","opts":["提供各類數據和分析報告","純粹提供天氣預報資訊","純粹提供匯率換算功能","與數據分析報告的提供完全無關"],"a":0,"note":"電腦訂位系統能提供各類數據和分析報告予管理層參考。"},{"q":"管家部使用PMS的哪個子系統?","opts":["客房管理系統","電腦訂位系統","電子銷售點系統","會計系統"],"a":0,"note":"管家部使用客房管理系統這個PMS子系統。"},{"q":"「客房管理系統」的主要功能包括?","opts":["分配房務員負責客房清潔,封鎖客房進行裝修或維護","純粹處理客人的訂位查詢","純粹處理財務結算事宜","與客房清潔分配完全無關"],"a":0,"note":"客房管理系統負責分配房務員清潔及封鎖客房裝修維護。"},{"q":"「客房管理系統」還負責甚麼?","opts":["向各部門提供客房狀況,提供日常管家報告","純粹處理訂房的付款事宜","純粹處理員工的招聘工作","與客房狀況的資訊提供完全無關"],"a":0,"note":"客房管理系統向各部門提供客房狀況並提供日常管家報告。"},{"q":"管家部除客房管理系統外,還使用哪個子系統?","opts":["用品管理系統","電子銷售點系統","會計系統","餐飲管理系統"],"a":0,"note":"管家部也使用用品管理系統。"},{"q":"「用品管理系統」的主要功能是?","opts":["管理物品存放,連接後勤採購程序","純粹處理客人的訂房查詢","純粹處理財務報表的編制","與物品存放管理完全無關"],"a":0,"note":"用品管理系統負責管理物品存放並連接後勤採購程序。"},{"q":"餐飲部使用PMS的哪個子系統處理訂位及點菜?","opts":["電子銷售點系統","電腦訂位系統","客房管理系統","會計系統"],"a":0,"note":"餐飲部使用電子銷售點系統處理訂位及點菜。"},{"q":"「電子銷售點系統」的主要功能包括?","opts":["處理訂位及編排座位,客人訂菜,結賬","純粹處理員工的排班工作","純粹處理食材的庫存管理","與訂位及點菜完全無關"],"a":0,"note":"電子銷售點系統負責處理訂位編排座位客人訂菜及結賬。"},{"q":"餐飲部除電子銷售點系統外,還使用哪個子系統?","opts":["餐飲管理系統","客房管理系統","用品管理系統","電腦訂位系統"],"a":0,"note":"餐飲部也使用餐飲管理系統。"},{"q":"「餐飲管理系統」的主要功能是?","opts":["物料及食材管理,營運報告及銷售分析","純粹處理客人的訂房查詢","純粹處理員工的招聘及培訓","與食材管理及銷售分析完全無關"],"a":0,"note":"餐飲管理系統負責物料食材管理及提供營運報告銷售分析。"},{"q":"財務部使用PMS的哪個子系統?","opts":["會計系統","電腦訂位系統","客房管理系統","電子銷售點系統"],"a":0,"note":"財務部使用會計系統這個PMS子系統。"},{"q":"「會計系統」的主要功能包括?","opts":["處理各種客房銷售功能,總結住客在酒店內各項設施的消費","純粹處理客房的清潔進度","純粹處理員工的更表排班","與客房銷售及消費總結完全無關"],"a":0,"note":"會計系統處理客房銷售功能並總結住客在各設施的消費。"},{"q":"「會計系統」還負責甚麼一般功能?","opts":["一般商業會計功能","純粹的市場推廣策劃功能","純粹的員工招聘功能","與商業會計功能完全無關"],"a":0,"note":"會計系統也負責一般商業會計功能。"},{"q":"「會計系統」如何處理與銷售渠道相關的款項?","opts":["結算及支付予旅行代理商及全球分銷系統等銷售渠道的回佣","完全不處理任何銷售渠道的回佣事宜","只處理現金交易而不處理任何回佣結算","與銷售渠道的回佣完全無關"],"a":0,"note":"會計系統結算並支付予旅行代理商及GDS等銷售渠道的回佣。"},{"q":"「會計系統」如何協助酒店的房價策略?","opts":["幫助訂立房價,預估及分析利潤","完全不涉及任何房價策略的制定","只負責記錄房價而不作任何分析","與利潤預估分析完全無關"],"a":0,"note":"會計系統幫助訂立房價,並預估及分析利潤。"},{"q":"「會計系統」也能提供甚麼予管理層?","opts":["營業分析報告","純粹提供天氣預報資訊","純粹提供員工考勤記錄","與營業分析報告的提供完全無關"],"a":0,"note":"會計系統能提供營業分析報告予管理層。"},{"q":"PMS作為酒店的「中央系統」,其角色是?","opts":["酒店的中央核心系統,掌握涉及酒店運作的資料和數據","純粹是財務部的獨立輔助工具","純粹是前堂部的獨立輔助工具","與酒店整體運作的資料掌握完全無關"],"a":0,"note":"PMS是酒店的中央核心系統,掌握涉及運作的資料和數據。"},{"q":"作為中央系統,PMS可為管理層做甚麼?","opts":["執行各類分析及提供報表","純粹提供員工的個人聯絡資料","純粹提供客人的信用卡密碼","與分析報表的提供完全無關"],"a":0,"note":"PMS作為中央系統,可為管理層執行各類分析及提供報表。"},{"q":"大型酒店集團可以如何整合旗下各酒店的PMS?","opts":["把各旗下酒店的PMS再整合成一個龐大的企業系統","完全不作任何整合,各自獨立運作","只能整合部分酒店而不能整合全部","與PMS的整合完全無關"],"a":0,"note":"大型酒店集團可把各酒店的PMS整合成一個龐大的企業系統。"},{"q":"PMS的其他功能包括甚麼語言及貨幣相關功能?","opts":["具備多語言及多貨幣計算等功能","只支援單一語言及單一貨幣","完全不具備任何語言或貨幣轉換功能","與多語言多貨幣的支援完全無關"],"a":0,"note":"PMS具備多語言及多貨幣計算等功能。"},{"q":"PMS的其他功能還包括甚麼培訓相關功能?","opts":["具備培訓模式,用於公司內聯網內供員工培訓之用","完全不具備任何員工培訓的相關功能","只能用於實際運作而不能用於培訓","與員工培訓完全無關"],"a":0,"note":"PMS具備培訓模式,可於公司內聯網供員工培訓使用。"},{"q":"PMS重要性之一是「協調各部門運作」,具體是指?","opts":["讓不同部門共同使用及更新資料","令各部門完全獨立運作,互不分享資料","增加各部門之間的資料傳遞障礙","與部門之間的資料共用完全無關"],"a":0,"note":"PMS讓不同部門共同使用及更新資料,協調各部門運作。"},{"q":"PMS如何避免各部門「重覆進行相同的工作」?","opts":["例如避免重新輸入資料","要求各部門必須各自重新輸入所有資料","增加各部門之間的工作重複程度","與避免重覆工作完全無關"],"a":0,"note":"PMS可避免各部門重覆進行相同工作,例如重新輸入資料。"},{"q":"PMS重要性之二是「提高服務水平」,具體例子包括?","opts":["訂位、房間分配及因應顧客需要提供貼合人客要求的服務","純粹降低服務的個人化程度","純粹減少對客人需要的關注","與服務水平的提升完全無關"],"a":0,"note":"提高服務水平例子包括訂位房間分配及貼合顧客需要的服務。"},{"q":"PMS重要性之四是「運作標準化」,具體是指?","opts":["標準化工序,提高效率、減少錯誤、提高服務質素、降低成本","令各項工序變得更加隨意而缺乏規範","增加人為錯誤的發生機率","與工序標準化完全無關"],"a":0,"note":"運作標準化指標準化工序,提高效率減少錯誤提高服務質素及降低成本。"},{"q":"「運作標準化」還有何好處?","opts":["便於管理及監管","令管理及監管變得更加困難","與管理監管的便利性完全無關","只對前線員工有利,對管理層沒有幫助"],"a":0,"note":"運作標準化也有助於管理及監管。"},{"q":"PMS重要性之五是「品牌建立」,具體是指?","opts":["協助管理人員訂立各類服務要求指標,監控品質","與品牌建立及服務品質監控完全無關","純粹用於財務報表的編制","只能用於前堂部的日常運作"],"a":0,"note":"品牌建立指PMS協助訂立服務要求指標,監控品質以建立品牌。"},{"q":"PMS重要性之六是「節省營運成本」,具體是指?","opts":["協助管理,藉提高效率及減少人手等,節省營運開支","必然大幅增加酒店的營運開支","與營運成本的節省完全無關","只能提高效率而不能節省任何成本"],"a":0,"note":"節省營運成本指PMS透過提高效率減少人手等,節省營運開支。"},{"q":"雖然PMS能節省營運成本,但酒店仍需要投入甚麼?","opts":["資金更新維護電腦設備","完全不需要任何後續的資金投入","只需一次性投入而永不需要任何後續維護","與電腦設備的維護完全無關"],"a":0,"note":"酒店仍需要投入資金更新維護電腦設備,以維持PMS的正常運作。"},{"q":"以下何者屬於前堂部「電腦訂位系統」的具體功能?","opts":["為客戶開立訂位紀錄並保存客戶喜好記錄","分配房務員負責客房清潔","處理菜式的物料及食材管理","結算及支付回佣予銷售渠道"],"a":0,"note":"開立訂位紀錄及保存客戶喜好記錄,屬電腦訂位系統的功能。"},{"q":"以下何者屬於管家部「客房管理系統」的具體功能?","opts":["封鎖客房進行裝修或維護","處理客人的訂位查詢","處理菜式的訂位及編排座位","結算酒店的營業分析報告"],"a":0,"note":"封鎖客房進行裝修維護,屬客房管理系統的功能。"},{"q":"以下何者屬於餐飲部「電子銷售點系統」的具體功能?","opts":["處理客人訂菜及結賬","處理客房的訂位查詢","處理員工的招聘及培訓","處理酒店整體的財務預算"],"a":0,"note":"處理客人訂菜及結賬,屬電子銷售點系統的功能。"},{"q":"以下何者屬於財務部「會計系統」的具體功能?","opts":["結算及支付予旅行代理商的回佣","分配房務員負責客房清潔","處理菜式的物料及食材管理","處理客人的訂房查詢"],"a":0,"note":"結算支付予旅行代理商的回佣,屬會計系統的功能。"},{"q":"若前堂部與管家部各自獨立記錄客房狀態而不互通,可能出現甚麼問題?","opts":["資料不一致,可能導致已出售的客房被誤標示為可用","不會出現任何問題,因為各部門的記錄必然完全一致","客房狀態的記錄與跨部門溝通完全無關","此舉能提高整體運作效率"],"a":0,"note":"各自獨立記錄而不互通,可能導致資料不一致引起客房分配錯誤。"},{"q":"PMS如何體現「協調各部門運作」與「避免重複工作」兩者的關係?","opts":["透過統一系統讓各部門共用同一套資料,毋須各自重複輸入相同資訊","協調各部門運作與避免重複工作是兩個完全獨立且無關的概念","各部門仍須各自重複輸入資料,PMS對此毫無幫助","統一系統反而會增加各部門的工作重複程度"],"a":0,"note":"統一系統讓各部門共用資料,毋須各自重複輸入,體現兩者的關聯。"},{"q":"為何PMS「保存客戶顧客歷史記錄」對提升服務水平有幫助?","opts":["員工可參考顧客的光顧記錄及喜好,提供更貼合顧客需要的個人化服務","保存顧客歷史記錄純粹用於財務審計,與服務水平無關","顧客歷史記錄只能由財務部查閱,與前線服務無關","保存歷史記錄反而會降低服務的效率"],"a":0,"note":"員工可參考顧客歷史記錄及喜好,提供更貼合需要的個人化服務,提升服務水平。"},{"q":"為何PMS的「標準化工序」有助「降低成本」?","opts":["標準化流程減少人為錯誤及重複工作,從而節省人力及時間成本","標準化工序必然需要投入更多人手及資源","標準化與成本控制之間沒有任何邏輯關聯","標準化流程必然導致服務質素下降"],"a":0,"note":"標準化流程減少錯誤及重複工作,節省人力時間成本,故有助降低成本。"},{"q":"為何大型酒店集團傾向把旗下各酒店的PMS「整合成企業系統」?","opts":["有助集團層面掌握各酒店的整體營運數據,作出更全面的管理決策","整合系統必然導致管理層無法掌握個別酒店的營運狀況","各酒店的PMS整合與集團管理決策完全無關","整合系統只會增加管理上的複雜程度而沒有任何好處"],"a":0,"note":"整合系統有助集團層面掌握整體營運數據,作出更全面的管理決策。"},{"q":"為何PMS的「多語言及多貨幣計算」功能對國際連鎖酒店特別重要?","opts":["國際連鎖酒店服務來自不同地區的住客,需要處理不同語言及貨幣的交易","多語言多貨幣功能只對本地小型酒店有意義","國際連鎖酒店的住客必然只使用單一語言及貨幣","此功能與服務國際旅客的需要完全無關"],"a":0,"note":"國際連鎖酒店服務不同地區住客,需要多語言多貨幣功能配合交易需要。"},{"q":"為何PMS具備「培訓模式」對新入職員工特別有用?","opts":["讓新員工可在不影響實際運作數據的情況下,熟習系統操作","培訓模式必然會影響及干擾實際的運作數據","新入職員工不需要任何形式的系統培訓","培訓模式與員工的系統操作能力完全無關"],"a":0,"note":"培訓模式讓新員工可在不影響實際數據下熟習系統操作,提升培訓成效。"},{"q":"以下何者最能總結PMS「品牌建立」功能與「服務品質監控」之間的關係?","opts":["透過PMS訂立及監控服務指標,有助確保品牌形象在各方面維持一致的高水平","品牌建立與服務品質監控是兩個完全獨立且無關的概念","PMS只能記錄數據,無法用於任何品質監控的用途","服務品質監控純粹是人力資源部的獨立職責,與PMS無關"],"a":0,"note":"透過PMS訂立監控服務指標,有助確保品牌形象在各方面維持一致高水平。"},{"q":"以下何者最能總結PMS涵蓋前堂、管家、餐飲、財務四大部門子系統的整體設計理念?","opts":["透過整合各部門的核心運作資料,建立一個能全面支援酒店日常營運的中央系統","四大部門的子系統完全獨立運作,彼此毫無任何資料串連","PMS只服務財務部,其餘部門的子系統純屬虛設","各部門子系統的設計理念完全沒有任何共通之處"],"a":0,"note":"整合各部門核心運作資料,建立全面支援酒店營運的中央系統,是PMS的設計理念。"},{"q":"以下何者最能總結PMS對現代酒店管理的整體價值?","opts":["透過資訊科技整合各部門運作,提升效率服務質素並降低成本,是現代酒店管理不可或缺的工具","PMS純粹是可有可無的行政輔助工具,對酒店管理沒有實質價值","現代酒店管理完全不需要依賴任何電腦系統","PMS的價值只限於財務部門,對其他部門沒有任何實際幫助"],"a":0,"note":"PMS整合各部門運作提升效率質素並降低成本,是現代酒店管理不可或缺的工具。"},{"q":"若前堂部的電腦訂位系統與管家部的客房管理系統之間出現資料不同步,可能導致甚麼問題?","opts":["可能將已入住的客房誤標示為可售,或延誤為新入住客人分配合適房間","兩系統之間的資料同步與客房分配的準確性完全無關","資料不同步只會影響財務部,不影響客房分配","客房分配的準確性完全不受任何系統資料同步的影響"],"a":0,"note":"資料不同步可能令已入住客房被誤標示可售,或延誤分配新客房間。"},{"q":"為何PMS的「會計系統」需要處理「結算及支付回佣」這項功能?","opts":["酒店透過旅行代理商及GDS等渠道銷售客房,須按協議定期結算並支付相應的回佣","酒店的客房銷售完全不涉及任何中介渠道,不需處理回佣事宜","結算回佣純粹是可有可無的行政程序,沒有實質必要","回佣的結算與酒店的銷售渠道完全無關"],"a":0,"note":"酒店透過代理商GDS等渠道銷售客房,須按協議定期結算支付回佣。"},{"q":"一間酒店透過PMS的數據分析,發現某類房型的入住率持續偏低,這反映PMS哪方面的價值?","opts":["提供各類數據和分析報告,協助管理層及時發現問題並調整策略","純粹的多語言多貨幣計算功能","純粹的培訓模式功能","與數據分析報告的提供完全無關"],"a":0,"note":"提供數據分析報告讓管理層及時發現入住率偏低等問題並調整策略。"},{"q":"為何「用品管理系統」需要與「後勤採購程序」連接?","opts":["確保客房用品的存量得到適時監察及補充,避免出現用品短缺影響服務的情況","用品管理與後勤採購程序完全是兩個獨立且無關的範疇","後勤採購程序完全不需要參考任何用品存量的資料","用品短缺與客房服務質素完全沒有任何關聯"],"a":0,"note":"連接後勤採購程序確保用品存量得到適時監察補充,避免短缺影響服務。"},{"q":"若一間酒店的PMS系統發生故障,可能對哪些部門的日常運作造成即時影響?","opts":["前堂、管家、餐飲及財務等多個部門的日常運作均可能受到影響","只有財務部的運作會受到影響,其他部門完全不受影響","PMS故障完全不會影響任何部門的日常運作","只有前堂部的運作會受到影響,其他部門完全不受影響"],"a":0,"note":"PMS故障可能同時影響前堂管家餐飲財務等多個部門,因各部門均依賴PMS運作。"},{"q":"為何酒店在選擇PMS供應商時,需要考慮系統與「餐飲」及「財務」等其他子系統的兼容性?","opts":["確保各部門子系統之間的資料能夠順暢串連,發揮PMS作為中央系統的整合效益","各子系統之間的兼容性與PMS的整合效益完全無關","酒店應選擇完全獨立不兼容的子系統以策安全","兼容性的考慮純粹是次要因素,沒有實際影響"],"a":0,"note":"考慮兼容性確保各子系統資料順暢串連,發揮PMS作為中央系統的整合效益。"},{"q":"以下何者最能說明PMS「封鎖客房」功能對客房分配的實際作用?","opts":["當客房需要維修保養或已被特定用途預留時,系統能防止該房間被誤性分配給其他客人","封鎖客房功能與客房分配的準確性完全無關","封鎖客房功能只能用於已售出的客房,不能用於維修中的客房","客房一旦被封鎖便永久不能再被系統識別或使用"],"a":0,"note":"封鎖客房功能防止需要維修或已預留的房間被誤性分配給其他客人。"},{"q":"為何有意見認為,PMS的投資雖然需要一定成本,但長遠而言物有所值?","opts":["透過提高效率減少錯誤及降低人手需求所帶來的長遠節省,通常能抵銷系統的建置及維護成本","PMS的投資成本必然遠高於其帶來的長遠效益","PMS系統一旦建置便永遠不需要任何後續維護成本","投資PMS對酒店的長遠營運效益完全沒有任何幫助"],"a":0,"note":"提高效率減少錯誤降低人手需求帶來的長遠節省,通常能抵銷系統建置維護成本。"},{"q":"若一間酒店未有採用PMS,純粹依賴人手記錄各部門資料,可能面臨甚麼挑戰?","opts":["各部門之間的資料傳遞及更新可能出現延誤或錯誤,難以達到PMS所能提供的協調效率","純粹依賴人手記錄反而必然比使用PMS更有效率","各部門資料的傳遞及更新完全不會受到人手記錄方式的影響","不採用PMS對酒店的日常營運完全沒有任何實質挑戰"],"a":0,"note":"純粹依賴人手記錄,各部門資料傳遞更新可能延誤出錯,難以達到PMS的協調效率。"},{"q":"以下何者最能總結PMS「六大重要性」(協調各部門運作、提高服務水平、其他功能、運作標準化、品牌建立、節省營運成本)之間的關係?","opts":["六者互相關聯,共同構成PMS提升酒店整體營運效能及服務質素的完整價值","六者完全獨立,彼此之間沒有任何關聯","只有其中一項重要性才是PMS真正的核心價值","六大重要性之間互相矛盾,無法同時實現"],"a":0,"note":"六大重要性互相關聯,共同構成PMS提升酒店整體營運效能及服務質素的完整價值。"}]},{"n":17,"title":"銷售點系統","tag":"POINT OF SALE SYSTEMS","qs":[{"q":"「銷售點系統」的英文簡稱是?","opts":["POS","PMS","GDS","OTA"],"a":0,"note":"銷售點系統的英文簡稱是POS(Point of Sale)。"},{"q":"電子銷售終端機會被置於甚麼位置?","opts":["餐廳內不同位置,配合不同的服務環節","純粹只設於收銀櫃檯一個位置","純粹只設於廚房一個位置","純粹只設於餐廳入口一個位置"],"a":0,"note":"電子銷售終端機置於餐廳不同位置,配合不同服務環節。"},{"q":"「樓面點餐」用的POS終端機大多放在哪裡附近?","opts":["餐具存放處","純粹放在廚房入口","純粹放在餐廳大門","純粹放在收銀櫃檯正中央"],"a":0,"note":"樓面的POS終端機大多放在餐具存放處附近。"},{"q":"「樓面點餐」的POS終端機用於輸入甚麼資料?","opts":["客人訂菜資料、桌號及烹調要求","純粹輸入客人的信用卡資料","純粹輸入員工的更表排班","純粹輸入食材的採購清單"],"a":0,"note":"樓面點餐的POS用於輸入訂菜資料桌號及烹調要求。"},{"q":"侍應輸入訂菜資料後,數據會即時傳到哪裡?","opts":["廚房及收銀櫃檯","純粹只傳到廚房而不傳到收銀櫃檯","純粹只傳到收銀櫃檯而不傳到廚房","純粹儲存在終端機內而不作任何傳送"],"a":0,"note":"輸入的訂菜數據會即時傳到廚房及收銀櫃檯。"},{"q":"若同桌客人有加單,POS系統會如何處理?","opts":["也可即時更新紀錄","必須待整桌用餐完畢後才能加單","加單資料不會即時更新至廚房及收銀","與加單的處理完全無關"],"a":0,"note":"同桌客人若有加單,POS系統也可即時更新記錄。"},{"q":"侍應完成輸入訂菜資料後,通常會怎樣做?","opts":["列印紀錄交回該桌客人","直接刪除輸入的資料而不作任何記錄","把紀錄交給廚房而不交給客人","把紀錄交給下一桌客人"],"a":0,"note":"侍應完成輸入後,會列印紀錄交回該桌客人以作確認。"},{"q":"「廚房出菜」環節中,POS透過甚麼讓廚房知悉製餐資料?","opts":["顯示屏","純粹透過紙本傳送","純粹透過口頭傳達而不使用任何電子設備","純粹透過電話通知"],"a":0,"note":"POS透過顯示屏讓廚房知悉製餐資料。"},{"q":"「廚房出菜」環節中,菜式的食材資料與甚麼連結更新?","opts":["庫存紀錄","純粹與員工的更表連結","純粹與客人的會員積分連結","與庫存紀錄的更新完全無關"],"a":0,"note":"菜式食材資料與庫存紀錄連結,並隨出菜更新。"},{"q":"「櫃檯結帳」環節中,客人用餐完畢後可以怎樣?","opts":["在最短時間結賬","必須等候較長時間才能完成結賬","結賬過程必須經過多重人手核對才能完成","與結賬速度的提升完全無關"],"a":0,"note":"客人用餐完畢後可在最短時間內完成結賬。"},{"q":"若是酒店房客在餐廳用餐,其餐費可以如何處理?","opts":["歸入客房賬內,退房時才一併結算","必須即時以現金結清而不可歸入房賬","餐費與客房賬目完全獨立,不能互通","必須先致電前堂部確認才能記賬"],"a":0,"note":"房客餐費可歸入客房賬內,待退房時才一併結算。"},{"q":"客人結賬後,餐廳可以怎樣做?","opts":["立即安排新客入座","必須待該餐桌清潔完畢後至少一小時才能安排新客","不可在同一天內再安排任何新客入座該餐桌","與新客入座的安排速度完全無關"],"a":0,"note":"客人結賬後,餐廳可立即安排新客入座,提高翻枱效率。"},{"q":"「現場座位管理」功能會顯示甚麼?","opts":["使用中或空置的餐桌","純粹顯示餐廳的營業時間","純粹顯示餐廳的今日菜單","純粹顯示員工的排班表"],"a":0,"note":"現場座位管理功能會顯示使用中或空置的餐桌狀況。"},{"q":"餐廳可於候餐區設置甚麼,提供輪候號碼?","opts":["顯示屏","純粹設置一本紙本登記冊","純粹依賴員工口頭通知","純粹依賴客人自行估計等候時間"],"a":0,"note":"餐廳可於候餐區設置顯示屏,提供輪候號碼。"},{"q":"候餐區的顯示屏有何作用?","opts":["讓等候顧客知悉輪候情況","純粹用作播放廣告宣傳片段","純粹用作顯示餐廳的裝修設計","與輪候情況的顯示完全無關"],"a":0,"note":"候餐區顯示屏讓等候顧客知悉輪候情況。"},{"q":"侍應除了固定式POS終端機外,還可使用甚麼工具點餐?","opts":["手提式點菜機","純粹只能使用紙筆記錄","純粹只能依賴記憶而不使用任何工具","純粹只能使用客人自己的手機"],"a":0,"note":"侍應可用隨身攜帶的手提式點菜機直接輸入菜單。"},{"q":"使用手提式點菜機時,侍應應如何確保輸入無誤?","opts":["口頭覆述給客人一遍,確保無誤後便送出資料","直接送出資料而不作任何核實","要求客人自行檢查點菜機的螢幕內容","與輸入資料的核實完全無關"],"a":0,"note":"侍應應口頭覆述訂單給客人,確保無誤後才送出資料。"},{"q":"手提式點菜機的資料如何傳送至廚房及收銀櫃檯?","opts":["經無線網絡傳送","必須以人手把點菜機送到廚房才能傳送","必須先返回固定式終端機重新輸入才能傳送","純粹透過口頭通知傳送"],"a":0,"note":"手提式點菜機的資料經無線網絡傳至廚房及收銀櫃檯。"},{"q":"使用手提式點菜機的好處之一是?","opts":["可以避免侍應輸入錯誤的問題","必然增加侍應輸入錯誤的機會","與減少輸入錯誤完全無關","只能用於固定座位的點餐,不能隨身攜帶"],"a":0,"note":"手提式點菜機的好處之一是可避免侍應輸入錯誤的問題。"},{"q":"使用手提式點菜機的另一好處是?","opts":["減省侍應處理時間","必然增加侍應的處理時間","與處理時間的長短完全無關","只對廚房有好處,對侍應沒有任何幫助"],"a":0,"note":"手提式點菜機的好處還包括減省侍應的處理時間。"},{"q":"使用手提式點菜機對人手安排有何影響?","opts":["可減少侍應數目,節省成本","必然需要增加更多侍應人手","與侍應人手的安排完全無關","只能減少廚房人手,不影響侍應人手"],"a":0,"note":"使用手提式點菜機可減少所需侍應數目,節省人力成本。"},{"q":"以下何者屬於「樓面點餐」POS終端機的功能?","opts":["輸入客人訂菜資料及桌號","顯示使用中或空置的餐桌","總結住客的房間消費賬目","提供餐廳的輪候號碼"],"a":0,"note":"輸入訂菜資料及桌號屬樓面點餐POS終端機的功能。"},{"q":"以下何者屬於「廚房出菜」環節POS系統的功能?","opts":["讓廚房透過顯示屏知悉製餐資料","輸入客人的桌號及烹調要求","處理客人用餐後的結賬","顯示候餐區的輪候號碼"],"a":0,"note":"讓廚房透過顯示屏知悉製餐資料屬廚房出菜環節的功能。"},{"q":"以下何者屬於「櫃檯結帳」環節POS系統的功能?","opts":["房客餐費可歸入客房賬內一併結算","輸入客人的訂菜資料","顯示廚房的製餐進度","提供候餐區的輪候號碼"],"a":0,"note":"房客餐費歸入客房賬內一併結算屬櫃檯結帳環節的功能。"},{"q":"以下何者屬於「現場座位管理」的功能?","opts":["顯示餐桌使用中或空置的狀態","輸入客人的訂菜資料","處理客人的結賬事宜","連結菜式食材與庫存紀錄"],"a":0,"note":"顯示餐桌使用中或空置狀態屬現場座位管理的功能。"},{"q":"為何樓面POS終端機大多設於「餐具存放處附近」?","opts":["方便侍應在輸入訂單後,同時就近取用餐具準備上菜","餐具存放處與訂單輸入的位置安排完全無關","餐具存放處純粹用作裝飾,與POS終端機的擺放無關","POS終端機的擺放位置與服務流程完全無關"],"a":0,"note":"設於餐具存放處附近,方便侍應輸入訂單後就近取用餐具準備服務。"},{"q":"為何訂菜資料需要「即時傳到廚房及收銀櫃檯」?","opts":["確保廚房能盡快開始製作,同時讓收銀能同步掌握賬單資料","即時傳送與廚房的製作效率完全無關","收銀櫃檯不需要即時掌握任何賬單資料","訂菜資料應延遲數小時才傳送以方便核對"],"a":0,"note":"即時傳送確保廚房盡快製作,同時讓收銀同步掌握賬單資料。"},{"q":"為何「同桌客人加單也能即時更新記錄」對服務流程重要?","opts":["確保新增的菜式能及時傳達至廚房,同時避免賬單出現遺漏","加單資料是否即時更新與賬單的準確性完全無關","加單記錄應該延遲至結賬時才一併處理","即時更新記
