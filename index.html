a":0,"note":"應急照明系統採用防火物料製造。"},{"q":"應急照明系統如何運作?","opts":["安裝在固定位置,緊急時自行啟動","需要人手每次手動開啟","只在停電超過一小時後才啟動","與緊急啟動機制無關"],"a":0,"note":"應急照明系統安裝於固定位置並在緊急時自行啟動。"},{"q":"若電力中斷,應急照明系統的電池會如何反應?","opts":["在數秒內啟動","需時數小時才能啟動","不會自動啟動,須人手操作","與電池啟動無關"],"a":0,"note":"電力中斷時,應急照明系統電池會在數秒內啟動。"},{"q":"廚房發生油鍋起火(F類火災)時,為何不應直接用水撲救?","opts":["水遇熱油可能令油濺起,使火勢擴大甚至爆炸","用水撲救必然最安全有效","水與油完全不會產生任何反應","F類火災用水撲救是標準做法"],"a":0,"note":"水遇熱油可能令油濺起擴散,使火勢惡化甚至爆炸。"},{"q":"廚房發生小型油鍋起火,較適合使用甚麼工具處理?","opts":["滅火氈覆蓋隔絕空氣","大量清水直接淋灑","沙桶覆蓋起火的油鍋","與滅火工具選擇無關"],"a":0,"note":"小型油鍋起火較適合用滅火氈覆蓋隔絕空氣處理。"},{"q":"若電器或帶電設備起火(E類火災),應注意甚麼?","opts":["須先切斷電源,避免觸電風險,並使用適當滅火方法","應立即用水撲救而不需考慮觸電風險","應忽略電源直接用手撲滅","與電源處理無關"],"a":0,"note":"處理E類火災應先切斷電源以避免觸電風險。"},{"q":"承上題,為何E類火災不應貿然用水撲救?","opts":["水導電,可能令撲救人員觸電","水對電器火警必然最有效","水不會導電,絕對安全","E類火災與觸電風險無關"],"a":0,"note":"水會導電,貿然用水撲救電器火警有觸電風險。"},{"q":"若餐廳地面濺有易燃液體但未起火,可如何預防火警?","opts":["使用沙桶清理,減少引發火災機會","放任不管待其自然蒸發","直接用水沖洗地面而不作其他處理","與預防火警無關"],"a":0,"note":"使用沙桶清理濺落的易燃液體可減少引發火警的機會。"},{"q":"一間餐廳的消防栓及喉轆系統多年未檢查測試,有何風險?","opts":["火警發生時可能無法正常運作,延誤撲救","系統會自動保持完好無需檢查","與撲救效果無關","只影響保險費用而非實際安全"],"a":0,"note":"長期未檢查測試可能令系統在緊急時無法正常運作。"},{"q":"為何消防花灑系統的感應器範圍內「不可有阻隔」?","opts":["阻隔物會妨礙感應器感應熱力及噴灑水花,影響滅火效果","阻隔物有助加強滅火效果","阻隔物與感應器運作完全無關","阻隔物只影響外觀不影響功能"],"a":0,"note":"阻隔物會妨礙感應熱力及噴灑水花,影響滅火效果。"},{"q":"承上題,若花灑感應器被雜物遮擋,可能有何後果?","opts":["未能及時感應火警,延誤自動灑水滅火","滅火效果反而更好","與滅火時效完全無關","感應器會自動移除遮擋物"],"a":0,"note":"感應器被遮擋可能延誤偵測及自動灑水滅火的時效。"},{"q":"為何餐廳須額外設置「應急照明系統」而非只靠一般電燈?","opts":["電力中斷時仍需要照明協助人員疏散或應急,一般電燈會同時失效","一般電燈在任何情況下都不會失效","應急照明系統純粹是裝飾用途","與緊急疏散無關"],"a":0,"note":"電力中斷時一般電燈同時失效,須靠應急照明系統維持照明。"},{"q":"綜合而言,餐廳消防安全設施設計的目的是?","opts":["及早偵測及撲滅火警,保障員工及顧客安全","純粹為符合法例要求的表面工夫","與員工及顧客安全無關","只為降低保險費用"],"a":0,"note":"消防設施設計的核心目的是及早偵測撲滅火警,保障人身安全。"},{"q":"以下何者屬於「預防及示警性」消防設施?","opts":["手控火警警報系統","滅火筒","滅火氈","自動噴灑系統"],"a":0,"note":"手控火警警報系統主要功能是及早示警。"},{"q":"以下何者屬於「撲救性」消防設施?","opts":["滅火筒、滅火氈、自動噴灑系統","手控火警警報系統","緊急照明系統","與撲救無關的裝飾燈"],"a":0,"note":"滅火筒滅火氈及自動噴灑系統均屬撲救性設施。"},{"q":"為何六類火災分類對餐廳員工有實際意義?","opts":["讓員工根據不同火源選用正確的滅火方法,提升應變能力","純粹是學術分類,對實際工作沒有意義","與員工培訓完全無關","只有消防員需要認識這分類"],"a":0,"note":"分類讓員工根據火源選用正確方法,提升應變能力。"},{"q":"若廚房員工誤用不適當方法處理F類火災,可能有何後果?","opts":["火勢可能不減反增,甚至引致爆炸或人員受傷","火勢必然會自動熄滅","與處理方法是否恰當無關","只會造成輕微的財物損失"],"a":0,"note":"誤用不當方法處理油鍋火警可能令火勢惡化甚至爆炸傷人。"},{"q":"為何燃燒需要「連鎖反應」才能持續?","opts":["燃燒釋出的熱力會令可燃物持續釋出物質並與氧氣反應,形成循環","連鎖反應與燃燒的持續性無關","連鎖反應只在滅火時才會出現","燃燒不需要連鎖反應也能自然持續"],"a":0,"note":"連鎖反應令燃燒過程持續循環進行。"},{"q":"若成功移除「氧氣」這一燃燒要素,理論上會有何結果?","opts":["燃燒無法持續,火勢會熄滅","燃燒會更加猛烈","與滅火完全無關","只會令燃燒轉為悶燒但不會熄滅"],"a":0,"note":"移除氧氣後燃燒反應無法持續,火勢會熄滅。"},{"q":"滅火氈正是利用移除哪項燃燒要素滅火?","opts":["氧氣(隔絕空氣)","可燃物","連鎖反應","與燃燒要素移除無關"],"a":0,"note":"滅火氈透過隔絕空氣移除氧氣要素達到滅火效果。"},{"q":"沙桶處理小火,主要透過移除哪項燃燒要素滅火?","opts":["氧氣(覆蓋隔絕空氣)","可燃物","溫度以外的其他要素","與燃燒要素移除完全無關"],"a":0,"note":"沙桶覆蓋火源隔絕空氣,主要移除氧氣要素滅火。"},{"q":"以下何者最能總結「火災分類」制度存在的意義?","opts":["不同火源性質各異,分類有助選擇最有效及安全的滅火方法","分類制度純粹為方便消防員填寫報告","分類與滅火方法的選擇沒有關聯","所有火災都可用同一方法撲滅,分類意義不大"],"a":0,"note":"分類制度有助針對不同火源性質選擇最有效安全的滅火方法。"},{"q":"以下何者最能總結餐廳消防安全管理的核心原則?","opts":["結合預防措施、完善設備及員工培訓,將火災風險及損失減至最低","只需購買足夠的滅火筒即可,不需其他措施","消防安全管理只是法例上的形式要求","火災風險無法透過管理措施降低"],"a":0,"note":"消防安全管理核心在於結合預防設備及培訓,減低風險及損失。"}]},{"n":16,"title":"食物污染的種類","tag":"FOOD CONTAMINATION","qs":[{"q":"教材將食物污染分為哪三大類?","opts":["細菌性、化學性、物理性","只有細菌性及化學性","只有物理性及化學性","只有細菌性及物理性"],"a":0,"note":"食物污染分為細菌性化學性及物理性三大類。"},{"q":"細菌性食物中毒在「貯存食物方面」的成因包括?","opts":["熟食被污染、熟食貯存不當","食物添加劑使用不當","容器材料釋出重金屬","異物混入食品"],"a":0,"note":"貯存方面成因包括熟食被污染及貯存不當。"},{"q":"細菌性食物中毒在「配製食物方面」的成因包括哪些?","opts":["食物未經徹底煮熟、熟食翻熱不足等","農藥殘餘超標","化學清潔劑污染","容器釋出有害物質"],"a":0,"note":"配製方面成因包括未徹底煮熟及翻熱不足等。"},{"q":"「熟食翻熱不足」為何會導致食物中毒?","opts":["未能徹底消滅細菌,細菌仍可能存活繁殖","翻熱只影響食物口感,與細菌無關","翻熱不足反而能殺滅所有細菌","與食物中毒風險無關"],"a":0,"note":"翻熱不足未能徹底消滅細菌,存活細菌可能引致中毒。"},{"q":"「冷藏食物於烹煮前未徹底解凍」有何風險?","opts":["內部溫度不均,烹煮未能徹底消滅細菌","解凍與否對烹煮效果完全沒有影響","未解凍烹煮反而更安全","只會影響食物賣相"],"a":0,"note":"未徹底解凍會令烹煮時內部溫度不均,未能徹底滅菌。"},{"q":"「過早配製食物又貯存不當」有何風險?","opts":["食物在不安全溫度下存放過久,增加細菌滋生機會","與細菌滋生完全無關","可延長食物的保存期","只會影響食物外觀"],"a":0,"note":"過早配製又貯存不當會令食物在危險溫度存放過久。"},{"q":"使用「來源不安全的食物材料」有何風險?","opts":["食材本身可能已受污染,增加 洗淨及浸泡蔬菜」會構成風險?","opts":["未能清除蔬菜表面殘餘的農藥","清水洗淨對去除農藥完全沒有作用","蔬菜表面不會殘留任何農藥","與農藥殘留風險無關"],"a":0,"note":"未徹底洗淨浸泡未能清除蔬菜表面殘餘農藥。"},{"q":"「化學清潔劑」為何可能引致食物中毒?","opts":["食肆每天使用大量清潔劑清潔工具食具,處理不當可能污染食物","清潔劑與食物安全完全無關","清潔劑只會影響餐具外觀","清潔劑使用越多越能保障食物安全"],"a":0,"note":"處理不當的清潔劑殘留可能污染食物造成中毒。"},{"q":"「容器材料」造成化學性污染的原因是?","opts":["不合規格的物料與食物接觸或遇熱時可能釋出重金屬或有害物質","所有容器物料均絕對安全","容器材料與食物安全完全無關","只有金屬容器才會造成污染"],"a":0,"note":"不合規格容器物料遇熱或接觸食物可能釋出有害物質。"},{"q":"不適合盛載食物的容器或其印紋墨料,可能釋出甚麼?","opts":["重金屬物質","純天然礦物質而無害","對人體有益的營養素","不會釋出任何物質"],"a":0,"note":"不適合的容器印紋墨料可能釋出重金屬物質。"},{"q":"「生化毒素」是指甚麼?","opts":["來自生物的有毒物質","純粹人工合成的化學物質","食物包裝釋出的物質","農藥殘留物質"],"a":0,"note":"生化毒素指來自生物本身的有毒物質。"},{"q":"生化毒素進入人體後可能導致甚麼?","opts":["食物中毒","必然完全無害","增強免疫力","與健康完全無關"],"a":0,"note":"生化毒素進入人體後可能導致食物中毒。"},{"q":"生化毒素的來源包括哪幾種情況?","opts":["動物吃了有毒物質、動物本身含有毒素、植物本身含有毒素","只有工廠排放的化學物質","只有加工過程中產生的物質","只有人工添加劑"],"a":0,"note":"生化毒素來源包括動物攝入毒物或動植物本身含毒素。"},{"q":"物理性食物污染的定義是?","opts":["食物在製作及銷售過程中,混入並非食物的材料和雜質","純粹指食物過期腐壞","指細菌感染食物","指食物受化學物質污染"],"a":0,"note":"物理性污染指食物混入非食物材料和雜質。"},{"q":"物理性食物污染是否一定會對顧客造成傷害?","opts":["不一定會造成傷害,但會打擊食肆形象","必然會對顧客造成嚴重傷害","完全不會有任何負面影響","只會影響食物價格"],"a":0,"note":"物理性污染不一定傷害健康,但會打擊食肆形象。"},{"q":"物理性食物污染的成因之一是?","opts":["製作和處理食品時異物被混進食品當中","食材本身天然含有的成分","食物添加劑的正常使用","農藥殘留超標"],"a":0,"note":"製作處理時異物混入是物理性污染的成因之一。"},{"q":"物理性食物污染的另一成因是?","opts":["儲存及運輸食物期間異物掉進食品中","食物添加劑使用過量","農藥殘留超標","細菌滋生繁殖"],"a":0,"note":"儲存運輸期間異物掉入食品中也是物理性污染的成因。"},{"q":"以下何者屬於細菌性食物中毒的成因?","opts":["熟食貯存不當","殘餘農藥","異物混入食品","容器釋出重金屬"],"a":0,"note":"熟食貯存不當屬於細菌性食物中毒的成因。"},{"q":"以下何者屬於化學性食物中毒的成因?","opts":["殘餘農藥","熟食貯存不當","異物混入食品","傳染病帶菌者"],"a":0,"note":"殘餘農藥屬於化學性食物中毒的成因。"},{"q":"以下何者屬於物理性食物污染的成因?","opts":["製作時異物混入食品","熟食翻熱不足","殘餘農藥","化學清潔劑污染"],"a":0,"note":"製作時異物混入食品屬於物理性食物污染的成因。"},{"q":"廚師處理食物後未徹底解凍便烹煮冷藏肉類,屬於哪類食物中毒的風險?","opts":["細菌性","化學性","物理性","包裝性(非教材分類)"],"a":0,"note":"未徹底解凍烹煮屬於細菌性食物中毒的風險。"},{"q":"蔬菜農戶未遵守農藥停用期規定,提早收成出售,屬於哪類食物中毒的風險?","opts":["化學性","細菌性","物理性","包裝性(非教材分類)"],"a":0,"note":"違反農藥停用期規定屬於化學性食物中毒的風險。"},{"q":"食物中發現一小片包裝物料碎片,屬於哪類食物污染?","opts":["物理性","細菌性","化學性","生理性(非教材分類)"],"a":0,"note":"包裝物料碎片混入食物屬於物理性食物污染。"},{"q":"員工帶病上班並直接處理食物,屬於哪類食物中毒的風險因素?","opts":["細菌性","化學性","物理性","包裝性(非教材分類)"],"a":0,"note":"帶病員工處理食物屬於細菌性食物中毒的風險。"},{"q":"餐廳使用不合規格的膠容器盛載熱食,導致化學物釋出,屬於哪類食物中毒風險?","opts":["化學性","細菌性","物理性","生理性(非教材分類)"],"a":0,"note":"容器釋出化學物質屬於化學性食物中毒風險。"},{"q":"顧客在菜式中發現一小段頭髮,屬於哪類食物污染?","opts":["物理性","細菌性","化學性","包裝性(非教材分類)"],"a":0,"note":"頭髮混入菜式屬於物理性食物污染。"},{"q":"廚房將剩餘食物長時間存放於室溫下再翻熱不足便供應,屬於哪類食物中毒的風險?","opts":["細菌性","化學性","物理性","包裝性(非教材分類)"],"a":0,"note":"剩食於危險溫度存放並翻熱不足屬於細菌性風險。"},{"q":"河豚含有天然毒素,誤食可能中毒,這屬於哪一類化學性中毒來源?","opts":["生化毒素(動物本身含有毒素)","食物添加劑","殘餘農藥","容器材料"],"a":0,"note":"河豚天然毒素屬於生化毒素中「動物本身含有毒素」的例子。"},{"q":"某些菇類植物本身含有毒素,誤食中毒,這屬於哪一類化學性中毒來源?","opts":["生化毒素(植物本身含有毒素)","食物添加劑","化學清潔劑","容器材料"],"a":0,"note":"有毒菇類屬於生化毒素中「植物本身含有毒素」的例子。"},{"q":"為何「化學性食物中毒」被認為特別棘手,難以透過烹調方式解決?","opts":["因為高溫烹煮或低溫冷藏都不能消除化學污染物","因為化學性中毒的症狀必然很輕微","因為化學性中毒可透過任何烹調方式輕易消除","與烹調方式完全無關"],"a":0,"note":"化學污染物無法單靠高溫烹煮或低溫冷藏消除。"},{"q":"為何食物添加劑本身「現時包裝食品普遍使用」,卻仍存在風險?","opts":["若使用不合法或超標的添加劑,仍可能危害健康","合法添加劑必然完全無害,毫無風險","添加劑的使用與健康風險完全無關","只要是添加劑就必然對人體有益"],"a":0,"note":"即使普遍使用,不合法或超標添加劑仍有健康風險。"},{"q":"為何「傳染病感染或帶菌者」對食肆是重大風險?","opts":["可能透過從業員將病原體傳播至大量食物及顧客","只會影響從業員個人健康,不涉及顧客","與食物處理流程完全無關","傳染病帶菌者對食物安全沒有任何影響"],"a":0,"note":"帶菌從業員可能將病原體大規模傳播至食物及顧客。"},{"q":"承上題,食肆應如何管理從業員以降低此風險?","opts":["要求患病或帶菌員工不應處理食物,並定期進行健康監察","讓所有員工不論健康狀況繼續如常工作","完全不需理會員工健康狀況","只需要求員工戴口罩即可,不需其他措施"],"a":0,"note":"應要求患病帶菌員工不處理食物並定期健康監察。"},{"q":"為何「物理性污染」即使不一定傷害顧客健康,仍會被視為嚴重問題?","opts":["會嚴重打擊食肆的形象及顧客信心","物理性污染其實完全不算問題","物理性污染必然比化學性污染嚴重","與食肆聲譽完全無關"],"a":0,"note":"物理性污染雖未必傷害健康,但會嚴重打擊食肆形象。"},{"q":"一間食肆的清潔劑與食材儲存於同一貨架,可能有何風險?","opts":["清潔劑意外污染食物,造成化學性食物中毒","完全沒有任何風險","有助食材保持新鮮","只會影響食材外觀而非安全"],"a":0,"note":"清潔劑與食材混放可能導致意外污染,造成化學性中毒。"},{"q":"為何餐廳採購蔬菜時要考慮供應商是否遵守農藥使用規定?","opts":["減少殘餘農藥造成化學性食物中毒的風險","與食物安全完全無關","只是為了降低採購成本","法例並無相關規定,純屬個人選擇"],"a":0,"note":"確保供應商遵守農藥規定可減少化學性中毒風險。"},{"q":"以下何者最能總結細菌性食物中毒的成因範圍?","opts":["涵蓋貯存、配製及從業員習慣三大方面","只涉及食材採購一個環節","只涉及包裝物料一個環節","與從業員衞生習慣完全無關"],"a":0,"note":"細菌性食物中毒成因涵蓋貯存配製及從業員習慣三方面。"},{"q":"以下何者最能總結化學性食物中毒的成因範圍?","opts":["涵蓋食物添加劑、農藥獸藥、清潔劑、容器材料及生化毒素","只涉及細菌感染","只涉及物理性異物混入","只涉及食物過期"],"a":0,"note":"化學性食物中毒成因涵蓋添加劑農藥清潔劑容器及生化毒素。"},{"q":"以下何者最能總結物理性食物污染的特點?","opts":["涉及非食物雜質混入,主要影響觀感及食肆形象多於健康傷害","必然對健康造成嚴重傷害","與食肆形象完全無關","只涉及化學物質的污染"],"a":0,"note":"物理性污染主要涉及雜質混入,影響觀感形象多於健康。"},{"q":"為何教材特別強調「4℃至60℃」這個溫度區間與剩餘食物的關係?","opts":["此溫度範圍是細菌滋生的危險溫度帶,剩食存放過久風險增加","此溫度範圍其實最安全,完全沒有風險","溫度與細菌滋生完全無關","只有超過100℃才會有食物安全風險"],"a":0,"note":"4℃至60℃是細菌滋生的危險溫度帶,剩食存放需特別留意。"},{"q":"若食肆同時忽略貯存、配製及從業員衞生三方面,可能導致甚麼後果?","opts":["大幅提高細菌性食物中毒或疾病傳播的風險","完全不會有任何負面影響","反而能降低食物中毒風險","只會影響食物口感,不影響安全"],"a":0,"note":"三方面同時忽略會大幅提高細菌性中毒或疾病傳播風險。"},{"q":"為何容器材料釋出的重金屬物質被歸類為「化學性」而非「物理性」污染?","opts":["因涉及化學物質釋出並可能被人體吸收,而非單純異物混入","因為重金屬屬於固體異物,理應歸類為物理性","兩種分類方式完全沒有分別","重金屬物質不會對人體造成任何影響"],"a":0,"note":"重金屬屬於化學物質釋出並可能被吸收,故歸類為化學性污染。"},{"q":"若顧客投訴菜式中有金屬碎屑,食肆應如何分類此事故作出跟進?","opts":["歸類為物理性食物污染,並檢視製作及儲存流程找出異物來源","歸類為化學性污染,無需檢視製作流程","忽略投訴,因為金屬碎屑不會造成傷害","歸類為細菌性污染並要求員工洗手"],"a":0,"note":"金屬碎屑屬異物混入,應歸類為物理性污染並追查來源。"},{"q":"綜合而言,防止細菌性、化學性及物理性食物污染,對食肆有何意義?","opts":["保障顧客健康及食肆聲譽,是食物安全管理的核心工作","純粹是應付政府巡查的表面工夫","與食肆的長遠經營沒有關聯","只需處理其中一類污染即已足夠"],"a":0,"note":"防止三類污染是保障顧客健康及食肆聲譽的核心工作。"},{"q":"以下何者最能總結食物污染三大類別劃分的意義?","opts":["有助食肆針對不同污染來源制定相應的預防及處理措施","純粹是學術上的分類,對實務工作沒有幫助","三類污染的預防方法其實完全相同,分類並無意義","分類只對政府部門有意義,對食肆經營無關"],"a":0,"note":"分類有助食肆針對不同污染來源制定相應的預防措施。"}]},{"n":17,"title":"食物安全五要點","tag":"FIVE KEYS TO FOOD SAFETY","qs":[{"q":"「食物安全五要點」包括哪五項?","opts":["精明選擇、保持清潔、生熟分開、煮熟食物、安全溫度","只有精明選擇及安全溫度","只有保持清潔及生熟分開","只有煮熟食物一項"],"a":0,"note":"食物安全五要點包括精明選擇保持清潔生熟分開煮熟食物及安全溫度。"},{"q":"「精明選擇」的意思是?","opts":["透過各種措施選擇安全的原材料","純粹選擇最便宜的食材","選擇包裝最精美的食品","與食材安全無關"],"a":0,"note":"精明選擇指透過各種措施選擇安全的原材料。"},{"q":"「保持清潔」的意思是?","opts":["保持個人衞生,保持飲食場所用具清潔","純粹指清潔地板","只需清潔雙手,其他無需理會","與飲食場所衞生無關"],"a":0,"note":"保持清潔指個人衞生及飲食場所用具的清潔。"},{"q":"「生熟分開」的意思是?","opts":["把生熟食物分開處理","把不同種類的熟食分開處理","把不同顏色的食物分開處理","與交叉污染無關"],"a":0,"note":"生熟分開指把生熟食物分開處理以避免交叉污染。"},{"q":"「煮熟食物」的意思是?","opts":["食物要徹底煮熟","食物只需略為加熱","食物可以不經烹煮直接食用","與烹煮溫度無關"],"a":0,"note":"煮熟食物要求食物須徹底煮熟。"},{"q":"「安全溫度」的意思是?","opts":["以安全的溫度存放和烹調食物","只需注意烹調溫度,不需注意存放溫度","只需注意存放溫度,不需注意烹調溫度","與溫度控制無關"],"a":0,"note":"安全溫度指以安全溫度存放和烹調食物。"},{"q":"選購食材時,應如何「慎選供應商」?","opts":["選擇有牌、信譽良好的供應商","只考慮價格最低的供應商","不需理會供應商是否有牌","隨意選擇任何供應商"],"a":0,"note":"慎選供應商指選擇有牌及信譽良好的供應商。"},{"q":"選購時應如何做到「適量購貨」?","opts":["減少大量存貨","盡量大量囤積食材","購貨數量與食物安全無關","只需按價格決定購買數量"],"a":0,"note":"適量購貨指減少大量存貨,避免存放過久。"},{"q":"選購時不能購買哪些違禁食品?","opts":["中國式魚生、未經批准屠房的鮮肉、從海港採集的介貝類水產動物","任何進口食品","任何本地製造的食品","有牌供應商提供的食品"],"a":0,"note":"不能選購中國式魚生未經批准屠房鮮肉及從海港採集的介貝類水產。"},{"q":"選購安全魚類和肉類食材時,可如何核實?","opts":["要求出示單據或有效衞生證明書","純粹憑外觀判斷而不查證","不需要任何核實程序","只需詢問價格"],"a":0,"note":"可要求供應商出示單據或有效衞生證明書核實安全性。"},{"q":"收貨時應如何驗收貨物品質及安全?","opts":["確保未過保質期、包裝完好、罐頭沒發脹碰凹生銹","只需檢查價格是否正確","只需清點數量,不需檢查品質","不需要任何驗收程序"],"a":0,"note":"驗收時須確保未過保質期包裝完好及罐頭無發脹碰凹生銹。"},{"q":"收貨時對食品溫度有何要求?熱吃食品應在多少度以上?","opts":["60ºC以上","30ºC以上","100ºC以上","無需特定溫度要求"],"a":0,"note":"熱吃食品收貨時應在60ºC以上。"},{"q":"收貨時對食品溫度有何要求?冷凍食品應在多少度以下?","opts":["4ºC以下","20ºC以下","-30ºC以下","無需特定溫度要求"],"a":0,"note":"冷凍食品收貨時應在4ºC以下。"},{"q":"收貨時發現不合格來貨,應如何處理?","opts":["把不合格來貨分隔開","與合格貨物混合存放","直接退回而不作任何記錄","立即棄置而不通知供應商"],"a":0,"note":"發現不合格來貨應把它們分隔開,避免污染其他食物。"},{"q":"食物處所須保留進貨食物單據至少多久?","opts":["60天","7天","1年","不需要保留單據"],"a":0,"note":"進貨食物單據至少須保留60天。"},{"q":"貯存食物時,食物架應離地至少多高?","opts":["30厘米","5厘米","100厘米","可直接放在地上"],"a":0,"note":"食物應存放在離地至少30厘米的食物架上。"},{"q":"貯存時,根莖類蔬果應如何處理?","opts":["與其他食物分開存放","與肉類混合存放","與海鮮混合存放","不需特別分開存放"],"a":0,"note":"根莖類蔬果應與其他食物分開存放。"},{"q":"貯藏魚生的冷藏櫃能否用來存放其他食物?","opts":["不可以","可以,只要清潔乾淨即可","可以,不需任何限制","視乎食物種類而定"],"a":0,"note":"貯藏魚生的冷藏櫃不可用來存放其他食物。"},{"q":"貯存時,生熟及即食食物應如何安排?","opts":["分開存放","混合存放以節省空間","只需分開包裝,可放在同一位置","與交叉污染風險無關"],"a":0,"note":"生熟及即食食物須分開存放,避免交叉污染。"},{"q":"若使用同一雪櫃存放食物,應如何安排上下位置?","opts":["即食熟食在上,生食在下","生食在上,即食熟食在下","上下位置沒有分別","隨意擺放即可"],"a":0,"note":"同一雪櫃存放時應即食熟食在上生食在下,避免生食滴汁污染熟食。"},{"q":"非即時食用的熟食,須存放於甚麼溫度?","opts":["4ºC或以下,或60ºC或以上","室溫即可","10ºC至30ºC之間","100ºC以上"],"a":0,"note":"非即時食用熟食須存放於4ºC或以下或60ºC或以上。"},{"q":"需要冷藏的食物最好貯存在甚麼溫度?","opts":["-18ºC或以下","0ºC左右","10ºC左右","室溫"],"a":0,"note":"需要冷藏的食物最好貯存在-18ºC或以下。"},{"q":"存貨管理應依甚麼原則取用存貨?","opts":["先入先出","先入後出","隨機取用","按食物顏色決定取用次序"],"a":0,"note":"存貨管理應依「先入先出」原則依次取用。"},{"q":"解凍時應選用甚麼方法?","opts":["利用微波爐解凍等適當方法","放在室溫下自然解凍","放在陽光下解凍","與解凍方法選擇無關"],"a":0,"note":"解凍應選用微波爐解凍等適當方法。"},{"q":"解凍時絕對不應怎樣做?","opts":["切勿將食物放在室溫下解凍","切勿使用微波爐解凍","切勿在雪櫃內解凍","切勿記錄解凍時間"],"a":0,"note":"解凍時切勿將食物放在室溫下解凍。"},{"q":"解凍時應如何避免污染其他食物?","opts":["避免解凍時有水滴下污染其他食物","刻意讓解凍水滴到其他食物上","不需理會解凍水滴問題","將解凍中的食物與其他食物疊放"],"a":0,"note":"解凍時應避免水滴下污染其他食物。"},{"q":"解凍後的食物應存放在甚麼溫度直至取用?","opts":["8ºC或以下","室溫","30ºC左右","無需特定溫度控制"],"a":0,"note":"解凍後的食物應存放在8ºC或以下直至取用。"},{"q":"解凍後的食物,能否再冷藏及再解凍?","opts":["不可以,切勿再冷藏及再解凍","可以無限次數地反覆解凍冷藏","只可以再解凍一次","視乎食物種類而定,沒有一致規定"],"a":0,"note":"解凍後的食物切勿再冷藏及再解凍。"},{"q":"配製處理食物時,哪些人員才可進入食物配製區?","opts":["只容許食物處理人員進入","任何員工均可自由進出","只有經理可以進入","顧客也可以自由進出"],"a":0,"note":"食物配製區只容許食物處理人員進入。"},{"q":"配製區域管理上,化學品存放地方應如何安排?","opts":["須與食物處理區分開","可與食材放在同一貨架","無需特別分隔安排","應存放在配製區中央方便取用"],"a":0,"note":"化學品存放地方須與食物處理區分開。"},{"q":"員工在配製食物時,對指甲有何要求?","opts":["不應留長指甲及塗指甲油","指甲長短不受限制","可以塗任何顏色的指甲油","只需定期修剪指甲"],"a":0,"note":"員工不應留長指甲及塗指甲油。"},{"q":"員工應如何避免直接用手接觸食物?","opts":["改用清潔和已消毒的鉗子、鏟或其他食物調配器具","戴上普通手套即可,不需其他措施","直接用手接觸屬正常做法,無需避免","只在處理生食時才需避免"],"a":0,"note":"應使用清潔消毒的器具處理食物,避免直接用手接觸。"},{"q":"員工處理食物時應佩戴甚麼?","opts":["用後即棄的手套和口罩","可重複使用多天的手套","不需佩戴任何防護裝備","只需佩戴口罩,不需手套"],"a":0,"note":"員工處理食物時應佩戴用後即棄的手套和口罩。"},{"q":"若員工手上有傷口,應如何處理?","opts":["用白色的防水膠布覆蓋或戴上手套","無需特別處理,直接繼續工作","只需用普通膠布覆蓋即可","應立即停止一切工作直至傷口痊癒"],"a":0,"note":"手上有傷口應用白色防水膠布覆蓋或戴上手套。"},{"q":"試味用具使用後應如何處理?","opts":["立即清潔和消毒,不可重複使用未經清潔消毒的用具再試味","可重複使用同一用具試味多次而不清潔","直接棄置,不可再使用","用清水沖洗一下即可再用"],"a":0,"note":"試味用具用後應立即清潔消毒,不可重複用未經清潔的用具。"},{"q":"處理生熟食物時,應使用甚麼區分不同用具?","opts":["用不同顏色區分處理生熟食物的設備或用具","使用相同顏色的用具即可,不需區分","只需口頭提醒員工,不需實物區分","與用具顏色管理無關"],"a":0,"note":"應以不同顏色區分處理生熟食物的設備或用具。"},{"q":"處理生吃食物,應在哪個獨立區域及使用甚麼工具?","opts":["獨立區域,並以專用砧板和刀配製","與熟食共用同一區域及工具","可隨意使用任何砧板和刀","不需要獨立區域"],"a":0,"note":"生吃食物應在獨立區域以專用砧板和刀配製。"},{"q":"處理燒味鹵味等熟食的區域,應遠離甚麼?","opts":["遠離魚缸,或 調節,氣溫較溫和。"},{"q":"以下何者最能總結「熱帶氣候」的三個子分類?","opts":["雨林氣候(潮濕)、季風氣候(季節性降雨)、荒漠氣候(乾旱)","地中海型、海洋性、潮濕亞熱帶","苔原、冰帽、高地","乾旱、半乾旱、極地"],"a":0,"note":"熱帶氣候的三個子類分別對應不同降水特徵。"},{"q":"若旅遊業者想在極地氣候地區推廣旅遊,最需要考慮甚麼?","opts":["保暖裝備、安全措施及有限的旅遊季節","炎熱天氣防曬","防洪排水設施","避免使用交通工具"],"a":0,"note":"極地氣候全年寒冷,需特別考慮保暖及安全等因素。"},{"q":"以下何者是判斷「熱帶」與「溫帶」氣候最基本的分別?","opts":["熱帶全年氣溫偏高且無明顯低溫月份,溫帶則有明顯季節變化","兩者降水量必然相同","溫帶必然比熱帶乾旱","熱帶必然沒有雨林"],"a":0,"note":"熱帶全年高溫;溫帶則有較明顯的四季溫差變化。"},{"q":"為何潮濕亞熱帶氣候(如香港)夏季常見颱風?","opts":["夏季受熱帶氣旋及季風系統影響","冬季寒流南下所致","地震活動頻繁所致","純屬巧合,與氣候類型無關"],"a":0,"note":"潮濕亞熱帶地區夏季易受熱帶氣旋及季風影響,常見颱風。"},{"q":"以下哪一種氣候的旅遊淡旺季通常最不明顯?","opts":["熱帶雨林氣候(全年氣溫變化較小)","溫帶氣候","大陸性氣候","極地氣候"],"a":0,"note":"熱帶雨林氣候全年高溫多雨,氣候變化相對較小,淡旺季分野較不明顯。"},{"q":"以下哪一種氣候最適合發展「賞雪」或「滑雪」旅遊產品?","opts":["大陸性氣候或高地氣候(冬季寒冷多雪)","熱帶雨林氣候","乾旱氣候","潮濕亞熱帶氣候"],"a":0,"note":"大陸性氣候及高地氣候冬季寒冷多雪,適合發展滑雪旅遊。"}]},{"n":3,"title":"成功的景點的特性","tag":"SUCCESSFUL ATTRACTIONS","qs":[{"q":"教材列出成功景點的特性一共有多少項?","opts":["六項","五項","四項","七項"],"a":0,"note":"教材列出高品質、真實性、獨特性、吸客能力、活動選擇及可達度高六項特性。"},{"q":"「高品質」這項特性包括甚麼元素?","opts":["外觀、資源保護、顧客主導的營運及友善服務","只限外觀吸引","只限價格便宜","只限規模龐大"],"a":0,"note":"高品質包括外觀、資源保護、顧客主導營運及友善服務。"},{"q":"「高品質」中「顧客主導的營運」是指甚麼?","opts":["景點有適當的指示牌、說明、洗手間、停車場等設施","只由顧客決定景點的營業時間","顧客可自行定價","顧客可自行管理景點"],"a":0,"note":"顧客主導的營運指提供適當指示牌洗手間停車場等設施。"},{"q":"「高品質」中「資源保護」是指?","opts":["景點資源得到恰當維護保養","完全禁止旅客進入景點","只保護歷史建築","與景點營運無關"],"a":0,"note":"資源保護指景點資源得到恰當的維護保養。"},{"q":"「真實性」這項特性是指甚麼?","opts":["景點有原來的色彩和氛圍","景點必須是全新建造的","景點必須免費開放","景點必須有政府資助"],"a":0,"note":"真實性指景點保留原有的色彩和氛圍。"},{"q":"教材指「真實性」是否容易達到?","opts":["不容易,可能只有「舞台真實性」","非常容易達到","所有景點都能輕易做到","真實性與景點成功無關"],"a":0,"note":"教材指真實性不容易達到,可能只有「舞台真實性」。"},{"q":"「舞台真實性」是指甚麼情況?","opts":["景點呈現的並非完全原始,而是為旅客特別設計呈現的體驗","景點完全沒有任何裝飾","景點必須是舞台劇場","景點完全依照歷史原貌,毫無改動"],"a":0,"note":"舞台真實性指為配合旅客體驗而呈現、非百分百原始的狀態。"},{"q":"「獨特性」這項特性強調景點需要?","opts":["有獨特之處","與其他景點完全相同","規模越大越好","價格越平越好"],"a":0,"note":"獨特性強調景點需要有獨特之處以突圍而出。"},{"q":"「吸客能力」這項特性包括哪些內容?","opts":["吸引大批遊客到訪、遊客有機會再來、吸引特定旅客群","只限吸引外國旅客","只限吸引本地旅客","只限一次性到訪"],"a":0,"note":"吸客能力包括吸引大批遊客、重遊機會及吸引特定客群。"},{"q":"成功景點的吸客能力是否包括「遊客重遊」的機會?","opts":["是,遊客有大機會再來","不是,只著重首次到訪","與吸客能力無關","只限外國遊客重遊"],"a":0,"note":"教材指出遊客有大機會再來是吸客能力的重要一環。"},{"q":"「活動選擇」這項特性強調甚麼?","opts":["提供更多活動選擇,增加吸引力","活動種類越少越好","只提供單一活動","活動與吸引力無關"],"a":0,"note":"活動選擇強調提供更多選擇以增加吸引力。"},{"q":"教材形容「活動選擇」豐富的景點為?","opts":["玩之不盡,物有所值","價格昂貴但值得","活動太多令人卻步","與價值無關"],"a":0,"note":"教材形容活動選擇豐富的景點「玩之不盡,物有所值」。"},{"q":"「可達度高」這項特性強調甚麼?","opts":["良好的交通設施及四通八達的接駁交通工具","景點必須位於市中心","景點必須免費入場","景點必須有停車場"],"a":0,"note":"可達度高強調良好交通設施及四通八達的接駁工具。"},{"q":"以下哪一項不屬於教材所列的成功景點特性?","opts":["低廉價格(非教材列出的特性)","高品質","真實性","獨特性"],"a":0,"note":"教材六項特性為高品質、真實性、獨特性、吸客能力、活動選擇及可達度高,無「低廉價格」一項。"},{"q":"教材列出的六項成功景點特性中,不包括以下哪一項?","opts":["名人代言(非教材列出的特性)","吸客能力","活動選擇","可達度高"],"a":0,"note":"「名人代言」不在教材六項特性之列。"},{"q":"一個景點外觀吸引、設施齊全、員工友善,主要體現哪項特性?","opts":["高品質","真實性","獨特性","可達度高"],"a":0,"note":"外觀吸引、設施齊全及友善服務均屬高品質的體現。"},{"q":"一個歷史古蹟盡量保留原貌、原有氛圍,主要體現哪項特性?","opts":["真實性","高品質","吸客能力","活動選擇"],"a":0,"note":"保留原貌氛圍正是真實性的體現。"},{"q":"一個景點是全球獨一無二、無法在其他地方找到相似體驗,主要體現哪項特性?","opts":["獨特性","高品質","可達度高","活動選擇"],"a":0,"note":"獨一無二的體驗正是獨特性的體現。"},{"q":"一個主題公園提供機動遊戲、表演、餐飲及購物等多元活動,主要體現哪項特性?","opts":["活動選擇","真實性","可達度高","吸客能力(部分相關但非主要)"],"a":0,"note":"多元活動選擇正是活動選擇這項特性的體現。"},{"q":"一個景點鄰近地鐵站、設有接駁巴士,主要體現哪項特性?","opts":["可達度高","真實性","獨特性","高品質(部分相關但非主要)"],"a":0,"note":"鄰近地鐵及接駁巴士正是可達度高的體現。"},{"q":"一個景點每年吸引大量回頭客及特定愛好者群體,主要體現哪項特性?","opts":["吸客能力","獨特性","可達度高","活動選擇"],"a":0,"note":"吸引回頭客及特定客群正是吸客能力的體現。"},{"q":"以下何者是「高品質」特性的具體例子?","opts":["景點設有清晰指示牌及乾淨洗手間","景點只限貴賓進入","景點沒有任何設施","景點只在特定季節開放"],"a":0,"note":"清晰指示牌及潔淨設施屬顧客主導營運,是高品質的體現。"},{"q":"以下何者是「真實性」特性面對的挑戰?","opts":["過度商業化可能令景點失去原有氛圍","景點過於獨特","景點交通太方便","景點活動選擇太多"],"a":0,"note":"過度商業化可能削弱景點的原有色彩和氛圍,是真實性的挑戰。"},{"q":"以下何者是「獨特性」不足的後果?","opts":["景點容易被其他同類景點取代","景點交通會變差","景點會自動提升吸客能力","與景點成功與否無關"],"a":0,"note":"缺乏獨特性令景點容易被取代,削弱競爭力。"},{"q":"以下何者是「可達度」不足對景點的影響?","opts":["旅客因交通不便而卻步,減少到訪意欲","景點會自動變得更真實","景點會自動變得更獨特","對景點完全沒有影響"],"a":0,"note":"交通不便會降低旅客到訪意欲,直接影響景點吸引力。"},{"q":"若一個博物館既有豐富歷史文物,又設有咖啡廳、紀念品店及導賞團,體現了哪項特性?","opts":["活動選擇","獨特性","可達度高","真實性"],"a":0,"note":"多元配套設施及活動屬活動選擇的體現。"},{"q":"若一個主題公園每年都有大量家庭旅客重遊,體現了哪項特性?","opts":["吸客能力","真實性","可達度高","活動選擇(部分相關但非主要)"],"a":0,"note":"重遊率高是吸客能力的重要指標。"},{"q":"若一個景點鄰近大型停車場及設有旅遊巴專用上落客區,體現了哪項特性?","opts":["可達度高","真實性","獨特性","吸客能力"],"a":0,"note":"停車場及旅遊巴接駁屬可達度高的體現。"},{"q":"以下哪一項最能總結「高品質」特性?","opts":["外觀好、資源護理妥當、設施貼心、服務友善","景點必須是全新建築","景點必須免費","景點必須位於市中心"],"a":0,"note":"高品質涵蓋外觀資源設施及服務多方面的良好表現。"},{"q":"以下哪一項最能總結「真實性」特性?","opts":["保留原有色彩氛圍,但實現不容易","必須完全人工打造","與旅客體驗無關","只適用於自然景點"],"a":0,"note":"真實性核心是保留原有色彩氛圍,但實踐上有難度。"},{"q":"以下哪一項最能總結「獨特性」特性?","opts":["景點須有其他地方無法複製的特色","景點必須規模龐大","景點必須價格低廉","景點必須交通便利"],"a":0,"note":"獨特性強調無法被複製的特色。"},{"q":"以下哪一項最能總結「吸客能力」特性?","opts":["能吸引大量旅客及促成重遊","只著重首次到訪人數","與旅客體驗無關","只適用於大型景點"],"a":0,"note":"吸客能力著重吸引力及重遊率。"},{"q":"以下哪一項最能總結「活動選擇」特性?","opts":["提供多元活動,令旅客玩之不盡","活動種類越少越專注越好","只需一種活動已足夠","與旅客滿意度無關"],"a":0,"note":"活動選擇著重多元化以提升旅客滿意度。"},{"q":"以下哪一項最能總結「可達度高」特性?","opts":["交通便利及接駁完善","景點必須位於市中心","景點必須免費入場","與旅客體驗無關"],"a":0,"note":"可達度高著重交通及接駁的便利程度。"},{"q":"若某著名景點因過度商業化而流失原有特色,最可能是失去了哪項特性?","opts":["真實性","可達度高","活動選擇","高品質(部分相關但非主要)"],"a":0,"note":"過度商業化直接削弱景點的真實性(原有色彩氛圍)。"},{"q":"若某景點因交通配套不足導致旅客流失,反映欠缺哪項特性?","opts":["可達度高","真實性","獨特性","活動選擇"],"a":0,"note":"交通不便直接反映可達度不足。"},{"q":"若某景點被投訴「和其他地方的景點一模一樣,沒有特色」,反映欠缺哪項特性?","opts":["獨特性","可達度高","高品質","活動選擇"],"a":0,"note":"缺乏特色正是欠缺獨特性的表現。"},{"q":"若某景點設施殘舊、洗手間骯髒,反映欠缺哪項特性?","opts":["高品質","獨特性","可達度高","真實性"],"a":0,"note":"設施殘舊衛生欠佳反映高品質不足。"},{"q":"若某景點只有單一機動遊戲,旅客普遍反映「一次玩晒,唔會再返」,反映欠缺哪兩項特性?","opts":["活動選擇及吸客能力","真實性及可達度高","獨特性及高品質","真實性及獨特性"],"a":0,"note":"單一活動及缺乏重遊誘因分別反映活動選擇及吸客能力不足。"},{"q":"六項成功景點特性中,哪一項與「交通配套」直接相關?","opts":["可達度高","獨特性","真實性","吸客能力"],"a":0,"note":"可達度高直接關乎交通及接駁配套。"},{"q":"六項成功景點特性中,哪一項與「原有色彩氛圍的保存」直接相關?","opts":["真實性","獨特性","活動選擇","高品質"],"a":0,"note":"真實性直接關乎原有色彩氛圍的保存。"},{"q":"六項成功景點特性中,哪一項與「重遊率」關係最密切?","opts":["吸客能力","可達度高","真實性","獨特性"],"a":0,"note":"吸客能力直接包含重遊機會這一指標。"},{"q":"六項成功景點特性中,哪一項與「多元化配套活動」關係最密切?","opts":["活動選擇","真實性","可達度高","獨特性"],"a":0,"note":"活動選擇直接關乎多元化配套活動。"},{"q":"以下何者能同時體現「高品質」與「獨特性」?","opts":["一座保養良好、設計獨一無二的地標建築","一個殘舊且與其他地方雷同的景點","一個交通不便的景點","一個只有單一活動的景點"],"a":0,"note":"保養良好體現高品質,獨一無二設計體現獨特性。"},{"q":"以下何者能同時體現「真實性」與「吸客能力」?","opts":["保留原始風貌的古鎮,吸引大量文化愛好者重遊","全新仿古建築,遊客只到訪一次","交通便利但毫無特色的商場","設施齊全但缺乏歷史感的主題樂園"],"a":0,"note":"保留原始風貌體現真實性,吸引重遊體現吸客能力。"},{"q":"為何「可達度高」對景點的商業成功特別重要?","opts":["即使景點本身出色,交通不便仍會嚇退大量旅客","可達度與旅客體驗無關","可達度只影響本地旅客","可達度只影響員工上班"],"a":0,"note":"交通配套直接影響旅客能否及願意到訪,對商業成功關鍵。"},{"q":"為何「活動選擇」豐富有助延長旅客的逗留時間?","opts":["多元活動令旅客有更多理由留下體驗","活動選擇與逗留時間無關","活動越多旅客越快離開","活動選擇只影響價格"],"a":0,"note":"豐富活動選擇提供更多逗留理由,延長旅客停留時間。"},{"q":"以下何者最能演繹「舞台真實性」的取捨?","opts":["為方便旅客參觀而略為調整呈現方式,但保留核心文化元素","完全按歷史文獻一絲不改地重現","完全捨棄任何歷史元素","與旅客體驗無關的純商業決定"],"a":0,"note":"舞台真實性正是在方便旅客與保留核心文化之間取得平衡。"},{"q":"景點規劃者在設計新景點時,參考六項成功特性的意義是?","opts":["有助全面評估景點的市場競爭力及可持續發展潛力","純粹用作行政報告","與景點的實際營運無關","只適用於已成熟的景點"],"a":0,"note":"六項特性提供全面框架,評估景點競爭力及發展潛力。"},{"q":"以下哪個組合最能代表教材列出的六項成功景點特性?","opts":["高品質、真實性、獨特性、吸客能力、活動選擇、可達度高","價格、規模、地點、宣傳、服務、環保","名氣、歷史、文化、娛樂、購物、餐飲","安全、衛生、交通、價格、服務、規模"],"a":0,"note":"這正是教材列出的六項成功景點特性。"},{"q":"「顧客主導的營運」與「友善服務」同屬六項特性中的哪一項?","opts":["高品質","可達度高","獨特性","活動選擇"],"a":0,"note":"兩者均是高品質這項特性的具體內容。"},{"q":"以下何者最能體現景點「高品質」與「可達度高」的協同效應?","opts":["設施完善且交通便利的景點,更容易吸引旅客到訪並獲得好評","設施差劣但交通便利的景點必然成功","交通不便但設施豪華的景點必然失敗","兩者互不影響"],"a":0,"note":"高品質設施配合良好可達度,能同時提升吸引力及到訪意欲。"},{"q":"以下何者最能體現「獨特性」與「吸客能力」的關係?","opts":["獨特之處往往是吸引旅客不辭勞苦前往及口耳相傳的主因","獨特性與吸客能力無關","獨特景點通常吸客能力較弱","吸客能力只取決於價格"],"a":0,"note":"獨特性通常是驅動旅客到訪及推薦他人的重要原因。"},{"q":"一個保育得宜的濕地生態公園,同時提供導賞團及賞鳥活動,最能體現哪些特性的結合?","opts":["高品質(保育得宜)及活動選擇(導賞賞鳥)","獨特性及可達度高","真實性及吸客能力","獨特性及真實性"],"a":0,"note":"保育得宜屬高品質,導賞賞鳥活動屬活動選擇。"},{"q":"若一個地標因太多商業廣告及紀念品攤檔而顯得雜亂,可能損害哪項特性?","opts":["高品質及真實性","獨特性","可達度高","吸客能力"],"a":0,"note":"雜亂的商業化可能影響景點外觀(高品質)及原有氛圍(真實性)。"},{"q":"以下何者是「活動選擇」不足可能帶來的後果?","opts":["旅客逗留時間縮短,重遊意欲降低","景點會自動變得更真實","交通會自動改善","與旅客體驗無關"],"a":0,"note":"活動選擇不足會縮短旅客逗留時間,亦可能降低重遊意欲。"},{"q":"承辦商為維持景點的「真實性」,在商業化與保育之間應如何取態?","opts":["在配合旅客體驗需要與保留核心文化色彩之間取得平衡","完全捨棄商業元素","完全以商業利益為先,不理會原有色彩","與真實性無關,只考慮收入"],"a":0,"note":"教材指出真實性的挑戰在於商業化與保留原有色彩之間的平衡。"},{"q":"以下何者是評估一個新開發景點是否具備「可達度高」的重要指標?","opts":["公共交通班次、接駁時間及停車設施是否完善","景點的門票價格","景點的歷史悠久程度","景點的佔地面積"],"a":0,"note":"交通班次接駁及停車設施是可達度高的具體評估指標。"},{"q":"以下何者最能說明「吸客能力」不只著重旅客數量?","opts":["吸客能力同時考慮旅客的重遊意欲及能否吸引特定客群","吸客能力只計算首次到訪人數","吸客能力與客群特質無關","吸客能力只取決於宣傳預算"],"a":0,"note":"教材指出吸客能力包括吸引大批遊客、重遊機會及吸引特定客群三方面。"},{"q":"以下何者最能總結六項成功景點特性之間的關係?","opts":["六項特性互相配合,共同構成景點的整體競爭力","六項特性各自獨立,互不影響","只要具備其中一項即可成功","六項特性中只有價格最重要"],"a":0,"note":"六項特性互相配合,共同構成景點整體的市場競爭力。"}]},{"n":4,"title":"Kotler產品的三個層次","tag":"KOTLER'S PRODUCT LEVELS","qs":[{"q":"Kotler理論指出,消費者購買一個產品時,最重要的是甚麼?","opts":["產品所代表的一些特質","產品的外觀包裝","產品的售價","產品的品牌名稱"],"a":0,"note":"教材指消費者購買產品不單購產品本身,更重要是產品所代表的特質。"},{"q":"Kotler理論將產品分為多少個層次?","opts":["三個層次","兩個層次","四個層次","五個層次"],"a":0,"note":"產品包含核心產品、實際產品及延伸產品三個層次。"},{"q":"Kotler產品三層次分別是甚麼?","opts":["核心產品、實際產品、延伸產品","基本產品、進階產品、頂級產品","有形產品、無形產品、混合產品","主要產品、次要產品、附屬產品"],"a":0,"note":"三層次為核心產品、實際產品及延伸產品。"},{"q":"核心產品層次是指甚麼?","opts":["消費者購買的最重要原因","產品的外觀包裝","售後保養服務","產品的品牌標誌"],"a":0,"note":"核心產品層次是消費者購買的最重要原因。"},{"q":"核心產品層次的性質是?","opts":["主觀而且無形","客觀而且有形","純粹視覺元素","純粹價格因素"],"a":0,"note":"核心產品層次主觀而且是無形的。"},{"q":"核心產品層次能滿足消費者的甚麼?","opts":["需要","品味偏好(非主要重點)","炫耀心理(非主要重點)","購買預算(非主要重點)"],"a":0,"note":"核心產品層次可以滿足消費者的需要。"},{"q":"生產商需要做甚麼才能把核心產品銷售出去?","opts":["把需要轉化成實際產品","只需宣傳核心產品的概念","不需要任何轉化即可銷售","只需降低價錢"],"a":0,"note":"生產商要把核心產品的需要轉化成實際產品才能銷售。"},{"q":"實際產品層次是指甚麼?","opts":["實際購買、有形的產品","消費者主觀的心理需要","售後的保養服務","品牌所代表的精神"],"a":0,"note":"實際產品層次是實際購買、有形的產品。"},{"q":"實際產品層次包括哪些元素?","opts":["功能、品牌、質素、設計與包裝","純粹功能而已","純粹品牌名稱","純粹產品價格"],"a":0,"note":"實際產品層次包括功能品牌質素設計及包裝等元素。"},{"q":"延伸產品層次是指甚麼?","opts":["促成消費者購買產品的相關配套","產品本身的物理形態","消費者的購買動機","產品的核心功能"],"a":0,"note":"延伸產品層次是促成消費者購買的相關配套。"},{"q":"延伸產品層次包括哪些例子?","opts":["售後服務、保養、送貨","產品的核心功能","產品的外觀設計","消費者的主觀需要"],"a":0,"note":"延伸產品層次例子包括售後服務保養及送貨等。"},{"q":"優秀的延伸產品對產品有何影響?","opts":["有極大影響","完全沒有影響","只有輕微影響","只影響價格"],"a":0,"note":"教材指優秀的延伸產品對產品有極大影響。"},{"q":"以旅遊產品為例,「渡假放鬆的心理需要」屬於哪個層次?","opts":["核心產品層次","實際產品層 },{"q":"沙特阿拉伯的穆斯林每日須進行多少次禮拜?","opts":["五次","一次","三次","七次"],"a":0,"note":"伊斯蘭教規定穆斯林每日進行五次禮拜。"},{"q":"南非在種族隔離結束後,常被形容為甚麼?","opts":["彩虹之國","絲帶國","糧倉之國","微笑之國"],"a":0,"note":"南非因其多元種族文化,常被稱為「彩虹之國」。"},{"q":"摩洛哥的傳統市集稱為?","opts":["蘇克","巴剎","集市","市集(教材未有特定名稱)"],"a":0,"note":"摩洛哥的傳統市集稱為蘇克(Souk),是重要的旅遊及購物景點。"},{"q":"摩洛哥傳統待客文化中,常見的飲品是?","opts":["薄荷茶","咖啡","奶茶","果汁"],"a":0,"note":"薄荷茶是摩洛哥重要的待客傳統飲品。"},{"q":"意大利人重視的悠閒生活態度,常被稱為?","opts":["Dolce Vita(甜蜜生活)","Siesta(午睡)","Fiesta(節慶)","Carnival(嘉年華)"],"a":0,"note":"「Dolce Vita」意即甜蜜生活,反映意大利人悠閒的生活態度。"},{"q":"美國因多元族裔共處一地,常被形容為甚麼?","opts":["大熔爐","絲帶國","彩虹之國","糧倉之國"],"a":0,"note":"美國因多元文化共融,常被形容為「大熔爐」。"},{"q":"加拿大在語言及文化上的最大特色是?","opts":["英法雙語並行的多元文化","單一語言單一文化","禁止外來移民","只承認原住民文化"],"a":0,"note":"加拿大以英語法語雙官方語言及多元文化著稱。"},{"q":"以下哪個國家設有多達三個首都,分別掌管行政、立法及司法職能?","opts":["南非","美國","加拿大","巴西"],"a":0,"note":"南非設有比勒陀利亞、開普敦及布隆方丹三個首都。"},{"q":"以下哪個國家有多達十一種官方語言?","opts":["南非","加拿大","摩洛哥","美國"],"a":0,"note":"南非設有十一種官方語言,在各國中十分罕見。"},{"q":"以下哪個國家是南美洲唯一以葡萄牙語為官方語言的國家?","opts":["巴西","阿根廷","智利","墨西哥"],"a":0,"note":"巴西是南美洲唯一以葡萄牙語為官方語言的國家,其餘多以西班牙語為官方語言。"},{"q":"以下哪個國家的首都並非該國人口最多或最著名的城市?","opts":["美國(首都華盛頓非紐約)","法國(首都巴黎)","泰國(首都曼谷)","埃及(首都開羅)"],"a":0,"note":"美國首都華盛頓哥倫比亞特區並非人口最多的紐約,屬常見的地理易混淆點。"},{"q":"以下何者最能總結中東及北非數國(沙特阿拉伯、埃及、阿聯酋、摩洛哥、突尼斯)在宗教及語言上的共通點?","opts":["均以伊斯蘭教為主要宗教,阿拉伯語為官方語言之一","均以天主教為主要宗教","均以英語為官方語言","均沒有官方指定宗教"],"a":0,"note":"這些中東及北非國家普遍以伊斯蘭教為主要宗教,阿拉伯語為官方語言。"},{"q":"以下何者最能總結法國、意大利、西班牙三個西歐國家的共通點?","opts":["同屬歐元區,主要宗教為天主教","同以英語為官方語言","同以伊斯蘭教為主要宗教","同無官方貨幣"],"a":0,"note":"三國同屬歐元區,並以天主教為主要宗教背景。"}]}]},{"n":4,"title":"客務關係及服務‧行業趨勢議題","eng":"GUEST RELATIONS & TRENDS","topics":[{"n":1,"title":"顧客服務五個重要指標(RATER)","tag":"RATER MODEL","qs":[{"q":"顧客服務五個重要指標模式的英文簡稱是?","opts":["R.A.T.E.R.","P.A.R.A.","S.E.R.V.","Q.U.A.L."],"a":0,"note":"由A. Parasuraman提出的模式簡稱R.A.T.E.R.。"},{"q":"R.A.T.E.R.模式的五個指標依次是?","opts":["可靠性、可信性、有形性、關懷性、反應能力","可靠性、有形性、可信性、反應能力、關懷性","關懷性、可信性、有形性、可靠性、反應能力","反應能力、可靠性、有形性、關懷性、可信性"],"a":0,"note":"依次為Reliability可靠性、Assurance可信性、Tangibles有形性、Empathy關懷性、Responsiveness反應能力。"},{"q":"「可靠性(Reliability)」的定義是?","opts":["員工具有準確、準時及一貫地提供承諾服務的能力","員工有知識技能服務顧客令其安心","顧客有實質可見可感覺的事物留下印象","企業提供快捷高效率的服務"],"a":0,"note":"可靠性指員工準確準時一貫提供承諾服務的能力。"},{"q":"「可靠性」包括哪兩種承諾?","opts":["明確承諾和隱性承諾","書面承諾和口頭承諾(此為明確承諾的細分)","短期承諾和長期承諾","個人承諾和公司承諾"],"a":0,"note":"可靠性包括明確承諾和隱性承諾兩種。"},{"q":"「明確承諾」包括甚麼形式?","opts":["書面和口頭","只限書面","只限口頭","只限合約"],"a":0,"note":"明確承諾包括書面和口頭兩種形式。"},{"q":"「隱性承諾」是指甚麼?","opts":["顧客光顧時會合理預期的承諾","必須以書面形式記錄的承諾","只在投訴後才產生的承諾","與顧客期望無關的承諾"],"a":0,"note":"隱性承諾指顧客光顧時會合理預期的承諾。"},{"q":"顧客在「可靠性」方面重視甚麼?","opts":["準確、準時、一貫","價格、外觀、氣氛","速度、彈性、創新","獨特性、稀有性、奢華感"],"a":0,"note":"顧客在可靠性方面重視準確準時及一貫。"},{"q":"「可信性(Assurance)」的定義是?","opts":["員工有知識、技能和能力服務顧客,令顧客安心及有信心","員工準確準時一貫提供服務","顧客有實質可見的事物留下印象","企業提供快捷高效率的服務"],"a":0,"note":"可信性指員工具備知識技能能力,令顧客安心有信心。"},{"q":"顧客在「可信性」方面重視員工哪方面?","opts":["處理能力、尊重顧客、可信賴","外表衣著、設施科技","價格優惠、速度","娛樂性、新奇感"],"a":0,"note":"顧客重視員工的處理能力尊重顧客及可信賴程度。"},{"q":"「可信性」方面,員工正直可以保護顧客甚麼?","opts":["個人資料","衣著儀容","休息時間","薪金福利"],"a":0,"note":"員工正直可以保護顧客的個人資料。"},{"q":"「可信性」方面還要求服務具備甚麼特質?","opts":["安全又可靠","價格低廉","款式多樣","裝潢華麗"],"a":0,"note":"可信性方面要求服務安全又可靠。"},{"q":"「有形性(Tangibles)」的定義是?","opts":["顧客有實質可見及可感覺的事物讓他們能留下印象","員工的知識技能能力","員工提供承諾服務的能力","企業處理顧客要求的速度"],"a":0,"note":"有形性指顧客有實質可見可感覺的事物留下印象。"},{"q":"「有形性」最影響顧客的哪些印象?","opts":["第一印象和最後印象","服務中段的印象","純粹售後印象","與印象形成無關"],"a":0,"note":"有形性最能影響顧客的第一印象和最後印象。"},{"q":"顧客在「有形性」方面重視甚麼?","opts":["設施工具、科技、員工衣著外表、溝通推廣器材","員工的處理能力及可信賴度","員工能否解決問題","員工能否處理投訴"],"a":0,"note":"有形性重視的地方包括設施工具科技員工外表及推廣器材。"},{"q":"「關懷性(Empathy)」的定義是?","opts":["顧客能感受到員工對顧客的關懷和重視","員工具有準確準時的服務能力","顧客有實質可見的事物留下印象","企業提供快捷的服務"],"a":0,"note":"關懷性指顧客能感受到員工的關懷和重視。"},{"q":"「關懷性」在甚麼情況下特別重要?","opts":["顧客遇到問題或需要協助時","顧客首次光顧時","顧客結賬離開時","顧客未有任何互動時"],"a":0,"note":"關懷性在顧客遇到問題或需要協助時特別重要。"},{"q":"顧客在「關懷性」方面重視甚麼?","opts":["便捷聯絡員工、清楚快捷溝通、個人化支援","設施科技及員工外表","價格及付款方式","裝修風格及地理位置"],"a":0,"note":"關懷性重視便捷聯絡清楚溝通及個人化支援等。"},{"q":"「關懷性」要求員工能明白甚麼?","opts":["顧客所需","公司財務狀況","競爭對手策略","市場整體趨勢"],"a":0,"note":"關懷性要求員工能明白顧客所需。"},{"q":"「反應能力(Responsiveness)」的定義是?","opts":["企業可以為顧客提供快捷、高效率的服務","員工的知識技能和能力","顧客可見可感覺的事物","員工對顧客的關懷和重視"],"a":0,"note":"反應能力指企業能為顧客提供快捷高效率的服務。"},{"q":"「反應能力」包括過程中員工的哪些方面?","opts":["效率、態度及完成服務的速度","衣著外表及儀容","知識水平及學歷","薪酬及福利待遇"],"a":0,"note":"反應能力包括員工的效率態度及完成服務的速度。"},{"q":"顧客在「反應能力」方面重視員工甚麼?","opts":["樂意幫助、能解決問題、能處理投訴","衣著外表及設施科技","公司規模及知名度","價格是否最便宜"],"a":0,"note":"反應能力重視員工樂意幫助解決問題及處理投訴的能力。"},{"q":"「反應能力」方面,員工服務顧客時應具備甚麼?","opts":["彈性,因應情況處理","固定不變的標準作業程序","盡量避免與顧客接觸","盡量減少服務時間"],"a":0,"note":"反應能力要求員工具彈性,能因應情況處理。"},{"q":"以下何者是「可靠性」的具體表現?","opts":["準時提供已承諾的服務","員工儀容整潔","主動關心顧客需要","快速回應顧客查詢"],"a":0,"note":"準時提供承諾的服務屬於可靠性的具體表現。"},{"q":"以下何者是「可信性」的具體表現?","opts":["員工妥善保護顧客的個人資料","設施美觀新穎","服務速度快","員工願意個人化跟進"],"a":0,"note":"保護顧客個人資料屬可信性的具體表現。"},{"q":"以下何者是「有形性」的具體表現?","opts":["員工制服整潔、設施美觀","員工按承諾提供服務","員工願意處理投訴","員工明白顧客需要"],"a":0,"note":"員工制服及設施屬於有形性的具體表現。"},{"q":"以下何者是「關懷性」的具體表現?","opts":["員工主動了解顧客的個人需要","設施科技先進","服務準時可靠","員工能保護顧客資料"],"a":0,"note":"主動了解顧客個人需要屬於關懷性的具體表現。"},{"q":"以下何者是「反應能力」的具體表現?","opts":["員工迅速有效地處理顧客投訴","員工制服整潔美觀","服務內容一貫不變","員工保護顧客私隱"],"a":0,"note":"迅速有效處理投訴屬於反應能力的具體表現。"},{"q":"一間酒店按承諾時間準時為客人辦理退房手續,主要體現哪項指標?","opts":["可靠性","可信性","有形性","關懷性"],"a":0,"note":"按承諾準時完成服務體現可靠性。"},{"q":"一位員工向客人展示專業知識,解答複雜的產品查詢,令客人安心,主要體現哪項指標?","opts":["可信性","有形性","關懷性","反應能力"],"a":0,"note":"展示專業知識令顧客安心屬可信性的表現。"},{"q":"一間餐廳的裝潢設計和員工制服令顧客留下深刻印象,主要體現哪項指標?","opts":["有形性","可靠性","反應能力","可信性"],"a":0,"note":"裝潢及制服屬顧客可見可感覺的事物,體現有形性。"},{"q":"一位員工留意到顧客情緒低落,主動慰問並提供個人化協助,主要體現哪項指標?","opts":["關懷性","有形性","可靠性","反應能力"],"a":0,"note":"主動慰問及個人化協助體現關懷性。"},{"q":"一位員工在顧客投訴後迅速跟進並解決問題,主要體現哪項指標?","opts":["反應能力","有形性","可靠性","可信性"],"a":0,"note":"迅速處理投訴體現反應能力。"},{"q":"為何「有形性」對顧客的第一印象特別重要?","opts":["顧客往往在接觸服務初期,先透過可見事物形成初步觀感","有形性只在服務完結後才起作用","有形性與顧客觀感完全無關","顧客只會重視服務內容,不理會外觀"],"a":0,"note":"顧客初次接觸時,可見事物(如設施外觀)會形成初步觀感。"},{"q":"為何「關懷性」特別強調「顧客遇到問題時」的重要性?","opts":["顧客在遇到困難時最需要感受到被重視及協助","顧客遇到問題時通常不需要任何協助","關懷性只適用於順利完成的服務","與顧客的情緒狀態無關"],"a":0,"note":"顧客遇到問題時特別需要感受到員工的關懷及協助。"},{"q":"為何「可靠性」的隱性承諾也需要被重視?","opts":["即使沒有明文承諾,顧客仍會有合理期望,未達標同樣影響滿意度","隱性承諾不會影響顧客滿意度","只有書面承諾才需要兌現","隱性承諾與服務質素無關"],"a":0,"note":"隱性承諾雖無明文記錄,但未達到合理期望仍會影響顧客滿意度。"},{"q":"若一間酒店的員工專業知識不足,經常無法準確解答住客查詢,主要反映哪項指標的不足?","opts":["可信性","有形性","關懷性","反應能力"],"a":0,"note":"專業知識不足影響顧客的信任感,反映可信性不足。"},{"q":"若一間餐廳的裝修殘舊、員工制服骯髒,主要反映哪項指標的不足?","opts":["有形性","可靠性","關懷性","反應能力"],"a":0,"note":"裝修及制服屬可見事物,反映有形性不足。"},{"q":"若一間酒店員工經常對顧客的求助反應遲緩,主要反映哪項指標的不足?","opts":["反應能力","有形性","可信性","可靠性(此與承諾兌現較相關,而非速度)"],"a":0,"note":"反應遲緩直接反映反應能力不足。"},{"q":"若一間餐廳的訂座時間經常與實際安排不符,主要反映哪項指標的不足?","opts":["可靠性","有形性","關懷性","可信性"],"a":0,"note":"承諾的訂座時間未能兌現,反映可靠性不足。"},{"q":"若員工態度冷漠、對顧客的個人需要漠不關心,主要反映哪項指標的不足?","opts":["關懷性","有形性","可靠性","反應能力"],"a":0,"note":"對顧客需要漠不關心反映關懷性不足。"},{"q":"以下何者最能總結R.A.T.E.R.模式五項指標之間的關係?","opts":["五者從不同角度衡量顧客服務質素,合起來反映整體顧客滿意度","五者完全獨立,互不影響","只有其中一項指標真正影響顧客滿意度","五者只適用於酒店業"],"a":0,"note":"五項指標從不同角度衡量服務質素,合起來反映整體顧客滿意度。"},{"q":"教材提到穆斯林的禮儀特徵中,握手應使用哪隻手?","opts":["右手","左手","雙手","視乎場合而定,沒有固定規範"],"a":0,"note":"回教徒視左手不潔,故握手應使用右手。"},{"q":"為何回教徒握手時只用右手?","opts":["因為回教徒視左手不潔","因為右手較有力","純粹個人習慣,無特別原因","與宗教信仰無關"],"a":0,"note":"回教徒視左手不潔,故只用右手握手,體現對顧客文化背景的關懷。"},{"q":"了解顧客的宗教及文化禮儀(如穆斯林禮儀),最直接體現R.A.T.E.R.模式中的哪項指標?","opts":["關懷性","有形性","可靠性","反應能力"],"a":0,"note":"了解並尊重顧客的文化背景,體現對顧客的關懷和重視。"},{"q":"若餐廳未能因應穆斯林顧客的飲食禁忌(如清真食品要求)作出安排,最直接反映哪項指標不足?","opts":["關懷性","有形性","可靠性","反應能力"],"a":0,"note":"未能配合顧客的宗教飲食需要,反映對顧客關懷不足。"},{"q":"以下哪一項最能體現「可信性」中員工「處理能力」的重要?","opts":["員工能準確解答顧客的專業查詢,建立信任","員工衣著整潔","員工按時完成工作","員工主動慰問顧客"],"a":0,"note":"準確解答專業查詢能建立顧客的信任感,屬可信性的核心。"},{"q":"以下何者最能體現「有形性」中「溝通及推廣器材用品」的重要?","opts":["宣傳單張及網站設計精美,能提升顧客對服務的期望","員工的專業知識水平","員工處理投訴的速度","員工對顧客的關懷程度"],"a":0,"note":"宣傳及推廣器材屬顧客可見的實質事物,影響第一印象。"},{"q":"以下何者最能體現「反應能力」中「彈性」的重要?","opts":["員工能因應突發情況靈活調整服務安排","員工嚴格依照固定流程,不作任何調整","員工的衣著儀容整潔","員工按承諾提供服務"],"a":0,"note":"因應情況靈活調整,是反應能力中彈性的具體體現。"},{"q":"為何R.A.T.E.R.模式對前線服務業(如酒店餐飲)特別具參考價值?","opts":["這些行業高度依賴顧客與員工的直接互動,五項指標能全面評估服務質素","這模式只適用於製造業","前線服務業不需要評估服務質素","五項指標與顧客滿意度無關"],"a":0,"note":"前線服務業高度依賴人與人互動,R.A.T.E.R.模式能全面評估相關質素。"},{"q":"若一間酒店希望同時提升「有形性」及「關懷性」,可以怎樣做?","opts":["提升設施及環境質素,同時加強員工對顧客個人需要的敏感度","只需裝修酒店,不需培訓員工","只需培訓員工,不需理會設施","兩者無法同時提升"],"a":0,"note":"提升設施環境同時加強員工對顧客需要的敏感度,可同時改善兩項指標。"},{"q":"若顧客投訴後,員工能同情地聆聽、迅速跟進並提供解決方案,同時體現了哪兩項指標?","opts":["關懷性及反應能力","有形性及可靠性","可信性及有形性","可靠性及有形性"],"a":0,"note":"同情聆聽體現關懷性,迅速跟進解決體現反應能力。"},{"q":"為何「可靠性」和「反應能力」雖然都涉及「速度」,但兩者有所不同?","opts":["可靠性著重按承諾準時完成,反應能力著重臨場快速應對及彈性","兩者定義完全相同,沒有分別","可靠性與速度完全無關","反應能力只涉及態度,與速度無關"],"a":0,"note":"可靠性強調兌現既定承諾的準時度,反應能力強調臨場應變的快速及彈性。"},{"q":"以下何者最能總結R.A.T.E.R.模式對企業的實際應用價值?","opts":["為企業提供具體框架,評估及改善顧客服務的各個層面","純粹是學術理論,對實務工作沒有幫助","只適用於評估員工外表","與顧客滿意度的提升無關"],"a":0,"note":"R.A.T.E.R.模式為企業提供具體框架,有助全面評估及改善顧客服務。"},{"q":"一間酒店的網站及宣傳資料清晰美觀,吸引顧客預訂,主要體現哪項指標?","opts":["有形性","可靠性","關懷性","反應能力"],"a":0,"note":"宣傳推廣器材屬可見的實質事物,體現有形性。"},{"q":"一位員工在顧客未開口前已主動察覺其需要並提供協助,最直接體現哪項指標?","opts":["關懷性","有形性","可靠性","可信性"],"a":0,"note":"主動察覺並回應顧客需要,體現對顧客的關懷和重視。"},{"q":"一間酒店在繁忙時段仍能保持一貫的服務水平,不因人流增加而降低質素,主要體現哪項指標?","opts":["可靠性","有形性","反應能力","關懷性"],"a":0,"note":"在不同情況下維持一貫服務水平,體現可靠性中的「一貫」要求。"},{"q":"以下何者最能總結「可信性」的核心價值?","opts":["透過員工的專業能力及誠信,建立顧客的安心與信任","純粹依賴設施豪華程度","只依賴服務速度","與員工的專業能力無關"],"a":0,"note":"可信性的核心在於透過員工專業能力及誠信建立顧客信任。"},{"q":"以下何者最能總結R.A.T.E.R.五項指標共同的最終目標?","opts":["全面提升顧客對服務的滿意度及信任","純粹提高企業的短期銷售額","只為符合行業規管要求","與企業的長遠發展無關"],"a":0,"note":"五項指標的共同目標是全面提升顧客滿意度及信任,以建立長遠關係。"},{"q":"一間酒店的職員在處理客人查詢時展現豐富的產品知識及禮貌態度,令客人感到被尊重,這體現哪項指標?","opts":["可信性","有形性","可靠性","反應能力"],"a":0,"note":"展現知識及禮貌令客人感到尊重及安心,體現可信性。"},{"q":"以下何者最能說明「有形性」與「可靠性」在顧客體驗中的分工?","opts":["有形性影響顧客的即時觀感,可靠性則影響顧客對服務兌現程度的長期評價","兩者的作用完全相同,沒有任何分工","有形性只在服務完結後才發揮作用","可靠性與顧客的長期評價完全無關"],"a":0,"note":"有形性影響即時觀感,可靠性則影響對服務兌現的長期評價,兩者分工不同。"}]},{"n":2,"title":"忠誠度計劃","tag":"LOYALTY PROGRAMMES","qs":[{"q":"教材列出忠誠度計劃有哪幾種主要類型?","opts":["簡單積分計劃、級別積分計劃、夥伴計劃","只有簡單積分計劃","只有級別積分計劃及夥伴計劃","現金回贈計劃及抽獎計劃"],"a":0,"note":"教材列出簡單積分級別積分及夥伴計劃三種主要忠誠度計劃。"},{"q":"「簡單積分計劃」的運作方式是?","opts":["每次消費賺取積分,以積分換取折扣或產品","消費金額越大級別越高","與其他企業合作賺取跨界積分","純粹以現金回贈"],"a":0,"note":"簡單積分計劃指每次消費賺取積分,以積分換取折扣或產品。"},{"q":"「簡單積分計劃」的優點包括?","opts":["設計簡單、容易操作,可鼓勵消費","能大幅提高顧客忠誠度","門檻高,吸引高端客戶","需要複雜的跨企業合作"],"a":0,"note":"簡單積分計劃設計簡單容易操作,並可鼓勵消費。"},{"q":"「簡單積分計劃」常見於哪些行業使用?","opts":["食肆和信用卡消費","只限航空公司","只限酒店業","只限旅行社"],"a":0,"note":"簡單積分計劃經常在食肆和信用卡消費中使用。"},{"q":"「簡單積分計劃」的主要缺點是?","opts":["未足以提高顧客的忠誠度","設計過於複雜","操作困難","無法鼓勵消費"],"a":0,"note":"簡單積分計劃的缺點是未足以有效提高顧客忠誠度。"},{"q":"「級別積分計劃」的運作方式是?","opts":["消費金額越大,級別越高,優惠折扣更大","每次消費固定賺取相同積分","與其他企業合作賺取積分","純粹以年資決定折扣"],"a":0,"note":"級別積分計劃指消費金額越大,級別越高,優惠折扣更大。"},{"q":"「級別積分計劃」多見於哪種消費模式?","opts":["需要較長期、持續又價格較高的消費模式","一次性低價消費","與消費模式無關","只限現金交易"],"a":0,"note":"級別積分計劃多見於長期持續且價格較高的消費模式。"},{"q":"「級別積分計劃」的優點是?","opts":["能吸引消費者消費更多","設計最簡單","毋須設定任何門檻","對企業成本最低"],"a":0,"note":"級別積分計劃能吸引消費者消費更多以達到更高級別。"},{"q":"「級別積分計劃」的缺點是?","opts":["若積分級別門檻過高,大部分消費者難以享受高級別獎賞,便會失去吸引力","無法鼓勵任何消費","操作過於簡單","只適合低消費客群"],"a":0,"note":"門檻過高會令大部分消費者難以達標,計劃因而失去吸引力。"},{"q":"「夥伴計劃」的運作方式舉例是?","opts":["買機票賺積分,可換取酒店自助餐券","只限單一企業內部使用積分","純粹以現金回贈","不涉及任何跨企業合作"],"a":0,"note":"夥伴計劃例子包括買機票賺積分換取酒店自助餐券。"},{"q":"「夥伴計劃」另一舉例是?","opts":["賺積分換取免費機票,積分來源包括酒店訂房和餐飲消費","只能透過購買機票賺取積分","只能兌換現金","與酒店消費無關"],"a":0,"note":"夥伴計劃另一例子是透過酒店訂房和餐飲消費賺取積分換取免費機票。"},{"q":"「夥伴計劃」的核心特色是?","opts":["跨企業合作,讓積分可在不同業務之間兌換","只限單一企業內部運作","門檻極高,只供頂級客戶使用","與航空酒店業務無關"],"a":0,"note":"夥伴計劃的核心特色是跨企業合作,讓積分可跨業務兌換。"},{"q":"企業留住顧客能帶來甚麼好處?","opts":["增加成本效益","必然降低顧客滿意度","必然增加營運成本","與經營利潤無關"],"a":0,"note":"留住顧客能增加成本效益,是忠誠度計劃的重要好處之一。"},{"q":"留住顧客如何為企業帶來「穩定收入來源」?","opts":["忠誠顧客會持續消費,提供較穩定的收入","忠誠顧客的消費金額必然減少","忠誠顧客只會一次性消費","與收入穩定性無關"],"a":0,"note":"忠誠顧客持續消費有助企業獲得較穩定的收入來源。"},{"q":"留住顧客如何有助「增加經營利潤」?","opts":["減少開拓新客戶的高昂成本,同時提高重複消費","必然增加宣傳成本","與利潤無直接關係","只能透過降價實現"],"a":0,"note":"留住顧客可減少開拓新客戶成本,並透過重複消費增加利潤。"},{"q":"留住顧客如何幫助企業「維持市場佔有率」?","opts":["忠誠顧客較少轉投競爭對手,有助維持既有市場地位","忠誠顧客會加速流向競爭對手","與市場佔有率無關","只能透過降價競爭維持"],"a":0,"note":"忠誠顧客較少轉投競爭對手,有助企業維持市場佔有率。"},{"q":"留住顧客為何有助企業取得「意見和改善建議」?","opts":["長期顧客較願意提供真誠的意見,幫助企業改善服務","新顧客的意見必然更有價值","忠誠顧客通常不會提供任何意見","與服務改善無關"],"a":0,"note":"忠誠顧客較願意提供真誠意見,有助企業持續改善。"},{"q":"「客人包容增加改善空間」是指甚麼好處?","opts":["忠誠顧客對企業偶爾的失誤較為包容,給予企業改善的機會","顧客對任何失誤都會立即離棄企業","與顧客忠誠度無關","只適用於新顧客"],"a":0,"note":"忠誠顧客對偶爾失誤較包容,給予企業改善空間。"},{"q":"忠誠顧客如何幫助企業「引入新顧客」?","opts":["忠誠顧客可能透過口碑推薦,吸引新顧客","忠誠顧客必然拒絕介紹企業給他人","與新顧客開拓無關","只能透過付費廣告吸引新顧客"],"a":0,"note":"忠誠顧客的口碑推薦有助企業引入新顧客。"},{"q":"留住顧客如何增加「業務發展機會」?","opts":["穩定的顧客基礎讓企業有更多資源和信心拓展新業務","忠誠顧客會限制企業的業務發展","與業務擴展無關","只能依賴外部投資者"],"a":0,"note":"穩定的顧客基礎為企業帶來更多業務發展機會。"},{"q":"忠誠度計劃如何幫助企業「建立龐大數據庫」?","opts":["透過會員登記及消費記錄,累積大量顧客數據","忠誠度計劃與數據收集無關","只能透過問卷調查收集數據","數據庫建立與顧客忠誠度無關"],"a":0,"note":"忠誠度計劃透過會員登記及消費記錄累積顧客數據。"},{"q":"以下何者是「簡單積分計劃」的例子?","opts":["顧客每次用餐賺取積分,累積後可兌換餐券","消費滿一定金額才升級享優惠","透過購買機票賺取酒店住宿積分","與消費金額無關的年費會員制"],"a":0,"note":"每次消費賺積分兌換餐券是簡單積分計劃的典型例子。"},{"q":"以下何者是「級別積分計劃」的例子?","opts":["信用卡按年度消費總額劃分為銀卡、金卡、白金卡等級別","每次消費固定賺取相同積分","與其他企業合作賺取跨界積分","純粹以到訪次數決定積分"],"a":0,"note":"按消費總額劃分會員級別是級別積分計劃的典型例子。"},{"q":"以下何者是「夥伴計劃」的例子?","opts":["航空公司與酒店集團合作,消費一方可獲得另一方的優惠","單一企業內部的積分兌換獎品","消費金額越大級別越高","與其他企業毫無合作的獨立計劃"],"a":0,"note":"航空公司與酒店合作提供跨業務優惠是夥伴計劃的例子。"},{"q":"為何「簡單積分計劃」被認為「未足以提高顧客忠誠度」?","opts":["因為操作簡單容易被競爭對手模仿,難以形成獨特的顧客黏性","因為簡單積分計劃成本過高","因為簡單積分計劃無法鼓勵任何消費","因為簡單積分計劃只適合大企業"],"a":0,"note":"簡單積分計劃容易被模仿,難以形成獨特的顧客黏性及忠誠度。"},{"q":"為何「級別積分計劃」門檻設定需要謹慎考量?","opts":["門檻過高會令大部分消費者難以達標,反而失去吸引力","門檻越高計劃必然越受歡迎","門檻設定與計劃吸引力無關","門檻應盡量設到最高以篩選客戶"],"a":0,"note":"門檻過高會令大部分消費者無法達標,削弱計劃吸引力。"},{"q":"為何「夥伴計劃」能為參與企業帶來雙贏?","opts":["透過跨企業合作,雙方可以共享客源及提升各自的顧客吸引力","夥伴計劃必然只利好其中一方","夥伴計劃會削弱雙方的顧客基礎","與雙方業務發展無關"],"a":0,"note":"夥伴計劃讓合作企業共享客源,達致雙贏局面。"},{"q":"若一間航空公司希望吸引長期高端商務客戶並鼓勵他們持續選用同一品牌,較適合採用哪種忠誠度計劃?","opts":["級別積分計劃","簡單積分計劃","純粹的一次性折扣","不設任何忠誠度計劃"],"a":0,"note":"級別積分計劃透過持續消費累積級別優惠,較能鎖定長期高端客戶。"},{"q":"若一間茶餐廳希望以低成本方式鼓勵顧客持續光顧,較適合採用哪種忠誠度計劃?","opts":["簡單積分計劃","級別積分計劃","跨國夥伴計劃","不設任何忠誠度計劃"],"a":0,"note":"簡單積分計劃設計簡單成本較低,適合中小型食肆採用。"},{"q":"若一間酒店集團希望與航空公司合作,共同擴大雙方的客源及品牌吸引力,較適合採用哪種忠誠度計劃?","opts":["夥伴計劃","簡單積分計劃","級別積分計劃","不設任何忠誠度計劃"],"a":0,"note":"夥伴計劃正是透過跨企業合作擴大雙方客源的方式。"},{"q":"以下何者是留住顧客為企業帶來的「成本效益」具體體現?","opts":["開拓一位新顧客的成本通常高於維繫一位舊顧客","開拓新顧客的成本必然低於維繫舊顧客","顧客忠誠度與成本效益完全無關","維繫舊顧客的成本必然高於開拓新客"],"a":0,"note":"開拓新顧客成本通常較高,故維繫舊顧客更具成本效益。"},{"q":"為何忠誠顧客提供的「意見和改善建議」對企業特別有價值?","opts":["長期顧客較了解企業服務的優劣,意見往往更具參考價值","新顧客的意見必然更準確","忠誠顧客的意見通常帶有惡意","與服務改善完全無關"],"a":0,"note":"長期顧客較熟悉企業服務,其意見對改善服務更具參考價值。"},{"q":"為何「客人包容增加改善空間」對企業長遠發展有利?","opts":["讓企業在偶爾出現失誤時仍有機會挽回顧客信任並作出改善","顧客包容代表企業毋須再改善服務","包容度與企業長遠發展無關","顧客包容只會縱容企業忽視服務質素"],"a":0,"note":"顧客包容讓企業有空間及時改善,避免因單次失誤流失顧客。"},{"q":"為何忠誠度計劃有助企業「建立龐大數據庫」進而帶來商業價值?","opts":["透過分析顧客消費習慣,企業可制定更精準的市場策略","數據庫的建立與市場策略制定無關","忠誠度計劃無法收集任何有用數據","數據庫只能用於財務審計"],"a":0,"note":"透過分析消費數據,企業可制定更精準貼合顧客需要的市場策略。"},{"q":"以下哪一項最能總結「簡單積分計劃」與「級別積分計劃」的核心分別?","opts":["簡單積分計劃不分級別一致獎賞;級別積分計劃按消費金額劃分等級提供不同優惠","兩者完全相同,沒有實質分別","簡單積分計劃門檻更高","級別積分計劃設計更簡單"],"a":0,"note":"簡單積分計劃一致獎賞;級別積分計劃則按消費金額劃分等級。"},{"q":"以下哪一項最能總結「級別積分計劃」與「夥伴計劃」的核心分別?","opts":["級別積分計劃在單一企業內按消費金額分級;夥伴計劃涉及跨企業合作換取優惠","兩者完全相同,沒有實質分別","級別積分計劃必然涉及跨企業合作","夥伴計劃不涉及任何企業合作"],"a":0,"note":"級別積分計劃屬單一企業內部安排;夥伴計劃則涉及跨企業合作。"},{"q":"若企業只著重短期銷售,不注重顧客關係維繫,可能面臨甚麼風險?","opts":["難以享有留住顧客帶來的成本效益及穩定收入等好處","必然大幅提高企業盈利","與顧客流失風險無關","必然能維持市場佔有率"],"a":0,"note":"忽略顧客關係維繫,企業將難以享有忠誠顧客帶來的各種好處。"},{"q":"為何「引入新顧客」被列為留住舊顧客的好處之一,而非開拓新客戶的獨立工作?","opts":["忠誠顧客的口碑推薦本身就是一種低成本的新客開拓渠道","引入新顧客與舊顧客忠誠度完全無關","新顧客只能透過廣告開拓,與舊顧客無關","舊顧客的存在反而會阻礙新顧客加入"],"a":0,"note":"忠誠顧客的口碑推薦是低成本且有效的新客開拓渠道。"},{"q":"以下何者最能總結忠誠度計劃對企業的整體價值?","opts":["透過不同形式的獎賞機制維繫顧客關係,從而帶來多方面的經營效益","純粹增加企業的行政成本,沒有實質效益","只對大企業有效,對中小企業毫無用處","與企業的長遠盈利能力無關"],"a":0,"note":"忠誠度計劃透過維繫顧客關係,為企業帶來多方面的經營效益。"},{"q":"一間咖啡連鎖店推出「儲印花換飲品」計劃,屬於哪種忠誠度計劃?","opts":["簡單積分計劃","級別積分計劃","夥伴計劃","現金回贈計劃(非教材三大分類)"],"a":0,"note":"儲印花換飲品是每次消費賺取積分兌換產品的簡單積分計劃。"},{"q":"一間銀行按年度簽賬金額,將信用卡會員分為「普通、尊尚、白金」三個等級並提供不同優惠,屬於哪種忠誠度計劃?","opts":["級別積分計劃","簡單積分計劃","夥伴計劃","現金回贈計劃(非教材三大分類)"],"a":0,"note":"按消費金額劃分等級提供不同優惠,屬級別積分計劃。"},{"q":"一間航空公司與租車公司合作,乘客乘搭航班可獲得租車優惠,屬於哪種忠誠度計劃?","opts":["夥伴計劃","簡單積分計劃","級別積分計劃","現金回贈計劃(非教材三大分類)"],"a":0,"note":"航空公司與租車公司的跨企業合作屬夥伴計劃。"},{"q":"若一間企業的級別積分計劃門檻過高,導致大部分顧客無法晉升更高級別,長遠可能有何影響?","opts":["計劃逐漸失去吸引力,顧客參與意欲下降","顧客忠誠度必然大幅提升","計劃成本效益必然提高","與顧客參與意欲無關"],"a":0,"note":"門檻過高會令計劃失去吸引力,降低顧客參與意欲。"},{"q":"為何忠誠度計劃常被視為「留住顧客」策略的重要工具?","opts":["透過持續的獎賞機制鼓勵顧客重複消費,建立長期關係","忠誠度計劃只能吸引新顧客,無法留住舊顧客","忠誠度計劃與顧客關係管理無關","忠誠度計劃只是短期促銷手段"],"a":0,"note":"忠誠度計劃透過持續獎賞機制鼓勵重複消費,建立長期顧客關係。"},{"q":"以下何者最能說明「夥伴計劃」對消費者的吸引力?","opts":["消費者可透過日常消費(如訂房)換取原本較難獲得的獎賞(如免費機票)","夥伴計劃只對企業有利,對消費者毫無吸引力","夥伴計劃的獎賞必然比簡單積分計劃少","消費者無法透過夥伴計劃獲得任何實際優惠"],"a":0,"note":"夥伴計劃讓消費者的日常消費更快累積至心儀的獎賞。"},{"q":"為何企業在設計忠誠度計劃時,需要在「簡單易操作」與「有效提升忠誠度」之間取得平衡?","opts":["過於簡單的計劃容易被模仿且效果有限,過於複雜則可能降低顧客參與意欲","計劃越複雜顧客參與度必然越高","計劃越簡單效果必然越好","兩者之間沒有任何取捨關係"],"a":0,"note":"企業需要在計劃的簡易度與實際成效之間取得平衡。"},{"q":"以下何者最能說明「穩定收入來源」對企業經營的重要性?","opts":["穩定收入有助企業更準確地規劃資源及降低經營風險","穩定收入與企業規劃資源完全無關","收入是否穩定不影響企業的經營風險","企業不需要穩定收入來源"],"a":0,"note":"穩定收入有助企業更準確規劃資源,降低經營上的不確定風險。"},{"q":"以下何者最能說明忠誠度計劃「增加業務發展機會」的具體體現?","opts":["穩定的顧客基礎讓企業有信心投資新產品或拓展新市場","忠誠度計劃只會限制企業原有業務的發展","業務發展機會與顧客基礎完全無關","忠誠度計劃必然導致企業縮減業務規模"],"a":0,"note":"穩定顧客基礎讓企業更有信心投資新產品或拓展新市場。"},{"q":"若一間主題公園希望透過年票會員制度鼓勵重複入場,並按入場次數提供不同層級的優惠,這較貼近哪種忠誠度計劃?","opts":["級別積分計劃","簡單積分計劃","夥伴計劃","現金回贈計劃(非教材三大分類)"],"a":0,"note":"按入場次數(即消費頻率)劃分優惠層級,屬級別積分計劃的模式。"},{"q":"為何忠誠度計劃需要配合「建立龐大數據庫」才能發揮最大效用?","opts":["有數據支持才能更精準地了解顧客需要,設計貼合顧客的獎賞及推廣","數據庫與忠誠度計劃的成效完全無關","忠誠度計劃不需要任何顧客數據支持","數據庫只能用於企業內部行政記錄"],"a":0,"note":"數據支持有助企業更精準了解顧客需要,設計合適的獎賞及推廣。"},{"q":"以下何者最能總結忠誠度計劃對「顧客」及「企業」帶來的雙重價值?","opts":["顧客獲得實際優惠及個人化體驗,企業則獲得穩定收入及顧客數據等多方面效益","忠誠度計劃只對企業有利,對顧客毫無實質好處","忠誠度計劃只對顧客有利,對企業毫無實質好處","忠誠度計劃對雙方皆無實質意義"],"a":0,"note":"忠誠度計劃為顧客帶來實際優惠,同時為企業帶來多方面經營效益。"},{"q":"一間書店設立會員制度,每次購書可獲相當於書價5%的積分,可用於未來購書折扣,這屬於哪種忠誠度計劃?","opts":["簡單積分計劃","級別積分計劃","夥伴計劃","現金回贈計劃(非教材三大分類)"],"a":0,"note":"每次消費按固定比例賺取積分兌換折扣,屬簡單積分計劃。"},{"q":"若一間航空公司的飛行常客計劃要求顧客每年飛行滿一定里數才能維持其會籍等級,這體現級別積分計劃的甚麼特點?","opts":["消費金額(或里數)越高,享有的優惠級別越大","每次消費賺取的積分完全相同,不設任何級別","計劃完全不涉及任何門檻要求","與消費金額或頻率完全無關"],"a":0,"note":"按里數(消費量)決定會籍級別及優惠,體現級別積分計劃的門檻機制。"},{"q":"為何「夥伴計劃」相較於「簡單積分計劃」,更能為企業建立長遠的競爭優勢?","opts":["跨企業合作能提供更豐富多元的獎賞選擇,加強顧客轉換至競爭對手的阻力","夥伴計劃的操作必然比簡單積分計劃更簡單容易模仿","夥伴計劃與競爭優勢的建立完全無關","簡單積分計劃必然比夥伴計劃更能建立競爭優勢"],"a":0,"note":"跨企業合作提供更豐富獎賞,加強顧客轉換阻力,建立較長遠的競爭優勢。"},{"q":"一間酒店集團與信用卡公司合作,持有該信用卡的顧客入住可獲雙倍積分,這是哪種忠誠度計劃的體現?","opts":["夥伴計劃","簡單積分計劃","級別積分計劃","現金回贈計劃(非教材三大分類)"],"a":0,"note":"酒店集團與信用卡公司的跨企業合作提供雙倍積分,屬夥伴計劃。"},{"q":"為何忠誠度計劃的「數據庫」對於精準行銷(如個人化推廣訊息)特別重要?","opts":["讓企業能根據個別顧客的消費習慣及偏好,發送更貼合需要的推廣訊息","數據庫與行銷訊息的精準度完全無關","企業應向所有顧客發送完全相同的推廣訊息而不作任何區分","數據庫只能用於財務審計,不能用於行銷用途"],"a":0,"note":"數據庫讓企業根據顧客消費習慣偏好,發送更貼合需要的推廣訊息。"},{"q":"若一間企業的忠誠度計劃缺乏清晰的積分兌換規則,可能導致甚麼問題?","opts":["顧客對計劃失去信任及參與意欲,削弱忠誠度計劃原有的效果","顧客必然更加信任及積極參與該計劃","清晰的兌換規則與顧客的參與意欲完全無關","缺乏清晰規則反而能提升計劃的吸引力"],"a":0,"note":"規則不清晰會削弱顧客信任及參與意欲,削弱忠誠度計劃的原有效果。"},{"q":"為何「留住顧客」在某些情況下比「開拓新顧客」更具成本效益?","opts":["舊顧客已對品牌有一定認識及信任,毋須重新投入大量資源建立品牌認知","開拓新顧客的成本必然低於留住舊顧客","舊顧客對品牌的認識與開拓成本的高低完全無關","留住顧客與開拓新顧客的成本效益完全相同"],"a":0,"note":"舊顧客已有品牌認識及信任基礎,毋須重新投入資源建立認知,故成本效益較高。"},{"q":"一間連鎖健身中心提供「介紹朋友入會可獲一個月免費會籍」的優惠,這主要利用忠誠度計劃帶來的哪項好處?","opts":["引入新顧客","純粹的穩定收入來源","純粹的建立龐大數據庫","與忠誠度計劃的好處完全無關"],"a":0,"note":"透過現有會員介紹新會員,正是利用忠誠度計劃引入新顧客的好處。"},{"q":"以下何者最能總結忠誠度計劃三種類型(簡單積分、級別積分、夥伴計劃)在複雜度上的遞進關係?","opts":["由簡單積分到級別積分再到夥伴計劃,操作複雜度及對顧客忠誠度的潛在提升程度大致遞增","三種類型的複雜度完全相同,沒有任何遞進關係","夥伴計劃的複雜度必然是三者中最低的","簡單積分計劃的複雜度必然是三者中最高的"],"a":0,"note":"由簡單積分到級別積分再到夥伴計劃,操作複雜度及忠誠度提升潛力大致遞增。"}]},{"n":3,"title":"服務金三角","tag":"SERVICE TRIANGLE","qs":[{"q":"服務金三角模式涉及哪三個持份者?","opts":["企業、員工、顧客","企業、政府、顧客","員工、供應商、顧客","企業、股東、員工"],"a":0,"note":"服務金三角的三個持份者是企業員工及顧客。"},{"q":"服務金三角中「企業」的角色定義是?","opts":["公司的領導層,制定決策、監管營運及管理日常運作","所有接觸顧客的前線員工","所有使用公司服務的現有及潛在顧客","負責供應原材料的外部夥伴"],"a":0,"note":"企業指公司的領導層,負責制定決策監管營運及管理日常運作。"},{"q":"服務金三角中「員工」的角色定義是?","opts":["所有接觸顧客的前線員工","公司的領導層","所有使用公司服務的顧客","負責審計公司賬目的人員"],"a":0,"note":"員工指所有接觸顧客的前線員工。"},{"q":"服務金三角中「顧客」的角色定義是?","opts":["所有使用公司服務的現有及潛在顧客","公司的領導層","所有接觸顧客的前線員工","純粹指已完成消費的顧客"],"a":0,"note":"顧客指所有使用公司服務的現有及潛在顧客。"},{"q":"服務金三角中,「企業與顧客」之間的行銷關係稱為?","opts":["對外行銷","互動行銷","內部行銷","關係行銷(非教材使用的三大類別名稱)"],"a":0,"note":"企業與顧客之間的行銷關係稱為對外行銷。"},{"q":"服務金三角中,「員工與顧客」之間的行銷關係稱為?","opts":["互動行銷","對外行銷","內部行銷","直接行銷(非教材使用的三大類別名稱)"],"a":0,"note":"員工與顧客之間的行銷關係稱為互動行銷。"},{"q":"服務金三角中,「企業與員工」之間的行銷關係稱為?","opts":["內部行銷","對外行銷","互動行銷","人力行銷(非教材使用的三大類別名稱)"],"a":0,"note":"企業與員工之間的行銷關係稱為內部行銷。"},{"q":"「對外行銷」的策略核心是?","opts":["製造承諾","兌現承諾","促成承諾","監管承諾"],"a":0,"note":"對外行銷的策略核心是製造承諾。"},{"q":"「互動行銷」的策略核心是?","opts":["兌現承諾","製造承諾","促成承諾","取消承諾"],"a":0,"note":"互動行銷的策略核心是兌現承諾。"},{"q":"「內部行銷」的策略核心是?","opts":["促成承諾","製造承諾","兌現承諾","監察承諾"],"a":0,"note":"內部行銷的策略核心是促成承諾。"},{"q":"「企業對顧客」的聯繫在何時已經開始?","opts":["提供服務前已經開始","只在服務完成後才開始","只在顧客投訴後才開始","與服務提供時間無關"],"a":0,"note":"企業與顧客的聯繫在提供服務前已經開始。"},{"q":"企業如何在服務提供前吸引顧客注意?","opts":["透過各類宣傳和推廣","只透過提供服務後的回饋","只透過員工個人努力","與宣傳推廣無關"],"a":0,"note":"企業透過各類宣傳和推廣吸引顧客注意和購買。"},{"q":"企業透過甚麼方式影響顧客的期望?","opts":["公共關係和各種資訊","純粹透過降低價格","純粹透過提高服務速度","與顧客期望管理無關"],"a":0,"note":"企業透過公共關係和各種資訊影響顧客的期望。"},{"q":"企業如何了解顧客需要?","opts":["透過意見調查","純粹憑管理層猜測","完全依賴競爭對手的做法","不需要了解顧客需要"],"a":0,"note":"企業透過意見調查了解顧客需要。"},{"q":"「顧客對企業」的影響包括甚麼?","opts":["顧客對服務的回饋、使用服務時的反應以及投訴","純粹是購買行為,沒有其他影響","顧客對企業完全沒有任何影響","只限於正面的評價"],"a":0,"note":"顧客對企業的影響包括回饋反應及投訴等,全部均會影響企業及服務。"},{"q":"常見的「對外行銷」方法包括?","opts":["推銷與宣傳活動、廣告、公共關係、直接推銷、網上銷售與社交網站","只限員工培訓","只限內部溝通會議","只限薪酬調整"],"a":0,"note":"對外行銷方法包括推銷宣傳廣告公關直接推銷及網上銷售社交網站等。"},{"q":"「對外行銷」的目的包括?","opts":["增加服務知名度,吸引潛在顧客","純粹減少企業成本","純粹提高員工士氣","與顧客期望管理無關"],"a":0,"note":"對外行銷目的包括增加服務知名度及吸引潛在顧客。"},{"q":"「對外行銷」還有甚麼目的?","opts":["進行服務價錢與質素的期望管理","純粹進行員工考核","純粹進行財務審計","與顧客需要了解無關"],"a":0,"note":"對外行銷目的還包括進行服務價錢與質素的期望管理。"},{"q":"「對外行銷」的目的也包括提供甚麼?","opts":["顧客使用服務時需要注意的事項","員工的薪酬待遇資料","公司內部的財務報表","競爭對手的營運數據"],"a":0,"note":"對外行銷目的也包括提供顧客使用服務時需注意的事項。"},{"q":"「員工對顧客」的關係包括甚麼?","opts":["為顧客提供服務及產品,盡力滿足顧客的要求","純粹負責財務審計工作","純粹負責市場調查工作","與顧客滿足感無關"],"a":0,"note":"員工對顧客的關係包括提供服務產品及滿足顧客要求。"},{"q":"企業能否兌現服務承諾,非常倚賴甚麼?","opts":["員工對顧客的表現","純粹企業的宣傳力度","純粹企業的資金規模","與員工表現無關"],"a":0,"note":"企業能否兌現服務承諾,非常倚賴員工對顧客的實際表現。"},{"q":"「顧客對員工」的正面影響例子是?","opts":["顧客讚賞可令員工把服務做得更好","顧客的任何反應都不會影響員工表現","顧客只能對員工造成負面影響","與員工的工作表現無關"],"a":0,"note":"顧客的讚賞可以令員工提升服務表現。"},{"q":"「顧客對員工」的負面影響例子包括?","opts":["顧客不顧安全做出危險動作,或對其他人作出粗魯行為","顧客提供合理的意見反饋","顧客耐心等候服務","顧客準時到達預約地點"],"a":0,"note":"顧客不顧安全或粗魯行為會破壞員工提供優質服務的能力。"},{"q":"「互動行銷」策略針對甚麼過程?","opts":["員工與顧客的接觸過程","企業內部的行政流程","企業與供應商的採購過程","純粹的廣告宣傳過程"],"a":0,"note":"互動行銷策略針對員工與顧客的接觸過程。"},{"q":"「互動行銷」是企業兌現承諾的哪個階段?","opts":["實際服務接觸的階段","純粹宣傳推廣的階段","純粹售後檢討的階段",
