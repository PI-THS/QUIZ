var QUESTIONS_PER_ROUND = 10;
var PASS_THRESHOLD = 9;
var REVIEW_SAMPLE_SIZE = 20;
var STORAGE_KEY = "thsPassportV3";
var CN_NUM = {1:"一",2:"二",3:"三",4:"四"};

var state = {
  mode:null,       // 'topic' | 'review' | 'dse'
  bookIndex:null,
  topicIndex:null,
  dseYear:null,
  dseOrder:null,
  questions:[],
  qi:0,
  score:0,
  answered:false,
  dseLog:[]
};

function loadProgress(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return {books:{}, dse:{}};
    var parsed = JSON.parse(raw);
    if(!parsed.books) parsed.books = {};
    if(!parsed.dse) parsed.dse = {};
    return parsed;
  }catch(e){
    return {books:{}, dse:{}};
  }
}
function saveProgress(p){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }catch(e){}
}
var progress = loadProgress();

function getBookProgress(bookN){
  if(!progress.books[bookN]) progress.books[bookN] = {topics:{}, review:{best:0,attempts:0}};
  if(!progress.books[bookN].topics) progress.books[bookN].topics = {};
  if(!progress.books[bookN].review) progress.books[bookN].review = {best:0,attempts:0};
  return progress.books[bookN];
}

function getDseProgress(year){
  if(!progress.dse[year]) progress.dse[year] = {best:0, attempts:0};
  return progress.dse[year];
}

function dseLevel(score){
  if(score >= 28) return "5**";
  if(score >= 26) return "5*";
  if(score >= 24) return "5";
  if(score >= 21) return "4";
  if(score >= 18) return "3";
  if(score >= 15) return "2";
  return "1";
}
function dseLevelTier(level){
  if(level === "5**" || level === "5*" || level === "5") return "gold";
  if(level === "4" || level === "3") return "good";
  if(level === "2") return "accent";
  return "bad";
}

function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var tmp=a[i]; a[i]=a[j]; a[j]=tmp;
  }
  return a;
}

function $(id){return document.getElementById(id);}
function showScreen(id){
  var all = document.querySelectorAll(".screen");
  for(var i=0;i<all.length;i++){ all[i].classList.remove("active"); }
  $(id).classList.add("active");
}

function roundTarget(t){
  return Math.min(QUESTIONS_PER_ROUND, t.qs.length);
}
function passTarget(t){
  return Math.min(PASS_THRESHOLD, roundTarget(t));
}

function renderBooks(){
  var totalTopics = 0, totalStamped = 0;
  var html = "";
  BOOKS.forEach(function(book, bi){
    var bp = getBookProgress(book.n);
    var stamped = 0;
    book.topics.forEach(function(t){
      var rec = bp.topics[t.n];
      if(rec && rec.best >= passTarget(t)) stamped++;
    });
    totalTopics += book.topics.length;
    totalStamped += stamped;
    var numStr = "0"+book.n;
    html += '<button class="gate" data-book-idx="'+bi+'">'+
              '<span class="gate-code">GATE '+numStr+'</span>'+
              '<span class="gate-title">第'+CN_NUM[book.n]+'冊・'+book.title+'</span>'+
            '</button>';
  });
  $("gatesList").innerHTML = html;
  $("homeStampCount").textContent = totalStamped + " / " + totalTopics;

  var rows = $("gatesList").querySelectorAll(".gate");
  rows.forEach(function(row){
    row.addEventListener("click", function(){
      var bi = parseInt(this.getAttribute("data-book-idx"),10);
      openBook(bi);
    });
  });
}

function openBooks(){
  renderBooks();
  showScreen("screen-books");
}

function openBook(bookIndex){
  renderTopicList(bookIndex);
  showScreen("screen-topics");
}

function renderDseYears(){
  var html = "";
  DSE_PAPERS.forEach(function(p){
    var rec = getDseProgress(p.year);
    var status = rec.attempts>0 ? ("個人最佳 "+rec.best+"/"+p.qs.length+" · Level "+dseLevel(rec.best)) : "未挑戰過";
    html += '<button class="gate" data-year="'+p.year+'">'+
              '<span class="gate-code">DSE</span>'+
              '<span class="gate-title">'+p.year+'年</span>'+
              '<span class="gate-sub">'+status+'</span>'+
            '</button>';
  });
  $("dseYearsList").innerHTML = html;

  var rows = $("dseYearsList").querySelectorAll(".gate");
  rows.forEach(function(row){
    row.addEventListener("click", function(){
      openDseYear(parseInt(row.getAttribute("data-year"),10));
    });
  });
}

function openDseYear(year){
  state.dseYear = year;
  var paper = DSE_PAPERS.filter(function(p){ return p.year === year; })[0];
  var rec = getDseProgress(year);
  var status = rec.attempts>0 ? ("個人最佳 "+rec.best+"/"+paper.qs.length+" · Level "+dseLevel(rec.best)) : "未挑戰過";
  $("dseModeTitle").textContent = year+"年 DSEMC";
  $("dseYearInfo").textContent = "本年共 "+paper.qs.length+" 題 · "+status;
  showScreen("screen-dse-mode");
}

function startDseQuiz(order){
  state.mode = "dse";
  state.qi = 0;
  state.score = 0;
  state.answered = false;
  state.dseOrder = order;
  state.dseLog = [];
  var paper = DSE_PAPERS.filter(function(p){ return p.year === state.dseYear; })[0];
  var tag = "DSEMC · "+(order === "sequential" ? "順序" : "隨機");
  var mapped = paper.qs.map(function(q){
    return {q:q.q, opts:q.opts, a:q.a, note:q.note, topicN: state.dseYear%100, topicTag: tag};
  });
  state.questions = (order === "random") ? shuffle(mapped) : mapped;
  showScreen("screen-quiz");
  renderQuestion();
}

function renderDseReview(){
  $("dseReviewTitle").textContent = state.dseYear+"年 DSEMC 答題詳情";
  var html = "";
  state.questions.forEach(function(q, qi){
    var log = state.dseLog[qi] || {correct:false, chosenText:null};
    var preview = q.q.replace(/\n/g,"  ").slice(0, 28);
    html += '<div class="review-row '+(log.correct?"correct":"wrong")+'" data-qi="'+qi+'">'+
              '<button class="review-row-head">'+
                '<span class="review-num">Q'+(qi+1)+'</span>'+
                '<span class="review-icon">'+(log.correct?"✓":"✗")+'</span>'+
                '<span class="review-preview">'+escapeHtml(preview)+'</span>'+
                '<span class="review-chevron">▾</span>'+
              '</button>'+
              '<div class="review-detail" hidden>'+
                '<div class="review-question question-text">'+renderStemHTML(q.q)+'</div>'+
                '<div class="review-opts">'+
                  q.opts.map(function(opt, oi){
                    var cls = "review-opt", tag = "";
                    if(oi === q.a){ cls += " opt-correct"; tag = "✓ 正確答案・"; }
                    else if(!log.correct && opt === log.chosenText){ cls += " opt-chosen-wrong"; tag = "✗ 你嘅答案・"; }
                    return '<div class="'+cls+'">'+(tag?'<span class="opt-tag">'+tag+'</span>':'')+escapeHtml(opt)+'</div>';
                  }).join("")+
                '</div>'+
                '<p class="review-note">'+escapeHtml(q.note)+'</p>'+
              '</div>'+
            '</div>';
  });
  $("dseReviewList").innerHTML = html;

  var rows = $("dseReviewList").querySelectorAll(".review-row");
  rows.forEach(function(row){
    var head = row.querySelector(".review-row-head");
    var detail = row.querySelector(".review-detail");
    head.addEventListener("click", function(){
      var isOpen = row.classList.contains("open");
      row.classList.toggle("open", !isOpen);
      detail.hidden = isOpen;
    });
  });
}

function renderTopicList(bookIndex){
  state.bookIndex = bookIndex;
  var book = BOOKS[bookIndex];
  var bp = getBookProgress(book.n);
  var stamped = 0;
  var html = "";

  var revRec = bp.review;
  var revTarget = Math.min(REVIEW_SAMPLE_SIZE, book.topics.length*60);
  var revStatus = revRec.attempts>0 ? ("個人最佳 "+revRec.best+"/"+revTarget) : "隨機混合本冊全部重點";
  html += '<button class="leg-row special" data-review="1">'+
            '<span class="leg-num mono">★</span>'+
            '<div class="leg-info"><div class="leg-title">本冊總複習</div>'+
            '<div class="leg-tag">MIXED REVIEW</div></div>'+
            '<span class="leg-stamp">'+revStatus+'</span>'+
          '</button>';

  for(var i=0;i<book.topics.length;i++){
    var t = book.topics[i];
    var rec = bp.topics[t.n];
    var target = roundTarget(t);
    var pass = passTarget(t);
    var stampHtml, stampClass;
    if(rec && rec.best >= pass){
      stampClass="full"; stampHtml="✓ " + rec.best + "/" + target; stamped++;
    } else if(rec){
      stampClass="some"; stampHtml=rec.best + "/" + target;
    } else {
      stampClass="none"; stampHtml="未溫習";
    }
    var numStr = (t.n<10?"0":"")+t.n;
    html += '<button class="leg-row" data-idx="'+i+'">'+
              '<span class="leg-num mono">'+numStr+'</span>'+
              '<div class="leg-info"><div class="leg-title">'+t.title+'</div>'+
              '<div class="leg-tag">'+t.tag+'</div></div>'+
              '<span class="leg-stamp '+stampClass+'">'+stampHtml+'</span>'+
            '</button>';
  }
  $("itineraryList").innerHTML = html;
  $("topicsProgress").textContent = stamped + " / " + book.topics.length;
  $("bookTitle").textContent = "第"+CN_NUM[book.n]+"冊・"+book.title;

  var rows = $("itineraryList").querySelectorAll(".leg-row");
  rows.forEach(function(row){
    row.addEventListener("click", function(){
      if(row.hasAttribute("data-review")){
        startQuiz("review", bookIndex, null);
      } else {
        var idx = parseInt(row.getAttribute("data-idx"),10);
        startQuiz("topic", bookIndex, idx);
      }
    });
  });
}

function startQuiz(mode, bookIndex, topicIndex){
  state.mode = mode;
  state.bookIndex = bookIndex;
  state.qi = 0;
  state.score = 0;
  state.answered = false;
  var book = BOOKS[bookIndex];
  if(mode === "topic"){
    state.topicIndex = topicIndex;
    var t = book.topics[topicIndex];
    var mapped = t.qs.map(function(q){
      return {q:q.q, opts:q.opts, a:q.a, note:q.note, topicN:t.n, topicTitle:t.title, topicTag:t.tag};
    });
    state.questions = shuffle(mapped).slice(0, Math.min(QUESTIONS_PER_ROUND, mapped.length));
  } else {
    var pool = [];
    book.topics.forEach(function(t){
      t.qs.forEach(function(q){
        pool.push({q:q.q, opts:q.opts, a:q.a, note:q.note, topicN:t.n, topicTitle:t.title, topicTag:t.tag});
      });
    });
    state.questions = shuffle(pool).slice(0, Math.min(REVIEW_SAMPLE_SIZE, pool.length));
  }
  showScreen("screen-quiz");
  renderQuestion();
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}

function tableBlockToHtml(block){
  var inner = block.replace(/^\[TABLE\]\n?/,"").replace(/\n?\[\/TABLE\]$/,"");
  var rows = inner.split("\n").map(function(r){ return r.split(" | "); });
  var header = rows[0];
  var body = rows.slice(1);
  var html = '<div class="q-table-wrap"><table class="q-table"><thead><tr>';
  for(var i=0;i<header.length;i++){
    html += "<th>"+(header[i].trim()?escapeHtml(header[i].trim()):"")+"</th>";
  }
  html += "</tr></thead><tbody>";
  body.forEach(function(r){
    html += "<tr>";
    r.forEach(function(cell){ html += "<td>"+escapeHtml(cell.trim())+"</td>"; });
    html += "</tr>";
  });
  html += "</tbody></table></div>";
  return html;
}

function renderStemHTML(text){
  var parts = text.split(/(\[TABLE\][\s\S]*?\[\/TABLE\])/);
  return parts.map(function(part){
    if(part.indexOf("[TABLE]") === 0){
      return tableBlockToHtml(part);
    }
    return escapeHtml(part).replace(/\n/g,"<br>");
  }).join("");
}

function renderQuestion(){
  state.answered = false;
  var total = state.questions.length;
  var cur = state.questions[state.qi];
  var qn = state.qi+1;

  $("qCount").textContent = "Q."+(qn<10?"0":"")+qn+"/"+total;
  var pct = (state.qi/total)*100;
  $("routeFill").style.width = pct+"%";
  $("routePlane").style.left = pct+"%";

  var numStr = (cur.topicN<10?"0":"")+cur.topicN;
  $("quizTopicTag").textContent = numStr+" · "+cur.topicTag;
  $("questionText").innerHTML = renderStemHTML(cur.q);

  var lettersArr = ["A","B","C","D"];
  var order = shuffle(cur.opts.map(function(_,idx){return idx;}));
  state.optOrder = order;
  var html = "";
  for(var i=0;i<order.length;i++){
    html += '<button class="option" data-i="'+i+'"><span class="opt-letter mono">'+lettersArr[i]+'</span><span>'+cur.opts[order[i]]+'</span></button>';
  }
  $("optionsList").innerHTML = html;
  $("feedback").hidden = true;

  var opts = $("optionsList").querySelectorAll(".option");
  opts.forEach(function(btn){
    btn.addEventListener("click", function(){
      if(state.answered) return;
      onAnswer(parseInt(this.getAttribute("data-i"),10));
    });
  });
}

function onAnswer(i){
  state.answered = true;
  var cur = state.questions[state.qi];
  var correct = state.optOrder.indexOf(cur.a);
  var opts = $("optionsList").querySelectorAll(".option");
  opts.forEach(function(btn){ btn.disabled = true; });
  opts[correct].classList.add("is-correct");
  if(i !== correct){
    opts[i].classList.add("is-wrong");
  } else {
    state.score++;
  }
  if(state.mode === "dse"){
    state.dseLog[state.qi] = { correct: (i === correct), chosenText: cur.opts[state.optOrder[i]] };
  }
  var stampEl = $("feedbackStamp");
  if(i === correct){
    stampEl.className = "feedback-stamp good";
    stampEl.textContent = "✔ 準確答案・已蓋章";
  } else {
    stampEl.className = "feedback-stamp bad";
    stampEl.textContent = "✘ 未通過此站";
  }
  $("feedbackNote").textContent = cur.note;
  $("feedback").hidden = false;
  var isLast = state.qi === state.questions.length-1;
  $("nextBtn").textContent = isLast ? "完成航班 →" : "下一題 →";
}

function nextQuestion(){
  if(state.qi < state.questions.length-1){
    state.qi++;
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz(){
  var total = state.questions.length;
  var score = state.score;

  if(state.mode === "dse"){
    var drec = getDseProgress(state.dseYear);
    drec.attempts++;
    if(score > drec.best) drec.best = score;
    saveProgress(progress);

    var level = dseLevel(score);
    var dtier = dseLevelTier(level);
    $("resultStamp").className = "result-stamp "+dtier;
    $("resultScore").textContent = score+"/"+total;
    $("resultScoreLabel").textContent = "LEVEL "+level;
    $("resultTitle").textContent = "Level "+level;
    $("resultSub").textContent = state.dseYear+"年 DSEMC 甲部・根據答對題數換算(僅供參考)。";
    $("reviewBtn").hidden = false;
    showScreen("screen-result");
    return;
  }

  $("reviewBtn").hidden = true;
  var frac = score/total;
  var book = BOOKS[state.bookIndex];
  var bp = getBookProgress(book.n);

  if(state.mode === "topic"){
    var t = book.topics[state.topicIndex];
    var rec = bp.topics[t.n] || {best:0,attempts:0};
    rec.attempts++;
    if(score > rec.best) rec.best = score;
    bp.topics[t.n] = rec;
  } else {
    bp.review.attempts++;
    if(score > bp.review.best) bp.review.best = score;
  }
  saveProgress(progress);

  var tier;
  if(frac >= 0.9) tier = "gold";
  else if(frac >= 0.7) tier = "good";
  else if(frac >= 0.5) tier = "accent";
  else tier = "bad";

  var titles = {
    gold:"順利入境!",
    good:"順利通關",
    accent:"仍需準備",
    bad:"航班延誤"
  };
  var subs = {
    gold:"表現優異,呢個重點已經蓋咗章。",
    good:"表現不錯,但未夠9題答對,呢個重點仲未蓋到章,再嚟一次啦。",
    accent:"半途落機,建議返去溫習下呢個重點內容。",
    bad:"航班延誤,返去睇下教材先再嚟挑戰啦。"
  };

  var stampEl = $("resultStamp");
  stampEl.className = "result-stamp "+tier;
  $("resultScore").textContent = score+"/"+total;
  $("resultScoreLabel").textContent = tier==="gold"?"STAMPED":(tier==="good"?"CLOSE":(tier==="accent"?"RETRY":"DELAYED"));
  $("resultTitle").textContent = titles[tier];
  $("resultSub").textContent = subs[tier];

  showScreen("screen-result");
}

document.addEventListener("keydown", function(e){
  if(!$("screen-quiz").classList.contains("active")) return;
  if(!state.answered && ["1","2","3","4"].indexOf(e.key) !== -1){
    var idx = parseInt(e.key,10)-1;
    var opts = $("optionsList").querySelectorAll(".option");
    if(opts[idx]) opts[idx].click();

    e.preventDefault();
    nextQuestion();
  }
});
