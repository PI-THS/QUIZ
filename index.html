var DSE_PAPERS = [{"year":2018,"qs":[{"q":"以下哪些有關旅客流量的陳述是正確的?\n(1)拉動因素比推動因素更有效地驅使人們旅遊。\n(2)旅客流量通常會從生活指數較高的地方流向生活指數較低的地方。\n(3)新的主題公園是強化旅遊目的地推動因素的一個例子。\n(4)從當地社區的角度，入境旅遊帶來的經濟利益比出境旅遊的更重要。","opts":["只有(2)及(4)","只有(1)及(2)","只有(1)及(3)","只有(3)及(4)"],"a":0,"note":"推動因素是使潛在旅客產生旅遊願望的內在因素；拉動因素是目的地不同的特徵以致影響旅客到哪裡旅遊的因素。 (1)錯誤﹕拉動因素不一定較推動因素更有效地驅使人們旅遊。 (2)正確﹕生活指數較高的人較富有，到生活指數較低的地方旅遊更能節省旅費。 (3)錯誤﹕新的主題公園是能增加目的地的吸引力，是拉因素而非推因素。 (4)正確﹕入境旅遊帶來的經濟利益令當地賺到更多金錢，但出境旅遊是本地人到外地消費，即把本土資金帶到外地去，對於原來的社區沒有太大經濟增益。"},{"q":"旅遊景點的營運可以是為牟利或非為牟利，也可能不帶來任何收入。選出一組與其營運模式最匹配的香港景點。","opts":["為牟利：香港迪士尼樂園；非為牟利：香港海洋公園；不帶來任何收入：鐘樓","為牟利：天星小輪；非為牟利：黄大仙祠；不帶來任何收入：香港濕地公園","為牟利：灣仔藍屋建築群；非為牟利：昂坪360；不帶來任何收入：星光大道","為牟利：香港海事博物館；非為牟利：香港杜莎夫人蠟像館；不帶來任何收入：旺角女人街"],"a":0,"note":"A﹕正確。香港迪士尼樂園利用門票賺錢。海洋公園由海洋公園公司管理，為一間非牟利機構。鐘樓沒有任何門票或其他收益。 B﹕錯誤。香港濕地公園有門票收益。 C﹕錯誤。藍屋建築群沒有門票收益，他們舉辦的導賞大多是免費的。因此是非牟利的。 D﹕錯誤。女人街有大量攤檔售賣各式各樣的貨品，能帶來極大收入。"},{"q":"哪一個景點自二千年前至今依然受歐洲人歡迎?","opts":["埃及的金字塔","中國的長城","美國的大峽谷","沙地阿拉伯的聖城麥加"],"a":0,"note":"A﹕錯誤。雖然萬里長城的修築始於春秋戰國時代，已有兩千多年的歷史，但當時並不受歐洲人歡迎。 B﹕正確。金字塔有兩千多年的歷史，由於歐洲與埃及地理較接近，因此自二千年前至今依然受歐洲人歡迎。 C﹕錯誤。大峽谷的歷史約100年左右。 D﹕錯誤。聖城麥加有兩千多年的歷史，但主要為伊斯蘭教徒朝聖之地，而非受歐洲人歡迎。"},{"q":"旅客數量到達最高點，而服務供應商之間競爭激烈，此時屬於旅遊目的地生命週期的哪一個階段?","opts":["停滯","發展","投入","鞏固"],"a":0,"note":"正確答案為D。"},{"q":"為幫助旅遊業持份者了解旅客，旅遊當局要收集以下哪些人口性數據?\n(1)旅客來自的國家\n(2)旅客的收入\n(3)旅客的性別分布\n(4)旅客的消費模式","opts":["只有(2)及(3)","只有(1)及(2)","只有(1)及(4)","只有(3)及(4)"],"a":0,"note":"「人口性數據」常見的旅遊統計數字例子包括收入、性別、年齡、教育程度、受僱狀況等。因此只有(2)、(3)是「人口性數據」。(1)旅客來自的國家屬於「地理環境數據」。(4)旅客的消費模式屬於「社會經濟」。用戶確認正確答案為C(只有(2)及(3))，原文檔案選項有transcribe錯誤，已用用戶提供的正確選項校正。"},{"q":"根據聯合國世界旅遊組織(UNWTO)的定義，以下哪些人會被視為香港的入境過夜旅客?\n(1)某位於早上8時抵達香港，逗留於機場酒店，並於兩日後離港的機艙服務員。\n(2)在中國工作的別國總領事，與家人到香港公幹數天。\n(3)某位由晚上8時至翌日早上，於機場轉機貴賓室逗留及等候上機的女士。\n(4)某位參加了香港岸上觀光一日遊，然後返回船上度宿的郵輪乘客。","opts":["只有(1)及(2)","只有(1)及(3)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"「入境過夜旅客」指旅客為了消閒或公幹於旅遊目的地逗留超過24小時，並於該地住宿最少一晚分別歸類為(1)國際旅客：出境旅遊；(2)國內 / 本土旅客：留在本土國內 (1)正確﹕機艙服務員曾於機場酒店住宿，因此是為「入境過夜旅客」 (2) 正確﹕從內地來港，與家人到香港公幹數天，即有入住本港酒店，因此是為「入境過夜旅客」 (3) 錯誤﹕她只是在等候上機轉機，沒有入境，不屬於「入境過夜旅客」，她屬於「過境旅客」。 (4) 錯誤﹕該旅客只在香港岸上觀光一日遊，但晚上回郵輪住宿，因此並沒有在香港住宿，不屬於「入境過夜旅客」，他們屬於「郵輪旅客」。"},{"q":"根據高恆(Cohen)的分類法，哪類旅客嘗試像當地人一樣生活?","opts":["漫遊式旅客","接近探奇型","接近保守型","個別的群體旅客"],"a":0,"note":"正確答案為B。"},{"q":"某投資者計畫開設酒店，並希望採用特許經營而不是以管理合約的模式營運。他/她歸納\n了特許經營相較於管理合約的四項要點。以下哪些描述是正確的?\n(1)特許經營較不可能要開發一個全新的品牌。\n(2)特許經營較可能要重視市場推廣。\n(3)特許經營的財務責任較少。\n(4)特許經營的投資者較少參與酒店營運。","opts":["只有(1)及(2)","只有(1)及(4)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"(1) 正確﹕特許經營是購入一個著名的品牌然後自己負責營運，不可能開發一個全新的品牌。 (2) 正確﹕特許經營十分重視品牌推廣，因此會投放較多資源予市場推廣。 (3) 錯誤﹕特許經營與管理合約都有同樣的財務責任。 (4) 錯誤﹕特許經營的投資者在購入品牌後，仍會參與酒店營運。相反，管理合約下，投資者會把酒店營運權交給營運公司全權負責，因此投資者的營運參與是少之有少。"},{"q":"根據香港旅遊發展局酒店分類制度，以下哪些屬於「設施」指標中的例子?\n(1)員工餐廳\n(2)防火設備\n(3)可供借用的手提電腦制度\n(4)為殘疾人士而設的房間","opts":["只有(3)及(4)","只有(1)及(2)","只有(1)及(3)","只有(2)及(4)"],"a":0,"note":"酒店分類制度中，「設施」指標包括飲食設施、電訊設施、商務設施、康樂及其他設施 (3)屬於電訊設施、(4) 為殘疾人士而設的房間屬於其他設施。 (1)員工餐廳不屬於顧客飲食設施；(2)防火設備並不屬於「設施」。"},{"q":"以下哪些項目通常會出現於酒店客人的雜項費用賬戶?\n(1) 客房費用\n(2) 客房稅項及服務費\n(3) 房內自選電影的收費\n(4) 水療的服務費","opts":["只有(3)及(4)","只有(1)及(2)","只有(1)及(3)","只有(2)及(4)"],"a":0,"note":"酒店「雜費」是指入住客人享用了非必要或自選項目所需繳交的費用。 (1) 錯誤﹕客房費用是入住必要的費用，並不是雜費 (2) 錯誤﹕客房稅項及服務費是入住必要的費用，並不是雜費 (3) 正確﹕客人在房內欣賞自選電影，是自選項目，因此要繳付「雜費」。 (4) 正確﹕客人在酒店享受水療，是自選項目，因此要繳付「雜費」。"},{"q":"從餐廳東主的角度，以下哪項不是選用周期餐單相較於自選餐餐單的優點?","opts":["容許常客每天都有不同選擇","簡化食物採購的過程","廚房員工準備食材更為方便","服務人員落單更為方便"],"a":0,"note":"「周期餐單」即是套餐，「自選餐餐單」即是客人可以從MENU中自由選擇食物或飲品。 A. 錯誤﹕套餐所需的食材種類不多，因此餐廳可簡化食物採購的過程。 B. 錯誤﹕套餐所需的食材種類不多，廚房員工準備食材更為方便。 C. 錯誤﹕服務人員落單時只需寫ABCD餐，因此更為方便。 D.正確﹕容許常客每天都有不同選擇並不是優點。"},{"q":"當酒店出現超額預訂，前台員工可能需要轉送客人往姊妹酒店入住時，員工應執行以下哪些工作?\n(1) 檢查訂房部員工的預訂有沒有重複\n(2) 向管家部了解是否有可用的「OD」客房\n(3) 向銷售部了解是否有可用的預留展銷客房\n(4) 查看有沒有顧客是以員工價預訂客房，因為調動他們到姊妹酒店，較調動外來顧客更為容易","opts":["只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],"a":0,"note":"(1) 正確﹕檢查訂房部員工的預訂有沒有重複，以防止同時間給了兩間房予同一個客人。 (2) 錯誤﹕「OD」客房是指「未清潔的入住房」，不能給客人入住。 (3) 正確﹕展銷客房可用來作此用途。 (4) 正確﹕以員工價預訂客房的顧客較能體諒酒店的情況，因此較願意被調動。"},{"q":"一位有中等預算的旅客想入住徒步可到主要景點的酒店。以下哪些酒店最合適?\n(1)位於尖沙咀的香港半島酒店\n(2)近青山灣的香港黄金海岸酒店\n(3)位於尖沙咀的港青酒店一香港基督教青年會\n(4)宜必思香港中上環酒店","opts":["只有(3)及(4)","只有(1)及(2)","只有(1)及(4)","只有(2)及(3)"],"a":0,"note":"(1) 錯誤﹕香港半島酒店為五星級酒店，價錢貴，不適合中等預算的旅客。 (2) 錯誤﹕青山灣位於屯門，遠離一些主要景點。 (3) 正確﹕尖沙咀有星光大道、1881、鐘樓、維多利亞港海旁等。 (4) 正確﹕中上環有不少景點，例如大館、中環街市、SOHO區等。"},{"q":"一家有300間客房的酒店某一天錄得80%入住率(50間客房空置和10間客房須維修)，客房總銷售收入是港幣$300000。每日平均房價(ADR)及每間可銷售房收入(RevPAR)為﹕","opts":["ADR：港幣$1250；RevPAR：港幣$1000","ADR：港幣$1000；RevPAR：港幣$1034","ADR：港幣$1000；RevPAR：港幣$1250","ADR：港幣$1250；RevPAR：港幣$1034"],"a":0,"note":"每日平均房價 (APR)= 客房收入/入住房數目 每間可銷售房收入(RevPAR) =客房收入/酒店客房總數 *「入住房數目」指酒店內能可供入住的客房 *「酒店客房總數」指酒店內所有客房，包括供入住的客房及其他不能提供入住的客房，例如有待維修、用作員工培訓等房間。 就題目，「入住房數目」是300-50-10=240間；而「酒店客房總數」是300間。 客房收入是$300000 每日平均房價 (APR)=$300000/240=$1250 每間可銷售房收入(RevPAR) =$300000/300=$1000 因此答案是C"},{"q":"某香港市民經常於一個氣候暖和的國家度過聖誕節。該國處於協調世界時+8的時區，持有香港特別行政區護照的人士可免簽證入境及逗留一個月。這是哪一個國家?","opts":["馬來西亞","泰國","阿拉伯聯合酋長國","澳洲"],"a":0,"note":"A. 錯誤﹕泰國是+7時區，不是+8 B. 正確﹕馬來西亞是+8時區，而且免簽證入境及逗留一個月 C. 錯誤﹕阿聯酋是+4時區，不是+8 D. 錯誤﹕持有香港特別行政區護照的人士入境澳洲是需要簽證的。"},{"q":"北韓於2017年頻頻進行導彈試射，導彈有時穿越國際空域。以下哪些航線最有可能飛越相關的國際空域?\n(1)北京至三藩市\n(2)香港至巴黎\n(3)新加坡至台北\n(4)大阪至倫敦","opts":["只有(1)及(4)","只有(1)及(2)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"北韓位於中國、俄羅斯與日本之間，2017年試射的導彈主要落入日本海（國際空域）或穿越日本上空飛向北太平洋。(1)北京至三藩市：大圓航線會經中國東北、日本海或北海道上空，再橫跨北太平洋，與試射空域高度重疊，正確。(2)香港至巴黎：主要向西北飛越中國內陸、中亞及東歐，不經東北亞，錯誤。(3)新加坡至台北：主要經南海，位於北韓南方數千公里外，不受影響，錯誤。(4)大阪至倫敦：傳統航線向西北跨越日本海國際空域進入西伯利亞領空，該區正是導彈試射及落點的高危區域，正確。因此正確答案為只有(1)及(4)，即B。"},{"q":"以下哪些有關時區的陳述是正確的?\n(1)國際日期線是本初子午線的東面或西面約180度。\n(2)全球分為12個不同的時區。\n(3)時區在地圖上並非總是以筆直的線畫分。\n(4)兩個相連時區之間的差距總是一個小時。","opts":["只有(1)及(3)","只有(1)及(4)","只有(2)及(3)","只有(2)及(4)"],"a":0,"note":"(1)正確 (2)錯誤﹕全球分為24個不同的時區，而非12個。 (3)正確﹕時區在地圖上並非總是以筆直的線畫分。 (4)錯誤﹕+12時區及-12時區之間的差距總是24小時。"},{"q":"某個家庭於十二月由原居國的首都飛往另一國家的首都。兩個城市沒有時差，但溫差很大。這是哪兩個城市?","opts":["吉隆坡及北京","曼谷及坎培拉","巴西利亞及聖地牙哥","羅馬及巴黎"],"a":0,"note":"A. 錯誤﹕曼谷(+7)、坎培拉(+10) B. 正確﹕吉隆坡(+8)、北京(+8)；因為吉隆坡接近赤道，北京遠離赤道，兩地溫差很大。 C. 錯誤﹕巴西利亞(-3)、聖地牙哥(-7) D. 錯誤﹕羅馬(+2)及巴黎(+2)，但兩地地理位置相近，因此溫差不會很大。"},{"q":"全球暖化帶來發展新郵輪航線的機遇。哪條現有的航線二十年前並不存在?","opts":["加拿大溫哥華，經西北航道，到達美國紐約","美國西雅圖，經國內航道，到達阿拉斯加","南非開普敦，經直布羅陀海峽，到達意大利羅馬","澳洲悉尼，經德雷克海峽，到達阿根廷布宜諾斯艾利斯"],"a":0,"note":"正確答案為A。"},{"q":"哪條程式最能反映顧客的滿意度是如何達致的?","opts":["顧客認知 - 顧客期望 = 顧客滿意度","顧客需要+顧客願望+顧客欲望=顧客滿意度","顧客需要 - 顧客認知 = 顧客滿意度","顧客期望+ 顧客認知 = 顧客滿意度"],"a":0,"note":"正確答案為C。"},{"q":"某位客人於酒店大堂餅店關門前購買了一些西餅。銷售員看見客人拿着幾個袋子，立即安排管家部將西餅送到客房。就以上情景，以下哪些陳述是正確的?\n(1) 由於客人購買的是西餅，所以有關服務純粹是以有形為主。\n(2) 銷售員符合了有形性及關懷性這兩種服務特點。\n(3) 馬斯勞(Maslow)需要層次中最低層次的顧客需求得到滿足。\n(4) 即時送餅顧及了不可保存性的服務特點。","opts":["只有(2)及(3)","只有(1)及(3)","只有(1)及(4)","只有(2)及(4)"],"a":0,"note":"(1) 錯誤﹕銷售員向客人推銷的服務屬於無形的。 (2) 正確﹕銷售員了解客人需求然後提供適切的協助，具有「關懷性」；而安排管家部人員協助，整個協助的行動專業而且具體，具有「有形性」。 (3) 正確﹕客人到房間內便能力享用西餅，證明馬斯勞(Maslow)需要層次中最低層次(生理需求)的顧客需求得到滿足。 (4) 錯誤﹕即時送餅與不可保存性的服務特點沒有關係。"},{"q":"根據服務金三角的概念，在酒店環境中，以下哪一重要元素與其例子並不相配?","opts":["重要元素：內部顧客；例子：享用航空公司價，住於酒店的機組人員","重要元素：公司；例子：酒店總經理","重要元素：外部顧客；例子：未有預訂而以正價支付住宿費的客人","重要元素：員工；例子：於管家部工作的房務員"],"a":0,"note":"B﹕機組人員並不是酒店員工，因此對於酒店而言，他們不是內部顧客"},{"q":"很多發展中國家的政府鼓勵跨國投資者發展當地旅遊業，但往往意識不到給曾經濟帶來負面影響。以下哪些是可能出現的負面影響?\n(1) 更大的經濟流失\n(2) 對當地人才有更大需求\n(3) 消費價格及地價更高\n(4) 示範效應的可能性更大","opts":["只有(1)及(4)","只有(1)及(3)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"(1) 正確﹕當跨國集團到當地進行建設投資，這些集團會把賺到的錢帶回所屬國家，令更大的經濟從本地流失。 (2) 錯誤﹕對當地人才有更大需求是正面影響 (3) 錯誤﹕題目顯示發展中國家鼓勵跨國投資者發展當地旅遊業，反映該國家處於「投入」階段。在「投入」階段中，發展旅遊業未必會使當地消費價格和地價更高。 (4) 正確﹕示範效應指消費者在認識和處理自己的收入、消費及其相互關係時，會不自覺地和其他消費者比較。當國集團吸引更多海外旅客到當地旅遊時，由於發展中國家人民較貧窮，而外國旅客較富有，因而令本地人民會拿外國旅客的消費模式作比較。"},{"q":"以下哪些是酒店用來達到環境可持續發展的慣常做法?\n(1)採用廉價的洗衣劑\n(2)每天只用冷水清洗毛巾\n(3)採用發光二極管(LED燈泡)\n(4)取得領先能源與環境設計(LEED)的認證","opts":["只有(2)及(4)","只有(1)及(3)","只有(1)及(4)","只有(2)及(3)"],"a":0,"note":"(1) 錯誤﹕採用廉價的洗衣劑與環保沒有太大關係。 (2) 正確﹕每天只用冷水清洗毛巾，便可避免花耗更多能源予煲熱水。 (3) 錯誤﹕採用發光二極管(LED燈泡)並不是酒店的慣常做法。 (4) 正確"},{"q":"興建香港國際機場第三條跑道的經費部分來自向乘客徵收的機場建設費。這對現時使用機場的旅客可能有什麼影響?\n(1)轉機的乘客亦需要支付建設費。\n(2)旅客會因要為用不上的跑道付錢而感到不滿。\n(3)入境旅客可能會因徵費使航空旅行變得昂貴而選擇高速鐵路。\n(4)旅客於機場會獲得更多免費服務，以作為支付費用的補償。","opts":["只有(1)及(3)","只有(1)及(4)","只有(2)及(3)","只有(2)及(4)"],"a":0,"note":"(1) 正確﹕轉機的乘客需要支付建設費。 (2) 錯誤﹕沒有證據顯示旅客因用不上的跑道付錢而感到不滿。 (3) 正確﹕入境旅客可能會因徵費使航空旅行變得昂貴而選擇高速鐵路。 (4) 錯誤﹕旅客於機場不會獲得更多免費服務，以作為支付費用的補償。"},{"q":"以下哪些有關香港旅遊與款待業近期趨勢的描述是正確的?\n(1)更多酒店在郊區或工業區興建。\n(2)相較2016年，2017年的入境旅客總人數下跌。\n(3)短線而頻繁的出境旅遊越來越受歡迎。\n(4)餐飲為酒店業帶來的收入越來越不重要。","opts":["只有(1)及(3)","只有(1)及(2)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"(1)正確﹕由於市區用地已飽和，因此更多酒店在郊區或工業區興建。 (2)錯誤﹕2017年的入境旅客有58,472,157人，較2016年多3.2%。 (3)正確﹕短線而頻繁的出境旅遊越來越受歡迎。 (4)錯誤﹕餐飲為酒店業帶來的收入仍十分重要。"},{"q":"以下哪項不是餐飲業吸引Y世代顧客的慣常做法?","opts":["提供葡萄酒而非啤酒","經營24小時營業的連鎖快餐店","提供以有機食物為主的餐單","提供外帶飲品的服務"],"a":0,"note":"Y世代是指1980年代和1990年代出生的人 A.錯誤﹕經營24小時營業的連鎖快餐店方便生活不規律的顧客 B.錯誤﹕Y世代追求健康，因此餐廳需提供以有機食物為主的餐單 C.正確﹕沒有證據顯示Y世代喜歡葡萄酒多予啤酒 D.錯誤﹕外帶飲品服務是合乎現代人繁忙的生活節奏"}]},{"year":2019,"qs":[{"q":"以下哪項是旅遊與款待業的相關界別在事業途徑上的典型例子?","opts":["界別：旅遊服務；事業途徑的例子：初級旅遊顧問-高級旅遊顧問→業務主任","界別：酒店；事業途徑的例子：款接員→行李員→前堂經理","界別：航空公司；事業途徑的例子：地勤人員→機艙服務員→機長","界別：會議、獎勵、商務、展覽(MICE)；事業途徑的例子：項目助理>項目策畫經理>高級項目策畫主任"],"a":0,"note":"A、B、C﹕三個職位均沒有晉升的關係。 D﹕正確。初級旅遊顧問可晉升至高級旅遊顧問及業務主任"},{"q":"根據乘數效果的概念，長遠而言，以下哪項做法最有可能增加目的地的「流失」?","opts":["增加外資酒店的數目","降低當地旅行代理商的稅率","調派更多當地員工去海外參加某個培訓課程","邀請來自不同國家的樂隊參加節日的娛樂表演"],"a":0,"note":"乘數效果中，增加目的地的「流失」是指資金被海外機構賺走了。 A﹕正確。由於外資酒店的外國機構，增加該些酒店即讓他們賺取更多資金 B﹕錯誤。降低當地旅行代理商的稅率的確使旅行代理商的收益增加，但旅行代理商不一定是外國機構。 C﹕錯誤。措施沒有任何資金流走。 D﹕錯誤。措施只屬短期性質，並不符合題目所示「長遠而言」。"},{"q":"以下哪項有關旅遊業對文化影響的陳述最準確?","opts":["當地文化既可吸引旅客，同時亦可嚇跑旅客。","當地居民把旅客加以定型，可以消除文化影響。","如果大多數旅客都是個別的群體旅客，當地文化將不會受到影響。","如果發展旅遊業的經濟貢獻較大，對文化的影響將可被抵消。"],"a":0,"note":"A﹕正確。「當地文化吸引旅客」不難理解，但亦有文化嚇跑旅客，例如吃野生動物、或許一些傷害身體的宗教儀式等。 B﹕錯誤。當地居民難以把旅客加以定型，而且即使定型，例如來自某地區的旅客是沒有尊重當地文化、破壞文物，即使當地居民嘗試理解他們，把他們定型為「不文明旅客」，但旅客造成的破獲仍然存在，不滿仍會發生。 C﹕錯誤。不論是什麼類型的旅客，只要旅客自身沒有尊重當地文化，當地文化仍會受到影響。 D﹕錯誤。經濟貢獻不能抵銷對文化的影響。例如某地區的習俗被商業化，的確能為當地帶來收入，但被商業化的習俗可能已失去原有特色，甚至變質，文化仍受到破壞。"},{"q":"某乘客在香港國際機場的登機閘口被禁止登上往吉隆坡的航班。以下哪項是可能的原因?","opts":["該乘客拒絕將過大的手提行李託運。","該乘客未能出示身分證。","該乘客遺失了登機證，只能出示護照。","該乘客的手提袋裏有一瓶飲料。"],"a":0,"note":"登機閘口是指機場禁區內準備登機的位置 C﹕正確。因為上機手提行李最多為7公斤。旅客如有大型行李，應在機場登記(CHECK-IN)櫃檯把大型行李寄倉。"},{"q":"某旅客正計畫前往泰國旅行。以下哪項是在計畫階段的有效推動因素?","opts":["渴望鬆弛身心","一家保證能令人身心鬆弛的度假酒店","某著名廚師正在某家酒店提供烹飪課程","參加烹飪課程後，在社交媒體上獲得朋友認同"],"a":0,"note":"A﹕正確。渴望鬆弛身心是旅客內在的需求，從而推動他前往泰國旅行。 B/C/D﹕錯誤。因為「度假酒店」、「烹飪課程」都是泰國吸引旅客的地方，是拉因素。"},{"q":"根據巴特勒(Butler)的目的地生命週期，以下哪項不是目的地在「鞏固」階段的特徵?","opts":["旅客數量到達最高點。","探险式旅客或漫遊式旅客避免前往該目的地。","旅遊業已成為當地經濟的重要部分。","與早期階段相比，當地對旅遊業發展的控制較少。"],"a":0,"note":"A﹕正確。旅客數量到達最高點是「停滯」的特徵，不是「鞏固」的特徵。 B﹕錯誤。探险式旅客或漫遊式旅客的旅遊目的是探險或嘗試新事物，但「鞏固」階段的目的地的設施可能逐漸老化，其對旅客的吸引力減少，因此滿足不到探险式旅客或漫遊式旅客的要求。 C﹕錯誤。旅遊業已成為當地經濟的重要部分是「鞏固。的特徵 D﹕錯誤。由於「鞏固」階段時，外國的餐廳、酒店、主題樂園已進注當地，因此，與早期階段相比，當地政府/人對旅遊業發展的控制較少。"},{"q":"酒店總經理將引入工作輪換制度，讓員工體驗另一部門的前線崗位。以下哪些安排是恰當的?\n(1)前堂經理擔任禮賓司，處理客人行李。\n(2)行政樓層經理在宴會上為主家席提供服務。\n(3)餐飲部經理擔任技術員，負責廚房的維修。\n(4)行政管家在行政休息室辦理客人的入住登記手續。","opts":["只有(2)及(4)","只有(1)及(3)","只有(1)及(4)","只有(2)及(3)"],"a":0,"note":"(1)錯誤﹕禮賓司不負責處理客人行李，行李服務員才是處理客人行李。 (2)正確﹕在宴會上為主家席提供服務是前線崗位工作。 (3)錯誤﹕負責廚房的維修並不是前線崗位。 (4)正確﹕辦理客人的入住登記手續是前線崗位工作。"},{"q":"根據香港旅遊發展局酒店分類制度的指標，以下哪組酒店不屬於相同評級?\n(1)宜必思香港北角酒店及香港尖沙咀凱悅酒店\n(2)香港四季酒店及香港洲際酒店\n(3)香港半島酒店及港島香格里拉大酒店\n(4)香港置地文華東方酒店及香港九龍東智選假日酒店","opts":["只有(1)及(4)","只有(1)及(3)","只有(2)及(3)","只有(2)及(4)"],"a":0,"note":"(1)正確﹕宜必思3星、凱悅5星 (2)錯誤﹕四季及洲際都是5星 (3)錯誤﹕半島酒店及香格里拉都是5星 (4)正確﹕文華東方5星、智選假日3星"},{"q":"以下哪些有關行政樓層客房的陳述是正確的?\n(1)客人通常不會被提升入住行政樓層客房。\n(2)入住行政樓層的客人只可在行政休息室辦理入住登記手續。\n(3)女行政樓層客房只供以商務，而非以休閒為旅行目的的女性入住。\n(4)一般情況下，入住行政樓層客房的客人可以免費進入行政休息室。","opts":["只有(1)及(4)","只有(1)及(2)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"(1)正確﹕客人通常不會被提升入住行政樓層客房。 (2)錯誤﹕入住行政樓層的客人可在行政休息室或大堂都可辦理入住登記手續。 (3)錯誤﹕行政樓層客房不一定是提供予商務的客人，酒店也不會核實她們入宿的目的。 (4)正確﹕入住行政樓層客房的客人可享用行政樓層的高級服務，包括行政休息室。"},{"q":"哪種滅火器最適用於撲滅廚房裏以下類型的火?","opts":["電火：二氧化碳氣體式滅火筒；易燃液體引起的火警：泡沫式滅火筒","電火：水式滅火筒；易燃液體引起的火警：滅火毯","電火：泡沫式滅火筒；易燃液體引起的火警：二氧化碳氣體式滅火筒","電火：滅火毯；易燃液體引起的火警：水式滅火筒"],"a":0,"note":"A﹕正確。 B﹕錯誤。水式滅火筒不能撲滅電火。 C﹕錯誤。泡沫式滅火筒不能撲滅電火。 D﹕錯誤。水式滅火筒不能撲滅易燃液體。"},{"q":"從酒店擁有人的角度，按控管營運權力由大至小，把酒店管理模式加以排序。以下哪項排序是正確的?\n(1)以特許經營營運的酒店\n(2)以管理合約營運的酒店\n(3)由擁有人獨立持有並經營的酒店","opts":["(3)>(1)>(2)","(1)>(2)>(3)","(2)>(3)>(1)","(3)>(2)>(1)"],"a":0,"note":"(3)由擁有人獨立持有並經營的酒店是一個人全權管理酒店，因此控管營運權力最大。 (1)特許經營者需根據酒店品牌擁有者的指示管理及經營酒店，如果特許經營者不依照酒店品牌擁有者的規矩，特許經營者可能會被取消合作，因此控管營運權力仍大。 (2)管理合約是擁有人把酒店交予專業人士負責管理，擁有人只有酒店的擁有權，但-失去控管營運的權力。"},{"q":"房務員於清潔客房前，一般會按客房不同狀況編排清潔次序。以下哪項清潔顧序最合邏輯?\n(1)客人已入住的客房\n(2)客人已退房的客房\n(3)客人已入住，並要求「優先服務」的客房\n(4)客人退房，但預留予即將入住客人的客房","opts":["(3)>(4)>(2)>(1)","(3)>(2)>(1)>(4)","(2)>(3)>(4)>(1)","(4)>(1)>(2)>(3)"],"a":0,"note":"正確答案為C。"},{"q":"以下哪些是餐廳在營運上採用非選擇性餐單的好處?\n(1)改善顧客與員工之間的互動\n(2)由於菜式選項有限，故成本較低\n(3)食材的採購變得更簡單，更容易監察\n(4)由於菜式的分量較大，顧客毋須選擇太多的菜式","opts":["只有(2)及(3)","只有(1)及(2)","只有(1)及(4)","只有(3)及(4)"],"a":0,"note":"非選擇性餐單即是以「套餐形式」出售，客人只可以選擇A/B/C/D餐。 (1)錯誤﹕套餐與顧客與員工之間互動沒有關係。 (2)正確﹕由於菜式選項有限，大量購入某些食材，成本會較低。 (3)正確﹕由於菜式選項有限，餐廳只需大量購入某些食材，令食材的採購變得更簡單，更容易監察。 (4)錯誤﹕非選擇性餐單不等於菜式的分量會更大。"},{"q":"擬定餐單時應考慮食物的營養價值。以下哪種方法有助素食者在膳食中攝取較多的蛋白質?","opts":["加入以大豆製品為主要食材的菜式","多吃米飯","多吃不同顏色的蔬菜","加入用水果製成的菜式及甜點"],"a":0,"note":"D﹕因為大豆含較多的蛋白質。"},{"q":"某套餐餐牌中有下列五道菜式，即雪糕蘋果批、三文魚酥皮濃湯、凱撒沙拉配三文魚、咖啡配糕點、燒三文魚柳配焗薯。哪項是第三道菜?","opts":["燒三文魚柳配薯","雪糕蘋果批","三文魚酥皮濃湯","凱撒沙拉配三文魚"],"a":0,"note":"先後次序如下﹕ 1. 三文魚酥皮濃湯； 2. 凱撒沙拉配三文魚 3. 燒三文魚柳配薯 4. 雪糕蘋果批 因此答案是D"},{"q":"一個以刺激的機動遊戲為賣點的主題公園，可採取以下哪些策略以吸引新的客群?\n(1)增加售票櫃台的數目\n(2)提供室內娛樂活動，例如表演和特別節目\n(3)提供有關主題公園營運的工作坊\n(4)藉引進更多刺激的機動遊戲，擴大公園規模","opts":["只有(2)及(3)","只有(1)及(2)","只有(1)及(4)","只有(3)及(4)"],"a":0,"note":"要吸引新的客群，應該增設一些原先沒有的設施或加設新類型的項目。例如機動遊戲為賣點的主題公園應加增機動遊戲以外的設施或項目。 (1)錯誤﹕只是令排隊時間縮短，但不能吸引新的客群。 (2)正確﹕因此室內娛樂活動，例如表演和特別節目不是原有的項目，能吸引新的客群。 (3)正確﹕工作坊是新類型的項目，能吸引新的客群。 (4)錯誤﹕更多刺激的機動遊戲只屬於同類型的項目，不能吸引新的客群。"},{"q":"某旅客在1月1日在某城市登機飛往另一個城市之前，參與了當地的新年前夕倒數活動。當該名旅客抵達目的地後，他/她可以參與另一個新年前夕的倒數活動。以下哪項是該旅客的航線?","opts":["北京到三藩市","奧克蘭到曼谷","吉隆坡到莫爾兹比港","巴黎到阿布扎比"],"a":0,"note":"A. 奧克蘭(+12)到曼谷(+7)，相差5小時，航班需 約15 小時。因此，如果旅客在奧克蘭 1月1日 00:00上機，經15小時機程，到達曼谷已是當地時間1月1日 10:00，不能參與曼谷新年前夕的倒數活動。 B. 北京(+8)到三藩市(-8) ﹕相差16小時，航班只需約12小時。因此，如果旅客在北京1月1日 00:00上機，經12小時機程，到達三藩市是當地時間12月31日 20:00，仍可參與三藩市新年前夕的倒數活動。 C. 吉隆坡(+8)到莫爾兹比港(+10)﹕由於莫爾兹比港較吉隆坡先到達1月1日，因此旅客沒可能先參加吉隆坡的倒數活動才參加莫爾兹比港的倒數活動。 D. 巴黎(+1..."},{"q":"某旅客正前往某個國家的首都，該國的官方語言與某個舉辦奔牛節的國家相同。該名旅客現在正前往哪城市?","opts":["阿根廷的布宜諾斯艾利斯","澳洲的珀斯","巴西的里約熱內盧","沙特阿拉伯的利雅德"],"a":0,"note":"奔牛節的國家是西班牙，可見題目是問以下哪些國家/首先是以西班牙語為官方語言。 A. 錯誤﹕澳洲的珀斯﹕英語 B. 錯誤﹕巴西的里約熱內盧﹕葡萄牙語 C. 正確﹕阿根廷的布宜諾斯艾利斯﹕西班牙語 D. 錯誤﹕沙特阿拉伯的利雅德﹕阿拉伯語"},{"q":"來自摩洛哥的一群旅客在一次旅行中到訪三個城市。他們發現，第一個城市的宗教及官方語言與摩洛哥的相同，但第二及第三個城市的則與摩洛哥不相同。以下哪項是他們的行程?","opts":["第一個城市：迪拜；第二個城市：坎培拉；第三個城市：曼谷","第一個城市：聖地牙哥；第二個城市：突尼斯；第三個城市：奧克蘭","第一個城市：吉隆坡；第二個城市：聖保羅；第三個城市：羅馬","第一個城市：開羅；第二個城市：香港；第三個城市：利雅德"],"a":0,"note":"摩洛哥的宗教是伊斯蘭教，官方語言是阿拉伯語。題目是問以下哪個第一個城市的宗教和官方語言分別是伊斯蘭教和阿拉伯語，第二及第三個城市的宗教和官方語言並非伊斯蘭教和阿拉伯語。 A.正確 ﹕迪拜-阿拉伯語/伊斯蘭教；坎培拉(澳洲)英文/基督教；曼谷(泰國)泰文/佛教 B.錯誤﹕聖地牙哥(智利)西班牙語/智利宗教；突尼斯-阿拉伯語/伊斯蘭教；奧克蘭(新西蘭) 英文/基督教 C. 錯誤﹕吉隆坡(馬來西亞)馬來語/回教；聖保羅(巴西)葡萄牙語/天主教；羅馬(意大利)意大利語/天主教 D錯誤﹕開羅 (埃及) 阿拉伯語/伊斯蘭教；香港；利雅德(沙地阿拉伯) 阿拉伯語/伊斯蘭教"},{"q":"某旅客正計畫於12月到訪其中一個世界最大的珊瑚礁。以下哪項是該目的地、其所屬的地理區域及當地在12月的一般天氣情況的正確組合?","opts":["目的地：大堡礁；地理區域：南半球；天氣：炎熱潮濕","目的地：蘇梅島；地理區域：南半球；天氣：溫暖並有颱風","目的地：蘭卡威島(浮羅交怡)；地理區域：南半球；天氣：炎熱多雨","目的地：大佛羅里達礁；地理區域：北半球；天氣：寒冷多風"],"a":0,"note":"A.錯誤﹕蘇梅島位於泰國對出的泰國灣，位於北半球。 B.錯誤﹕浮羅交怡位於馬來西亞，位於北半球。 C.錯誤﹕大佛羅里達礁位於美國佛羅里達州南部外海的群島，位於北半球。該處屬熱帶氣候，12月至2月較冷的月份，邁阿密最低溫度平均有15、16度，要在12月潛水看珊瑚礁並非最合適。 D.正確﹕大堡礁位於澳洲北部，位於南半球。該處屬熱帶氣候，12月正是炎熱潮濕的夏季，要在12月潛水看珊瑚礁是最為合適。"},{"q":"以下哪項行禮禮儀的例子是恰當的?","opts":["在法國，親吻朋友雙頻","在印度，用左手與當地人握手","在阿拉伯國家，和異性握手","在日本，以雙手合十作祈禱狀向客人行禮"],"a":0,"note":"A. 錯誤﹕在印度的宗教信仰中，人們認為人的左手往往是被認為最骯髒的。 B. 正確 C. 錯誤﹕在阿拉伯國家，不應隨便女性接觸。 D. 錯誤﹕雙手合十作祈禱狀是泰國傳統而不是日本。"},{"q":"地震發生後，大量的客房預訂被取消，因此酒店經理決定提供客房優惠價，以提高最後一刻的入住率。這個案說明了服務的哪個範疇?","opts":["服務的不可保存性","服務質素的多變性","服務體驗的無形性","服務的生產與使用同時進行"],"a":0,"note":"當大量的客房預訂被取消，但如果仍然沒有旅客入住，房間便不斷空置，今天空置的房間不能保存並在他人出租，因此酒店經理決定提供客房優惠價，以提高最後一刻的入住率。這就說明了服務的「不可保存性」。 A﹕服務質素的多變性是指服務質素可能因為提供者、地點及時間等而有所改變，即缺乏一致性。 C﹕服務體驗的無形性是指顧客接受服務後，得到的體驗是無形的。 D﹕服務的生產與使用同時進行，例如在醫院裏，在同一時間中，醫生給予診治，而病人則接受治療\"生產與消費同時進行。但題目的上述內容沒有關係。"},{"q":"在航空公司登機櫃位處理以下兩類客人的最佳解決方法是什麼?","opts":["粗魯或不顧及他人的客人：保持冷靜及有禮，並嘗試向客人解釋；喋喋不休的客人：如果人龍很長，應請另一位同事代情況為處理其他的客人","粗魯或不顧及他人的客人：冷靜地走開；喋喋不休的客人：設定查詢時限","粗魯或不顧及他人的客人：提高說話時的音量及聲調；喋喋不休的客人：不回應查詢","粗魯或不顧及他人的客人：道歉並繼續提供服務；喋喋不休的客人：在對話中轉移話題"],"a":0,"note":"A﹕走開不是解釋問題的應有態度。而查詢設時限亦令有需要的客人不能表達意見。 B﹕提高說話時的音量及聲調會令人覺得沒有禮貌。而不回應查詢更不是合適的解決方法。 C﹕如不能確定對錯，或是否公司的責任，不應隨便道歉。而在對話中轉移話題令人覺得他的訴求不被重視。"},{"q":"某酒店客人評論﹕「在提出請求後十分鐘內，配備必要工具修妥客房」的服務承諾不能兌現。這是因為技術員花了60分鐘嘗試解決問題，後來才察覺到他/她沒有合適的工具。這個案中，哪些顧客服務特點沒有滿足?","opts":["可信性及有形性","可靠性及關懷性","有形性及關懷性","反應性及無形性"],"a":0,"note":"個案中，服務承諾列明「在提出請求後十分鐘內，配備必要工具修妥客房」，但技術員花了60分鐘嘗試解決問題，反映這些技術人員似乎不太專業，不能在短時間內完成維修，反映可信性沒有被滿足。 而且，技術員後來才察覺到他/她沒有合適的工具，工具屬於提供服務者應攜帶的設備，因此「有形性」沒有被滿足。 A/B﹕資料沒有顯示如何「關懷客人」。 D﹕技術人員花很長時間才能完成維修，的確「反應性」沒有被滿足。但「無形性」並不是顧客服務特點之一。"},{"q":"基於可持續性的問題，哪個旅遊目的地在2018年曾遭短暫關閉?","opts":["菲律賓的長灘島","泰國的布吉島","智利的復活島","日本的阿蘇山"],"a":0,"note":"長灘島以白沙灘聞名，去年有接近200萬遊客前往該地。但當地酒店、餐廳及其他觀光企業，譴責他們將污水直接排放入海，污染環境。因此，菲律賓總統表示，將從2018年4月26日起關閉長灘島。"},{"q":"以下哪組陳述準確地描述了三種顧客忠誠度計畫的特徵?","opts":["簡單的計分計畫：計畫鼓勵短期內經常購買；級別計畫：顧客通過累積積分來提取長期價值；夥伴計畫：多家公司提供積分","簡單的計分計畫：計畫提高品牌知名；級別計畫：計畫為常客提供折扣；夥伴計畫：計畫容易開展","簡單的計分計畫：顧客通過累積積分來提取長期價值；級別計畫：計畫允許在不同公司累顧客所獲得的積分；夥伴計畫：顧客所獲得的積分越 多，獎賞越多","簡單的計分計畫：顧客賺取可轉化成獎賞的積分；級別計畫：計畫開始時會提供更多的獎賞以吸引顧客；夥伴計畫：顧客從多家公司賺取積分，但只能在一家公司兌換"],"a":0,"note":"正確答案為C。"},{"q":"某家中餐館希望吸引更多穆斯林顧客。以下哪項可能對他們有吸引力?","opts":["使用即棄的餐具","以折扣價提供酒精飲料","設計一些包含不同類型紅肉的健康融合美食","在齋月(齋戒月)期間提供輕便午餐"],"a":0,"note":"穆斯林即伊斯蘭教。 A﹕錯誤。穆斯林不能飲酒。 B﹕錯誤。穆斯林不吃豬肉。 C﹕正確。因為穆斯林認為餐廳的餐具可能在之前已接觸過豬肉或酒，即使清潔好但仍因接觸過上述食物，令穆斯林感到不安。即棄餐具確保之前沒有接觸過豬肉或酒，因而受穆斯林人歡迎。 D﹕齋戒月規定穆斯林在日出後至日落前不能進食，因此在中午期間提供輕便午餐違反上述守則。"},{"q":"為達致可持續發展旅遊議程十二個目標之一的「資源效率」，航空運輸業採取了以下哪些行動?\n(1)拆下機艙內所有座椅的金屬踏板\n(2)使用可回收及可再生物料生產機艙用品\n(3)減少使用對環境有害的化學清潔劑\n(4)減少使用釋放氟氯化碳(CFCs)的冷卻系統","opts":["只有(1)及(2)","只有(1)及(4)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"「資源效率」指在發展旅遊設施和服務的過程中，應盡量減少使用稀少和不可再生的資源。例子：在旅遊項目中考慮資源供應計劃，如規劃水源和能源供應；灌輸減少、再用、循環再用的思維，如創造旅遊用品（特別是紙張，玻璃和塑料）回收市場。 (1)正確﹕不使用金屬踏板可減少使用金屬物料。 (2)正確﹕使用可回收及可再生物料能有助循環再用資源。 (3)錯誤﹕減少使用對環境有害的化學清潔劑屬於「環境清潔」。 (4)錯誤﹕減少使用釋放氟氯化碳(CFCs)的冷卻系統屬於「環境清潔」。"},{"q":"2018年香港開設的新邊境管制站，最有可能為哪類旅客帶來方便?\n(1)來自大灣區的短途入境旅客\n(2)來自歐洲的入境旅客\n(3)到訪東南亞的出境旅客\n(4)到訪內地「二線」城市的出境旅客","opts":["只有(1)及(4)","只有(1)及(2)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"2018年香港開設的新邊境管制是指「港珠澳大橋口岸」。 (1)正確﹕來自大灣區的短途入境旅客可乘車從港珠澳大橋進入香港。 (2)錯誤﹕來自歐洲的入境旅客應使用機場。 (3)錯誤﹕到訪東南亞的出境旅客應使用機場。 (4)正確﹕旅客可利用港珠澳大橋直達珠海，再前往其他內地「二線」城市。"}]},{"year":2020,"qs":[{"q":"以下哪些是旅遊服務供應商透過中介機構銷售其產品所得到的好處?\n(1)確保中介機構得以營運下去\n(2)向顧客做市場推廣的預算得以降低\n(3)透過交易常規化，減低分銷成本\n(4)减低服務供應商之間的競爭","opts":["只有(2)及(3)","只有(1)及(2)","只有(1)及(4)","只有(3)及(4)"],"a":0,"note":"(1)旅遊服務供應商與確保中介機構能否營運沒有關係。 (2)中介機構負責市場推廣，所以旅遊服務供應商可節省該些預算。 (3)中介機構負責把產品售予消費者，旅遊服務供應商分銷成本因而減低。 (4)與服務供應商之間的競爭沒有關係。"},{"q":"以下哪項有關亞太旅遊協會(太平洋亞洲旅遊協會(PATA)角色的陳述是正確的?","opts":["促進區內旅遊業的可持續增長、價值及質素","作為國際及國內旅遊資料的交换中心","協調區內的商業航空活動","促進所有國家的經濟發展及透過旅遊業使全球的衰退經濟體得以復甦"],"a":0,"note":"B)分享國內旅遊資訊由該國的旅遊部門負責，與亞太旅遊協會沒有關係 C)關於商業航空，各國有相關部份負責，例如在香港是由民航處負責 D)與促進各國的經濟沒有關係"},{"q":"某餐廳經理做了一項調查，評估顧客對餐廳擠擁程度及噪音的意見，他/她發現餐廳應把座位數量上限定為50。這個案說明了以下哪類承載力?","opts":["空間及心理","經濟及空間","環境及經濟","社會文化及心理"],"a":0,"note":"(A)經濟是錯誤。因為與經濟周期、通帳、就業機會等沒有太大關係。 (B)空間是設施最多能容納的人數；心理是人數過多令旅客不滿。正確。 (C)環境是錯誤。因為與自然環境沒有太大關係。 (D)社會文化錯誤。因為資料沒有展示「當地人如何受旅客影響」。"},{"q":"以下哪項最能描述旅遊動機中推動及拉動因素之間的分別?","opts":["推動因素：使潛在旅客產生旅遊願望；拉動因素：幫助旅客選出明確的目的地","推動因素：本質上必定是有形的；拉動因素：本質上可以是有形或無形的","推動因素：是目的地對旅客的吸引力；拉動因素：激發旅遊願望以滿足需求","推動因素：其中一個因素是尋求挑戰體能；拉動因素：其中一個因素是逃避苦悶的生活"],"a":0,"note":"推因素是指旅客自身出發的因素；拉因素是旅遊目的地吸引旅客的因素。 (A)有形是能觸摸的。無形是不能觸摸的。與有形無形沒有關係。 (B)內容剛好相反。 (C)尋求挑戰體能是對的，但逃避苦悶的生活都是推因素。 (D)推是旅客自身出發的慾望；拉因素是當地能吸引旅客的特徵。"},{"q":"某旅客報名參加香港某持牌旅行代理商辦的廣州一天團，團費港幣$800，在深圳集合及解散。但是該旅行代理商在出團前結業。根據《旅行代理商條例》，該旅客從旅遊業賠償基金可得的賠償金額是多少?","opts":["港幣$0","港幣$720","港幣$300","港幣$880"],"a":0,"note":"正確答案為A。"},{"q":"某人持有香港特別行政區護照，將會前往曼谷旅遊五天，他/她在香港國際機場辦理登機手續時，需要什麼證件?\n(1)簽證\n(2)列明目的地的航空公司機票\n(3)有效期不少於六個月的身份證明文件\n(4)防疫注射證明","opts":["只有(2)及(3)","只有(1)及(2)","只有(1)及(4)","只有(3)及(4)"],"a":0,"note":"(1)特區護照可免簽證到泰國。 (2)市民利用機場出境必須出示機票。 (3)市民利用機場出境必須出示身份證或護照。 (4)注射證明是不必要。"},{"q":"根據資金流量(旅遊業倍增效益的現象)，以下哪些是旅遊業為香港經濟帶來的第一重效應?\n(1)本地主題樂園收取的入場費。\n(2)酒店員工存入銀行的薪金。\n(3)旅行社為某個全包旅行團所預繳的住宿費用。\n(4)在港營運的某跨國連鎖餐飲集團所支付的本地食材成本。","opts":["只有(1)及(3)","只有(1)及(2)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"第一重效應是旅客向當地繳付的費用。第二重是當地機構或設施收到旅客的費用後，用來支票員工薪金、購買物資或服務等。第三重是員工獲得薪金後，用來消費或存款。 (1)正確﹕旅客直接向主題樂園支付入場費，是第一重效應。 (2)錯誤﹕酒店員工收到薪金後才存入銀行，是第三重效應。 (3)正確﹕旅行社只是代旅客向酒店繳交住宿費，可視為旅客把錢交給當地酒店，是第一重效應。 (4)錯誤﹕餐廳為了服務旅客，向食材供應商購買食材，是第二重效應。"},{"q":"某背包旅客用六個月時間遊歷亞洲，他/她的行程並非完全固定，有時候也參加包酒店住宿的旅行團。根據高恆(Cohen)的旅客分類，以下哪些旅客類型是對這名旅客的最佳描述?\n(1)漫遊式旅客\n(2)旅行團群體旅客\n(3)探險式旅客\n(4)個別的群體旅客","opts":["只有(3)及(4)","只有(1)及(2)","只有(1)及(3)","只有(2)及(4)"],"a":0,"note":"(1)錯誤﹕漫遊式旅客是不會參加任何旅行團。 (2)錯誤﹕旅行團群體旅客的行程是完全固定。 (3)正確﹕探險式旅客行程並非完全固定。 (4)正確﹕個別的群體旅客有時候也參加旅行團。"},{"q":"以下哪個政府部門負責香港酒店的發牌事宜?","opts":["民政事務總署","香港酒店業協會","旅遊事務署","康樂及文化事務署"],"a":0,"note":"A.香港酒店業協會﹕連繫及協調香港酒店業；爭取及保障會員的權益；向政府提供有關香港酒店業發展的建議；及與其他參與香港酒店及飲食業訓練的教育機構緊密合作 B.旅遊事務署﹕負責統籌政府內部各項發展旅遊業的工作，並提供更佳的政策支援，推動本港的旅遊業。 C.民政事務總署﹕正確 D康樂及文化事務署﹕沒有關係"},{"q":"在香港的酒店客房內，以下哪項物品一般是收費項目?","opts":["摺疊床","空氣清新機","熨斗及熨衫板","額外床上用品"],"a":0,"note":"正確答案為B。"},{"q":"根據顧客流程，以下哪項不會在抵達酒店前的階段發生?","opts":["禮賓部職員為未落實訂房的客人預先安排交通到機場。","客人透過訂房部職員的協助預訂客房。","管家部職員清潔客房。","前堂部職員預先分配客房。"],"a":0,"note":"正確答案為D。"},{"q":"食物中毒可能是由進食受污染食物所致。以下哪項細菌性食物中毒的例子是不正確的?","opts":["細菌：李斯特菌；「源頭」/受污染食物：人的皮膚；細菌特性：能抵受高溫","細菌：沙門氏菌；「源頭」/受污染食物：未煮熟的蛋類製品；細菌特性：於高溫下死亡","細菌：臘樣芽孢桿菌；「源頭」/受污染食物：炒飯；細菌特性：能抵受高溫","細菌：副溶血性弧菌；「源頭」/受污染食物：未煮熟的海鮮；細菌特性：於高溫下死亡"],"a":0,"note":"(C)李斯特菌常見於自然環境（如泥土或水等），亦可存在於受污染而未經煮熟的食物如蔬菜、生肉，以及未經巴士德消毒法處理的奶。加工食物如軟芝士及凍食肉類等食物，亦可能在製作過程中或其後受污染。李斯特菌能在低溫環境下生存，並可在受污染的冷藏食物中繁殖。烹煮過程能殺死李斯特菌。"},{"q":"為什麼套餐通常比自選餐為餐廳帶來更高的利潤?\n(1)食材平均成本較低。\n(2)食物質素較高。\n(3)烹調更有效率。\n(4)用餐的環境氣氛特別。","opts":["只有(1)及(3)","只有(1)及(2)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"(1)正確﹕套餐所需的食材數目較散餐少，而且可大量購入，因此平均成本較低。 (2)錯誤﹕與食物質素沒有關係。 (3)正確﹕套餐只有數個選擇，部份食物可預先準備，或先作大量烹調，因而更有效率。 (4)錯誤﹕與用餐的環境沒有關係。"},{"q":"以下哪項是清潔酒店客房的標準程序?","opts":["檢查設施→鋪床→清理垃圾並打掃客房→清潔浴室→吸塵","清潔浴室→清理垃圾並打掃客房→吸塵→檢查設施→鋪床","清理垃圾並打掃客房→檢查設施→清潔浴室→吸塵→鋪床","吸塵→清理垃圾並打掃客房→清潔浴室→鋪床→檢查設施"],"a":0,"note":"正確答案為A。"},{"q":"根據香港旅遊發展局的酒店分類制度，以下哪些被酒店採用的策略可能會影響酒店評級?\n(1)委任一家顧問公司為酒店翻新\n(2)設立兩間額外的無障礙客房\n(3)增加食物供應商數目\n(4)推廣商務優惠以吸引更多的商務遊客","opts":["只有(2)及(4)","只有(1)及(3)","只有(1)及(4)","只有(2)及(3)"],"a":0,"note":"旅發局自設評級系統，作為反映香港酒店質素及服務的指標。系統將酒店分為四個不同級別：1甲級高價酒店；2. 乙級高價酒店；3. 中價酒店；4. 旅客賓館 評級乃根據五個主要指標的表現而釐定，設施、地點、職員與客房的比例、實際房租、商務組合。 (1)錯誤﹕只是為酒店翻新，並沒有增加設施，因此不包含在主要指標之中。 (2)正確﹕設立兩間額外的無障礙客房即增加「設施」 (3)錯誤﹕指標中沒有「增加食物供應商數目」一項 (4)正確﹕推廣商務優惠即是增加「商務組合」"},{"q":"旅客會因節慶及活動項目到訪某目的地。以下哪些目的地與節慶或活動項目的組合是正確的?\n[TABLE]\n | 目的地 | 節慶或活動項目\n1 | 泰國 | 潑水節(宋干節)(WaterFestival)\n2 | 墨西哥 | 亡靈節(DayoftheDead)\n3 | 新西蘭 | 番茄節(TomatoFestival)\n4 | 摩洛哥 | 森巴狂歡節慶典(嘉年華(SambaCarnivalCelebration)\n[/TABLE]","opts":["只有(1)及(2)","只有(1)及(4)","只有(2)及(3)","只有(2)及(4)"],"a":0,"note":"(3) 番茄節是西班牙的節日。 (4) 森巴狂歡節慶典是巴西的節日。"},{"q":"以下哪個直航航班最有可能飛越印度洋及阿拉伯海?","opts":["往返坎培拉、阿布扎比","往返香港、馬德里","往返突尼斯、巴西利亞","往返迪拜、北京"],"a":0,"note":"正確答案為C。"},{"q":"某旅客計畫由香港飛往智利，享受陽光海灘及水上活動。他/她最適宜於以下哪些假期出\n行?\n復活節\n中秋節\n聖誕節\n農曆新年","opts":["只有(3)及(4)","只有(1)及(2)","只有(1)及(3)","只有(2)及(4)"],"a":0,"note":"香港位於北半球，智利則位於南半球。因此，兩地的季節是相反的。要到智利享受陽光海灘及水上活動，應選擇智利的夏天。如果從香港出發，出發的季節應是冬天。 而答案中只有(3)聖誕節及(4)農曆新年是本港冬天的節日，因此答案是D。"},{"q":"根據以下資料，指出兩個城市的時差。假設兩班航機的飛行時間相同。\n[TABLE]\n航班編號 | 日期 | 航線 | 由起點出發 (當地時間) | 到達目的地 (當地時間)\nAP123 | 6月27日 | 城市A-城市B | 07:55 | 07:55\nAB122 | 6月29日 | 城市B-城市A | 13:10 | 15:10\n[/TABLE]","opts":["城市A比城市B快一小時","城市和城市沒有時差","城市A比城市B慢一小時","城市B比城市A慢兩小時"],"a":0,"note":"AP123由城市A飛到城市B，起飛時間是A07:55，機程1小時，因此到達城市B是A08:55，但資料顯示城市B的時間是07:55，可見，城市A較城市B快1小時。 AB122由城市B飛到城市A，起飛時間是1310，機程1小時，因此到達城市A時，時間是B14:10，但資料顯示城市A的時間是15:10，這亦反映出A較城市B快1小時。"},{"q":"以下哪個著名目的地位於西半球?","opts":["大峡谷","大堡礁","吉薩金字塔","布達拉宮"],"a":0,"note":"A.大堡礁位於澳洲東面 B.大峡谷位於美國西面 C.吉薩金字塔位於埃及 D.布達拉宮位於西藏"},{"q":"以下哪個國家與其國內自然資源的組合是正確的?","opts":["智利：冰川；迪拜：沙漠；西班牙：海灘","智利：極地；迪拜：島嶼；西班牙：熱帶雨林","智利：海岸；迪拜：冰川；西班牙：沙漠","智利：山嶽；迪拜：熱帶雨林；西班牙：冰川"],"a":0,"note":"正確答案為A。"},{"q":"航空業提供各種的忠誠度計畫。以下哪些屬於簡單的計分計畫?\n(1)獲取航空公司的飛行里數，以換取航班上的紀念品\n(2)在獲得足夠飛行里數後，會籍將會提升至另一等級\n(3)乘搭航空公司的航班以獲取里数\n(4)由航空公司及銀行信用卡得到的積分，可互相轉換","opts":["只有(1)及(3)","只有(1)及(2)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"簡單的計分計畫是指乘客在購買機位後得到分數/里數，然後獲得獎賞。 (1)及(3)是符合上述原則，但(2)沒有提及實際的獎類。(4)乘客不是在購買機位後直接得到分數/里數。"},{"q":"一位客人在某國首都入住酒店時，獲送贈一份最能代表該國家的紀念品。以下哪個組合是正確的?","opts":["首都：渥太華；獲贈的紀念品：楓葉糖漿","首都：吉隆坡；獲贈的紀念品：薰衣草","首都：突尼斯；獲贈的紀念品：袋鼠圖案的T恤","首都：利雅德；獲贈的紀念品：點心食譜"],"a":0,"note":"渥太華是加拿大首都，加拿大的代表物件是楓葉"},{"q":"下表顯示某餐廳的服務評分。\n[TABLE]\n | 平均分(0至5分，5分為最高)\n服務效率 | 4.0\n對顧客的關懷 | 4.2\n僱員的知識 | 4.5\n服務承諾的實踐 | 3.0\n僱員的外表 | 4.3\n[/TABLE]\n根據Parasuraman的五個顧客服務特點，該餐廳在以下哪個特點的表現為最佳?","opts":["可信性","關懷性","有形性","反應性"],"a":0,"note":"可靠性 ﹕每次都能可靠而準確地提供承諾的服務。例如：及時提供服務和產品的傳送。 可信性﹕僱員的知識及禮貌，以及贏取顧客信任與信心的能力。例如：員工的經驗和專業水平、員工的禮貌及員工給顧客安全感所作出的努力。 有形性﹕有形的設施應該視覺上俱有吸引力並應當與所提供的服務種類、所使用的服務設備、服務人員的外表、光顧服務的顧客的行為與環境氣氛要相符。例如：內部的裝飾應當與所提供的服務種類相稱；有一班喧嘩的顧客光顧一家以寧靜為主題的咖啡店。 關懷性﹕公司對顧客的關心及關注。例如：員工與顧客的比例、員工對顧客的投入程度、員工的適應能力和公司提供給顧客的必需品。例如：代糖是餐廳供應給顧客其中一種的必需..."},{"q":"以下哪個是旅行代理商服務失誤的最佳例子?","opts":["向顧客收取未獲授權的旅遊保險費","向某家準點表現(on-timeperformance)欠佳的航空公司訂購機票","行程中預留很多自由時間，旅客得花費更多金錢","為旅客預訂需要轉機的航班"],"a":0,"note":"A﹕正確。由於保險由保險公司負責，亦需由保險公司授權旅行社代為收取，因此旅行社不得向顧客收取未獲授權的保險費 B﹕錯誤。即使準點表現欠佳(即是航班常常遲到)，旅行社向該航空公司訂購機票也不屬於失誤。 C﹕錯誤。自由時間不一定使旅客得花費更多金錢，這安排也不屬於「服務失誤」。 D﹕錯誤。不少行程都需要轉機，為旅客預訂需要轉機的航班並無不妥。"},{"q":"以下哪項有關航空公司代碼共享的描述是不正確的?","opts":["負責銷售的航空公司及負責營運的航空公司均需把航班編號列示在同一張機票上。","負責銷售的航空公司及負責營運的航空公司可能有所不同。","透過代碼共享，航空公司能給遊客提供更多目的地。","代碼共享出現於國際及本地航班。"],"a":0,"note":"「代碼共享」航班是由兩間或多間航空公司聯合營運的航班。 A﹕描述是正確的。因為負責銷售的航空公司可能只是負責賣機票予旅客，但機程的營運由負責營運的航空公司負責。 B﹕描述是正確的。透過代碼共享，航空公司能給遊客提供更多目的地。例如，國泰航空沒有營運往返巴西的航班，但國泰可以透過與美國航空代碼共享，並且銷售美國航空的機位，來出售一張由香港飛往巴西的機票。這樣航空公司便能善用互相的資源，提高載客率。 C﹕描述是正確的。代碼共享是有機會出現於國際及本地航班。 D﹕描述是不正確的。負責銷售的航空公司及負責營運的航空公司不必需要把航班編號列示在同一張機票上。"},{"q":"某旅行代理商正為香港學生規畫粤港澳大灣區的一些行程活動，以下哪些行程是合適的?\n(1)在四川扶貧\n(2)到訪惠州一個初創企業\n(3)在天津舉辦的一個普通話班\n(4)出席一個由江門一所大學舉辦的培訓工作坊","opts":["只有(2)及(4)","只有(1)及(2)","只有(1)及(3)","只有(3)及(4)"],"a":0,"note":"(1)錯誤﹕因為四川不屬於大灣區。 (2)正確﹕因為惠州屬於大灣區。 (3)錯誤﹕因為天津不屬於大灣區。 (4)正確﹕因為江門屬於大灣區。"},{"q":"基於保育理由，香港禁止航空公司運送特定物品。以下哪項物品是禁運品?","opts":["象牙製品","魚翅","蛇皮製品","皮草"],"a":0,"note":"正確答案為A。"},{"q":"某團體正參加一個往返香港和廣東省中山的兩天團。該團經某個於2018年啟用的陸路口岸離港，並經離目的地最近的口岸返港。以下哪個組合是正確的?","opts":["出境管制站：高鐵西九龍；入境管制站：港珠澳大橋","出境管制站：羅湖；入境管制站：高鐵西九龍","出境管制站：文錦渡；入境管制站：落馬洲","出境管制站：中國客運碼頭；入境管制站：深圳灣"],"a":0,"note":"A﹕錯誤。因為羅湖不是2018年啟用。 B﹕錯誤。因為文錦渡不是2018年啟用。 C﹕正確。高鐵西九龍是2018年啟用，而且可直達中山；而港珠澳大橋可經珠海到中山，行程較近。 D﹕錯誤。因為中國客運碼頭不是陸路離港口岸。"},{"q":"以下哪項不可能減少遊客所造成的碳排放?","opts":["乘機時，坐頭等客位而非經濟客位","減輕行李重量","於餐廳進食當地栽種的食物","踏單車探索城市"],"a":0,"note":"A﹕正確。因為頭等客位與非經濟客位在減少碳排放方面是沒有分別的。 B﹕減輕行李重量可令飛機減少使用燃油。 C﹕進食當地食物可減少交通運輸的排放。 D﹕踏單車而非使用汽車可減低交通排放。"}]},{"year":2021,"qs":[{"q":"以下哪些有關旅遊業整合模式的描述是正確的?\n(1) 旅遊業整合模式只有兩個主要元素。\n(2) 旅客是整個模式的核心，亦是所有旅遊業相關活動的中心。\n(3) 旅行代理商的市場定位受人口趨勢的影響。\n(4) 航空公司作為第一層的旅遊服務供應商，與旅客保持緊密聯繫。","opts":["只有(2)及(3)","只有(1) 及(3)","只有(1) 及(4)","只有(2)及(4)"],"a":0,"note":"(1) 錯誤﹕旅遊業整合模式包括外在因素、旅遊服務供應商、旅遊推廣者、旅客4大因素。1.3 (2) 正確 (3) 正確﹕例如該城市人口老化愈來愈嚴重，旅行代理商便會主攻長者旅遊的市場。 (4) 錯誤﹕航空公司是「旅遊服務供應商」，他們會把機票交予，例如旅行社代為出售。因此與旅客保持緊密聯繫的是「旅遊推廣者」。"},{"q":"一位遊客在查看某廉價航空公司提供的特價機票後，計畫於七月份前往馬來西亞旅遊。以下哪項有關這個案的描述並不正確?","opts":["手提及寄艙行李均須收取附加費。","遊客取消機票，通常不獲退款。","機上沒有提供免費餐飲服務。","七月是目的地的旅遊旺季。"],"a":0,"note":"A﹕正確，因此不是答案。因此遊客買的是廉價航空機票，取消機票通常不獲退款。 B﹕不正確，因此B是答案。廉價航空的手提及寄艙行李均須收取附加費。 C﹕正確，因此不是答案。由於是廉價航空，機上沒有提供免費餐飲服務。 D﹕正確，因此不是答案。七月是目的地的旅遊旺季。"},{"q":"哪些有關香港旅遊發展局及旅遊事務署角色的陳述是正確的?","opts":["香港旅遊發展局：積極提升旅客的旅遊體驗；旅遊事務署：制定旅遊業的政策及全盤策略","香港旅遊發展局：鼓勵社區透過旅遊業推動經濟發展；旅遊事務署：資助旅行代理商從業員的培訓課程","香港旅遊發展局：執行各種守則，以維持旅遊業界的高水平服務及公平競爭；旅遊事務署：與航空公司、酒店業主及旅遊營運商磋商以發展旅遊業","香港旅遊發展局：協調其他政府部門，推行對旅遊業有影響的政策和措施；旅遊事務署：與大灣區內各城市結盟為旅遊業夥伴"],"a":0,"note":"書第一冊單元2 CH10 B﹕錯誤。資助旅行代理商從業員的培訓課程的是「香港旅遊業議會」。 C﹕錯誤。與航空公司、酒店業主及旅遊營運商磋商以發展旅遊業的是「香港旅遊發展局」。 D﹕錯誤。協調其他政府部門，推行對旅遊業有影響的政策和措施的是「旅遊事務署」。而與大灣區內各城市結盟為旅遊業夥伴的是「香港旅遊發展局」。"},{"q":"「很多訪客都批評某主題公園過於擠迫，有些訪客眼見其他人踐踏草地時，亦會大表不滿。 」以下哪類承載力並不適用於這情況?","opts":["社會文化承載力","空間承載力","環境承載力","心理承載力"],"a":0,"note":"書第一冊單元1 CH4.4 「過於擠迫」是空間承載力 「踐踏草地」是環境承載力 「大表不滿」是心理承載力 「社會文化承載力」當地社群/當地人對外來遊客的不滿。而題目沒有上述情況。"},{"q":"根據聯合國世界旅遊組織編制的數字，以下哪些國家是2019年十大最多國際旅客到訪的目的地?\n(1) 法國\n(2) 日本\n(3) 澳洲\n(4) 美國","opts":["只有(1)及(4)","只有(1)及(2)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"正確答案為B。"},{"q":"以下哪些是旅遊業發展給當地社區帶來的社會及文化影響?\n(1) 透過為海外旅客提供服務賺取外匯\n(2) 改變職業的形式及種類\n(3) 保育自然資源以供當地人及旅客享用\n(4) 令傳統工藝設計、藝術與工藝品消失","opts":["只有(2)及(4)","只有(1)及(2)","只有(1)及(4)","只有(2)及(3)"],"a":0,"note":"(1) 是經濟方面的影響。 (3) 是環境方面的影響。"},{"q":"以下哪項有關公幹旅遊特性的描述是正確的?","opts":["公幹旅客通常以較短而頻密的行程到訪目的地。","公幹旅客會因價格上升而減少出遊。","季節性因素，例如假期，會對公幹旅遊造成很大影響。","公幹旅客通常比普通旅客消費少。"],"a":0,"note":"A﹕錯誤。公幹旅客的費用由公司支付，而且公幹是因公事需要，例如開會、談生意，並不會因價格上升而減少出遊 B﹕錯誤。原因同上，與季節性因素沒有關係。 C﹕錯誤。公幹旅客的費用由公司支付，一般會選擇乘坐較快較舒適的交通工具，例如商務客位。因此比普通旅客消費較多。 D﹕正確。公幹旅客出訪目的是公事，談生意後會返國，因此行程較短。而談生意、開會的次數可能較多，因此他們會更頻密地到訪目的地。"},{"q":"在香港，如果某遊客向旅行代理商購買了旅遊產品，而該旅行代理商在出發前倒閉。在以下哪種情況下，他/她才可獲得旅遊業賠償基金的賠償?\n(1) 購買了兩張前往澳門的噴射飛航船票\n(2) 參加了吉隆坡五天旅行團\n(3) 購買了包機票及住宿的曼谷旅遊套票\n(4) 參加了在深圳集合的珠海一日遊","opts":["只有(2)及(3)","只有(1)及(2)","只有(1)及(4)","只有(3)及(4)"],"a":0,"note":"(1) 單獨購買機票、船票、巴士票的交易是不包括在旅遊業賠償基金的賠償內。 (4) 在香港以上的地方集合並解散的一天團不屬於法律定義下的旅行團，因此不包括在旅遊業賠償基金的賠償內。"},{"q":"在以下哪種情況下，用餐者最有可能會因生物性污染而導致食物中毒?","opts":["用餐者進食了未經煮熟的海鮮。","用餐者進食了含孔雀石綠的淡水魚。","用餐者進食了處理不當的河豚。","用餐者進食了半公斤臘腸。"],"a":0,"note":"書第二冊28.2生物性污染 生物性污染是指有害的細菌、病毒及寄生物污染食品。 A﹕錯誤。孔雀石綠是工業染料，屬於「化學性污染」。 B﹕正確。未經煮熟的海鮮存有有害的細菌及寄生物，屬於「生物性污染」。 C﹕錯誤。河豚本身具有毒性，屬於「化學性污染」。 D﹕錯誤。過度進食臘腸與食物污染沒有關係。"},{"q":"以下哪些是酒店公共地方清潔員日常須負責清潔的「前台」區域?\n(1) 商務中心\n(2) 泊車處\n(3) 儲物間\n(4) 布草房","opts":["只有(1)及(2)","只有(1)及(3)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"由公共清潔員清潔的「前台」區域 大堂、升降機和扶手電梯、洗手間、泊車處、餐廳、宴會廳和會議室、健身室和游泳池、商務中心 由公共清潔員清潔的「後台」區域 員工更衣室、 送貨升降機、 員工餐廳或自助食堂、 廚房 、 各部門辦公室 、樓梯 、儲物間 、 洗衣及制服房"},{"q":"以下哪些滅火筒可用於撲滅廚房的電火?\n(1) 水式滅火筒\n(2) 乾粉式滅火筒\n(3) 淨劑滅火筒\n(4) 泡沫式滅火筒","opts":["只有(2)及(3)","只有(1)及(2)","只有(1)及(4)","只有(3)及(4)"],"a":0,"note":"(1) 錯誤。水式滅火筒切勿用以灌救電火、燃燒中之易燃液體或金屬品。 (2) (3)正確。 (4) 錯誤。泡沫能浮在燃燒中的液體之上，隔絕燃燒表面。但切勿用以灌救電火、燃燒中之易燃液體或金屬品。"},{"q":"某目的地的旅遊業變得制度化，但增長速度已開始放緩。這項陳述是指旅遊目的地生命週期的哪個階段?","opts":["鞏固","發展","擴大","投入"],"a":0,"note":"正確答案為A。"},{"q":"以下哪個航班途經的時區最多?","opts":["由開羅前往威靈頓的航班","由巴西利亞前往紐約的航班","由巴黎前往開普敦的航班","由坎培拉前往莫蘭兹比港的航班"],"a":0,"note":"A. 由巴西利亞(-3)前往紐約(-5)的航班 ，相差時區為2 B. 由巴黎(+2)前往開普敦(+2)的航班，相差時區為0 正確C. 由開羅(+2)前往威靈頓(+12)的航班，相差時區為10 D. 由坎培拉(+10)前往莫蘭兹比港(+10)的航班，相差時區為10"},{"q":"以下哪些組合對兩種餐飲服務市場的描述大致恰當?\n[TABLE]\n | 酒店市場 | 醫護市場\n(1) | 提供餐桌服務 | 自助食堂形式\n(2) | 只提供自選餐餐牌或自助餐 | 自助服務\n(3) | 有餐桌擺設 | 沒有餐桌擺設\n(4) | 需付小費 | 需付服務費\n[/TABLE]","opts":["只有(1)及(3)","只有(1)及(2)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"書第二冊24.2"},{"q":"以下哪些是位於北半球並具有地中海氣候的國家?\n(1) 摩洛哥\n(2) 西班牙\n(3) 墨西哥\n(4) 智利","opts":["只有(1)及(2)","只有(1)及(4)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"(1) 摩洛哥﹕正確 (2) 西班牙 ﹕正確 (3) 墨西哥﹕錯誤。北部是熱帶沙漠氣候，南部則為熱帶雨林氣候。 (4) 智利﹕錯誤。雖然智利是溫帶地中海型氣候，但位於南半球。"},{"q":"某航班由南半球一個國家的首都飛往另一個北半球國家的首都。以下哪項是該航班及其飛行方向的正確組合?","opts":["南半球國家的首都：新西蘭威靈頓；北半球國家的首都：中國北京；方向：西北","南半球國家的首都：澳洲悉尼；北半球國家的首都：英國倫敦；方向：東北","南半球國家的首都：巴西巴西利亞；北半球國家的首都：法國巴黎；方向：北方","南半球國家的首都：阿根廷布宜諾斯艾利斯；北半球國家的首都：加拿大多倫多；方向：東北"],"a":0,"note":"正確答案為C。"},{"q":"以下哪個目的地及其文化景點、自然景點的組合是不正確的?","opts":["目的地：泰國；文化景點：馬六甲歷史文化中心；自然景點：蘇梅島","目的地：澳洲；文化景點：土著石刻；自然景點：大堡礁","目的地：法國；文化景點：羅浮宮；自然景點：地中海沙灘","目的地：中國；文化景點：萬里長城；自然景點：戈壁沙漠"],"a":0,"note":"馬六甲歷史文化中心在馬來西亞而不是泰國。"},{"q":"在無須經過另一個國家的情況下，旅客可以直接經鐵路來往以下哪兩個國家?","opts":["馬來西亞及泰國","摩洛哥及突尼斯","意大利及西班牙","阿拉伯聯合酋長國(迪拜)及埃及"],"a":0,"note":"答案A馬來西亞及泰國 (18%) B. 摩洛哥及突尼斯需經過阿爾及利亞 C. 意大利到西班牙需經過法國 D. 阿拉伯聯合酋長國(迪拜)及埃及需經過沙地阿拉伯、以色列"},{"q":"以下哪項不是主題公園為吸引年長客群而設的設施或服務?","opts":["提供更多露天巡遊表演項目","提供各種美食","提供充足的地方供訪客坐下享受園區氣氛","提供通往園內各類表演場所的特別通道"],"a":0,"note":"A錯誤。提供各種美食未必能吸引長者。 B錯誤。長者不會因此而遊覽主題公園。 C錯誤。長者不會因此而遊覽主題公園。 D正確。長者不能玩機動遊戲，因此提供非機動遊戲的項目予長者能吸引他們入場。"},{"q":"下列哪些地區位於本初子午線和國際日期變更線?","opts":["本初子午線：格林威治；國際日期變更線：貝克島","本初子午線：貝克島；國際日期變更線：馬德里","本初子午線：基督城；國際日期變更線：格林威治","本初子午線：馬德里；國際日期變更線：基督城"],"a":0,"note":"正確答案為B。"},{"q":"一小撮客人對酒店員工所提供的服務感到不滿，卻沒有渠道反映。該酒店可能面對以下哪些問題?\n(1) 流失忠誠顧客\n(2) 損害公司聲譽\n(3) 失去管理合約\n(4) 流失員工","opts":["只有(1)及(2)","只有(1)及(3)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"客人不滿酒店，下次不會幫襯，而且可能在網上給予酒店負評，令公司聲譽受損。 而C失去管理合約、D流失員工與此情況沒有太大關係。"},{"q":"香港有不同類型的酒店。以下哪項組合是正確的?","opts":["香港四季酒店：商務酒店；香港黃金海岸酒店：度假酒店；1881公館：舊式建築改建酒店","香港四季酒店：精品酒店；香港黃金海岸酒店：度假酒店；1881公館：賓館","香港四季酒店：精品酒店；香港黃金海岸酒店：會議酒店；1881公館：舊式建築改建酒店","香港四季酒店：商務酒店；香港黃金海岸酒店：會議酒店；1881公館：賓館"],"a":0,"note":"香港四季酒店有會議設施，而且位於香港站，交通方便。是商務酒店。 黃金海岸酒店位於屯門，面對海灘，是度假的好地方。 1881前身為水警總部，活化後成為餐廳及酒店。"},{"q":"一般會議、獎勵、商務及展覽活動的不同職能，會由不同的小組委員會履行。以下哪個小組委員會負責「設定活動節目和安排保安事宜」?","opts":["節目小組委員會","登記及預訂酒店與旅行團委員會","宣傳小組委員會","贊助小組委員會"],"a":0,"note":"正確答案為B。"},{"q":"接待猶豫不決的顧客的最佳方法是什麼?","opts":["保持耐性並利用開放式問題確認該顧客所需服務","保持正面態度，而非為錯誤找藉口","向顧客保證你將會為他/她解決問題","告訴顧客你有解決問題的權力"],"a":0,"note":"正確答案為A。"},{"q":"忠誠度計畫同時為酒店及顧客帶來好處。以下哪個組合是不正確的?","opts":["酒店：保證營利；顧客：很少關注價錢，願意支付較高的價錢購買服務或產品","酒店：顧客有可能向管理層反映意見；顧客：可以從服務和產品獲得增值","酒店：更了解顧客的消費行為；顧客：感覺自己是個精明的消費者","酒店：促進顧客與酒店之間的深厚聯繫；顧客：感到受尊重和有優越感"],"a":0,"note":"正確答案為B。"},{"q":"以下哪些是某位網紅(Key Opinion Leader，KOL)探索一個目的地未被發掘的旅遊體驗的最佳方法?\n(1) 跟隨餐飲指南以尋找著名餐廳\n(2) 跟隨旅遊局的推介行程以體驗非一般的去處\n(3) 邀請當地人一同遊歷並發掘這陌生的目的地\n(4) 與當地人一起生活一個星期，了解其日常生活與文化","opts":["只有(3)及(4)","只有(1)及(2)","只有(1)及(3)","只有(2)及(4)"],"a":0,"note":"(1)、(2)已經餐飲指南出版社及旅遊局介紹，並非未被發掘的旅遊體驗"},{"q":"以下哪項並不是符合公平貿易目標的例子?","opts":["聘用外地專家協助開發新資源","生產者有權獲得與其貢獻成正比的合理報酬","僱員有權參與涉及和自身有關的決策","企業的利益及虧損要有高透明度"],"a":0,"note":"公平貿易是指生產者和企業都應獲得合理的回報。 A正確。 B正確。僱員參與公司決策可保障他們的利益。 C正確。高透明度有利社會各界進行監察，確保各方的利益不被損害。 D錯誤。這與公平貿易沒有關係。"},{"q":"以下哪些是會議、獎勵、商務及展覽業及其相關旅遊服務所面對的「威脅」?\n(1) 視像會議科技及軟件的使用增加\n(2) 公眾對環境保育意識的提高\n(3) 旅客希望在目的地有一個真實的體驗\n(4) 傳統旅行代理商的數目減少，而網上的旅行代理商數目增加","opts":["只有(1)及(2)","只有(1)及(3)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"(1)正確。視像會議科技及軟件的使用增加使人不用親身往來各地，減少了對旅遊服務的需求。 (2)正確。愈多遊客使用交通工具，造成的污染愈多。而公眾對環境保育意識的提高，人們為環保提倡減少排放，正正與旅遊業的發展背道而馳。 (3)錯誤。內容與題目沒有太大關係。 (4)錯誤。網上的旅行代理商數目增加令預訂機票和酒店更容易，更有促進旅遊服務。"},{"q":"以下哪個項目達到可持續發展旅遊業議程中地區福社(社會福社)的目標?","opts":["規管旅客在當地社區進行活動時發出的噪音","鼓勵不同種族的旅客按不同時段分流，享用旅遊設施","支援當地企業和鼓勵僱用當地勞工","定期向到訪旅客進行調查"],"a":0,"note":"書第四冊50.2 社區福社/社會福社是指維持與強化本地社群的生活素質，包括社會結構、使用各種生活設施及社會資源等，同時避免任何剝削或做成社會環境惡化。透過旅客與居民共用設施及服務，讓旅遊業幫助維持本地社群的生活素質。 A錯誤。鼓勵不同「種族」的旅客分流是不合理的，亦可能帶有歧視成份。 B錯誤。支援當地企業和鼓勵僱用當地勞工是「經濟」方面的措施。 C錯誤。定期向到訪旅客進行調查是「地區管理」方面的措施。 D正確。規管旅客發出的噪音能讓旅客和居民都共同享用寧靜的環境。"},{"q":"某些地區將會與2019冠狀病毒病疫情受控程度相若的其他地區聯繫，形成「旅遊氣\n泡」。以下哪項是形成「旅遊氣泡」的關鍵要素?","opts":["兩地須互認病毒檢測結果。","兩地旅客必須強制購買旅遊醫療保險。","兩地須在發生最後一宗感染個案後連續28日沒有新的個案。","兩地須有陸路的邊關。"],"a":0,"note":"「旅遊氣泡」的關鍵是保障兩地旅客和居民的健康。而兩地須互認病毒檢測結果才有效確保病毒不會傳播。"}]},{"year":2022,"qs":[{"q":"某目的地正處於巴特勒(Butler)目的地生命周期的發掘階段。根據蒲樂(Plog)的旅客分類，該目的地最能吸引哪類旅客?","opts":["探奇型","中庸型","接近保守型","保守型"],"a":0,"note":"A正確﹕目的地仍處於發掘階段，即是尚未開發，沒有太多旅遊設施，亦不為人熟悉。適合探奇型喜歡冒險的性格。 BCD均不正確﹕因為BCD都不喜歡冒險，而且較喜歡到熟悉的、熱門的旅遊目的地。"},{"q":"以下資料最能反映入境旅遊統計中的哪兩個範疇?\n最受訪港旅客歡迎的三大購物區\n[TABLE]\n排名 | 購物區\n1 | 尖沙咀\n2 | 旺角\n3 | 銅鑼灣\n[/TABLE]\n(1) 人口性\n(2) 地理環境\n(3) 社會經濟\n(4) 消費心態","opts":["只有 (3) 及 (4)","只有 (1) 及 (2)","只有 (1) 及 (4)","只有 (2) 及 (3)"],"a":0,"note":"(1) 人口性﹕收入、性別、年齡、教育程度、受僱狀況等 (2) 地理環境﹕常見的旅遊統計數字例子：所來自國家 (3) 社會經濟﹕社會地位、消費力等 (4) 消費心態﹕性格、價值觀、態度、興趣或生活方式等 資料所見只有最受訪港旅客歡迎的三大購物區，即只可看到旅客的消費力(社會經濟)及興趣或生活方式(消費心態)。其餘兩者(人口性)及(地理環境)則未見反映。"},{"q":"根據聯合國世界旅遊組織的定義，以下哪項並不是「旅遊」?","opts":["某香港居民受聘於美國公司，前往當地工作八個月後回港。","某修讀旅遊與款待科的香港中學生，參加為期兩天的長洲考察團。","某香港居民到新加坡出席為期一星期的會議。","某深圳商人到北京出席為期兩星期的電動汽車博覽會。"],"a":0,"note":"「旅行」而非「旅遊」的條件﹕ (1)超過一年 / (2) 謀生/ (3)在原居地活動 / (4)不會返回原居地 A正確﹕到當地工作，符合「謀生」的條件 B錯誤﹕ C錯誤﹕為期一星期，即少於一年，不符合「超過一年」的條件 D錯誤﹕為期兩星期，即少於一年，不符合「超過一年」的條件"},{"q":"某旅客經香港的持牌旅行社，以港幣20000元參加了一個七天歐洲之旅，該旅客不幸在旅行社提供的外遊活動中嚴重受傷，並花了港幣30000元治療。根據《旅行代理商條例》，該旅客可從旅遊業賠償基金申請的最高賠償額是多少?","opts":["港幣30000元","港幣20000元","港幣27000元","港幣50000元"],"a":0,"note":"根據旅遊業賠償基金，就意外蒙受損失支付的特惠賠償，而該意外是外遊旅行服務所引起的，並在外遊旅行服務期間發生，並導致外遊旅客死亡或身體受傷，可獲總數高達300,000港元的特惠賠償。 惟以實際招致的有關開支為限。每類有關開支的最高款額如下： 就任何意外在有關地方合理地招致的醫療開支﹕100,000港元 題目主角花了港幣30000元治療，因此答案是C"},{"q":"以下哪些關於香港旅遊事務署職責的陳述是正確的?\n(1) 支援發展新旅遊景點\n(2) 改善香港的旅遊設施\n(3) 代表旅遊業賠償基金收取徵費\n(4) 調解成員、相關行業及大眾之間的糾紛","opts":["只有(1)及(2)","只有(1)及(4)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"(3) 代表旅遊業賠償基金收取徵費的是「旅遊業監管局」 (4) 調解成員、相關行業及大眾之間的糾紛的是「香港旅遊業議會」"},{"q":"以下哪項有關旅遊業影響的描述是不正確的?","opts":["影響：進口貨品所引致的流失；描述：這是對環境的影響，是因為旅客使用進口貨品造成的污染","影響：乘數效果；描述：這是對經濟的影響，它鼓勵目的地不同持分者將旅遊收益用作消費","影響：示範效應；描述：這是對社會文化的影響，它削弱目的地原有的文化","影響：文化變得商業化；描述：這是對社會文化的影響，它會令目的地的文化手工製品失去文化意義"],"a":0,"note":"C進口貨品所引致的流失是指本地資金被外國企業賺取，與環境污染沒有關係。"},{"q":"根據以下某旅遊目的地的資料，哪項關於旅遊目的地的描述是正確的?\n[TABLE]\n一些由當地人提供的旅遊設施已經消失，並由外資機構提供更大、更精心規畫的設施取代。 \n市民與旅客有很多接觸，並已覺得這是理所當然的事。\n[/TABLE]\n(1) 這屬於巴特勒(Butler)目的地生命周期的投入階段。\n(2) 這屬於多克西(Doxey)旅客情緒指標的厭煩不快階段。\n(3) 主要來源的旅客是蒲樂(Plog)的中庸型旅客。\n(4) 目的地的空間承載力還未被超越。","opts":["只有(3)及(4)","只有(1)及(2)","只有(1)及(4)","只有(2)及(3)"],"a":0,"note":"(1) 錯誤﹕當地人提供的旅遊設施已經消失是「鞏固階段」，而「投入階段」是本地人開始提供旅遊設施。 (2) 錯誤﹕「市民與旅客有很多接觸，並已覺得這是理所當然」看不到旅客情緒指標達到厭煩不快。 (3) 正確﹕蒲樂的中庸型會喜歡到不太冷門，又不是熱門的目的地，亦享受與當地人接觸，符合資料描述。 (4) 正確﹕市民與旅客的關係良好，未發展衝突，反映空間承載力仍未被超越。"},{"q":"以下哪項關於香港旅遊發展局酒店分類制度的描述是正確的?","opts":["在所有指標中，「設施」所佔的比重最高。","酒店分類的名單是訪港旅客選擇酒店的一個參考。","酒店的評級並不受是否提供無障礙客房而影響。","就「地點」方面，座落於中環的酒店比座落於香港迪士尼樂園的酒店得分更高。"],"a":0,"note":"A錯誤﹕由於酒店級別的資料不會公開，所以旅客是不知道各酒店的評級。但個別酒店會知悉其所屬級別，方便與該級別的平均分數作比較。 B正確﹕「設施」所佔25%，是最高。其次是地點、職員與客房比例、實際平均房租20%，商務組合則佔15%。 C錯誤﹕「無障礙客房」屬「設施」中的「其他設施」，分數範圍0-6分，佔總比例5%。 D錯誤﹕「地點」中，商業中心區與國際主題樂園是同一個層級，都達滿分5分。"},{"q":"兩個來自坎培拉的家庭，前往悉尼並自行安排了三晚酒店住宿。他們屬於哪類酒店顧客?","opts":["國內旅客","短程旅客","團體旅客","商務旅客"],"a":0,"note":"B正確﹕坎培拉和悉尼都是澳洲境內的城市，因此該家庭屬國內旅客。 A錯誤﹕短程旅客是指逗留少於24小時的旅客。"},{"q":"以下哪項解凍冷藏食物的方法是不正確的?","opts":["在攝氏20度至25度的室溫環境解凍","在攝氏8度或以下的雪櫃內解凍","在流動的自來水中解凍","利用微波爐解凍"],"a":0,"note":"根據食衛局指引，如解凍及烹煮程序分開進行，須以下列方法解凍食物： 把食物放在溫度保持在攝氏0-4度的雪櫃或解凍櫃； 放在流動的凍自來水中；或 利用微波爐。 因此，由於在攝氏20度至25度的室溫環境解凍可能會滋生細菌，因此B的做法是錯誤的。"},{"q":"某訪港旅客的預算有限，他/她偏好在徒步可達一些市區景點及觀光點的酒店留宿。以下哪個住宿最適合他/她?","opts":["油麻地的紅茶館酒店","尖沙咀的香港半島酒店","屯門的香港黃金海岸酒店","金鐘的港島香格里拉大酒店"],"a":0,"note":"A錯誤﹕半島酒店是高價酒店，不適合預算有限的旅客。 B錯誤﹕屯門離市區景點及觀光點十分遠，因此不能徒步前程 C正確﹕油麻地位於市區，而紅茶館酒店是較便宜的酒店。 D錯誤﹕香格里拉大酒店是高價酒店，不適合預算有限的旅客。"},{"q":"一般而言，以下哪項高級餐廳與快餐店的比較並不正確?","opts":["座位流轉率；高級餐廳：高；快餐店：低","餐桌擺設；高級餐廳：正式；快餐店：沒有","酒精飲品；高級餐廳：提供；快餐店：極少提供","員工與客人比例；高級餐廳：高；快餐店：低"],"a":0,"note":"正確答案為B。"},{"q":"以下哪項細菌與其源頭及食物中毒後常見病徵的組合是正確的?","opts":["細菌：李斯特菌；源頭：沙律；食物中毒後常見的病徵：腦膜炎","細菌：金黃葡萄球菌；源頭：海產；食物中毒後常見的病徵：肝炎","細菌：副溶血性弧菌；源頭：軟芝士；食物中毒後常見的病徵：噁心、發燒","細菌：沙門氏菌；源頭：炒飯；食物中毒後常見的病徵：口乾、麻痺"],"a":0,"note":"A錯誤﹕金黃葡萄球菌的源頭是需要很多處理程序的即食食品，而不是海產；病徵是腹痛、腹瀉，而非肝炎。 B錯誤﹕副溶血性弧菌的源頭是生吃或未煮的海產，而不是軟芝士。 D錯誤﹕沙門氏菌的源頭是生吃或未經煮熟的蛋及蛋類製品，例如芝士，而不是炒飯。"},{"q":"以下哪位廚師通常負責高級餐廳廚房的煎炒部分?","opts":["醬汁廚師","助理總廚","冷盤廚師","烤烘廚師"],"a":0,"note":"A 助理總廚﹕當主廚不在時，助理總廚負責執行其職務，是主廚的「左右手」 B 冷盤廚師 ﹕負責所有冷食頭盤、小點及沙律 C 烤烘廚師 ﹕負責所有燒烤或烤烘食物 D醬汁廚師﹕負責煎炒部分及準備大部分的醬汁"},{"q":"以下哪項是休閒餐廳使用電子餐單的好處?\n(1) 減低服務員落單時人為出錯的機會\n(2) 應用這新科技可增加顧客的終身價值\n(3) 有助猶豫不決的顧客更容易作出落單決定\n(4) 有助減低2019冠狀病毒病疫情期間服務員與顧客面對面的接觸","opts":["只有(1)及(4)","只有(1)及(2)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"正確答案為B。"},{"q":"以下哪個目的地與其貨幣及官方語言的組合是正確的?","opts":["目的地：智利；貨幣：比索(Peso)；官方語言：西班牙語","目的地：巴西；貨幣：雷亞爾(Real)；官方語言：西班牙語","目的地：摩洛哥；貨幣：蘭特(Rand)；官方語言：阿拉伯語","目的地：墨西哥；貨幣：美元(USD)；官方語言：英語"],"a":0,"note":"A巴西的官方語言是葡萄牙語 B摩洛哥的貨幣是迪拉姆(MAD)，蘭特(Rand)是南非的貨幣。 C墨西哥的貨幣是比索(MXN)，官方語言是西班牙語。"},{"q":"某旅客參加了一個一程多站的旅行團，到訪威尼斯、巴黎、巴塞隆拿及卡薩布蘭卡。該旅客到訪了多少個首都城市?","opts":["一個","兩個","三個","四個"],"a":0,"note":"只有巴黎是法國首都。 其他只是大城市﹕威尼斯(意大利)、巴塞隆拿(西班牙)、卡薩布蘭卡(摩洛哥) 意大利首都是羅馬、西班牙首都是馬德里、摩洛哥首都是拉巴特。"},{"q":"某旅行社正設計一個行程，其中一項賣點是到訪南半球陸地面積最大的國家，以下哪個國家符合該行程設計?","opts":["巴西","阿根廷","澳洲","新西蘭"],"a":0,"note":"陸地面積最大的國家﹕1俄羅斯、2加拿大、3美國、4中國、5巴西 當中，南半球陸地面積最大的國家是巴西。"},{"q":"國際航線經常飛越海洋。一般而言，以下哪個航線與海洋的組合是正確的?","opts":["航線：來往迪拜與巴西利亞；海洋：大西洋","航線：來往突尼斯與多倫多；海洋：太平洋","航線：來往吉隆坡與莫爾茲比港；海洋：南大洋(南冰洋)","航線：來往巴黎與香港；海洋：印度洋"],"a":0,"note":"A錯誤﹕突尼斯 - 多倫多 經過大西洋，並非太平洋 B錯誤﹕ 吉隆坡 - 莫爾茲比港 經過太平洋，並非南大洋(南冰洋) C錯誤﹕巴黎 - 香港 不經任何海洋 D正確﹕迪拜 - 巴西利亞 經過大西洋"},{"q":"一般而言，以下哪項目在結清帳戶時，會包括在酒店客人的總帳戶(總帳單)內?","opts":["全包旅行團的客房費用","商務旅客的水療費用","全包旅行團的客房長途電話費","商務旅客的房內自選電影收費"],"a":0,"note":"總帳戶(總帳單)僅包括客房及早餐費用，屬於應由企業為出差員工支付的必要費用，或旅行代理商已事先在團費中向遊客收取的款項。 其他個人開支，如電話、水療和房內自選收費電影等，會歸類為顧客自負的雜項費用帳戶(雜項費用帳單)當中。 因此，C全包旅行團的客房費用屬於總帳戶的項目。 而A、B、D屬雜項費用帳戶。"},{"q":"某位旅遊達人向前往法國旅遊的網友提供以下資訊。以下哪些資訊是正確的?\n(1) 羅浮宮內藏有《蒙娜麗莎》名畫\n(2) 聖心聖殿曾在2019年維修時發生大火\n(3) 康城舉行電影節\n(4) 歐洲之星是穿梭羅馬及巴黎之間的高速列車","opts":["只有(1)及(3)","只有(1)及(2)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"(1) 正確﹕羅浮宮內藏有《蒙娜麗莎》名畫 (2) 錯誤﹕在2019年維修時發生大火的是巴黎聖母院 (3) 正確﹕康城電影節每年定在五月中旬舉辦，為期12天左右，是國際上最具影響力的影展之一 (4) 錯誤﹕歐洲之星是穿梭英國倫敦與法國巴黎、法國里爾與比利時布魯塞爾以及荷蘭阿姆斯特丹的高速鐵路。要來往法國及意大利，則要乘坐Thello鐵路"},{"q":"根據旅遊業整合模式，以下哪項是由與香港入境旅客有最密切接觸的團體提供?","opts":["香港旅遊發展局分發的小冊子","香港迪士尼樂園的門票","在星光大道出售的紀念品","本地酒店使用的電子匙卡"],"a":0,"note":"A正確﹕根據旅遊業整合模式，與旅客最密切接觸的團體是「旅遊業推廣者」，當中包括旅遊團經營商、旅遊局、直接推銷者、會獎旅遊策劃者、旅行代理商。而香港旅遊發展局屬「旅遊局」。 B錯誤﹕迪士尼樂園屬於「旅遊服務供應商」中的「景點及娛樂」，是較不密切的。 C錯誤﹕星光大道屬於「旅遊服務供應商」中的「景點及娛樂」，是較不密切的。 D錯誤﹕本地酒店屬於「旅遊服務供應商」中的「住民」，是較不密切的。"},{"q":"根據服務金三角，以下哪項餐廳經理的建議是內部行銷的例子?","opts":["為所有服務員提供培訓","為餐廳作聖誕佈置","把新餐單電郵給忠誠度計畫的成員","為不滿的顧客提供免費飲品作補償"],"a":0,"note":"服務金三角理論點出了所有服務性行業三個主要持份者，包括企業、員工和顧客之間的相互關係和三者關係中的行銷重點。 A錯誤﹕這是宣傳和推廣的例子，屬於「對外營銷」。 B錯誤﹕這是員工透過互聯網與客人溝通的例子，屬於「互動行銷」。 C正確﹕為員工培訓，例如如何恰當地運用公司設施、如何增加顧客滿意度等，屬於「內部行銷」。 D錯誤﹕這是處理顧客投訴的例子，屬於「對外營銷」。"},{"q":"某航空公司近期推出了忠誠度計畫「ABC會」，其中包括四個等級，分別是﹕翡翠、銀、黃金及鑽石會籍。推出這個忠誠度計畫對顧客有什麼可能的影響?\n(1) 鼓勵顧客通過累積積分來提取長期價值\n(2) 鼓勵顧客從多家公司賺取積分\n(3) 更好地滿足顧客馬斯勞(Maslow)需求層次中的社交需要\n(4) 更好地滿足Parasuraman五個服務特點中的可靠性","opts":["只有(1)及(3)","只有(1)及(4)","只有(2)及(3)","只有(2)及(4)"],"a":0,"note":"(1)正確﹕分四個等級是屬於「級別積分計劃」。 (2)錯誤﹕題目資料沒有提及該航空公司與其他公司合作，並非「夥伴計劃」。 (3)正確﹕社交需求是指客人滿足了情感上的需要，獲得歸屬感。當「ABC會」的等級愈高，反映了客人在該航空公司的「地位」愈高，愈被重視，從而產生了歸屬感。 (4)錯誤﹕題目資料與Parasuraman五個服務特點中的可靠性沒有關係。"},{"q":"酒店大堂正進行翻新工程以迎合酒店主題，同時亦下放權力給員工，令他們能夠因應顧客需要更快速的決定。這情境最能描述以下哪些服務特點?\n(1) 同理心\n(2) 反應性\n(3) 有形性\n(4) 可靠性","opts":["只有(2)及(3)","只有(1)及(2)","只有(1)及(4)","只有(3)及(4)"],"a":0,"note":"(1) 錯誤﹕與同理心沒有太大關係 (2) 正確﹕題目資料提及「更快速的決定」，屬「反應性」 (3) 正確﹕翻新工程令大堂更美麗，屬「有形性」 (4) 錯誤﹕員工具有準確、準時及一貫地提供承諾服務的能力。但題目資料的酒店大堂翻新工程與員工「準確、準時、一貫」沒有太大關係"},{"q":"以下哪項是貫徹「低碳旅遊」的措施?","opts":["減少參觀「畜牧養殖業」為主題的景點","盡量使用當地的旅遊地圖及交通指南小冊子","以郵輪旅遊替代乘搭火車到旅遊目的地","減少使用酒店提供的洗漱用品，改為鼓勵顧客自行攜帶一次性洗漱用品"],"a":0,"note":"低碳旅遊是一種的新興旅遊方式，指在旅遊中將二氧化碳排放降到最低。 A錯誤﹕小冊子是紙本，因此不符合低碳的原則。 B錯誤﹕大多數郵輪使用硫磺重油，污染度是柴油 3,500 倍。硫排放會導致酸雨，危害森林、土壤和湖泊、樹木。 C錯誤﹕一次性洗漱用品即「用完即棄」用品，而洗漱用品多為塑膠，不符合低碳的原則。 D正確﹕畜牧養殖業生產肉食，畜牧過程中，動物會排出太量溫室氣體，例如甲烷、二氧化碳、氨、硫化氫等。因此減少參觀「畜牧養殖業」即鼓勵食素，是符合低碳的原則。"},{"q":"東道國政府可採取以下哪些行動，以達致可持續發展旅遊業議程十二個目標之中的「地區管理」(當地監管)目標?\n(1) 諮詢當地人在旅遊發展上的意見\n(2) 邀請當地人為旅客籌辦活動項目\n(3) 提倡當地人與旅客共用旅遊設施\n(4) 鼓勵聘用當地人","opts":["只有(1)及(2)","只有(1)及(4)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"地區管理﹕賦予及授權當地社區對其轄地內的旅遊項目就管理及未來發展方面，在諮詢相關持分者後，進行規劃及決策。 以下為一些衡量此目標的例子： 充分參與當地社區發展旅遊業的計劃，如與持分者在發展過程中進行更廣泛的協商。 (1) 正確﹕諮詢當地人即讓當地社區持份者參與當地社區發展旅遊業的計劃參與咨詢。 (2) 正確﹕邀請當地人即讓當地社區持份者參與當地社區發展旅遊業的計劃。 (3) 錯誤﹕當地人與旅客共用旅遊共用設施不代表當地人有份參與當地社區發展旅遊業的計劃。 (4) 錯誤﹕鼓勵聘用當地人不等於讓當地社區持份者參與當地社區發展旅遊業的計劃。"},{"q":"2021年7月起，香港推出「水上的士」服務的新路線。以下哪項關於這服務的描述是正確 的?","opts":["它迎合香港旅遊業發展藍圖所定的發展策略。","它由運輸署營辦。","它旨在為旅客提供省時的交通工具。","旅客可在途中欣賞離島的景色，例如坪洲。"],"a":0,"note":"水上的士航線是香港一條橫渡維多利亞港的觀光小輪航線，來往九龍啟德跑道公園旁的公眾碼頭及油麻地避風塘梯台，途經紅磡碼頭、尖沙咀東公眾碼頭及中環碼頭。此航線乃是香港首個以「水上的士」模式營運的水上交通，旅客能在船上觀賞維多利亞港兩岸的景色。 A錯誤﹕「水上的士」服務由富裕小輪有限公司營辦，並非運輸署。 B錯誤﹕「水上的士」讓旅客在船上觀賞維多利亞港兩岸的景色，並非用以省時的交通工具。 C正確﹕「水上的士」屬於香港旅遊業發展藍圖所定的發展策略中「VII加強維多利亞港及海濱長廊的旅遊特色」其中一個項目。 D錯誤﹕「水上的士」的路線主要穿梭維港兩岸，並不會途經離島例如坪洲。 水上的士﹕ 香港旅遊業..."},{"q":"旅遊業監管局(旅監局)成立後，以下哪項關於香港旅遊業運作及規管架構的描述是正確的?\n(1) 旅監局是一個對香港旅遊業作出整體規管的獨立法定機構。\n(2) 香港旅遊業議會將繼續規管旅行社、領隊和導遊的註冊及發牌。\n(3) 旅監局將負責規管領隊和導遊的專業操守。\n(4) 香港旅遊業議會將繼續管理旅遊業賠償基金。","opts":["只有(1)及(3)","只有(1)及(4)","只有(2)及(3)","只有(2)及(4)"],"a":0,"note":"(1)、(2)正確 (3)錯誤﹕負責規管領隊和導遊的專業操守是由「香港旅遊業議會」負責 (4)錯誤﹕管理旅遊業賠償基金由「旅監局」負責。"},{"q":"以下哪項關於香港機場建設費的陳述是正確的?\n(1) 抵港旅客與離境旅客均需付相同費用。\n(2) 成人與小童需付相同費用。\n(3) 去紐約的旅客比去迪拜的旅客需付更高費用。\n(4) 乘搭同一客機頭等艙的旅客與商務艙旅客所付的費用相同。","opts":["只有(2)及(4)","只有(1)及(3)","只有(1)及(4)","只有(2)及(3)"],"a":0,"note":"機場建設費﹕ 徵收機場建設費是三跑道系統財務安排的其中部分。 航空公司於發出機票時，將向於香港國際機場離港的旅客（包括離境及過境／轉機）收取機場建設費。 (1)錯誤﹕機場建設費只針對離境旅客，抵港旅客並不需繳交相關費用。 (2)正確﹕成人與小童需付相同費用，而「長/短途」及「頭等/商務/經濟客位」的收費則有所分別。 (3)錯誤﹕飛行距離「長途」 是指 美洲、歐洲、中東、非洲、西南太平洋及印度次大陸，因此去紐約及去迪拜均屬於「長途飛行距離」，費用相同。 (4) 正確﹕乘搭同一客機頭等艙的旅客與商務艙旅客所付的費用相同，長途飛行距離收費為180元，短途為160元。"}]},{"year":2023,"qs":[{"q":"某旅客從香港前往北京，他/她選擇乘坐高鐵而不乘搭飛機。以下哪項是他/她決定選擇高鐵的原因？\n(1) 車程時間較短\n(2) 可欣賞沿途景色\n(3) 班次較密\n(4) 準點率較高","opts":["只有(2)及(4)","只有(1)及(3)","只有(1)及(4)","只有(2)及(3)"],"a":0,"note":"(1) 錯誤﹕由香港乘高鐵往北京車程約9小時，遠較飛機(直航)3小時慢 (2) 正確 (3) 錯誤﹕截至2023年6月，高鐵每天從北京西站及香港西九龍站各發出一趟列車，而飛機航班數目則多於上述數目。 (4) 正確﹕飛機誤點時機會多於高鐵"},{"q":"以下哪些有關護照的描述是正確的？\n(1) 每本護照內均設有空白頁。\n(2) 護照是由它所屬的政府簽發。\n(3) 申請護照時，申請人須預備僱主簽發的證明信、來回機票及酒店訂房收據。\n(4) 申請人必須在旅遊出發前，向東道國家駐本國領事館或代辦處申請護照。","opts":["只有(1)及(2)","只有(1)及(4)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"(1)(2)皆正確 (3)錯誤﹕申請護照時，申請人只須出示合資格的身份證明文件便可。例如申請香港特別行政區護照，申請人只需持有香港永久性居民身份證便可。 (4) 錯誤﹕旅客可能向東道國家駐本國領事館申請的是「簽證」而非護照。例如本港旅客想往美國旅遊，出發前便需向美國駐港澳總領事館申請美國簽證。而香港特別行政區護照則向入境處申請便可。"},{"q":"某旅客正計畫到大嶼山參觀大佛。以下哪項是在計畫階段的有效推動因素?","opts":["在寶蓮寺享用素宴的願望","昂坪360所提供的特別折扣優惠","大嶼山的美景","旅行團行程包括大澳漁村的景點"],"a":0,"note":"推動因素是使潛在旅客產生旅遊願望的內在因素。因而，凡是能夠緩解及滿足旅客願望的都可成為指向的對象。所以，在推動因素影響下外出的旅客不一定有具體明確的選擇。例如，期望與家人增進親情的旅客並不在乎到哪裡旅遊，關鍵是一家人能在一起共度美好的時光。 A正確﹕在寶蓮寺享用素宴的願望就是旅客產生旅遊願望的內在因素。 B錯誤﹕折扣優惠是由昂坪360所提供，屬於「拉因素」。 C 錯誤﹕大嶼山的美景是吸引旅客到訪的因素，屬於「拉因素」。 D錯誤﹕大澳漁村的景點是吸引旅客參加該旅行團的因素，屬於「拉因素」。"},{"q":"一般而言，以下哪項關於商務旅客和休閒旅客之問差異的描述是不正確的?","opts":["商務旅客在預訂酒店客房時通常可以享有公司價，比休閒旅客所享受的團體價更優惠。","商務旅客的消費通常較休閒旅客為高·","與休閒旅客相比，商務旅客較少受季節性因素影響。","與休閒旅客相比，商務旅客較少注重目的地的觀光景點。"],"a":0,"note":"A錯誤﹕商務旅客的消費通常較休閒旅客為高，例如他們會乘坐航班的商務艙、住在市中心較舒適的酒店等。· B正確﹕公司價不一定較團體價更優惠。 C 錯誤﹕休閒旅客通常在長假期時出發，但商務旅客則有需要時便會出發。 D錯誤﹕商務旅客旅程目的是工作，並非觀光。"},{"q":"在巴特勒（Butler）旅遊目的地生命週期的不同階段，旅客人數都會變化。以下哪項是正確的?","opts":["旅遊目的地生命週期：停滯階段；旅客人數：到最高點","旅遊目的地生命週期：發掘階段；旅客人數：大幅上升","旅遊目的地生命週期：發展階段；旅客人數：增長放緩","旅遊目的地生命週期：鞏固階段；旅客人數：開始減退"],"a":0,"note":"A錯誤﹕發掘階段時，目的地沒有太多設施，旅客人數是極少。 B錯誤: 發展階段，由於目的地的設施開始增加，宣傳效果亦漸大，因此旅客人數增長顯著，而不是放緩。 C正確﹕停滯階段指目的地形象良好，但沒有更多新事物吸引旅客，因為旅客人數達最高點，沒有增長。 D錯誤﹕鞏固階段是發展階段之後，旅遊業成熟，旅客人數依然有增加，但升幅較以往少。"},{"q":"香港每區各有其特色景點。以下哪個組合是正確的？","opts":["地區：中西區；景點一：大館；景點二：香港醫學博物館","地區：深水涉；景點一：李鄭屋漢墓博物館；景點二：羅屋民俗館","地區：灣仔；景點一：香港文化博物館；景點二：金紫荊廣場","地區：西貢；景點一：嘉道理農場暨植物園；景點二：鹽田梓"],"a":0,"note":"B: 羅屋民俗館在柴灣 C: 香港文化博物館在沙田 D: 嘉道理農場暨植物園在大埔"},{"q":"主題公園可以採用以下哪些措施來提高訪客的心理承載力？\n(1) 增加接待訪客的最高限額\n(2) 增加園區洗手間的數量\n(3) 增加紀念品商店的商品種類\n(4) 增加快速通行證的數量","opts":["只有(2)及(4)","只有(1)及(3)","只有(1)及(4)","只有(2)及(3)"],"a":0,"note":"心理承載力是指當某旅遊目的地的旅客數目超越其心理承載力，旅客所感受到的樂趣便會明顯減弱。這容量大小是基於旅客的需求、旅客對其他使用者的數目和行為(例如擠迫和喧嘩)之態度；及旅客對目的地環境污染及破壞之可容忍程度。 (1)錯誤：增加接待訪客的最高限額只會令旅客數目不斷增多，擠迫和喧嘩情況愈來嚴重。 (2)正確：增加園區洗手間的數量可以縮短旅客排隊的需時，能滿足旅客的需求。 (3)錯誤：增加紀念品商店的商品種類與心理承載力沒有關係。 (4)正確：增加快速通行證的數量可以縮短旅客排隊的需時，能滿足旅客的需求。"},{"q":"根據馬斯勞(Maslow)的需求層次理論，高級餐廳的設施可以滿足客人的需要。以下哪項組合是恰當的?","opts":["設施：足夠的消防設備；滿足需要：安全需要","設施：為尊貴顧客特設的貴賓室；滿足需要：生理需要","設施：足夠數量的洗手間；滿足需要：尊重需要","設施：為殘疾人士提供無障礙設施；滿足需要：自我實現需要"],"a":0,"note":"正確答案為C。"},{"q":"以下哪項機艙服務並非為帶同嬰兒或兒童的乘客而設？","opts":["出租嬰兒車服務","提供嬰兒搖籃","送贈兒童玩具","預訂嬰兒食品"],"a":0,"note":"正確答案為B。"},{"q":"某時裝公司總裁計畫前往香港出席在香港會議展覽中心舉行為期三天的商務會議。他/她請旅行社代為安排行程。旅行社應為他/她作出哪些安排？\n(1) 行政樓層客房\n(2) 位於金鐘的一家酒店\n(3) 房價包含美式計價的餐膳選擇\n(4) 有荷里活式床的客房","opts":["只有(1)及(2)","只有(1)及(4)","只有(2)及(3)","只有(2)及(4)"],"a":0,"note":"(1) 正確：出席商務會議的都係行政人員，因為住在行政樓層客房 (2) 正確：香港會議展覽中心位於灣仔，從金鐘到灣仔很方便。 (3) 錯誤： 美式計價(AP)包括房間及三餐的房價。 修正美式計價 (MAP)包括房間及兩餐的房價;兩餐通常為早餐及晚餐。 歐式計價(EP)只包括房間的房價。 出席會議的人員旅程以工作為主，大多只會在酒店享用早餐後便外出工作。 (4) 錯誤：荷里活式雙人房是指可供二人住宿的房間，並備有兩張以共用床頭板連接的單人。上述的情況與商務旅客沒有關係。"},{"q":"下列哪項關於酒店「管理合約」的描述是正確的？\n(1) 管理公司承擔酒店財務和法律責任。\n(2) 管理公司向酒店擁有人收取酬金。\n(3) 管理公司負責執行和管理酒店業務之營運。\n(4) 酒店擁有人必須得到管理公司同意，才可將產權轉讓其他人。","opts":["只有(2)及(3)","只有(1)及(3)","只有(1)及(4)","只有(2)及(4)"],"a":0,"note":"管理合約是由酒店管理公司經營屬於其他機構的物業。在某些情況下，酒店擁有人可能會透過管理合約，安排專門管理酒店的公司來營運他們的物業。這個做法的原因可能是擁有人並不具備所需的專業知識;或 - 願意參與酒店的營運。 (1) 錯誤：管理合約下，管理公司只負責管理，而酒店財務和法律責任由酒店擁有人承擔。 (2) 正確：管理公司幫忙酒店擁有人管理酒店，當然要向酒店擁有人收取酬金。 (3) 正確：管理公司負責執行和管理酒店業務之營運。 (4) 錯誤：酒店產權屬於酒店擁有人，因為轉讓與否不需要得到管理公司同意。"},{"q":"按照一般西式餐桌擺設的原則，在桌墊的中央應放一個托碟。X應放在碟的左側，而Y則應放在碟的右側。X和Y代表什麼？","opts":["X：餐叉；Y：餐刀及湯匙","X：水杯；Y：餐巾","X：餐巾；Y：水杯","X：餐刀及湯匙；Y：餐叉"],"a":0,"note":"正確答案為C。"},{"q":"酒店房間內的電器因短路而發生火警，幸好房務員及時將火撲滅。在這次事件中，房務員可能用了以下哪些類型的滅火筒？\n(1) 水式滅火筒\n(2) 乾粉式滅火筒\n(3) 泡沫式滅火筒\n(4) 二氧化碳氣體式滅火筒","opts":["只有(2)及(4)","只有(1)及(2)","只有(1)及(3)","只有(3)及(4)"],"a":0,"note":"(1) 水式滅火筒：只適用於紙、布引起的火災 (2) 乾粉式滅火筒：適用於所有情況起的火災 (3) 泡沫式滅火筒：只適用於紙、布；石油氣、煤氣及煮食鑊內的植物油引起的火災 (4) 二氧化碳氣體式滅火筒：除了紙、布引起的火災，適用於其餘情況引起的火災"},{"q":"以下哪項有關酒店顧客流程中不同階段顧客服務的描述是不正確的？","opts":["階段：離開；描述：確認機票","階段：抵埗前；描述：於預訂後的一天內發送電子確認通知","階段：抵埗；描述：發放匙卡","階段：入住；描述：預訂主題公園門票"],"a":0,"note":"A：於預訂後的一天內發送電子確認通知客房的情況，客人確定有房後才入住 B：抵埗時，在款接部登記及取匙卡，然後上房 C：預訂主題公園門票一般得到即時確定，因此在入住後才預訂也可 D：確認機票應在購買機票時完成，與離開酒店沒有關係。"},{"q":"下列哪項不是酒店樓層主管的職責？","opts":["監督有關公共地方、走廊和辦公室的清潔工作","就顧客的抵涉及離開與款接部保持聯絡","確保房問清潔和合乎服務質量的標準","訂購及分發清潔材料"],"a":0,"note":"樓層主管： －檢查員工的工作情況 －重新調配人手 － 督導員工 － 填寫客房檢查清單，檢查特定區域/樓層的客房  提供入職培訓及一般培訓 － 訂購及分發清潔材料 － 布草檢查 － 保養檢查 － 對於賓客的抵埗及離開與款接部保持聯絡 C. 監督有關公共地方、走廊和辦公室的清潔工作是由「公共地方主管」負責，而不是「樓層主管」。"},{"q":"酒店前堂部的電腦顯示以下客房狀況的資料。\nOC﹕40\nOD﹕5\nVC﹕4\nVD﹕3\n根據資料，酒店有多少客房尚未租出？","opts":["7","8","9","12"],"a":0,"note":"OC : 已清潔的入住房 OD : 未清潔的入住房 VC : 已清潔待售房間 VD : 未清潔待售房間 「待售房間」即是尚未租出的房間，因此VC已清潔待售房間＋VD未清潔待售房間＋便是「待售房間」的總數 「待售房間」4＋3＝7間"},{"q":"以下哪種情況是運用主觀法為餐單定價？","opts":["顧客若想在平安夜晚宴預訂近窗的餐桌以欣賞海景，晚市套餐的價格將會提高","利用加工食品代替新鮮食材，降低晚市套餐的價格","顧客若想與家人在酒店房間用餐以保護隱私，食品價格將會提高","當兒童從正規餐單中點選任何食物時，食物價格及份量將會減半"],"a":0,"note":"主觀價格是指購買方主觀上的價值判斷，如「物美價廉」或「我想如何如何」。 商品客觀價格是依據社會上的經濟活動或經營成本而確定。 A. 是客觀法，因為加工食品必定較新鮮食材便宜，因此可降低套餐的價格 B. 是客觀法，在酒店房間用餐需額外人手送餐及個別招待，因為成本較高，食品價格因而更高 C. 在餐廳內，對於經營者而言，近窗還是不近窗的餐桌的成本沒有分別，平安夜晚宴預訂近窗的餐桌是出於客人的期望，因此價格將會提高。這是主觀法定價。 D. 兒童食量較成年人少，兒童餐的成本因而較低，所以食物價格及份量將會減半。這是客觀法。"},{"q":"以下哪項是酒店「收入中心」部門的工作？","opts":["推出新的餐飲服務","整理客房及維持公眾地方清潔","分析不同數據，協助推廣及策畫酒店的業務發展","舉辦各類活動促進員工福利"],"a":0,"note":"「收入中心」是指直接令酒店賺取收入的部門。 A. 錯誤：整理客房及維持公眾地方清潔是管家部負責。 B. 錯誤：分析不同數據，協助推廣及策畫酒店的業務發展，上述情況「協助」性質，不會直接令酒店多賺收入。 C. 錯誤：舉辦各類活動促進員工福利與令酒店多賺收入沒有關係。 D. 正確：推出新的餐飲服務令更多客人光顧，直接提高酒店的收入。"},{"q":"某旅客從巴布亞新幾內亞飛越太平洋到達一個長線目的地。哪個城市最有可能是其目的地？","opts":["阿根廷布宜諾斯艾利斯","新西蘭威靈頓","南非開普敦","法國巴黎"],"a":0,"note":"新西蘭在巴布亞新幾內亞東面，但不是長線目的地。南非、法國在巴布亞新幾內亞的西面，根本不會經過太平洋。阿根廷在巴布亞新幾內亞的東面，穿越太平洋。"},{"q":"著名景點分佈於不同旅遊區域。以下哪捆組合是正確的？","opts":["北美洲旅遊區域：尼亞加拉大瀑布；大洋洲旅遊區域：大堡礁；歐洲旅遊區域：凱旋門","北美洲旅遊區域：吉薩金字塔；大洋洲旅遊區域：環球影城；歐洲旅遊區域：駝背山(救世基督像)","北美洲旅遊區域：黃石國家公園；大洋洲旅遊區域：毛里族文化村；歐洲旅遊區域：大峽谷","北美洲旅遊區域：金門大橋；大洋洲旅遊區域：朱美拉棕櫚島；歐洲旅遊區域：曼德拉國家博物館"],"a":0,"note":"正確答案為B。"},{"q":"以下哪個國家的首都最接近赤道？","opts":["馬來西亞","智利","泰國","巴布亞新幾內亞"],"a":0,"note":"正確答案為B。"},{"q":"根據景點分類，以下哪個是「人工」但非為吸引旅客而建的景點？","opts":["教堂","主題公園","博物館","地形"],"a":0,"note":"正確答案為D。"},{"q":"某遊客在外幣兌換店兌換「迪拉姆」作旅遊時用。以下哪城市最有可能是他/她的旅遊目的地？","opts":["摩洛哥拉巴特","南非普利托里亞","墨西哥墨西哥城","巴西巴西利亞"],"a":0,"note":"南非：蘭特 摩洛哥：迪拉姆 墨西哥：披索 巴西：雷亞爾"},{"q":"以下哪些城市與香港位於同一時區？\n(1) 泰國曼谷\n(2) 馬來西亞吉隆坡\n(3) 新西蘭威靈頓\n(4) 澳洲珀斯","opts":["只有(2)及(4)","只有(1)及(3)","只有(1)及(4)","只有(2)及(3)"],"a":0,"note":"(1) 泰國曼谷＋7 (2) 馬來西亞吉隆坡＋8 (3) 新西蘭威靈頓＋12 (4) 澳洲珀斯＋8"},{"q":"某旅客計畫到兩個屬於溫帶氣候的城市旅行，一個位於南半球，另一個位於北半球。以下哪個組合符合他/她的要求？","opts":["南半球屬於 溫帶氣候的城市：悉尼；北半球屬於 溫帶氣候的城市：洛杉磯","南半球屬於 溫帶氣候的城市：開羅；北半球屬於 溫帶氣候的城市：莫爾茲比港","南半球屬於 溫帶氣候的城市：莫爾茲比港；北半球屬於 溫帶氣候的城市：悉尼","南半球屬於 溫帶氣候的城市：洛杉磯；北半球屬於 溫帶氣候的城市：開羅"],"a":0,"note":"開羅：北半球 莫爾茲比港：南半球 悉尼 ：南半球 洛杉磯 ：北半球"},{"q":"某家酒店聲稱會提供24小時客房餐飲服務，但有些旅客於上星期人住時卻未能享用此服務，原因是酒店突然停電。在停電期問，酒店為有需要的顧客提供免費乾糧。該酒店未能滿足哪項顧客服務特點？","opts":["可靠性","有形性","關懷性","反應性"],"a":0,"note":"「可靠性」指服務供應商需履行「承諾」，某家酒店聲稱會提供24小時客房餐飲服務屬於「承諾」，但最後沒有履行，因此未能滿足「可靠性」。"},{"q":"某旅行社正接待有印度教教徒和穆斯林參加的旅行團。以下哪款菜式最能符合團友的要求？","opts":["咸魚雞粒豆腐燴飯","辣酒煮花螺","醬爆牛肉","叉燒炒飯"],"a":0,"note":"印度教、穆斯林不吃豬、牛肉及飲酒。"},{"q":"下列哪情況不是機艙顧客服務的「關鍵時刻」？","opts":["顧客在進食飛機餐時與朋友交談","顧客向空中服務員要求轉換座位","顧客享用機上的娛樂服務","空中服務員示範逃生路線"],"a":0,"note":"關鍵時刻（Moment of Truth）是一個關鍵指標，是對客戶導向的具體衡量，因為對客戶而言，他只會記住那些關鍵時刻。 A: 正確：與朋友交談不會令乘戶對航班有產生任何感想 但B， C， D均屬於航班的服務或產品，會影響對航班有產生印象"},{"q":"從發展中國家的角度，以下哪項有關旅遊業發展的因素有助直接改善國內的貧窮問題？","opts":["聘請大量失業人士和低技術勞動力發展旅遊業","向外國借貸，興建旅遊設施","推出稅務優惠以吸引旅遊業投資者","引人外國專才，發展旅遊業"],"a":0,"note":"A. 正確：透過聘請失業人士和低技術勞動力，人民便有收入，從而改善貧窮。 B， C， D的措施實行後，還要等待旅客前來，效果相對間接。"},{"q":"以下哪些有關生態旅遊的陳述是正確的？\n(1) 道德議題是發展這類旅遊業的主要推動力。\n(2) 在這類旅遊形式下進行的導賞團，通常有助於教育旅客保護環境。\n(3) 旅客會盡量使用較為環保的服務／產品。\n(4) 生態旅遊以當地社區的利益為大前提，盡量減少對社會的影響。","opts":["只有(2)及(3)","只有(1)及(2)","只有(1)及(4)","只有(2)及(4)"],"a":0,"note":"(1): 道德與生態旅遊沒有直接關係。 (2): 導賞團令旅客對生態有更多了解，有助於教育旅客保護環境 (3): 旅客會盡量使用較為環保的服務／產品，從而減少對環境的污染。 (4): 社區的利益可能泛指經濟、鄰里關係等，並非進行生態旅遊的目標。"}]},{"year":2024,"qs":[{"q":"以下哪些有關水路交通的描述是正確的？\n(1)\t只有自費參加岸上觀光的郵輪乘客才可離船登岸。\n(2)\t渡輪提供短距離海上交通服務。\n(3)\t渡輪上一般會提供簡單的餐飲服務。\n(4)\t停泊母港的郵輪一般會在同一地方開始及結束行程。","opts":["只有(2)及(4)","只有(1)及(3)","只有(1)及(4)","只有(2)及(3)"],"a":0,"note":"(1)所有郵輪乘客也有權離船登岸。 (2)渡輪提供短距離海上交通服務是正確的，例如尖沙咀來往中環的天星小輪 (3)渡輪的船程短，一般不會提供簡單的餐飲服務。 (4)母港是指開始及結束行程的地方。"},{"q":"以下哪些有關香港旅遊業的機構或政府部門與所列的職能相符？\n機構或政府部門            職能\n(1)\t   人境事務處                發出外遊警示\n(2)\t   民政事務總署              負責酒店發牌事宜\n(3)\t   香港旅遊業議會            管理旅遊業賠償基金\n(4)\t   旅遊業監管局              負責導遊和領隊的發牌事宜","opts":["只有(2)及(4)","只有(1)及(3)","只有(1)及(4)","只有(2)及(3)"],"a":0,"note":"(1)發出外遊警示的是「保安局」 (2)正確 (3)管理旅遊業賠償基金的是「旅遊業監管局」 (4)正確"},{"q":"根據旅遊業乘數效應的概念，以下哪些會被視為旅遊業對本港經濟的第二重影響？\n(1)\t餐廳經營者購入食材。\n(2)\t旅行團經營商支付薪酬給領隊。\n(3)\t航空公司員工購買生活必需品 。\n(4)\t酒店經營者投資新酒店。","opts":["只有(1)及(2)","只有(1)及(3)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"(1)正確：餐廳經營者利用餐廳收入（第一重），然後購入食材（第二重）。 (2)正確：旅行團經營商收到旅客的費用（第一重）後，再支付薪酬給領隊。（第二重） (3)錯誤：屬於第三重 (4)錯誤：投資新酒店是把錢放在另一個業務，屬於第三重"},{"q":"以下哪些符合聯合國世界旅遊組織對旅客應有行為表現提出的建議？\n(1)\t購買當地生產的手工藝品和商品，如鱷魚皮手袋\n(2)\t出發前了解目的地的緊急及領事服務\n(3)\t拒絕在自然保護區餵飼動物\n(4)\t施予金錢給東道國的乞丐以改善其生活","opts":["只有(2)及(3)","只有(1)及(2)","只有(1)及(4)","只有(3)及(4)"],"a":0,"note":"(1) 錯誤：捕殺鱷魚是不應當的行為 (2)(3)正確 (4) 錯誤：施予金錢給乞丐是不應當的行為"},{"q":"根據馬斯勞(Maslow)的需要層次理論，在以下哪項排列中，顧客的需要能 由低階至高 階順序得到滿足？\n(1)\t安排領隊及導遊帶領旅行團\n(2)\t旅行團每天提供酒店早餐\n(3)\t旅客能在旅行團中結識團友\n(4)\t會員尊享優惠價訂購旅行團","opts":["(2)(1)(3)(4)","(1)(2)(3)(4)","(1)(2)(4)(3)","(2)(1)(4)(3)"],"a":0,"note":"馬斯勞(Maslow)的需要層次理論：生理＞安全＞社交＞尊重＞自我實現 (1) 安排領隊及導遊帶領旅行團：安全需要 (2) 旅行團每天提供酒店早餐：生理需要 (3) 旅客能在旅行團中結識團友：社交需要 (4) 會員尊享優惠價訂購旅行團：尊重需要 所以答案是C. (2)(1)(3)(4)"},{"q":"根據聯合國世界旅遊組織的定義，以下哪類人士被視為處於「慣常生活的環境空間」， 而不被定義為「旅客」？","opts":["航空公司機組人員","外交官員","短期課程交流生","派駐海外的軍事人員"],"a":0,"note":"A錯誤：根據國際收支平衡原則，外國政府的外交官、軍事人員以及隨行家屬被視為沒有進入其駐紮國的經濟領土。因此，他們不被視為駐紮國的「旅客」。 B正確：公共交通工具的工作人員，無論是固定工作人員與否，都應被視為在其「慣常生活的環境空間」內。因此，航空公司的機組人員被視為在其「慣常生活的環境空間」內而不會被視為「旅客」。 C錯誤：參加短期課程(不到一年)的學生被視為旅客。參加長期課程(一年或以上)的學生 則被視為在其「慣常生活的環境空間」內而不會被視為「旅客」。 D錯誤：派駐外海的軍隊或武裝部隊沒有進入其駐紮國的經濟領土，因此亦不應被視作旅客，以符合國際收支平衡原則。"},{"q":"以下哪些是旅遊業產生的間接職位？\n(1)\t便利店店務助理\n(2)\t本地遊旅行團導遊\n(3)\t主題公園兼職舞蹈員\n(4)\t酒店外判洗衣服務的員工","opts":["只有(1)及(4)","只有(1)及(2)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"直接職位指直接為旅客提供服務的行業。 間接職位的工作是服務本地人和旅客，或為機構和商店製造貨物和提供服務，而這些機構或商店則直接服務旅客。 (1) 便利店可能是為景點／酒店／碼頭／機場服務，因此屬於間接職位 (2) 導遊直接為旅客提供服務 (3) 主題公園職員為旅客提供服務 (4) 外判工為酒店提供服務，因此屬於間接職位"},{"q":"香港特別行政區政府准許合資格的訪港旅客使用自助出入境檢查 ( e-道）服務。以上措施反映了政府在發展旅遊業時，扮演以下哪一個角色？","opts":["管制及監察旅遊業","計畫及促進旅遊業","直接經營與旅遊有關的項目","向本地及海外市場推廣旅遊業"],"a":0,"note":"A：計畫及促進是指一些促進旅遊業的政策，例如一簽多行 B：入境檢查(e-道)屬於管制及監察入境者 C：直接經營與旅遊有關的項目，例如經營西九文化區 D：推廣旅遊業，例如搵明星拍攝宣傳香港的影片"},{"q":"廚師用焗爐烤一塊用箔紙包裹的羊扒。他遵循食物安全五要點之x , 從焗爐取出羊扒後用Y 去量度其中心温度。X 和 Y 代表什麼？\nX                         Y","opts":["煮熟食物                 雙金屬棒狀温度計","安全温度                 熱電偶温度計","安全温度                 熱敏電阻温度計","煮熟食物                 紅外線温度計"],"a":0,"note":"正確答案為C。"},{"q":"一般而言，以下哪些是客務部工作的正確描述？\n(1)\t編製重要人物 ( V IP ) 名單\n(2)\t編寫宴會餐單\n(3)\t維持客人用品的適當存貨量\n(4)\t為公司客戶編製核准賒帳名單","opts":["只有(1)及(3)","只有(1)及(2)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"(1) 正確：編製重要人物 ( V IP ) 名單 (2) 編寫宴會餐單是「宴會及餐飲經理」負責 (3) 正確：維持客人用品的適當存貨量 (4) 為公司客戶編製核准賒帳名單是「會計部」負責"},{"q":"以下哪些由酒店採取的環保措施能有效達致預期的環保目標？\n(1)\t引人電動車作為酒店轎車以減少碳排放\n(2)\t以植物肉代替傳統肉類以減少廚餘\n(3)\t使用無紙化人住登記以減少紙張耗用\n(4)\t安裝太陽能板產生綠色能源以減少能源消耗","opts":["只有(1)及(3)","只有(1)及(2)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"(1) 正確：電動車取代汽油車能減少碳排放 (2) 錯誤：植物肉代替傳統肉類與減少廚餘沒有關係 (3) 正確：使用無紙化人住登記能以減少紙張耗用 (4) 錯誤：安裝太陽能板產電只是取代「燃煤發電」，但未能減少能源消耗。要減少能源消耗可能是運用更多LED燈。"},{"q":"酒店管事部最重要的工作是預防廚房內細菌散播與交叉污染。下列哪項並非總管事的職責？","opts":["確保生熟食物分開處理","確保食物準備區保持清潔","確保洗碗碟機有定期保養","確保各項化學物品有完整的存貨紀錄"],"a":0,"note":"總管事的責任包括： 1．確保食物準備區保持清潔； 2．清洗烹飪用具及其他廚房設備； 3．保持玻璃器具、瓷器及餐具清潔； 4．管理化學物品的存貨記錄； 5．保養洗碗機； 6．必要時進行滅蟲。"},{"q":"某君在餐廳吃過午餐 X 後，數小時後出現發燒、嚴重頭痛及嘔吐的症狀，經醫生診斷後認為是進食了被 Y 污染的食物而引致細菌性食物中毒。X 和 Y 代表什麼？\nX                         Y","opts":["和風温泉蛋沙律            沙門氏菌","蛋白雞粒炒飯              副溶血性弧菌","海鮮意大利粉              肉毒梭狀芽孢桿菌","生蠔海鮮拼盤              諾如病毒"],"a":0,"note":"A) 副溶血性弧菌：海產、介貝類水產動物。（高溫煮10分鐘死亡） B) 沙門氏菌: 生的肉類及製品、未經煮熟的蛋及蛋類製品，温泉蛋可能就是未經煮熟的蛋。（攝氏70度細菌會死亡） C) 肉毒梭狀芽孢桿菌：食品加工過程中，混入菌體或芽胞，未依規定冷儲食品且殺菌條件不足。 D) 諾如病毒：食用未經煮熟的貝殼類海產。但諾如病毒並不是細菌性病毒，因為D不是答案。"},{"q":"某擁有高消費力的訪港旅客，計畫入住位處市中心、由舊建築改建而成的住宿設施，以獲取獨特的住宿體驗。以下哪酒店最能符合他／她的需要？","opts":["富衛1881公館","香港瑰麗酒店","大澳文物酒店","香港四季酒店"],"a":0,"note":"(A) 富衛1881公館是一間位於尖沙咀五星級酒店，前身是香港水警總部。 (B) 香港瑰麗酒店及D) 香港四季酒店並非由舊建築改建而成 (C) 大澳文物酒店位於大嶼山大澳，地點並不是市中心 (D) 香港四季酒店不是由舊建築改建而成"},{"q":"根據香港旅遊發展局的酒店分類制度，以下哪些會影響酒店的評級？\n(1) 獲得服務標準的認可或認證\n(2) 更換寬頻服務供應商以提供更穩定的上網服務\n(3) 引進水療及按摩服務設施\n(4) 以自助入住登記終端機取代前堂職員","opts":["只有(3)及(4)","只有(1)及(2)","只有(1)及(4)","只有(2)及(3)"],"a":0,"note":"酒店分類制度包括設施、地點、職員與客房的比例、實際房租、商務組合。 (1)錯誤：與上述各個項目無關 (2)錯誤：沒有增加設施數目 (3)正確：引進水療及按摩服務設施即是增加「設施」數目 (4)正確：以自助入住登記終端機取代前堂職員即職員數目減少，影響「職員與客房的比例」"},{"q":"「一個國家的氣候往往能造就其自然景觀的形成。」以下哪些組合是這陳述的正確示例？\n國               氣候               自然景觀","opts":["阿根廷           亞南極氣候         佩里托莫雷諾冰","馬來西亞         熱帶氣候           雲頂高原","澳洲             海洋性氣候         坎昆海灘","突尼斯           荒漠氣候           撒哈拉沙漠"],"a":0,"note":"A. 只有(1)及(2) B. 只有(1)及(4) C. 只有(2)及(3) D. 只有(3)及(4) A. 錯誤：馬來西亞屬於熱帶雨林氣候，終年炎熱多雨。但雲頂高原是最著名的娛樂中心和避暑聖地，山上有6家風格各異的豪華酒店，有4D電影院、大型購物中心、保齡球館、高爾夫球場，這些都是人工景點。 B. 錯誤：坎昆位於墨西哥東南部城市，位於加勒比海沿岸。並非澳洲。"},{"q":"2023年8月旅遊目的地X因發生嚴重山火而進人緊急狀態，呼籲旅客短時間內不要前往當地。目的地 X 是。","opts":["美國夏威夷","墨西哥墨西哥城","新西蘭皇后鎮","意大利威尼斯"],"a":0,"note":"美國夏威夷2023年山火造成至少97人喪命、百人受傷，2207棟建築物被損毀。"},{"q":"某旅客前往多個城市公幹，包括悉尼、珀斯、威靈頓及温哥華。該旅客到訪了多少個首都城市？","opts":["一個","兩個","三個","四個"],"a":0,"note":"悉尼、珀斯只是澳洲的國家，澳洲首都是坎培拉；温哥華只是加拿大的一個城市，加拿大首都是渥太華。 而威靈頓是新西蘭的首都。"},{"q":"2024年夏季奧林匹克運動會將於7至8月在法國巴黎舉行，屆時將有多國運動員參與。運動員從以下哪地出發前往巴黎時，所乘搭之直航航班會途經較少時區？\n(1) 加拿大多倫多\n(2) 美國洛杉磯\n(3) 泰國曼谷\n(4) 澳洲墨爾本","opts":["只有(1)及(3)","只有(1)及(4)","只有(2)及(3)","只有(2)及(4)"],"a":0,"note":"巴黎時區 ＋1 (1) 加拿大多倫多時區 －5 （與巴黎相距6小時） (2) 美國洛杉磯時區 －8（與巴黎相距9小時） (3) 泰國曼谷時區 ＋7 （與巴黎相距6小時） (4) 澳洲墨爾本時區＋11 （與巴黎相距10小時）"},{"q":"香港某旅行社正推廣到目的地 Y 的旅行團，以當地著名景點桌山和好望角為重點行程，同時安排旅客享受日光浴和參與多種水上活動。旅行社最適 其他國家。身處主要旅遊勝地的人們與發達國家的人們往往會使用同一類產品、吃相似的食物、擁有相似的生活方式及同樣崇尚物質、技術及競爭。 (3) 錯誤：「跨國企業調整商品和服務以滿足目標市場文化及社會的需要」是「在地化」的意思。 (4) 錯誤：旅遊產品標準化能滿足大眾化旅遊的需要。"},{"q":"酒店不同部門透過資產管理系統(PMS) 處理日常運作。以下哪些工作是酒店成本中心部門可以透過該系統處理的？\n(1) 計算餐單成本\n(2) 確認客房預訂狀況\n(3) 更新客房狀況\n(4) 管理客房空調及照明系統","opts":["只有(3)及(4)","只有(1)及(2)","只有(1)及(4)","只有(2)及(3)"],"a":0,"note":"酒店物業管理系統 (PMS) 可管理酒店業務營運的所有層面，包括提供優質的賓客體驗。傳統上，酒店 PMS 被定義為可以讓酒店或整個酒店集團實現前台功能管理的平台，例如預訂、賓客入住/退房、排房、管理客房費率及帳單。PMS 酒店取代了耗時、耗紙的流程。如今，酒店 PMS 技術已遠遠超出前台功能。酒店 PMS 現在是一個重要的業務營運系統，讓酒店經營者能夠提供優質的賓客體驗。 「收入中心」部門指透過向顧客提供商品及服務，直接為酒店產生收益的部門或單位，例如款接部、餐廳、客房餐飲服務、禮品店及商務中心。 「成本中心」部門亦可詮釋為「支援中心」部門，主要協助收入中心部門運作，不會為酒店產生任何直..."},{"q":"以下哪些是旅遊服務供應商使用全球分銷系統 (GDS) 的原因？\n(1)\t為旅客提供更多旅遊產品的選擇\n(2)\t節省推廣和銷售成本\n(3)\t方便比較競爭對手的售價\n(4)\t減少向旅行代理商支付佣金","opts":["只有(2)及(3)","只有(1)及(2)","只有(1)及(4)","只有(3)及(4)"],"a":0,"note":"透過全球分銷系統將不同的航空公司、酒店、旅行代理商、汽車租賃公司及郵輪等連繫一起，旅客或旅遊代理可以隨意計劃行程安排。 (1) 錯誤：為旅客提供更多旅遊產品選擇的是OTA（網上旅遊中介，例如kkday/klook），而不是GDS (2) 正確：GDS是集合了各類型的旅遊產品，減省了各供應商推廣和銷售旅遊產品的成本。 (3) 正確：在GDS，，各個旅遊產品一目了然，旅客或旅遊代理可進行格價。 (4) 錯誤：旅行代理商使用GDS便必須支付佣金。"},{"q":"以下哪項有關2023年首兩季本港旅遊業統計的描述並不正確？","opts":["內地、馬來西亞和美國是本港的三大主要客源市場。","入境不過夜旅客與過夜旅客有類似的消費模式，購物在他們的總開支中居首位。","過夜旅客訪港的主要目的是「度假」， 其次是「探訪親友」及「商務」。","所有酒店按月的平均入住率近八成， 較2022年同期高。"],"a":0,"note":"A. 入境不過夜旅客與過夜旅客有類似的消費模式，購物在他們的總開支中居首位。不過夜旅客購物開支比例更高，達到 77.7%。過夜旅客購物開支約占其總消費的 52%。2023年過夜旅客的境內消費開支為 1,190.7億港元，低於2019年的 1,381.95億港元。 C 答案是中國內地、東南亞地區和台灣是香港旅遊業的三大主要客源市場。"},{"q":"《行政長官2023年施政報告》中提出多項措施及政策以推動本港旅遊業的發展，以下哪項並不是有關措施或政策的正確描述？","opts":["推動智慧旅遊，包括善用智能科技加強出境旅行團的管理","加強郵輪旅遊的發展以提升香港作為亞洲郵輪樞紐的競爭力","開發特色旅遊產品，如潮流文化旅遊","優化「文化古蹟本地遊鼓勵計畫」，鼓勵業界開發更多特色主題旅遊"],"a":0,"note":"正確答案為B。"}]},{"year":2025,"qs":[{"q":"旅客是旅遊業整合模式的核心。從中心點往外伸延，可於第二層找到以下哪些機構?\n(1) 香港旅遊發展局\n(2) 香港故宮文化博物館\n(3) 香港瑰麗酒店","opts":["只有(2)及(3)","只有(1)及(2)","只有(1)及(3)","(1)、(2)及(3)"],"a":0,"note":"正確解釋： 旅遊業整合模式的第二層包含直接為旅客提供產品和服務的行業。香港故宮文化博物館（(2) 景點）和香港瑰麗酒店（(3) 住宿）都屬於這一層。 錯誤選項解釋： A， B， D: 香港旅遊發展局（(1)）是負責推廣和協調的旅遊機構，屬於第三層（支援及組織部分），而非直接服務提供者。"},{"q":"根據聯合國世界旅遊組織(聯合國世旅組織)對「旅客」的定義，以下哪個組合並不正確?","opts":["描述：一名前往他國治療13個月的病人；定義：旅客","描述：一名深圳居民即日來回中山購物；定義：國內短程旅客","描述：一名美國居民到墨西哥旅遊三天；定義：國際旅客","描述：一名外國政府的外交官；定義：非旅客"],"a":0,"note":"正確解釋： 根據聯合國世界旅遊組織的定義，「旅客」（Visitor）指離開其慣常環境到另一地方，目的並非在到訪地方由當地常住實體聘用，而連續逗留不超過一年的人。前往他國治療13個月的病人逗留時間已超過一年，因此不被界定為「旅客」。 錯誤解釋： A: 深圳居民即日來回中山購物，屬於在自己國家內旅遊且不過夜，符合「國內短程旅客」的定義。 B: 美國居民到墨西哥旅遊三天，屬於前往非居住國並有過夜，符合「國際旅客」的定義。 D: 外交官員是定義中明確排除的類別，因此界定為「非旅客」是正確的。"},{"q":"約翰花費港幣$6000經香港一間持牌旅行社報名參加了前往馬來西亞的五天團，並在旅程途中因感染冠狀病毒而支付了港幣$2000的醫療費用。同時，瑪麗亦經香港另一持牌旅行社以港幣$7000 購買了前往馬來西亞的旅遊套票，但這間旅行社在她出發前倒閉。約翰和瑪麗分別可以從旅遊業賠償基金(TICF)獲得多少賠償?","opts":["約翰：$0；瑪麗：$6 300","約翰：$0；瑪麗：$7 000","約翰：$1 800；瑪麗：$6 300","約翰：$1 800；瑪麗：$7 000"],"a":0,"note":"正確解釋： 旅遊業賠償基金（TICF）的保障範圍包括：因持牌旅行社倒閉而引致的外遊旅客損失外遊費的九成；以及外遊時因意外導致傷亡的特惠賠償。 約翰因感染病毒而支付醫療費用，這屬於個人健康問題，並非意外事故，因此不能獲得TICF賠償，賠償金額為$0。 瑪麗因旅行社倒閉而損失旅遊套票費用，可獲九成賠償，即 $7000 x 90% = $6300。 錯誤選項解釋： B， D: 瑪麗只能獲得九成賠償，而非全額。 C， D: 約翰的醫療費用不符合意外傷亡的定義，因此不能索償。"},{"q":"一個旅遊目的地正處於巴特勒(Butler)目的地生命週期的發掘階段。以下哪些有關該目的地的描述是正確的?\n(1) 根據蒲樂(Plog)的旅客分類，該目的地最能吸引探奇型旅客。\n(2) 該目的地的空間承載力還未超出負荷。\n(3) 根據 Doxey 的旅客情緒指標，該目的地正處於「理所當然」的階段。","opts":["只有(1)及(2)","只有(1)及(3)","只有(2)及(3)","(1)、(2)及(3)"],"a":0,"note":"正確解釋： (1) 巴特勒（Butler）目的地生命週期的「發掘階段」，遊客數量很少，主要是尋求新奇和冒險的旅客，這與蒲樂分類中的「探奇型」旅客特徵相符。 (2) 在此階段，遊客稀少，旅遊活動對當地影響輕微，因此空間承載力遠未超出負荷。 錯誤選項解釋： (3) Doxey的旅客情緒指標中，「理所當然」階段指當地居民開始對旅遊業變得冷漠，這通常發生在發展階段後期。發掘階段對應的是「欣然接受」階段。"},{"q":"根據旅遊業乘數效應的概念，以下哪項會被視為旅遊業對本港經濟的第三重影響?","opts":["餐廳經理向政府繳交的薪俸稅","旅客於酒店繳付的房租","航空公司向機師支付的薪酬","中介機構購買電腦設備的支出"],"a":0,"note":"旅遊業乘數效應分為三重影響： 第一重（直接）：旅客直接消費，如支付房租（A）。 第二重（間接）：航空公司支付機師薪酬，是間接影響的一部分（B）。旅遊企業向上游供應商採購，如中介機構買電腦（C）。 第三重（誘導）：旅遊業及其相關行業的僱員，將其薪酬用於本地消費。餐廳經理向政府繳交薪俸稅（D）是源於他在旅遊業賺取收入後發生的經濟活動，與第三重影響直接相關。"},{"q":"「香港旅遊發展局公布2024年上半年香港接待了2100萬旅客人次，平均逗留3.2晚，，過夜旅客人均消費為港幣$5600。」以上陳述反映了入境旅遊統計中哪一/些範疇?\n(1) 社會經濟\n(2) 消費心態\n(3) 人口性","opts":["只有(1)","只有(2)","只有(3)","(1)、(2)及(3)"],"a":0,"note":"正確解釋： (1) 社會經濟：這個範疇的統計數據是用來衡量旅遊業對一個地區的經濟和社會層面的影響。題目中提到的「旅客人次」、「平均逗留晚數」和「人均消費」都是量化旅遊業經濟貢獻和遊客行為模式的關鍵指標，因此完全屬於社會經濟的範疇。 錯誤選項解釋： (2) 消費心態：這類統計涉及旅客的旅遊動機、興趣、價值觀、生活方式等心理層面的因素。例如，旅客來港是為了美食、購物還是文化體驗。題目中的數據並沒有反映這些資訊。 (3) 人口性：這類統計描述旅客的基本背景資料，例如他們的年齡、性別、國籍、職業、收入水平等。題目中只提及旅客人次總數，但沒有分析這些旅客的個人背景。"},{"q":"入境旅遊為香港經濟帶來稅收，以下哪項/些是香港於2025年會徵收的稅項?\n(1) 陸路離境稅\n(2) 酒店房租税\n(3) 飛機乘客離境稅","opts":["只有(2)及(3)","只有(1)","只有(3)","只有(1)及(2)"],"a":0,"note":"正確解釋： (2) 酒店房租稅：香港政府於2024年財政預算案中宣布，將於2025年1月1日起重新徵收3%的酒店房租稅。 (3) 飛機乘客離境稅：這是一項香港長期以來一直徵收的稅項。 錯誤選項解釋： (1) 陸路離境稅：政府正在研究開徵此稅項的可行性，但截至2024年初，尚未確定於2025年實施。"},{"q":"以下哪些旅遊資源是由政府全資或部分擁有?\n(1) 天際100\n(2) 香港摩天輪\n(3) 啟德郵輪碼頭\n(4) 香港迪士尼樂園","opts":["只有(3)及(4)","只有(1)及(2)","只有(1)及(3)","只有(2)及(4)"],"a":0,"note":"正確解釋： (3) 啟德郵輪碼頭：由政府出資興建，屬於政府擁有的基礎設施，再外判給私人公司營運。 (4) 香港迪士尼樂園：由香港特區政府（作為大股東）與華特迪士尼公司合資經營。 錯誤選項解釋： (1) 天際100位於環球貿易廣場內，由新鴻基地產全資擁有。 2) 香港摩天輪由私人公司在政府的短期租約土地上營運。"},{"q":"以下哪些服務同屬旅遊業與款待業?\n(1) 香港半島酒店提供的住宿服務\n(2) 國泰航空公司提供的航空服務\n(3) 香港海洋公園提供的娛樂活動\n(4) 大型連鎖餐廳提供的餐飲服務","opts":["只有(1)及(4)","只有(1)及(2)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"正確解釋： 款待業的核心是為客人提供住宿（(1)）和餐飲（(4)）等服務。 這些服務同時也是旅遊業的重要組成部分，為旅客提供必需的支援。 錯誤選項解釋： （2）航空服務屬於旅遊業中的交通運輸界別，而非款待業。 （3）娛樂活動屬於旅遊業中的景點與活動界別，而非款待業的核心。"},{"q":"一位擁有高消費力的旅客想入住一間徒步可到西九文化區主要景點的酒店。以下哪間酒店最合適?","opts":["香港麗思卡爾頓酒店","香港四季酒店","九龍香格里拉","富豪九龍酒店"],"a":0,"note":"正確解釋： 香港麗思卡爾頓酒店（The Ritz-Carlton， Hong Kong）位於環球貿易廣場（ICC），與西九文化區僅咫尺之遙，可經由行人天橋輕鬆步行到達，並且符合高消費力旅客的豪華定位。 錯誤選項解釋： A: 香港四季酒店位於中環，需過海才能到達西九。 B， D: 九龍香格里拉和富豪九龍酒店均位於尖沙咀東部，距離西九文化區有一段較長的步行距離。"},{"q":"以下哪些描述符合「有限服務酒店」的特點?\n(1) 可能不提供餐飲設施\n(2) 房間內設有自助煮食設施\n(3) 房間價格較低\n(4) 位於郊區","opts":["只有(1)及(3)","只有(1)及(2)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"正確解釋： 「有限服務酒店」的特點是提供核心的住宿功能，但設施和服務相對精簡，以控制成本。 (1) 可能不提供或只提供非常有限的餐飲設施（如僅有早餐）。 (3) 由於服務和設施較少，房間價格通常較低。 錯誤選項解釋： (2) 房間內設有自助煮食設施是服務式公寓或長住酒店的特點。 (4) 有限服務酒店可位於市區或郊區，地點並非其定義特徵。"},{"q":"在酒店架構內，健身中心一般歸入以下哪個部門管理?","opts":["前堂部","禮賓部","管家部","人力資源部"],"a":0,"note":"正確解釋： 酒店的健身中心、游泳池等康樂設施，作為服務住客的設施之一，其管理通常歸入房務部的範疇，而前堂部是房務部的核心部門，常負責管理這些設施的日常運作。 錯誤選項解釋： A: 禮賓部主要處理酒店外的客人需求（如交通、訂票）。 C: 管家部主要負責房間和公共地方的清潔。 D: 人力資源部負責酒店員工事務。"},{"q":"一般而言，以下哪項有關酒店公共地方主管職責的描述是正確的?","opts":["檢查酒店大堂及洗手間的清潔度","監察酒店花店的業務","安排酒店轎車及其他交通服務的租賃","檢視酒店的平均房價"],"a":0,"note":"正確解釋： 酒店公共地方主管隸屬於管家部，其核心職責是監督和確保酒店所有公共區域（如大堂、走廊、洗手間、餐廳等）的清潔和衛生達到標準。 錯誤選項解釋： A: 監察酒店花店業務不屬於公共地方主管的職責。 B: 安排轎車服務是禮賓部的職責。 C: 檢視平均房價是前堂部或收益管理部門的職責。"},{"q":"於旺季的某天，一間酒店的前堂部電腦系統顯示以下的房間狀況資料。\n[TABLE]\n客房 | 客房狀況\n501 | VC\n502 | VD\n503 | OD\n[/TABLE]\n根據資料，以下哪項/些描述是正確的?\n(1) 一般而言，房務員應先清潔客房 502，然後再清潔客房 503。\n(2) 客房501已準備好讓新客人入住。\n(3) 客房503的客人要求請勿打擾。","opts":["只有(1)及(2)","只有(1)","只有(2)及(3)","(1)、(2)及(3)"],"a":0,"note":"正確解釋： 酒店房間狀況代碼：VC (Vacant Clean) - 空置潔淨房；VD (Vacant Dirty) - 空置待潔房；OD (Occupied Dirty) - 住客待潔房。 (1) 一般而言，房務員會優先清潔VD房（502），以便盡快提供給新入住的客人，然後再清潔OD房（503）。 (2) 客房501的狀況是VC，代表已清潔好，可以讓新客人入住。 錯誤選項解釋： (3) 客房503的狀況是OD，代表有住客但需要清潔，並非「請勿打擾」（DND）。"},{"q":"餐廳會運用不同的感官元素以營造環境氣氛。以下哪些是正確的配對?\n(1) 視覺：一間日式餐廳安裝和紙趟門\n(2) 觸覺：一名意式餐廳侍應穿上晚禮服\n(3) 嗅覺：一間美式餐廳於餐牌內加入菜式的圖片\n(4) 溫度：一名法式餐廳侍應在客人面前烹煮牛扒","opts":["只有(1)及(4)","只有(1)及(2)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"正確解釋： (1) 視覺：安裝和紙趟門是透過視覺元素營造日式風格。 (4) 溫度：侍應在客人面前烹煮牛扒（如法式火焰牛扒），烹調過程中的熱力能讓客人感受到溫度的變化，營造獨特的餐飲氛圍。 錯誤選項解釋： (2) 侍應穿晚禮服屬於視覺元素。 (3) 在餐牌加入菜式圖片屬於視覺元素"},{"q":"從餐廳東主的角度，採用周期餐單較自選餐餐單有以下哪些好處?\n(1) 簡化採購食物的程序\n(2) 讓常客每天有不同的選擇\n(3) 縮短廚房員工準備食物的時間\n(4) 為用餐營造特別的環境氣氛","opts":["只有(1)及(3)","只有(1)及(4)","只有(2)及(3)","只有(2)及(4)"],"a":0,"note":"正確解釋： 周期餐單指在一個周期內（如一星期）每天提供不同但固定的菜式。從餐廳東主的角度，這能帶來運營上的好處。 (1) 由於菜式固定且有規律，所需食材可以準確預算和批量採購，簡化程序並可能降低成本。 (3) 廚房員工每天只需專注準備當天的幾款菜式，熟能生巧，能大大縮短準備和烹調時間，提升效率。 錯誤選項解釋： (2) 讓常客有不同選擇是周期餐單對「顧客」的好處，雖然這間接有利於東主，但(1)和(3)是更直接的營運優勢。 (4) 營造特別氣氛與餐單類型沒有必然關係"},{"q":"以下哪項不是化學性污染?","opts":["在生蠔中發現諾如病毒","在新鮮的肉類中發現二氧化硫","在蔬菜中發現滴滴涕","在珊瑚魚中發現雪卡毒素"],"a":0,"note":"正確解釋： 化學性污染指由化學物質引起的食物污染。諾如病毒（Norovirus）是一種病毒，屬於生物性（Microbiological）污染。 錯誤選項解釋： A: 二氧化硫是一種化學添加劑。 B: 滴滴涕（DDT）是一種化學農藥。 C: 雪卡毒素是一種由海洋微生物產生的化學毒素"},{"q":"一名旅客從悉尼經印度洋飛到目的地的首都———城市X。以下何者最可能是城市X?","opts":["阿布扎比","威靈頓","約翰內斯堡","布宜諾斯艾利斯"],"a":0,"note":"正確解釋： 從悉尼（澳洲）出發，飛越印度洋，航線是向西。 阿布扎比（阿聯酋首都）位於阿拉伯半島，處於澳洲飛越印度洋後的西邊，是合理的航點。 錯誤選項解釋： B：威靈頓在新西蘭，位於悉尼的東邊。 C：約翰內斯堡（南非）也在印度洋西邊，但它不是南非的首都（首都是比勒陀利亞）。 D：布宜諾斯艾利斯在南美洲，航線通常是飛越太平洋或南極。"},{"q":"一名旅客參加了前往威尼斯、馬德里、巴塞隆拿及里約熱內盧的一程多站之旅。該旅客造訪了多少個大陸?","opts":["一","二","三","四"],"a":0,"note":"威尼斯（意大利）、馬德里（西班牙）、巴塞隆拿（西班牙）都位於歐洲大陸。 里約熱內盧（巴西）位於南美洲大陸。 總共造訪了兩個大陸。"},{"q":"一名持有香港特別行政區護照的人士，將會前往兩個目的地，體驗奔牛節及森巴嘉年華慶典。以下哪項有關這兩個目的地的描述是正確的?","opts":["該旅客入境這兩個目的地時無需辦理簽證。","這兩個目的地的官方語言相同。","比索是這兩個目的地使用的貨幣。","這兩個目的地的時差為1小時。"],"a":0,"note":"正確解釋： 奔牛節在西班牙潘普洛納舉行；森巴嘉年華在巴西里約熱內盧最為著名。而持有香港特別行政區護照的人士，前往西班牙（申根地區）和巴西旅遊均可享免簽證入境。 錯誤選項解釋： A: 西班牙的官方語言是西班牙語，巴西是葡萄牙語。 C: 西班牙的貨幣是歐元，巴西是雷亞爾。 D: 西班牙（＋2）與巴西（－3）的時差為5小時，並非1小時。"},{"q":"一名旅客計劃於12月到西半球國家進行滑雪活動，以下哪一/些國家適合他/她?\n(1) 加拿大\n(2) 法國\n(3) 新西蘭","opts":["只有(1)","只有(3)","只有(1)及(2)","只有(2)及(3)"],"a":0,"note":"正確解釋： 12月是北半球的冬季和南半球的夏季。滑雪需要在冬季。 (1) 加拿大位於西半球及北半球，12月是冬季，是滑雪勝地。 錯誤選項解釋： (2) 法國主要位於東半球。 (3) 新西蘭位於南半球，12月是夏季，不適合滑雪。"},{"q":"根據 Kotler 及Swarbrooke 的產品三個層次，以下哪項有關主題公園特質的描述是正確的?","opts":["主題公園的核心產品通常屬無形性。","接駁巴士服務是主題公園的支援產品。","主題公園的促成產品主要是園內的餐飲設施。","機動遊戲是主題公園的核心產品。"],"a":0,"note":"正確解釋： 產品的三個層次： 核心產品：顧客購買的真正目的或利益。主題公園的核心產品是為遊客帶來的歡樂、刺激、家庭樂、夢幻等無形的體驗和感受。 錯誤選項解釋： B， C: 接駁巴士和餐飲設施都屬於延伸產品層次，用以支援和促成核心產品的實現。 D: 機動遊戲是傳遞核心產品（刺激、歡樂）的有形載體，屬於實際產品層次，而非核心產品本身。"},{"q":"以下哪種禮儀不適合酒店從業員用於接待泰國旅客?","opts":["輕摸小孩的頭表示歡迎","雙手合十表示歡迎","贈送他們一杯迎賓飲品","以鞠躬表示歡迎"],"a":0,"note":"正確解釋： 在泰國文化中，頭部被視為人體最神聖的部位。觸摸別人的頭部，即使是出於友善，也被認為是非常無禮和冒犯的行為，對小孩也是如此。 錯誤選項解釋： A: 雙手合十（Wai）是泰國傳統的問候方式。 B: 贈送迎賓飲品是表示歡迎的普遍款待方式。 C: 鞠躬雖然不是泰國傳統禮儀，但作為表示尊重的身體語言，通常不會被視為不適合或冒犯。"},{"q":"以下哪些有關忠誠顧客的描述是正確的？\n(1) 他們普遍對服務失誤的容忍度較低。\n(2) 他們普遍較吸納新顧客需要較少的營銷成本。\n(3) 他們普遍較新顧客消費更多。","opts":["只有(2)及(3)","只有(1)及(2)","只有(1)及(3)","(1)、(2)及(3)"],"a":0,"note":"正確解釋： (2) 維繫忠誠顧客的成本（如會員福利）遠低於透過大量營銷和推廣吸納新顧客的成本。 (3) 忠誠顧客對品牌有信任，消費頻次更高，也更願意嘗試新產品，因此通常消費更多。 錯誤選項解釋： (1) 由於忠誠顧客存在信任基礎，他們可能給予品牌「第二次機會」，容忍度相對較高。因此「容忍度較低」的說法並不完全正確。"},{"q":"根據服務金三角的概念，以下哪些由酒店採取的行動是互動行銷的例子?","opts":["根據既定標準提供入住登記服務","在酒店網頁提供三維虛擬導覽，以吸引潛在顧客","為前線部門的員工提供網上培訓課程","為長期服務的員工提供額外福利"],"a":0,"note":"正確解釋： 服務金三角包含三種行銷活動： 外部行銷（公司 → 顧客）：如廣告、網頁推廣（A）。 內部行銷（公司 → 員工）：如員工培訓、福利（B， D）。 互動行銷（員工 → 顧客）：指服務人員在服務傳遞過程中與顧客的互動，即「關鍵時刻」。根據標準提供入住登記服務正是員工與顧客的直接互動。"},{"q":"以下哪項/些有關全面優質服務策略與例子的描述是正確的？\n(1) 酒店房務員致送手寫的感謝信以表達對顧客的珍惜。\n(2) 餐廳率先回收廚餘並加工成牲畜飼料以展示競爭優勢。\n(3) 航空公司在官方網站推出最後一刻優惠促銷機票以把握「關鍵時刻」。","opts":["只有(1)","只有(3)","只有(1)及(2)","只有(2)及(3)"],"a":0,"note":"正確解釋： (1) 全面優質服務（TQS）強調超越顧客期望。房務員致送手寫感謝信是一種個人化、窩心的服務，能有效表達對顧客的珍惜，是TQS的極佳例子。 錯誤選項解釋： (2) 回收廚餘屬於企業社會責任（CSR）和環保措施，雖然能提升品牌形象，但並非直接針對顧客服務體驗的策略。 (3) 推出優惠促銷是市場營銷的定價策略，而「關鍵時刻」指的是員工與顧客的服務接觸點，兩者概念不同。"},{"q":"以下哪項有關「負責任旅遊」的陳述是正確的?","opts":["透過負責任旅遊，更能滿足可持續發展旅遊業議程十二個目標中的文化獨特性。","確保護照仍有至少六個月的有效期，可被視為負責任旅客的行為。","負責任旅遊著重於環境方面，而可持續發展旅遊則充分考慮旅遊對各方面的影響。","負責任旅遊的概念不能應用於旅遊業整合模式之中。"],"a":0,"note":"正確解釋： 負責任旅遊是指所有旅遊持份者（包括旅客、業界、政府）採取行動，使旅遊達致可持續性。旅客尊重和欣賞當地文化、支持本地社群，正正有助於保護目的地的文化獨特性，這是可持續發展旅遊的重要目標之一。 錯誤選項解釋： A: 確保護照有效是旅客出行的個人基本責任，與負責任旅遊中對目的地環境、社會、文化的責任概念不同。 B: 負責任旅遊和可持續發展旅遊均全面考慮環境、社會和經濟三方面的影響。 C: 負責任旅遊的概念可以應用於整合模式中的每一個環節和持份者。"},{"q":"個人遊計畫已於2024年進一步擴展至更多內地城市。是次擴展包括以下哪些城市?\n(1) 拉薩\n(2) 烏魯木齊\n(3) 東莞\n(4) 南京","opts":["只有(1)及(2)","只有(1)及(4)","只有(2)及(3)","只有(3)及(4)"],"a":0,"note":"正確解釋：個人遊計畫於2024年3月6日擴展至青島市及西安市；2024年5月27日進一步擴展至太原市、呼和浩特市、哈爾濱市、拉薩市、蘭州市、西寧市、銀川市和烏魯木齊市。計劃目前在內地59個城市推行。"},{"q":"以下哪些是香港國際機場自2024年已採用的智能科技與系統？\n(1) 以無人駕駛拖車運送行李及貨物\n(2) 以無人駕駛巴士接載旅客往返機場與市區\n(3) 引入智能保安檢查系統，安檢時不用取出行李中的電子設備或液體\n(4) 讓所有航班的旅客使用電子登機證通過機場保安檢查及登機","opts":["只有(1)及(3)","只有(1)及(2)","只有(2)及(4)","只有(3)及(4)"],"a":0,"note":"正確解釋： (1) 香港國際機場近年已引入並正在擴大使用無人駕駛拖車，在停機坪運送旅客行李及貨物。 (3) 機場已逐步引入「智能登記護衛閘口」及新的電腦斷層安檢系統，旅客安檢時無需從手提行李中取出電子設備和液體。 錯誤選項解釋： (2) 機場的無人駕駛巴士目前只在機場限制區內的路線進行測試或運行（如接載員工），並未用於接載旅客往返市區。 (4) 雖然電子登機證已非常普及，但並非所有航空公司及目的地都支援，因此不能說「所有航班」的旅客都能使用。"},{"q":"近年，許多旅遊目的地就過度旅遊推出不同的應對措施，以下哪些是有關措施的正確描述？\n(1) 西班牙巴塞隆拿限制所有旅客最長逗留限期為七天。\n(2) 荷蘭阿姆斯特丹新規定所有到訪旅客必須申請簽證。\n(3) 日本向富士山登山者徵收登山費。\n(4) 意大利威尼斯禁止導遊使用揚聲器。","opts":["只有(3)及(4)","只有(1)及(2)","只有(1)及(3)","只有(2)及(4)"],"a":0,"note":"正確解釋： (3) 為應對登山人數過多的問題，日本山梨縣政府規定自2024年夏季起，向通過吉田口登山道的富士山登山者徵收2000日元的通行費。 (4) 意大利威尼斯為改善過度旅遊對居民的影響，於2024年起禁止旅行團使用揚聲器，並限制旅行團人數不得超過25人。 錯誤選項解釋： (1) 西班牙巴塞隆拿並未限制所有旅客的逗留期限，其措施主要針對打擊非法短租公寓。 (2) 荷蘭阿姆斯特丹並無新規定所有旅客必須申請簽證，簽證政策由國家及申根區決定。其措施包括限制新建酒店、禁止市中心吸食大麻等。"}]}];
